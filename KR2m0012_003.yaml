body:
  text: 吏部尚書滿漢各一人左右侍郎滿漢各一人掌中外文職銓敘黜陟之政釐飭官常以贊邦治所屬有文選考功稽勳驗封四司文選清吏司郎中滿三人蒙古漢各一人員外郎滿漢各二人主事滿一人漢二人掌班秩遷除均平銓法考功清吏司郎中滿三人漢一人員外郎滿二人蒙古漢各一人主事滿一人漢二人掌論劾考察旌别功過稽勳清吏司郎中滿漢各一人員外郎滿二人漢一人主事滿漢各一人掌更名改籍終養服制兼稽在京文員俸廩驗封清吏司郎中滿漢各一人員外郎滿二人漢一人主事滿蒙古漢各一人掌封贈襲廕土司嗣職堂主事掌文案者滿二人掌章奏者滿二人漢軍一人司務滿漢各一人掌出納文書稽察胥吏各部同筆帖式滿五十七人蒙古四人漢軍十有二人分隸各司視事之繁簡以為額掌翻譯清漢章奏文籍各部同文選清吏司官制一京官國家稽古建官立綱陳紀宗人府宗令宗正宗人皆王公領之所屬左右司半用宗室其制不隸於吏部惟漢府丞及司屬旗員之半以類相從列六部之次內閣絲綸是職政本繫焉六部都察院通政使司大理寺為九卿刑部都察院大理寺為三法司以詳議國是均平政刑理藩院內務府翰林院詹事府太常光祿太僕鴻臚諸寺國子監欽天監各治一官京尹敷化郊圻各修乃職率厥典常熙庶績焉太師太傅太保少師少傅少保太子太師太子太傅太子太保太子少師太子少傅太子少保已上皆不專設以待大臣加銜及追贈內閣大學士滿漢各二人正一品協辦大學士滿漢各一人簡用由各部尚書仍從一品學士兼禮部侍郎滿六人漢四人從二品侍讀學士滿四人蒙古二人漢二人從四品侍讀滿十人蒙古漢軍漢各二人正六品典籍滿洲漢軍漢各二人正七品中書滿七十人蒙古十有六人漢軍八人漢三十人貼寫中書滿四十人蒙古六人均從七品中書科中書舍人滿二人漢四人從七品筆帖式滿十人皇史宬尉滿三人正七品吏部戶部禮部兵部刑部工部尚書滿漢各一人從一品左右侍郎滿漢各一人正二品所屬滿漢郎中正五品員外郎從五品主事正六品司務從九品筆帖式自七品至九品以出身為差吏部屬司四郎中滿八人蒙古一人漢四人員外郎滿八人蒙古一人漢五人主事滿四人蒙古一人漢六人堂主事滿四人漢軍一人司務滿漢各一人筆帖式滿五十七人蒙古四人漢軍十有二人户部屬司十有四郎中滿十有八人蒙古一人漢十有四人員外郎滿三十八人蒙古一人漢十有四人主事滿十有四人蒙古一人漢十有四人堂主事滿四人漢軍二人司務滿漢各一人筆帖式滿九十九人蒙古四人漢軍十有六人內倉監督滿二人寶泉局監督滿漢各一人大使滿五人總理三庫無定員於大臣內簡用所屬郎中三人員外郎六人堂主事一人司庫五人正七品大使四人筆帖式十有五人以上均滿員總督倉場户部右侍郎滿漢各一人所屬坐糧廰滿漢各一人由科道及各部司官內奏委倉監督滿漢各十有四人由各衙門司官內奏委大通橋監督滿漢各一人由各倉監督內奏調筆帖式滿四人禮部屬司四郎中滿六人蒙古一人漢四人員外郎滿十人蒙古一人漢二人主事滿四人蒙古一人漢四人堂主事滿三人漢軍一人司務滿漢各一人筆帖式滿三十四人蒙古二人漢軍二人鑄印局員外郎漢一人大使漢一人未入流筆帖式滿一人會同四譯館郎中兼鴻臚寺少卿銜一人由本部郎中內奏委大使漢一人正九品序班漢二人從九品朝鮮通事十有二人六品六人七品四人八品二人馬館監督二人由禮部理藩院司官內奏委樂部以禮部滿尚書內務府總管及各部院尚書侍郎知樂者兼管所屬和聲署署正滿漢各一人署丞滿漢各一人供用官三十人均以禮部內務府太常寺鴻臚寺司官贊禮郎筆帖式兼理兵部屬司四郎中滿十有二人蒙古一人漢五人員外郎滿十人蒙古三人漢三人主事滿四人蒙古一人漢五人堂主事滿四人漢軍一人司務滿漢各一人筆帖式滿六十二人蒙古八人漢軍八人馬館監督一人由本部司官內奏委刑部屬司十有八郎中滿十有七人蒙古一人漢二十人員外郎滿二十四人蒙古一人漢十有九人主事滿十有七人蒙古一人漢十有八人堂主事滿五人漢軍一人司務滿漢各一人筆帖式滿一百有五人蒙古四人漢軍十有五人贓罰庫司庫滿一人正七品提牢滿漢各一人由本部司官內專委司獄滿四人漢軍二人均由本部筆帖式內奏補漢二人從九品工部屬司四郎中滿十有七人蒙古一人漢四人員外郎滿十有九人蒙古一人漢四人主事滿十有二人蒙古一人漢八人堂主事滿三人漢軍一人司務滿漢各一人筆帖式滿七十七人蒙古一人漢軍八人節慎庫員外郎滿一人由本部司官內奏調司庫滿二人正七品筆帖式滿二人庫使十一人製造庫郎中滿二人漢一人司庫滿二人正七品司匠滿二人從九品筆帖式滿四人蒙古一人漢軍二人庫使二十二人寶源局監督滿漢各一人大使滿二人琉璃窰監督滿漢各一人街道監督滿漢各一人木倉監督滿漢各一人柴厰監督滿二人煤炭厰監督滿一人寶源局以下滿漢監督大使均由本部司官筆帖式內奏委宗人府府丞漢一人正三品左右二司理事官各一人正五品副理官各一人從五品主事各一人經歷一人正六品以上均滿員堂主事滿一人漢二人筆帖式滿十有二人理藩院尚書一人從一品左右侍郎各一人正二品均滿員或以蒙古補授所屬司五郎中滿六人蒙古五人員外郎滿十有八人蒙古十有八人主事滿四人蒙古五人堂主事滿二人蒙古三人漢軍一人司務滿洲蒙古各一人筆帖式滿三十六人蒙古五十五人漢軍六人銀庫司官二人由本院司官內奏委司庫滿一人