  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_100-1a, image: WYG0619/WYG0619-0927a.png}
body:
  text: 火器營總統六人以王公領侍衛內大臣都統前鋒護軍各統領兼任掌教演火器之政令八旗鳥槍護軍參領十有六人旗各二人鳥槍驍騎參領二十四人滿洲旗各二人蒙古旗各一人管鳥槍散秩官五十六人管炮散秩官四十人鳥槍護軍校一百十有二人鳥槍驍騎校一百十有二人管炮驍騎校四十人八旗滿洲蒙古每佐領下鳥槍護軍三人鳥槍驍騎四人炮驍騎一人以上鳥槍護軍參領為該營專設官餘均以八旗滿洲蒙古官兵兼任凡訓練歲於七月十七日始遇閏七月即於閏七月十七日為始至次年四月十八日止封印日至開印日暫停月以初四初九十四十九二十四二十九等六日演炮初二初七十二十七二十二二十七等六日演鳥槍初六十六二十六等三日校射春秋會操於安定門外教場大操日隨大隊列陳合操於仰善窪每年秋後奏請於蘆溝橋演放子母炮得旨率官軍前往蘆溝橋演放十日開演日一應祭炮儀節均與漢軍同圓明園八旗護軍營總統無定員以王公大臣兼任掌圓明園翊衛之政令營總八人護軍參領八人均旗各一人副護軍參領十有六人旗各二人署護軍參領三十二人旗各四人護軍校百二十八人副護軍校百二十八人均旗各十有六人護軍三千六百七十二人旗各四百五十九人教養兵四百八十人旗各六十人凡翊衛於圓明園周圍相度地勢建營房八處分旗駐劄圓明園設堆鋪七十有六日以營總護軍參領各二人副護軍參領署護軍參領十有五人護軍校護軍七百六十人守衛長春園設堆鋪二十日以護軍參領一人副護軍參領署護軍參領四人護軍校護軍二百人守衛清漪園設堆鋪六日以副護軍參領或署護軍參領一人護軍校護軍六十人守衛恭遇駐蹕靜宜園設堆鋪五十有一日以營總二人護軍參領一人副護軍參領署護軍參領十有三人護軍校護軍五百十人守衛暢春園設堆鋪十有九日以營總一人副護軍參領署護軍參領五人護軍校護軍一百九十人守衛恭遇車駕行幸官軍沿塗清蹕隨時酌委凡訓練步射騎射鳥槍步獵及軍政考驗均與八旗護軍營同又於八旗營房內各設學舍以翻繹生員六人充教習分教本營肄業子弟凡升除總統員闕由本處奏請特簡營總員闕於本營護軍參領及京中護軍參領內護軍參領員闕於本營署護軍參領內副護軍參領員闕於本營署護軍參領內署護軍參領員闕於本營護軍校內護軍校員闕於副護軍校內均由總統遴選擬正陪引見補授副護軍校筆帖式均於護軍內護軍於教養兵間散壯丁內遴選均由總統考驗拔補凡八旗牧養官馬三千一百十有二匹每遇車駕巡狩需用官馬回時繳還一如京中八旗之制其官員親隨兵養亷官軍優恤均與京城同健鋭營總統無定員以公侯大臣兼任翼領二人前鋒參領八人副前鋒參領八人署前鋒參領十有六人前鋒校五十人副前鋒校四十人什長五十人筆帖式四人前鋒千人副校什長筆帖式均在內委前鋒千人習雲梯馬步射鳥槍馳馬躍馬舞鞭舞刀水戰駕船駛風之技翼領督率所屬隨時訓練恭遇巡狩視京城護軍營官軍十分之二委參副校士隨蹕凡升補翼領員闕於前鋒參領內前鋒參領員闕於副前鋒參領內副前鋒參領員闕於署前鋒參領內署前鋒參領員闕於前鋒校內前鋒校員闕於副前鋒校筆帖式內均由總統遴選擬定正陪引見補授副前鋒校闕由總統於筆帖式什長內選補什長筆帖式闕於前鋒內前鋒闕於委前鋒內委前鋒闕於教養兵間散壯丁及八旗驍騎教養兵內教養兵闕於壯丁內拔補凡官軍俸餉優恤親隨兵養廉均與圓明園護軍營同三旗虎槍營總統一人以公侯領侍衛內大臣簡任總領六人以內大臣都統前鋒護軍統領副都統侍衛參領簡補三旗虎槍六百人旗各二百人於侍衛參領親軍前鋒護軍驍騎校親軍前鋒護軍領催驍騎及間散人內選用虎槍長旗各七人副長七人於虎槍人內簡選引見補授恭遇車駕巡狩虎槍總統總領日以十人佩虎槍於前導侍衛前行安營後偵虎豹出入備伏弩箭犁刀行田遇大獸則列槍從之奉旨殺虎或追蹤或尋山得實具奏有旨則殺虎以獻以首先刺虎一二人名奏聞如差往畿輔近地或於口外殺虎量地方遠近奏請簡總統或總領酌帶虎槍人前往選八旗善騎射者旗各參領二人前鋒護軍校二人前鋒護軍十有八人共一百六十人行田時於蒙古圍後列隊隨行獸有逸出圍外者馳騁射獵以厲士氣以整軍容欽定大淸會典卷一百
