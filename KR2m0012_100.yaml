  text: 欽定四庫全書欽定大清會典卷一百
  hash: sha256:4726c26ef2f88f747f1f4ece86c6a1bcd74a37b259aa3992a217f525a53cdb73
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_100-1a, image: WYG0619/WYG0619-0927a.png}
body:
  text: 火器營總統六人以王公領侍衛内大臣都統前鋒䕶軍各統領兼任掌教演火器之政令八旗鳥槍䕶軍叅領十有六人旗各二人鳥槍驍騎叅領二十四人滿洲旗各二人䝉古旗各一人管鳥槍散秩官五十六人管礮散秩官四十人鳥槍䕶軍校一百十有二人鳥槍驍騎校一百十有二人管礮驍騎校四十人八旗滿洲䝉古每佐領下鳥槍䕶軍三人鳥槍驍騎四人礮驍騎一人以上鳥槍䕶軍叅領為該營專設官餘均以八旗滿洲蒙古官兵兼任凡訓練歲於七月十七日始遇閏七月即於閏七月十七日為始至次年四月十八日止封印日至開印日暫停月以初四初九十四十九二十四二十九等六日演礮初二初七十二十七二十二二十七等六日演鳥槍初六十六二十六等三日校射春秋㑹操於安定門外教場大操日隨大隊列陣合操於仰善窪每年秋後奏請於蘆溝橋演放子母礮得㫖率官軍前往蘆溝橋演放十日開演日一應祭礮儀節均與漢軍同圓明園八旗䕶軍營總統無定員以王公大臣兼任掌圓明園翊衛之政令營總八人䕶軍叅領八人均旗各一人副䕶軍叅領十有六人旗各二人署䕶軍叅領三十二人旗各四人䕶軍校百二十八人副䕶軍校百二十八人均旗各十有六人䕶軍三千六百七十二人旗各四百五十九人敎養兵四百八十人旗各六十人凡翊衛於圓明園周圍相度地勢建營房八處分旗駐劄圓明園設堆舖七十有六日以營總䕶軍叅領各二人副䕶軍叅領署䕶軍叅領十有五人䕶軍校䕶軍七百六十人守衛長春園設堆舖二十日以䕶軍叅領一人副䕶軍叅領署䕶軍叅領四人䕶軍校䕶軍二百人守衛清漪園設堆舖六日以副䕶軍叅領或署䕶軍叅領一人䕶軍校䕶軍六十人守衛恭遇駐蹕靜宜園設堆舖五十有一日以營總二人䕶軍叅領一人副䕶軍叅領署䕶軍叅領十有三人䕶軍校䕶軍五百十人守衛暢春園設堆舖十有九日以營總一人副䕶軍叅領署䕶軍叅領五人䕶軍校䕶軍一百九十人守衛恭遇車駕行幸官軍沿塗清蹕隨時酌委凡訓練步射騎射鳥槍步獵及軍政考驗均與八旗䕶軍營同又於八旗營房内各設學舍以繙繹生員六人充敎習分敎本營肄業子弟凡升除總統員闕由本處奏請特簡營總員闕於本營䕶軍叅領及京中䕶軍叅領内䕶軍叅領員闕於本營署䕶軍叅領内副䕶軍叅領員闕於本營署䕶軍叅領内署䕶軍叅領員闕於本營䕶軍校内䕶軍校員闕於副䕶軍校内均由總統遴選擬正陪引見補授副䕶軍校筆帖式均於䕶軍内䕶軍於敎養兵閒散壯丁内遴選均由總統考驗拔補凡八旗牧養官馬三千一百十有二匹每遇車駕巡狩需用官馬回時繳還一如京中八旗之制其官員親隨兵養亷官軍優䘏均與京城同健銳營總統無定員以公侯大臣兼任翼領二人前鋒叅領八人副前鋒叅領八人署前鋒叅領十有六人前鋒校五十人副前鋒校四十人什長五十人筆帖式四人前鋒千人副校什長筆帖式均在内委前鋒千人習雲梯馬步射鳥槍馳馬躍馬舞鞭舞刀水戰駕船駛風之技翼領督率所屬隨時訓練恭遇巡狩視京城䕶軍營官軍十分之二委叅副校士隨蹕凡升補翼領員闕於前鋒叅領内前鋒叅領員闕於副前鋒叅領内副前鋒叅領員闕於署前鋒叅領内署前鋒叅領員闕於前鋒校内前鋒校員闕於副前鋒校筆帖式内均由總統遴選擬定正陪引見補授副前鋒校闕由總統於筆帖式什長内選補什長筆帖式闕於前鋒内前鋒闕於委前鋒内委前鋒闕於教養兵閒散壯丁及八旗驍騎敎養兵内敎養兵闕於壯丁内拔補凡官軍俸餉優䘏親隨兵養廉均與圓明園䕶軍營同三旗虎槍營總統一人以公侯領侍衛内大臣簡任總領六人以内大臣都統前鋒䕶軍統領副都統侍衛叅領簡補三旗虎槍六百人旗各二百人於侍衛叅領親軍前鋒䕶軍驍騎校親軍前鋒䕶軍領催驍騎及閒散人内選用虎槍長旗各七人副長七人於虎槍人内簡選引見補授恭遇車駕巡狩虎槍總統總領日以十人佩虎槍於前導侍衛前行安營後偵虎豹出入備伏弩箭犁刀行田遇大獸則列槍從之奉㫖殺虎或追踪或㝷山得實具奏有㫖則殺虎以獻以首先刺虎一二人名奏聞如差往畿輔近地或於口外殺虎量地方遠近奏請簡總統或總領酌帶虎槍人前往選八旗善騎射者旗各叅領二人前鋒䕶軍校二人前鋒䕶軍十有八人共一百六十人行田時於䝉古圍後列隊隨行獸有逸出圍外者馳騁射獵以厲士氣以整軍容欽定大淸會典卷一百
