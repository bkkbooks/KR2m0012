  text: 欽定四庫全書欽定大清㑹典卷八十九
  hash: sha256:eda76b274d725c12142e29b6f79414da08c9eeb8ad5ee11cdd5a6876ef0cf0fd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_089-1a, image: WYG0619/WYG0619-0819a.png}
body:
  text: 內務府掌儀司二凡朝賀設樂皇帝率羣臣朝賀皇太后朝儀均詳禮部設中和韶樂於慈寧宮左右檐下設丹陛大樂於長慶門內左右太和殿朝賀禮成皇帝御乾清宮皇后率貴妃妃嬪朝賀諸皇子皇孫咸朝賀設中和韶樂於乾清宮左右檐下設丹陛大樂於乾清門內左右皇后受貴妃妃嬪暨皇子皇孫公主福晉命婦期賀設中和韶樂於交泰殿左右檐下設丹陛大樂於乾清宮後左右均北嚮作樂咸以內監凡賜茶恭遇皇帝御殿移文尚茶備茶屆期分委護軍執事人等分賜丹墀兩翼文三品武二品以上各官及外國使臣茶由內務府官監視凡燕外藩之禮歲除及正月十五日賜外藩䝉古燕奏請欽命進酒大臣內管領備筵九十席及期武備院張黃幕於保和殿南正中內管領設反坫於幕下廣儲司陳尊罍巵爵於坫上尚膳正豫陳御筵於寶座上正中稍南寶座下左右設外藩䝉古王公三旗內大臣及與燕文武大臣席各五行左右各二十有六東西嚮寶座左右設後扈大臣席各一僉嚮寶座前左右設前引大臣席各二東西嚮寶座後左右豹尾班侍衛席各一次西設日講起居注官席一均南嚮殿外丹陛左右設台吉塔布囊侍衛席各三行左十有三右十有二東西嚮丹陛東設理藩院堂官席一慶隆舞大臣席一均西嚮黃幕旁左設禮部堂官右設內務府堂官席各一東西嚮樂部設中和韶樂於保和殿左右檐下設丹陛大樂於中和殿後檐下左右均北嚮屆時鴻臚寺理藩院官引䝉古王公台吉入領侍衛內大臣序王公暨與燕大臣等各就班次班齊掌儀司官奏請御保和殿中和韶樂作奏隆平之章皇帝升寶座樂止䝉古王公暨與燕文武大臣侍衛台吉各就席行一叩禮坐尚膳正尚膳副護軍參領升邇御筵降乃進茶丹陛清樂作奏海宇升平日之章尚茶正率尚茶侍衛執事等舉茶案由中道進至檐下正中北嚮跪注茶於碗進茶大臣奉茶入中門羣臣皆就本位跪進茶大臣由中陛升至御前跪進茶退立於西旁皇帝飲茶與燕之䝉古王公內大臣各官均行一叩禮進茶大臣跪受茶碗由右陛降出中門衆皆坐侍衛分賜䝉古王公各官茶皆於本位一叩飲畢復行一叩禮尚茶正等徹茶案退樂止展席羃乃進酒掌儀司官二人自反坫奉壺爵一人奉巵由中道進至檐下左楹前丹陛清樂作奏玉殿雲開之章進酒大臣出席釋端罩元宵補服羣臣皆起立進酒大臣入殿內正中北面跪羣臣皆於坐次跪掌儀司官奉壺酌酒於爵由中門入西嚮跪授大臣退進酒大臣奉爵興由中陛升跪御座右進酒興由右陛降至原位跪皇帝進酒進酒大臣行一叩禮羣臣皆隨行禮進酒大臣由右陛升跪受爵仍由中陛降跪掌儀司官入跪受爵退羣臣皆起掌儀司官一人酌金巵以入賜進酒大臣酒大臣受巵一叩卒飲掌儀司官立受巵退進酒大臣一叩興羣臣皆坐進酒大臣出加端罩元宵補服入席坐尚膳正等率尚膳進饌殿廷清樂作奏萬象清寧之章尚膳正等承㫖分賜食品於各席遍樂止笳吹作奏畢慶隆舞進舞揚烈舞畢隊舞大臣進殿中舞喜起舞所司舉反坫進至殿陛下御前侍衛酌巵酒升至御座前皇帝簡召王公大臣賜酒領侍衛內大臣起立視侍衛遍賜殿陛王公大臣台吉侍衛酒羣臣咸跪受一叩卒飲一叩坐隊舞退朝鮮國俳進百伎並作退尚膳正副護軍參領等升徹御筵降與燕䝉古王公大臣等謝燕行一跪三叩禮丹陛大樂作奏治平之章禮成皇帝還宮中和韶樂作奏顯平之章樂止鴻臚寺理藩院官引外藩暨衆官以次退正月十四日頒賜外藩䝉古燕於各邸第筵席之數六十席凡慈寧宮筵燕恭遇皇太后聖夀元日於正月初二日設燕各慶典前期禮部疏請得㫖命所司庀饌尚膳內管領庀皇太后皇后御筵肴饌貴妃妃嬪饌筵親王郡王各進饌筵牲酒不足者光祿寺備具以足四十席豫期請命進酒大臣命婦至日武備院張黃幕於慈寧門外階下正中內管領設反坫於幕下廣儲司陳尊罍巵爵於坫上內鑾儀衛設皇太后儀駕本司內監設樂懸如儀尚膳女官內管領妻設皇太后御筵於寶座正中稍南東設皇后筵西南嚮稍後設貴妃妃嬪筵又後設公主福晉以下鄉君入八分公夫人以上席重行丹陛上設公侯伯子男滿一二品大臣命婦侍衛妻席重行均東西相嚮屆時內監引公主福晉以下二品以上命婦咸朝服自永康右門入進慈寧門序立於丹墀禮部堂官轉傳內監奏請皇后率貴妃妃嬪禮服乘輿出啓祥門前引命婦八人恭導由慈祥門入至徽音左門外降輿入皇后進殿內東旁西嚮立貴妃妃嬪隨入東西面序立公主福晉命婦按翼於丹陛上東西面序立均北上引禮女官奏請皇太后御慈寧宮內監接奏皇太后禮服出宮中和韶樂作奏豫平之章皇太后升座樂止引禮女官引公主福晉以次入殿大臣命婦於丹陛上各就位皇后貴妃以下皆一拜就坐尚膳女官內管領妻升邇御筵降乃進茶丹陛清樂作奏海宇升平日之章尚茶女官率尚茶婦舉茶案由中道至檐下閾外正中北嚮跪注茶於碗進茶女官奉茶由中陛升至皇太后座前跪進茶退立西旁皇太后飲茶皇后率貴妃妃嬪以下均行一拜禮進茶女官跪受茶碗由右陛降出中門皇后坐衆皆坐侍衛妻等進皇后茶及分賜貴妃妃嬪公主福晉命婦茶皇后率貴妃妃嬪以下於本位行一拜禮飲畢復行一拜禮尚茶女官率尚茶婦等徹茶案退樂止展席羃乃進酒內管領妻二人自反坫奉壺爵一人奉巵由中道進至檐下左楹前丹陛清樂作奏玊殿雲開之章進酒大臣命婦出席皇后以下皆起立於本位進酒大臣命婦入殿正中北面跪皇后率貴妃妃嬪以下跪於坐次內管領妻奉壺酌酒於爵由中門入西嚮跪授進酒大臣命婦退進酒大臣命婦奉爵興由中陛升跪皇太后座右進酒興由右陛降至原位跪皇太后進酒進酒大臣命婦行一叩禮皇后率貴妃妃嬪以下行一拜禮進酒大臣命婦由右陛升跪受爵仍由中陛降跪內管領妻入跪受爵退皇后以下皆起內管領妻一人酌金巵以入賜進酒大臣命婦酒大臣命婦受巵一叩卒飲內管領妻立受巵退進酒大臣命婦一叩興皇后以下皆坐進酒大臣命婦出就席坐尚膳女官率尚膳婦進饌殿廷清樂作奏萬象清寧之章尚膳女官內管領妻承懿㫖分賜食品於各席遍樂止內監下慈寧宮簾御前大臣禮部滿堂官引笳吹作奏畢慶隆舞進至丹陛舞揚烈舞畢引隊舞大臣進至丹陛舞喜起舞尚茶婦等舉反坫進至殿陛下大臣命婦進皇后酒侍衛妻分賜貴妃妃嬪公主福晉命婦等酒皇后率貴妃妃嬪以下一拜飲畢一拜坐隊舞退次朝鮮國俳進百伎並作退尚膳女官內管領妻升徹御筵降皇后貴妃妃嬪於殿內公主福晉命婦於丹陛上排班謝燕行二肅一跪一拜禮丹陛大樂作奏正平之章禮畢樂止女官跪奏禮成皇太后還宮中和韶樂作奏履平之章樂止引禮女官恭導皇后貴妃妃嬪降階出徽音左門升輿還宮內監引公主福晉命婦各退皇子成婚公主下嫁設燕皇太后宮儀同凡恭進饌筵元日正月十四十五歲除日皇太后宮皇帝皇后宮皆進饌筵內務府總管一人省視恭進貴妃妃嬪暨諸皇子公主均備饌筵有差恭遇皇太后聖夀皇帝萬夀聖節皇后千秋令節各進饌筵如儀每歲正月十六日皇太后燕下嫁外藩公主郡主縣主郡君縣君鄉君䝉古王公福晉夫人儀均與正月初二日大燕同凡皇子婚禮先期移文欽天監諏吉以聞乃命夫婦偕老之大臣傳制曰以某官某人之女某氏作配皇幾子為福晉傳制畢福晉父率闔族謝恩行三跪九叩禮擇吉簡內大臣侍衛隨皇子詣福晉家行定親禮福晉父率闔族采服迎於大門外延皇子入至正寢於福晉父母前行三叩禮畢皇子回宮福晉父率族送於大門外諏吉行納采禮金領約一金耳飾六皆飾以東珠金簪大小各三皆飾以珠表裏百端棉三百斤貂皮百四十白狐皮九十狐皮百六十以內務府總管宮殿監督領侍充使賜福晉父母冠服簪環金帶鞍馬筵燕五十席羊三十六酒五十尊及門福晉父母迎入中堂謝恩行三跪九叩禮與燕大臣陪福晉父及族人之在官者燕於中堂內務府總管命婦女官同與燕命婦陪福晉母暨諸婦燕於內室乃作樂陳戲賓主酬酢畢中堂謝燕行一跪三叩禮內室謝燕行二肅一跪一叩禮內務府總管暨宮殿監督領侍等回朝復命成婚前一日皇子於皇太后皇帝皇后前行禮福晉母率諸婦至皇子所居宮中設牀帳妝奩工部於箭亭及皇子所居宮皆結采成婚日設燕六十席羊四十五酒六十尊禮部傳集與燕大臣侍衛各官暨與燕命婦延福晉父暨族人福晉母暨諸婦內外筵燕如納采儀屆吉時於皇子宮設錦褥二東西嚮設酒饌案於前置兩爵兩卺於案請皇子西面福晉東面相嚮行兩拜禮各就坐執事者執金瓶女官以卺爵酌酒合和以進皇子與福晉皆飲乃進饌酒饌三行皇子與福晉皆起仍行兩拜禮徹饌案次日皇子偕福晉朝見皇太后皇帝皇后女官二人引皇子居左稍前行三跪九叩禮福晉居右稍後行六肅三跪三叩禮皇孫婚禮與皇子同惟納采儀物羊酒饌筵有差凡公主下嫁之禮前期欽天監諏吉以聞乃命夫婦偕老之大臣傳制曰以某官某之子某尚某公主傳制畢本官率闔族謝恩行三跪九叩禮擇吉納采授額駙爵額駙詣皇太后皇帝皇后宮門前行禮恭進納采禮於午門外詳見禮部是日於保和殿設燕集三品以上大臣燕額駙額駙之父及族人在官者王公有特召者亦與禮儀均如歲除筵燕之制下嫁前一日內府女官率執事婦女至額駙府第設牀帳陳妝奩下嫁日欽命皇子福晉或近支王福晉貝勒夫人送至公主府第是日設燕延額駙父暨族人在官者與納采禮同屆吉時女使設錦褥二於室東西嚮設酒饌案於前置兩爵兩巹於案請公主東面額駙西面相嚮行兩拜禮各就坐女官一人執金瓶一人以巹爵酌酒合和以進公主與額駙皆飲乃進饌酒饌三行公主與額駙皆起仍行兩拜禮徹饌案次日額駙偕公主見舅姑行兩拜禮舅姑立受一拜答一拜擇吉公主偕額駙進宮於皇太后皇帝皇后前行禮公主行禮於宮中額駙行禮於宮門外王公之女奉㫖授為和碩公主郡主暨宗女撫飬宮中者其下嫁之禮各視爵秩以别差等筵燕㑹禮部辦理凡進時憲書歲以十月朔欽天監堂官奉至太和門授本司官奉至乾清門慈寧門各授內監恭進凡進春歲以立春日禮部率順天府官恭進皇太后宮春山土牛本司官補服導引由永康左門至慈寧門授內監接進安設於皇太后宮恭進皇帝皇后春山土牛於後左門外本司官導引至乾清門授內監奉進恭呈皇帝御覽仍奉出安設於太和殿東暖閣恭進皇后春山土牛安設於保和殿東暖閣凡恭紀玉牒黃册據宗人府來文具奏請㫖俟宮殿監督領侍等承㫖以未載入玉牒之妃嬪等封號姓氏父族未載入玊牒黃册之皇子皇女皇孫皇孫女其行幾某年月日時生及母氏收生婦詳書於册授內務府總管封送宗人府載入玉牒凡親蠶為壇於西苑皇后躬饗先𧖟儀詳禮部執事女官典儀一人贊引二人傳贊三人司香一人司帛一人司爵一人奉福酒接福酒各一人奉福胙接福胙各一人以上各備一人前引十人相儀二人補闕八人執事有遺闕者補之均於宮人內選充如不足數於內府及八旗命婦內選充置桑田於先𧖟壇東南建繭館織室𧖟宮二十七從室於壇東北設𧖟母二人於內外命婦中擇髙年嫻禮儀者充之𧖟婦二十七人擇內苑熟悉𧖟事者充之均由府選充𧖟初生皇后躬採桑於桑田儀詳禮部從採妃嬪二位由府奏請欽命公主親王福晉以下縣君輔國公夫人以上三人文三品武二品官以上命婦四人由各旗開列送府奏請𧖟母率𧖟婦助採𧖟婦居𧖟室視𧖟之眠起而謹飼之董以𧖟宮令一人丞一人由宮殿監督領侍於首領內監內選擬奏請歌採桑辭十人司金鼓拍版六人司笙簫笛十有八人執采旗四十人皆以內監充之及繭成皇后獻繭於皇太后皇帝親詣織室繅三盆手儀詳禮部皆以𧖟母襄其禮欽定大清㑹典卷八十九
