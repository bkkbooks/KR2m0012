front:
  text: 欽定四庫全書欽定大清會典卷七十三
  hash: sha256:1c7064199b228f233e421fed048af8f13d35bccc405f7e93988dd3f218f5853f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_073-1a, image: WYG0619/WYG0619-0635a.png}
body:
  text: 工部虞衡清吏司採捕凡採捕有三曰東珠曰貂皮曰人參貂珠歲由黑龍江將軍捕牲總管按數選取輸納人參由户部給票委官經理均會同內務府分等驗收貯庫凡採捕之法採珠設珠軒置長上三旗珠軒五十有四下五旗珠軒三十有四每珠軒以得東珠十有六顆為率重自一分至十分為度每歲合計所入之數佳者或以一當五或以一當四當三當二尋常者仍以一當一分為五等不及等者不入正數內捕貂索倫壯丁每名歲捕一貂冬季選貢鄂倫椿食糧壯丁如之其不食糧者每名亦歲捕一貂三等以上給直不及等者不給直烏良海壯丁每名歲捕二貂按數輸納採人參户部委官攜信票出口招商給票入山開採每票以納人參十有二兩為則每歲所採以給票之多寡為盈縮採二年三年間停一年由盛京吉林將軍寧古塔副都統隨時酌奏凡採捕賞罰總管翼長驍騎校領催等督採東珠溢數至三十顆為一分多者按分加算賞給布帛有差溢數得千顆者總管翼長加一級驍騎校領催等按分加賞上三旗由內務府下五旗由各王貝勒貝子等給豫闕額至十顆為一分闕多者亦按分加算官降罰壯丁鞭責各有差貂分三等一等五百二等一千餘以三等收納足數及等者計額給賞銀布足數不及等者無賞免議不足數者罰責各有差凡採捕禁令貂珠人參禁偷採旗民有犯皆論如法私載私販與盜採同該管官及守口官辨失察徇縱者並論鼓鑄凡鼓鑄之法𨽻工部者曰寶源局置爐二十有一歲鑄錢七十一卯以六千二百四十九緡二百七十文為卯得錢四十四萬三千六百九十八緡百七十文遇閏加鑄四卯得錢二萬四千九百九十七緡有八十文月運節愼庫備用凡寶源局事掌於滿漢右侍郎其滿漢司官簡用更代及選委筆帖式期滿升用與户部寶泉局同凡寶源局出錢以給工直餘俟户部咨領到庫按數給發兵餉月以三萬緡為率凡雲南之銅歲輸京師寶源局者如户部三分之一正運四每運銅三十六萬斤加運二每運銅三十萬六千七百二十斤共銅二百五萬三千四百四十斤其色之高下運之遲速驗收考察均如户部凡寶源局需用黑白鉛錫歲輸自出産之省與户部所用統解分收貴州白鉛上下正副分為四運共一百三十萬一千九百十有四斤湖南黑鉛上下二運共二十三萬三千五百二十三斤廣東錫歲一運計七萬五百七十一斤承運官及定限與運銅同凡錢法考成禁令詳見户部軍器凡修造甲胄櫜鞬佩刀由八旗以應造之數具册咨部部按官校及馬步軍等則各旗定價移户部豫支官兵俸餉令軍需局依式造給需用鳥槍由旗咨部以庫貯給發吉林新來京官兵給以軍器由該管官册具人數咨部折價令其自備車駕巡幸官兵需用帳房官以藍色兵以白色皆布為之由部備造貯庫各旗屆期領用回日按數交納直省駐防及緑旗營官兵鎧仗或增置或補闕均由督撫按修理城垣衙署例定價報部刋定章程畫一報銷凡製造火器大者曰炮其制或鐵或銅或鐵心銅體或銅質木瓖或鐵質飾金重自五百六十斤至七千斤輕自三百九十斤至二十七斤長自一尺七寸七分至丈有二尺其擊逺或宜鐵彈或宜鉛子均助以火藥引以烘藥鐵彈自四十八兩至四百八十兩鉛子自二兩至二十八兩火藥自一兩三錢至八十兩烘藥自三四錢至二兩皆按炮尺髙下度數以定所及之逺近鑄炮之時或奉旨命官監督或由部委官無常制小者曰鳥槍曰火甎曰火毬曰火箭曰弩箭曰噴筒曰銃皆隨時成造部設濯靈厰委官制備火藥特命大臣督理厰設石碾二百盤每盤置藥三十斤為一臺每臺碾三日者以備軍需碾一日者備演槍炮豫貯軍需火藥以三十萬斤為率隨用隨備八旗試演槍炮盛京熱河右衛綏逺城及各蒙古等處兵丁操演所用火藥皆按年備造隨時憑文支給每火藥百斤隨烘藥一斤由部核給硝黃工價製成請命大臣驗收核實奏銷直省駐防標協各營及邉關要隘分貯神功神威子母等炮每歲演放或年久鏽蝕燬舊鑄新或綜核盈絀酌撥均貯由各將軍督撫提鎮題準報部存案至修造鳥槍等器及歲需火藥鉛彈皆動用公帑報部核銷凡王命旗牌自經略軍務至直省督撫提鎮皆賜給以重委任損失者論旗以藍繪為之方二尺六寸金書令字鈐以兵部印牌以木製形圓高一尺二分濶七寸五分厚一寸髤以硃漆中鐫令字飾以金旁鐫號數槍長七尺圍一寸亦鐫號以備考察步軍統領及直省駐防將軍皆給令箭箭上書金字如其官名綴以黃繒小旗歲久疏請由部更製頒給雜料凡鑄器頒行户部及直省有司度量權衡由部按成式鑄造壇廟陵寢內務府八旗各部院寺及外藩外國賔館並各工所需用銅鐵器具皆委官督匠造給需用物料或以庫貯給發或移户部支取或按市價採買皆月要其數奏銷凡陶器內務府及各衙署工所取用陶器計其高下尺寸口徑大小按市價採買給發凡黃布幔城網城及樁鐝駝屉備造貯庫遇車駕巡幸需用內務府八旗太僕寺各衙門定數咨取事畢如數交還凡造車八旗炮車及棉簾車遇有修造購木材於直省支物料於户部委官監製工竣題銷部設馬車九以供木倉門簾庫等處運送物件之用草豆役食均於户部支領凡葦席竿繩貯於惜薪厰收掌所內務府及各部院寺工所賔館遇有需用按數給發如用久殘朽給直採辦工完按時日之久暫定成數之多寡分别交回有逾限不交及損失者論欽定大清會典卷七十三
