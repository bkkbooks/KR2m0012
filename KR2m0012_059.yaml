body:
  text: 兵部尚書滿漢各一人左右侍郎滿漢各一人掌中外武職銓選簡核軍實以贊邦政所屬有武選車駕職方武庫四司武選清吏司郎中滿三人䝉古一人漢一人員外郎滿四人漢二人主事滿漢各一人掌武職除選封廕及征伐訓誥頒其政令車駕清吏司郎中滿三人漢一人員外郎滿二人䝉古一人主事滿漢各一人掌驛傳郵符中外馬政職方清吏司郎中滿四人漢二人員外郎滿三人䝉古一人漢一人主事滿洲䝉古各一人漢二人掌天下輿圖以周知險要叙功核過以待賞罰黜陟武庫清吏司郎中滿二人漢一人員外郎滿洲䝉古各一人主事滿漢各一人掌兵籍戎器鄉㑹武科及編發戍軍堂主事掌文案者滿二人掌章奏者滿二人漢軍一人司務滿漢各一人館所監督滿漢各一人以司官兼攝筆帖式滿六十二人䝉古八人漢軍八人分𨽻各司視事之繁簡以為額武選清吏司官制凡侍從武職領侍衛內大臣六人內大臣六人均正一品散秩大臣無定員從二品一等侍衛六十九人正三品二等侍衛百六十八人正四品三等侍衛三百三十三人正五品四等侍衛無定員從五品藍翎侍衛九十人正六品親軍校四十五人從六品漢侍衛無定員鑾儀衛掌衛事內大臣一人正一品鑾儀使滿二人漢一人正二品冠軍使滿七人漢軍三人正三品雲麾使滿二十人漢軍八人正四品治儀正滿二十人漢軍二十二人正五品整儀尉滿十有三人漢軍十有六人正六品凡八旗武職都統滿洲䝉古漢軍旗各一人正一品副都統旗各二人正二品驍騎參領滿洲旗各五人䝉古旗各二人漢軍旗各五人正三品副驍騎參領如參領之數佐領無定員均正四品驍騎校每佐領下一人從六品前鋒統領左右翼各一人正二品前鋒參領旗各二人正三品前鋒侍衛旗各二人正四品委署前鋒參領旗各一人繫五品虛銜前鋒校旗各十有二人從六品均滿洲䝉古兼用護軍營同護軍統領旗各一人正二品護軍參領旗各十有四人正三品副護軍參領如參領之數正四品委署護軍參領旗各七人繫五品虛銜護軍校每佐領下一人從六品提督九門巡捕三營步軍統領一人正二品左右翼翼尉二人正三品協尉旗各三人城門領二十五人均正四品副尉如協尉之數步軍尉旗各四十二人均正五品城門吏二十五人正七品火器營總統六人王公大臣兼任鳥槍護軍參領十有六人正三品驍騎參領二十四人司炮官九十六人護軍校一百十有六人驍騎校五十二人各從其品驍騎參領以下均以滿洲䝉古各官兼任圓明園總統無定員王公大臣兼任營總護軍參領旗各一人均正三品副護軍參領旗各二人正四品署副參領旗各四人正五品護軍校旗各十有六人從六品健鋭營總統無定員王公大臣兼任翼領左右翼各一人前鋒參領旗各一人均正三品副前鋒參領如參領之數正四品前鋒校旗各五人從六品白塔信炮總管一人正四品司信炮官旗各一人正五品南苑總尉一人正四品防禦八人正五品內府三旗護軍統領三人正三品護軍參領副護軍參領驍騎參領旗各五人均正五品佐領三十五人正四品前鋒校旗各二人護軍校旗各三十五人驍騎校每佐領下一人均從六品圓明園內府三旗護軍營總一人正四品護軍參領副參領旗各一人均正五品署參領如參領之數護軍校旗各三人均從六品王公府屬武職親王長史一人正三品散騎郎四人以世爵領之護衛一等六人從三品二等六人從四品三等八人從五品典儀從四品從五品從六品各二人親軍校無定員從六品世子長史一人散騎郎三人護衛一等六人二等五人三等六人典儀從四品一人從五品從六品各二人郡王長史一人散騎郎三人護衛一等六人二等四人三等五人典儀從五品從六品各二人長子長史一人護衛一等二人二等四人三等六人典儀從五品二人從六品一人貝勒司儀長一人正四品護衛二等六人三等四人典儀從五品一人從六品二人貝子三等護衛六人典儀從六品一人從七品二人鎮國公輔國公均三等護衛四人典儀從七品從八品各一人五旗王公府屬參領旗各五人從五品佐領旗各七人從四品驍騎校每佐領下一人從六品凡陵寢武職永陵總管一人翼領二人司工匠一人均正四品防禦十有六人正五品以下官品同福陵總管一人翼領二人防禦十有六人司工匠一人昭陵總管一人翼領二人防禦十有六人司工匠一人昭西陵防禦十有六人驍騎校二人從六品孝陵總管一人翼領二人防禦十有六人驍騎校二人孝東陵防禦十有六人驍騎校二人景陵總管一人翼領二人防禦十有六人驍騎校二人皇貴妃園寢防禦四人驍騎校一人妃園寢防禦八人驍騎校一人泰陵總管一人翼領二人防禦十有六人驍騎校二人妃園寢防禦八人驍騎校一人孝賢皇后陵寢總管一人翼領二人防禦十有六人驍騎校二人妃園寢防禦八人驍騎校一人端慧皇太子園寢防禦八人凡八旗駐防武職將軍盛京等處一人吉林等處一人黑龍江等處一人山東青州府一人山西綏逺城一人兼轄右衛江南江寧府一人兼轄京口福建福州府一人浙江杭州府一人兼轄乍浦湖廣荆州府一人陜西西安府一人寧夏府一人涼州府一人兼轄莊浪廣東廣州府一人從一品都統直𨽻天津府一人山西歸化城二人甘肅巴里坤一人從一品副都統直𨽻天津府一人山海關一人熱河一人盛京三人吉林五人黑龍江三人青州府一人歸化城二人綏逺城二人右衛二人江寧府二人京口二人福州府二人杭州府二人乍浦一人荆州府二人西安府四人寧夏府二人涼州府一人莊浪一人巴里坤二人四川成都府一人廣州府二人從二品城守尉鄭家莊一人保定府一人滄州一人盛京八人黑龍江一人