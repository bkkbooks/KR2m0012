body:
  text: 內務府都虞司凡內府三旗之制護軍營鑲黃旗正黃旗正白旗護軍統領各一人護軍參領各五人副護軍參領各五人護軍校委署參領各三人護軍校各三十三人護軍委署護軍校各五人護軍共千有六十五人前鋒營前鋒校委署參領各二人前鋒校各二人前鋒委署前鋒校各二人前鋒共百十有四人驍騎營掌關防參領三旗各五人以司官兼攝副參領各五人滿洲佐領各五人旗鼓佐領各六人正黃旗朝鮮佐領二人驍騎校正黃旗十有三人鑲黃正白二旗各十有一人共領催百四十人三旗三十內管領下共領催百二十人驍騎五千二百五十人均隸於內務府總管由司掌其升選僉補及咨行俸餉之事凡圓明園三旗之制四品營總一人護軍參領副護軍參領護軍校委署參領旗各一人護軍校各三人護軍共百二十人由圓明園總統王公大臣掌其升選僉補仍隸於司凡盛京三旗之制佐領各一人驍騎校各一人司庫二人主事一人筆帖式十有六人催長一人領催十有八人庫使十有六人頭目及執事人六十七人委署領催之驍騎六十人驍騎六百四十八人均隸盛京內務府總管仍由司掌其升選凡軍器內府三旗護軍凖兵部奏定日期由內務府總管察驗官員各隨本旗由兵部暨欽命之王公大臣察驗凡訓練內府護軍驍騎歲以春秋二季由該管官督率操演前鋒營隨時練習賞罰各有差凡宿衛大內宮禁以內府護軍統領內管領護軍參領護軍校次以護軍參領護軍校次以驍騎參領紫禁城內外重地以護軍參領散秩官護軍校驍騎校餘以各佐領內管領下之有頂帶領催率驍騎分班直宿其合護軍驍騎步軍及三旗服役人鑾儀衛校尉别立班次者曰防範兵專司戒火凡導引扈從車駕出入躬祀各壇廟以護軍校二人庫使七人護軍二十一人擎執引鐙以庫守二十人護軍二十人於午門外設鐙以庫守十人護軍十人於堂子街門內外設鐙均委司官護軍參領護軍校專司稽察皇太后皇后妃嬪出入以內務府總管或散秩大臣一人司官八人內府護軍統領一人護軍參領四人護軍校十人率護軍豹尾班執槍者十人佩儀刀者十人翊衛護軍百人導引扈從公主皇子福晉出入內府官護軍參領護軍校護軍導引隨從各有差凡畿輔行宮京東七處京西四處京北六處口外十有三處各設千總自一人至七人委署千總自一人至十有二人兵自四人至二百七十一人有差分隸湯泉盤山黃新莊熱河各總管管轄凡稽察壇廟祭祀齋戒以司官二人御殿賜茶以司官護軍校各四人護軍三十人各執事三十人監領俸餉每旗以參領佐領驍騎校內副管領各一人管安河橋豐益倉歲以司官內管領各一人稽察內管領下服役人每月以司官四人若典守工程帑項及慎刑司起解犯人應用八旗緑旗官兵均由司呈堂轉咨兵部撥給凡捕牲烏喇官辨總管一人翼領二人驍騎校七人筆帖式七人副驍騎校七人領催三人委署領催十有一人管理虞人採捕之事弓匠鐵匠各一人凡虞人地賦新舊牲丁共二千三百八十有二丁賦四千四百八兩七錢地千七百七十二頃二十四畝地賦八千八百六十一兩各有竒凡採捕捕牲烏喇珠軒各歲納東珠十六顆參丁每丁納人參七兩五錢蜜户每丁納蜂蜜七十斤盛京牛莊諸處網戶每丁納魚五百斤鷹手每丁納雉百狐戶每丁納狐皮四張蜜戶每丁納蜂蜜五十斤王多羅樹獵户每丁納野豕二鹿臘九十束水獺戶每丁納水獺皮四張鸛戶每丁納鸛翎十有五副漁戶每丁納細鱗魚五十尾密雲縣槍手每丁納鹿二鷹手每丁納雉一百有十薊州蜜戶每丁納蜜四十斤永平府蜜户每丁納蜜六十斤張家口鷹手每丁納雉百冷口鷹手每丁納雉百有六其畿輔各州縣投充牲丁及以地來投之鷹手鵪鶉戶狐戶雀戶雕戶野鴨戶所納鷹鷂諸物各如應用之數無定額東珠人參及水獺狐皮交廣儲司蜂蜜交內管領鸛翎交武偹院鷹鷂海青交鷹鷂房餘交尚膳房均按則折銀準抵正賦凡雇車恭遇謁陵巡幸計內府所屬應用車數行順天府和雇按日給費以行程駐蹕及輜重回空為差由府屬扈從官沿塗稽察凡官馬內府三旗護軍營共養官馬四百六十三匹前鋒營百三十二匹驍騎營九十九匹分給官兵各支馬乾銀牧養盛京聽差馬三羣羣各五十匹各設牧長一人牧丁六人歲無倒斃牧長以下均給賞倒斃六匹以上議罰各有差凡府屬公文均由司轉發兵部齎送愼刑司凡處分內府所屬文武官員遇有議處之案皆依吏部兵部例定議凡審讞內府所屬人犯罪在杖一百以下者依刑部律例議結杖一百以上及旗民交涉之案槩送刑部定擬如遇首告機密及事干職官者請旨推鞫凡奉特旨交司及由府奏準審理之犯罪應死者會同三法司核擬由府主稿具題得旨交刑部依原題治罪凡軍流徒罪折枷及本罪應枷之犯皆送刑部枷示滿日仍由司責放凡發遣人犯應發黑龍江寧古塔者咨兵部應發雲貴川廣煙瘴等處者咨刑部應發捕牲烏喇者移都虞司應發各莊屯安置者移會計司皆呈堂轉發其安置莊屯之犯身故後妻子願回京者聽凡律例於吏兵刑部咨取刑具於刑部取用尸傷會刑部司官檢驗凡監禁除奉旨收禁人犯外其情罪重大者職官請旨收禁無職人即行收禁按其情罪加以縲絏撥官兵防守女犯别置一室皆日給薪米夏給氷塊病給醫藥一如刑部之制凡清理贓贖內府人犯應追還官入官等贓及收贖納贖諸鍰追繳廣儲司庫凡內監私逃按其次數分别自首被獲治以枷責發遣之罪營造司凡巡視皇城歲簡本司員外郎與直年步軍協尉分班輪直掌修城垣肅清街道凡恭遇車駕出入皇太后皇后妃嬪出入均移咨步軍統領工部街道廳先期清蹕司屬內監謹備步障凡匠役均有定額內府所屬人在官執藝者於佐領內管領下選取召募民匠於工部咨取分隸於司六庫及諸作長以庫掌承以庫守又設司匠領催以督率之均月給銀米闕則取補惰則革除凡修造紫禁城內工程小修大修建造皆會工部大內繕完由內監匠人皇城墻垣有應修理者奏交工部均由欽天監諏吉興工宮殿苑囿春季疏濬溝渠夏月搭蓋涼棚秋冬禁城牆垣芟除草棘冬季掃除積雪均移咨工部及各該處隨時舉行府屬公廨館廄及官用器物有應修造者據各該處咨文修理成造按則報銷凡直殿及營繕內監太和殿中和殿保和殿文華殿及內造匠作各設首領內監副首領內監內監各有差首領內監闕於內監遴選充補內監闕移咨掌儀司撥補均由司領月費歲給裘帽悉如定制凡徴輸石灰煤炭設灰丁煤丁炭丁每丁地三十五畝草子匠每匠地四十二畝坐落大宛昌平等州縣各設千總二人把總四人董之又設外郎四人專司簿籍免其本身丁賦灰丁五百三十一人草子匠八人計地百八十九頃二十一畝應徴銀九百四十六兩有竒歲納青白灰每萬斤準銀十有一兩二錢五分包金土每千斤準銀三兩餘銀徴交廣儲司庫煤丁五百三十五人草子匠三人計地百八十八頃五十一畝應徴銀五百六十五兩有竒歲納煤每萬斤準銀十有六兩五錢餘銀徴交廣儲司徴草萬八千八百五十一束交會計司分發各廄炭丁五百二十八人計地百八十四頃八十畝應徴銀五百五十四兩均納白黑炭每白炭千斤準銀十兩五錢黑炭千斤準銀三兩三錢有竒徴草萬八千四百八十束交會計司同官三倉歲需筐筥之屬令各丁分納均抵正賦凡長夫除官員執事人護軍驍騎及工匠服役人等不編夫外內府三旗佐領下每十有六丁編長夫一名內管領下每八丁編一名共計長夫二百五十八名每夫月徴銀二錢一分有奇歲徴銀六百七十三兩有竒遇閏加增以備紫禁城內外及行宮運送物材雇覓人夫之用凡徴賦考成以十分為率編審軍丁以三年為期其法並與會計司同凡官給印票昌平州炭丁歲給票三百出大水峪河防口外伐木燒炭盛京匠人歲給票八十有四出口外伐取木槽箭杆均由司呈堂轉咨戶部給發並限次年繳銷陳票凡支取官物內府祭祀焚帛應用蘆葦楊木柴造辦應用物材各公廨應用器皿內外牛羊各廄圈應用牧具均由司呈堂於戶工二部及廣儲司官三倉支領凡奏銷各司領取工部物材器具均造册送司月要其數與工部同日具奏本司歲支工部柴薪煤炭及徴收各丁本色折色計一歲所用及見貯若干並於五月內核明題銷凡入官房舍由司召民賃住歲收其直以供六庫及諸匠作採買物材之用歲終題銷慶豐司凡牧所定額設內三圈於西華門外養扇牛十有二牛六牡牛三青牛一乳牛無定數視用乳之多寡為增減設外三圈於南苑養扇牛八乳牛同內圈又專供乳餅之乳牛百别為一圈設六圈於豐臺養羖羊千有八百一等者六百二等者千二百牝羊四十烏朱穆秦羊二十設牛羊牧羣於張家口外養牛三萬以百二十為一羣羊二十一萬以四百為一羣設羊羣百有十於逹里岡崖每羣以五百為率設牛羣五於養什木每羣養扇牛五牡牛五乳牛九十各牧所牛羊均由該管官烙印內圈牧數不足則取諸外圈外圈牧數不足則取諸張家口外牧羣有老羸不堪畜飬者並歸口外牧放凡典牧京城內外牛羊各圈共設廄長十有三人廄副二十五人廄丁百八十五人司芻服役三十九人壯丁十有四人司菽壯丁六人壯丁頭目一人張家口外牛羊牧羣總管一人副管二人效力筆帖式二人牛羣協領三人委署協領六人筆帖式六人牧長六十人牧副六十人牧丁三百六十人羊羣協領三人委署協領六人筆帖式六人牧長百五十人牧副百五十人牧丁九百人逹里岡崖羊羣協領一人委署協領二人筆帖式二人牧長五十人牧副五十人牧丁二百人隸張家口外總管管轄均由司咨行俸餉養什木牛羣牧長一人牧副一人牧丁十人隸盛京將軍管轄均由司咨行俸餉凡供用壇廟祭祀供黝牛大內四季敬神供全牛奉先殿及皇城紫禁城城隍諸祀供餼羊內廷尚茶尚膳供膳羊乳酪乳餅皇子公主婚嫁供禮羊每年馬羣出牧及由京補授遊牧察哈爾之官校犒賚牛羊均由內外各牧所如數供奉凡芻菽歲由各廄長約計應用之數册呈本司由司移會計司令各皇莊供給不敷於戶部支領或動帑採買芻計束菽計升按日給發牛以供用備用羊以一等二等為差遊牧各羣不給芻菽凡出牧歲以三月十五日後四月初一日前均於南苑寬間豐草之地牧放停給芻菽以九月二十五日後十月十五日前各歸原圈飼養內圈牛及烏朱穆秦羊不令出牧凡支領官物煮豆給煤炭夜給鐙油伏暑給冰塊造乳餅給布口外取送牛羊給路費出牧給帳房圈圯給修理之資及牧養所須諸器物均由各廄長報司移文各該處給領凡勸懲內外各圈視牛犢斃損之多寡以别功過遊牧諸羣每三牛三年孶生一犢三羊三年孶生二羔於定數內闕少者治罪定數外孶生者由該總管奏聞凡交納官物牛皮羊毛交武備院羊皮及牛羊變價銀交廣儲司庫均無定數惟遊牧總管歲交牛皮八百小牛皮二千犢皮二百張家口外牛羊羣達里岡崖羊羣每羣給牡馬一牝馬二閲三歲各納駒一遊牧處報墾地畝歲徴米二百五十石附納於宣化府萬全縣倉凡奏銷每年內外十三圈牛羊出入之數以次年之二月遊牧各羣孶生牛羊以該總管具奏得旨後一月內各由司具題核銷欽定大清會典卷九十一
