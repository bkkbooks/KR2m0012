  text: 欽定四庫全書欽定大清㑹典卷七十八
  hash: sha256:dcb4d4f302f0413da0fb3186071d7147d6b0106e86cd49b205db58b3e66ce374
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_078-1a, image: WYG0619/WYG0619-0676a.png}
body:
  text: 盛京戸部侍郎一人掌盛京賦稅之出納其屬經㑹司郎中一人員外郎一人主事一人糧儲司郎中員外郎各一人主事二人農田司員外郎二人主事一人銀庫郎中一人員外郎一人堂主事二人司庫二人掌官莊六品官二人筆帖式二十三人内倉監督正副各一人凡官莊糧莊百十有八所分四等一等莊十有二所每莊歲輸米三百八十二石二等莊二十所莊三百五十二石三等莊三十七所莊三百有七石四等莊四十九所莊百九十二石棉花莊五所每莊歲輸棉七百斤鹽莊三所每莊歲輸鹽萬二千斤由部歲於秋成時奏請欽簡在京部院堂官一人詣盛京㑹視收納以供陵寢祭祀及廩餼芻茭之用餘米輸内倉存貯凡旗地興京遼陽復蓋平寜海開原等州縣錦州府寜逺義二州廣寜縣及牛莊岫巖鳳凰熊岳等城旗丁限田五萬六千四百七十六頃七十四畝九分輸草豆者二萬一千九百八十頃七十七畝有竒每六畝歲輸豆一升七合七勺草一束輸米者三千八百六十頃二畝有竒每六畝歲輸米二升六合五勺五抄又錦寜逺廣寜義四州縣官莊餘田七千七百二十頃四畝有竒招旗丁耕種定上中下三則歲分半輸豆輸銀各三千八百六十頃二畝有竒上則每畝豆一斗三升四勺三抄有竒銀三分中則豆八升六合九勺五抄有竒銀二分下則豆四升三合四勺七抄有竒銀一分令各城守尉徵收解部充用凡儲積錦縣寜逺州儲米各十萬石遼陽州廣寜縣半之承德海城蓋平鐵嶺開原五縣復義二州各四萬石寜海縣半之歲以三分出借平糶七分存倉侍郎㑹奉天府尹稽其出入凡廩給官役在盛京及國戚子孫年十有八許其守䕶陵寢者計月授糈三旗牧副牧人計月授食各給銀有差京差官兵採取物産吉林黒龍江以北人户移家入居内地本部及各官署夫役㕑匠各給鹽米有差凡賞給服物三陵官署執役軍校㕑匠飼牲人歲給春秋衣三歲給冬裘獵取虎皮送部官兵賞布帛黒龍江以北入貢貂皮水獺皮官役及各寺廟喇嘛番僧賞帛絹紗布均移户部領取凡供給物用三陵殿宇及宫殿牕櫺表飾各官署寺廟歲需諸色紙及銀硃均由部關支凡支給芻茭三陵供祭牛羊京差來東採取物産官兵徃來乘馬吉林黒龍江以北官兵人戸移家内地所乘馬牛發徃吉林屯田耕牛歲獵虎鹿等獸運送京師車牛均部給草豆凡撫䘏流人流徙盛京寜古塔等處發驛站官屯當差及為奴各犯釡椀柴薪䕶送兵車及出威逺堡驗票均移所司發給在道口糧及發吉林屯田者既至徙所牛種耕具均由部關支凡奏銷每歲賦入米穀菽麥禾麻鹽棉及移取帛布絹紗硃楮柴薪器皿動用之數均四時册報歳終彚疏聽戸部覈銷盛京禮部侍郎一人掌盛京朝祭之禮儀其屬左右二司各郎中一人員外郎二人堂主事一人讀祝官八人贊禮郎十有六人筆帖式十人管千丁六品官一人七品官一人凡恭遇萬夀聖節元日長至朝賀之禮是日内務府官詣崇政殿啟扉拂拭御座本部官恭設香案於殿外正中黎明將軍五部侍郎率所屬官弁按旗分左右翼於丹墀内列班奉天府尹丞治中通判京縣等官從右翼東班西上西班東上咸朝服行三跪九叩禮凡陵寢之祭清明孟秋望冬至歳暮四祭福陵昭陵忌辰均由部列承祭宗室官職名咨太常寺轉奏候㫖分遣行禮十月朔日永陵總管行禮每月朔日永陵掌關防官行禮福陵昭陵均宗室官行禮萬夀聖節祭福陵昭陵同清明孟秋望冬至歳暮祭夀康太妃懿靜大貴妃園寢掌關防官行禮祭品移取庫帑以備犧牲及米鹽菌蕨皆供自盛京戸部飼乳牛以取乳及乳酥皆供自兩翼牧場設田園魚泊任壯丁以藝菽麥蒔𤓰果畜魚羅雉祭則供其物奉先制帛香蠟及時果飴品産於京師者每歳秋由太常寺齎送貯庫以時供祭奉先殿及畿輔陵寢供祭歳取盛京所産嘉魚嘉果遣官敬送所司凡祠廟之祭春秋二仲祭長白山神以吉林將軍或副都統承祭部遣讀祝贊禮郎前徃襄事萬夀聖節及仲秋祭盛京城隍之神以本部侍郎承祭犧牲果品移取盛京戸部庫帑供備香帛菱芡由太常寺齎送春秋祭賢王祠以奉天府尹承祭祭品府尹供備興京盛京勅建寺廟歳各致祭香蠟之需及僧道歳給米鹽衣服各有定數均移盛京户部工部内務府分給凡貢使饋遺朝鮮國入貢使臣徃來取道盛京官有饔餼役有廩給馬有芻秣黒龍江以北入貢貂皮獺皮官役賞以冠帶袍鞾及廩餼芻糧均由部行所司支給盛京兵部侍郎一人掌盛京武備及郵驛邊防之政其屬左右二司各郎中一人員外郎二人主事一人堂主事二人筆帖式十有二人凡簡稽軍實每三年侍郎率其屬驗盛京五部及將軍各屬官兵甲胄器械毋有不整以次驗北路東路南路西路事竣具疏以聞凡監射盛京各旗官春秋㑹射據將軍咨委屬官監視稽其不至者凡驛遞自盛京西至山海關設驛十有七東至興京驛四南至朝鮮驛八東北至吉林黒龍江驛三北至法庫邊門驛二馬共九百九十有疲瘠者十匹歳易三匹車和雇以應役每里銀一分徃來乗傳者車馬廩糧内據兵部外據吉林黒龍江將軍文移給之所需帑金於盛京户部移取歳終以廩糧册送户部以車數册送兵部均察覈奏銷凡驛官自盛京至山海關總設管理官一人至興京吉林黒龍江法庫門朝鮮總設管理官一人每驛設丞一人站丁無定額管理官於盛京五部司官選補三年更代部㑹盛京户部察覈賢能者保奏咨吏部升用不稱職者糾叅丞由管理官於站丁内遴選部㑹錦州副都統覆選咨吏部注册序補站丁每三年編册送户部凡倉庫官遼陽州蓋平開原二縣錦州府寜逺州義州廣寜縣及牛莊城各設倉官一人由部㑹盛京將軍四部侍郎於筆帖式内遴選有行檢操守者擬正陪送吏部引見補用五部設庫使二十六人由禮部考取官學生咨部注册以次序用凡考取筆帖式盛京陵寢及將軍衙門五部外城邊門設筆帖式三十六人由部集應考者分清字繙譯考取遇員闕不拘旗分依考取次序送吏部引見補用凡關門禁防山海關及各邊門官民徃來出入均由部予印牒守者騐實迺準經行盛京刑部侍郎一人掌盛京旗民之獄訟其屬肅紀前司郎中一人員外郎二人主事一人肅紀左司郎中一人員外郎二人主事一人肅紀右司郎中一人主事一人䝉古主事二人肅紀後司郎中一人員外郎一人主事一人堂主事二人贓罰庫司庫一人漢司獄一人筆帖式三十一人凡讞獄盛京所屬旗人訟者所在理事官讞之旗民交訟者所在理事官㑹州縣官讞之輕者判斷省釋重者送部侍郎㑹奉天府尹共讞之邊外䝉古訟者侍郎㑹該扎薩克之副台吉共讞之皆依律定擬按罪之輕重以别咨題由法司覆覈題結與直省同凡秋審每歳秋侍郎總本部及奉天府讞定重囚㑹盛京户禮兵工侍郎奉天府尹廵察御史虚公詳愼分别情實緩決可矜疑册送刑部凡審斷私採人參部㑹盛京將軍及管轄威逺堡六邊侍郎奉天府尹按參數輕重律擬定罪盛京工部侍郎一人掌盛京營作之事其屬左右二司各郎中一人員外郎二人主事一人堂主事二人四品官五品官各一人六品官二人司庫二人司匠一人筆帖式十有七人凡土木工作陵寢殿宇遇有修葺據掌關防官移文城垣據盛京將軍宫殿壇廟據内務府公廨倉庫據所司各移文度物用計工直移工部㑹覈竢覆到移取盛京户部庫帑庀材鳩工工竣疏報册送工部覈銷盛京城在瀋水之陽周九里三百三十二歩高三丈五尺厚一丈八尺雉堞六百五十有六堞高七尺五寸譙樓八角樓四東南西北各門二東曰撫近曰内治南曰德盛曰天祐西曰懐逺曰外攘北曰地載曰福勝濠廣十有四丈五尺周十里二百有四歩關城周三十二里四十八歩高七尺五寸四靣門各二南曰大南關小南關北曰大北關小北關東西如之東南隅水關二瀋水經焉宫殿之制正殿曰崇政殿左右翊門二殿廷南正門曰大清旁曰東西角門門外左右奏樂亭二廷左飛龍閣右翔鳳閣殿北鳳凰樓前東師善齋南日華樓西協中齋南霞綺樓鳳凰樓北清寜宫東衍慶宫關睢宫西永福宫麟趾宫崇政殿東頤和殿北介祉宫又北敬典閣崇政殿西廸光殿北保極宫又北繼思齋又北崇謨閣繚以垣南北八十五丈三尺東西三十二丈二尺垣南左闕曰文德右闕曰武功崇政殿東垣之東殿曰篤恭廷左右各列亭五為諸王大臣議政之處别繚以垣垣前列奏樂亭二壇廟之制圜丘在德盛門南周百有十丈南三門東西北各一門太廟在撫近門東正殿五間前殿三間南大門三間東西門各一間正殿後房六間陵寢之制永陵在興京城西北十里啟運山寳城周十有五丈四尺前饗殿三間曰啟運東西廡各三間外為紅門繚垣四十二丈七尺碑亭四福陵在盛京城東北二十里天柱山寳城周五十九丈五尺前為方城明樓樓前饗殿三間曰隆恩東西廡各五間門名與殿同門外碑亭一又外為紅門繚垣六百十有一丈五尺西為夀康太妃園寢昭陵在盛京城西北十里隆業山寳城周六十一丈三尺繚垣五百七十丈二寸餘與福陵制同西為懿靜大貴妃園寢遇應修葺據掌關防官來文興工公廨之制盛京將軍署在德盛門内之東其北奉天府尹署南為户部又南禮部又南工部又南奉天府儒學刑部在天祐門内之西其南兵部其東府通判署其西試院次西府丞署南承德縣署迤西典史署撫近門外南治中署北經厯署外攘門内北稅課司敎場在外城外西北隅凡匠役設匠以供營造設千丁以供埏埴分領以四品五品六品司匠等官應支米鹽移盛京戸部支取分給凡支給柴薪守䕶三陵官役及各官署執事人廚役匠役守顯佑宫道士歳給盛京禮部修治果品及京師遣來匠役月給職官兵丁内府差役外國貢使及三陵犧牲驛遞馬匹日給各有定數至修造屋宇苫蓋之用罪犯炊㸑並按定數移取盛京户部庫帑買給歳終移工部覈銷欽定大清㑹典卷七十八
