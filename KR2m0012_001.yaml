  text: 欽定四庫全書欽定大清㑹典卷一
  hash: sha256:bf428d4a0f5cf0fcf1e91031319b3425ec66e018e2bc2dbd14f81f1b1865943e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_001-1a, image: WYG0619/WYG0619-0028a.png}
body:
  text: 宗人府宗令一人左右宗正各一人左右宗人各一人初制以親王郡王為宗今貝勒貝子為宗正鎭國輔國公為宗人厥後不拘一格惟擇賢能者任之掌皇族之屬籍以時修輯玉牒辨昭穆序爵禄均其惠養而布之教令凡親疏之屬胥受治焉府丞一人用漢人掌校理漢文册籍左右二司每司理事官二人副理官二人主事二人宗室旗員分半用分掌左右翼宗室覺羅之籍稽承襲次序秩俸等差及養給貧㓜優䘏婚喪之事書其子女適庶生卒婚嫁官爵名諡以備玉牒紀載經歴二人宗室旗員分半用掌出納文書堂主事二人宗室旗員分半用掌奏疏槀案漢主事二人掌漢文册籍筆帖式二十四人宗室旗員分半用掌繙譯清漢文書凡天潢宗派以顯祖宣皇帝本支為宗室伯叔兄弟之支為覺羅宗室束金黄帶覺羅束紅帶生子女周嵗書其年月日時母某氏詳其適庶次第具册送府宗室載入黄册覺羅載入紅册宗室以罪黜為庶人者束紅帶覺羅以罪黜為庶人者束紫帶所生子女備録送府如前法各附黄紅册後宗室子女繋皇帝伯叔兄弟所生年至十有五奏請賜婚未及嵗已議婚者奏聞其餘宗室所生聽本家自擇成禮毋致逾時若以女與外藩䝉古結婣者均奏請得㫖迺行凡近支宗室命名向與御名上一字同者惟偏旁稍異之如𢎞字去一㸃之類免其迴避近支宗室子孫除欽賜名外上一字仍許與皇子皇孫同如永字綿字之類下一字不得與皇子皇孫名同偏旁如玉字部及心字部之類其用䝉古名及與漢人姓名相似者禁之凡纂修玉牒每十年由府題請以宗令宗正充總裁官按每年黄册紅册所紀彚入於牒以帝系為統以長㓜為序存者朱書殁者墨書誤同名改卑者及㓜者每修成一次於皇史宬本府盛京各尊藏一部凡封爵十有四等和碩親王世子多羅郡王長子多羅貝勒固山貝子鎭國公輔國公不入八分鎮國公不入八分輔國公鎭國將軍輔國將軍奉國將軍奉恩將軍皇子生十五嵗由府奏請封爵如奉㫖暫停每至五年再奏請親王適子曰世子仍襲親王餘子封不入八分公天命間立八和碩貝勒共議國政各置官屬凡朝㑹燕饗皆異其禮有為八分天聰以後宗室内錫賚必均及是特恩封公及親王餘子授封公者皆不入八分其有功加至貝子凖入八分如有過降至公仍不入八分世子適子授爵視親王餘子餘子封一等鎭國將軍郡王適子曰長子仍襲郡王餘子封一等鎭國將軍長子適子授爵視郡王餘子餘子封二等鎭國將軍貝勒適子降襲貝子餘子封二等鎭國將軍貝子適子降襲鎭國公餘子封三等鎭國將軍鎭國公適子降襲輔國公餘子封一等輔國將軍輔國公適子仍襲輔國公餘子封二等輔國將軍不入八分鎭國公適子降襲不入八分輔國公不入八分輔國公適子降襲三等鎭國將軍一等鎭國將軍適子降襲一等輔國將軍二等鎭國將軍適子降襲二等輔國將軍三等鎭國將軍適子降襲三等輔國將軍餘子均封三等輔國將軍一等輔國將軍適子降襲一等奉國將軍二等輔國將軍適子降襲二等奉國將軍三等輔國將軍適子降襲三等奉國將軍餘子均封三等奉國將軍一二三等奉國將軍適子均降襲奉恩將軍餘子受封亦如之奉恩將軍適子仍襲罔替餘為閒散宗室親王側福晉子封二等鎭國將軍世子側福晉子封三等鎭國將軍郡王側福晉子封三等鎭國將軍長子貝勒側室子均封一等輔國將軍貝子側室子封二等輔國將軍鎭國公側室子封三等輔國將軍輔國公側室子封一等奉國將軍親王妾媵子封三等輔國將軍世子郡王妾媵子均封三等奉國將軍長子貝勒貝子妾媵子均封奉恩將軍皇女由中宫出者封固倫公主由妃嬪出者封和碩公主如中宫撫宗室女下嫁亦封和碩公主親王女封郡主郡王女封縣主貝勒女封郡君貝子女封縣君入八分鎭國輔國公女封鄉君親王側福晉女封郡君郡王側福晉女封縣君貝勒側室女封鄉君貝子側室女授以五品入八分公側室女授以六品如親王郡王妾媵女有許字外藩䝉古者亦封鄉君餘並稱宗女不封授親王世子郡王妻封親王福晉世子福晉郡王福晉長子貝勒以下至輔國將軍妻封夫人奉國將軍妻封淑人奉恩將軍妻封恭人親王側福晉四人世子郡王三人長子貝勒側室二人貝子公一人冠服各降適一等凡襲封必以適子孫無適子孫許以庶子孫襲絶嗣則以同父兄弟及兄弟之子襲若大宗子孫因罪降革其祖父原爵繫軍功得封者許以旁支子孫承襲凡襲封之子弟均不限年適子年及二十未襲封者先與餘子同授封爵親王郡王適子奉特㫖始封世子長子其未封世子長子者亦與餘子同授封爵至襲封時仍予以應封之爵爵同者改授封為襲封其先授之爵不準傳襲凡授封世子長子之適子恩封不入八分公及一等鎭國將軍如未恩封與餘子同考試授封親王以下至將軍之子除父故襲封外其餘應授封者竢年及二十由府彚題試以繙譯馬歩射皆優者授應封之爵兩優一平者降一等一優兩平兩優一劣者降二等三平及一優一平一劣者降三等一優兩劣兩平一劣一平兩劣及全劣者皆停封竢學習有成再請考試欽定考試授封表優三項皆優者封以應得品級優優優優兩優一平者降一等平優優平優一優兩平兩優一劣者皆降二等平劣平優平平三項皆平及一優一平一劣者皆降三等平劣優平平劣劣劣劣劣奉恩將軍考試如停封再考者如前外其應降一等者以爵無可降仍與應得之封停俸二年降二等者停俸三年降三等者停俸四年其二等三等奉國將軍如降至奉恩將軍仍有應降之等亦每等停俸一年有半凡宗室追封以孫襲祖爵者得追封其父母以曾孫襲曾祖爵者得追封其祖父母父母大宗子孫因罪降革以旁支承襲者父在不得請封若追封得及三代其入繼大宗為後因而襲爵者不得追封其本生妻先故者依夫爵追封以庶子襲爵者適母故得封其生母降適一等凡封諸王因素行以定封號嗣王襲封即注名原册不換寶印凡給諡諸王請㫖酌給貝勒以下至輔國將軍請㫖酌定凡朔望太廟上香以王貝勒貝子公輪班行禮凡饗太廟奠帛獻爵前殿以宗室官六十六人後殿以覺羅官三十二人將事以領府事王公一人監視之凡遇典禮齊集之期自王以下至將軍均由府稽察以職名具奏凡遣祭陵寢遇忌辰及清明孟秋望冬至三節以王貝勒往嵗除以貝子公往均由府行太常寺奏遣盛京祖陵以鎭國輔國將軍六人往居奉天各給田廬以承祀事皇太子園寢遣貝子公往祭凡立教左右翼各設宗學一擇宗室子弟聰秀者入學每學以王公一人總其事宗室總管二人副管八人率教習繙譯共十有四人教習騎射共六人稽察課程京堂官四人嵗一校試别優劣定去留以勸學興行左右翼各設覺羅學四擇覺羅子弟聰秀者入學每學以王公一人總其事覺羅副管二人教習清書一人教習騎射一人漢書生徒每十人漢教習一人總稽課程京堂官四人三嵗一校試分别優劣酌定去留學成與旗人同應嵗科及鄉㑹試並考用中書筆帖式庫使盛京設宗學一覺羅學一凡居盛京宗室覺羅子弟擇聰秀者入學以將軍及奉天府尹總其事設總管副管清漢書騎射教習與京師同凡習射每月左右翼各三次自王公至閑散宗室皆㑹射於鑲黄旗教場由府稽其勤惰優劣注於册劣者給限學習仍怠惰者叅處凡驗閲軍器左右翼王以下至奉恩將軍甲胄弓矢刀槍旗纛閲五嵗以二日分閲府屬宗室官及王公等屬官軍器亦隨驗閲以覈軍實凡録用宗室不令與旗民同試有司不為部院屬官分府屬各官以半歸宗室升除鎭國輔國奉國將軍以理事官用奉恩將軍宗室佐領以副理官用五六品廕生以主事用考取一二等之宗室以筆帖式用設宗室監察御史二人專稽府事由府屬宗室官考選其職事仍𨽻都察院宗室理事等官開列出差及較俸升四五品京堂官與各部滿司官同宗室御史轉補六科給事中與旗員御史同轉科後仍以給事中兼稽府事宗室侍衞九十人一等九人二等十有八人三等六十三人府㑹領侍衞内大臣簡選引見補授其侍衞什長即於宗室内補授其職事仍𨽻領侍衞内大臣宗室侍衞及將軍雲騎尉廕生擢用叅領副叅領與旗員同凡選用覺羅由嵗科考應鄉㑹試考選翰林院庶吉士補授部院屬官及廕生貢監生員官學生録用均與旗人同凡旌表孝友貞節宗室覺羅均由府覈奏禮部覆題各給銀幣有差宗室仍賜勅奬諭詳見禮部凡優䘏無品秩宗室及無父㓜子月給養贍銀米有差置庫於府以待宗室覺羅婚喪之費於王公及大臣内特簡二人總理以賢能司官專司之每嵗季冬發庫銀萬兩為宗室無産者置田廬失産者復舊業餘充嵗暮賞給宗室之用凡禁令宗室不得濫交匪人其漢人落第留京輕薄好事之徒不得延訓子弟及與為容納諸王以下有年少溺於逸樂躭絲竹狎優伶於城内外闗廂放鷹鷂擾居民者由府察實劾奏長史等官不竭誠規諫者并劾閑散宗室有犯亦如之凡議罪王以下及宗室有犯或奪所屬人丁或罰金非叛逆重罪不擬死刑不鞭責不監禁謂刑部監不革去宗室宗室覺羅犯笞杖等罪有品秩者照職官降級罰俸例議處無品秩者笞十至二十皆罰養贍銀一月笞三十罰二月笞四十罰三月笞五十罰四月杖六十罰養贍銀六月杖七十罰七月杖八十罰八月至杖九十罰十月杖一百罰一年止犯軍流徒罪者照旗人折荷校日期以二日抵一日犯徒罪者於空室拘禁犯軍流於空室鎖禁皆於滿日省釋犯重罪者請㫖定議欽定大清㑹典卷一
