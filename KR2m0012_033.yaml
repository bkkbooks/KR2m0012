body:
  text: 禮部儀制清吏司儀衛凡儀衛親王紅羅繡五龍曲柄繖一紅羅繡四季花繖二紅羅銷金瑞草繖二紅羅繡四季花扇二青羅繡孔雀扇二立瓜卧瓜骨朵吾仗各四大纛二條纛二旗槍十各依本旗色豹尾槍四儀刀四馬六匹世子紅羅繡四龍曲柄繖一紅羅銷金瑞草繖二紅羅繖一紅羅繡四季花扇二青羅繡孔雀扇二立瓜吾仗各四卧瓜骨朵各二大纛一條纛一旗槍八豹尾槍二儀刀二馬六匹郡王紅羅繡四龍曲柄繖一紅羅銷金瑞草繖二紅羅繡四季花扇二青羅繡孔雀扇二立瓜吾仗各四卧瓜骨朵各二條纛二旗槍八豹尾槍二儀刀二馬六匹以上執事人轎夫用繡團獅緑假衣親王以下入八分公以上轎夫執事人均黑氊帽綴絨纓上安銅管插紅翎繫紅布帶長子貝勒紅羅銷金瑞草繖二紅羅繡四季花扇二立瓜卧瓜骨朵吾仗各二條纛一旗槍六馬四匹貝子紅羅銷金瑞草繖一紅羅繡四季花扇二立瓜骨朵吾仗各二條纛一旗槍六鎮國公紅羅銷金瑞草繖一青羅繡孔雀扇一骨朵吾仗各二旗槍六輔國公與鎮國公同以上執事人轎夫用素緑假衣鎮國將軍杏黃繖一旗槍六輔國將軍同奉國將軍旗槍四鎮國將軍以下至宗室轎夫執事人均黑氊帽上安裹錫木頂插緑翎用青布衣繫緑鑲紅布帶遇元日萬夀聖節冬至朝賀之期各儀衛全設常日在京師親王用曲柄繖一紅羅繖扇各二立瓜卧瓜骨朵吾仗全馬四匹引導十人世子減曲柄繖及引導二人餘視親王郡王馬二匹餘視世子貝勒繖一立瓜卧瓜骨朵吾仗全引導六人貝子用立瓜骨朵吾仗引導四人鎮國公用骨朵吾仗引導二人輔國公同鎮國將軍用前引二人後從六人輔國將軍前引一人後從四人奉國將軍後從同若因事出京王以下均全設如儀固倫公主紅羅曲柄繡寶相花繖一紅羅繡寶相花繖二青羅繡寶相花扇二紅羅繡孔雀扇二黑纛二立瓜卧瓜骨朵吾仗各二引導十人和碩公主減寶相花扇及引導二人餘視固倫公主郡主減曲柄繖卧瓜引導二人餘視和碩公主以上執事人衣帽與親王同縣主寶相花繖一寶相花扇二立瓜吾仗各二引導二人以上執事人衣帽與貝勒同親王福晋視固倫公主世子福晋視和碩公主郡王福晋視郡主貝勒夫人視縣主遇朝賀日固倫公主許隨入侍女五人親王福晋和碩公主世子福晋四人郡主郡王福晋縣主三人郡君貝勒夫人二人縣君貝子夫人鄉君公夫人各一人固倫公主額駙紅繖一豹尾槍二旗十紅仗二執事人青帽銀頂插紅翎青衣紅帶和碩公主額駙杏黃繖二旗十紅棍四大小扇二各飾方金四執事人紅帽銅頂插緑翎青衣紅帶郡主額駙杏黃繖一旗十紅棍四扇二各飾方金三縣主額駙杏黃繖一旗六郡君額駙旗如之縣君額駙旗四鄉君額駙旗二公視和碩公主額駙侯金黃棍四餘視郡主額駙其有加級者棍得用紅伯扇二各飾圓金一餘視侯子繖一旗八棍二扇二各飾圓金四男旗六扇二各飾圓金三餘視子京官一品視子二品視男三品扇二各飾圓金二餘視二品四品旗四扇二各灑以金餘官均用素扇一宗室覺羅之有職者各從其品其扇柄及棍均髤以朱各儀衛出京外得全設在京師不得用旗繖黃棍公以下三品官以上得用前引二人後從一品官八人二品六人三品四人四品二人五品以下一人文官三品以上得用甘蔗棍二武官三品以上得用棕竹棍二自一品至九品均得用扇扇各用清漢字書銜若進皇城內大扇棍及前引人均不得入直省官文官總督旗八飛虎旗黃繖扇兵拳鴈翎刀獸劍黃棍桐棍槊各二槍四回避牌二肅靜牌二巡撫槍二減飛虎旗兵拳鴈翎刀餘視總督布政使按察使旗六減獸劍桐棍槍餘視巡撫道知府旗四黃繖扇各一桐棍槊回避肅靜牌各二府倅知州知縣藍繖一減回避牌餘視知府縣佐藍繖一桐棍二學官藍繖一雜職竹板二總督河道漕運視總督學政鹽政織造三品以上視巡撫四品以下視兩司武官提督刑杖二減桐棍槊棍餘視總督總兵官槍二大刀二減兵拳鴈翎刀刑杖餘視提督副將旗六黃繖一扇二黃棍回避肅靜牌各二參將游擊都司旗四扇一桐棍二餘視副將守備減牌餘視都司駐防將軍視內都統副都統以下官均與京官同凡輿馬王公乘明轎親王世子郡王貝勒輿夫八人貝子公四人暖轎親王金黃蓋金黃幨紅幃世子紅蓋金黃幨紅幃郡王紅蓋紅幨紅幃貝勒紅蓋青幨紅幃貝子紅蓋紅幨青幃鎮國公皂蓋紅幨皂幃輔國公青蓋紅幨青幃均用銀頂馬韁親王世子郡王用金黃貝勒貝子用紫公用青公主親王世子郡王福晋用金黃長子貝勒貝子夫人用紫公主以下縣主以上乘轎及車郡君以下乘車幃蓋幨均用繒固倫公主金黃蓋四角緣紅和碩公主紅蓋四角緣金黃均紅幃金黃幨郡主紅幨蓋角緣皂縣主青幨蓋角緣青均紅蓋紅幃郡君青幃紅蓋四角緣青縣君皂幃皂蓋四角緣紅均紅幨鎮國公女鄉君皂蓋四角緣青皂幃紅幨輔國公女青幃蓋去緣飾餘視鎮國公女王福晉以下貝勒夫人以上乘轎及車貝子夫人以下乘車郡王長子福晉以上得用朱轅奉國將軍淑人以上均得用朱輪幃蓋幨均用繒鎮國將軍夫人以下繒用素親王福晉金黃幨世子福晉紅幨郡王福晉皂幨均紅蓋紅幃蓋角緣皂貝勒夫人蓋角緣皂皂幃貝子夫人蓋角緣青青幃均紅蓋紅幨鎮國公夫人蓋角緣紅輔國公夫人蓋角緣青均皂蓋皂幃紅幨王以下公以上各側室均降適一等鎮國將軍一品夫人皂蓋輔國將軍夫人青蓋均青幃紅幨奉國將軍淑人幃蓋幨均用皂奉恩將軍恭人如之閒散宗室青幃餘亦如之京官滿洲文武均乘馬一品文官年老疾病不能乘馬者許乘轎漢人文官乘轎三品以上頂用銀幃蓋用皂在京舁夫四出京舁夫八四品以下頂用錫舁夫二出京四直省文官乘轎督撫舁夫八司道以下教職以上舁夫四雜職乘馬餘同京官總督河道漕運視總督學政鹽政織造暨各欽差官三品以上視巡撫四品以下視兩司武官將軍副都統提督總兵官視督撫副將視兩司協領參游以下均乘馬文三品武二品官以上用引馬文武四品官以上馬繫繁纓各品官命婦乘車輪轅均用黑色民公夫人蓋角緣皂侯伯夫人蓋角緣青均緑蓋皂幃緑幨子一品夫人皂蓋四角緣緑餘視伯男夫人去緣飾餘視子品官命婦一品視子二品視男三品皂幨餘視二品四品青幃餘視三品五品以下均青蓋餘視四品三品以上命婦頂用銀餘均用錫幃蓋幨二品以上命婦用素繒餘均用布欽定大清會典卷三十三
