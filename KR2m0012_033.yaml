body:
  text: 禮部儀制清吏司儀衛凡儀衛親王紅羅繡五龍曲柄繖一紅羅繡四季花繖二紅羅銷金瑞草繖二紅羅繡四季花扇二青羅繡孔雀扇二立𤓰卧𤓰骨朶吾仗各四大纛二條纛二旗槍十各依本旗色豹尾槍四儀刀四馬六匹世子紅羅繡四龍曲柄繖一紅羅銷金瑞草繖二紅羅繖一紅羅繡四季花扇二青羅繡孔雀扇二立𤓰吾仗各四卧𤓰骨朶各二大纛一條纛一旗槍八豹尾槍二儀刀二馬六匹郡王紅羅繡四龍曲柄繖一紅羅銷金瑞草繖二紅羅繡四季花扇二青羅繡孔雀扇二立𤓰吾仗各四卧𤓰骨朶各二條纛二旗槍八豹尾槍二儀刀二馬六匹以上執事人轎夫用繡團獅緑叚衣親王以下入八分公以上轎夫執事人均黑氊㡌綴絨纓上安銅管挿紅翎繫紅布帶長子貝勒紅羅銷金瑞草繖二紅羅繡四季花扇二立𤓰卧𤓰骨朶吾仗各二條纛一旗槍六馬四匹貝子紅羅銷金瑞草繖一紅羅繡四季花扇二立𤓰骨朶吾仗各二條纛一旗槍六鎮國公紅羅銷金瑞草繖一青羅繡孔雀扇一骨朶吾仗各二旗槍六輔國公與鎮國公同以上執事人轎夫用素緑叚衣鎮國將軍杏黄繖一旗槍六輔國將軍同奉國將軍旗槍四鎮國將軍以下至宗室轎夫執事人均黑氊㡌上安裹錫木頂挿緑翎用青布衣繫緑鑲紅布帶遇元日萬夀聖節冬至朝賀之期各儀衛全設常日在京師親王用曲柄繖一紅羅繖扇各二立𤓰卧𤓰骨朶吾仗全馬四匹引導十人世子減曲柄繖及引導二人餘視親王郡王馬二匹餘視世子貝勒繖一立𤓰卧𤓰骨朶吾仗全引導六人貝子用立𤓰骨朶吾仗引導四人鎮國公用骨朶吾仗引導二人輔國公同鎮國將軍用前引二人後從六人輔國將軍前引一人後從四人奉國將軍後從同若因事出京王以下均全設如儀固倫公主紅羅曲柄繡寳相花繖一紅羅繡寳相花繖二青羅繡寳相花扇二紅羅繡孔雀扇二黑纛二立𤓰卧𤓰骨朶吾仗各二引導十人和碩公主減寳相花扇及引導二人餘視固倫公主郡主減曲柄繖卧𤓰引導二人餘視和碩公主以上執事人衣㡌與親王同縣主寳相花繖一寳相花扇二立𤓰吾仗各二引導二人以上執事人衣㡌與貝勒同親王福晋視固倫公主世子福晋視和碩公主郡王福晋視郡主貝勒夫人視縣主遇朝賀日固倫公主許隨入侍女五人親王福晋和碩公主世子福晋四人郡主郡王福晋縣主三人郡君貝勒夫人二人縣君貝子夫人鄉君公夫人各一人固倫公主額駙紅繖一豹尾槍二旗十紅仗二執事人青㡌銀頂挿紅翎青衣紅帶和碩公主額駙杏黄繖二旗十紅棍四大小扇二各飾方金四執事人紅㡌銅頂挿緑翎青衣紅帶郡主額駙杏黄繖一旗十紅棍四扇二各飾方金三縣主額駙杏黄繖一旗六郡君額駙旗如之縣君額駙旗四鄉君額駙旗二公視和碩公主額駙侯金黄棍四餘視郡主額駙其有加級者棍得用紅伯扇二各飾圓金一餘視侯子繖一旗八棍二扇二各飾圓金四男旗六扇二各飾圓金三餘視子京官一品視子二品視男三品扇二各飾圓金二餘視二品四品旗四扇二各灑以金餘官均用素扇一宗室覺羅之有職者各從其品其扇柄及棍均髤以朱各儀衛出京外得全設在京師不得用旗繖黄棍公以下三品官以上得用前引二人後從一品官八人二品六人三品四人四品二人五品以下一人文官三品以上得用甘蔗棍二武官三品以上得用椶竹棍二自一品至九品均得用扇扇各用清漢字書銜若進皇城内大扇棍及前引人均不得入直省官文官總督旗八飛虎旗黄繖扇兵拳鴈翎刀獸劍黄棍桐棍槊各二槍四迴避牌二肅静牌二巡撫槍二減飛虎旗兵拳鴈翎刀餘視總督布政使按察使旗六減獸劍桐棍槍餘視巡撫道知府旗四黄繖扇各一桐棍槊迴避肅静牌各二府倅知州知縣藍繖一減迴避牌餘視知府縣佐藍繖一桐棍二學官藍繖一雜職竹板二總督河道漕運視總督學政鹽政織造三品以上視巡撫四品以下視兩司武官提督刑杖二減桐棍槊棍餘視總督總兵官槍二大刀二減兵拳鴈翎刀刑杖餘視提督副將旗六黄繖一扇二黄棍迴避肅静牌各二叅將游擊都司旗四扇一桐棍二餘視副將守備減牌餘視都司駐防將軍視内都統副都統以下官均與京官同凡輿馬王公乘明轎親王世子郡王貝勒輿夫八人貝子公四人暖轎親王金黄盖金黄幨紅幃世子紅盖金黄幨紅幃郡王紅盖紅幨紅幃貝勒紅盖青幨紅幃貝子紅盖紅幨青幃鎮國公皂盖紅幨皂幃輔國公青盖紅幨青幃均用銀頂馬韁親王世子郡王用金黄貝勒貝子用紫公用青公主親王世子郡王福晋用金黄長子貝勒貝子夫人用紫公主以下縣主以上乘轎及車郡君以下乘車幃盖幨均用繒固倫公主金黄盖四角縁紅和碩公主紅盖四角縁金黄均紅幃金黄幨郡主紅幨盖角縁皂縣主青幨盖角縁青均紅盖紅幃郡君青幃紅盖四角縁青縣君皂幃皂盖四角縁紅均紅幨鎮國公女鄉君皂盖四角縁青皂幃紅幨輔國公女青幃盖去縁飾餘視鎮國公女王福晉以下貝勒夫人以上乘轎及車貝子夫人以下乘車郡王長子福晉以上得用朱轅奉國將軍淑人以上均得用朱輪幃盖幨均用繒鎮國將軍夫人以下繒用素親王福晉金黄幨世子福晉紅幨郡王福晉皂幨均紅盖紅幃盖角縁皂貝勒夫人盖角縁皂皂幃貝子夫人盖角縁青青幃均紅盖紅幨鎮國公夫人盖角縁紅輔國公夫人盖角縁青均皂盖皂幃紅幨王以下公以上各側室均降適一等鎮國將軍一品夫人皂盖輔國將軍夫人青盖均青幃紅幨奉國將軍淑人幃盖幨均用皂奉恩將軍恭人如之閒散宗室青幃餘亦如之京官滿洲文武均乘馬一品文官年老疾病不能乘馬者許乘轎漢人文官乘轎三品以上頂用銀幃盖用皂在京舁夫四出京舁夫八四品以下頂用錫舁夫二出京四直省文官乘轎督撫舁夫八司道以下教職以上舁夫四雜職乘馬餘同京官總督河道漕運視總督學政鹽政織造暨各欽差官三品以上視巡撫四品以下視兩司武官將軍副都統提督總兵官視督撫副將視兩司協領叅游以下均乘馬文三品武二品官以上用引馬文武四品官以上馬繫繁纓各品官命婦乘車輪轅均用黑色民公夫人盖角縁皂侯伯夫人盖角縁青均緑盖皂幃緑幨子一品夫人皂盖四角縁緑餘視伯男夫人去縁飾餘視子品官命婦一品視子二品視男三品皂幨餘視二品四品青幃餘視三品五品以下均青盖餘視四品三品以上命婦頂用銀餘均用錫幃盖幨二品以上命婦用素繒餘均用布欽定大清會典卷三十三
