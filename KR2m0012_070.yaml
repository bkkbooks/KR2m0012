  text: 欽定四庫全書欽定大清會典卷七十
  hash: sha256:52fcae4aa7b2b06ab8d329010f63e4e7f1568afcf67fc69c5895787fc775f86c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_070-1a, image: WYG0619/WYG0619-0601c.png}
body:
  text: 工部尚書滿漢各一人左右侍郎滿漢各二人掌天下工虞器用辨物庀材以飭邦事所屬有營繕虞衡都水屯田四司營繕清吏司郎中滿四人䝉古一人漢一人員外郎滿五人漢一人主事滿二人䝉古一人漢二人掌繕治壇廟宫府城垣倉庫廨宇營房料估所滿漢各三人司官簡委掌審曲面勢以鳩百工琉璃窰監督滿漢各一人司官簡委歲一更代掌大工陶冶木倉監督滿漢各一人司官簡委二年更代掌儲㣥木材皇木厰監督滿一人司官簡委歲一更代掌稽收運木虞衡清吏司郎中滿四人漢一人員外郎滿四人䝉古一人漢一人主事滿三人漢二人掌山澤採捕及陶冶器用修造權衡武備寶源局監督滿漢各一人司官簡委二年更代大使滿漢各一人掌鼓鑄泉布都水清吏司郎中滿五人漢一人員外郎滿五人漢一人主事滿四人漢二人掌水利河防橋梁道路街道㕔滿漢各一人司官簡委歲一更代掌平治道塗清理溝洫屯田清吏司郎中滿四人漢一人員外郎滿五人漢一人主事滿三人漢二人掌修繕陵寢供億薪炭柴薪監督滿正副各一人正監督一年期滿以副作正别簡司官副之煤炭監督滿二人一以本部司官兼攝一以內務府司官兼攝均歲一更代掌採取薪炭以供宫府節愼庫滿郎中一人司官簡委歲一更代滿員外郎一人司庫二人庫使十有一人掌出納金錢製造庫郎中滿二人漢一人司官題補司匠二人司庫二人庫使二十二人掌攻治金革堂主事四人掌章奏者滿一人漢軍一人掌案牘者滿二人司務滿漢各一人筆帖式滿九十三人䝉古二人漢軍十有二人視各司之繁簡以為額掌翻譯清漢章奏文籍營繕清吏司宫殿國家定鼎燕京宅中建極宫殿之制環以皇城重以紫禁城左太廟右社稷外朝內宫别殿翼室祕省掖垣東西分列不儉不奢萬年攸宅矣正陽門之內為大清門三闕上為飛檐崇脊門前地正方繞以石䦨左右石獅各一下馬石牌各一門之內千步廊東西嚮各百有十間又折而北嚮各三十四間皆聫檐通脊東接長安左門西接長安右門門各三闕東西嚮兩門之中南嚮者天安門為皇城正門皇城之制廣袤三千六百五十六丈五尺高一丈八尺下廣六尺五寸上廣五尺三寸甃以甎朱塗之上覆黃琉璃城四門南即天安北曰地安東曰東安西曰西安天安門五闕上覆重樓九間彤扉三十有六門前環御河跨石梁五即外金水橋石橋前立華表二門之內立華表二東西兩廡各二十六間東廡正中為太廟街門西廡正中為社稷街門兩廡之北正中南嚮者為端門門制與天安門同門之內東西兩廡各五間其北東有太廟右門西有社稷左門迤北兩廡各四十二間均聫檐通脊為六科垣舍及部院府寺監朝房又北東出者為闕左門西出者為闕右門門北東西廡各三間為王公朝集之所中午門為紫禁城正門門前左設嘉量右設日圭紫禁城之制南北長二百三十六丈二尺東西長三百有二丈九尺五寸高三丈堞高四尺五寸五分下廣二丈五尺上廣二丈一尺二寸五分城四門南即午門北曰神武東曰東華西曰西華四維角樓各一午門三闕上覆重樓九間南北彤扉各三十有六左右設鐘鼓明廊翼以兩觀傑閣四聳左右各一闕西嚮者曰左掖東嚮者曰右掖外朝之制午門內東西兩廡各二十二間皆崇基東廡之中為協和門西廡之中為熙和門門各五間東西嚮兩廡之北正中南嚮者為太和門九間三門重檐崇基石䦨前後陛各三出左右陛各一出門前列銅獅二其南環以金水河跨石梁五即內金水橋左右各一門皆南嚮左曰昭德右曰貞度門各三間門之內東西兩廡各三十二間東廡之中為體仁閣西廡之中為𢎞義閣東廡之北為左翼門西廡之北為右翼門各五間皆東西嚮其正中南嚮者為太和殿基高二丈殿高十有一丈廣十有一間縱五間上為重檐垂脊正吻二旁吻四前後金扉四十金瑣窗十有六殿正中一間設御座殿前為丹陛環以白石䦨陛五出各三成列鼎十有八銅龜銅鶴各二日圭嘉量各一丹墀為文武官行禮位范銅為山形鐫正從一品至九品清漢文東西各二行行十有八列於御道兩旁殿左右各一門左曰中左右曰中右皆三間南嚮殿之後東西兩廡又各三十間正中南嚮者為中和殿縱廣各三間方檐圓頂金扉瑣窗各二十有四南北陛各三出東西陛各一出殿之後為保和殿九間前陛各三出與太和殿丹陛相屬中和殿左右陛各三成東西出保和殿後陛三成三出北嚮殿左右各一門左曰後左右曰後右皆三間南嚮前後出陛其北東為景運門西為隆宗門三門五間前後出陛東西嚮正中乾清門為內宫正門內宫之制乾清門南嚮五間三門前三出陛環以石䦨陛前列金獅二門內左右陛北出者二正中南嚮者為乾清宫廣九間縱五間中設寶座前為丹陛列寶鼎龜鶴日圭嘉量丹陛中道與乾清門相屬左右陛南出者二東西出者各一宫之東為昭仁殿西為𢎞德殿皆南嚮東廡為端凝殿西嚮其南東出者為日精門西廡為懋勤殿東嚮其南西出者為月華門宫之北正中為交泰殿金頂制與中和殿同殿後為坤寧宫宫之東為東暖殿西為西暖殿宫後正中北嚮者為坤寧門門後正中南嚮者為天一門後為欽安殿殿後北嚮者為承光門門之後左曰延和門右曰集福門中為順貞門後曰神武門為紫禁城北門以上宫殿門廡皆崇基上覆黃琉璃門設金釘闌柱窗扉丹壁青瑣咸雕鏤繪采由日精門而東南出者曰內左門門之北南嚮者曰近光左門自是而北為東一長街街東以次列三宫前為景仁宫其北為承乾宫又北為鍾粹宫三宫之東為東二長街街東以次列三宫前為延禧宫其北為永和宫又北為景陽宫日精門之東為齊宫殿曰孚顒殿齊宫之東為育慶宫殿曰惇本殿前為祥旭門外為前星門宫垣東嚮之門為昭華門又東為蒼震門由月華門而西南出者曰內右門門之北南嚮者曰近光右門自是而北為西一長街街西以次列三宫前為永夀宫其北為翊坤宫又北為儲秀宫三宫之西為西二長街街西以次列三宫前為啓祥宫其北為長春宫又北為咸福宫三宫之北為重華宫殿曰崇敬殿宫之西為建福宫殿曰撫宸殿宫之南為延慶殿月華門之西為養心殿宫垣西嚮之門為啓祥門又西為長庚門景運門之東為奉先殿西門曰誠肅門正門曰奉先門中為正殿後為寢殿皆九間南嚮如太廟寢制左列神庫前列神㕑奉先殿之東為寧夀宫其北為景福宫南為擷芳殿由協和門東出為文華殿後為主敬殿東為傳心殿門曰景行門後列祭庫神㕑其前稍東東出者東華門為紫禁城東門隆宗門之西為慈寧宫前為慈寧門門東為永康左門西為永康右門前為長信門又前為長慶門東為慈祥門宫之西為夀康宫北為夀安宫宫之東為中正殿殿之西為英華殿由熙和門西出為武英殿前跨石梁三西為咸安宫南為南薰殿西出者西華門為紫禁城西門凡營建宫殿皆先期上請欽命大臣㑹部督建至午門以內乾清門以外及皇城紫禁城有應修葺者報部會估如工巨則冬庀材春舉工事竣題銷其隨時修繕銀數至百兩以上者管工官具其工直之實於御史御史赴工勘驗㑹部核銷不符者劾之凡皇城垣部遣官以時巡視補其闕損與丹雘之剝落者去草之蔓生者其南歲一茀治東西北五歲一茀治凡修建宫殿所需物材攻石煉灰皆於京西山麓楠木採於湖南福建四川廣東杉木採於江南江西浙江湖北金甎取備於江蘇城甎取備於臨清琉璃甎甓取備於京窰五金之用采色之需悉取給於户部工竣皆由部核實題銷凡宫殿工成在工員役均别久暫敘賞有差欽定大清㑹典卷七十
