body:
  text: 内務府掌儀司一凡饗奉先殿之禮國初定鼎燕京崇建太廟以奉列祖歲時祫饗又於大内景運門之東建奉先殿朔望瞻拜時節薦新生忌祭饗出入啟告以展孝思前殿後殿均九間中爲穿堂以聯前後繚以周垣前殿設列聖列后龍鳯神寳座籩豆案香帛案祝案尊案後殿同殿異室各設神龕寳牀寳倚楎椸前設供案鐙檠均如事生之儀中室奉安太祖髙皇帝神位居左孝慈髙皇后神位居右左室奉安太宗文皇帝神位居中孝端文皇后神位居左孝莊文皇后神位居右右室奉安世祖章皇帝神位居中孝惠章皇后神位居左孝康章皇后神位居右左第二室奉安聖祖仁皇帝神位居中孝誠仁皇后神位居左孝昭仁皇后神位居右孝懿仁皇后神位居左次孝恭仁皇后神位居右次右第二室奉安世宗憲皇帝神位居左孝敬憲皇后神位居右左第三室奉安孝賢皇后神位均南嚮凡朔望皇太后聖夀萬夀聖節元正冬日至及國有大慶均恭奉列聖列后神牌於前殿祭饗禮成還御後殿寢室前殿正中設太祖髙皇帝位於左孝慈髙皇后位於右左間設太宗文皇帝位於右次孝端文皇后位次孝莊文皇后位右間設世祖章皇帝位於左次孝惠章皇后位次孝康章皇后位左第二間設聖祖仁皇帝位於右次孝誠仁皇后位次孝昭仁皇后位次孝懿仁皇后位次孝恭仁皇后位右第二間設世宗憲皇帝位於左次孝敬憲皇后位均南嚮帝后同案左第三間設孝賢皇后位西嚮皆簠二簋二籩十有二豆十有二篚一鑪一鐙二各登一鉶一奉先制帛一孝賢皇后用素帛尊一金爵三金七一金箸二帛共篚尊實酒疏布羃勺具其登鉶簠簋籩豆尊篚陳設一如太廟之制惟不設牲俎不行飲福受胙禮王公百官不陪祀祭前一日本司官率所屬進祝版於神庫祝案迺省齍展器刲牲瘞毛血樂部及本司内監設中和韶樂於階上分左右懸祭日讀祝官詣神庫祝案前行一跪三叩禮恭奉祝版贊禮郎二人前引由奉先門中門入進殿中門跪設於西旁祝案三叩退内府奉請神牌各官進至後殿内各就寢室前上香一跪三叩恭奉神牌依次行至前殿各依次奉安於寳座一跪三叩退司拜褥官設御拜褥於殿門内正中及各香案前掌儀司官詣乾清門奏請皇帝御衮服乗金輿出宮由景運門至誠肅門降輿前引大臣十人次贊引太常卿二人恭導皇帝入奉先門左門大臣二人後扈及豹尾班侍從如儀内監跪進盥盤帨巾於階下皇帝盥洗由左階陞進至殿内拜位前北嚮立豹尾班侍衞至階下左右前引導十大臣至殿陛上兩旁均止立東西面後扈二大臣隨入於皇帝後兩旁僉立典儀官贊樂舞生登歌執事官各共迺職引舞官二人執旌節引武舞八佾進贊引官奏就位皇帝就拜位立典儀官贊迎神司香官各奉香盤進贊樂官唱舉迎神樂奏貽平之章司香官進至各香案旁立贊引官奏就上香位恭導皇帝詣太祖髙皇帝香案前司香官跪進香贊引官奏跪皇帝跪奏上香皇帝上柱香次三上瓣香興以次詣列聖香案前上香儀同贊引官奏復位各香案司拜褥官起拜褥皇帝復位奏跪拜興皇帝行三跪九拜禮孝賢皇后位司香官奉香盤進贊引官恭導皇帝詣孝賢皇后香案前司香官跪進香皇帝立上柱香次三上瓣香恭導皇帝復位樂止典儀官贊奠帛爵行初獻禮司帛侍衞奉篚司爵侍衞奉爵以次進北面立贊樂官唱舉初獻樂奏敉平之章樂作舞干戚之舞司帛詣列聖列后神位前跪奠帛篚於案三叩司爵詣案前立獻爵奠於爵墊正中皆退司祝至祝案前跪三叩奉祝版跪案左樂暫止贊引官奏跪皇帝跪贊引官贊讀祝司祝讀祝畢祝版内不書諡孝賢皇后號奉祝版詣太祖神位前跪安於帛篚三叩退贊引官奏拜興樂作皇帝行三拜禮興樂止引武功之舞退引舞官二人執旌節引文舞八佾進典儀官贊行亞獻禮司爵奉爵以次進贊樂官唱舉亞獻樂奏敷平之章舞羽籥之舞司爵獻爵奠於爵墊左儀如初獻樂止典儀官贊行終獻禮司爵如前進贊樂官唱舉終獻樂奏紹平之章舞同亞獻司爵獻爵奠於爵墊右儀如亞獻樂止引文德之舞退典儀官贊徹饌贊樂官唱舉徹饌樂奏光平之章樂止贊禮郎一人趨至中間左旁北面跪奏禮成請還宫三叩退贊樂官唱舉還宮樂奏乂平之章贊引官奏跪拜興皇帝行三跪九拜禮樂止典儀官贊奉祝帛恭送燎所司祝司帛各詣神位前跪三叩奉祝奉帛司香跪奉香興恭送燎所贊引官恭導皇帝轉立拜位東旁西嚮司拜褥官起拜褥候祝帛過仍設贊引官恭導皇帝復位祝帛燎半奏禮成恭導皇帝由殿左門奉先門左門出内府官各詣神位前行禮恭奉神牌還御後殿寢室皇帝至誠肅門外陞金輿還宮遣官行禮奠獻均如前儀贊禮讀祝用内府贊禮郎遣皇子行禮具補服至誠肅門本司官贊禮郎二人前導皇子由奉先門右門入升西階至正中行禮上香由殿右門出入祝帛送燎時避立西旁禮成仍由西階降由原進門出遣王公内大臣行禮同凡恭上徽號册立册封御經筵耕耤謁陵廵狩囘鑾及諸慶典均祗告於後殿前一日本司官一人視刲牲瘞毛血祭日陳香鐙神位前各設爵三每案籩六豆二讀祝官詣神庫祝案前一跪三叩恭奉祝版贊禮郎二人前引入後殿中門跪設於西旁祝案三叩退内監啓神龕司拜褥官設御拜褥於後殿門内正中至時掌儀司官詣乾清門奏請皇帝御衮服乗金輿出宮由景運門至誠肅門降輿内大臣侍衞前引後扈如儀贊引太常卿二人恭導皇帝入奉先門左門由殿東夾道門入至後殿左階下豹尾班止於門外内監跪進盥盤帨巾皇帝盥洗由左階陞入後殿左門至拜位前北嚮立後扈二大臣隨進在後僉立前引十大臣至穿堂内兩旁東西面立典儀官贊執事官各共迺職贊引官奏就位皇帝就拜位立司香官各舉香合進贊引官恭導皇帝詣太祖寢室香案前立贊引官奏跪皇帝跪奏上香皇帝接香合拱舉仍授司香官興三上香贊引官恭導皇帝依次詣左右寢室前上香畢贊引官奏復位恭導皇帝復位奏跪拜興皇帝行三跪九拜禮興恭導皇帝至孝賢皇后寢室前立上香畢復位典儀官贊奠帛爵行初獻禮司帛爵侍衞各奉篚奉爵進至神位前司帛跪奠帛於案三叩司爵立獻爵奠於爵墊正中皆退司祝進至祝案前跪三叩奉祝版跪案左贊引官奏跪皇帝跪贊讀祝司祝讀祝畢奉祝版詣太祖寢室前跪安於帛篚三叩退贊引官奏拜興皇帝行三拜禮興典儀官贊行亞獻禮司爵獻爵奠於爵墊左儀同初獻典儀官贊行終獻禮司爵獻爵奠於爵墊右儀同亞獻贊引官奏跪拜興皇帝行三跪九拜禮興典儀官贊奉祝帛恭送燎所司祝司帛各詣神位前一跪三叩奉祝帛恭送燎所贊引官恭導皇帝轉立拜位東旁西嚮司拜褥官起拜褥候祝帛過仍設贊引官恭導皇帝復位奏禮成恭導皇帝由後殿左門東夾道奉先門左門出至誠肅門外陞金輿還宮遣官行禮皇子具補服至誠肅門本司官贊禮郎導引由奉先門右門入由殿西升穿堂右階至穿堂正中行禮上香由後殿右門出入祝帛送燎時避立西旁禮成仍由右門出遣王公内大臣行禮同凡恭遇列聖聖誕列聖列后忌辰及元宵清眀霜降歲除等日於後殿行禮神位前各陳香鐙設酒脯果實畢内監啓神龕掌儀司官詣乾清門奏請内務府總管同内府贊禮郎恭導皇帝入後殿詣各寢室上香所司設御拜褥於殿内正中皇帝就位行禮一如祗告儀均不奏贊忌辰御素服節令御衮服遣官行禮與祗告同凡立春端陽重陽等節及四月八日於後殿陳香鐙每神位前設酒脯果實四月八日不設酒脯畢内監啓神龕本司官一人具補服上香行禮夀皇殿尊奉聖祖仁皇帝世宗憲皇帝御容凡遇聖誕忌辰及元正令節皇帝躬率諸皇子及近支王等展謁行禮其歳時奠獻一如事生儀凡祀堂子之禮建堂子於長安左門外街門北嚮内門西嚮建祭神殿於正中南嚮前爲拜天圜殿殿南正中設大内致祭立杆石座次稍後兩翼分設各六行行各六重第一重爲諸皇子致祭立杆石座次親王郡王貝勒貝子公各依次序列均北嚮東南建上神殿南嚮歲正朔皇帝率王公滿一品文武官詣堂子行拜天禮由禮部豫期請㫖是日内府官設皇帝拜位於圜殿外甬道正中鴻臚卿率鳴贊官夾甬道東西面序立有司陳香鐙内務府總管一人率諸王一等䕶衞各一人豫詣圜殿内進楮帛鑾儀衞陳法駕鹵簿於午門外日出前十刻禮部堂官詣乾清門奏請皇帝詣堂子行禮皇帝御禮服乗禮輿出宮前引大臣十人後扈大臣二人豹尾班執槍佩刀侍衞二十人佩弓矢侍衞二十人翊衞如儀駕𤼵警蹕午門鳴鐘法駕鹵簿前導不與行禮之百官及外藩䝉古王公台吉朝鮮諸國使臣咸朝服跪送導迎鼓吹設而不作皇帝由堂子街門入禮部堂官二人恭導至内門降輿皇帝由中門入至圜殿前就拜位南嚮立鴻臚官引王公於丹陛上各官於丹陛下均南嚮序立東位西上西位東上鴻臚官奏跪拜興皇帝率羣臣行三跪九拜禮奏禮成禮部堂官恭導皇帝出内門陞輿法駕鹵簿前導導迎樂作奏祐平之章皇帝囘鑾王公從各官以次退不與行禮之百官及䝉古王公台吉諸國使臣於午門外跪迎午門鳴鐘王公隨駕入至内金水橋恭候皇帝還宮王貝勒貝子赴乾清門竢入坤寧宮祭神殿行禮凡立杆祭神於堂子之禮歲以季春季秋月朔或二四八十月或上旬諏吉舉行祭前一日有司立杆於圜殿南正中石座祭日懸黄幡繫采繩綴五色繒百縷楮帛二十有七備陳香鐙司俎官由大内恭請神位安奉於祭神殿内南嚮陳餻餌九盤酒琖三圜殿陳餻餌三盤酒琖一楮帛如前數設御座於祭神殿檐下西旁鑾儀衞陳法駕鹵簿日出前十刻禮部堂官詣乾清門奏時皇帝御龍袍衮服乗禮輿出宮警蹕扈從如元正儀禮部堂官朝服自街門恭導皇帝至内門降輿由中門入至祭神殿陞階至檐下就御座東嚮坐王貝勒於丹陛上貝子入八分公於丹陛下均按翼北上東西面相嚮坐贊祀二人先於祭神殿次於圜殿内均九酌獻三致禱司俎官率執事奏樂舉和畢所司設御拜褥一於祭神殿一於圜殿禮部堂官恭導皇帝詣祭神殿圜殿贊祀各致祝辭皇帝各行一跪三拜禮王公百官序立丹陛下兩旁不隨行禮禮畢恭導皇帝至檐下就御座南嚮坐王公等各就原處列坐司俎尚膳徹餕尚茶徹酒皇帝命分賜王公各祗受訖降丹陛下序立禮部堂官跪奏禮成恭導皇帝由中門出陞輿奏樂還宮百官跪迎儀均與元正同司俎官恭奉神位還御如皇帝不親詣行禮王公百官不齊集以贊祀致辭行禮王公等致祭日立杆於各班位石座至街門外下馬自内門右門入坐於西檐前階下東面大内致祭後越日爲馬祭神於堂子如儀官員庶人不得設立堂子有違例致祭並王公不按爵次爭祭者論凡月祭之禮孟春上旬三日餘月朔日大内遣司俎官率堂子官吏於圜殿奠獻餻酒楮帛贊祀六酌獻三致禱司俎官率執事奏樂舉和贊祀祝辭行禮如儀是日内管領一人於上神殿獻餻酒楮帛親王郡王各遣䕶衞一人於上神殿獻楮帛執事者均令先期齋戒凡浴佛之禮歳以孟夏上旬八日司俎官率執事人等自大内請佛至堂子祭神殿陳香鐙獻餻酒王公各遣人獻餻執事設盥盤贊祀二人浴佛畢六酌獻三致禱如儀禮成奉佛還御是日大内及軍民人等不祈禱不祭神禁屠宰不理刑名凡大内祭神之禮奉晨祀神位於祭神殿西位東嚮奉夕祀神位於西北南嚮日昧爽於晨祀神位前設餻餌九盤尊一琖一鑪三寅刻進二豕於庭贊祀就神位酌獻祝禱司俎官率所屬奏樂舉和畢贊祀跪致辭迺刲牲先薦血次熟而薦於俎贊祀酌獻致辭行禮畢徹饌分胙如儀申刻於夕祀神位前陳琖五鑪五不酌獻祝禱時伐鼓餘均與朝薦同皇帝躬祭壇廟齋戒日忌辰清明禁屠日不祭餘皆日以爲常月朔之翼日昧爽立杆於庭陳豕一以祀天司祝致辭畢刲牲先薦血次倫膚爲膾並炊榖飯以薦司祝致辭如前歲以四孟月用馬牛金幣祗薦於神贊祀致辭如儀凡出師展拜堂子之禮皇帝親征諏吉啓行内府官豫設御拜褥於圜殿外及内門外御營黄龍大纛前兵部陳螺角鑾儀衞陳鹵簿均如儀皇帝先詣圜殿次詣纛前均行三跪九拜禮六軍凱旋皇帝入都門先詣堂子行禮如儀命將出師皇帝率大將軍及隨征將士詣堂子行禮次拜纛儀均與親征同凱旋日詣堂子行告成禮以上詳見禮部軍禮凡祀羣神之禮建凝和廟於紫禁城之東以奉雲師之神歲以秋分後三日致祭建宣仁廟於紫禁城之東北隅前殿奉風伯之神後殿奉八風之神歲以立春後丑日致祭建昭顯廟於紫禁城之西以奉雷師之神歲以立夏後申日致祭建時應宮於紫禁城之西北隅前殿奉四海四瀆龍神中殿奉京畿龍神後殿奉八方龍神歲以季夏旬有三日致祭均素羞香燭遣内府官行禮如遇亢旱遣官祈雨各神位前均陳帛一果饌十有五盤尊一爵三鑪一鐙二祭日設樂於西階下自迎神至望燎皆奏樂日出前二刻遣官及執事官皆雨冠素服詣廟内府贊禮郎二人引遣官入廟左門贊引贊盥洗遣官盥手畢引升左階進殿左門就正中拜位前北嚮立典儀贊執事官各共廼職贊引贊就位遣官就拜位典儀贊迎神樂作司香奉香盤進贊引贊就上香位引遣官詣香案前贊上香司香跪奉香遣官立上柱香次三上瓣香畢贊復位遣官復位贊跪叩興遣官行三跪九叩禮典儀贊奠帛爵行初獻禮司帛奉篚司爵奉爵進至神位前司帛跪奠帛三叩司爵立獻爵奠正中皆退司祝至祝案前跪三叩奉祝版跪案左贊引贊跪遣官跪贊讀祝司祝讀祝畢奉祝版詣神位前跪安於帛篚叩如初退贊叩興遣官行三叩禮典儀贊行亞獻禮司爵獻爵奠於左贊行終獻禮司爵獻爵奠於右儀均如初獻贊送神贊引贊跪叩興遣官行三跪九叩禮典儀贊奉祝帛詣燎所有司奉祝次帛次香恭送燎所引遣官避立拜位西旁東面候祝帛過引復位祝帛燎半贊望燎引遣官出望燎贊禮成引退得雨後報祀陳帛一羊一豕一果實五盤餘同祈告遣官及各執事官咸朝服行禮建城隍廟於紫禁城内西北隅奉紫禁城城隍之神建永佑廟於皇城西安門内奉皇城城隍之神一如祭都城隍廟之禮歲以萬夀聖節並季秋遣内務府總管各一人致祭萬夀聖節神位前陳帛一羊一豕一果實五盤尊一爵三鑪一鐙二秋祭陳鉶二簠簋各二籩豆各十餘同祭日均設樂於西階下自迎神至望燎皆奏樂日出前二刻遣官具朝服詣廟内府贊禮郎二人引遣官入廟左門贊引贊盥洗遣官盥手畢引升左階進殿左門就正中拜位前北嚮立典儀贊執事官各共廼職贊引贊就位遣官就拜位典儀贊迎神樂作司香奉香盤進贊引贊就上香位引遣官詣香案前贊上香司香跪奉香遣官立上柱香次三上瓣香畢贊復位遣官復位贊跪叩興遣官行三跪九叩禮典儀贊奠帛爵行初獻禮司帛奉篚司爵奉爵進至神位前司帛跪奠帛三叩司爵立獻爵奠正中皆退司祝至祝案前跪三叩奉祝版跪案左贊引贊跪遣官跪贊讀祝司祝讀祝畢奉祝版詣神位前跪安於帛篚叩如初退贊叩興遣官行三叩禮典儀贊行亞獻禮司爵獻爵奠於左贊行終獻禮司爵獻爵奠於右儀均如初獻贊送神贊引贊跪叩興遣官行三跪九叩禮典儀贊奉祝帛饌香詣燎所有司奉祝次帛次饌次香恭送燎所引遣官避立拜位西旁東面候祝帛過引復位祝帛燎半贊望燎引遣官出望燎贊禮成引退如儀欽定大清㑹典卷八十八
