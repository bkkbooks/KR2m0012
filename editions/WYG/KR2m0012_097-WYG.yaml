誥勅送吏部増注承襲人名若誥勅内有應注銷者送部覈定然後請襲教養凡旗學八旗各設官學以教官軍子弟之頴秀者國子監掌之各設義學以教貧不能延師者禮部掌之詳見禮部國子監本旗月委叅領會禮部司官稽察兩翼各設世爵官學簡滿洲大臣十人分蒞其事各委叅領二人更番稽察世爵十八歲以下十歲以上均令入學習國語騎射三年期滿疏簡王大臣考試一等者引見錄用二等按品補用旗員三等留學更閲三年再試無成除爵别襲敎習國語於滿洲散秩官筆帖式及因公罣誤之廢官敎習騎射於滿洲䕶軍校前鋒䕶軍内每翼選補四人期滿議叙不善教者罰斥有差滿洲䝉古每叅領下漢軍每旗各設學舍一十二歲以上子弟滿洲漢軍令習淸文國語䝉古兼習䝉古語其教習滿洲䝉古於前鋒䕶軍領催驍騎漢軍於滿洲散秩官筆帖式及因公罣誤之廢官内各由該都統擇通繙譯者二人充補别委一二人敎以騎射都統叅領等隨時稽察課程期滿分别等差請㫖叙錄凡錄送考試八旗滿洲䝉古漢軍童生遇歲科試各由本旗佐領取本旗廩生保結俾無溷冒申都統定期行咨翰詹衙門滿官一人會叅佐領考錄錄畢呈都統送禮部咨兵部請簡大臣校試騎射合式乃準入場臨試該叅領等仍偕至識别諸生屆歲科試由都統轉飭各叅佐領嚴催赴考有不能如期應試者各叅佐領確察申都統以事由咨學政分别定限補考託故規避及徇隠苛索者論遇鄉會試由兵部咨取銜名疏請欽命副都統叅領散秩官每翼各一人率領催五人入闈巡視試竣乃出試日唱名每旗委叅領散秩官一人送考繙譯生員三載兩試由各佐領彚造名册申送直年都統疏請欽命滿大臣考試清文錄取無定額中式者咨吏部以中書筆帖式庫使選用凡旌表建昭忠祠於京師八旗及直省駐防官兵有授命行陣者由都統詳具事蹟疏請入祀八旗分左右翼建忠義孝弟祠節孝祠由各旗佐領驍騎校確勘本旗之孝子順孫義夫孝婦節婦送叅領申都統覈實咨禮部彙疏請旌得㫖題坊於祠故則設位春秋遣官致祭皆給戸部庫銀三十兩令自建坊節婦之僅合年例者酌量嘉奬題名於碑附疏以聞優䘏凡優給職官領侍衛内大臣滿洲都統給親隨兵八名䝉古漢軍都統前鋒䕶軍統領各六名步軍統領五名滿洲副都統四名䝉古漢軍副都統各三名翼尉一名前鋒䕶軍驍騎叅領各二名副䕶軍驍騎叅領前鋒侍衛均一名有半每名月給餉銀三兩歲折米價十有二兩由戸部闗支給都統副都統銜有職掌者部院堂官兼都統副都統郎中兼叅領佐領及額外旗員之任事者皆按等兼支又歲給養廉銀領侍衛内大臣九百兩滿洲都統七百兩䝉古漢軍都統前鋒䕶軍統領各六百兩滿洲副都統步軍統領各五百兩蒙古漢軍副都統步軍翼尉各四百兩按兩季支給叅領各六十兩副叅領前鋒侍衛各四十兩印房官視副叅領均於歳終分給凡公費八旗各給入官房地入租以充公用滿洲每旗歲約千餘兩蒙古旗三百兩漢軍旗五百兩本旗用不敷許於别旗通融動支餘貯戸部庫需用時請領凡䘏賞歲於戸部移取長蘆兩淮鹽課銀十二萬兩賞䘏官軍滿洲每旗月七百兩蒙古旗三百兩漢軍上三旗各三百兩下五旗各二百二十兩均於四季支取按旗分貯喪葬有䘏婚嫁有賞前鋒親軍䕶軍驍騎諸校領催驍騎步軍教養兵各執事人及休退閒散病廢孤寡者各按等差給與由叅佐領驍騎校領催族長覈實具保結支領兵丁之在屯者亦如之歲終該都統彙疏以聞有虛冐者罪之該管稽察各官論如律凡出征官軍月餉給本家以資養贍無家者餉銀由佐領收貯米咨戸部存倉凱旋日按數給與凡優給休退官兵武職引年量軍功給全俸半俸有差文職予告者同世爵未及歲者給半俸及歲給全俸世爵無嗣族人襲者以三分俸之一無人襲者以其俸之半給孀婦終其身驍騎患病傷殘及年六十以上告退者有軍功月給銀一兩米一斛僅從征者無嗣亦準給官兵身故給其妻俸餉之半一年駐防官兵之妻歸旗者亦如之無嗣者終身給與敎養兵餉凡隨任留養外任旗員子弟獨子準隨任所有二三子者留一子四五子者酌留二三子餘均至十八歳以上送京選充執事人其考取之進士舉人貢生廪膳生繙書房生監咸安宮國子監學生皆不咨送直省駐防官兵降革病休及兵丁之已退者願就養於在外子孫無子孫及兄弟之子願就養於戸下之人食餉者皆聽病故官兵妻亦如之無嗣歸旗者該管官給郵符遣官押送凡貸給庫帑八旗大小官員願借俸銀者喪葬準借六月婚嫁準借四月按季扣除如先有坐扣之項展限扣還前鋒親軍䕶軍驍騎諸校準借三十兩前鋒親軍䕶軍領催及族長二十兩驍騎十有五兩按月坐扣循環出納以資生計不願借者聽病故告休及獲罪力不能完者豁免公式凡軍政五歲一舉二品以上由兵部疏其官階治績以聞餘均考察於其長定為四格格分三等一操守曰廉曰平曰貪一才能曰長曰平曰短一騎射曰優曰平曰劣一年歲曰壯曰中曰老注上考者弊以五事曰行止端方曰居官勤慎曰弓馬嫻習曰馭兵有律曰給餉無虛具五事者薦舉卓異注下考者議以八法曰貪曰酷曰罷軟無為曰不謹曰年老曰有疾曰浮躁曰才力不及干一法者糾劾各官有出征受傷及得功者考列中平不入舉劾者均注册於本年九月初旬送兵部候部疏請欽命大臣考察凡計功以功紀錄者繫職官奏請得㫖用兵部印紙填注咨部領催應得紀録注册存貯旗部竢得官日咨部覈給有議處之案附咨抵銷凡劾過五品以上官身干法紀具疏糾叅因人連及與失察等事及六品以下官有犯均咨兵部劾議彙疏以聞以曠職記過者歲終考察一次免議官二次以上議處領催三次責懲在京三品以下五品以上旗員因公罪降革者咨送都察院覈覆該管官出具考語駐防降調官由駐防該管官出具考語送在京本旗轉咨都察院覈覆均引見候㫖世爵兼文武職任者犯貪汚及行止不端爵秩兼革若公罪獲譴應否留世爵疏請候㫖奉特㫖革職者按其獲罪所由或在兼任或在本爵疏請亦如之世管佐領世爵於所兼任内軍政考察以浮躁議降者留世爵以才力不及議降者並留佐領其選補侍衛以力不勝任咨回者留世爵佐領怠惰曠職有玷官箴者兼革緣事降級無論留任或調任皆降罰世爵本俸以抵降調降級留任者三年無過革職留任者四年無過奏請開復凡班聨大朝慶賀常朝坐班東左翼西右翼按品序列均如儀詳見禮部每月朔及月之十日二十日補服皇帝巡狩方嶽每日常服均於午門外列坐萬壽聖節元正均七日上元節三日咸朝服上三旗四品以上官於太和門外五品以下及下五旗官於午門外列坐均與常朝同下五旗王公所屬佐領官員元正七日上元三日於本王公府第會集餘日仍於午門外坐班八旗分班奏事每旗各以所屬官十人侍班引見與六部同内有兼文武階或充御前乾清門侍衛及部院司官者不與凡稽察大祀豫期列都統副都統名奏請簡命稽察齋戒册有舛漏官有規避者劾論每旗各委官一人巡察壇廟有䙝越不恭者逹於其長劾論如之朝會每旗各委驍騎校二人同門衞官稽察各官傔從有出入喧雜者逮治之京倉每倉以都統或副都統一人稽察出入率三歲奏代廒有滲漏米有盜竊者移倉場侍郎治之京通各倉每倉以叅領一人往會監督監視支放有通賄舞弊者聽倉場侍郎劾論凡闗支俸餉俸銀禄米歲以春秋二季支領與部官同兵米以四季每季鑲黄正黄二旗以孟月正白正紅鑲白三旗以仲月鑲紅正藍鑲藍三旗以季月赴倉支領餉及馬銀以每月赴部支領先由旗册送俸册内以見任官俸糈為一則有降罰者詳書恩䘏俸糈為一則世爵任外官留京俸糈為一則餉册内以見額兵餉為一則恩䘏兵餉為一則詳見戸部各册送部之限俸册春季於豫歲之十二月秋季於六月均以十五日餉册以豫月之十五日馬銀册以豫月之十八日逾限不送者論限外由閒散人升補之京官在春秋孟月晦日前者許具册補支緣事開復官亦如之由外省升調來京其原俸以離任截支者並得補支原俸餘均不得援擬歲終各旗彙繕黄册以聞凡出入符信旗人以事請假往外省者均由旗具結移咨兵部給以路引往盛京及畿輔近地者職官給引如之兵丁由叅領給票注限期及所往之地鈐以闗防前鋒䕶軍各執事人憑來文給票亦如之閒散人鈐票以圖記均於回日繳銷其逾限不回回不繳引票及不請假私往或往非所指之地者並論駐防旗人及隨任外省各官之子弟以事來京者所司册具籍貫年貎行在京本旗並注年貎於咨文給本人齎投回日由旗行知該管官仍給回咨其不候咨私行或領咨而潛往他處及所司留難不給咨者論夜行憑本旗印帖為驗有事須速傳者臨期填注時日給傳事人傳逹次日繳銷該管官豫發印帖及繳帖漏銷者論凡服制父母所後父母故及為祖父母承重者在外任以聞訃日出征以凱旋日為始皆持服百日京官由本旗駐防官由該管官各咨兵部準假其自駐防回京者往返日月皆不入限假滿呈本旗行部銷假各復原任供職二十七月内文官停升餘均如常直省文武官由督撫咨部行旗十日内具結送部轉發各省飭令回京持服停升與在京文官同凡終養祖父母父母老疾家無次丁援例呈請者京官由叅佐領覈實具結申都統奏咨兵部注册停升外任外官由所司咨部行旗取結調回引見候㫖以旗員改補如繫佐雜無改補之職者咨旗簡委差使其不願就者聽駐防官兵已離職役衰老貧困與已故官兵之妻呈請留養外省者必有子孫兄弟及奴僕可倚者迺準留駐防兵丁呈請歸養者必在京有祖父母父母或親伯叔祖父母年老家無次丁迺準歸養若兵丁離京歲久戸絶以無人守墓呈請者準令一人挈屬回京承祀餘人不得偕回均由旗覈實具結咨兵部各準所請凡公署治事設八旗公署歲列都統副都統銜名奏請簡命直年掌八旗會理之事選左右翼官校之賢能者分治之領催驍騎掌書鈔各舉職以從其長課事考成每事率限十日其需行文會覈者二十日給餘限各如正限之數歲終則會已結未結之事彙疏以聞所屬之稱職者於每歲更代日咨本旗以應升注册各旗專理之事正餘各限與直年同其叅領以歲計佐領驍騎校領催以三歲計各議功罪有差欽定大清會典卷九十七
