body:
  text: 八旗都統訓練凡大閱皇帝躬擐甲胄御櫜鞬廵閱軍營登臺視操詳見兵部八旗將領簡精銳飭器械集教場結陣肅聽軍令陣法前列漢軍火器營左翼四旗以次而東西上右翼四旗以次而西東上每旗鹿角二十舁鹿角棉甲兵八十人引繩棉甲兵四人長槍二十連耞棍二十鹿角兩旁礮營神威將軍礮十䕶礮鳥槍百藤牌百礮手三十人御礮車驍騎百有十人鳥槍驍騎百人藤牌兵百人叅領纛十執纛驍騎三十人隨礮小旗二十負旗領催二十人紅旗二麾旗領催二人金五鼓一鳴金驍騎十人舁鼓棉甲兵四人擊鼓驍騎二人海螺五鳴螺驍騎五人每旗叅領三人散秩官十人驍騎校十人每旗鳥槍二百二十鳥槍領催二十人驍騎二百人大纛一執纛領催一人驍騎三人隨纛散秩官一人領催二人驍騎二十人叅領纛五執纛驍騎十五人紅旗二麾旗領催二人小旗二十二金五鼓一鳴金驍騎十人舁鼓棉甲兵四人擊鼓驍騎二人海螺十有三鳴螺驍騎十三人每翼都統二人每旗副都統一人叅領二人散秩官五人給使官二人驍騎校七人共八旗漢軍火器營都統四人副都統八人官校三百二十人礮手二百四十人隨礮領催驍騎二千二百三十二人藤牌兵八百人鳥槍領催驍騎二千三百四人舁鹿角舁鼓引繩棉甲兵七百三十六人通計兵六千三百十二人鹿角百六十長槍百六十連耞棍百六十神威將軍礮八十鳥槍二千五百六十藤牌八百大纛八叅領纛百二十紅旗三十二小旗三百三十六鼔十有六金八十海螺百四十四火器營左翼四旗在漢軍左翼之左右翼四旗在漢軍右翼之右鳥槍䕶軍營鳥槍百二十䕶軍百二十人總統五人每旗纛二執纛䕶軍四人紅旗一麾旗䕶軍二人小旗十二負旗烏槍什長十二人海螺十鳴螺䕶軍十人䕶軍叅領二人䕶軍校十四人驍騎營子母礮六每礮小旗一負旗隨礮領催一人驍騎九人纛一執纛驍騎二人叅領一人散秩官五人驍騎校五人烏槍驍騎營鳥槍百二十驍騎百二十人纛二執纛驍騎四人紅旗一麾旗驍騎二人小旗十有二負旗領催十二人海螺十鳴螺驍騎十人叅領二人散秩官七人驍騎校十四人共八旗火器營總統五人官校四百人鳥槍什長九十六人鳥槍䕶軍九百六十人鳥槍領催九十六人鳥槍驍騎九百六十人礮營領催驍騎四百八十人執旗鳴螺䕶軍領催驍騎二百七十二人通計兵二千八百六十四人鳥槍千九百二十子母礮四十八纛四十紅旗十有六小旗二百四十海螺百六十頭隊前鋒營每翼前鋒統領一人每翼前鋒叅領一人前鋒侍衞一人前鋒校八人於前鋒内委用每佐領下前鋒一人每前鋒二人用鳥槍前鋒一人小旗八海螺四䕶軍營每翼䕶軍統領一人每旗䕶軍叅領五人每佐領下䕶軍二人每旗䕶軍統領纛一八旗海螺共五十四每䕶軍四人用小旗一驍騎營每翼都統二人每旗副都統一人叅領二人每叅領下散秩官二人驍騎校二人每佐領下領催驍騎二人每旗叅領纛七海螺七每驍騎四人用小旗一共頭隊將領十六人官校二百九十六人兵四千四百十人兵額各按佐領分撥後倣此纛六十四小旗六十四海螺百四十二此内撥出前鋒營前鋒統領一人前鋒叅領二人前鋒侍衞二人前鋒二百人䕶軍營䕶軍統領一人䕶軍叅領八人䕶軍四百人驍騎營副都統二人叅領八人散秩官十六人驍騎校十六人驍騎三百二十人再於火器營内撥出鳥槍䕶軍叅領四人烏槍䕶軍百六十人鳥槍驍騎叅領二人鳥槍散秩官四人鳥槍驍騎百六十人共將領四人官六十二人兵千二百四十人於退兵時殿後次隊䕶軍營每翼䕶軍統領一人每旗䕶軍叅領三人每佐領下䕶軍三人每旗䕶軍統領纛一八旗海螺共四十八每䕶軍六人用小旗一驍騎營每翼都統一人副都統二人每旗驍騎叅領一人每叅領下散秩官一人驍騎校一人每佐領下驍騎一人每旗叅領纛四海螺四每驍騎四人用小旗一共將領八人官校百四十四人兵三千五百二十八人纛四十海螺八十左右兩翼應援兵䕶軍營每翼䕶軍統領一人每旗䕶軍叅領二人每佐領下䕶軍一人每旗䕶軍統領纛一每䕶軍四人用小旗一驍騎營每翼都統一人副都統二人每旗驍騎叅領一人每叅領下散秩官一人驍騎校一人每佐領下驍騎一人每旗叅領纛三海螺三每驍騎四人用小旗一共左右兩翼應援兵隊將領八人官校百三十六人兵千七百六十四人纛三十二海螺二十四鑾儀衛䝉古畫角十官七人鳴角軍二十一人五旗諸王䝉古畫角十官十人鳴角軍二十人海螺十有二鳴螺親軍十二人共䝉古畫角二十官十有七人鳴角鳴螺軍五十三人禁約喧譁每旗䕶軍叅領一人䕶軍校一人䕶軍四十人滿洲䝉古漢軍三旗合委散秩官八人驍騎校八人驍騎三百二十人共官三十二人兵六百四十人滿洲䝉古漢軍三旗合委傳宣官八人驍騎校八人䕶軍校八人共二十四人以上八旗各營將領四十九人官校千三百六十九人兵萬九千五百七十一人陣後共設三十四營左翼漢軍四旗四營火器營四旗四營前鋒四旗一營四旗䕶軍與驍騎相間立八營右翼漢軍四旗四營火器營四旗四營前鋒四旗一營四旗䕶軍與驍騎相間立八營每營廣二十四丈長四十丈各營相距各一丈共三十二丈自立營處至次隊相距七十五丈次隊䕶軍驍騎列陣每旗廣一百十有一丈共廣八百八十八丈自次隊至頭隊相距十有五丈頭隊䕶軍驍騎列陣每旗廣一百十有一丈共廣八百八十八丈頭隊左右應援兵列陣每旗廣五十五丈五尺共廣四百四十四丈合計頭隊護軍驍騎兩翼護軍驍騎列陣共廣千三百三十二丈頭隊之前前鋒列陣每旗廣十有二丈共廣九十六丈自頭隊至鹿角相距二十五丈漢軍鹿角火礮鳥槍列陣廣三百三十八丈火器營鳥槍護軍驍騎列陣每旗廣三十七丈共廣二百九十六丈合漢軍鹿角火礮鳥槍火器營兵列陣共廣六百三十四丈自鹿角至初次進步相去二十丈自初次進步七丈五尺以至九進共六十七丈五尺頭隊兵出鹿角外列陣去鹿角十有五丈呼譟前進五十步駐立去鹿角外列陣處二十五丈殿軍殿後處去前進駐立處十有五丈前離八旗號纛五丈八旗號纛與閲武臺相距百五十丈自立營處至閲武臺相去四百十有二丈五尺大閲陣法及將士甲兵槍礮旗纛金鼔畫角鳴螺鹿角之數均以是為定制凡操兵八旗官軍歲以春月分操於本旗教場二次合操於鑲黄正黄二旗敎場一次秋月豫奏操期會八旗諸營大操於仰善窪二次其大操隊伍號令及官軍旗纛器械之數均如大閲之制漢軍旗藤牌軍每歲春秋二季均四旗合操二次八旗合操一次遇大閲及八旗諸營大操之時仍守護大礮入陣演習八旗鳴螺歲以春二月十五日至三月一日秋七月十五日至八月一日晨集軍士吹演兵部委官稽察凡演試火器漢軍歲以春二月十六日秋八月十六日為始各演鳥槍四十五日本翼四旗仍合操二次春秋各演標準三次歲由兵部奏演神威將軍等礮鑲黄旗漢軍都統㑹八旗列名奏請簡命都統副都統各二人監視先期運礮至蘆溝橋樹的以百弓為率自九月一日始每礮日演十出至一月止鳥槍營及礮營每三歲一合操其金鼓號令均如大閲之制凡校射八旗驍騎營以每月上旬四八日中下旬三八日為校射之期都統以下各官親往閲視若遇奏事及會議之日畱副都統一人往閲春秋擐甲胄步射二次由本旗定期移文兵部馬射由兵部定期通行八旗均遣官稽察叅校一二次失操者記過三次叅處軍士一二次失操者鞭責三次責革都統副都統不親詣敎場或徇庇官軍者察出幷論先期以閲射官銜名册送稽察御史臨期視操有不遵定例者叅劾凡練習步獵歲以初冬依行圍之法步獵二次或三次直年都統等會八旗定期具奏各旗都統副都統簡校選兵率往郊野親視操演授官凡授官拔擢論才品推升計資俸保舉視政績記名即升與卓異應升分先後以定正陪繫本旗及兩旗公補之官由本旗及兩旗都統繫八旗公補之官由直年都統均引見候㫖補授六品以下注册五品以上咨兵部彙疏以聞八旗都統副都統駐防將軍都統副都統均由兵部疏請補授詳見兵部滿洲叅領由本旗都統列副叅領五人並移宗人府領侍衛府簡選宗室侍衛鎮國將軍以下奉國將軍以上咨送列名蒙古漢軍叅領列副叅領五人均引見補授副叅領於印房理事之佐領世爵及應升各官内選擬正陪引見補授世襲佐領三等國初各部落長率其屬來歸授之佐領以統其衆爰及苖裔者曰勲舊佐領繫適長房承襲者員闕以其子孫擬正以支庶曾管此佐領之子孫擬陪如承襲人無嗣及以罪廢子孫例不得襲仍於適長房分出之支簡選擬正繫支庶承襲者員闕亦以其子孫擬正以適長房之子孫擬陪如承襲人無嗣及以罪廢子孫例不得襲於適長房無佐領之支簡選擬正於通族内簡選擬陪及列名備用奉㫖分給各支者按支分襲奏明衆支均與者每支選擬一人不分正陪適長房之子孫願讓與支庶子孫承襲者繫曾管此佐領人子孫方準義讓始授佐領人無嗣未經立後有親兄弟暨伯叔之子孫者不論曾否管此佐領均得與正陪之選若伯叔祖雖曾管此佐領其子孫均不得與承襲人無嗣繼族子為後者得與正陪之選繼異姓為後不得與一支有兩三佐領者以未管佐領人子孫擬正已襲佐領人子孫擬陪兩支各管一佐領者以承襲本支佐領人子孫擬正别支擬陪兩支族人列名擬備攜挈族里倡義歸誠或功在旂常得賜戸口爰立佐領奕葉相承者曰世管佐領繫始授佐領人子孫承襲者員闕以其子孫擬正以别支曾管此佐領人子孫擬陪繫始授佐領人伯叔兄弟之子孫承襲者員闕仍以始授佐領人子孫擬正以其伯叔兄弟之子孫擬陪族人均列名擬備始授佐領人無嗣未經立後以兄弟之子孫承襲無兄弟子孫次及伯叔之子孫無伯叔子孫次及近族不論曾否管此佐領均得擬正擬陪若兄弟之子孫未襲以伯叔之子孫承襲者員闕以兄弟之子孫擬正其伯叔之子孫與選正陪伯叔祖曾伯叔祖曾管此佐領者其子孫但準擬陪髙祖以上及於遠族曾管此佐領者其子孫但準列名均不得擬正始授佐領人子孫願讓與伯叔兄弟子孫及遠族承襲者不論曾否管此佐領均準義讓因本支已有佐領於别支有分之佐領不願與選者聽至一族編成之佐領以承襲人子孫擬正於通族簡選擬陪及列名擬備戸少丁稀合編佐領兩姓三姓迭為是官者曰互管佐領員闕以未管佐領人子孫擬正已管佐領人子孫擬陪餘與勲舊佐領同皆由都統等造具譜牒分系列名名下注應襲所由進呈御覽引見補授盛京八旗及游牧察哈爾世襲佐領同公中佐領以本旗不兼部務之世爵及一品以下五品以上文武官内簡選滿洲䝉古驍騎校於本佐領下䕶軍領催内選二人擬正陪引見漢軍驍騎校於本佐領下領催内選擬正陪領催不得人於出征効力年久之驍騎内選擬如本佐領下不得其人於本旗内選擬均由本旗都統等引見補授信礮總管於八旗輕車都尉騎都尉信礮官内簡選由直年都統等引見補授監守信礮官於騎都尉雲騎尉䕶軍校驍騎校及六七八品官内選擬正陪城門吏於前鋒䕶軍領催驍騎内選擬正陪均由本旗都統引見補授犧牲所牧於八旗騎都尉雲騎尉内選擬守䕶陵寢總管由旗調取本處翼領一人翼領調取本處防禦一人均由直年都統等引見補授翼領距京路逺者列名以請或在外無應列名之人於在京應升人内簡選防禦由總管於本