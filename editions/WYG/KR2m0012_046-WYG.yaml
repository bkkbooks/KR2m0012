  text: 欽定四庫全書欽定大清會典卷四十六
  hash: sha256:821dda6e828b025ed9707ed6a13b0362ef238228f71e7286b345aadcb5857c9e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_046-1a, image: WYG0619/WYG0619-0379c.png}
body:
  text: 禮部祠祭清吏司中祀三凡饗先農之禮為壇一成於正陽門外耤田之西嵗以仲春吉亥皇帝躬耕帝耤於南郊迺親饗先農之神以祈先嗇先農神位南嚮設黄幄帛一牛一羊一豕一登一鉶二簠簋各二籩豆各十尊一爵三琖三十鑪一鐙二豫日樂部設中和韶樂於壇下分左右懸祭日鑾儀衞陳法駕鹵簿於午門外辰時三刻太常卿詣乾清門告時皇帝御祭服乗禮輿出宮前引後扈如常儀駕發警蹕午門鳴鐘法駕鹵簿前導不陪祀王公百官咸朝服跪送導迎鼓吹設而不作禮部尚書率太常官恭請神位安奉黄幄畢贊引太常卿二人恭導皇帝入壇東門内降輿盥洗由午階陞壇至黄幄次拜位前北嚮立鴻臚官引陪祀王公百官於壇下左右序立均北面典儀官贊樂舞生登歌執事官各共迺職以下自瘞毛血迎神至送神望瘞皆典儀官唱贊武舞八佾進贊引官奏就位皇帝就拜位立迺瘞毛血迎神司香官奉香盤進司樂官贊舉迎神樂奏永豐之章凡舉樂皆司樂官唱贊後同贊引官奏就上香位恭導皇帝詣香案前立司香官跪進香贊引官奏上香皇帝立上柱香次三上瓣香奏復位皇帝復位奏跪拜興以下行禮皆有奏皇帝行三跪九拜禮王公百官均隨行禮奠帛爵行初獻禮司帛官奉篚司爵官奉爵詣神位前奏時豐之章舞干戚之舞司帛官跪奠帛三叩司爵官跪獻爵奠正中皆退司祝至祝案前跪三叩奉祝版跪案左樂暫止皇帝跪羣臣皆跪司祝讀祝畢詣神位前跪安於案三叩退樂作皇帝率羣臣行三拜禮興樂止武功之舞退文舞八佾進行亞獻禮奏咸豐之章舞羽籥之舞司爵官跪獻爵奠於左儀如初獻行終獻禮奏大豐之章舞同亞獻司爵官跪獻爵奠於右儀如亞獻樂止文德之舞退太常官贊答福胙光禄卿二人就東案奉福胙至神位前拱舉降立於皇帝拜位之右侍衞二人進立於左皇帝跪左右執事官皆跪右官進福酒皇帝受爵拱舉授左官進胙受胙亦如之三拜興率羣臣行二跪六拜禮徹饌奏屢豐之章徹饌畢送神奏報豐之章皇帝率羣臣行三跪九拜禮有司奉祝次帛次饌次香恭送瘞所皇帝轉立拜位旁西嚮候祝帛過復位迺望瘞奏慶豐之章恭導皇帝降階詣望瘞位望瘞奏禮成恭導皇帝詣太嵗殿上香畢入具服殿更衣禮部尚書率太常官恭請神位還御王公百官出壇西門更衣入恭竢皇帝行躬耕禮詳見儀制司遣官行禮由壇西門入行禮於壇下上香時太常贊禮郎贊升壇升降均由東階不飲福受胙王公不陪祭禮成順天府尹率屬行耕耤禮奉天府尹直省督撫率所屬府州縣均嵗以仲春吉亥行耕耤禮各於治所東郊建先農壇朝服行禮用帛一羊一豕一鉶二簠簋各二籩豆各四尊一爵三餘儀與直省祭社稷壇同禮成更采服率屬行耕耤禮凡饗先􅁞之禮為壇一成於西苑之東北嵗以季春吉已皇后躬親􅁞事迺饗先􅁞之神以率女紅先􅁞神位南嚮設黄幄帛一牛一羊一豕一登一鉶一簠簋各二籩豆各十尊一爵三琖三十鑪一鐙二豫日樂部率掌儀司内監設樂於壇下左右祭日鑾儀衞率内監陳皇后儀駕於順貞門外辰時五刻太常卿暨内務府總管詣乾清門告時宮殿監督領侍轉奏皇后禮服乘鳳輿出宫儀駕前導陪祀妃嬪咸乗輿從由順貞門神武門北上門入陟山門至壇門外降輿前引女官十人贊引女官二人恭導皇后由左門入至具服殿妃嬪入配殿恭候傳贊女官引公主福晉命婦位於壇下東西面􅁞宮令恭請先􅁞神位安奉黄幄畢相儀女官奏請行禮皇后出具服殿盥洗妃嬪隨行贊引女官恭導皇后由午階陞壇至黄幄次拜位前北嚮立前引女官十人於階下兩旁序立相儀女官二人隨升壇左右稍後僉立傳贊女官引陪祀妃嬪公主福晉命婦於壇下各就位序立均北面典儀女官贊執事官各共迺職以下自迎神至送神皆典儀唱贊贊引奏就位皇后就拜位立迺瘞毛血迎神司香女官奉香盤進司樂女官贊舉迎神樂奏庥平之章凡舉樂皆司樂唱贊贊引奏就上香位恭導皇后詣香案前司香女官跪進香贊引奏跪皇后跪奏上香皇后上柱香次三上瓣香奏復位皇后復位奏跪拜興以下行禮皆有奏皇后行六肅三跪三拜禮妃嬪以下均隨行禮奠帛行初獻禮司帛女官奉篚司爵女官奉爵詣神位前奏承平之章司帛跪奠帛一叩司爵跪獻爵奠正中皆退行亞獻禮奏均平之章司爵跪獻爵奠於左儀如初獻行終獻禮奏齊平之章司爵跪獻爵奠於右儀如亞獻樂止女官一人贊答福胙奉福胙女官二人就東案奉福胙至神位前拱舉降立於皇后拜位之右受福胙女官二人進立於左皇后跪左右執事女官皆跪右官進福酒皇后受爵拱舉授左官進胙受胙亦如之行一拜禮興率妃嬪以下行四肅二跪二拜禮徹饌奏柔平之章徹饌畢送神奏洽平之章皇后率妃嬪以下行六肅三跪三拜禮執事女官奉帛次饌次香恭送瘞所皇后轉立拜位旁西嚮候帛饌過復位迺望瘞樂作恭導皇后降階詣望瘞位望瘞奏禮成恭導皇后至具服殿更衣􅁞宫令恭奉神位還御皇后乗輿還宫妃嬪從公主福晉命婦以次退翼日行躬桑禮詳見儀制司遣妃恭代行禮至壇門外降輿由右門入行禮於壇下上香時贊引女官贊升壇升降皆由東階不飲福受胙妃嬪不陪祀餘儀同翼日􅁞宮令監視􅁞母􅁞婦行採桑禮如皇帝遣官行禮與饗先農禮同欽定大清㑹典卷四十六
