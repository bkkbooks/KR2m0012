front:
  text: 欽定四庫全書欽定大清會典卷五十五
  hash: sha256:a705947dce36edb348b466d82e535e49bde75748c89cbbb1c4a12ae31b3550c4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_055-1a, image: WYG0619/WYG0619-0473c.png}
body:
  text: 禮部祠祭清吏司護日䕶月附凡日月食由欽天監豫推交食時刻及食之分秒具疏以聞旨下通行直省及四夷屬國奉正朔者按欽天監所推時刻分秒隨地測驗祗行救䕶凡䕶日食之禮部委祠祭司郎中一人暨欽天監博士一人赴觀象臺測驗禮部設香案於露臺上隨食時早晩為嚮設各官拜位於香案前鴻臚寺鳴贊二人糾儀御史四人禮部監禮司官四人序立於案左右鑾儀衞陳金鼓於儀門外左右文武有頂帶官以上咸朝服齊集欽天監候時官以日初虧告鴻臚官引各官就拜位序立鳴贊贊上香禮部尚書詣香案前上香贊跪叩興暨各官行三跪九叩禮贊跪禮部尚書就案前跪衆皆跪和聲署官二人奉鼓及枹進贊伐鼓救䕶禮部尚書援枹伐鼓者三儀門金鼓皆作禮部堂官更畨上香各官分班祗跪儀同候時官以日復圓告金鼓止衆聽贊行三跪九叩禮如初禮成皆退月食於太常寺行禮救䕶儀與䕶日禮同直省救護日月食省會於督撫署各府州縣各於其公署齊集自初虧時鳴金鼓至復圓止上香行禮儀均與京師同方伎凡陰陽家由直省有司官擇明習術數者申督撫咨部給劄為陰陽學府州縣各一人府曰正術從九品州曰典術縣曰訓術均未入流以轄日者形家之屬禁其幻妄惑民郡邑有大典禮大興作卜日候時用之凡醫師由直省有司官選諳於醫理者咨部給劄為醫學府州縣各一人府曰正科從九品州曰典科縣曰訓科均未入流凡疾醫瘍醫咸屬之民有疾病者疕瘍者使醫分治獄囚病視療亦如之官給其藥餌故者結報有詐病而扶同欺隱者罪之凡民有出家為僧道者置首領以約束之在京師者曰僧錄司左右善世二人正六品闡教二人從六品講經二人正八品覺義二人從八品曰道錄司左右正一二人正六品演法二人從六品至靈二人正八品至義二人從八品由部選擇移吏部補授在直省者府曰僧綱道紀州曰僧正道正縣曰僧會道會均未入流府二人州縣各一人由直省咨部給劄均擇其樸謹者為之仍服方外衣冠不得與職官並列僧道不守規律者聽所司究治若所犯事涉軍民聽有司訊鞫有作姦犯科者論如法編管為民僧尼受戒者給度牒道士女冠給執照年逾四十許授徒一人以牒照相傳若僧未受戒及道有室者不得授徒牒照止其身送部彚銷寺觀以僧道為廟祝有遠方僧道投止驗無牒照即報有司訊究私留者論婦女入廟游觀廟祝不禁拒者罪與本人同僧道不得於市肆誦經托鉢陳說因果歛聚金錢違者懲責游手頑民託名方外或指稱仙佛謬許前知以惑民聽者從重治之若創立無為白蓮焚香聞香混元龍元洪陽圓通大乗等教誘致愚民男女擾雜擊鼓鳴金迎神賽會者論如律步軍綂領五城司坊及直省守土官嚴行禁止内監凡民有願為内監者十五歲以内具保呈部十五歲以外本籍州縣官具結送部由部咨送内務府察驗收用欽定大清會典卷五十五
