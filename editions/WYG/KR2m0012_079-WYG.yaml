body:
  text: 理藩院尚書一人左右侍郎各一人均滿洲或以䝉古補授額外侍郎一人特簡䝉古貝勒貝子之賢能者任之掌内外藩䝉古囘部之政令控馭撫綏以固邦翰所屬有旗籍王㑹典屬柔逺徠逺理刑六司旗籍清吏司郎中滿二人䝉古一人員外郎滿三人䝉古四人主事䝉古一人掌䝉古科爾沁等諸部落封爵㑹盟及歸化城索倫除授官校之事王㑹清吏司郎中滿洲䝉古各一人員外郎滿三人䝉古二人主事滿洲䝉古各一人掌科爾沁等諸部落朝貢祿賜之事典屬清吏司郎中滿洲䝉古各一人員外郎滿五人䝉古四人主事滿洲䝉古各一人掌喀爾喀及西徼䝉古厄魯特諸部落封爵㑹盟準疆屯田游牧察哈爾喇嘛番僧承襲之事柔逺清吏司郎中滿一人員外郎滿二人䝉古三人主事䝉古一人掌喀爾喀等部落及喇嘛番僧朝貢祿賜之事徠逺清吏司郎中䝉古一人員外郎滿洲䝉古各二人主事滿洲䝉古各一人掌哈密吐魯番及囘部諸城爵禄貢賦並移駐囘民耕牧之事理刑清吏司郎中滿洲䝉古各一人員外郎滿洲䝉古各三人主事滿一人掌䝉古及番囘刑罰之事銀庫司官二人於本院司官内奏委司庫滿一人筆帖式滿二人庫使滿二人掌帑金出納䝉古繙譯房員外郎主事各一人於本院司官内簡委唐古忒學司業助教各一人筆帖式䝉古四人稽察内館外館二人由科道各部司官内奏委堂主事滿二人䝉古三人漢軍一人譯書漢文堂主事滿洲漢軍各一人校正漢文官二人於内閣翰林院侍讀學士侍讀内奏委每三年更代司務滿洲䝉古各一人筆帖式滿三十六人䝉古五十五人漢軍六人分𨽻各司視事之繁簡以為額旗籍清吏司國家肇基東土威德逺播漠南䝉古諸部落或誼屬戚畹或著有勲績或率先歸附咸奉其土地人民比於内臣設官分職編户比丁與八旗無異定鼎以來屏藩攸寄帶礪之封爰及苗裔録功存舊事隸所司凡疆理科爾沁等二十五部落之地東至盛京黒龍江西至厄魯特南至長城北至朔漠袤延萬有餘里科爾沁東至扎頼特西至扎魯特南至盛京邊牆北至索倫東西八百七十里南北二千一百里至京千二百八十里扎頼特東至杜爾伯特西與南均至郭爾羅斯北至索倫東西六十里南北四百里至京二千有十里杜爾伯特東至黒龍江西至扎頼特南至郭爾羅斯北至索倫東西百七十里南北二百四十里至京二千五十里郭爾羅斯東至吉林西與北均至科爾沁南至邊牆東西四百五十里南北六百六十里至京千八百九十七里敖漢東至奈曼西至喀喇沁南至土黙特北至翁牛特東西百六十里南北二百八十里至京千有十里奈曼東至喀爾喀左翼西至敖漢南至土黙特北至翁牛特東西九十五里南北二百二十里至京千一百十里翁牛特東至阿祿科爾沁西至熱河禁地南至喀喇沁及敖漢北至巴林及克西克騰東西三百里南北百六十里至京七百六十里巴林東至阿祿科爾沁西至克西克騰南至翁牛特北至烏朱穆秦東西二百五十一里南北二百二十三里至京九百六十里扎魯特東至科爾沁西至阿祿科爾沁南至科爾沁及喀爾喀左翼北至烏朱穆秦東西百二十五里南北四百六十里至京千五百十里喀爾喀左翼東至科爾沁西至柰曼南至土黙特北至扎魯特及翁牛特東西百二十五里南北二百三十里至京千二百十里阿祿科爾沁東至扎魯特西至巴林及翁牛特南至喀爾喀左翼北至烏朱穆秦東西百三十里南北四百二十里至京千三百四十里克西克騰東至翁牛特及巴林西至正藍旗游牧察喀爾及蒿齊忒南至翁牛特北至烏朱穆秦東西三百三十四里南北三百五十七里至京八百十里土黙特東至盛京養什木西至喀喇沁南至邊牆北至敖漢及喀爾喀左翼東西四百六十里南北三百十里至京千里喀喇沁東至土黙特及敖漢西至正藍旗王屯界南至邊牆北至翁牛特東西五百里南北四百五十里至京七百六十里烏朱穆秦東至索倫西至蒿齊忒南至巴林北至瀚海東西三百六十里南北四百二十五里至京千一百六十三里阿霸垓東至阿霸哈納爾西至蘇尼特南至正藍旗游牧察哈爾北至瀚海東西二百里南北三百十里至京千里蒿齊忒東與北均至烏朱穆秦西至阿霸垓南至克西克騰東西百七十里南北三百七十五里至京千一百八十五里蘇尼特東至阿霸垓西至四子部落南至正藍旗游牧察哈爾北至翰海東西四百有六里南北五百八十里至京九百六十里阿霸哈納爾東至蒿齊忒西至阿霸垓南至正藍旗游牧察哈爾北至瀚海東西百八十里南北四百三十六里至京九百六十里四子部落東與北均至蘇尼特西至歸化城土黙特及喀爾喀右翼南至鑲紅旗游牧察哈爾東西二百三十五里南北二百四十里至京九百六十里喀爾喀右翼東至四子部落西至毛明安南至歸化城土黙特北至瀚海東西百二十里南北百三十里至京千一百三十里吳喇忒東至毛明安及歸化城土黙特西至鄂爾多斯南至黃河北至喀爾喀右翼東西二百十有五里南北三百里至京千五百二十里毛明安東至喀爾喀右翼西至吳喇忒南至歸化城土黙特北至瀚海東西百里南北百九十里至京千二百四十里鄂爾多斯東至歸化城土黙特西至喀爾喀右翼北至吳喇忒三靣距河南至陜西界長城是為河套自山西偏關縣界至陜西寜夏衛袤延二千餘里至京千一百里歸化城土黙特東至四子部落西至鄂爾多斯南至山西界長城北至喀爾喀右翼及毛明安東西四百有三里南北三百七十里至京千一百六十里凡旗制科爾沁六旗扎頼特杜爾伯特均一旗郭爾羅斯二旗敖漢奈曼均一旗翁牛特巴林扎魯特均二旗喀爾喀左翼阿禄科爾沁克西克騰均一旗土黙特二旗喀喇沁三旗烏朱穆秦阿霸垓蒿齊忒蘇尼特阿霸哈納爾均二旗四子部落喀爾喀右翼均一旗吳喇忒三旗毛明安一旗鄂爾多斯七旗歸化城土黙特二旗凡封爵親王郡王貝勒貝子公鎭國公輔國公為五等秩視宗藩世襲罔替自扎薩克外皆屬散秩公主之子親王之子弟授一等台吉惟土黙特左翼喀喇沁全部稱塔布囊凡言台吉者塔布囊同後仿此郡主之子郡王貝勒之子弟二等縣主郡君縣君之子貝子公之子弟三等台吉之子弟槩授四等均品如其等竢十八歳入班供職若簡用扎薩克則秩皆一等應襲爵之親王長子秩視公郡王貝勒長子視一等台吉貝子公長子視二等如長子不稱襲爵於餘子内擇其優者報院奏聞届期承襲科爾沁親王郡王各四人貝勒二人貝子一人鎭國公二人輔國公六人扎頼特貝勒一人杜爾伯特貝子一人郭爾羅斯鎭國公輔國公一等台吉各一人敖漢郡王二人貝子一人輔國公二人奈曼郡王一人翁牛特郡王貝勒貝子鎭國公各一人巴林郡王一人貝子二人輔國公一人扎魯特貝勒二人鎭國公一人喀爾喀左翼貝勒一人阿禄科爾沁貝勒一人克西克騰一等台吉一人土黙特貝勒貝子各一人附喀爾喀貝勒一人喀喇沁郡王一人貝子二人鎭國公一人輔國公二人一等塔布囊一人烏朱穆秦親王貝勒鎭國公輔國公各一人阿霸垓郡王二人貝子輔國公各一人蒿齊忒郡王二人蘇尼特郡王二人貝勒輔國公各一人阿霸哈納爾貝勒貝子各一人四子部落郡王一人喀爾喀右翼貝勒一人貝子二人鎭國公一人吳喇忒鎭國公二人輔國公一人毛明安貝勒一等台吉各一人鄂爾多斯郡王一人貝勒二人貝子三人輔國公一等台吉各一人歸化城土黙特輔國公一人凡册誥親王郡王貝勒受封賜册貝子公以下賜誥命各赴闕祇領有故不能來者報院遣官齎送遺失者罪之因水火盜賊失毁者準復給凡譜系䝉古諸部落世次及錫封根源備載於册藏諸内府十年一修換出舊册凡儀從親王銷金赤繖二纛二小旗十典儀四品五品各一人郡王銷金赤繖一纛一小旗八典儀五品六品各一人貝勒赤繖一纛一小旗六典儀五品一人貝子赤繖一小旗六典儀六品一人公旗繖與貝子同典儀七品一人王貝勒貝子公冠服及長史司儀長䕶衛之制悉視宗藩惟馬韁非奉特賜不得用金黃紫色台吉冠服各從其品都統以下官校視在内都統副都統叅佐領驍騎校各殺一級凡軍功王貝勒貝子公量功議敘台吉得一等功牌六次以上者為一等三次以上者為二等一二次者為三等得二等功牌二次以下者槩為四等䝉古人以軍功賜達爾漢號者以功之大小别承襲之差等世襲者秩視都統雖世襲而功稍次者視副都統襲六次五次四次者視叅領襲三次二次及授本身者視佐領凡設官科爾沁等二十五部落五十一旗每旗扎薩克一人或繋世管或由簡任不拘爵秩協理旗務二人或四人以王貝勒貝子公台吉為之每百有五十丁設佐領一人驍騎校一人領催六人驍騎五十人六佐領設叅領一人佐領多者設都統一人副都統二人十佐領以下設都統副都統各一人都統副都統於本旗台吉内遴選以原爵兼任如台吉内無人於叅領内遴選叅領於佐領内遴選佐領於驍騎校内遴選以次遞升驍騎校領催選丁男有力者充補自都統以下有年老殘疾或才不勝任者罷之均由扎薩克秉公黜陟報院彚奏以聞歸化城土黙特副都統一人𨽻綏逺城將軍分翼其叅領佐領驍騎校及防禦等官均由該將軍等遴選擬定正陪送院引見補授圍場總管一人翼長二人五品官驍騎校各八人八溝駐劄司官一人筆帖式一人烏蘭哈達三座塔駐劄司官各一人凡移駐内地之索倫達虎里總管副管佐領驍騎校等官由黒龍江將軍遴選正陪送院引見補授凡㑹盟簡稽軍實廵閱邊防清理刑名編審丁册每三年疏列領侍衛内大臣散秩大臣一等侍衛滿九卿八旗都統副都統前鋒䕶軍統領暨本院尚書侍郎請簡命四人率刑部暨本院司官筆帖式齎勅以徃各扎薩克以時赴盟長所在罰後至者科爾沁扎頼特杜爾伯特郭爾羅斯四部落十旗為一㑹盟於哲里穆敖漢奈曼翁牛特巴林扎魯特喀爾喀左翼阿禄科爾沁克西克騰八部落十一旗為一㑹盟於召烏達喀喇沁土黙特二部落五旗為一㑹盟於卓索圖烏朱穆秦阿霸垓蒿齊忒蘇尼特阿霸哈納爾五部落十旗為一㑹盟於錫林郭爾四子部落喀爾喀右翼吳喇忒毛明安四部落六旗為一㑹盟於烏蘭察布鄂爾多斯七旗為一㑹盟於伊克召每㑹設盟長副盟長各一人歸化城土黙特㑹盟集於本城不設盟長聽簡命大臣裁決凡軍紀一旗戰郤一旗力戰在戰郤旗分分一佐領人丁給力戰之旗各旗皆戰一旗戰郤一旗之王貝勒等皆降為庶人所屬佐領盡數徹出散給各旗之力戰者若一旗之内力戰者半戰郤者半戰郤之王貝勒等降為庶人所屬佐領盡給本旗之力戰者若各旗未及整備而一旗獨先衝鋒斬獲立功者按功之大小獲之多寡分别給賞凡軍器自親王以下均不得私藏甲胄弓櫜鞬刀槍過二十鳥槍過十矢過千硫黃硝過三十斤者皆奏聞購買頒給信票沿途察驗放行不及前數者由院轉行兵部給票違者論如法凡比丁每三年由簡命㑹盟之大臣㑹同盟長編審如停止簡命由各扎薩克具册送院以聞以周知䝉古人丁之數丁男年十八以上六十以下者皆入册老疾除名隱匿者罪之每三丁共一驍騎遇有征伐以二丁遣戰一丁留家壯丁不務本業私投喇嘛為徒及為伍巴什者罪之婦女非年老殘疾不得為齊罕察凡户口以籍為慿乏嗣者告明佐領於族内擇繼族内無人方準乞養異姓不得私自繼立絶户家産聽扎薩克充公用凡族長每族各設一人擇有行誼能任事者為之台吉以下有不率者則舉以