  text: 欽定四庫全書欽定大清㑹典卷五
  hash: sha256:78fba0c4dcfe02d63bd223a3dc3ecc3af3c0511c3e6186cdd26ae5cb151508d4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_005-1a, image: WYG0619/WYG0619-0064a.png}
body:
  text: 吏部文選清吏司銓政凡滿漢出身之途由科目由貢監由廕生由薦舉由吏員遷秩改除在京四品以上及翰詹官在外運使以上官列名請特簡郎中道府以下循例銓選論俸序遷者曰推升不待俸滿者曰即升至署職試俸開復起復降補改補廻避告假悉有定制凡進士第一甲第一名授翰林院修撰二名三名授編修二甲三甲欽定庶吉士及分六部學習外滿洲進士記名以知縣用者按名次銓選餘以通政使司漢字知事國子監丞博士典簿詹事府主簿光禄寺署丞翰林院典簿等官序科選用並考取順天府滿教授漢進士或以知縣教授即用或以知縣教授歸班序選均竢引見欽定凡舉人授職近省竢㑹試三科後遠省福建湖南四川兩廣雲南貴州㑹試一科後呈部注册以知縣用如願就教職注册以教職用均序科銓選以知縣用者屆選咨取赴部時督撫覈騐如年力已衰即改用教職直隸州州同亦以舉人選用升轉與知縣同滿洲舉人選用知縣小京官及考補順天府教授均與滿洲進士同凡貢監考職以賔興之年五月文結限三月内到部考試不得濫取入選者覆試恩㧞副榜貢生分三等錄用一等以州同用二等以州判用三等以縣丞用捐貢監生分二等錄用一等以主簿用二等以吏目用均注册候選貢生考職不限年監生未滿三年不與考其考授職銜未經選用者仍聽鄉試凡廕叙滿官一品廕生以員外郎用二品以各部院主事都察院經歴大理寺寺正光祿寺署丞用由侍郎廵撫􅄻者專以主事用三品以通政使司經歴太常寺典簿光祿寺典簿各部寺司庫用四品以鴻臚寺主簿用年二十以上咨部引見或以旗員用或分部學習均竢欽定分部者二年期滿甄别優者奏留題補其次歸班選用平庸者令回旗分䝉古漢軍一品廕生以員外郎用二品以主事用漢軍以大理寺寺正兼用三品四品以部院筆帖式用其隨旗行走分部學習之例均與滿官同漢文武官正一品廕生以員外郎治中用從一品以主事用由尚書左都御史總督廕者以員外郎用正二品以主事都察院經歴京府通判用由侍郎廵撫廕者内用專以主事選從二品以光祿寺署正大理寺寺副用正三品以中書科中書大理寺評事太常寺主簿博士通政使司經歴用從三品以光祿寺典簿鑾儀衛經歴詹事府主簿京府經歴用四品官廕監與貢監一例考職序選其奉㫖外用者正一品廕生以同知用從一品以知州用二品以通判用三品以知縣用漢文武官恩廕生到部奏請命大臣考試入選者引見以京外官錄用竢欽定後照例銓選文理荒謬者回籍讀書三年再試有夙嫻武藝願就武職者咨兵部漢文職難廕三品以上官廕知州四品以下官廕知縣布按首領及州縣佐雜官六七品者廕縣丞八九品者廕縣主簿未入流廕吏目漢軍同凡薦舉徴召賢良方正山林隠逸之士督撫確訪具題送部請㫖愽學宏辭科奉特㫖舉行或令三品以上及科道官保舉或令督撫學政疏薦召試入選者均以翰林官酌量補用督撫幕賔有才猷出羣者許特疏薦引司道以下幕賔申督撫保題均送部請㫖考試分别録用凡考試筆帖式試繙譯一道按旗定額滿洲每旗十人蒙古漢軍每旗三人注册序選年未及十八者停選不入班次人員遇闕即補餘各按旗分班銓用食俸視出身品級為差筆帖式由舉人恩㧞嵗副貢生考取者七品由生員監生考取者八品由官學義學生閒散及親軍䕶軍領催庫使驍騎考取者九品在京見任筆帖式每三年考試一次入選者留任不入選者黜退如能學習三年後許再試一次臨試不到者議處有故不與者補試盛京筆帖式由盛京兵部於本處旗人内考取以試卷封進欽㸃大臣覆閱等第奏定後注册送盛京兵部以次擬補見任者循例三年一試其分别去留學習再試及議處補試之例均與在京筆帖式同陵寢筆帖式及各省督撫駐防城守尉等衙門筆帖式由京補用六年期滿各該處注考送部以京闕補用各省駐防將軍都統副都統衙門筆帖式由該將軍等於本處駐防旗人内考取其閱卷注册序補之例與盛京筆帖式同凡吏員授職在京書吏供事在外吏攢均五年役滿考職詳見驗封司分四等一等以府經歴用二等以主簿用三等以從九品雜職用四等以未入流雜職用在京事繁書吏役滿勤慎無過倉書役滿無虧空均免考以從九品未入流兼掣選用禮部儒士三年期滿免考職以鑄印局大使及外府檢校京外典史選用盛京各部及在京八旗外郎六年期滿考職以州同州判縣丞分别錄用凡考選翰林院庶吉士由二甲三甲進士考試命王公大臣公同驗閱引見欽授於大臣内簡用滿漢教習各一人三年期滿考試欽定甲乙引見留翰林院者二甲除編修三甲除檢討餘分別授官詳翰林院監察御史滿洲蒙古由郎中員外郎内閣侍讀漢由編修檢討郎中員外郎主事内閣侍讀中書科中書大理寺評事太常寺博士考選主事非由中書評事博士升任者二年俸滿方準考選中書評事博士非由知縣升任者不準考選各堂官擇屬官之勤敏練達立心正直者保送吏部滿洲蒙古不考試漢軍漢人由部請㫖考試均竢引見記名遇滿洲蒙古員闕以郎中二人員外郎等官一人漢員闕以翰林一人部屬二人引見簡用漢人不由正途出身進士舉貢為正途捐貢不與及見任京官三品以上外省督撫之子弟均不得考選凡開列大學士以下至京堂翰林詹事官員闕均以應升官列名題請簡用應補者列名在應升官之前其轉補之員及其次應升外官應升均於疏内具名單進呈本部尚書侍郎以各部院尚書侍郎轉補六部左侍郎以右侍郎轉補翰林院侍讀學士以侍講學士轉補侍讀以侍講轉補左春坊左庶子左中允左贊善均以右轉補總督以左都御史侍郎廵撫開列廵撫以學士左副都御史府尹布政使開列本省布政使不開列布政使以按察使開列按察使以運使各道開列運使以知府開列直隸江南浙江學政以侍讀侍講洗馬中允贊善開列餘省以俸深編修檢討十人郎中十人開列題授三年任滿題請更代其京堂科道及翰詹衙門侍講學士庻子以上間奉特旨簡用凡月選京官郎中以下外官道府以下均分雙單月選補審其資格覈其班次書籖彌封令應選人親掣旗員定於每月之初五日漢員以月之二十五日筆帖式以月之二十日在籍選補與外任擬升及出使移疾不能赴部者本部堂官代掣有事故者扣除應選知縣之各省進士舉人及應升知縣之首領佐貳教職等官先期檄令赴部曰截取以次選用將畢復截取如前八品以下選補均不赴部閏月不選京察大計之年是月内外官均暫停升補竢考覈具題命下後仍按班升補旗員月選雙月有廕監學習進士散館庻吉士年滿大使三庫司庫等班單月有捐納議叙降調開復期滿教習年滿倉官等班雙單月均有進士舉人内用班按班序選惟奉㫖即用扣選别補迴避調京及指部人員均不入班次雙單月皆得先用病痊應補者單月不入班次即用丁憂過班人員各按原選月分先補計闕序補人員各按原定闕數銓補漢員月選雙月有廕監教習肄業議叙就職考職役滿等班單月有行取外轉服滿開復降補七品京官鹽場期滿等班雙單月均有學習進士散館庻吉士進士舉人俸滿教職捐納明通等班按班序選惟奉㫖即用裁汰别補扣除别選親老改補近省服滿坐補原部及指定某部某省人員均不入班次雙單月先用迴避别補病痊坐補者歸於單月不入班次即用計闕序補人員與旗員同應選人赴部騐到滿五十五日者始得銓選每月朔赴部投供選授後集各員於午門㑹同九卿詹事科道驗看才品優長知之有素及行止不端出身不正者各舉以聞知縣内有年力就衰者請㫖以教職改用試各員履歴如政治確有所見繕摺敷陳者聽試卷進御奏請日期引見得㫖後具題除授月選知縣於籤選人員外以其次應選者按班備擬班各一人一同驗看考試同籤選官引見遇有扣除即以備擬人員簡用州縣選授福建有棚民之地及年逾六十而任在三千里外者均奏聞請㫖親老任遠者許呈明改選近省凡每月升調降革病故丁憂休致各員闕應歸月選者以科鈔及内外咨揭稽勲考功司付到之日均即日注册滿員闕以月之三十日為限漢員闕以月之二十日為限筆帖式員闕以月之十五日為限限前到者本月選限後到者次月選司官承辦遲延者分别議處凡論俸升轉旗員見任者遇應升應改員闕論俸擬正陪題補閱俸均則籤掣甲乙為序五品以下郎中科道侍讀侍講洗馬庻子司業通政使司叅議光禄寺少卿鴻臚寺少卿等官止以本任較俸餘均以入仕食俸日為始較屢任之俸武職改文職者通計武職所食之俸如由文授武復用文職者論前後兩任文職之俸武職俸不通論驍騎校䕶軍校前鋒䕶軍選補贊禮讀祝鳴贊等官以食餉二年準一年俸親軍考補侍衞筆帖式執事人對品題補部院員闕均以食餉之年通行論俸漢員升轉止以本任較俸漢軍以漢闕補用者論俸與漢人同外任官即升卓異者不論俸餘皆論俸推升司道閱俸二年始許升轉知府以下有邊俸有腹俸腹俸三年始許升轉閱邊俸二年半準三年邊俸腹俸相等者先升邊俸内外官員均從實授到任之日論俸其裁汰告假丁憂告病者補官後扣除離任月日仍通理前俸應降應革遇詔免議或降革後本案開復或革職留任後經開復者亦論前俸惟廢員奉㫖起用者前俸均不準理凡試俸旗員員外郎主事等官由特㫖補授及議叙選授無前俸者均試俸三年年滿中書掌槀筆帖式司獄三庫大使寳泉寳源二局大使升主事者與議叙同降補者試俸二年廕補初任者試俸五年有主事前俸特授員外郎等官者試俸一年俸滿推升者員外郎等官試俸一年主事等官試俸二年遴選保題者員外郎等官試俸三年内閣侍讀理事同知通判同主事等官試俸五年理藩院起居注等處堂主事領侍衛府步軍統領黒龍江吉林將軍等衙門筆帖式及倉官升授主事並委署主事學習期滿進士實授主事者皆同均竢年滿始得升轉在内郎中以下在外道府以下援例叙用者滿漢均試俸三年稱職實授漢内閣中書試俸一年稱職實授命徃試用之員自道府以下銜大於官銜與官相當者試用一年官大於銜者試用二年稱職實授凡即升議叙及卓異官不論俸遇應升有闕即升各省沿河沿海邊地苗疆官員分限三年五年均期滿保題即升煙瘴及水土惡劣地方各官分限二年三年五年均期滿即升詳見則例凡遴選升調直省道府員闕應歸月選者道以郎中知府府以員外郎同知推升序班銓選同知以下州縣以上以滿漢應用人員銓補其衝繁疲難之地或三項或四項道府以上請㫖簡用同知以下由督撫遴選題補至沿河沿海苗疆煙瘴臺灣等處均令督撫於屬官内遴選題補升任者引見補授調任者即令補授滿郎中見任及前任曽列京察一等或由堂官保送者始得升用道府試時務策一道引見記名論俸序用漢郎中閱俸二年員外郎閱俸三年始推用道府先期令各部堂官甄别宜繁宜簡及留部咨部引見後或注册序用或留部或改用及休致均候欽定其留部者屆應推時加一級以抵外用直隸州知州要地員闕或調由府屬知州調或升由知縣升令督撫遴選題補送部引見事簡者歸月選令各部堂官先期於滿漢主事及與主事品級相當之小京官内保送到部引見注册以次序用佐雜應調員闕令督撫遴選咨部彚題補授凡各省應題員闕督撫不得逾格保題惟遵㫖題補者如無合例之人許越銜題補應調員闕若合例無人或請升用或請部發均聽部議由部推升他省者如原任𦂳要必需舊員方許督撫題請以升銜留任竢留任五年後方準照升銜題補遇事故離任者屆補時仍赴升任之省補用餘不準行凡府州縣官閱俸五年以上始許題升三年以上始許題調升補後蒞任三年政績卓著者保題以賢員注册加一級又閱三年加銜注册即用其有卓異及即升俸深者仍循例推升所加之銜改加一級或員闕𦂳要果人地相須雖年例未苻亦許以調補升署之處據實奏請凡保題即升卓異候升人員未升時縁事離任應補時即予補用其已得推升未經引見縁事離任應補時不歸補班仍以原升班升用題升之員已準引見縁事離任於赴部候補日引見請㫖佐雜教職擬升擬選及題升議準奉㫖補授者遇有事故均於題補日以升銜補用凡援例叙用人員由生員例監吏員出身者未經保舉注册不得升京官及正印官京察一等大計卓異或題升京官及外任正印官一次均準以保舉注册凡議叙恭修實録玉牒及編纂諸書告成總裁纂修繙譯提調官及收掌謄録舉貢監生員供事書吏均由該館請㫖交部議叙以歲月久近等第優劣為衡或應升或叙用或加級紀録各有差刑部司官覆駮重犯出入得情外省遵駮改正者歲終彚叙每案予紀録二次各學教習三年期滿引見進士舉貢生員筆帖式等分别叙用降官視等第給紀録有差廢員列優等者視其原品予職銜有差如再留三年仍列一等者分别録用部院官兼内繙書房執事十年期滿列居優等者以應升予叙否則酌減京通各倉監督威逺堡等六口守闗官年滿保題以加級予叙盛京驛站正副監督年滿保題以應升予叙駐防軍營理餉司官筆帖式三年期滿回京視該將軍所列等第見任者加級紀録有差額外者分班補用坐臺筆帖式三年期滿回京視該管總管所列等第加級紀錄有差凡改補裁汰候補官以對品改授其額少選補無期者許呈明對品改用例得告降者許降品改補提舉運副通判州同州判衛經歴正九品之主簿等官外不準告降旗員以親老請養者候選人員以京官選應升外官者停其外升均以京官一例較俸升轉藩臬以下回京引見候㫖改用京官養親人員至應補外任之日如年己就衰停其外用世爵武職改補文職者輕車都尉叅領以郎中用騎都尉副叅領佐領以員外郎用雲騎尉以主事用䕶軍校驍騎校等以七品小京官用其世爵均仍帯於本身侍衛改用文職者一等侍衛以三品京堂用二等侍衛以四品京堂用均遇闕開列三等侍衛以郎中用四等侍衛以員外郎用藍翎侍衛以主事用均歸月選其世爵均仍帯於夲身直省不勝道府之人令督撫酌其才力或堪事簡之郡或堪府佐疏請改用否則勒令休致不得請以部員改補月選知縣引見改教者進士以教授即用舉人以學正教諭卽用督撫題請改教者繋遴選發往之人歸班改選繫選授之人送部引見凡降補三品以上降官按品補用降至四品以下者如對品無官可補許降品借補仍照原降之品食俸推升四品以上京堂降調不得補部院司官外任降官不得補正印官正途出身復由正印官降者仍許補正印官凡迴避京官尚書以下筆帖式以上祖孫父子伯叔兄弟不得同任一署令官卑者廻避官同則後補之人迴避外任官於所轄屬員有五服之族及外婣親屬母之父及兄弟妻之父及兄弟己之女婿適甥兒女婣親師生鄉㑹同考官取中者均令屬員迴避戸刑二部司官避本省司分順天直隸人員避五城指揮吏目漢軍避直隸府道以下等官亦不得用刑部司官外任官避原籍寄籍及鄰省接壤五百里以内教職止避本府如應迴避而隠匿及揑飾規避者議處凡給銜總督授都察院右都御史總河總漕同廵撫授都察院右副都御史其應否兼兵部尚書侍郎銜由部請㫖提督學政由部員簡用繋二甲進士出身者給翰林院編修三甲給檢討凡官員升任紀録準隨帯其軍功議叙加級及題明隨帯或文武改補品秩相等者原任加級均準隨帯其餘每級改紀録一次加級食俸者初升以食俸之級改尋常之級再升仍改紀録一次議叙加級見在本任每級準改紀録四次升任仍作紀録一次凡停升内外官員降革留任未經開復及見有議處之案未結者均停升旗員有欠項未完外官有罰俸之案亦停升凡給假旗員有祖父母父母在外省駐防患病欲迎歸者或祖父母父母及親兄弟在外省駐防病故欲迎喪者均許給假京堂以上自行陳奏餘由該堂官酌給假期以四閱月為限如非見任由本旗都統酌給有逾限者罪之中塗阻滯及病所在印官結報展限在京漢官告假回籍員闕即入月選食俸十年以上許省墓六年以上許省親五年以上許遷𦵏送親及歸娶不拘食俸均按逺近定限家居不得過四閱月聞親有疾或年七十以上急欲覲省者不拘俸亦不定限教職食俸三年以上有故許假歸由督撫酌給限期該處兼設訓導者兩官不得並假以一人兼攝未設訓導者令知州知縣暫攝凡給憑赴任量逺近為限吏部書憑吏科填限外任官親赴吏科畫憑一月以上不到有罰兩月以上奪職在籍候補候選及在外推升之州縣佐雜並卓異引見未滿三年之州縣以上等官文憑封發各督撫轉給抵任按季繳憑違限者吏科覈叅計月議處逾限不及一月或中塗風水及疾病阻滯者所在印官具結皆得免議引見回任及命徃各省試用者給照逾期議處與憑限同欽定大清㑹典卷五
