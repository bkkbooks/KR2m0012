body:
  text: 光禄寺兼管寺事大臣無定特簡員卿滿漢各一人少卿滿漢各一人掌大内膳羞及燕饗饔餼之需辨其物品以待供饋所屬大官署正滿漢各一人丞滿二人珍羞署正滿漢各一人丞滿二人良醖署正滿漢各一人丞滿二人掌醢署正滿漢各一人丞滿二人分掌餼牽禽魚酒醴鹽醢果蔬之物以時供具典簿滿漢各一人掌奏疏文移司庫滿二人掌庫帑出納筆帖式十有八人掌繙譯凡祭祀執事皇帝親祀壇廟前期本寺卿一人詣祭所監視刲牲祭日皇帝飲福受胙以卿一人進爵一人進胙祭畢署官率厨人舁福胙進尚膳房頒膰肉於陪祀各官凡大内膳羞視尚膳房來文供具恭遇車駕巡幸日需膳羞視内務府來文供具委署官二人隨行經理凡祭祀供具奉先殿毎月薦新由大官珍羞掌醢三署節序忌辰應用牲牷由大官署各備物以進奠筵凡近前饌筵隨筵午奠筵用麪一百二十斤以下及牲牷酒醴之屬均由寺供具其據内務府掌儀司來文取用者物價仍歸寺覈銷凡燕筵滿席視用麪多寡定以六等價直以是為差萬夀聖節及元日賜燕皇子成婚公主下嫁賜福晉父母額駙父母燕除夕賜下嫁外藩公主䝉古王公台吉等酒饌用四等筵燕朝鮮國及達賴喇嘛貢使用五等筵御經筵講書衍聖公來朝安南琉球西洋暹羅緬甸蘇禄南掌諸國貢使朝鮮國押貢官都綱喇嘛番僧用六等筵均滿席文武㑹試入闈出闈燕均用漢席正副考官知貢舉上席同考官監試御史提調中席内簾收掌外簾四所及禮部光禄寺鴻臚寺太醫院各執事官下席實録㑹典告成燕與㑹試燕同文武進士恩榮燕㑹武燕讀卷執事各官上席進士中席凡饔餼下嫁外藩公主郡主暨額駙館於京師月給牲禽朝鮮等諸國貢使日給脯資餼牽果蔬鹽醬盛京住持西藏番僧遣徒入貢陜西岷州諸寺番僧來京朝貢日給牲牽肉鹽分飭四署供具凡饋餼除夕賜下嫁外藩公主郡主暨額駙䝉古王公台吉筵席牲酒從官從人酒肉衍聖公入覲至京日應饋食品均由四署供具凡廪給咸安宫教習景山教習及内藥房製藥醫生欽天監通曉天文之西洋人各日給以肴饌盛京禮部送陵寢供品盛京吉林黒龍江將軍進水陸土産各官役盛京住持番僧領香徒衆給肉鹽十日戸部内務府所屬之捕牲烏喇進人參貂皮赫徵費雅喀等部落鄉長來京娶婦給肉鹽二十日歸并上三旗佐領之厄魯特䕶軍驍騎校給肉鹽一月盛京以北人戸移家來京計口給肉鹽三年索倫貢貂皮官兵壯丁朝鮮諸國貢使從人日給肉鹽飭四署按數供具應給各數詳禮部精膳司凡典守司庫收貯金器銀器及銅器之屬大官署收貯几席蓐墊之屬珍羞署收貯瓷器錫器及龍旗御杖之屬良醖署收貯釡甑勺箸釀具碾碓之屬有年乆損壊者以時修整凡奏銷嵗支戸部庫帑六萬兩及嵗入果園地租治備供用飲食物品設黄册房選滿漢署官各一人專司綜覈内用物品按月具奏内外支應銀數按月題銷嵗終彚奏仍具册彚題浮冒侵尅者論凡承應戸役設茶長以煎乳茶設園長以供果實均給之地以任其役設行戸以和買牲牽禽魚果蔬醯醬均隨物定直因時而酌劑焉太僕寺卿滿漢各一人少卿滿漢各一人掌兩翼牧馬場均齊賞罰之政所屬有左右二司左司員外郎滿一人䝉古一人主事滿一人䝉古一人掌䭾載幔城網城之駝以備巡幸之用右司員外郎滿一人䝉古一人主事滿一人䝉古一人掌察騐牧場馬匹盈虧以時印烙主簿滿一人掌章奏文移筆帖式滿八人䝉古八人掌繙譯凡扈從恭遇車駕巡幸列卿及少卿名奏請一人隨蹕豫備幔城網城䭾載橐駝於八旗取用沿途有罷憊者奏請更換凡司牧統轄兩翼牧場總管一人兩翼牧場總管二人副管一人防禦二人翼領四人驍騎校三人䕶軍校八人協領十人䕶軍三百十有四人馬群百九十二每群牧長牧副各一人牝馬群百六十每群牧丁八人牡馬群三十二每群牧丁十有四人統轄總管員闕以副都統等兼理總管員闕於察哈爾佐領世爵等官内簡選一人牧場翼領等官内簡選一人擬定正陪副管以下各員闕各將應用之人均擬定正陪由寺引見補授凡牧場分界左翼四旗自布濩衣卜拉克至察漢齊勞臺東西百五十里自都什山至巴顔托羅垓南北百三十里右翼四旗自努赫圖溝至烏赫爾齊勞東西百五十里自克衣格達瓦都得衣哈喇至布爾噶蘇臺河岸南北三十二里彼此不得侵越總管翼領各住適中之地約束牧長等加意牧放副管防禦驍騎校䕶軍校各於本翼本旗場内巡察嚴緝盗馬及墾耕者凡牧群左右兩翼設牝馬一百六十群毎群二百四十六匹至一百三十二匹有差扇馬三十二群毎群二百有五匹至五十九匹有差凡牧課毎年夏季列卿及少卿名請簡一人率屬赴牧場稽其孳生斃損之數分注於册三年均齊一次以定賞罰仍以均齊册送兵部覈奏牝馬群毎三馬三嵗徵孳生駒一以孳生正數外餘百六十匹者為上八十匹以上次之八十匹以下又次之正數内少百匹者為下五十匹以上次之五十匹以下又次之牧長牧副視上下等次以定賞罰牡馬群以在場見牧者為十分視馴習及斃損之多寡以定賞罰至協領以上各官各統計所管之馬按其孳生馴習及斃損之多寡賞罰有差順天府兼管府事大臣無定特簡員尹一人丞一人掌京畿治理所屬治中一人通判一人經歴一人照磨一人司獄一人知大興縣一人知宛平縣一人府學教授滿漢各一人訓導滿漢各一人均京朝官凡進春嵗以六月移欽天監按年建干支辨春牛之色先立春一月具疏進春設場東直門外豫製芒神土牛前一日率僚屬迎春於東郊立春日隨禮部恭進春於皇太后皇帝皇后儀詳禮部退率僚屬鞭春牛以示勸耕之意遂頒春於民間凡耕耤襄事恭製親耕耒耜絲鞭色黄從耕耒耜絲鞭色赤具青箱實穜稑先一日隨戸部恭進於保和殿竢皇帝閲畢送詣耕所至日具親耕黄犢尹進鞭丞奉青箱戸部侍郎播種從耕三王九卿黝牛治中以下官奉青箱播種禮畢率僚屬及耆老農夫行三跪九叩禮儀詳禮部畢視農夫終畝迺頒賞於耆農及秋玉粒告成呈禮部具疏交太常寺納於神倉以供祭祀粢盛凡經理錢穀府屬州縣田賦出納倉穀收支由尹就近稽覈㑹直𨽻總督奏銷凡祭祀供具嵗交太常寺犧牛二百以備入滌飭所屬州縣動帑和買壇戸廟戸庫夫犧牲所夫飭所屬州縣和雇禮部太常寺救䕶日月京師寺觀祈禱雨暘飭大興宛平二縣供香燭致祭金元明陵飭大興宛平房山縣昌平州供犧牲凡提督本府學政嵗科兩試八旗及大興宛平兩縣童生由丞校文録名册送學院考取入學凡順天鄉試以尹為監臨丞為提調三場試題由尹恭進試畢疏報掲曉日期榜發送題名録於内閣恭進皇太后皇帝皇后翼日㑹主考同考執事各官朝服集闕下率貢士謝恩畢赴府筵燕儀詳禮部凡㑹試供具豫提直𨽻布政使庫帑呈送禮部以大宛兩縣丞簿充外委官治備饔餼内委官入闈支應均聽禮部供給所稽覈事竣㑹部題銷凡殿試傳臚設采棚於長安左門外尹丞為一甲三進士簪花披紅赴府燕畢以鼓樂送狀元歸第凡鄉飲酒禮嵗以正月望十月朔舉行豫擇賓介具疏以聞至期集僚屬師儒延賓介於府學禮部堂官監禮樂部和聲署設樂府學諸生侍執事歌詩飲酒揖讓獻酬均如儀儀詳禮部凡豫備公事支戸部庫帑分貯大興宛平縣庫各萬兩遇辦公急需詳府動用嵗終由尹覈實報部請領還項凡和雇民車公事需用之車内務府豫期移府飭大興宛平房山三縣專雇毎車行程日給費七錢二分守候日五錢二分囘空與守候同計重載程塗十日囘空準七日凡畫界分治大宛兩縣與五城兵馬司接壤之地五城以京營所轄為界兩縣以在外營汛所轄為界各治境内以重官守凡分發流徒部㫁三流道里逺近由尹定地撥配部㫁五徒年限由尹發驛安置奉天府尹一人丞一人掌畱京治化兼轄錦州府府屬治中一人理事通判一人熊岳理事通判一人經歴一人司獄一人凡治賦丁賦口率出銀田賦銀米分徵米貯倉銀供地方祭祀官役俸廩之用餘解盛京戸部嵗終彚疏以册達戸部覈銷凡立學奉天所屬滿洲䝉古漢軍及民籍童生由府丞考取入學生員嵗科兩試補廪補増序貢拔貢與直省學政同盛京立宗學設教習以教宗室覺羅子弟敎習勤惰子弟優劣由府尹㑹盛京將軍稽察期滿分别叙用凡先農先師社稷雲雨風雷山川都城隍之祭府尹暨丞率其屬以時致祭儀與直省同凡讞獄奉天所屬民訟之事由所在州縣官審訊上其事於府尹尹定其讞旗民交訟之事州縣官㑹所在理事官審訊尹㑹盛京刑部侍郎共定其讞皆㑹侍郎詳慎分别由部造册解刑部覆奪鴻臚寺卿滿漢各一人少卿滿漢各一人掌朝㑹祭祀燕饗之儀鳴贊滿十有六人漢二人掌導引行禮唱贊序班漢四人掌序百官之班位主簿滿漢各一人掌文移筆帖式滿四人掌繙譯凡常朝御殿豫期由寺奏請得㫖傳知王公百官届期疏謝恩官姓名陳於殿内東案凡紏察文武各官有失誤朝賀及行禮失儀者由寺題叅外任官員辭朝逾期叅劾亦如之凡習儀新進士傳臚習儀於禮部外國貢使入朝習儀於本寺均委鳴贊序班教以升降拜跪之儀凡贊相禮儀皇帝詣皇太后宫行禮宫門檐下鳴贊四人階下引王公長信門外引二品以上官鳴贊各二人午門外引三品以下官鳴贊序班各二人自永康左門至午門傳示行禮鳴贊序班七人皇帝大朝御殿中和殿引執事各官行禮鳴贊二人太和殿檐下鳴贊四人丹陛上引王公卿二人鳴贊二人丹墀内引百官鳴贊序班各二人引外國貢使每國鳴贊二人賜茶引王公入殿卿二人太和殿大燕殿檐下鳴贊四人丹陛上引王公卿二人鳴贊二人引大臣鳴贊二人丹墀内引百官鳴贊序班四人保和殿大燕殿檐下鳴贊四人丹陛上引䝉古王公額駙鳴贊二人恭遇慶典頒詔引百官跪聽行禮鳴贊序班各二人常朝御殿請駕導駕卿二人鳴贊二人册立遣使傳制官一人引正副使受節行禮鳴贊一人視學進講經書引王公大臣入彞倫堂春秋經筵引講官侍班官入文華殿卿二人進講行禮鳴贊四人恭進實録玉牒前引卿二人臨軒䇿士隨禮部請駕卿二人殿檐下鳴贊二人引讀卷官及諸進士行禮鳴贊各二人傳臚請駕卿二人殿檐下鳴贊二人引讀卷執事官行禮鳴贊二人宣制臚唱三傳鳴贊三人引一甲進士出班行禮鳴贊三人引諸進士行禮鳴贊二人耕耤進耒耜進鞭鳴贊四人引從耕三王九卿鳴贊序班十有二人引順天府官屬及耆農行禮鳴贊序班各二人贊禮鳴贊四人頒朔宣制官一人贊禮鳴贊四人引王公百官行禮鳴贊序班各二人頒賞賜燕賜茶謝恩辭朝進書進表齎榜受勅印救䕶日月食各官行禮引班唱贊均鳴贊各二人壇廟祭祀引陪祀王公百官鳴贊各二人堂子行禮卿二人贊禮鳴贊二人引王公大臣鳴贊各二人拜纛贊禮鳴贊四人引王公鳴贊二人引大將軍從征將士鳴贊二人凡巡狩方嶽豫期奏請行知守土官朝服於道右百步外跪迎囘鑾時跪送亦如之凡簡選鳴贊序班滿鳴贊由寺於八旗内選擇引見補授漢序班於直𨽻生員在寺學習者選取漢鳴贊由序班遞升咨送吏部題補國子監兼管監事大臣無定特簡員祭酒滿漢各一人司業滿䝉古漢各一人掌成均之法以教國子及俊選之士監丞掌學規以督教課糾勤惰均廪餼博士掌闡明經説以助啟迪典簿掌簿書以稽文移之出入均滿漢各一人典籍漢一人掌經史以備諸生誦習率性堂漢助敎一人學正一人修道堂漢助教一人學正一人誠心堂漢