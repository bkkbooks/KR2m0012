  text: 理藩院典屬清吏司國初䝉古北部喀爾喀三汗同時納貢厥後朔漠蕩平庇我宇下與漠南諸部落等承平以來懷柔益逺北踰瀚海西絶羌荒青海厄魯特西藏準噶爾之地咸入版圖其封爵會盟屯防游牧諸政事厥有專司凡疆理喀爾喀後路土謝圖汗部東至肯特山接車臣汗部界西至翁金河接賽因諾顔部界南至瀚海通蘇尼特界北接俄羅斯界至京二千八百里喀爾喀東路車臣汗部東至厄爾得尼拖羅海西至插漢齊老臺南至他爾衮柴達木北至翁都爾䍐至京三千五百里喀爾喀西路扎薩克圖汗部東至翁克西爾哈兒朱忒西至喀喇烏蘇俄落克諾兒南至阿爾察喀喇托輝北至推河接賽因諾顔部界至京四千里喀爾喀賽因諾顔扎薩克親王部東至博羅布爾哈蘇鄂倫西至庫爾薩牙索郭圖厄格嶺南至車車爾齊克北至齊老圖河至京三千里青海即庫庫諾爾四部落東至陜西西寧洮岷邊境西至西藏南至四川松潘北至肅州安西府袤延二千餘里至京五千七十里賀蘭山厄魯特東至陜西寧夏西至甘州南至凉州各府邊境北至瀚海袤延七百里至京五千里烏蘭烏蘇厄魯特一旗舊駐喀爾喀河一旗舊駐達拉爾河推河厄魯特舊駐喀爾喀河屬喀爾喀賽因諾顔部轄疆理同額濟内土爾古特東至古爾鼐西至陜西肅州邊境南至三岔河北至坤都崙湖袤延八百里至京五千里都爾伯特舊屬準噶爾四衞拉特之一原駐額爾齊斯因資其耕牧移其部於烏蘭古木在喀爾喀疆理之内烏魯木齊東至巴里坤東南接闢展界西至博羅塔拉西南接伊犁界南至天山踰山接哈拉沙拉界北至塔爾巴哈台通俄羅斯界東北至額爾齊斯西北至齋爾通哈薩克界至京九千八百九十里伊犁東至闢展西至吹塔拉斯南至天山踰山接回部諸城界北至烏魯木齊通哈薩克界至京萬八百二十里游牧察哈爾東至克西克騰西至歸化城土黙特南至太僕寺牧場及山西大同朔平二府邊境北至蘇尼特及四子部落袤延千有餘里至京千里西藏之地有四曰衞曰藏曰喀木曰阿里轄六十餘城東至四川邊境西至大沙海南至雲南邊境北至青海東西六千四百餘里南北六千五百餘里至京萬四千餘里凡旗制喀爾喀四部落後路土謝圖汗部二十旗本旗外所屬十有九旗下仿此東路車臣汗部二十三旗西路扎薩克圖汗部十有七旗賽因諾顔扎薩克親王部二十二旗青海四部落厄魯特二十一旗回特三旗土爾古特四旗喀爾喀一旗部各散處不分畛域賀蘭山厄魯特一旗烏蘭烏蘇厄魯特二旗推河厄魯特一旗額濟内土爾古特一旗都爾伯特十有四旗游牧察哈爾八旗凡封爵喀爾喀後部土謝圖汗一人親王二人郡王一人貝勒二人輔國公七人一等台吉八人東部車臣汗一人親王郡王各一人貝勒貝子各二人鎮國公輔國公各三人一等台吉十有三人西部扎薩克圖汗一人貝勒一人鎮國公三人輔國公六人一等台吉九人賽因諾顔部扎薩克親王一人親王一人郡王二人世子一人貝勒二人鎮國公二人輔國公八人一等台吉九人青海親王一人郡王三人貝勒一人貝子二人鎮國公一人輔國公五人一等台吉十有六人賀蘭山厄魯特貝勒一人鎮國公二人烏蘭烏蘇厄魯特貝子二人推河厄魯特一等台吉一人額濟内土爾古特貝勒一人都爾伯特特古斯庫魯克汗一人親王郡王各一人貝勒二人貝子四人輔國公二人一等台吉五人西藏輔國公三人一等台吉一人噶卜倫四人内一人即以輔國公為之代賁五人第巴三人堪布一人凡冊誥儀從品服悉如定制詳典屬司凡設官每旗設扎薩克一人以汗王貝勒貝子公台吉等為之所屬都統副都統叅領佐領驍騎校等官並與漠南諸䝉古同喀爾喀四部落䝉古副將軍四人叅贊四人都爾伯特左右翼副將軍二人游牧察哈爾都統一人副都統二人總管八人理事員外郎十有六人凡駐劄喀爾喀軍營定邊左副將軍一人叅贊大臣無定員烏里雅蘇臺叅贊大臣一人筆帖式一人庫倫恰克圖司官各一人䝉古副將軍筆帖式八人西寧大臣一人司官一人筆帖式三人烏魯木齊提督一人以安西提督移駐原設之大臣副都統侍衞移於雅爾駐劄伊犁將軍一人叅贊大臣領隊大臣暨侍衞無定員西藏大臣二人司官一人筆帖式二人凡㑹盟喀爾喀土謝圖汗部二十旗為一㑹盟於汗阿林車臣汗部二十三旗為一㑹盟於克魯倫巴爾河屯扎薩克圖汗部十有七旗為一㑹盟於扎克畢頼塞欽畢都里也諾爾賽因諾顔部二十二旗為一㑹盟於齊齊爾里克以飭邊防訓士伍簡軍實及比丁讞獄各副將軍嵗於所部舉行間嵗則以土謝圖汗車臣汗兩部落為東路扎薩克圖汗賽因諾顔兩部落為西路遣軍營叅贊大臣二人分徃㑹覈統聽定邊左副將軍裁決青海厄魯特聽西寧駐劄大臣都爾伯特聽定邊左副將軍游牧察哈爾聽都統各裁決具䟽以聞凡防守烏魯木齊以安西提督率所屬標兵移駐伊犁以滿洲索倫席伯察哈爾厄魯特兵駐守屯田用緑旗兵官給地畝秄種口糧嵗穫悉以輸官留充兵餉伊犁移駐回民屯政詳徠逺司凡互市庫倫設市一通喀爾喀貿易恰克圖設市一通俄羅斯貿易其來京貿易之期以子辰申年並令簡約輿從從經紀貿易限八十日啓行凡駐牧呼倫布俞爾之巴爾虎設總管副管佐領驍騎校等官由黒龍江將軍遴選正陪送院引見補授凡喇嘛道行至髙者曰胡圖克圖轉世者曰胡畢爾汗其秩之貴者曰國師曰禪師次曰扎薩克大喇嘛副扎薩克大喇嘛扎薩克喇嘛又次曰大喇嘛副喇嘛閒散喇嘛扎薩克喇嘛以上給印餘給劄付其徒有德木齊格思規格隆班第之差陜甘洮岷諸寺住持番僧曰都綱曰僧綱曰僧正各給劄付有不守戒規者論如法京師總管喇嘛班第扎薩克