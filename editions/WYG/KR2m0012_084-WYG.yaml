  text: 欽定四庫全書欽定大清會典卷八十四
  hash: sha256:59faea9ea6db7776ece351cfab6d599b9f58ebcd8047de1610bafa2553edb211
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_084-1a, image: WYG0619/WYG0619-0756c.png}
body:
  text: 翰林院掌院學士兼禮部侍郎滿漢各一人掌國史圖籍制誥文章之事侍讀學士侍講學士侍讀侍講均滿漢各三人修撰編修檢討無定員掌撰述編輯儤直經幄庶吉士無定員入館肄業不任以事典簿滿漢各一人掌出納文移孔目滿漢各一人掌收貯圖籍待詔滿漢各二人掌校對章疏文史筆帖式滿四十人漢軍四人掌繕書繙譯凡經筵講官滿漢各八人滿講官以由閣院升任之三品以上官漢講官以由院升任之三品以上官疏請簡用以原官兼充歲二月八月兩舉經筵講書滿漢各一人講經滿漢各一人由院列名請㫖經書講義由講官掌院學士㑹擬奏請欽定屆期上御文華殿講官同諸臣於階下行禮入殿出班進講如儀儀詳禮部講畢恭聆御論即日同講義進呈凡日講官滿八人漢十有二人自掌院學士詹事以下坊局編檢以上皆得以原官充補兼起居注官起詳見居注凡撰文祭告郊廟陵寢社稷嶽鎮海瀆暨帝王陵寢先師闕里各祝文由院撰擬奏請欽定恭上皇太后徽號尊封太妃册立皇后册封妃嬪王貝勒貝子公將軍及外藩屬國各册文寳文印文由院撰擬奏請欽定恭加上尊諡升祔册諡各册文寳文内外文武官奉㫖予諡者各碑文祭文均由院撰擬奏請欽定凡㳟纂實録聖訓以掌院學士充副總裁官讀講學士以下充纂修官恭修玊牒及各館編輯諸書以修撰編檢充纂修官凡侍直皇帝御殿掌院學士於殿左門外侍班班在閣臣之次御門編檢四人於乾清門右階下侍班班在科道之上駐蹕圓明園掌院學士於直班日以編檢十人更番引見亦曰侍班其入直南書房者並由特簡無定員凡扈從躬謁陵寢廵狩方岳掌院學士列本院官名具奏以二人從並參用詹事府官凡春秋仲月上丁遣官釋奠於先師以資深之修撰編檢二人分獻十二哲本院先聖祠以本院官資深者一人主祭餘均助祭凡鄉會試墨卷本院會禮部録其文之佳者進呈由禮部刋本頒行凡升除由院列應升官銜名咨送吏部其應會詹事府者㑹咨吏部奏請簡用考選御史以編檢保送凡考選庶吉士殿試臚傳後集諸進士於保和殿試以論詔奏議詩賦録其佳者進御特命王大臣簡選分三等入奏吏部牒院請期掌院學士以諸進士引見入選者授翰林院庶吉士次日以庶吉士名單送内閣分讀清漢書凡敎習庶吉士給館舍充貯内府經史詩文月有廩餼由院列内閣學士掌院學士銜名咨吏部具疏請簡用滿漢各一人掌敎習事遴選讀講以下學優品端者分司訓課凡庶吉士敎習三年期滿疏請散館試以詩賦上親定甲乙越日引見留館者二甲授編修三甲授檢討餘以主事知縣用或令再肄業三年與次科庶吉士同散館考試凡讀講學士以下編檢以上間奉特㫖考試引見便殿親定甲乙而進退之俾木天儲彦無濫員焉起居注館記注官滿八人漢十有二人以翰林詹事官充之均兼日講官掌侍直起居記言記動主事滿二人漢一人掌出納文移校對典籍筆帖式滿十有四人漢軍二人掌繙譯章奏凡恭逢朝㑹御殿御門聽政有事郊廟閲祝版御經筵耕耤視學殿試讀卷外藩來朝上元歲除錫燕大閲校射出師命將凱旋迎勞受俘及每歲勾決重囚記注官皆分日侍直凡謁陵校獵駐蹕南苑廵狩方岳記注官皆扈從凡侍直敬聆綸音退而謹書之具年月日及當直官姓名於籍每月成帙封鐍於匱歲以十二月具疏送内閣收藏記注官㑹内閣學士監視貯庫詹事府詹事兼翰林院侍讀學士少詹事兼翰林院侍講學士均滿漢各一人掌經史文章之事與翰林院學士同主簿滿漢各一人掌文移筆帖式滿六人掌繙譯左春坊左庶子兼翰林院侍讀滿漢各一人左中允兼翰林院編修滿漢各一人左贊善兼翰林院檢討滿漢各一人掌記注纂修與翰林院讀講編檢同右春坊右庶子兼翰林院侍講右中允右贊善兼翰林院編修檢討與左同均滿漢各一人職掌與左春坊同司經局洗馬兼翰林院修撰滿漢各一人掌經籍圖書正字漢一人掌判正文字凡經筵講官詹事府少詹事以原官兼充日講官起居注自詹事以下暨坊局各官以原官兼充均與翰林院同凡少詹以下中允贊善以上間奉特㫖考試與翰林院官一同引見親定甲乙以慎文章之選凡奉㫖下九卿翰詹科道㑹議之事及驗看月選官秋審朝審詹事少詹事均入班與議欽定大清㑹典卷八十四
