body:
  text: 八旗都統滿洲八旗旗各都統一人副都統二人掌宣布教養整詰戎兵以治旗人所屬叅領五人副叅領五人掌頒都統副都統之政令以達於佐領佐領所治以三百人為率人户滋生則増設佐領蒙古漢軍旗同今以見數計之鑲黄旗八十五人正黄旗九十三人正白旗八十六人正紅旗七十四人鑲白旗八十四人鑲紅旗八十六人正藍旗八十四人鑲藍旗八十七人驍騎校毎佐領一人掌稽所治人户田宅兵籍以時頒其職掌蒙古八旗旗各都統一人副都統二人所屬叅領二人副叅領二人佐領鑲黄旗二十八人正黄旗二十四人正白旗二十九人正紅旗二十二人鑲白旗三十一人鑲紅旗三十二人正藍旗三十人鑲藍旗二十五人驍騎校每佐領一人以上職掌與滿洲八旗同漢軍八旗旗各都統一人副都統二人所屬叅領五人副叅領五人佐領鑲黄正黄正白三旗各四十人正紅旗二十八人鑲白旗三十人鑲紅旗二十九人正藍旗三十人鑲藍旗二十九人驍騎校每佐領一人以上職掌均與滿洲八旗同旗制國家以神武開基龍興之初建旗辨色用飭戎行厥後歸附旣衆卽按行軍旗色以定户籍設官分職以養以教而兵寓其中始立四旗重為八旗合滿洲蒙古漢軍為二十四旗制度備焉及定鼎燕京分田授宅辨方定位居則環衞周防出則折衝禦侮臂指之使磐石之固誠超越百代垂治萬年者矣凡八旗序次曰鑲黄曰正黄曰正白為上三旗曰正紅曰鑲白曰鑲紅曰正藍曰鑲藍為下五旗行軍蒐狩以鑲黄正白鑲白正藍四旗居左為左翼正黄正紅鑲紅鑲藍四旗居右為右翼官職除授公差踐更以上下旗為辨朝祭班列旗籍界止以左右翼為辨凡八旗方位左翼自北而東自東而南鑲黄旗在安定門内正白旗在東直門内鑲白旗在朝陽門内正藍旗在崇文門内右翼自北而西自西而南正黄旗在徳勝門内正紅旗在西直門内鑲紅旗在阜成門内鑲藍旗在宣武門内皆四周星共以環衞宸居凡八旗直班各有定所更畨宿直詳見則例内城九門安定徳勝東直西直朝陽阜成崇文宣武八門各按軍士居止方位八旗滿洲蒙古漢軍分直惟城門領安定門以正藍旗徳勝門以鑲藍旗東直門以鑲白旗西直門以鑲紅旗朝陽門以正白旗阜成門以正紅旗崇文門以鑲黄旗宣武門以正黄旗正陽門八旗輪直以滿洲蒙古九門外舊營房以滿洲蒙古新營房以滿洲蒙古漢軍外城七門鑲黄旗直東便門正黄旗直西便門正白旗直廣渠門正紅旗直廣寧門鑲白鑲藍二旗直左安門鑲紅旗直右安門正藍旗直永定門均以漢軍凡遇皇帝恭謁陵寢行幸駐蹕及逄年節於城上設堆撥六處廵幸口外及遠省設十有五處均以八旗滿洲蒙古漢軍官自叅領以下驍騎校以上一人至四人領催自一人至四人驍騎自二人至五十人分班輪直晝夜廵宿以専責成凡防禦火災每旗以都統或副都統一人叅領三人散秩官八人領催八人驍騎七十二人更番輪直遇旗界内及接壤之地有不戒於火者直班官兵㑹歩軍統領卽徃撲救乘火攫物者逮治之户口凡編審丁册閱三年各旗都統飭所屬佐領驍騎校領催稽新舊壯丁五尺以上及已食餉未及嵗者咸登諸册每户書氏族官爵無職者曰閒散某備載其父兄子弟兄弟之子及户下人舊册之應開除者注名裁除編印册二一貯旗一達户部部彚疏以聞盛京將軍各省駐防將軍都統副都統等飭所屬編丁亦如之有以未成丁及非正身子弟冒入册以應入册及不應開除之壯丁隠漏者皆論如律凡分晰户丁八旗氏族册籍可稽及以軍功勞績奉㫖入册者曰正户至世系溷淆年遠無考别載册籍者撫養漢人為子者户下家人本主念其勤勞願令開除出户者皆聼其為民由本旗詢明願居何省何府州縣行文地方官收入民籍仍册送户部存案設法贖身私入民籍事發作為開户者或充内務府莊園壯丁或準其改入民籍由本旗詳察根源㑹户部分晰請㫖凡閲選秀女以三年為率届期户部移文八旗都統飭各佐領取具族長保結叅佐領詳覈申都統造册咨送户部請㫖閲選有故後期及未及嵗者竢下次補閲各省駐防協領等官暨文官同知以下武官游擊以下之女不送選有隠匿遺漏扶同徇縱及不待選私自聘嫁者論凡改籍八旗漢軍本貫有廬墓田宅及他省有婣戚族黨可依或習藝操作自能食力者許改歸民籍移居外省内申都統外呈督撫均於年終達部彚奏從龍勲舊之子孫不與凡撫養嗣子八旗官兵無子者許以兄弟之子及遠近族人昭穆相當者入繼為後若本宗無人許撫正户親屬之子為嗣均取族長叅佐領印甘各結詐稱無同宗溷立異姓及繼户下人並漢人為子者論如律凡旗人僮僕越旗買賣者禁滿洲蒙古家僮私鬻與漢軍漢人者禁旗人買旗僕由領催買漢人由司坊官及大宛二縣各覈真偽注册驗以印票持文契赴兩翼輸税吉林黒龍江等處官兵有奉差来京買僕攜回者如之駐防旗員不許於所治買民為僕兵丁之無家人者買不得過二名違者皆論如法凡旗人逃失在京者以五日二百里内以十日四百里内以十五日為限投遞逃牌開具姓名年貌日期移咨刑部通行順天府五城直隸總督八溝熱河副都統盛京等處將軍蒙古扎薩克等委官兵嚴緝解刑部詳鞫按律治罪失察之該管官及地方官並論田宅國初王公勲戚下逮禁旅以近畿曠土分為恒產承平嵗乆漸有遷移而隨時經理之道起焉所以通變經乆垂利頼於萬年也凡授田之法始給畿輔閒田除其賦税永為世業厥後户口繁滋盛京東北及諸邊口外新闢之壤咸分授焉凡經理旗産官軍移外駐防應退之田未徹者户絶不報佃人乘機隠匿者冒首墾荒占為民業者均令八旗都統委所屬叅領㑹直省地方官勘丈清釐作為公産徵租解部分給八旗以贍貧乏民典旗産動支公帑取贖以典後十年為率十年内給原價十年外減原價十之一以次按年遞減至五十年外給半價均令退田還官旗下開户人承典正户田者照民典減價之法户下人承典本主田者十年内減原價十之一十年外減十之二均以次按年遞減官為取贖令原業人交價領田無力交價許以俸餉分五年扣抵無原業人許其子孫及親伯叔兄弟兄弟之子承領如無力交價又無俸餉可抵及原繫賣絶之田均入官作為公產嵗計所入之租彚疏以聞為八旗贍貧之用有私相典賣者追田價入官與受旗民及失察徇隠之該管各官咸論如法開濬河道動用旗地令地方官丈明界址畆數開具原業姓名旗色册申户部轉行各旗限半年覈明具結咨覆按數補償凡授宅之法始定八旗界止方位授宅分居厥後户口繁滋視里衖隙地及市廛廢業有願售者動支公帑買建官房給貧乏旗人棲止得房私售者論調旗官兵準住原分旗界有願買宅遷居者聽願自築室者給以本旗官地索倫達虎里厄魯特等部落新附官兵移家来京者按所分旗界動支公帑買屋授居無出售之屋行工部建築凡承買入官房地交價領買者銀輸户部庫即咨該旗行兩翼給以印照以俸抵者分五限完日行兩翼給照皆免輸税託名領買轉售圗利及拆毁者禁如房地原繫典契限一年内命原業領贖或以俸扣抵不願者聽凡承追公帑外任虧空官行旗變産賠償者按限催交就近完納給予執照其銀由都統咨交户部行知直省免其解送歸欵變抵足數有餘産者給還祀田墳園守墳人口槩免入官私債自理完公不準開欠抵追如家産盡絶該管佐領驍騎校叅領覈實申都統保題豁免不得濫及親族追賠豁免後有隠匿發覺者該管官皆論如法欽定大清㑹典卷九十五
