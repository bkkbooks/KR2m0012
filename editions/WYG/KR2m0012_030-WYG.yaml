  text: 欽定四庫全書欽定大清㑹典卷三十
  hash: sha256:ad0c3ba349364fdd68ba4ca363fbf5ee6ebf6bdeb309ce35d4f9fc96c0473bbb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_030-1a, image: WYG0619/WYG0619-0238a.png}
body:
  text: 禮部儀制清吏司冠服凡禮服皇帝冠服春冬暖冠緣皮為題緣春以薰貂冬以元狐青表朱裏夏秋凉冠即緯笠素表朱裏緣以纁錦均覆朱緯青組纓施金龍頂髙四重上用珍珠一下三重貫東珠三為龍十有二間珠如龍之數凉冠刻金為金佛飾東珠十有五綴冠前蹙金為舍林飾東珠七綴冠後服色南郊用青北郊用黄東郊用赤西郊用玉色朝㑹均用黄有披肩腰襞積前後正幅如帷備十二章施五采襟袘及袂緣以金花青繒冬緣以貂衮服色用青長覆膝織金為卷龍文四大裘如衮服制長裾深袖表以元狐為之帶用黄組南郊施方青金石四銜以金石各綴東珠五北郊用琥珀東郊用珊瑚西郊用白玉銜金綴珠各如之宗廟朝㑹用綠松石四銜以金飾東珠如前制周綴珍珠各二十帶下左右均銜金環佩嚢彯帛各二帛二色鋭下垂以為飾朝珠用東珠南郊飾以青金石北郊飾以琥珀東郊飾以珊瑚西郊餙以白玉朝㑹無定飾系均用黄組采服冠頂二重頂端銜大珍珠一或東珠服用龍袍色尚黄裾四啓備十二章施五采襟袂龍文青綺緣以金花青繒衮服如朝㑹禮服制朝珠以雜寳及諸香為之帯以各色寳石為之彯帛一色下方佩嚢同前常服冠用結線頂袍色尚黄亦用諸色表衣用青均不施章采織文用卷龍及各色花文朝珠如采服制皇后冠施鳯頂髙四重上用大東珠一下三重貫東珠三刻金為三鳯鳯各飾東珠三冠前左右綴金鳯七各飾東珠九貓睛石一後綴翟鳥飾貓睛石一承以朶雲垂珠為歩揺凡五行二就行間施圓青金石銜以金綴東珠珍珠各六冠下施金約周蔽前後綴東珠十有三珠相間處飾青金石結珠垂後為歩揺五行三就行間施方青金石二銜以金各綴東珠珍珠八耳飾以金為之綴東珠十有二領約以金為之如環有端却結於後飾以珊瑚綴東珠十有五服色尚黄織為龍鳯翟鳥之文施五采襟袘及袂緣以金花青繒冬緣以貂表衣色用青長裾無袂織金為卷龍文八裳施龍鳯章采均綴以金珠朝珠以珊瑚琥珀為之飾以珠及青金綠松等石系用黄組采服袍色尚黄裾啓左右織繡龍鳯文施五采表衣用青深袂長裾織金為卷龍文八裳朝珠如禮服制常服袍無定色表衣色用青織文用龍鳯翟鳥之屬不備采朝珠如采服制皇貴妃貴妃冠頂施三鳯上用大珍珠一餘飾東珠十有二珍珠三冠鳯七鳯各飾東珠九翟鳥飾貓睛石一歩揺三行二就行間飾青金石綴東珠珍珠各四金約飾東珠十有二歩揺三行三就行間飾青金石二各綴東珠珍珠六領約綴東珠七餘制如前妃冠頂施金鳯二上用貓睛石一餘飾東珠十有一珍珠二冠鳯各飾東珠七餘飾與貴妃同嬪冠頂施金翟鳥二上用暗貓睛石一餘飾東珠八珍珠二冠前綴翟鳥五各飾東珠五歩揺二具行門一飾青金石一綴東珠珍珠各三一飾青金石二各綴東珠珍珠八餘並與妃同惟後翟鳥不飾貓睛石皇貴妃貴妃妃服用翟鳥龍文緣飾如前制表衣用圓龍文八嬪服視妃表衣用圓龍文四裳施繡備五采其服色均不得用黄采服皇貴妃貴妃妃嬪均用翟鳥龍文各施五采裳如禮服制常服皇貴妃貴妃妃嬪袍織文如采服表衣織文如禮服不施章采朝珠均以珊瑚琥珀為之皇貴妃貴妃飾以珠及青金綠松等石系用黄組妃嬪飾以青金綠松石系用柘黄組凡王公朝服親王至入八分公冠頂均三重上用紅寳石中飾東珠親王飾珠十世子郡王貝勒貝子鎮國公輔國公以次減一冠前綴舍林親王世子飾東珠五郡王貝勒貝子鎮國公遞減如之輔國公與鎮國公同冠後綴金花親王世子飾東珠四郡王貝勒貝子遞減亦如之鎮國公輔國公各飾綠松石一服親王世子郡王用滿翠龍文繒貝勒貝子鎮國公輔國公用蟒文采繒襟袂及袘緣以金花繒冬緣以貂補服親王用圓龍文四前後正龍左右旁龍世子郡王旁龍圓文四長子貝勒正蟒圓文二貝子正蟒圓文二鎮國公方正蟒二輔國公方正蟒二表裘得用元狐帶均用金黄色組施方玉四銜以金親王玉各飾貓睛石一東珠四世子郡王貝勒貝子各以次減一鎮國公輔國公止各飾貓睛石一鎮國將軍冠頂同一品補服用麒麟輔國將軍同二品補服用獅奉國將軍同三品補服用豹奉恩將軍同四品補服用虎服均用蟒文采繒帶各如其所同之品其餘宗室及覺羅冠頂補服各從其品餘服宗室得視公以下帶用金黄組覺羅得用金花采繒及諸花素繒帶用紅組公主郡主冠頂均三重郡君以下均二重上用紅寳石飾以東珠固倫公主飾珠十和碩公主九郡主八縣主七郡君六縣君五鄉君鎮國公女四輔國公女三其大簪金約耳飾領約飾珠各如之服公主郡主用翟鳥龍文滿翠繡繒縣主以下用蟒文繡繒緣飾用金花繒冬用貂補服固倫公主視親王和碩公主郡主視世子縣主視郡王郡君視貝勒縣君視貝子鄉君鎮國公女視鎮國公輔國公女視輔國公諸王貝勒側室女冠服降適二等貝子側室女視五品公側室女視六品裳自公主以下均得施采繡親王福晉冠服視固倫公主世子福晉飾珠視和碩公主郡王福晉飾珠視郡主服均視親王福晉貝勒夫人冠服均視縣主貝子夫人飾珠視郡君服如貝勒夫人鎮國公夫人冠服均視縣君輔國公夫人冠服均視鎮國公女親王世子側福晉冠降適一等服如適福晉郡王側福晉及貝勒以下各側夫人冠服均降適一等若不入八分公夫人及鎮國輔國奉國各將軍夫人冠服唯正室得從夫品民公侯伯冠頂均上用紅寳石中飾東珠公用珠四侯伯以次減一服得用貂緣及蟒繡金花采繒補服用方蠎文二表裘用貂帶用圓玉四銜以金公飾玉以貓睛石侯綠松石伯紅寳石子男冠服各從其品固倫公主額駙冠頂上用紅寳石中飾東珠六舍林飾東珠二後花飾東珠一帶用圓玉四銜以金玉各飾東珠一服視貝子若爵在貝子以上則從其爵和碩公主額駙冠頂銜寳石如之中飾東珠四舍林飾東珠一後花飾綠松石一帶玉各飾貓睛石一服視公若爵在公以上則從其爵郡主額駙冠頂上銜珊瑚中飾東珠三帶玉各飾綠松石一縣主額駙冠頂用鏤花珊瑚帶用圓金版四各飾紅寳石一服均與和碩公主額駙同郡君額駙冠服均視三品帶用圓金版四縣君額駙視四品鄉君額駙視五品帶均用鋄金方鐵版四各側室女額駙冠服均降適二等品官一品至八品均鏤金為頂一品上用紅寳石中飾東珠二品用鏤花珊瑚中飾小紅寳石三品用藍寳石中飾如二品四品用青金石中飾小藍寳石五品用水晶中飾如四品六品用硨磲中飾如五品七品用素金頂中飾水晶八品用鏤金頂九品用鏤銀頂未入流視九品服自一品至三品得用貂緣及蟒繡金花采繒七品以上得用金花采繒八九品得用素繒領袂均得用蟒繡及金花繒補服文職一品用鶴二品錦雞三品孔雀四品雁五品白鷴六品鷺七品鸂􅈑八品鵪鶉九品練雀武職一品麒麟二品獅三品豹四品虎五品熊六品彪七八品犀牛九品海馬都察院左都御史至監察御史直省按察使均用獬豸其都察院都事經歴筆帖式按察使司經歴照磨等官仍從其品貂裘四品以上及翰林科道官用之帶一品用金銜方玉四各飾紅寳石一二品鏤金圓版四飾如一品三品鏤金圓版四四品銀銜鏤金圓版四五品銀銜素金圓版四六品銀銜玳瑁圓版四七品銀圓版四八品銀銜明羊角圓版四九品銀銜烏角圓版四士庶公服狀元頂帶視六品㑹試中式貢士冠用裹金三枝九葉頂服均如常制舉人官生貢生監生冠帶視八品服皂繒緣青生員冠帶視九品服青繒緣皂外郎耆老冠頂以錫公侯伯子男及品官已受封父母冠服並得從子婦冠服從其夫凡采服王公百官冠頂均二重王公冠頂用紅寳石民公侯伯及一品官均珊瑚二品鏤花珊瑚三品以下至未入流各視朝冠頂采服王公宗室裾均四啓親王世子郡王用龍文采繒貝勒貝子公用蟒文采繒公主福晉命婦各視其朝服所得用龍蟒各采繒為之民公侯伯以下文武官裾啓前後均用蟒文采繒襟袂緣以金花繒補服與朝服同凡常服親王至入八分公冠用紅寳石頂餘均如采服制袍色均用藍亦間用諸色表衣色用青均不施章采織文親王世子郡王貝勒用龍文貝子公用蟒文親王福晉以下各從其夫之服宗室各將軍民公以下四品官以上及御前侍從官均得用蟒文七品以上官得用諸花繒八九品官用雜花及素繒舉人視七品貢監生員視八品軍民商賈吏員得用綾絹餘並不得僭擬上用服色及色相近者王公以下均毋得用若有賜毋得如制自為之王等賞所屬服物不得逾其品品官革職留原任者仍視原品革職官無封銜者原品冠服不得用凡朝珠王以下文職五品武職四品以上及翰林科道官公主福晉以下五品官命婦以上均得用以雜寳及諸香為之禮部主事太常寺博士典簿讀祝官贊禮郎鴻臚寺鳴贊光禄寺署正署丞典簿國子監監丞博士助教學正學錄除在壇廟執事及殿庭侍儀外餘處不準用珠系及佩嚢惟諸王公主福晉得用金黄組貝勒以下均不得僭擬孔雀翎翎端三圓文者貝子戴之二圓文者鎮國公輔國公和碩額駙戴之一圓文者内大臣一二三四等侍衞前鋒䕶軍各統領叅領前鋒侍衞諸王府長史散騎郎一等䕶衞均得戴之翎根並綴藍翎貝勒府司儀長親王以下二三等䕶衞及前鋒親軍䕶軍校均戴染藍翎坐褥親王冬用貂夏用龍文赤繒世子郡王冬用猞猁猻緣貂夏蟒文青繒貝勒冬用猞猁猻夏青繒施采貝子冬白豹夏采繒緣青繒均藉紅白氊鎮國公冬用全赤豹皮夏青花赤繒輔國公冬用方赤豹皮夏赤花皂繒均藉紅氊鎮國將軍視一品輔國將軍視二品奉國將軍視三品奉㤙將軍視四品民公冬用全虎皮夏皂繒侯伯冬均用方虎皮夏侯用緣花皂繒伯用青雲繒均藉紅氊子男各從其品固倫公主額駙視貝子和碩公主額駙視鎮國公郡主額駙冬用獾夏皂褐緣紅褐均藉紅氊郡君額駙視三品縣君額駙視四品鄉君額駙視五品文武官一品冬用狼夏紅褐二品冬用獾夏紅褐緣皂褐三品冬用貉夏皂褐緣紅褐四品冬用青山羊夏皂布均藉紅氊五品冬青羊夏青布六品冬黑羊夏椶色布七品冬用鹿夏灰色布八品冬用麅夏土布九品冬用獺夏與八品同均藉白氊佩嚢彯帛左右垂帶下為飾王公百官咸用之佩刀櫜鞬飾雜寳凡寒燠更用冠服以季春季秋月之五日十五日或二十五日始先期請㫖通行若緣貂朝服及表裘歳以仲冬朔日始孟春十六日止凡遇雨雪服雨冠雨衣以氊或羽縀油紬為之皇帝用明黄色親王至宗室公用紅色職官一品至三品冠用紅色四品至六品紅色青緣七品以下有頂帶人員青色紅緣軍民用青色雨衣一品以上用紅二品以下均用青欽定大清㑹典卷三十
