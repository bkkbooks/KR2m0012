front:
  text: 欽定四庫全書欽定大清㑹典卷十二
  hash: sha256:3ade625919f336688bbd0a1dc5fd161c12f331430f7aabde45ebcf91208ff891
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_012-1a, image: WYG0619/WYG0619-0133a.png}
body:
  text: 戸部庫藏凡庫藏之隸於部者有三一曰銀庫直省田賦及關市鹽茶諸税課歲輸至京者咸入焉二曰叚疋庫織造縑帛紗縠歳輸至部者咸入焉三曰顔料庫銅錫鉛鐵丹青赭緑香楮茶蠟之屬咸入焉凡三庫之政令特簡大臣綜理之其財用出入之數月有要歳有㑹皆覈實以聞凡三庫所藏各異其物其出入品式各異其宜皆設郎中員外郎分理之司庫大使屬焉主事一人兼掌三庫文案凡財賄之受藏於庫及取用於庫者皆書其數歳終乃執其總㑹三庫羣吏之籍而叅考之以待奏銷凡三庫司官各部院於所屬諸司遴選賢能者送部引見補用閲三年更選以代筆帖式庫大使如之凡直省賦税輸部者歳有常数覈数無闕廼移銀庫凖部定權衡受之如啟櫝驗封有作弊及数不實者論凡歳用縑帛紗縠由織造官江寧蘇州杭州各一人市絲民間織染輸部部移叚疋庫受之其上供御服者則輸於内府歳所需財用皆給公帑具册達部以待稽覈有造作不如法者論凡器用所需百物之良各有土産直省有司歳支正賦市自民間大者疏聞下部小者以册達部部覈其数移顔料庫受之採擇不精良者論凡朝廷經費官司庶物之待給者歲有常数其財用取諸三庫所司籍其数移部部稽其籍相符廼牒諸庫主事主事受其牒而書之頒之承用之府覈實而發之凡直省布政使司糧鹽驛傳道皆有庫庫設大使一人其他道府州縣庫以主藏吏司其出納典守不愼或積久滋弊者官吏並論如法倉庾凡京師倉十有三八旗三營兵食官軍牧馬豆貯焉通州倉二王公百官俸廩米貯焉又專隸本部倉一供内府奉祭祀待外藩屬國廩餼之米牧馬之豆咸貯焉倉各分廒每廒貯米以萬石為率正米萬石連耗作數出陳納新各依其序以為常法凡倉場之政掌於總督侍郎承以坐糧㕔分司於大通橋監督及各倉監督坐糧㕔簡用科道部郎二年更代各倉監督簡用内閣中書部院監寺屬官三年更代均由部引見差委大通橋監督由總督倉場侍郎於各監督内簡選引見調補凡稽察倉儲京倉以都統副都統通倉以通永道通州副将專稽倉有渗漏米有盗竊者移倉場治之歳差滿漢御史通稽一歳之内収漕發米釐剔弊端閲四年特命王公大臣徧履諸倉察覈以重天庾儲備凡催船各省糧船既過天津抵通交兑以及空船回南皆總督倉場侍郎董率沿河文武官弁催行毋許停泊凡兑糧各省糧船既抵通州正兑漕糧於石壩交兑改兑漕糧於土壩交兑坐糧㕔察米色皆純呈驗於總督倉場侍郎廼按数起斛白糧交兑亦如之運軍有虧欠者以應給回空食米抵補不足則發本籍責追次年附運交倉凡轉運正兑漕糧由石壩入通惠河經普濟平下平上慶豐四牐每牐換船至大通橋監督掣驗無闕廼分水陸運交京倉収貯改兑漕糧由土壩裏河至通州城南換陸運交通倉収貯其起斛掣驗換車皆有號房暫貯過壩由牐上岸下船皆雇夫肩負石壩至京倉水運以經紀陸運以車戸土壩至通倉水陸運皆以車户承領各給運價有差白糧之運京運通亦如之凡収糧正兑漕糧以加二五斛改兑漕糧以加一七斛詳見漕運白糧以稱重百六十斤為一石連正耗同収以杜胥役侵漁之弊其轉運到倉總督倉場侍郎給以印单京倉期十日通倉期七日畢収如逾期留難及重斛有需索者稽察御史叅奏依律罪之凡發米王公百官俸廩以春秋仲月八旗兵食以四季每季按旗先後分月關支開倉時部委司官二人各旗均委叅領一人與監督互相糾察如攙和沙土通賄舞弊越陳廒發新廒及斛有重輕者稽察御史皆劾論如法凡隨糧耗米詳見漕運除牐壩盤折運軍回空食米入倉閲月至三年按月計耗有差其餘統入正米支銷凡隨糧經費詳見漕運各省皆先漕齎解倉場發貯通濟庫坐糧㕔司其出納歳發京通各倉水陸運價牐壩負運北河濬淺諸費運軍䉡夫羡餘起駮等銀咸取給焉凡倉糧収支庫帑存發總督倉場侍郎歳籍其数具疏以聞由部覆覈奏銷凡直省常平倉皆州縣官專司之社倉義倉建自商民官為經理省㑹重地大府雄鎮兵糈所貯屬之道府其他水陸四達之衢設倉以便轉運提鎮大標沿海沿邊距省遥遠偏僻汛防各設營倉積糧以備藉糶皆隨時制宜裕不匱之儲永為軍民之利積貯國家循古制設常平倉隨時糴穀用資振貸豐年則勸民出升斗以益之厥後戸口殷阜廼出庫藏市糴閒或截漕運貯各州縣衛分上中下等以三萬二萬萬六千石為差承平歳久生齒日繁益需委積聼所在俊秀納粟入監視其土地廣狹山川險易物産盛衰酌舊額而更定之直隸積穀二百十有五萬四千五百二十四石盛京百二十萬石山東二百九十五萬九千三百八十六石山西百三十一萬五千八百三十七石河南二百三十一萬九百九十九石江蘇百五十二萬八千石安徽百八十八萬四千石江西百三十七萬七百十有三石福建二百五十六萬六千四百四十九石浙江二百八十萬石湖北五十二萬九百三十五石湖南七十萬二千百三十三石陜西二百七十三萬三千有十石甘肅三百二十八萬石四川百有二萬九千八百石廣東二百九十五萬三千六百六十一石廣西百二十七萬四千三百七十八石雲南七十萬一千五百石貴州五十萬七千有十石凡三千三百七十九萬二千三百石有竒凡常平積貯之法必相風土之寒暄燥濕東南西北異方稻麥粟米異宜江南江西福建浙江湖廣四川廣東廣西雲南貴州宜稻宜粟直隸盛京山東山西河南陜西或以米或以雜糧貯米者半穀之数每歳出陳易新土髙燥者以十之七存倉十之三平糶卑濕則存半糶半各因時地而變通之以均歳之豐歉督撫於歳終覈實奏銷以册送部稽察如有虧闕先請動帑買補将虧空官題叅照例治罪限年追賠凡買補之法春夏出穀秋冬還倉依市價於本地産穀之區或鄰邑價平處買運如数還倉遇歳歉市貴則展至次年若倉庾闕乏亟需補足者申明上官凖於價賤之州縣和糴抑富民派保甲者劾之凡順成之方本省倉庾既足督撫具疏請旨出庫藏委官収糴毋致價賤傷農若有多為麯蘖以糜穀者禁之凡直省倉穀有在常平額外者如河南漕穀倉江南江寧省倉崇明倉福建臺灣備貯倉浙江永濟倉玉環同知倉廣東廣糧通判倉或備本省急需或備鄰省協濟或因山海逺僻藉以充振備糶皆飭所在官按其額数時其出納以佐常平之所不及歳終彚入倉糧奏銷册内申報督撫送部察覈凡民間収穫時隨其所贏聼出粟麥建倉貯之以備鄉里借貸曰社倉公舉殷實有行誼者一人為社長能書者一人副之共領其事按保甲印牌有習業而貧者春夏貸米於倉秋冬大熟加一計息以償中歳則捐其息之半下歳免息社長社副執簿檢校歳以穀数呈官經理出納惟民所便官不得以法繩之豐年勸捐社穀在順民情禁吏抑派有好義能捐十石至百石以上者旌奨有差社長社副經理有方者按年給奬仍以息穀酌酬勞勩凡紳士捐穀以待振貸曰義倉各就市鎭鄉村建廒春頒秋斂取贏散滯奬善酬勞悉依社倉規條惟頒斂之期出入之籍時呈所在官覈之所在官於去任蒞任時授受簿籍察其虛實以行懲勸凡直省營戍沿邊沿海及去省遥遠者設倉貯穀曰營倉以營弁經理遇青黄不接之時或借或糶以接濟軍士如有那移虧闕照常平積穀例題叅追賠欽定大清會典卷十二
