front:
  text: 欽定四庫全書欽定大清㑹典卷四十七
  hash: sha256:0d98d58a345aa84e7cdee65c09dd20f1ebd2abc7ceb4397d67e25b0d184ab8bb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_047-1a, image: WYG0619/WYG0619-0386c.png}
body:
  text: 禮部祠祭清吏司中祀四凡祀天神之禮為壇一成於正陽門外設石龕四於壇北皆鏤以雲文以奉雲師雨師風伯雷師之神均南嚮嵗孟夏常雩後如不雨諏日遣官祗告祈雨天神位前各陳脯醢果實帛一爵三尊一鑪一鐙二先祈告一日樂部設中和韶樂於壇下分左右懸祀日日出前二刻遣官詣壇太常卿率所屬恭請神位奉安各龕内贊引太常贊禮郎二人引遣官由外壝左門入至内壝南左門贊盥洗遣官盥洗入門至壇下拜位前立鴻臚寺官引陪祀各官至内壝南門外左右序立均北面典儀官贊樂舞生登歌執事官各共迺職以下自迎神至送神均典儀官唱贊武舞八佾進贊引官贊就位引遣官就拜位立迺迎神司香官奉香盤進司樂官贊舉迎神樂凡舉樂皆司樂官唱贊奏祈豐之章贊引官贊升壇引遣官由東階升詣雲師香案前司香官跪奉香贊引官贊上香遣官上柱香次三上瓣香以次詣雨師風伯雷師前上香儀同贊復位引遣官降階復位贊跪叩興以下行禮皆有贊遣官行三跪九叩禮陪祀各官均隨行禮奠帛初獻爵司帛官奉篚司爵官奉爵各以次進奏華豐之章舞干戚之舞司帛官跪奠篚三叩司爵官立獻爵奠正中皆退司祝至祝案前跪三叩奉祝版跪案左樂暫止遣官以下皆跪司祝讀祝畢詣神位前跪安於案三叩退樂作遣官暨陪祀各官行三叩禮樂止武功之舞退文舞八佾進亞獻奏興豐之章舞羽籥之舞司爵官獻爵奠於左儀如初獻終獻奏儀豐之章舞同亞獻司爵官獻爵奠於右儀如亞獻樂止文德之舞退徹饌奏和豐之章徹饌畢送神奏錫豐之章遣官行三跪九叩禮陪祀各官均隨行禮有司奉祝次帛次香共送燎所遣官轉立西旁東面候祝帛過復位樂作引詣望燎位望燎贊引官告禮成引遣官退太常卿率所屬恭奉神位還御陪祀官皆退得雨霑足後諏日遣原祈官報祀天神位前各帛一爵三登一鉶一簠二簋二籩十豆十尊一鑪一鐙二共牛一羊一豕一樂章禮儀均與祈告同凡祭地祇之禮為壇一成於天神壇西設石龕五於壇南鏤山文者三水文者二以奉五嶽五鎮五陵山四海四瀆之祇均北嚮設石龕二於東石龕二於西各鏤山文者一水文者一東奉京畿名山京畿大川之祇西嚮西奉天下名山天下大川之祇東嚮嵗孟夏常雩後如不雨遣官祇告祈雨與天神壇同日舉行壇上北嚮五案東西嚮各一案皆陳脯醢果實尊一鑪一鐙二每位帛一爵三遣官入外壝右門由内壝北右門詣拜位陪祀各官拜於内壝北門外有司奉祝帛香送瘞所引詣望瘞位望瘞其餘樂章禮儀均與祈告天神同得雨報祭地祇位七案皆登一鉶一簠二簋二籩十豆十尊一鑪一鐙二每位帛一爵三共牛一羊一豕一餘與天神壇報祀同水潦祈晴冬旱祈雪遣官祗告天神地祈既應而報禮亦如之皇帝時巡所至親祭方嶽嶽神位前帛一牛一羊一豕一登一鉶二簠二簋二籩十豆十尊一爵三鑪一鐙二先祭一日行在樂部設中和韶樂於殿外階上分左右懸所司設大次於㦸門外南嚮至日昧爽行在鑾儀衞陳騎駕鹵簿於行宮門外扈從王公暨文武官陪祭如常儀地方文官知府武官副將以上與朝臣陪祭者以其班序班詳儀制司咸采服日出前三刻行在太常卿詣行宮告時皇帝御龍袍衮服乗輿出行宮前引後扈如常儀不陪祭扈從各官咸集行宮前跪送駕𤼵警蹕及嶽廟不陪祭地方官序列跪迎皇帝入廟中門至㦸門降輿入大次少憇太常卿奏請行禮皇帝出大次盥洗贊引太常卿二人恭導皇帝由㦸門中門陞中階入殿中門至拜位前北嚮立鴻臚官引王公位階上百官位階下左右序立均北面典儀官贊樂舞生登歌執事官各共迺職以下自迎神至送神皆典儀官唱贊贊引官奏就位皇帝就拜位迺瘞毛血迎神司香官奉香盤進司樂官贊舉迎神樂奏祈豐之章贊引官奏就上香位恭導皇帝詣香案前司香官跪進香贊引官奏上香皇帝立上柱香次三上瓣香奏復位皇帝復位奏跪拜興以下行禮皆有奏皇帝行二跪六拜禮王公百官均隨行禮奠帛行初獻禮司帛官奉篚司爵官奉爵進奏華豐之章司帛官跪奠篚三叩司爵官立獻爵奠正中皆退司祝至祝案前跪三叩奉祝版跪案左樂暫止皇帝跪王公百官皆跪司祝讀祝畢詣神位前跪安於案三叩退樂作皇帝率羣臣行三拜禮亞獻奏興豐之章司爵官獻爵奠於左儀如初獻終獻奏儀豐之章司爵官獻爵奠於右儀如亞獻徹饌奏和豐之章徹饌畢迺送神奏錫豐之章皇帝率羣臣行二跪六拜禮有司奉祝次帛次饌次香恭送瘞所皇帝轉立拜位旁西嚮候祝帛過復位贊引官奏禮成恭導皇帝出㦸門陞輿不陪祭地方官跪送於廟門外不陪祭扈從官跪迎於行宮門前皇帝還行宮衆皆退鑾輿所至方鎮及所過名山大川均遣官致祭儀與祭地祇壇同遇國家大慶典致祭嶽鎮海瀆以二品至四品京堂官充使以禮部太常寺筆帖式齎祝文香帛導以繖仗龍旗諏日發京師往祭東嶽泰山於山東泰安府東鎮沂山於青州府南嶽衡山於湖南衡州府南鎮㑹稽山於浙江紹興府中嶽嵩山於河南登豐縣中鎮霍山於山西霍州西嶽華山於陜西華隂縣西鎮呉山於隴州北嶽恒山於山西渾源州北鎮醫巫閭山於盛京廣寧縣長白山於黑龍江東海於山東萊州府南海於廣東廣州府西海於山西蒲州府望祭北海於吉林望祭河瀆於山西蒲州府江瀆於四川成都府淮瀆於河南唐縣濟瀆於濟源縣皆帛一牛一羊一豕一登一鉶二簠簋各二籩十豆十尊一爵三鑪一鐙二遣官前祭期致齋二日將事行禮均與祭地祇壇儀同所在有司嵗以春秋仲月諏日致祭牲用羊一豕一餘儀與遣官致祭嶽鎮海瀆同直省府州縣各建神祇壇中設雲雨風雷之位左設本境山川之位右設本境城隍之位嵗以春秋仲月諏日致祭以帛七羊一豕一鉶二簠二簋二籩四豆四尊一鑪一鐙二爵各三餘儀與直省祭社稷同孟夏諏日行常雩禮如常雩後不雨自督撫至州縣咸率所屬致齋修省虔禱神祇為民請命既應而報陳設禮儀均與春秋常祭同若乆雨祈晴冬旱祈雪禮亦如之凡祀太嵗之禮爲殿於正陽門外之西嵗以正月上旬諏吉及嵗除前一日均遣官太嵗之神正殿神位南嚮帛一牛一羊一豕一登一鉶二簠二簋二籩十豆十尊一爵三琖三十鑪一鐙二牲俎帛篚羃勺咸具四時十二月各有主者分祀兩廡東廡司春秋為位六均西嚮西廡司夏冬為位六均東嚮兩廡各設二案每案帛三餘陳設與正殿同先祀一日樂部設中和韶樂於殿内分左右懸祀日日出前四刻遣官詣壇太常卿率所屬恭請太嵗神位出龕安奉神座啟十二月神龕畢贊引太常贊禮郎二人引遣官由拜殿南左門入出北門降階贊引官贊盥洗遣官盥洗引由正殿左階升至門外正中拜位嚮上立贊禮郎各二人引兩廡分獻官於􅒉中夾甬道左右嚮上立典儀官贊樂舞生登歌執事官各共迺職以下自迎神至望燎皆典儀官唱贊武舞八佾進贊引官贊就位遣官就拜位迺迎神司香官奉香盤進司樂官贊舉迎神樂凡舉樂皆司樂官唱贊後同奏保平之章贊引官贊就上香位引遣官入正殿左門詣香案前立司香官跪奉香贊引官贊上香遣官立上柱香次三上瓣香贊復位引遣官復位贊跪叩興以下行禮皆有贊遣官行三跪九叩禮分獻官均隨行禮奠帛初獻爵司帛官奉篚司爵官奉爵進奏定平之章舞干戚之舞司帛官跪奠帛三叩司爵官立獻爵奠正中皆退司祝至祝案前跪三叩奉祝版跪案左樂暫止遣官跪分獻官皆跪司祝讀祝畢奉祝版詣太嵗位前跪安於案三叩退樂作遣官行三叩禮分獻官均隨行禮分獻官詣兩廡上香執事生奠帛獻爵畢分獻官退復位樂止武功之舞退文舞八佾進亞獻奏嘏平之章舞羽籥之舞司爵官獻爵奠於左儀如初獻終獻奏富平之章舞同亞獻司爵官獻爵奠於右儀如亞獻兩廡以次畢獻均如初樂止文德之舞退太常官贊賜福胙執事生二人奉福酒福胙詣神位前拱舉降由中門出立遣官拜位之右執事生二人進立於左遣官跪左右執事生皆跪右執事生授福酒遣官受爵拱舉授左執事生受胙亦如之三叩興偕分獻官行二跪六叩禮徹饌奏盈平之章徹饌畢送神奏豐平之章遣官行三跪九叩禮分獻官均隨行禮有司奉祝次帛次饌次香恭送燎所遣官避立拜位旁東面候祝帛過復位樂作引遣官仍由左階降詣望燎位望燎告禮成引遣官出分獻官以次退太常卿率所屬恭請神位還御衆皆退嵗孟夏常雩後如不雨遣官祗告祈雨得雨報祀百官應陪祀者咸與均與神祇壇同日舉行樂章迎神奏需豐奠帛初獻爵奏宜豐亞獻奏晉豐終獻奏協豐徹饌奏應豐送神奏洽豐水潦祈晴冬旱祈雪禮亦如之欽定大清㑹典卷四十七
