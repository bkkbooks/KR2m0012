  text: 欽定四庫全書欽定大清㑹典卷五十八
  hash: sha256:cf87982944c66c443433695496fcd088d45b3bfc50bb7211a746353c896cd71c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_058-1a, image: WYG0619/WYG0619-0492a.png}
body:
  text: 樂部典樂以禮部滿尚書兼之各部院内務府堂官知樂者簡用無定員掌五音六律以合隂陽之聲所屬有神樂和聲二署掌儀司鑾儀衞樂並𨽻焉神樂署漢署正一人漢署丞二人漢協律郎五人漢司樂二十二人和聲署署正滿漢各一人署丞滿漢各一人以禮部内務府司官兼攝供奉供用無定員以太常寺鴻臚寺内務府官兼攝掌儀司鑾儀衞司官各見該衙門分掌協律之事凡郊廟祠祭之樂神樂署司之殿廷朝㑹燕饗之樂和聲署司之宮中慶賀燕饗之樂掌儀司司之鐃歌鼓吹前部大樂鑾儀衞司之均統於樂部春秋季月大合樂於樂部典樂率所屬咸涖視之凡祠祭樂律南郊以黄鐘爲宮北郊以林鐘爲宮太廟以太蔟爲宮社稷春以夾鐘爲宮秋以南呂爲宮祈雨以夾鐘爲宫報祭以南呂爲宮朝日以太蔟爲宮夕月以南呂爲宮前代帝王先師孔子均春以夾鐘爲宮秋以南呂爲宮先農以姑洗爲宮先蠶以仲呂爲宮天神以黄鐘爲宮地祇以林鐘爲宮太歲以太蔟爲宫凡樂章天地太廟社稷帝王廟文廟先蠶太歲均曰平日曰曦月曰光先農曰豐禱祀亦曰豐祀天九奏冬至迎帝神奏始平奠玊帛景平進俎咸平初獻夀平亞獻嘉平終獻永平徹饌熙平送神清平望燎太平祈穀迎帝神奏祈平奠玊帛綏平進俎萬平初獻寶平亞獻穰平終獻瑞平徹饌渥平送神滋平望燎穀平常雩迎帝神奏靄平奠玊帛雲平進俎需平初獻霖平亞獻露平終獻霑平徹饌靈平送神霮平望燎霈平祭地八奏迎神奏中平奠玊帛廣平進俎含平初獻大平亞獻安平終獻時平徹饌貞平送神寧平太廟六奏時饗迎神奏貽平奠帛初獻敉平亞獻敷平終獻紹平徹饌光平還宮乂平大祫迎神奏開平奠帛初獻肅平亞獻協平終獻裕平徹饌諴平還宮成平社稷七奏春秋祈報迎神奏登平奠玊帛初獻茂平亞獻育平終獻敦平徹饌博平送神樂平望瘞徵平祈雨報祭迎神奏延豐奠玊帛初獻介豐亞獻滋豐終獻霈豐送神貽豐望瘞溥豐朝日七奏迎神奏寅曦奠玊帛朝曦初獻清曦亞獻咸曦終獻純曦徹饌延曦送神歸曦夕月六奏迎神奏迎光奠玊帛初獻升光亞獻瑶光終獻瑞光徹饌涵光送神保光饗前代帝王六奏迎神奏肇平奠帛初獻興平亞獻崇平終獻恬平徹饌淳平送神匡平釋奠於先師六奏迎神奏昭平奠帛初獻宣平亞獻秩平終獻敘平徹饌懿平送神德平饗先農七奏迎神奏永豐奠帛初獻時豐亞獻咸豐終獻大豐徹饌屢豐送神報豐望瘞慶豐饗先蠶六奏迎神奏庥平初獻承平亞獻均平終獻齊平徹饌柔平送神洽平祈報天神地祗均六奏迎神奏祈豐奠帛初獻華豐亞獻興豐終獻儀豐徹饌和豐送神錫豐方嶽同祀太嵗六奏祖迎迎神奏保平奠帛初獻定平亞獻嘏平終獻富平徹饌盈平送神豐平祈雨報祭迎神奏需豐奠帛初獻宜豐亞獻晉豐終獻協豊徹饌應豐送神洽豐羣祀自先醫以下均和聲署奏慶神歡樂凡佾舞壇廟初獻舞武功之舞亞獻終獻舞文德之舞均八佾文廟六佾三獻均文舞先蠶及羣祀無佾舞凡樂器中和韶樂八音咸備金之屬曰鐘石之屬曰磬絲之屬曰琴曰瑟竹之屬曰排簫曰簫曰篴曰篪匏之屬曰笙土之屬曰壎革之屬曰鼓曰搏拊木之屬曰柷曰敔壇廟均麾一編鐘編磬各十有六琴十瑟四排簫二蕭篴笙各十壎二篪六建鼓一搏拊二柷敔各一木笏十文廟琴簫篴笙各六篪四木笏六餘均同先蠶壇方響十有六琴四瑟二雲璈二簫篴笙各六鼓一杖鼓二拍二木笏十羣祀樂雲璈一篴笙管各二鼓一拍一佾舞器引舞以旌節左右各一武功之舞以干戚文德之舞以羽籥各六十有四凡設樂四郊社稷先農先蠶設於壇下祈年殿太廟帝王廟文廟設於階上太歲殿設於殿内均左右懸羣祀樂設於右階上下凡朝㑹樂律御殿還宮奏中和韶樂三大節均以黄鐘爲宮常朝正月以太蔟二月以夾鐘三月以姑洗四月以仲呂五月以㽔賓六月以林鐘七月以夷則八月以南呂九月以無射十月以應鐘十一月以黄鐘十二月以大呂爲宮遇閏節前從上月律節後從下月律爲宮皇太后皇后宮三大節均以南呂爲宮凡樂章皇帝陞殿元日奏元平長至遂平元宵怡平萬夀聖節乾平常朝隆平還宮元日奏和平長至允平元宵昇平萬夀聖節㤗平常朝顯平皇太后陞座奏豫平還宮履平皇后陞座奏淑平還宫順平朝賀行禮奏丹陛大樂樂章太和殿羣臣行禮奏慶平外藩四夷使臣行禮奏治平内朝行禮奏雝平皇太后宮三大節皇帝率羣臣行禮奏益平皇后率貴妃妃嬪公主福晉命婦行禮與内朝同皇后宮三大節貴妃妃嬪公主福晉命婦行禮奏正平凡乘輿出入及慶典奏導迎樂躬祀壇廟禮成囘鑾奏祐平廵狩方嶽車駕出入進春進表箋進書進穜稑進鉤筐頒詔頒朔迎吻齎榜均奏禧平凡清樂均以樂辭首句爲章名章多者擇奏數闋恭上皇太后徽號御太和殿閲册寶奏海上蟠桃之章大燕進饌奏萬象清寧之章皇太后宮大燕同上元節張鐙奏火樹星橋之章耕耤禮成設燕進饌奏風和日麗之章幸翰林院設燕進饌奏玊署延英之章凱旋賜燕進饌奏日耀中天之章均殿廷清樂大燕進茶奏海宇昇平日之章進酒奏玉殿雲開之章皇太后宮大燕同耕耤禮成設燕進茶奏喜春光之章進酒奏雲和迭奏之章幸翰林院設燕進茶奏文物京華盛之章進酒奏延閣雲濃之章凱旋賜燕進茶奏景運乾坤㤗之章進酒奏聖德誕敷之章均丹陛清樂皇帝耕耤歌三十六禾辭皇后親採桑歌採桑歌大燕進酒歌慶隆舞樂九章車駕至盛京大燕歌世德舞樂十章凱旋賜燕歌德勝舞樂章臨時撰擬並於笳吹樂之六十七章番部合樂之六章擇奏數闋大閲駕出鐃歌大樂奏壯軍容之章駕入鐃歌清樂奏鬯皇威之章衍聖公來朝賜燕於禮部五魁舞樂奏洙泗發源長之章賜恩榮燕於禮部奏啟天門之章鷹揚燕於兵部奏和氣洽之章行鄉飲酒禮於順天府庠歌鹿鳴笙御製補南陔之章門歌魚麗笙御製由庚之章合樂闗睢凡鐃歌清樂二十七章大樂二十八章皇帝省方駐宿御營每朝鳴䝉古畫角每夕間奏鐃歌樂數闋躬祀郊廟禮成囘鑾及獻俘均奏前部大樂鐃歌鼓吹凡隊舞殿廷燕饗之舞有揚烈舞喜起舞合稱慶隆舞盛京稱世德舞凱旋賜燕稱德勝舞又有朝鮮國俳舞瓦爾喀部樂舞擲倒伎舞繩伎舞元日燕羣臣於太和殿歲除燕外藩於保和殿元宵於禁苑諸舞備舉凡樂器中和韶樂均麾一編鐘編磬各十有六琴四瑟二排簫二簫篴各四笙八壎篪各二建鼓一搏拊二柷敔各一丹陛大樂戲竹二方響二雲璈二篴管笙各四大鼓二杖鼓拍各一清樂均雲璈篴管笙各二小鼔杖鼓拍各一導迎樂雲璈二篴四管六笙二鼓拍各一三十六禾辭樂金鼓簫篴笙拍各六採桑歌樂金鼓拍各二簫篴笙各六慶隆樂箏阮各一琵琶三絃各八節拍各十有六世德舞德勝舞同笳吹樂笳阮箏口琴各一番部合奏樂箏琵琶三絃二絃月琴胡撥􅌙阮四絃阮雲璈篴管簫笙拍各一部燕樂雲璈篴管笙各二鼓拍各一鄉飲酒樂編磬八琴瑟各一簫篴笙各四鐃歌鼓吹畫角二十有四掆鼓四十有八杖鼓拍各二金二鉦四篴十有二大銅角小銅角各八前部大樂大銅角小銅角金口角各四鐃歌大樂大銅角小銅角金口角各八銅鼓四金二鈸㸃鼓各一鐃歌清樂雲璈篴管笙各二鈸㸃鼓各一隊舞器揚烈舞介胄弓矢大刀面具禺馬喜起舞具朝服佩儀刀凡設樂宮懸設於太和殿保和殿檐下丹陛大樂設於太和門中和殿後檐下清樂二部一設於殿外中和樂之東一設於丹陛樂之東揚烈舞及諸樂舞於丹陛喜起舞及笳吹番部合奏樂於殿内慶隆樂及瓦爾喀部樂舞於檐下均先竢於殿外東序欽定大清㑹典卷五十八
