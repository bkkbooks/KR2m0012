body:
  text: 大清會典序自郊廟朝廷放之千百國徼荒服屬之倫而莫之偝創業守文繩之億萬葉矩矱訓行之久而勿之渝非會典奚由哉顧惟自聖作明述政府粲陳其間有因者即不能無損與益而要之悉損益以善厥因則方策所麗乃一成不易之書非閲世遞輯之書也國家膺大寳命列聖肇興禮樂明備皇祖聖祖仁皇帝康熙二十三年始勑釐定會典則以時當大業甫成實永肩我太祖太宗世祖三朝之統緒不可以無述而述固兼作矣皇考世宗憲皇帝雍正五年申諭閣臣敬奉成編攷衷條系則以累洽重熙更兼皇祖景祚延洪化成久道不可以無述而述且未遑言作矣暨朕寅紹丕基祇祇翼翼壹惟法祖宗之法心祖宗之心𤼵冊披圖罔或偭隃尺寸會西陲大功告蕆幸纉承祖宗欲竟之志事而凡職方官制郡縣營戍屯堡覲饗貢賦錢幣諸大政於六曹庶司之掌無所不𨽻且我皇考勵精圖治十三年之間立綱陳紀復不可無紀以垂永世爰咨館局次苐具草乙夜手批是正而諗之曰嚮者𤼵凡排篹率用原議舊儀連篇並載是典與例無辨也夫例可通典不可變今將緣典而傅例後或摭例以殽典其可乎於是區會典則例各為之部而輔以行諸臣皆謂若網在綱咸正無缺而朕弗敢専也盖此日所輯之會典猶是我皇祖皇考所輯之會典而俛焉從事於兹者豈直義取述而不作云爾哉良以抱不得不述之深衷更推明不容輕述之㣲指稽典者當瞭然知宰世馭物所由來無自疑毎朝迭脩為故事耳若夫治法心法表裏兼賅精之而貫徹天人擴之而範圍今古如徃牒所稱惟睢麟足以行官禮者是又數典之原嘉㑹之本也朕其敢不懋諸敢不與子孫臣民交朂諸乾隆甲申春御製欽定四庫全書欽定大清會典凡例一會典以典章會要為義所載必經久常行之制兹編於國家大經大法官司所守朝野所遵皆總括綱領勒為完書其諸司事例隨時損益凡頒之綸綍議自羣寮舊制新裁與夫微文末義縷析條分並詳則例以典為綱以則為目庶詳畧有體一會典舊本每遇大典禮必臚序列朝行事即一事之更定一節之沿流亦必分年備書誠有如聖諭所云原議舊儀連篇並載反掩正文者兹謹裒集舊典所載並取到各衙門册籍通行校訂自本朝開國以來及見修會典告成以前一應典制薈萃源流斟酌詳備於朝廟典禮各定為一儀於官司事例各定為一則化參差之跡成畫一之規嗣後如間有因時損益之處其畸零節目止於則例内増改即有關大體者亦止刋補一二條無煩全書更動庶一勞永逸以便遵循一舊典分别在京文武衙門文職計四十有八武職惟鑾儀衞一官謹按八旗都統經理兵馬錢糧戸口田土世爵佐領等事多與戸兵兩部關會實有本職專行又領侍衞内大臣護軍統領前鋒統領居則周廬環衛出則折衝禦侮歩軍統領提督京營掌管門禁廵捕郊畿皆職任重大今並增輯以備武職之考一會典採取羣書折衷參定凡列聖實録内有應登載者皆從皇史宬敬謹鈔録以為全書綱領他若吏部品級考戸部賦役全書漕運新書關稅則例禮部禮書學政全書科塲條例兵部中樞政考軍衞道里表刑部律例全書督捕則例三流道里表工部河防一覽軍器則例工程做法欽天監數理精蘊樂部律吕正義大清一統志盛京通志諸書皆已刋刻頒行祗備參考無庸複載至於分門編類槩以各衙門送到册籍為憑或無册可稽者則行移各省督撫據咨覆載入一編纂之體因官分職因職分事因事分門因門分條每條冠以凡字其事本相類毋庸别立專條者則隔圏以書之其設官定制事有原委非條目所能盡者則於每門簡端畧叙數語以見大槩一部院諸司事多關渉惟於專掌衙門備載其關渉衙門止摘其要領略見顚末仍於本條内注明詳見某典某則一會典不書年分惟戸部丁賦𣙜稅每年增減不一仍遵照舊典覈得乾隆十八年額數登載工部𣙜稅仿此一衙門次第皆按品級遵照舊典序列其四譯館改隸禮曹行人司已經裁汰僧録道録兩司已詳禮典皆毋庸開載至增入之領侍衞内大臣八旗都統前鋒䕶軍歩軍統領與鑾儀衞共為一卷依次列於文職衙門之後一全書告成於乾隆二十三年凡在告成以後續定之例槩不登載惟理藩院職掌藩服恭遇西陲平定規制詳備展輯條例至乾隆二十七年其餘各衙門典則有奉特㫖增入者皆不拘年限一圖式凡壇廟規制職方輿地莫不有圖其五刑之具喪服之制皆具列以垂萬世章程會典館總裁和碩履親王臣允祹等恭承勅㫖纂修大清會典告成謹上表恭進者伏以帝治光昭官禮溥睢麟之意皇圖郁炳文明開黼黻之休作者聖而述者明協創垂之極軌聲為律而身為度昭法守於鴻編載籍聿新規模大備竊惟王者致太平必自典章盡善而聖朝有成憲每於簡策昭垂在昔唐虞首著典謨夏商亦傳誓誥周則監於二代紀乃六官凡以懸象魏以成一代之治功必當布方䇿以昭萬世之道法欽惟我皇上乘六以御奉三無私陳紀立綱觀人文以化天下綏猷建極考禮樂以等百王爰以勅幾省度之餘穆乎繩武紹庭之意謂本朝之典禮經列聖之訓行溯自肇迹豐岐已具經綸草昧洎乎握符華夏尤徴創制顯庸聖祖仁皇帝化協裁成道隆制作既登郅治旋潤鴻猷於康熈二十有九年成會典百六十二卷世宗憲皇帝復加研閱申命纂修固已美善必究其歸敷錫咸要於極矣顧時更廿載或輕重異宜事閱兩朝或質文異用雖大經大法固已酌今古而定厥中而盡制盡倫有當觀會通以神其變况或當時珥筆諸臣有未曾窺之蘊奥或向日分編衆手有不及訂之異同徒襲成編每虞膠柱我皇上幾餘觀覽洞矚源流特諭纂修親為指授既定全書之體式幷示舊本之舛訛凡有指歸悉經宸斷間多更正咸禀睿裁於是發凡起例若網在綱州次部居如裘挈領為繁為簡既損益之得中有革有因亦推行之盡利煌煌乎理器之兼貫洵宜古而宜今郁郁乎經曲之畢該皆有倫而有要繼志述事聿成纘緒之休衣德紹聞幷著貽謀之美布之明堂而會歸有極傳之天下而曲成不遺以正百官以正萬民禮樂興而刑訟息行乎州里達乎閭巷道德一而風俗同猗歟休哉莫可尚已臣等職忝校讐才慚潤色幸藉編摩之役仰窺制作之精愧尸素以頻年敢謂恪勤將事惟勾稽於衆籍尚虞掛漏貽譏完書具而法制詳咸快覩於致太平之迹大典昭而休明備敬拜手以慶王道之成臣等無任瞻天仰聖激切屏營之至謹奉表隨進以聞總裁和碩履親王臣允祹協辦大學士吏部尚書臣孫嘉淦臣舒赫德臣班第太子太師吏部尚書臣汪由敦吏部尚書臣王安國副總裁刑部左侍郎臣錢陳羣原任吏部右侍郎臣王㑹汾經筵講官户部左侍郎臣裘曰修刑部右侍郎臣蔡鴻業内閣學士兼禮部侍郎臣李宗文提調都察院左副都御史世襲一等子臣積德内閣學士兼禮部侍郎臣吳達善臣鶴年臣世臣臣雅德内閣侍讀臣輔德臣來朝臣巴延三臣富察善臣富勒渾臣賽尚阿滿纂修翰林院侍讀學士臣文保臣朱蘭泰臣宏亮翰林院侍讀臣吳爾泰翰林院侍講臣官保翰林院編修臣僧格勒詹事府少詹事臣德爾泰詹事府左庶子臣世貴詹事府右中允臣法亮詹事府右贊善臣武極理戸科掌印給事中臣傅參兵科給事中臣常福掌江南道監察御史臣柱吏部郎中臣葛爾福禮部郎中臣寧福臣阿成峩工部郎中臣洙蘭泰臣輔德内閣侍讀臣馬明阿臣杜成章臣趙鍈吏部員外郎臣綽克托臣常泰兵部員外郎臣朱章阿臣安福刑部員外郎臣阿林泰太僕寺員外郎臣方泰吏部主事臣邁拉遜太僕寺主事臣常奇内閣中書臣唐訥臣寧昌臣舒賓太常寺博士臣明泰漢纂修翰林院侍讀學士臣顧汝修翰林院侍講學士臣吳履泰翰林院編修臣朱佩蓮臣儲麟趾臣諸錦臣李清時臣鄭虎文臣秦鐄臣汪廷璵臣王居正翰林院檢討臣阮學浩臣陳兆崙臣程恂臣程巖吏科掌印給事中臣陳作梅戸科掌印給事中臣程盛修掌京畿道監察御史臣陳大復福建道監察御史臣金相吏部郎中臣陳鍔臣姚成烈戸部郎中臣李清載兵部郎中臣張若溎刑部郎中臣尹嘉銓工部郎中臣張忠震臣張曾政吏部員外郎臣王秉鑑臣趙春福臣馮成修臣孔毓文戸部員外郎臣徐熊臣金祖靜臣王鋌禮部員外郎臣鄭肇奎吏部主事臣何曰熈禮部主事臣秦朝釪臣沈清任兵部主事臣張玊階工部主事臣薄岱臣魏夢龍兵部額外主事臣王宬收掌内閣中書臣納錫泰臣皂保臣沙色臣圖敏臣安永臣喀爾崇義臣翰圖臣重祿臣兆坊臣毓奇翰林院筆帖式臣富達禮臣恒昌臣赫盛額臣特克圖繙譯内閣中書臣巴尼渾吏部筆帖式臣五雲山候補筆帖式臣文德臣富隆阿臣吉祿繙譯官臣舒世祿臣佛爾格臣胡圖立臣福勒賀臣賀之傑臣鄂岱臣德克菁莪臣永成臣英福臣特通額臣舒明阿臣德福臣福慶臣寳舒臣岳喜滿謄錄内閣中書臣費揚古臣那永阿戸部筆帖式臣興聖訓兵部筆帖式臣德慶臣曾福臣書泰刑部筆帖式臣髙大源臣慈保翰林院筆帖式臣閻埰候補筆帖式臣噶祿謄錄官臣卓爾馬臣清泰臣劉廣嗣臣富興泰臣承謨臣臧士林臣保寧臣富僧阿臣那明臣華連布漢謄錄州同職銜臣黑光臣沈鵬九臣陸華榮州判職銜臣吳馥候補敎諭臣孟延祀臣陳祖槐縣丞職銜臣桂正順臣沈霖潤臣彭以諶臣汪如汸舉人臣范棫士臣凌景臣張守約臣熊之福臣張三禮臣童翼熊監生臣章引年臣萬琳廩生臣方國柱生員臣朱廷璋武英殿監理御武前侍英衞和殿碩額駙事署務理臣福隆安武英殿總理事務副都統臣和爾經額監造内務府管理六庫事務郎中臣六十九内務府廣儲司郎中臣誠意内務府管理三旗銀兩莊頭處員外郎兼佐領臣中敏副管領臣六格臣扎欽監造臣永善臣吉蘭太庫掌臣塞勒臣九格臣六達色武英殿總裁兵部尚書管理國子監事務臣陸宗楷兵部左侍郎世襲一等輕車都尉臣蔣檙提調左春坊左中允臣陳淦翰林院編修臣饒學曙翰林院編修敎習庶吉士臣彭元瑞漢文校對日講官起居注翰林院侍講學士臣錢大昕翰林院編修臣陳蘭森臣彭紹觀臣胡髙望翰林院檢討臣芮永肩翰林院編修臣劉焯臣卜祚光翰林院檢討臣邵庾曾翰林院編修臣董誥臣褚廷璋翰林院檢討臣李鐸翰林院庶吉士臣沈世煒清文校對兵部郎中臣郭鵬翀工部郎中臣孫琦理藩院員外郎臣恩成戸部主事臣赫敏戸部縀疋庫司庫臣和隆鄂工部織造庫司庫臣富隆泰戸部筆帖式臣金培臣惠齡内繙書房繙譯官臣明保工科筆帖式臣德元漢文校刋候選復設教諭臣周一鵬候選直隸州州判臣汪雝候選州同臣宋振德貢生臣顧天駿臣李今萬臣孔傳灝臣戚健中臣金統臣張應均欽定四庫全書史部十三欽定大清㑹典目錄政書類一通制之屬卷一宗人府卷二内閣卷三吏部敘官文選清吏司官制一官制二卷四官制三官制四卷五銓政卷六考功清吏司考察致仕告病功過期限交代囘籍稽勲清吏司守制終飬附卷七驗封清吏司世爵功臣封爵表封贈廕敘土官書吏卷八戸部敘官疆理卷九戸口卷十田賦卷十一權量卷十二庫藏倉庾積貯卷十三漕運卷十四錢法卷十五鹽法卷十六關稅卷十七雜賦卷十八俸餉卷十九蠲䘏卷二十禮部敘官儀制清吏司嘉禮朝會一卷二十一朝會二卷二十二朝會三卷二十三登極尊崇卷二十四册立尊封册封一册封二卷二十五經筵視學巡幸御新宫卷二十六耕耤親蠶卷二十七授時頒詔頒賞卷二十八進表進書鑄印卷二十九婚禮一婚禮二卷三十冠服卷三十一貢舉卷三十二學校風敎鄉飲