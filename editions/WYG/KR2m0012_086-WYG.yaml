body:
  text: 欽天監兼管監事大臣無定特簡員監正滿一人西洋一人監副滿漢各一人左右監副各西洋一人掌測候推步之法占天象以授人時所屬時憲科春夏中秋冬五官正滿二人䝉古二人漢軍一人漢五人博士滿三人漢軍二人漢十有六人天文生滿十有二人漢軍八人漢二十四人五官司書漢一人掌推天行之度騐嵗差以均節氣天文科五官靈臺郎滿三人漢軍一人漢四人五官監候漢一人博士滿三人漢二人天文生滿二人漢三十二人掌觀天象之垂書雲物以協嵗占漏刻科五官挈壺正滿二人漢二人五官司晨漢軍一人博士漢六人天文生滿二人漢六人隂陽生漢十人掌調壺漏測中星相隂陽以卜營建主簿滿漢各一人掌章奏文移簿籍筆帖式十有七人掌繙譯凡推步之法遵御製厯象考成以推日月交食七政經緯躔度合朔弦望節氣交宫月五星相距遵欽定儀象考成以測星度遵欽定萬年書以注御覽及民用時憲書遵欽定協紀辨方書以選擇年月日時凡測量儀器御製天體儀赤道儀黄道儀地平經儀均徑六尺地平緯儀一名象限儀紀限儀一名距度儀均半徑六尺地平經緯儀地平徑五尺象限徑六尺御製璣衡撫辰儀徑六尺設於觀象臺上測日圭表立表高一丈平案長一丈六尺二寸末植立表長三尺五寸設於臺下晷影堂候時壺漏播水壺三分水壺一受水壺一中浮時籌水盈籌盡洩水於池設於堂下壺室凡測候之法設觀象臺於京城東南隅日以滿漢官各一人率天文生十有五人登靈臺考儀器以窺乾象毎時以四人分觀四方晝夜輪直按時記風雷雲氣流星諸象次日報監應奏者按占宻題不應奏者注册元日寅時騐風起之方八節如之雷始發聲騐雷起之方皆即時報監按占宻題晴雨按日記注彚録一册至次年二月一日恭進京師直省及各䝉古部落朝鮮國日出入晝夜時刻以實測北極出地之度為定節氣早晩以實測東西偏度為定遇册封外國遣官隨徃測騐凡時憲書嵗以二月一日進來嵗時憲書式四月一日頒式直省刋刻十月一日恭進皇太后皇帝皇后皇貴妃貴妃妃嬪頒賜王公百官詳見禮部凡日月交食豫推京師直省見食分秒時刻方位前期五月繪圖具疏以聞㫖下禮部頒行中外臨期集官吏於公所救䕶監正以下赴觀象臺同禮部官測騐按占宻題别委官赴救䕶衙門候時如隂雲不見不占食不及一分不救䕶凡相度風水遇大工營建委官相隂陽定方嚮諏吉興工凡春牛圖順天府嵗以六月移監校嵗建干支按五行以辨牛色迺繪圖繕本進呈凡直更候時嵗委博士二人率隂陽生十人輪直譙樓日委博士一人輪直神武門指示更㸃恭遇車駕巡幸委官隨從直更亦如之内廷時辰房日委天文生一人看香候時朝祭慶典由各衙門行文諏日委官候時凡升除於應升官内論俸擬正簡選擬陪咨送吏部保舉應升及考取應用者指名咨吏部均引見補授天文生滿洲䝉古漢軍由算學㑹同本監考定算學生名次送吏部注册按旗依次補用時憲天文兩科漢天文生由算學㑹同本監考定算學生暨肄業生名次送監漏刻科漢天文生隂陽生由監考取肄業生均與世業子弟分班補用謹按漢初洛下閎造渾天儀後漢張衡製渾象隋志云渾天象者其制有璣而無衡本朝康熙十二年製天體儀即古之渾象也鑄銅為球徑六尺兩端中心為南北極以鋼軸貫之面刻黄赤二道平分十二宫布列星漢以肖穹象其外為子午圏徑六尺一寸兩面刻去極度東面兩極開半圓孔以受天體之軸别以半圓合而固之其下為地平圏徑與子午圏等面濶七寸周為水渠外刻四象限度及地平時刻方位下施四足承以圓座設螺柱以取平南北正中嚮西開闕口以受子午圏半入地平下半出地平上自天頂設高弧帶地平遊表以察諸曜地平經緯度北極安時盤定於子午圏設遊表於極樞令能自轉以指日度又能隨天體旋轉以指時座下又設機輪使北極能升降則各地天象隠見之界皆可暸然尤古制所未及焉謹按渾天儀制為儀三重外曰六合儀次内曰三辰儀最内曰四遊儀凡七圏本朝康熙十二年製赤道經緯儀二重凡三圏盖合三辰於六合而又省一地平圏也其外正立為子午圏外徑六尺一寸兩面皆刻去極度數京師天頂距北極五十度五分北極出地南極入地各三十九度五十五分兩極側面各安鋼軸以半圓合而固之距兩極各九十度横直赤道緯圏外徑五尺九寸内規面及上側面刻周天時刻外規面及下側面刻周天度分又自南極兩旁承以兩象限弧使不傾墊次内為赤道經圏外徑五寸六寸四面刻赤道緯度貫於南北極之兩軸其内又為通軸徑一寸中半安横表長三寸赤道上設遊表對直軸以測赤道經度經圏上設遊表對横表以測赤道緯度其下為半圓雲座以龍架承之謹按渾天儀制有黄道緯圏而無黄道經圏本朝康熙十二年製黄道經緯儀三重凡四圏其外正立為子午圏制與赤道儀子午圏同次内為過極至圏外徑五尺五寸規面濶二寸三分側面厚一寸一分兩面皆刻去極度數貫於南北極之兩軸以象天之左旋距赤道極二十三度三十一分三十秒為黄道極距黄極九十度横置黄道緯圏其徑及濶厚皆與過極至圏等四面皆刻黄道經度以象七政之右旋又次内為黄道經圏外徑五尺一寸四分規面濶九分側面厚二寸三分四面皆刻黄道緯度以鋼軸貫於黄極以象黄道之四遊兩極安直軸徑一寸中半安横表長三寸緯圏上設遊表對直軸以測黄道經度經圏上設遊表對横表以測黄道緯度其下為半圓雲座以龍架承之謹按渾天儀制有地平圏能測三辰當地平之經度而不能測地平上之經度本朝康熙十二年製地平經儀平置地平圏外徑六尺二寸濶二寸四分厚一寸二分上面側面皆刻四象限度上面自南北起初度側面自東西起初度東西設通徑下設圓盤四面以立龍承之地平圏之下中心安立柱高與地平圏等適當地平圏之圓心上出圓軸地平圏之上東西植二龍柱結為横梁中心開孔下與圓心相直中間安立表長四尺四寸上應天頂下應地心立表之末結十字横表與地平圏相切長與地平圏全徑等立表中空上下設倒正小圓柱頂開一孔旁開二孔中結直線斜貫於横表之兩端成兩三角形凡測日月星無論距地平上若干度但將横表推轉令三線與所測叅直視横表所指度分即得各曜之地平經度焉謹按渾天儀制有地平圏而無地平經圏元郭守敬簡儀設立運圏以測三辰出地之度即地平經圏也本朝康熙十二年製象限儀為全圓四分之一亦名地平緯儀其制上正方角為圓心縱横兩邊皆為半徑各長六尺濶二寸一分厚一寸一分象限弧濶二寸六分厚一寸一分正面刻九十度分外規面刻度數字其數自上而下者以紀地平高度自下而上者以紀距天頂度中間聨以雲龍背面正中為立軸以運之立軸與儀之直邊平行長九尺七寸濶二寸一分厚一寸七分圓其兩端東西立柱高九尺四寸上下為横梁濶七尺八寸飾以雲龍正中設圓孔以受立軸東西運轉圓心安横軸長三寸一分軸本安遊表濶二寸一分厚三分長與半徑等遊表之末設立耳以測地平緯度較之全圓尤便焉謹按諸曜在天之度赤道經緯以南北二極為宗黄道經緯以黄極為宗地平經緯以天頂為宗至於兩曜斜距之度古無測器本朝康熙十二年製紀限儀亦名距度儀其制一弧一幹弧為圓周六分之一通弦六尺面濶二寸五分中至兩旁各列三十度幹為圓之半徑長亦六尺幹末安柄以便推移半徑上端為圓心設立柱以安遊表長與半徑等遊表之末設立耳為測一曜之用弧背左右各設窺表為别測一曜之用又於幹之兩旁設兩立柱相距應弧背之十度以為借測之用儀面聨以流雲背安樞紐可使低昻承以半圜周施輪齒可使平側其下立柱入於儀座可使轉旋而凡兩曜相距之度皆可測焉謹按康熙五十四年聖祖仁皇帝命監臣紀利安製地平經緯儀合地平象限二儀而為一其制平置地平圏外徑五尺濶七寸七分周圍刻四象限度下設四柱以圓座承之地平圏之中心倒安螺柱上出立軸東西安立柱高一丈一尺上結曲梁正中開孔以容立軸之上端中間安象限儀圓心在下半徑六尺弧濶二寸七分正面刻九十度中聨方圓及弧矢形背面結於立軸以運之圓心安遊表長八尺本設横耳末設横柱以備仰窺凡測諸曜將象限儀推轉又將遊表低昻令與諸曜參直則横半徑所指即地平經度遊表所指即地平緯度是一測而經緯悉得矣謹按虞書舜典在璿璣玉衡以齊七政孔疏曰璣衡者王者正天文之器漢世以來謂之渾天儀者是也乾隆九年御製璣衡撫辰儀徑六尺其外即古之六合儀而不用地平圏正立子午雙環為天經兩面刻去極度數以雲座承之北極出地三十九度五十五分天頂距北極五十度五分距兩極九十度結赤道單環為天緯兩面刻周日十二時九十六刻以龍柱扶之次内即古之三辰儀而不用黄道圏兩極綰赤經雙環兩面刻去極度數中要結遊旋赤道兩面刻周天度分以象七政之運行最内即古之四遊儀通徑設直距中心施窺衡以測七政之經緯架座施螺柱以取平天頂施垂線以取正體制仿乎渾天之舊而時度倍為整齊運量同於赤道新儀而重環更能合應至用遊表窺測則上下左右無不宜焉謹按周禮考工玉人土圭尺有五寸以致日宋史云何承天始立表候日影前明觀象臺下設晷影堂南北平置銅圭於石臺上長一丈六尺二寸濶二尺七寸周設水渠以為平準南端植銅表高八尺上設横梁用影符以取中影本朝加二尺表高一丈上端安銅片中開圓孔徑二分午正太陽之影自圓孔射至圭面成橢圓形南界為日體上邊之影北界為日體下邊之影中心為中影京師夏至之影長二尺九寸四分八釐是為最短過此則漸長冬至之影長一丈九尺九寸四分是為最長過此又漸短因圭長不及長影之數又於北端設立圭高三尺五寸冬至之影上立圭二尺七寸四釐用以比例太陽高度亦同於平圭之比例焉謹按隋志云黄帝創觀漏水制器取則以分晝夜其後因以命官周禮挈壺氏則其職也宋志有求壺複壺廢壺建壺及平水壺之制本朝因前明舊制播水壺三形方承以木架上名日天壺即宋之求壺水欲常滿上濶一尺九寸下濶一尺三寸高一尺七寸次名夜天壺即宋之複壺次名平水壺高濶皆遞減一寸分水壺一如平水壺之度置於平水壺後稍下即宋之廢壺受水壺一形圓徑一尺四寸高三尺一寸置於架前地平上名萬水壺即宋之建壺播水三壺前面近下皆有龍口以次漏於萬水壺平水壺後面近上開孔洩於分水壺以平其水而均其漏萬水壺盖安銅人抱時刻漏箭下安箭舟浮於水面水長則箭上出周日水盈箭盡則啟其下口洩之於地而時刻復起午正壺安室内各設水盖龍口小管以玉為之太醫院院使一人左右院判各一人掌醫之政令率其屬以供醫事其屬御醫十有五人吏目三十人醫士四十人醫員三十人掌九科之法大方脈小方脈傷寒科婦人科瘡瘍科鍼灸科眼科口齒科正骨科以治疾醫生二十六人掌炙製之法以治藥咸給事内庭供使令焉敎習二人課醫人習醫簡御醫吏目之能者任之凡升補院使院判由院申禮部擬正陪咨吏部奏補御醫吏目由院奏補申禮部轉咨吏部注册均循資叙俸各以次升醫士以下由院考選申禮部拔補醫士有内直者有外直者升則先内後外其考選皆如定制凡進院業醫人察其身無過惡且通醫者由本院官士任之迺令進院發教習㕔肄業院使院判以時試其能否而進退之凡侍直自院使至醫士以所業專科分班侍直給事宫中者曰宫直給事外廷者曰六直宫直於各宫外班房侍直六直於東藥房侍直各以其次更代凡扈從行在或奉特㫖隨行或按班次其應給車馬器物餼廩之類申所司發給凡御藥本院官定方具奏以藥二劑合煎同近臣監視候熟分貯二器一器本院官暨近臣次第先嘗一器進御如合和誤不依本方或封題錯者以不敬論凡奉㫖視諸王公主暨文武大臣疾者既事仍具狀覆奏外藩公主額駙台吉大臣遇疾請醫奉㫖徃視者亦如之文武㑹試以醫士一人入闈供職由院簡送禮部聽委軍前需醫由院遴選二人具奏得㫖即馳驛徃兵部遣官䕶行其隨征醫人私以庸醫充代者罪之刑部設醫士二人令獄囚之病者受其藥由院簡送六嵗一更更之日稽其醫事之優劣優者升吏目劣者斥之凡祭先醫禮嵗兩舉春二月冬十一月上甲日致祭於本院之景福殿以院使院判二人分獻兩廡餘均陪祭詳見禮部欽定大清㑹典巻八十六
