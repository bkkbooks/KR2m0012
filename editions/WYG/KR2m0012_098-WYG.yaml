front:
  text: 欽定四庫全書欽定大清㑹典卷九十八
  hash: sha256:380f2d743d0dbd211871d6fd792f9d2377f7fc2e2656f2509326fce8d2ce5f94
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_098-1a, image: WYG0619/WYG0619-0913a.png}
body:
  text: 前鋒統領統領左右翼各一人或以王公大臣兼領掌本翼四旗前鋒之政令前鋒叅領前鋒侍衛左右翼各八人署前鋒叅領各四人掌督率前鋒警蹕宿衛每翼隨印協理事務前鋒叅領侍衛各一人前鋒校二人筆帖式二人凡營制鑲黄正白鑲白正藍為左翼正黄正紅鑲紅鑲藍為右翼前鋒校左右翼各四十八人每旗十有二人為一隊鳥槍什長左右翼各二十四人隊長如之前鋒八旗滿洲䝉古每佐領二人本旗教場操演步射月六次騎射嵗二次或四次三年考驗一次又於左右翼内各分前鋒之半兼習鳥槍月演十次均由統領督率叅衛校長如法訓練以定黜陟凡卡倫距御營一二里外安設立前鋒旗二以為門戸左右以次列帳日則瞭望夜則守衛以前鋒叅領前鋒侍衛共八人前鋒校前鋒共百二十人董其役犯卡倫者坐以軍法凡升除統領由兵部列名奏請簡命筆帖式由吏部補用外前鋒叅領員闕於本旗䕶軍叅領一二等侍衛宗室將軍一二等侍衛前鋒侍衛内遴選六人或七人前鋒侍衛員闕以署前鋒叅領一人列於前再於本旗二三等侍衛䕶衛副䕶軍叅領前鋒校内遴選五人或六人署前鋒叅領員闕於本翼前鋒校内遴選正陪前鋒校員闕於本旗鳥槍什長隊長内遴選正陪若闕多人少於前鋒内每闕遴選四人或五人均由統領引見補授協理事務前鋒叅領侍衛員闕於本翼前鋒叅領侍衛内各遴選正陪引見補授隨印前鋒校闕於本翼前鋒校内選委前鋒烏槍什長闕於本旗隊長隊長闕於本旗前鋒各遴選充補凡拔補前鋒由統領㑹本旗䕶軍統領於䕶軍驍騎執事人教養兵閒散壯丁内遴選補用凡兩翼前鋒統領遇一人奉差外出者即以未出差之人兼攝如二人均差奏請簡署䕶軍統領䕶軍統領每旗一人掌䕶軍之政令䕶軍叅領每旗滿洲十人蒙古四人内司鑰長署司鑰長各一人副䕶軍叅領如叅領之數䕶軍校署䕶軍叅領每旗七人隨印協理事務䕶軍叅領副䕶軍叅領各一人䕶軍校各二人筆帖式各二人門筆帖式鑲黄正黄正白三旗各十人䕶軍校八旗滿洲䝉古每佐領各一人䕶軍每佐領各十有七人凡宿衛景運門統領一人司鑰長一人䕶軍校三人門筆帖式二人閲門籍䕶軍即巴克什一人䕶軍十有七人隆宗門協理事務䕶軍叅領一人䕶軍叅領二人䕶軍校三人門筆帖式一人閲門籍䕶軍一人䕶軍十有七人後左門後右門各䕶軍叅領一人䕶軍校三人門筆帖式一人閲門籍䕶軍一人䕶軍十有二人左翼門右翼門各䕶軍校二人閲門籍䕶軍一人䕶軍八人中左門中右門各䕶軍校二人閲門籍䕶軍二人䕶軍八人太和殿體仁閣𢎞義閣昭徳門貞度門各䕶軍校二人䕶軍八人太和門左右門各親軍校二人親軍八人協和門熈和門各䕶軍校二人䕶軍八人中和殿䕶軍校二人䕶軍三人東廊西廊各䕶軍校一人䕶軍四人蒼震門䕶軍叅領一人䕶軍校三人閲門籍䕶軍二人䕶軍十有二人啓祥門䕶軍叅領一人䕶軍校三人閲門籍䕶軍一人䕶軍十有二人吉祥門西北隅銀庫各䕶軍叅領一人䕶軍校二人䕶軍八人凝華門中正殿後門東北隅東南隅文華殿箭亭紫禁四門内磴道柵䦨各䕶軍校二人䕶軍八人防範火班䕶軍校一人䕶軍七人午門䕶軍叅領一人左門閲門籍䕶軍二人左右門各䕶軍校三人䕶軍十有二人東華門西華門神武門各䕶軍叅領一人䕶軍校四人閲門籍䕶軍二人䕶軍十有六人北上門䕶軍校二人䕶軍八人恭遇車駕巡幸東華門西華門神武門各増統領或協理事務前鋒䕶軍叅領一人以鑲黄正黄正白三旗官軍按日分班直宿每班五百二十五人闕左門司鑰長一人䕶軍校一人䕶軍九人闕右門䕶軍叅領一人䕶軍校一人端門天安門大清門各䕶軍叅領一人䕶軍校二人䕶軍十有八人紫禁城外周環十六堆舖各叅領一人䕶軍校一人䕶軍九人四柵䦨各䕶軍校一人䕶軍九人以正紅鑲白鑲紅正藍鑲藍五旗官軍分班直宿每班三百有一人統𨽻於景運門直班統領稽察曠誤者論如法凡禁門啓閉各以其時車駕出入啓中門以景運門直班統領率隆宗門叅領祇承其事並令䕶軍清蹕每夕景運門直宿司鑰長自後左門後右門中左門中右門左翼門右翼門太和門昭徳門貞度門以次驗視扃鐍午門以隆宗門䕶軍叅領東華門以蒼震門䕶軍叅領西華門以啓祥門䕶軍叅領神武門以吉祥門䕶軍叅領分視扃鐍畢各遣䕶軍校納鑰於司鑰長司鑰長受驗諸門鑰彙貯於篋復加扃鐍詰朝各門校以次領鑰啓門紫禁城外各門啓閉由闕左門司鑰長委䕶軍叅領一人驗視扃鐍紫禁城内景運門隆宗門東華門西華門神武門各頒隂文合符如遇夜間有㫖啓門大内出陽文合符該䕶軍叅領即取隂文合符驗明啓鑰其蒼震門啓祥門等門報統領齎隂文合符至門與陽文合符比驗迺啓均於次日奏聞凡門禁百官執事人出入紫禁城門皆凴門籍籍内備書爵秩姓名於經由之門各置一通擅入及縱入者並論凡禁門軍器紫禁城内各門各堆舖及午門東華門西華門神武門外班房均陳列櫜鞬弓矢長槍之屬弓日令弓人張弛矢旬日簡視必利必整槍及弢嵗終皆易以新櫜鞬以八年弓矢以十年槍以十五年移文武備院更換一次損失者論凡扈蹕恭遇親祀壇廟統領一人同内大臣侍衛於豹尾班後管束駕宿齋宫南郊輦路清蹕䕶軍叅領三十二人䕶軍校䕶軍八百人神樂署周圍清蹕䕶軍叅領八人䕶軍校䕶軍八十人圜丘外清蹕叅領二人䕶軍校䕶軍二十人門五以統領一人協理事務叅領二人䕶軍叅領五人司鑰長二人䕶軍校䕶軍百人宿衛設十四堆舖以䕶軍叅領六人䕶軍校䕶軍百五十四人巡守北郊輦路清蹕與南郊同壇外清蹕䕶軍叅領十有一人䕶軍校䕶軍百有十人門四以統領一人協理事務叅領二人司鑰長二人䕶軍叅領四人䕶軍校䕶軍八十人宿衛設十一堆舖以䕶軍叅領八人䕶軍校䕶軍百有十人巡守車駕經行城内以上三旗官軍城外以八旗官軍衛道清蹕均由景運門直班統領計程逺近隨時酌委以統領一人率䕶軍叅領一人稽察回鑾亦如之凡行在宿衛扈蹕以統領三人營總三人掌其政令御營宿衛網城三門以上三旗䕶軍叅領六人䕶軍校䕶軍六十人設九堆舖以上三旗䕶軍叅領九人䕶軍校䕶軍九十人外連帳四門以下五旗䕶軍叅領八人䕶軍校䕶軍八十人設四堆舖以下五旗䕶軍叅領四人䕶軍校䕶軍四十人警蹕以八旗䕶軍叅領八人䕶軍校䕶軍百二十人頓營守衛以䕶軍叅領二人䕶軍校䕶軍四十人每日扈從及合圍官軍並於八旗内酌簡凡訓練月以初二初六十一十六二十一二十六等日步射六次嵗以春秋擐甲胄騎射各一次或二次三年考驗一次均由統領督率叅校軍士如法訓練以嚴黜陟凡升除統領由兵部列名奏請簡用筆帖式咨吏部考取補用外協理事務叅領員闕於䕶軍叅領内司鑰長署司鑰長員闕於䕶軍前鋒鳥槍叅領内䕶軍叅領員闕於本旗驍騎叅領冠軍雲麾使一二等侍衛䕶衛前鋒侍衛副䕶軍叅領宗室一二等侍衛鎮國輔國等將軍子男輕車都尉等官内選六人或七人副䕶軍叅領員闕以署䕶軍叅領一人列於前再於本旗副驍騎叅領雲麾使治儀正二三等侍衛䕶衛宗室二三等侍衛奉國奉恩將軍佐領騎都尉雲騎尉等官内選二人並於䕶軍校内選一人署䕶軍叅領員闕於本旗䕶軍校内均由該統領會本翼四旗統領遴選正陪引見補授䕶軍校員闕於本佐領下前鋒親軍䕶軍領催及食四兩餉銀之執事人内遴選二人擬定正陪由該旗統領會同本翼四旗統領引見補授凡拔補䕶軍由該統領㑹同本旗都統於本佐領下驍騎執事人教養兵步軍閒散壯丁内遴選善於國語弓馬嫻熟人材壯健者補用凡官員親隨兵養亷支借俸銀官軍優䘏均與八旗驍騎營同嚮導總統無定員以前鋒統領䕶軍統領八旗副都統兼理於八旗前鋒營䕶軍營内選叅領侍衛四人前鋒校䕶軍校前鋒䕶軍六人佐之恭遇時巡省方以嚮導總統一人先期率官校詣車駕經行之地周覽山川通橋梁夷險隘計程入告駕行佩櫜鞬前導既駐蹕以次日程塗及駐蹕之所奏聞交行在兵部曉諭闔營回鑾亦如之駐蹕御營及頓營看城均由嚮導總統先期指示飭所在有司修築營盤欽定大清會典卷九十八
