  text: 欽定四庫全書欽定大清㑹典卷二十九
  hash: sha256:b8e179bf3445f86aa7373975412a31f34ed3f20d7a5514fcfd5174a2f54e5773
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_029-1a, image: WYG0619/WYG0619-0227c.png}
body:
  text: 禮部儀制清吏司婚禮一凡大婚之禮由部行欽天監諏吉翰林院恭擬册文勅所司製册寶備儀物豫期行納采禮所司具儀物以禮部尚書一人充使内務府總管一人副之是日五鼓鴻臚官設案於太和殿丹陛左右鑾儀衞設采亭於丹墀左右又設案於皇后邸聽事正中内務府官奉儀物陳於丹陛各案陳馬於丹墀質明正副使朝服入執事官舉儀物案降自中階陳儀物於采亭前列御仗由太和門中門出至皇后邸后父朝服跪迎於大門外道右候過隨入采亭止儀門外執事官奉儀物由中門入各陳於案陳馬於庭正副使以次奉儀物授后父后父北面跪受興率子弟望闕行三跪九叩禮仍送正副使於門是日就皇后邸設納采燕燕后父二品以上官咸與燕燕后母及内親屬二品以上官命婦與燕亦如之前期一日遣官各一人以大婚祗告天地太廟廼行納徵禮所司具大徵儀物以禮部尚書内務府總管各一人充正副使各執事官具采亭設案於太和殿丹陛及皇后邸聽事正副使朝服将事至門后父跪迎入正副使以次奉儀物授后父后父跪受儀與納采同賜后父母金銀衣服鞍馬暨后之兄弟服物有差后父率子弟望闕行三跪九叩禮后母率諸婦行六肅三跪三叩禮畢正副使出后父送於門至日發册奉迎以大學士一人充正使禮部尚書一人副之䕶送之内大臣侍衞暨前導後隨二品以上官命婦恭侍女官執事内監均豫期由所司疏名奏請欽定是日五鼓皇帝法駕鹵簿樂懸全設如常儀鑾儀衞設皇后儀駕於皇后邸設龍亭二於太和門階下鴻臚官設册案於左西嚮設寶案於右東嚮又設册寶案於皇后邸聽事設皇后拜位於案南禮部堂官内閣學士奉金册金寶及册寶文於龍亭鑾儀校舁行禮部官前導至太和殿階下亭止執事官奉册寶以次升中階入殿内各陳於案退質明正副使立丹墀之東西面内大臣侍衞立丹墀之西東面均北上王公百官咸朝服各按翼序立執事命婦女官内監豫詣皇后邸祗竢屆時禮部堂官奏請御殿皇帝禮服朝於皇太后宫行禮畢乘輿出宫導引扈衞如常儀御太和殿中和韶樂作陞座樂止階下鳴鞭鴻臚官引正副使就拜位丹陛樂作贊如儀行三跪九叩禮畢樂止引正副使由左階升至丹陛御道左北靣西上立大學士奉册授正使奉寶授副使正副使跪受興由中階降陳册寶於龍亭鑾儀校舁行前列御仗自午門外鼓吹樂作正副使前導内大臣侍衞隨亭後由太和門午門大清門中道出廼賜王公百官坐賜茶畢鳴鞭中和韶樂作皇帝還宫正副使至皇后邸后父朝服率親屬跪迎於大門外道右候册寶龍亭過隨入至儀門亭止正副使奉册寶授内監内監奉册寶以次由中門入皇后御禮服引禮女官二人恭導出迎於庭中道右后母及諸婦咸朝服跪候過隨入聽事皇后東靣立后母及諸婦立皇后後内監奉册寶册寶文陳於東案引禮女官恭導皇后就拜位北靣立又女官四人立拜位左右均東西靣宣讀女官二人立東案之南西靣引禮女官奏跪皇后跪贊宣册宣讀女官奉册文宣訖贊受册女官一人奉册自右跪進皇后祗受授於左女官一人跪接興陳於西案次宣寶受寶儀如之奏興皇后興奏行禮皇后行六肅三跪三拜禮畢恭導皇后入内内監奉册寶出授正副使正副使受册寶各陳於亭欽天監官報陞輿吉時鑾儀校舁册寶亭先行正副使隨行女官恭導皇后陞輿鑾儀衛内監舁輿儀駕鼔樂列輿前女官四人前導七人後隨均乗騎内大臣侍衛前導後從后母率諸婦跪送於庭后父率親屬跪送於大門外皇后輿由大清門中門入至午門外儀駕止皇后輿入午門中門正副使同内大臣侍衛退龍亭止内監奉册寶前導皇后輿入自中門至中宫階下降輿前導後隨女官各退恭侍女官迎皇后入中宫内監奉册寶安於皇后宫退至午時皇帝御太和殿賜后父及親屬燕王公百官咸與皇太后御宫賜后母及親屬燕公主福晉大臣命婦咸與合􅈟吉時屆宫中設燕行合􅈟禮翼日皇帝偕皇后朝於皇太后宫越三日皇帝率羣臣皇后率公主福晉命婦詣皇太后宫行禮畢皇帝御太和殿王公百官上表行慶賀禮皇后詣皇帝前行禮畢御中宫公主福晉命婦行慶賀禮是日以大婚禮成頒詔布吿天下儀均與册立同直省文武官及外藩屬國進表皇太后皇帝前進箋皇后前各稱賀婚禮二凡皇子婚禮先期内務府行欽天監諏吉召福晉父采服至乾清門命大臣之夫婦偕老者一人傳旨以某氏女作配與皇子某為福晉福晉父祗受命謝恩行三跪九叩禮退皇子具采服往見福晉父母至門福晉父采服出門外迎入升堂皇子拜福晉父答拜凡三叩興請謁福晉母皇子拜福晉母答拜叩如前畢辭出福晉父送如初迎儀廼諏吉行納采禮所司豫日具儀物舁以采亭以内務府總管将事至門福晉父迎於門外使者入陳儀物於聽事以次授福晉父福晉父跪受訖興率子弟望闕行謝恩禮福晉母率其族諸婦行禮如之使者出福晉父送如初迎儀是日賜福晉父母服物鞍馬金銀各有差燕福晉父於其第公侯伯暨一二品官往㑹燕福晉族人之有職者咸與燕福晉母暨諸婦一二品命婦㑹燕亦如之至期迎娶命内務府總管一人率内務府官及内府䕶軍導從䕶衞以大臣命婦二人襄事福晉家咸采服以竢是日皇子采服詣皇太后皇帝皇后宫行禮如常儀屆時内務府官具絳輿至門福晉父出迎如納采儀輿入陳聽事正中執事女官以升輿吉時告福晉具吉服升輿母率諸婦送於庭父率子弟送於門内府䕶軍前導女官隨輿後内務府總管各官䕶從如儀至皇子所居宫門外從官各退女官導輿由中門入至宫前降輿女侍迎入宫合􅈟吉時屆廼設燕行合􅈟禮是日於皇子所居及前亭均結采内外具筵席燕福晉父母儀與納采日同翼日皇子偕福晉咸采服詣皇太后皇帝皇后宫行禮各如儀皇孫婚禮與皇子同惟納采儀物有差凡公主釐降之禮先期内務府行欽天監諏吉額駙采服恭竢於乾清門命大臣之夫婦偕老者一人傳旨以某公主擇配某人額駙祗受命謝恩行三跪九叩禮畢退廼諏吉行納采禮是日質明額駙詣午門恭進駝馬酒筵光禄寺具饌所司張燕設樂於保和殿暨皇太后宫屆時與燕之王公大臣暨侍衞咸采服入額駙之父率族人咸朝服先詣慈寧門外行三跪九叩禮廼詣保和殿序立丹陛上各如儀皇帝龍袍衮服御保和殿陞座鴻臚寺贊如儀額駙父率族人於殿外丹陛上行三跪九叩禮引入殿各就席坐進茶訖進酒大臣恭進皇帝觴額駙父率族人出班跪丹陛左右北嚮行一叩禮畢復位坐賜進酒大臣酒廼徧爵進饌作樂升歌既徹燕額駙父率族人出就丹陛拜位謝燕行一跪三叩禮畢皇帝還宫額駙父率族人詣皇太后皇后宫門前行三跪九叩禮畢退是日皇后率妃嬪具吉服詣皇太后宫如常儀額駙之母率族中諸婦咸朝服入宫門序立丹陛上皇太后吉服陞座引禮女官引額駙母率諸婦就拜位行六肅三跪三叩禮引入殿皇后以下各就席坐進茶訖進酒命婦恭進皇太后觴額駙母率諸婦出班跪丹陛左右北嚮行一叩禮畢復位坐賜進酒命婦酒廼徧爵進饌作樂升歌既徹燕額駙母率諸婦出就丹陛拜位謝燕行二肅一跪一叩禮畢皇太后還宫皇后率妃嬪各還宫額駙母率諸婦詣皇后宫行六肅三跪三叩禮畢退燕儀詳見内務府既諏吉釐降豫期所司以近支福晉夫人名氏奏請欽㸃一人送嫁以内務府官率䕶軍導從䕶送及齎送装奩以命婦充襄事女官前一日額駙率族人詣乾清門皇太后宫門前行謝恩禮至日陳設奩具女官率女侍先詣額駙第祗竢額駙具馬駝甲胄牲酒饌筵詣午門恭進如納采儀鑾儀校舁奩具齎奩官導行至額駙第女官率女侍鋪装是日公主吉服詣皇太后皇帝皇后前行禮如儀屆時欽天監以升輿吉時告公主廼自宫門升輿女官前引後從出宫門外儀衞前列各官導䕶如儀送嫁福晉夫人乘輿隨行至門儀衞止輿入至儀門各官止立至聽事中降輿女官前引入室送嫁之福晉夫人隨入額駙禮賓於聽事女賓禮於中堂饗各執事人合巹吉時屆廼設燕行合巹禮禮成衆賓皆退是日燕於保和殿皇太后宫如納采儀翼日公主朝服詣皇太后皇帝皇后宫行禮額駙朝服詣宫門外行禮各如儀若公主下嫁外藩納采及下嫁日止進牲酒不進饌筵餘儀同凡王公婚禮王等自聘廷臣女為婚者既成言王等往謁福晉夫人父母如皇子儀遂諏吉行納采禮自親王至輔國公各具簪珥領約指環衣裳衾褥有差以府屬官充使從者以禮物從至門主人迎入使者陳禮物於聽事主人受禮廼饗使者使者退主人送於門是日設燕親王婚禮自親王以下侍郎男以上公主福晉以下郡王貝子夫人以上咸㑹燕世子郡王㑹燕與親王同貝勒婚禮自郡王以下尚書子以上郡主郡王福晉以下郡君貝子夫人以上咸㑹燕貝子婚禮自貝勒以下公以上及本旗官屬郡君貝勒夫人以下縣君輔國公夫人以上咸㑹燕鎮國公婚禮自貝子以下奉國将軍以上縣君貝子夫人以下鄉君奉國将軍淑人以上咸㑹燕輔國公惟貝子貝子夫人不㑹燕餘如鎮國公婚期前一日女氏齎奩具詣府陳於室至日具福晉夫人儀衞采輿往迎以府屬官充導從至門儀衞止輿入聽事中福晉夫人具吉服升輿儀衞前引府屬官隨從如儀至府由中門入至殿堂前降輿執事官退女侍迎入室屆時行合巹禮是日設燕與納采日同若聘外藩女為婚納采用鞍馬甲胄繒布婚期前行聘禮如之其物數多寡均以王貝勒貝子公為差聘禮又以外藩王貝勒台吉之女為差餘如前儀福晉夫人之父若母及外藩女之兄弟從人各分別給賞王等如奉旨賜婚具朝服詣太和殿前謝恩行禮如儀既成婚行禮亦如之王公之子未受爵者婚禮得視其父已受爵者各從其爵鎮國将軍以下至閒散宗室納采及成婚日親友僚屬咸㑹禮物燕席視公之數遞減各有差覺羅有官者從其品無官視閒散宗室餘均如前儀凡郡主以下于歸之禮王等自擇配既許字行納采禮自郡主至鄉君額駙各具鞍馬甲胄有差遣使齎禮物至府府屬官迎入陳甲胄於殿堂陳鞍馬於庭引使者見王等行二跪六叩禮饗使者使者退府屬官送於門是日設燕燕禮郡主視親王縣主視郡王郡君視貝勒縣君視貝子鄉君鎮國公女視鎮國公輔國公女視輔國公婚期前一日府屬官齎奩具往陳額駙家郡主以婢八人男婦五户從媵縣主郡君遞減其一鄉君鎮國公女以婢四人輔國公女以婢三人男婦各二户屆期本府具儀衞采輿府屬官充導從䕶衞郡主等具采服於王公福晉夫人前行禮畢媵婢侍奉升輿儀衞前引府屬官隨從如儀至額駙第儀衞止至聽事中降輿女侍迎入室屆時行合巹禮是日設燕與納采日同若嫁外藩王貝勒台吉納采用馬駝羊聘易駝以牛其數自郡主至鄉君各有差筵燕之牲如之餘如前儀凡品官婚禮先以媒妁通言二姓遂諏吉行納采禮自公侯伯至九品以上官各具簪珥領約衣服衾褥有差主人吉服命子弟為使從者齎禮物如女氏至門女氏主人吉服迎入從者陳禮物於聽事賓致命主人祗受告於廟廼禮賓賓退主人送於門使者還復命是日設燕燕具牲酒自公侯以下數各有差婚期前一日女氏以奩具往陳壻家至日壻家具合巹燕於室壻吉服以竢廼設儀衞以婦輿如女氏女氏主人告於廟笄而命之醴女以竢迎者迎者至姆奉女升輿行至門女侍導婦入室壻婦交拜訖行合巹禮是日設燕與納采日同品官之子未受職者禮得視其父已受職者各從其品士婚禮得視九品官庶民納采首飾數以四為限輿不采飾餘均得視士越三日主人主婦率新婦見於廟分不得立廟者見祖禰於寢如常告儀欽定大清㑹典卷二十九
