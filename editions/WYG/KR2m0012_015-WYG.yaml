  text: 欽定四庫全書欽定大清會典卷十五
  hash: sha256:043cccce31932eefc8662eac4daa87d63f0feddb56fbe9a1de79fdec51629b7e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_015-1a, image: WYG0619/WYG0619-0147a.png}
body:
  text: 戸部鹽法凡𣙜鹽之法順物土之宜而理之或府海以收其利或産於池或汲諸井而成之皆通商轉運以便民食收其税以供國用凡盛京沿海之地皆民自煮鹽市易奉天府錦州府鹽場二十皆以州縣佐貳官司其場務不𣙜不幾統隸於奉天府尹凡直省沿海及有池井之地聽民闢地為場置竈開畦為鹽而售之商或官出帑收鹽授之商而行之以鹽課大使掌其場之政令與場地之徵治其交易審其權衡而平準之日稽其所出之數以杜私販之源運同運判分司其地而糾察之長蘆都轉運鹽使司運使所屬分司天津運同治場八滄州運判治場二山東都轉運鹽使司運使所屬分司濱樂運同膠萊運判各治場五每場設大使統隸於廵視長蘆鹽政兩淮都轉運鹽使司運使所屬分司泰州運判治場十有二通州運判治場十淮安運判治場三每場設大使統隸於巡視兩淮鹽政河東都轉運鹽使司運使所屬中分司運同治山西解州安邑縣鹽池一場三每場設大使陜西甘肅定邊大池一設鹽池大使統隸於巡視河東鹽政其靈州小池一設鹽池大使别隸於甘肅巡撫以下督撫兼鹽政同兩浙驛鹽道所屬分司寧紹運副治場二十嘉松運判治場十有一每場設大使統隸於浙江巡撫兼巡視鹽政福建鹽法道所屬鹽場十有三在内地者十有一其八場委簡發試用官餘委知縣及首領佐貳官司其場務在臺灣者二以知府兼理之統隸於閩浙總督廣東都轉運鹽使司運使所屬分司惠潮汀贑運同治場十有三每場設大使統隸於兩廣總督四川驛鹽道所屬鹽井七千七百有三鹽井大使十有二人統隸於四川總督雲南驛鹽道所屬鹽課提舉司三分轄鹽井十有六鹽井大使十有一人統隸於雲南巡撫凡行鹽以商商有世業行有地限其轉輸於各省者先納課而後領運各按應行之地隨時價而銷售之凡産鹽之省運使鹽道察場民之生計與商之行息而平其鹽價行鹽之省由驛鹽道或分巡道知府兼理之其水陸挽運必計其道里時其往來平其貴賤俾商無滯引民免澹食以聽於鹽政鹽政掌弊羣吏糾其徵收督徵之不如法者以時審其價而酌劑之凡鹽賦之奏課與鹽法之宜更者以聞總督廵撫兼鹽政者如之凡行鹽符信由部給引鹽政受而布之商其受鹽於場掣鹽於批驗所轉運於應行府州縣皆按引以知其數輸賦於運使鹽道上計於鹽政皆積引以定其算嵗周則收已行之引截角送部以待稽覈更頒新引凡鹽課視每嵗應行引數以定課最以乾隆十八年奏銷册計之直省共行銷六百三十八萬四千二百三十一引課入五百五十六萬五百四十兩有竒長蘆鹽行直隸及河南開封彰徳衞輝陳州懷慶南陽府屬之舞陽許州屬之臨潁郾城長葛引九十六萬六千四十有六課入六十萬三百九十四兩有竒山東鹽行本省及河南歸徳府江南宿州徐州府屬之銅豐沛蕭碭正引五十五萬票引十有七萬千七百四十課入二十四萬五千六百八十八兩有竒兩淮鹽行江南之江寧安慶鳯陽廬州池州太平寧國潁州淮安揚州各府六安滁和泗通海各州徐屬之邳宿睢寧三州縣江西之南昌饒州九江南康建昌撫州臨江吉安瑞州袁州河南之汝寧光各府州及湖北湖南引百六十八萬五千四百九十有二課入二百十有七萬九千二百六十四兩有竒河東鹽行山西及河南之南陽河南陜汝等府州許州屬之襄城陜西之西安鳯翔同州邠乾商興安等府州引四十二萬六千九百四十有七課入四十二萬九千三百八十二兩有竒陜甘鹽行漢中延安鄜綏徳各府州引三萬九千四百課入八千九百八十兩有竒行蘭州鞏昌平凉慶陽寧夏秦階各府州靈州洮州等衞引七萬二千六百八十有八課入二萬四百十有六兩有竒兩浙鹽行本省及江南之蘇州松江常州鎮江徽州太倉廣徳江西之廣信等府州正引七十萬四千六百九十有八票引十萬六百九十有八課入七十三萬七千七百五兩有竒福建鹽行本省引九十四萬六千四百八十有五課入三十九萬七千三百四十二兩有竒廣東鹽行本省及江西之南安贑州福建之汀州湖南之桂陽郴各府州貴州之古州引五十三萬八千五百二十有二課入四十六萬八千七百八十七兩有竒行廣西引六萬五千六百有十課入十有一萬三千七百八十二兩有竒東課六萬六千二百六十八兩西税四萬七千五百十有四兩各有竒四川鹽行本省及湖北之施南府宜昌府屬之鶴峯長樂二縣雲南之東川昭通二府曲靖府屬之南寧霑益平彞三縣引十有一萬五千百八十有五課入八萬九千五百三十六兩有竒雲南鹽行本省以道逺不頒引按井給票課入二十六萬一千六百四十三兩有竒貴州各府近湖廣者食淮鹽近四川者食川鹽不通商不頒引小民就近負販而輸税於官布政使糧驛道兼理之統隸於貴州廵撫課入七千六百十有五兩有竒凡竈地之徵視年之上下嵗登盡入其税給由單書其應入之數令如數輸納嵗終會而上之部荒則辨其等其宜蠲宜緩法如田賦凡商之徵責之運使鹽道引之行責之州縣官課登引疏通者予叙課有逋負引有稽滯者劾議各計其分數而殿最之凡無引而私行及越禁私販者有禁民或犯令由地方文武官緝治之疎縱者論若老弱孤獨擔負四十斤以下者免幾欽定大清㑹典卷十五
