body:
  text: 工部營繕清吏司壇廟凡壇廟規制圜丘在正陽門外南郊形圓象天南嚮三成上成徑九丈高五尺七寸二成徑十有五丈高五尺二寸三成徑二十一丈高五尺上成石靣九重自一九環甃遞加至九九二成自九十遞加至百六十有二三成自百七十有一遞加至二百四十有三合一三五七九陽數每成四出陛皆白石九級上成石䦨七十有二二成百有八三成百八十合三百六十周天之度柱如之内壝形圓周百有六丈四尺高五尺九寸壝門四皆六柱三門柱及楣閾皆白石扉皆朱櫺壝外東南丙地燔柴鑪一高九尺徑七尺甃以綠琉璃瘞坎一東南燎鑪五西南鐙杆三外壝形方周二百十丈一尺高八尺六寸門制與内壝同燎鑪四分設於壝東西門之左右壝北門後為皇穹宇南嚮環轉八柱圓檐上安金頂基高九尺徑五丈九尺九寸石䦨四十有九東西南三出陛各十有四級左右廡各五間一出陛殿廡覆瓦均青色琉璃圍垣形圓周五十六丈六尺八寸高丈有八寸南設三門崇基石䦨前後三出陛各五級外壝東門外東北隅神庫神㕑各五間井亭一祭器庫樂器庫椶薦庫各三間又東為宰牲亭井亭各一壝外内垣門四東曰泰元南曰昭亨西曰廣利北曰成貞皆朱扉金釘縱橫各九昭亨門外東西石坊各一祈年殿在成貞門北壇圓三成南嚮上成徑二十一丈五尺二成徑二十三丈二尺六寸三成徑二十五丈靣甃金甎圍以石石䦨四百二十南北三出陛東西一出陛上成二成各九級三成十級壇上建祈年殿制圓内外柱各十有二中龍井柱四檐三重上安金頂左右廡各九間均覆青琉璃前為祈年門崇基石䦨前後三出陛各十有一級門外東南燔柴鑪一瘞坎一燎鑪五制如圜丘内壝周百九十丈七尺二寸門四北門後為皇乾殿五間上覆青琉璃南嚮正靣三出陛東西一出陛各九級石䦨五十有九内壝東門外長廊七十二間二十七間至神㕑井亭又四十五間至宰牲亭為祭時進俎豆避雨雪之用壝外圍垣東西北三靣各有門南接成貞門成貞門外西北為齋宫東嚮正殿五間崇基石䦨三出陛陛前左設齋戒銅人石亭一右設時辰牌石亭一後殿五間左右配殿各三間内宫牆方百二十三丈九尺九寸中三門左右各一門牆外環池前跨石梁三左右各一東北隅鐘樓一外宫牆方一百九十八丈二尺環以廻廊一百六十三間復遶以深池宫門石梁均與内同廣利門外西北為神樂署東嚮大門三間中凝禧殿五間後顯佑殿七間凡奉祀協律各􅅟舍均連檐通脊分設廊廡中西為犧牲所大門三間南嚮房九十三間中祀犧牲之神後為官署東西列屋以飼牲牽外垣内西南鐘樓一圜丘祈年殿共圍垣二重内垣高丈一尺址厚九尺頂厚七尺周千二百八十六丈一尺五寸外垣高丈一尺五寸址厚八尺頂厚六尺周千九百八十七丈五尺西嚮門二南北並列南入圜丘北入祈年殿皆三門角門一方澤在安定門外北郊形方象地方折四十九丈四尺四寸深八尺六寸濶六尺澤中貯水方丘北嚮二成上成方六丈下成方十丈六尺均高六尺上成正中六六方甃外八方均以八八積成縱橫各二十四路二成倍上成八方八八之數半徑各八路以合六八隂數皆甃以黃色琉璃每成四出陛各八級皆白石二成上南左右設五嶽五鎭五陵山石座鑿山形北左右設四海四瀆石座鑿水形均東西嚮水形座下鑿池貯水以祭内壝方二十七丈二尺高六尺厚二尺壝北三門六柱東西南各一門二柱柱及􅎝閾皆白石扉皆朱櫺壝北門外東北鐙杆一西北瘞坎一燎鑪五外壝方四十二丈高八尺厚二尺四寸門制與内壝同東西門内從壇瘞坎南北各二壝南門後皇祇室五間北嚮覆黃琉璃圍垣正方周四十四丈八尺高丈一尺北嚮設一門外壝西門外神庫神㕑祭器庫樂器庫各五間井亭二又西為宰牲亭亭前井亭左右各一西北為齋宫東嚮正殿七間崇基石䦨五出陛左右配殿各七間内宫門三間左右門各一外宫牆周百有十丈二尺門三東嚮門東北鐘樓一壇内垣周五百四十九丈四尺北西各三門東南各一門外垣周七百六十五丈西嚮門三角門一太廟在闕左南嚮朱門丹壁覆以黃琉璃衛以崇垣大門三左右門各一㦸門五間崇基石䦨中三門前後均三出陛中九級左右各七級門内外列㦸百有二十左右門各三間均一出陛各五級前殿十有一間重檐脊四下沉香柱正中三間飾金梁棟階三成繚以石䦨正南及左右凡五出陛一成四級二成五級三成中十有一級左右九級中殿九間同堂異室内奉列聖列后神龕均南嚮後界朱垣中三門左右各一門内為後殿制如中殿奉祧廟神龕均南嚮前殿兩廡各十有五間東廡為配饗公王位西廡為配饗功臣位東廡前西廡南燎鑪各一中殿後殿兩廡各五間均藏祭器後殿東廡南燎鑪一㦸門外東西井亭各一前跨石梁五橋南東為神庫西為神㕑各五間廟門東南為宰牲亭井亭廟垣周二百九十一丈六尺西南太廟街門五間西北太廟右門三間均西嚮社稷壇在闕右壇制方北嚮二成高四尺上成方五丈二成方五丈三尺四出陛各四級皆白石上成以五色土辨方分築内壝方七十六丈四尺高四尺厚二尺甃以四色琉璃甎各隨方色覆瓦亦如之門四各二柱柱及􅎝閾皆白石扉皆朱櫺内壝西北瘞坎二壇北拜殿㦸門各五間㦸門列㦸七十有二均上覆黃琉璃前後各三出陛内壝西南神庫神㕑各五間井一壇垣周二百六十八丈四尺内外丹雘覆以黃琉璃北三門東西南各一門西門外宰牲亭一井一壇北門外東北隅正門一左右門各一南門外東南社稷街門五間東北社稷左門三間均東嚮日壇在朝陽門外東郊制方西嚮一成方五丈高五尺九寸靣甃金甎四出陛皆白石各九級圓壝周七十六丈五尺高八尺一寸厚二尺三寸