  text: 欽定四庫全書欽定大清會典卷八十二
  hash: sha256:b58007dd5767792495cc273ab517816c5fc64fe14b88c05cd6ac31d071adba55
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_082-1a, image: WYG0619/WYG0619-0725c.png}
body:
  text: 太常寺卿滿漢各一人少卿滿漢各一人掌典守壇壝廟社以歲時序其祭祀所屬寺丞滿一人漢二人博士滿一人漢軍一人漢一人讀祝官滿八人贊禮郎滿二十四人漢十有四人掌相儀序事備物絜器典簿滿漢各一人掌文移筆帖式滿九人漢軍一人掌繙譯司庫滿一人庫使滿二人掌庫藏犧牲所牧滿漢各一人掌繫牲牷而芻牧之以待祭祀神樂署漢署正一人署丞二人協律郎五人司樂二十三人掌樂舞之節奏以詔樂舞生執事生九十人樂生百八十人舞生三百人咸隸焉凡題奏祭祀禮部於豫歲以題定祭期劄寺大祀天地前二十五日由寺具疏謹以皇帝親詣行禮或遣官恭代並列分獻官名題請太廟社稷中祀日月恭遇皇帝親詣之歲均前二十日具疏亦如之其餘中祀前二十日羣祀前十有五日均列承祭分獻官名具疏恭候簡命永陵福陵昭陵前四十日昭西陵孝陵孝東陵景陵泰陵孝賢皇后陵寢端慧皇太子園寢前二十日列承祭官名疏請凡進齋戒牌銅人恭遇皇帝親詣行禮於齋期前一日具奏屆期黎明卿率屬補服遇朝期朝服奉齋戒牌銅人入至乾清門恭設於中門左楹前祀天祭地如遇皇帝宿齋宫至第三日恭設齋戒牌銅人於齋宫丹陛左如不宿齋宮恭設於乾清門三日饗太廟祭社稷恭設於乾清門三日朝日夕月饗前代帝王先農恭設於乾清門二日如皇帝不親詣則不奏設齋戒牌銅人皇后親饗先蠶進齋戒牌銅人於乾清門轉交内監恭設於交㤗殿二日凡親閲祝版大祀南郊皇帝御太和殿閲祝版玊帛香大祭北郊御中和殿閲祝版均御龍袍衮服執事官咸采服如遇朝期執事官咸朝服遇忌辰服亦如之太廟社稷以下諸祭均御中和殿皇帝衮服執事官補服如遇朝期執事官咸朝服遇忌辰閲太廟祝版素服執事官常服前二日司祝奉祝版送内閣恭書祝文前一日卿詣乾清門恭請皇帝御殿廼率屬奉祝版入殿内恭設黄案上皇帝恭閲如儀禮畢奉送各壇廟恭設神庫遣官及羣祀祝版均司祝自内閣奉送祭所凡大祀天地皇帝御齋宮日詣神位前上香恭視壇位於祀前五日奏請前期二日奏御齋宫儀並奏遣分獻官恭視籩豆牲牢如遣官恭代奏遣承祭官恭視壇位並視籩豆牲牢凡祀日請駕大祀天地於日出前七刻饗太廟祭社稷於日出前四刻朝日於日出前八刻夕月於酉時前四刻饗前代帝王先師均於日出前六刻祗告傳心殿於日出前三刻饗先農於已時前六刻均先期行欽天監取候時官二人至時卿詣宫門請駕凡遣官恭代天地太廟太廟後殿社稷以親王郡王有事祗告同日月以王貝勒貝子公先農太歲以親王郡王先蠶以内務府總管奉宸苑卿奏遣承祭前代帝王以領侍衞内大臣散秩大臣都統尚書釋奠於先師祗告傳心殿親詣釋奠日祭崇聖祠均以大學士丁祭崇聖祠以祭酒承祭先醫廟以禮部尚書侍郎火神廟顯祐宮東嶽廟龍神廟以本寺卿少卿都城隍闗帝廟以領侍衞内大臣散秩大臣都統尚書賢良祠昭忠祠雙忠祠如之礮神以漢軍都統后土司工窰神門神以禮工二部尚書侍郎均豫期行取職名疏請簡命興京永陵盛京福陵昭陵由盛京禮部以命往盛京居住奉祀祖陵之宗室將軍開送昭西陵孝陵孝東陵景陵㤗陵孝賢皇后陵寢端慧皇太子園寢由宗人府以王公開送均列名具疏有事祗告同闗帝廟後殿附疏聲明各功臣祠不具題均以本寺卿承祭凡分獻兩郊從位太廟兩廡以領侍衞内大臣散秩大臣都統尚書皇帝親夕月分獻從位亦如之親祭帝王廟分獻兩廡均以尚書左都御史遣官承祭以侍郎内閣學士左副都御史親釋奠於先師分獻四配以尚書十二哲兩廡以侍郎均列名疏請遣官釋奠於先師及四配分獻十二哲以翰林院編修檢討太歲殿兩廡以本寺卿少卿先醫兩廡以太醫院使院判均附疏聲明分獻大成殿兩廡及崇聖祠四配兩廡以國子監監丞博士助敎賢良祠昭忠祠後室兩廡配室以本寺卿少卿博士典簿均不具題凡祭日執事皇帝親祭以禮部堂官本寺卿二人贊引對引典儀贊行禮之節典樂贊舉樂通贊贊賜福胙引禮引分獻官傳贊贊王公百官拜跪司香奉香槃司玉帛奉篚司爵獻爵司祝讀祝司饌奉饌槃掌燎視燎掌瘞視瘞司麾示樂節司旌節導干戚羽籥之舞大祀南北郊進俎以挈壺官沃俎天地日月先農之祭皇帝拜位司拜牌拜褥官均以本寺官充之太廟司帛司爵以宗室覺羅官太廟社稷帝王先師之祭司拜褥以鑾儀衞官遣官承祭贊引以贊禮郎不設司拜牌拜褥官分獻司香帛爵以本寺執事生遣官釋奠於先師以國子監官及肄業諸生若因事祗告設贊引典儀司祝司香司帛司爵掌燎掌瘞與正祭同凡祭祀備物歲支户部庫帑五千兩以供各祀籩豆之實夏季具疏題銷凡犧牲入滌大祀九旬中祀六旬羣祀三旬既入滌牲有病者易之斃則埋之每歳牛二百四十由順天府行近畿各州縣市儥及張家口外牧場選供羊四百三十有九豕三百九十有九由左右翼税務分四時市儥均由寺卿會順天府尹及兩翼税務監督選收鹿四十有五供自内務府奉宸苑兎四百四十有九供自光禄寺均每祀行取豫日送寺歲支户部倉豆草價及兩翼税課銀千六百兩以供芻牧犧牲所牧率牧人謹飼之博士五日一赴所驗視所牧勤職者五年送吏部兵部議敘如洗滌失宜侵冐芻牧者論如法凡簠簋之實以黍稷稻粱歳取帝耤所登謹貯神倉以供齍盛登之實以大羮鉶之實以和羮籩豆之實形鹽藳魚鹿脯果以棗栗榛菱芡菹以韭菁芹笋醢以豕鹿兎魚脾析用牛豚拍用脅白餅黑餅用麥糗餌粉餈用米粉食用稻均雍人治之監以博士等官凡祝版制帛香燭薪炭行户工二部支取酒醴形鹽行光禄寺葦行大興宛平二縣均豫日送寺凡陵寢祭物永陵福陵昭陵供祭果品由寺驗送制帛香燭茗鹻行户工二部支取香越嵗彚送無常期餘於季秋月兵部具路引供人夫工部供藤篋氊索由寺委官齎送昭西陵孝陵孝東陵景陵泰陵孝賢皇后陵寢端慧皇太子園寢祭物由寺庫撥銀治備祝版制帛香燭行户工二部羊行左右翼税務支取春秋二季各陵奉祀禮部移本寺祗領歲終具册移寺覈銷凡朔望上香南郊北郊以本寺卿太廟以王公咸朝服社稷以典守官日月先農以奉祀咸補服各詣神位前上香行三跪九叩禮帝王廟太歲殿都城隍廟闗帝廟賢良祠昭忠祠雙忠祠均以典守官傳心殿以寺丞上香行禮太廟日以典守官常服詣各寢室上香與朔望同凡祭祀習儀大祀前四十日中祀前三十日每旬三六九日卿率讀祝贊禮等官及執事樂舞集天壇神樂署習儀於凝禧殿饗太廟以王公一人監視宗室覺羅官先師以國子監祭酒司業監視國子師生同日習樂於殿廷會樂部典樂監視亦如之陵寢讀祝官贊禮郎每旬三六九日習儀於皇陵奉祀禮部與京師同孟秋寺卿二人分詣東西陵閲驗第其優劣囘日奏聞凡典守官南郊北郊各設壇尉五品各一人六品各七人掌扃鑰宿直奉祀祀丞各一人掌庫藏祭器太廟設廟尉四品二人掌殿庫扄鑰五品八人主宿直門庫社稷壇設壇尉五品一人六品四人日月壇各設奉祀一人先農壇設奉祀祀丞各一人職掌皆同卿時稽其勤惰而申警之凡執役太廟首領内監一人内監二十人社稷壇首領内監一人内監四人傳心殿如之各壇壇户九十四人廟户二十三人祠户二十六人齋宮夫十有六人具服殿夫八人執灑掃啟閉之役守寺庫兵二十人神樂署庫夫四人執宿直廵防之役本寺雍人二百九十人執刲牲烹㸑之役犧牲所所軍十有九人夫二十七人執芻牧洗滌之役壇廟祠户及宫殿所夫由順天府和雇庫兵由八旗撥送均一年更代凡歲修壇廟有土木興修之工奏交工部督修委官㑹本寺官監視若止繕完塗塈奏支工部庫帑委本寺官董其事工竣咨部覆覈歲秋彚册題銷凡升補本寺屬官滿寺丞員闕由卿於博士典簿讀祝官贊禮郎内選擬正陪引見録用讀祝官滿贊禮郎各陵讀祝官贊禮郎行取八旗人員内選擬正陪引見録用盛京陵讀祝官贊禮郎由盛京禮部㑹將軍及户兵刑工各部選擬正陪送寺引見亦如之漢寺丞員闕由協律郎贊禮郎贊禮郎員闕由司樂奉祀員闕由祀丞神樂署署正員闕由署丞協律郎員闕由司樂各如例升補司樂員闕由樂舞生祀丞署丞由執事生拔補均由寺咨名吏部補授執事生闕於樂舞生遴選充補欽定大清㑹典卷八十二
