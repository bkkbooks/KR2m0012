front:
  text: 欽定四庫全書欽定大清㑹典卷二十四
  hash: sha256:31c6362fdd05375f9d9a78f270166e7998bd7e41ef009fb873abd9601ab20bef
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_024-1a, image: WYG0619/WYG0619-0186c.png}
body:
  text: 禮部儀制清吏司册立凡册立皇后之禮先期勅所司備儀物製册寶既諏吉分遣官祗告天地太廟後殿命大學士尚書充正副使前期一日皇帝親詣奉先殿以册立告至日五鼓所司陳法駕鹵簿樂懸陳皇后儀駕樂懸皆如儀設節案於太和殿正中南嚮設册案於左西嚮寶案於右東嚮内監設節案於皇后宫正中前設香案均南嚮設册寶案於兩旁東西嚮設皇后拜位於香案之南禮部堂官詣内閣偕内閣學士奉節及金册金寶册寶文於龍亭鑾儀校舁行禮部官前導至太和殿階下亭止執事官奉節册寶以次升中階入殿内陳於案退質明授節大學士一人立殿左門外宣制官一人立大學士後均西面正副使立丹墀之東西面北上屆時禮部堂官奏請御殿皇帝禮服乘輿出宮導引扈衛如常儀御太和殿中和韶樂作陞座樂止階下鳴鞭鴻臚官引正副使就拜位丹陛樂作贊如儀行三跪九叩禮樂止引正副使由左階升立丹陛左北面西上宣制官進至殿中門外東立西面贊有制正副使跪宣制官宣制訖大學士由殿左門入奉節出殿中門授正使正使受興副使随興西面立執事官由殿左右門入舉册寶案出殿中門正使持節前行副使随案後均降自中階陳册寶於龍亭鑾儀校舁行由太和門中門出賜王公百官坐賜茶畢鳴鞭中和韶樂作皇帝還宮樂止羣臣各退正副使至景運門外以節授内監内監持節舁册寶亭至皇后宮門外亭止以次奉節册寶由中門入丹陛樂作皇后御禮服引禮女官二人恭導出迎於宮門内道右候過随入殿東面立内監奉節陳於中案册寶册寶文陳於東案樂止女官二人恭導皇后就拜位北面立又女官四人立拜位左右均東西面宣讀女官二人立東案之南西面引禮女官奏跪皇后跪贊宣册宣讀女官奉册文宣訖贊受册女官一人奉册自右跪進皇后祗受授於左女官一人跪接興陳於西案次宣寶受寶儀如之奏興皇后興奏行禮丹陛樂作皇后行六肅三跪三拜禮畢樂止恭導皇后至宮門内道右立内監奉節出丹陛樂作皇后恭送如初迎儀候過樂止皇后還宮内監至景運門外以節授正使正使持節同副使詣後左門復命翼日皇帝禮服率羣臣詣皇太后宮行慶賀禮皇后禮服率妃嬪公主福晉命婦行禮如儀皇帝御太和殿王公百官上表行慶賀禮頒詔布告天下皇后禮服朝於皇帝如儀皇后還宮貴妃妃嬪禮服公主福晉命婦朝服詣皇后宮行慶賀禮王公百官直省文武官及四夷屬國進表進箋稱賀均與三大節同尊封凡尊封皇祖妃嬪皇考妃嬪之禮勅所司備儀物製册寶印皇貴太妃印貴太妃太妃册太嬪册寶册既諏吉前期一日遣官祗告太廟後殿奉先殿至日鑾儀衛設仗皇貴太妃以貴太妃儀仗太妃下采仗於本宮門外内監設册寶印案於宮内正中南嚮禮部尚書朝服詣内閣内閣官奉册寶印於采亭鑾儀校舁行列繖仗禮部官前導大學士禮部尚書各一人恭送至太妃太嬪宮門授内監内監舁亭入至階下亭止奉册寶印陳於案恭上太妃太嬪出告禮成大學士尚書各退如尊加太妃封號皇帝親詣行禮鑾儀衛設仗如前儀内監設太妃座於宮内皇貴太妃西貴太妃座西南嚮僉設太妃嚮旁設如同日並封南皇貴太妃太貴太妃西南東嚮僉設妃東西嚮旁設所司設案於宮門外正中南嚮又設案於門左西嚮禮部侍郎詣内閣暨内閣學士朝服奉金册金寶金印並册寶印文於采亭内鑾儀校舁行列御仗前導如儀至太和殿御座前左右陳設僉設册亭左寶亭右如同日並封旁設各從其宜皆册亭在上寶印亭在下皇帝禮服乘輿出宮導引扈衛如常儀御太和殿南嚮立閲册寶印訖鑾儀校舁亭詣太妃宮至宮門階下亭止大學士二人如同日並封兼用侍郎學士奉接皆同奉册寶印文由中階升陳於門左案郤立案後西面禮部侍郎内閣學士奉册寶印從升陳於中案退宣讀官二人如同日並封各用一人立西檐下糾儀御史禮部官各二人立西階下均東面鴻臚寺鳴贊二人立左右檐下東西面皇帝乘輿至太妃宮門階前降輿禮部堂官二人恭導陞自中階門左西嚮立内監啟太妃禮服升座皇帝詣正中案前北嚮立大學士進至中案左鳴贊奏進册大學士跪進册文皇帝立受拱舉仍授大學士大學士興陳於中案退奏進寶印儀與進册同大學士皆退自東階降贊宣册宣讀官進至中案前北面奉册跪宣訖陳於案興退贊宣寶印亦如之皆退自西階降内監舁册寶印案進設太妃座前奏跪拜興皇帝行二跪六拜禮太妃起避立座旁禮畢太妃降座還宮禮部尚書奏禮成皇帝由中階降乘輿還宮各退册封一凡册封之禮皇貴妃貴妃册寶妃册印嬪册皆製以金先期勅所司備物具禮既諏日遣官祗告太廟後殿奉先殿若專封嬪不告由部奏請命大學士尚書侍郎學士充正副使至日鴻臚寺設節案於太和殿正中設册案於左寶印案於右内監設節案於受封皇貴妃貴妃妃嬪宮内正中前列香案均南嚮設册寶印案於左右東西嚮設仗於本宮門前皇貴妃貴妃儀仗仗妃嬪采鑾儀衛設采亭於内閣門外内閣禮部官奉節册寶印及宣讀册寶印文陳於亭鑾儀校舁行前列繖仗禮部官前導至太和殿階下亭止奉節册寶印升入殿陳於案大學士一人立於殿外正副使立於丹墀東咸朝服西面屆時鴻臚官引正副使升自東階至丹陛左北面立大學士入殿左門奉節由中門出正副使跪大學士奉節授正使正使受節興副使随興西面立禮部官入殿舉册寶印各案出正使持節前行副使随案後由中階降仍陳采亭内出太和門中門至景運門外以節授内監内監持節舁采亭入陳節於中案陳册寶印及文於東案受封皇貴妃貴妃妃嬪禮服出迎於宮門内道右候過随入引禮女官引就拜位北面跪贊宣册宣讀女官奉册文宣訖贊受册宣讀女官奉册文授侍右女官跪授皇貴妃貴妃妃嬪祗受訖授侍左女官女官跪接興陳於案次宣寶印受寶印亦如之迺行六肅三跪三叩禮畢引禮女官引復原位立内監持節出皇貴妃貴妃妃嬪送如初迎儀内監出景運門以節授正使正副使詣後左門復命册封二凡册封親王暨王世子册寶皆金製郡王册印銀製飾以金以領侍衛内大臣内大臣散秩大臣禮部侍郎内閣學士翰林院讀講學士充正副使長子貝勒貝子册紙製以内閣侍讀學士翰林院讀講學士侍讀侍講禮部郎中員外郎主事充正副使先期備物具禮至日執事官設案於太和殿丹陛上正中南嚮又設節案於受封王等殿堂正中前設香案均南嚮左設册寶印案西嚮設王等儀衛於庭鑾儀衛設采亭於禮部儀制司官奉節舉册寶印陳於亭内鑾儀校舁行前列御仗禮部官前導禮部侍郎随行至太和殿階下亭止儀制司官奉節至太和殿階上陳節於案正副使朝服詣案左跪北面西上禮部侍郎奉節授正使正使受節偕副使興鑾儀校舁亭出太和門中門至午門外正使以節授禮部官出長安門咸乘馬将及府第下馬正使持節前行副使奉册禮部官奉寶印随行樂作受封王等率所屬官跪迎於府門外道右候過興随入樂止正副使奉節册入殿堂禮部官奉寶印随入各陳於案正副使就案東立西面王等就拜位北面立樂作行三跪九叩禮樂止興進至香案前跪宣讀官宣册訖正使奉册授王等王等祗受轉授從官從官跪受興陳於案次宣寶印訖副使奉寶印授王等王等祗受如前儀興復位樂作行三跪九叩禮畢樂止正使持節出副使從王等跪送如初迎儀凡册封公主册用金製以内閣侍讀學士翰林院讀講學士侍讀侍講禮部郎中員外郎主事充正副使至日設節案於公主府聽事正中前設香案左設册案設公主儀衛於庭正副使自太和殿持節往封均如王等受封之儀及府第公主率所屬官命婦朝服跪迎於大門内道右候過随入及聽事正副使陳節册於案退就案東立西面公主就拜位北面立樂作行六肅三跪三叩禮興進至香案前跪宣讀官宣册訖正使奉册授女官女官跪接以授公主祗受仍授女官公主興復位行六肅三跪三叩禮樂止正副使出公主跪送節如初迎儀凡親王世子郡王福晉長子貝勒貝子夫人每五年由部彚疏請行册封禮制册節使各視夫爵均先期備物具禮至日設節册案於王等殿堂設儀衛於庭正副使持節往封福晉等朝服跪迎正副使設節册於案迺就拜位宣册受册行禮畢正副使出福晉等跪送節儀並與公主受封同凡郡主縣主郡君每五年由部彚請册封册以紙製餘儀與福晉夫人受封同欽定大清㑹典卷二十四
