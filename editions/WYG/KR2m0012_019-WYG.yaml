  text: 欽定四庫全書欽定大清會典卷十九
  hash: sha256:e05fa581dfa821beee45d1a2f8810dd40575a568bd6a60a0c7b92a2cf1a7b609
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_019-1a, image: WYG0619/WYG0619-0160a.png}
body:
  text: 户部蠲䘏古者以保息養萬民嵗有不登則聚之以荒政國家頻賜天下租税鰥寡孤獨者有養其保息斯民者至矣一方告饑百岀其道以拯救之荒政於是乎詳焉所以有備無患而民不失其所也凡保息之政十一曰賜復國家府修事和屢豐既告務本節用繁費不興於是徳音時沛賜復天下一年計地之逺近以為先後凡三年而徧盖曠典也至於䘏民之艱或免新或除舊省方所至或賜半或賜全均由部遵諭速行使生民共食昇平之福二曰免科江浙財賦甲天下前代以來賦浮於田小民困於輸納殊恩疊沛命有司覈實先後免江蘇正賦共六十五萬浙江正賦共十有二萬七千七百兩有竒民力以紓其他直省賦浮於田者報墾升科不實者山側嶺畔闢地竒零者江渚河洲海壖田圯於水者利興於山藪旺竭不常貨集於闗津往來靡定者以及藂雜之課累積於因沿科歛之條弊生於豪猾者稽其賦税雖載在地官之籍悉與豁除三曰除役城郭宮室橋梁道路河渠墉防凡有大興作皆出公帑計工授直古所謂力役之徵並弛之官司所涖公私差遣則有水陸舟車廨署需用則有廚匠薪蔬吉嘉典禮則有采章服物或出自公帑或取給養㢘自昔里甲之供億商行之承直一切報裁四曰振㷀獨設養濟院以居窮民無告者自京師以逮直省皆有養也土著之民願入者收之如流落異鄉視其年尚能歸籍者詢其里居移文本籍收養其不能歸籍者察實隨在收養嵗給銀米冬衣棉布各有差民有力者能出財佽助為嘉奬以勸之道府以事至所屬州縣必親為巡視如屋宇不修事廢弛者胥役侵漁者經理之官劾道府容隠並論如法五曰養幼孤京師廣渠門設育嬰堂收養嬰孩之遺棄者給庫帑立産嵗收租息以供乳哺之費順天府尹覈其實而支給之直省則有司經理倡好義之民以廣其惠濟擇良善為衆所信服者董其事所收嬰孩識其年月日時及長有願收為子孫者登諸籍而予之其本家有訪求者歸之六曰收羈窮五方之民多聚京師有貧病無依者五城各設棲流所以收養之日給錢米有差隆冬酌給棉被所傭一人扶持之病故者給棺以瘞標識其處以待其家訪尋者其費由部闗支冬十月至春三月五城設廠為飯以食羈旅行乞者其米由通倉闗支巡城御史督兵馬司指揮舉行左都御史左副都御史親省視之廣寧門外設普濟堂貧給飲食病有醫藥没為斂瘞起於紳民好義者捐設嵗頒崇文門税銀千兩京倉米二百石以倡率之七曰安節孝婦女矢志守節養舅姑撫遺孤者或貧無以自存命有司察訪給糧以養之俾有所依賴嵗終以支給之數具册逹部八曰䘏薄宦直省丞簿以下罷官囘籍者資斧維艱給以道里之費身故給以歸喪之費學官距本邑五百里外者囘籍亦如之嵗終部綜直省支給之數覆覈之具疏以聞九曰矜罪囚民罹罪繫圜土饑寒切膚命司獄者體䘏之自刑部以逮直省按察使司府州縣獄每囚日給食米鹽菜隆冬給棉布襦袴嵗終具册送部稽覈十曰撫難夷外洋夷民航海貿易猝遇飄風舟楫失利幸及内洋海岸者命督撫飭所屬官加意撫綏賞給糗糧修完舟楫禁海濱之人利其資財所攜貨物商為持平市易遣歸本國以廣柔逺之恩凡荒政十有二一曰救災川澤水溢湮田禾漂廬舍有司即率衆救濟申報上官視所壊民居辨其為茅苫為瓴甓給修理費各有差有傷人者加䘏之督撫立與施行具疏以聞有怠玩需遲致民衆流離者惟督撫之􅖄二曰拯饑水旱成災督撫疏聞即行撫䘏先給饑民一月糧以免待哺廼察被災之輕重及民之極貧者與其次貧者除撫䘏一月外被災六分者極貧予一月糧被災七分八分者極貧予兩月糧次貧一月被災九分者極貧予三月糧次貧兩月被災十分者極貧予四月糧次貧三月每戸計口日授米五合幼弱半之如米穀不足則依時價以銀代給州縣官親為省視極貧之外凡乏食者皆作次貧毋許遺漏具籍申府司廵撫以逹於部豫為文告列戸口姓名首力農者次游手無藝業者書其發粟散財之數與日月次第使民周知頒之票以為信以防牙儈之冒領轉售者設廠城中必當四履之中鄉村則視居人稠集之地集待振之民於廠成戸者給以米一月一發㷀獨不能自舉火者為粥以食之每日一發饑民赴廠者男左女右老弱先壯者後其自逺鄉來赴者令就食於廠方冬為謀棲止及春和而後遣還寒士則學官具籍牒州縣官移粟黌舍就給以别於齊民胥吏楮墨諸費官為齎發以杜其需索若災出非常督撫特疏以聞則因時因地而量度之或於極貧加至五六月七八月次貧加至三四月五六月不拘常格有不盡心撫字及胥吏侵蝕致澤不下逮者論如法三曰平糶穀賤傷農則增價以糴穀貴傷民則減價以糶倉名常平此常法也若嵗或大饑有司先酌時價應減之數以報督撫覈定具奏即與施行設廠城中及四鄉示期出糶以濟民食其散糶之法與拯饑同如倉穀不足則動庫帑遣官告糴於鄰省再不足則截留漕糧以濟之竢市價既平而止發倉儲者糴穀還倉動庫帑者易銀歸庫截漕糧者或增入常平或報部候撥皆因時酌定有經理不善者論如法四曰貸粟或歉收之後方春民乏耔種貧不能耕或早禾初插夏遇水旱及既雨既霽民貧不能補種廼命府州縣開常平倉或社倉出穀貸之俾耕插有資以待秋熟其兵丁之貧乏者亦貸焉及秋視其收成之豐歉收成在八分以上者加息徵還七分者免息徵還六分者本年徵還其半來年再徵其半五分以下者均緩徵以待來秋之熟若上年被災稍重初得豐收其還倉也亦準免息直省有向不加息者各從其土俗之宜特旨本息均免者率視督撫奏請即與豁除五曰蠲賦年不順成命有司察其實而蠲其租賦視被災之輕重以别其宜蠲之數被災十分者蠲賦十分之七九分者蠲賦十分之六八分者蠲賦十之四七分者蠲賦十之二六分五分者均蠲賦十之一六曰緩徵如屢豐之後忽遇偏災雖民不重困而輸賦維艱或積歉之嵗舊負未償新逋又至廼緩其催科之期以寛民力被災八分以上者分作三年帶輸被災五分以上者分作二年帶輸均期至次年麥熟起徵若次年又無麥則期至秋收後徵之仍按其應緩之年麥後遞緩至秋後其帶徵之數已多亦視督撫奏請特旨均與豁除七曰通商年不順成令鄰境毋遏糴以通有無商旅販米穀赴市者闗無幾詗市毋減價俾聞風輳集東南夷國島嶼大者地多産穀頻海諸省䑩客出洋貿易者令其歸舶載米為減税以招徠之嵗豐穀賤則復其舊八曰勸輸縉紳士民有敦任䘏之風者遇嵗之不登或輸粟或輸銀糴穀或助官拯饑或依官價減糶或利及族婣或施及鄉里由州縣而府而司道而督撫為表其閭視所輸之多寡以為差等過二三百石者以聞於朝官予紀録民予品銜以旌奬之九曰嚴奏報之期州縣官遇水旱即申知府直隸州布政使司逹於廵撫廵撫具疏以聞夏災不出六月秋災不出九月愆期及匿災不奏報者論如法廵撫疏聞下部部行覆勘逮其察實請拯也以四十五日為期其報可舉行造册逹部也以兩月為期逾期者論至督撫奏報水旱每降旨先事綢繆則較具疏部覈之期更為迅速十曰辨災傷之等為水為旱為風為雹為蟲各有輕重夏災既告如晚禾可種及田有一嵗再熟者竢秋熟既穫再定其分數若夏種秋收之田災後不及晚耕者則不竢秋後即以成災論秋災既告督撫委鄰邑官會本邑牧令履畝親勘辨其成災五分至十分以别其為蠲為緩之宜及拯濟多寡之數疏聞即命舉荒政之宜行者速布於民其受災重者或特命廷臣或該督撫經紀其事未及分數者雖不成災亦省視民力以酌行緩貸之政十有一曰興土功使民就傭嵗饑有力之家皆罷興作閒民轉移任執事者生計益艱迺命有司相時地之宜庀材鳩工或築城垣或濬溝渠或固隄防或治倉廨俾廢墜可修而民就傭賃得食以免於阻饑事竣則疏報所濟饑民與所費工築之數由部覆覈而奏銷之十有二曰反流亡使民生聚郡邑猝被災祲州縣官曉示百姓毋得逺行覔食輕去鄉土即給一月糧以撫安之其已出在外者所在有司勸諭還鄉以就拯貸老弱被疾者暫為留養春和遣歸欲歸無力者計其費資給之欽定大清㑹典卷十九
