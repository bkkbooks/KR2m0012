  text: 欽定四庫全書欽定大清㑹典卷二十八
  hash: sha256:b37c936716b61a7dbae24454a1aba476d05457cca900a1f3c53172a38f516f29
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_028-1a, image: WYG0619/WYG0619-0220c.png}
body:
  text: 禮部儀制清吏司進表凡進表之禮元日長至在京王公百官在外将軍都統總督廵撫提督副都統總兵官恭行慶賀進表皇帝皇太后進箋皇后均由内閣撰擬定式頒發王公百官恭進表箋先期儀制司官豫由内閣祗領在外督撫表箋具疏送通政使司轉送内閣具題将軍都統提督副都統總兵官表箋由督撫彙齊驛遞送部至日五鼓禮部鴻臚寺官設表案於太和殿内左楹之南儀制司官恭奉表文陳於采亭鑾儀校舁行和聲署作樂前導入長安左門中門由天安門端門左門至午門外采亭止禮部官奉王公百官所進皇帝表文入太和殿内陳於案恭竢皇帝御殿宣表行禮畢由殿内奉出並将軍都統總督廵撫提督副都統總兵官所進表箋均送内閣收貯萬夀聖節與元日長至同皇太后聖夀皇后千秋王公暨中外文武百官恭進表箋均陳於午門外竢行禮後送内閣收貯恭遇國家有大慶典内閣臨時撰擬表箋定式頒發中外届期恭進均如前儀朝鮮國王慶賀皇帝三大節表文遣使於嵗杪赴部恭進元日隨直省表箋送内閣殿試傳臚後五日状元率諸進士上表謝恩是日鴻臚寺設案於午門外正中鳴贊二人監禮御史二人夾御道立序班引状元暨諸進士由長安左門北門入至闕下序立御道左右均東西面状元奉表詣案前北面跪陳於案三叩興退復位立鳴贊贊排班引状元暨諸進士就東西拜位北面立贊跪叩興行三跪九叩禮畢儀制司官奉表送内閣鴻臚官徹案皆退進書凡恭進實録聖訓前期一日禮部鴻臚寺設實録案聖訓案於保和殿正中設表案於殿門外稍東皆南嚮設表亭香亭龍亭於實録館内至日質明鑾儀衞陳法駕鹵簿於太和殿階下樂部設樂懸於東西檐如常儀王公集太和門外金水橋北文武百官集橋南監修總裁提調纂修各官集實録館咸朝服舉案侍衞於保和殿外内監於乾清門外恭竢咸采服届期監修官恭奉表文陳於表亭纂修官恭奉實録聖訓陳於龍亭各官行三跪九叩禮校尉舁行張黄盖列龍旗御仗作導迎樂鴻臚官前引監修以下官從以次入協和門中門至金水橋南王公百官跪迎候過興香亭龍亭由中道入太和門中門表亭由道左入太和門左門監修以下官從至太和殿階下亭止監修以下官行一跪三叩禮纂修官恭奉實録聖訓鴻臚卿二人前引由中階升入太和殿中門監修官恭奉表文由左階升入殿左門至保和殿各陳於案監修以下官於丹陛東行三跪九叩禮所司設皇帝拜位至時引王公入太和門左右門至丹陛上文武各官入昭徳門貞度門至丹墀内均按翼序立禮部堂官奏請皇帝御殿恭受實録聖訓皇帝禮服乘輿出宫禮部堂官二人導駕後扈大臣侍衞扈從至保和殿後降輿入詣實録聖訓案前北嚮行三跪九拜禮興立案左侍衞入殿恭舉實錄案聖訓案表案由保和殿後中門出恭送至乾清門交内監送入大内禮部尚書奏禮成皇帝御中和殿執事各官行三跪九叩禮不贊駕興前引後扈午門鳴鐘鼔皇帝御太和殿作樂鳴鞭均如常儀監修總裁纂修提調各官入百官班内序立鳴贊贊排班班齊贊進衆進贊跪以下行禮皆贊王以下各官咸跪宣表官一人進至殿中門外西面跪代致辭鴻臚卿宣制答致辭畢贊叩興王公百官行三跪九叩禮畢皇帝還宫各官皆退翼日監修以下官詣乾清門恭進副本擇吉恭送實錄聖訓於皇史宬尊藏工部官豫設香亭龍亭於館内正中監修總裁纂修提調官咸朝服恭奉實録聖訓陳於龍亭行三跪九叩禮鑾儀校舁行龍旗御仗黄蓋前導作導迎樂恭送皇史宬藏於金匱是日纂修官送副本交内閣收貯恭送實録聖訓至盛京尊藏先期宗人府奏遣王公一人禮工二部奏遣堂官各一人率實錄館提調官一人纂修官二人禮部工部司官各一人欽天監官一人乘傳送往届期工部官設香亭龍亭於館内正中纂修官恭奉實錄聖訓陳於龍亭送往之王公各官行三跪九叩禮畢校尉舁行黃蓋旗仗作樂導引如前儀至朝陽門外樂止旗仗前導如初所過地方文武官咸朝服出郭跪道右迎送至奉天府城外盛京将軍五部侍郎奉天府尹以下有頂帶官以上咸朝服出郭跪迎豫備龍亭鼓樂恭迎至崇政殿内安設各官行三跪九叩禮擇吉期恭舁龍亭至鳳凰樓前送往之王公各官暨守土官均行一跪三叩禮提調纂修官暨盛京五部司官恭奉實錄聖訓登樓尊藏於金匱既畢行三跪九叩禮凡恭進玉牒之禮禮部鴻臚寺官按玉牒卷數豫設案於中和殿工部官設采亭於玉牒館至日質明王公集太和門外文武各官集午門外咸朝服東西序立總裁王大學士尚書暨提調纂修官朝服集玉牒館恭奉玉牒正本及副本陳於采亭總裁王曁各官行三跪九叩禮畢鑾儀校舁行前列御仗黃蓋作導迎樂總裁以下乘馬從由大清門入至天安門外各官下馬至午門外諸王下馬齊集之百官跪迎至太和門外齊集之王公跪迎皆候過興至太和殿階下亭止纂修官恭奉玉牒由中階升入太和殿中門總裁以下官由東階升入殿左門至中和殿陳玉牒於各案總裁率提調纂修官於丹陛東行三跪九叩禮畢總裁詣案前恭展玉牒禮部堂官奏請皇帝禮服乘輿出宫至保和殿後降輿至中和殿詣案左西嚮立禮部尚書奏閱玉牒皇帝詣中案北嚮閱畢奏禮成皇帝還宫總裁率提調纂修官恭奉玉牒交内監進呈移采亭於乾清門外竢大内交出仍陳於采亭内鑾儀校舁行前列御仗黃蓋由太和門協和門東華門中門出作導迎樂恭送至皇史宬尊藏齊集之王公於太和門外文武各官於協和門外跪送如初迎儀恭送玉牒至盛京尊藏於敬典閣崇謨閣與恭送實錄聖訓儀同鑄印凡鑄造金寳金印皇太后金寶盤龍紐皇后金寶交龍紐皇貴妃貴妃均金寶蹲龍紐妃金印龜紐均清篆左漢篆右篆用玉筯文親王世子金寶龜紐郡王金飾銀印麒麟紐均芝英篆朝鮮國王金印龜紐芝英篆安南琉球暹羅三國王金飾銀印均駝紐尚方大篆凡鑄造銀印闗防内外文職一二品尚方大篆内三品順天奉天二府以上外承宣布政使司尚方小篆均直紐内外武職一二品均栁葉篆虎紐衍聖公尚方大篆直紐䝉古諸部扎薩克盟長右䥴清文左䥴䝉古文虎紐凡鑄造銅印闗防鈐記内文職三品詹事府以下外提督學政提刑按察使司尚方小篆内四五品外三四品鐘鼎篆内六品外五品以下垂露篆内外武職三四品殳篆四五品以下懸鍼篆均直紐凡増鑄之印内外文武官新設者改調職守者由吏兵二部㑹部擬定印文字數題準咨部付局鑄給凡改鑄之印内外官印嵗久糢糊應改鑄者題咨到部鑄給凡發印各印鑄成呈堂驗閱發司封固鈐以司印在内各部院寺監遣官齎文赴領在外文職府通判武職總兵官以上專差齎文赴領文知縣武副将以下發提塘郵寄於印四角加柱鈐封如前本官得印去柱啟封以用印年月日報部存案凡繳印内外官接到新印於舊印篆文中加鑴繳字送部銷燬凡封印開印前期劄欽天監擇吉具疏通行中外遵行欽定大清㑹典卷二十八
