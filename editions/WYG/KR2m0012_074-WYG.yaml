  text: 欽定四庫全書欽定大清會典卷七十四
  hash: sha256:964bf1bff8f9d2f8414ebda26aa54fff487b66b6c8968ae213958e3869a9faca
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_074-1a, image: WYG0619/WYG0619-0639c.png}
body:
  text: 工部都水清吏司河工水利附凡河道工程黃淮二瀆為大運河次之永定河又次之及南北條諸川湖淀附流入海分流濟運者咸受治焉凡職掌江南河道總督一人掌黃淮㑹流入海洪澤湖汕黃濟運南北運河洩水行漕及𤓰洲江工支河湖港疏濬隄防之事所屬河庫道一人掌出納河帑淮徐河道一人轄銅沛邳睢宿虹桃源同知四人豐蕭碭宿遷運河通判二人二十四汛州同州判各一人縣丞五人主簿十有二人廵檢七人分管詳見則例淮揚河道一人轄山清裏河山清外河山安海防江防同知五人髙堰山旴桃源安清中河揚河揚糧水利通判六人三十八汛州同州判各三人縣丞十有四人主簿十人廵檢八人又西溪司安豐司管河廵檢各一人十四牐牐官十有一人分管詳見則例河營叅將一人統轄淮徐淮揚各營淮徐河營游擊一人轄九營守備九人二十一汛千總八人把總十有三人淮揚河營游擊一人轄十一營守備十有一人二十六汛千總九人把總十有七人葦蕩營叅將一人轄左右營守備千總把總各二人山東河南河道總督一人掌黃河南下汶水分流運河蓄洩及支河湖港疏濬隄防之事所屬山東運河道一人轄運河沂郯海贛同知二人泇河捕河上河下河泉河通判五人二十八汛州同州判各三人縣丞十人主簿十有二人分管詳見則例分理泉河州同二人府經歴三人縣丞六人廵檢一人四十八牐牐官三十一人兗沂曹兼管黃河道一人轄曹單黃河同知一人四汛縣丞一人主簿二人廵檢一人黄運河營守備一人轄七汛千總五人把總二人東昌徳州二衞管河守備各一人徳州運河南北兩岸管河千總各一人河南開歸陳道一人轄上南河下南河同知二人儀考商虞通判二人十二汛州判一人縣丞七人主簿四人彰衞懐道一人轄懐慶黃河開封上北河下北河同知三人彰徳河務衞輝鹽河懐慶河務曹儀河務通判四人二十汛縣丞八人主簿十人廵檢二人又林縣管河典史一人豫河懐河二營守備各一人協辦守備各一人轄七汛千總四人把總三人直隸總督兼河道總督一人掌漳衞入運歸海永定河歸淀疏濬隄防之事所屬永定河道一人轄石景山永定河南岸北岸同知三人三角淀通判一人十五汛州判三人縣丞主簿各五人吏目二人通永河道一人轄北運河務關同知一人北運河楊村薊運糧河通判二人十三汛州同一人州判四人縣丞三人主簿五人天津河道一人轄南運河津軍河間河捕同知二人泊河子牙河通判二人西汛清河故城吳橋管河縣丞各一人東汛景州滄州管河州判各一人天津管河縣丞一人東光交河南皮青靜海獻管河主簿各一人青縣管河廵檢一人清河道一人轄保定河務同知一人正定糧馬河通判一人分汛冀州祁州安州管河州判各一人武强隆平寧晉兼管河務知縣各一人清苑蠡髙陽新安雄安肅新城管河縣丞各一人保定任邱唐管河主簿各一人滿完方順橋管河廵檢各一人深澤管河典史一人大廣順河道一人轄廣大漳廣平河務漳河同知三人分汛永年邢臺沙河南河平鄉廣宗鉅鹿唐山内邱任元城大名魏東明長垣兼管河務知縣十有五人元城大名魏長垣管河縣丞各一人永年成安管河典史各一人永定河河營守備一人轄南北岸淀河三汛千總把總各一人石景山汛千總一人北運河汛千總把總各三人南運河汛千總一人把總八人東淀垡船千總一人西淀垡船把總一人凡河兵各有定額詳見兵部營制於綠旗營兵之外别自為伍專屬河工調遣及守汛防險之事其分戰守給餉仍如綠旗營制惟江南葦蕩營河兵專司樵採不與雜役凡夫役江南山東河南設堡夫山東江南設牐夫直隸山東設淺夫河南設柳船長夫樁埽夫山東設徭夫泉夫壩夫軍夫橋渡夫直隸設衩夫防夫各隨其地之宜其食於官也則視役之輕重以為差山東運河屆疏濬之年按其工之大小别募夫役工竣則止凡工式蓄洩隨宜曰牐蓄洩以漸曰涵洞束水曰隄隄外重以隄曰遥隄隄外築隄俾河流遶越而過曰越隄亦曰月隄兀立者曰縷隄截流曰壩洩漲者曰滚水壩曰竹絡壩銳出河流以分水勢者曰磯觜壩䕶隄曰埽埽有魚鱗龍尾丁頭之别䕶埽曰障障有六楞三楞棑木之異他如以導大澑則有木龍柳以濟覆舟則有救生樁木均如式建置限年保固凡經費各工有修防之費有俸餉之費有役食之費有歳報圖册之費江南河工有歳增五寸之費山東有疏濬運河之費各有常額江南以河庫道河南以開歸陳道彰衞懐道山東以運河道直隸以天津道通永道永定河道清河道大名道掌其出納歳要其數於河道總督覈實奏銷侵蝕者論凡物材葦柳秫稭論束􅐨麻論斤土論方甎論塊石料分雙單樁木别杉楊下至石灰米汁釘鐵之屬各有定則有額者歲辦如額無額者如其需用之數購備均按則給價剋扣浮冒者論凡修防以工程告竣保固限滿交汛之日為始其工當衝澑須用長樁大埽歲加鑲築費有定額者曰歲修或河流遷徙及三汛屆臨偶被刷損隨時搶䕶工費在五百兩以内者曰搶修江南黃運河隄工每歲增髙五寸亦曰歲修其覈費具題也歲修以十月搶修無定期題銷均以次年之四月逾限者論别案大工不在此限凡三汛歲以清明節閱二十日為桃汛自桃汛後至立秋前為伏汛自立秋至霜降為秋汛屆期該管官弁督率兵夫多備物材晝夜分防有警則鳴金為號集附近兵夫協力搶䕶如汛臨工固河道總督馳奏安瀾凡疏濬河道面必廣底必深運土必於隄内無隄者以去河百丈為率運河歲小濬間歲大濬黃河無定期遇沙停淤積即為濬治其法或以勺或以刮版或以浚船皆因地制宜不拘器具凡浚船以疏瀹河道柳船以濟運物材垡船與浚船同石船與柳船同均以三年小修五年大修更造則河南江南以八年直隸以十年凡保固黃河工程限一年運河限三年江南河東同直隸南運河限三年北運河限二年永定諸河險工限一年平易工程並限三年均以報竣之日起限限内衝決責承修官暨督修官賠修不修治以罪限外衝決守汛官弁暨該管文武官沿河州縣皆分别議處凡葦柳議叙河工官弁於沿河隙地捐資種植葦柳小楊備用者葦以一頃柳以五千株楊以五百株計算各紀錄一次按數遞加葦至四頃柳至二萬株楊至二千株者各加一級居民捐種葦柳小楊至官弁應議加一級之數者各予以九品頂帶榮身葦蕩營餘葦至十萬束以上者議叙不及數者分别議處凡禁令牐官非時啟閉糧船不候㑹牌官民船不遵漕規擅自争放並頑民包攬夫役盜決河防或傍隄驅車占隄蓋房者均有禁違者並論如律凡水利直省河湖淀泊川澤溝渠有益於民生者以時修治務令蓄洩隨宜旱潦有備以府州縣丞倅佐貳董其役各給以管理水利職銜海塘江防附凡海塘江南以蘇松太道浙江北塘以杭嘉湖道南塘以寧紹台道掌其修防之政承以府丞倅分理以州縣佐貳等官事關題奏均由督撫凡塘工皆以石其非潮汐衝撼之所間用土工或用柴工均如式建置限年保固物材價直率與江南河工同凡歲修歲以冬至前該管道察其境内塘工之應修治者計費以申於督撫督撫覈實廼率屬興工工竣限四閱月奏銷每歲俸餉役食之費咸入奏焉凡塘汛沿塘十里或五里為一汛每汛設一斥堠在汛各兵晝夜分廵以資防守凡夫役江南設塘長每塘四里或五六里設一長浙江設堡夫北塘一里一夫南塘二里一夫皆令在塘主守遇柴土各工偶有刷損即為補治歲給役食有差凡江防四川以成都府同知湖廣以武漢黃徳道上荆南道下荆南道江西以九江府同知掌其修理均無定期如所屬隄岸工程偶被衝刷該管道廳即履勘計費以申於督撫督撫覈實具題興工工竣報銷惟江南𤓰洲江工歲修由江南河道總督奏銷詳河工典則橋道凡都城街道十有六外曰正陽門街曰崇文門街曰宣武門街曰左安門街曰右安門街均南北為衢曰廣寧門街曰廣渠門街均東西為衢内曰崇文門街曰宣武門街曰安定門街曰徳勝門街曰地安門街均南北為衢曰朝陽門街曰阜成門街曰東直門街曰西直門街均東西為衢坊二十有四在正陽門外正陽橋者以橋名坊朝陽門外達東郊日壇神路者曰景升阜成門外達西郊月壇神路者曰光恆舊均名禮神街安定門外達北郊方澤壇者曰廣厚舊名泰折東西長安街均以街名坊大清門東曰敷文西曰振武崇文門内曰就日宣武門内曰瞻雲東大市街南北均以街名坊東曰履仁西曰行義西大市街與東大市街同太學東西皆曰成賢府學東西皆曰育賢帝王廟東西皆曰景徳其界則外屬五城内隸八旗平治由歩軍統領繕修均由部直省坊衢之政各由地方有司掌之禁侵占時修理其工要而費鉅者並準動帑修造報部覈銷凡都城橋梁内外跨御河者十䕶禁城者十有五水陸大小橋梁三百有七十均由部時其修理以利行人直省府州縣治䕶城河均設橋梁與京師同其津要之處隨宜建置動帑者按則報銷凡除道恭遇乗輿出入九門以内由歩軍統領九門以外由大興宛平縣令先期清蹕廵幸直省由地方有司平治御道嚮導大臣暨隨駕之本部堂司官察勘凡柵䦨禁城内外共千七百二十有六以司啟閉遇有損壊内城由八旗外城由三營各申步軍統領咨部修葺凡水溝周通京城大小衢巷以􅂥夏秋潦水歲以暮春或季秋司坊官旗弁各列内外城應疏溝道呈步軍統領募夫濬治工竣由部委官察勘船政凡糧船山東河南江蘇安徽浙江每船長七丈一尺濶一丈四尺四寸江西湖廣長十丈短者九丈每造一船給工料銀二百八兩由部準戸部移咨覈覆興工各令本省糧道監造造後出運十年報部題銷修理及更造年限詳戸典漕運凡戰船每船長十有一丈至一丈九尺濶二丈三尺五寸至九尺六寸各有差天津山東福建船均屬外海江西湖廣均屬内河江南浙江廣東分屬外海内河外海定限三年小修六年大修九年再大修不堪修者更造内河三年小修八年大修十一年再小修十四年再大修不堪修者更造修造之費有正價有津貼正價各以其直無定額津貼每正價百兩自加四加六加八至加倍倍半有差由部準兵部移咨覈覆修造各令本省道員會同副叅等將弁監造工竣報部題銷凡水驛船江蘇安徽江西湖廣廣東均定限三年小修五年大修十年更造其湖廣之宣樓船每歲一修更造同浙江四川大修以六年小修更造同廣西小修以三年更造以五年工料銀小修自一兩七錢至九十七兩大修自二兩九錢至一百九十一兩更造自六兩九錢至二百九十四兩歲修湖北二十一兩湖南十有六兩各有差由部準兵部移咨覈覆修造工竣㑹兵部題銷凡應差船江南定限三年小修六年中修九年大修十二年更造浙江三年小修六年大修十年更造工料銀小修自十有九兩至六十八兩中修自七十三兩至九十四兩大修自二十九兩至一百五十九兩更造自九十七兩至二百六十兩各有差由部準督撫移咨覈覆修造工竣報部題銷凡直省河海江湖及灘汛危險之處各設救生船修造年限視内河戰船各省同惟山西之河津甘肅之歸徳所船無修限率數年一造工料銀小修自二兩二錢至二十七兩大修自四兩三錢至四十五兩更造自七兩七錢至七十九兩各有差由部準督撫移咨覈覆修造工竣報部題銷凡直省水陸通衢有浮梁亦名橋船有渡船或歲修或限年修各省不同更造率以十年惟浙江尖山浮梁以二年四川通西藏渡船以三年福建廣東海口渡船修造與戰船同並準動帑辦理由部覈銷藏冰凡伐冰取諸御河及龍王堂蓮花池歲以冬至後半月部委司官一人募夫伐冰取其明淨堅厚者以方尺有五寸為塊凡納冰紫禁城内窖五藏冰二萬五千塊景山西門外窖六藏冰五萬四千塊徳勝門外窖三藏冰二萬六千七百塊以供各壇廟祭祀暨内廷之用徳勝門外土窖二藏冰四萬塊正陽門外土窖二藏冰六萬塊以供公廨官學及各門各監獄官設暑湯之用凡工費計塊酬直以納於紫禁城内及各門外為差如藏冰不敷用從市採買以夏月及秋月為差均由部給發凡畿輔藏冰以供陵寢祭祀昭西陵由遵化州薊州孝陵孝東陵由豐潤縣景陵由遵化州妃園寢由薊州泰陵由易州孝賢皇后陵寢由豐潤縣均豫年伐藏凡車駕廵幸直省均由地方有司供用無常數惟熱河定冰二千塊喀喇河屯三百塊巴克什營兩間房長山峪樺榆溝中關小營波羅河屯各百塊均豫年伐藏欽定大清㑹典卷七十四
