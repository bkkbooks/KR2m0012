  text: 欽定四庫全書欽定大清會典卷十四
  hash: sha256:e55a45d7d0ab377da82fb24da6e15febe622ee3fc4a6caa3198dc2e328f0c782
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_014-1a, image: WYG0619/WYG0619-0145a.png}
body:
  text: 戸部錢法凡鼓鑄緡錢以資國用農末之交利百物之流轉於是乎權衡焉過輕則民多私鑄過重則民利盗燬權輕重之中以重二銖八十有八黍為率鎔赤金和以白黑鉛及錫依古九府圜法制之徑八分輪郭外周中作字兩面皆陽起清文曰寳泉漢文著年號左右列通寳二字以頒行天下凡京師鼓鑄統設二局其隸於部者曰寳泉局嵗鑄錢六十一卯以萬二千四百八十緡為卯得錢七十六萬千二百八十緡遇閏加鑄四卯得錢四萬九千九百二十緡凡寳泉局政令掌於滿漢右侍郎其滿漢司官由部遴選保舉引見簡用二年更代大使由本部筆帖式選委咨吏部注册五年更代勤謹無過者任滿以應升官用不稱者劾凡寳泉局出錢以兵餉為大兵餉十分以錢一分或二分配銀給發皆視局錢之盈縮以定其增減之數凡銅之良者産於雲南召商開採嵗輸京師五百七十萬四千斤有竒分為六運承運官正副二人以府貳牧令為正丞倅為副以九十日為一運由尋甸東川水陸兼運至四川之永寧下三峽沿於江漢經湖南北江西安徽江蘇逹於運糧河由運糧河逹於京自起運至京以十有四月為期運舟由有司和雇舟不堅固致損敗者經理之有司論其觸險沉溺者所在有司責令雇水手探取銅有遺失者責償其輸納於部也必辨色之髙下以定其數色惡數不足者承運之官論持衡不平致有輕重低昻者主藏之吏論凡商賈有挾重貲願航海市銅者官給符為信聽其出洋往市於東南日本諸夷舟囘司闗者按時直收之以供官用有餘則任其售於市肆以便民用凡白鉛黑鉛産於湖南貴州亦召商開採嵗輸京師白鉛三百八十四萬千九百十有四斤黑鉛七十萬五百七十一斤分為上下二運上運起自四月至十月抵京下運起自十月至次年三月抵京錫之良者産於南洋諸夷國番舶之以時至者由廣東和買嵗輸京師二十一萬千七百十有二斤均以佐雜官承運凡運銅及鉛錫皆有定限計日到京逾期者論經行之地所在有司督催出境毋許淹留法與督漕同催行不力者糾劾凡直省奏準開鑄者直隸山西江蘇江西福建浙江湖北湖南陜西四川廣東廣西雲南貴州十有四省惟雲南即山採銅其他或收本境廢銅或買雲南餘銅各隨其地之宜作之泉布以利民用一面鑄清文寳字並本省一字其餘輕重制度咸如京局凡錢禁莫重於盗燬民有犯者立正典刑其次私鑄其次剪邊取鎔其次用古廢錢其次私行小錢犯者悉論如法中外文武官失察者皆劾若夫轉移出入上操其權交易流通下收其利有藏積私家居竒病民者並治之欽定大清會典卷十四
