  text: 欽定四庫全書欽定大清㑹典卷三十一
  hash: sha256:6b79c34938f554411a7bc726f2701480431e6eaa7c978f39841e309cf93692b0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_031-1a, image: WYG0619/WYG0619-0246a.png}
body:
  text: 禮部儀制清吏司貢舉凡貢舉之法太學及直省府州縣學諸生三年賔興試於順天府各布政使司曰鄉試取其中式者貢於部合天下貢士大比之曰㑹試取其中式者以聞皇帝親䇿試於太和殿丹墀曰殿試凡試有定期歳在子卯午酉以八月鄉試丑辰未戍以三月㑹試均於九日十有二日十有五日鎖闈三試之㑹試及大省鄉試揭曉以逾月十有五日中省先五日小省再先五日為率殿試以四月二十六日傳臚以五月一日凡試以文藝鄉會試均第一場書藝三論一第二場經藝四五言八韻詩一第三場時務䇿五殿試御製䇿問令貢士條對經書文取雅正詩取清華䇿對取切實敷陳浮文妨要及詭異雷同者皆不錄凡考官鄉試正副各一人由部列侍郎以下編檢中贊科道中書評事博士以上官㑹試正副各二人間用正一人副二人或正二人副一人均竢欽命列大學士學士尚書左都御史侍郎左副都御史殿試讀卷官十有四人列大學士學士九卿詹事各疏請簡用凡同考官鄉試順天十有八人由部列員外郎以下評博以上官㑹試十有八人列翰詹給事中部曹各疏請簡用各省鄉試江南十有八人浙江十有六人江西十有四人山東河南各十有二人福建十有一人湖北陜西廣東廣西各十人山西湖南各九人雲南貴州各八人由監臨官於所屬府同知通判知州縣内選擇入闈凡慎選考官除三品以上簡自宸𠂻外吏部咨取四品以下由進士出身官恭竢御試按欽定名次引見仍開列具疏候㫖簡用凡經理試事鄉試順天監臨以府尹提調以府丞内外監試以御史各省監臨以廵撫提調監試以道員内監試亦以道員或府佐㑹試知貢舉以本部侍郎提調以儀制司官殿試提調以本部尚書侍郎監試均以御史凡執事鄉試㑹試受卷彌封謄錄對讀四所暨收掌試卷均以主事等官各省鄉試受卷彌封謄錄對讀收掌以知縣對讀以歳考降青生謄錄以州縣掾吏殿試受卷彌封收掌以翰林給事中内閣侍讀中書本部儀制司官供給官鄉試以府倅㑹試以本部精繕司官率京縣丞史殿試以光祿寺官凡送試鄉試由學政錄取科舉每中式一名大省準錄科八十名中省六十名小省五十名副榜一名準錄科二十名國子監錄取貢監生分南北中卷數亦如之京學教習各館謄錄生部院筆帖式欽天監天文生貢監生由國子監生員由順天學政錄科考取然後冊送鄉試㑹試由本省布政使司咨呈送部直𨽻限豫年十二月山東河南山西陜西十一月江南江西浙江湖廣十月福建四川廣東廣西雲南貴州九月各如期起送司府稽遲違限由部覈叅舉人用中書評事博士太學師儒筆帖式者由該管衙門直省敎官由布政使司各給文送部貢監生初於京闈中式不及回籍起文者取具同鄉官印結呈明均準應試凡試規㑹試及順天鄉試書義三題詩題皆由欽命試前一日本部侍郎順天府尹㳟領詣貢院交知貢舉提調送入内簾經義䇿論各省鄉試四子書題詩題皆正副考官公定校刻題紙是日應試者由貢院東西門魚貫序進聽唱名捜檢入大門給卷各歸號舍試日五鼓内簾出題紙知貢舉監臨提調監試視執事官分送號舍及早晩給飲食毋有不周試畢隨其交卷次第給籤驗出三試皆同殿試前一日讀卷官㳟領制䇿扄内閣門刋版搨黄畢翼日所司設案於太和殿左楹之南又設案於丹陛正中設諸貢士試案於東西丹墀内閣官奉制䇿入殿陳於東案讀卷暨執事官入丹墀左西面序立諸貢士集午門外聽本部唱名給卷鑾儀校代執考具鴻臚官引由左右掖門入昭徳貞度門至丹墀東西班末序立均東西面大學士一人入殿左門奉制䇿出中門授禮部尚書尚書跪接興陳於丹陛案北面跪三叩興儀制司官舉案降自中階陳於御道正中讀卷暨諸執事官就拜位聽贊行三跪九叩禮復位立諸貢士就拜位三跪九叩畢仍北面立本部儀制司官奉制䇿分授諸貢士諸貢士跪受三叩興各就試案讀卷官出竢於内閣諸貢士對䇿畢鑾儀校引出長安門各退凡試卷鄉㑹試由提調鈐考舍坐號授應試者每場試竣受卷所檢墨卷違式者揭於院壁以合式者移彌封所糊名坐號改鈐内號皆簿記之謄錄所易書以朱對讀所取墨卷校讐譌脱改注以紫收掌官鈐内號於朱卷既畢監試以朱卷送内簾交内監試收入殿試受卷官稽卷數彌封官糊名不易書收掌官齎卷及監試御史送内閣交讀卷官校閲凡閲卷鄉㑹試由内收掌分經送各同考官閲以藍筆擇三試全佳者為首薦其第一埸文義致佳二三場無疵第一場文義無疵二三場致佳者為次薦考官閲以墨筆既入選副考官書取正考官書中不入選者批摘瑕疵仍取各經房落卷通校有佳卷未薦者特㧞之廼書取中名次於卷端以待揭曉殿試收掌官以卷送讀卷官分閲公定前列十卷進呈御覽皇帝御便殿召讀卷官入記注官隨入侍班賜讀卷官坐各就位一叩坐皇帝親定甲乙命大學士一人秉筆書一甲三名至二甲七名於卷端既畢奉卷出至内閣扄門拆巻書榜以待傳臚凡出榜鄉㑹試由考官諏日豫行知貢舉監臨届期内簾啓門及外簾各官㑹於一堂出中式朱卷對内號坐號檢校墨卷無譌廼按名書榜畢各官朝服望闕行三跪九叩禮鄉試於順天府及各布政使司署前㑹試於本部署前懸榜三日殿試讀卷畢以欽定前十名合二三甲進士名次書黄榜進呈御覽翼日所司設案於太和殿内及丹陛如䇿士儀内閣官奉黄榜入殿陳於案鑾儀衛備黄蓋雲盤於殿階下設龍亭於午門外鴻臚官六人立於丹陛東階每階二人皆西面鑾儀衛陳法駕鹵簿樂部和聲署陳樂懸皇帝禮服御殿王公百官朝服侍班如常朝儀諸貢士於丹墀東西班末北面序立讀巻暨執事官出班就拜位聽贊行三跪九叩禮大學士奉黄榜出授禮部尚書尚書跪接興陳於丹陛案北面跪三叩興退立於左鳴贊贊有制諸貢士跪宣制官奉制至丹陛南西面立宣訖廼唱第一甲第一名暨二名三名皆傳唱者三鴻臚官引出班至御道東西各以次跪又傳唱二甲一名三甲一名某某等若干名不出班均聽贊行三跪九叩禮贊舉榜禮部尚書詣案跪奉榜興降自中階駕興還宫儀制司官以雲盤承榜導以黄蓋禮部堂司官暨一甲進士隨榜出太和門中門諸進士東班由昭徳門西班由貞度門出至午門外陳榜於龍亭和聲署樂作御仗前導出長安左門懸榜三日凡中額鄉試順天八旗滿洲䝉古漢軍直𨽻諸生及直省貢監生肄業太學者皆分編字號取中共二百十有五名川廣雲貴貢監生每二十巻中一名無定額山東六十九名山西六十名河南七十一名江蘇七十六名安徽四十五名江西浙江皆九十四名福建八十五名湖北四十八名湖南四十五名陜西六十一名四川六十名廣東七十二名廣西四十五名雲南五十五名貴州四十名副榜視正榜取五之一以為額㑹試竢三試既畢之後知貢舉分列直省貢士卷數疏請欽定中額殿試一甲三名賜進士及第二甲三甲無定數二甲賜進士出身三甲賜同進士出身各有差凡官生巻京堂五品以上及翰詹科道外官文三品武官二品以上之子若孫同胞兄弟及兄弟之子鄉試準作官生卷順天鄉試滿洲䝉古漢軍官卷以十名取中一名南北貢監生官巻以十五名取中一名直𨽻江南江西福建浙江湖廣官卷以二十名取中一名山東山西河南陜西四川廣東官巻以十五名取中一名廣西雲南貴州官巻以十名取中一名如官巻不滿十者入民巻通校文不充數者以民卷補中凡迴避㑹試及順天鄉試考官同考官知貢舉提調監試及外簾執事官之子弟宗族有服婣婭皆令迴避不得與試凡磨勘鄉試以取中朱墨卷解部由部奏請以京堂三品以下翰詹六品以上官暨給事中御史集天安門朝房各分卷磨勘㑹試出榜後由部請㫖簡員磨勘有違式干禁者皆論如法凡賜燕鄉㑹試賜考官知貢舉監臨提調監試同考執事各官燕鄉試初入闈順天燕於府署各省燕於布政使司㑹試入闈出闈均燕於禮部及鄉試揭曉賜考官以下至中式諸生燕曰鹿鳴燕殿試傳臚賜一甲進士三人燕於順天府府尹暨丞送歸第翼日賜讀巻官以下至諸進士燕於禮部命内大臣一人主席曰恩榮燕與燕者皆簪花行禮儀見精膳司凡賞賚諸生中式各賜冠服及白金二十兩㑹試給公車費既成進士賜白金三十兩一甲三名外加五十兩第一名朝冠朝衣二名以下表裏各一端凡科場條例據屢科沿革及見行事宜纂輯成編每三年續編頒發直省遵行欽定大清㑹典卷三十一
