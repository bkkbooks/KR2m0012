  text: 欽定四庫全書欽定大清㑹典卷六十五
  hash: sha256:c1b37e65caaac762c8235bca7f677d093bf50da4108d08dc31fb7bb4fc45cc77
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_065-1a, image: WYG0619/WYG0619-0563c.png}
body:
  text: 兵部職方清吏司關禁凡邊關岀入禁令以印票達行旅旗人由都統扎薩克䝉古由理藩院伐木燒炭工人由工部商販民人由該管官各咨部給票出口征戍屯種之人由將軍及各該管官給票入口以旗員專司鎖鑰按名驗票放行每季按出入人數彚册報部察覈無票私越者禁守關官兵失察賄縱各論如法以稽察止姦慝凡軍器硝硫黃牛角綱鐵諸違禁之物毋許私挾出關其喀爾喀厄魯特及䝉古各扎薩克等欲進内置備軍器者由理藩院請㫖下部給票守關官驗票放行數目不符者禁私相賣買者禁山海關奉天吉林産人參東珠之地各設官兵廵緝盜採者禁捕獲私挾參珠者官予敘兵給賞各視所獲之數以為差失察賄縱者論如法以互市通財用朝鮮貿易設市於中江喀爾喀貿易設市於庫倫準噶爾貿易設市於巴里坤及烏里雅蘓臺鄂羅斯貿易設市於恰克圖從人有定數市期有定限經紀司其事毋相欺詐来京貿易詳理藩院海禁凡海外耕種之禁海濱居民不得潛住島嶼招聚耕墾致藏姦匪臺灣職官不得託名墾地自置莊田侵占民番産業違者論如法凡海船製造之禁商漁各船由地方官取船戸族里保結果屬殷實良民許其製造給以執照桅檣雙單船梁丈尺及在船人數各限以制於執照内登注漆桅編號書船户姓名各異其色江南青質白書浙江白質綠書福建綠質朱書廣東赤質青書以昭識别以備口岸稽察凡出入海洋之禁江南浙江福建廣東商船許徃東洋南洋貿易他省船不得私徃漁樵謀生者許徃瀕海港嶼經由汛口均由官弁驗照以稽出入偷渡及驗照不符者論凡貨物出洋之禁硝硫黃鋼鐵出洋船不得私載食米計人定數油麻足備船用而止不得多攜以杜出售外夷接濟姦匪之弊凡軍器出洋之禁商船徃東洋南洋貿易者酌帶弓矢刀槍火礮以備不虞於執照内登注囘日依數察驗有沉失者於所在地方官報明取同船人結狀呈繳備案近洋商船及漁樵船不得越禁私攜凡沿海弁兵之禁海船有被風飄至近岸或觸礁閣淺者守口弁兵急出汛船拯救有爭奪貨財任人船覆溺及救𫉬人命因而奪財或飄来空船乾没貨物或因禁畧奪坐視不救者各按所犯輕重治罪其實力拯救不貪財利者守備千總加級紀録把總及汛兵記功升拔詰禁凡保甲直省府州縣自城市達於鄉村居民十户立牌頭十牌立甲長十甲立保正戸給印紙登姓名習業懸於門楔以稽出入徃来以詰姦宄有藏匿盜匪及干犯禁令者甲内互相覺舉如官吏奉行不善及牌頭甲長保正瞻徇容隱或致需索擾累者皆論聚族而居至百人以上者保甲之外兼立族長以司稽察其近京屯莊及江海採捕漁船並熟苗熟獞次第編排治以保甲之法凡緝盜於盜案呈報之日立限緝捕京城三月直省四月逾限不獲疏劾疎防職名曰初叅再限一年緝捕不獲揭報承緝職名曰二叅以及三叅四叅各以一年依限揭報部於月終彚疏以聞專汛兼轄統轄各官鑴級奪俸有差盜案處分京城為重直省次之直省城内為重村莊道路次之村莊道路有墩防者為重無墩防者次之承緝為重接緝次之專汛為重兼轄次之統轄又次之兼統同城者為重不同城者次之均於叅揭時聲敘由部覈明以致輕重之罰承緝官獲盜過半兼獲盜首盜窩者免議盜所主曰窩全獲者紀錄接緝官獲盜雖不及半亦免議過半者紀録𫉬鄰境之盜計數加級紀錄因捕盜致死傷者照陣亡陣傷例議䘏京城竊賊限四月獲犯不獲專汛官奪俸直省竊賊至十人以上不能察禁緝捕者照盜案疎防例糾劾凡捕逃旗人私逃居停營汛地方失察在半年以内者免議若逾半年及知情容留專汛兼轄統轄各官皆論如法其捕獲私逃旗人十五名者加一級多者準此遞加兼轄統轄官視所屬捕獲之數分别議敘凡緝私錢私鑄燬鹽私行販礦私開採者營汛各官各於境内廵緝失察故縱者論凡禁賭營汛地方有製造賭具之家若已逾半年者失察之專汛兼轄統轄各官分别降革能拏獲者加級紀録各有差揑報邀敘及隱匿失察之案不報者皆論廵防凡外海廵防盛京以協領為總廵佐領防禦驍騎校為分廵直省以總兵官為總廵副將以下為分廵各於所治界内率舟師沿海上下更番徃来以詰姦禁暴兩界相交之所戒期㑹哨同時並集聫名申報將軍督提察覈若因風汛阻滯或先或後各以到界之日申報其期約以二四五月為始至九月事竣囘營將軍督提仍隨時委官稽察有引避不廵及廵有不周者論海盜發覺各按洋汛將總廵分廵各官疏劾一年不獲奪俸鑴級有差限内獲半免議至承緝官初廵不獲者記過再廵不獲奪俸其餘議處議敘均與陸路緝盜同外海戰船直𨽻八盛京六山東二十有四江南八十有三福建三百四十有二浙江百九十有七廣東百六十有六修造届期由督撫提鎮具疏以聞委副將叅將為督修都司守備為承修均㑹文職庀材興工如期竣事仍册注丈尺及在船器具歳終委官察驗保題凡内河廵防長江自四川巫山而東出三江口至湖廣界過岳州武昌興國至江西界下九江南昌至江南界經安慶江寜京口狼山東至於海由將軍督撫提鎮分委旗標弁兵沿泝江流上下遊廵及交界之處㑹廵申報互相考覈與外海廵防同直省巨川中流險要之處所在營汛均設哨船撥兵遊廵遇有盜案發覺其考成均照海洋行船被刼之例内河戰船江南二百五十江西四十有六浙江二百二十有一湖廣百二十有七廣東三百九十有二歳終察驗保題與外海戰船同凡廵海遭風受傷者在外洋官準軍功加級兵準一等傷給賞在内洋官準軍功紀録兵準二等傷給賞身故者在外洋官兵皆照陣亡之例在内洋官照陣亡例減一等兵減半各給䘏典若在黃河大江及洞庭洪澤等湖遭風者視外洋賞䘏公式凡武職處分按律定杖笞之罪辯公私以致輕重之法公罪應十笞者罰俸一月二十三十各遞加一月四十五十各遞加三月杖六十者罰俸一年七十降一級八十降二級九十降三級皆留任滿百降四級調用私罪應十笞者罰俸兩月二十罰俸三月三十四十五十各遞加三月杖六十者降一級七十降二級八十降三級九十降四級皆調用滿百革職其例有專條者八旗按其職掌及有無兼任綠旗按專轄兼轄統轄各分别定議一事有兩罪名者從重議一人兼數任者就一任議革職發審審虚還職如有别案降革及審虛尚有餘罪者照所犯輕重議被議降調任内有加級紀録者準按數抵銷軍功加一級抵降二級紀録二次抵降一級若軍功察議及例載不準抵銷者雖有加級紀録降調如法離任官遇原任議處應罰俸者已升任於新任議候補於補任議應降調者公罪由原任議私罪由見任議出征官遇有處分應罰俸者事竣補罰應降調者帶所降之級留軍營效力應革職者由部請㫖許留軍營則不注闕均仍食俸事竣本管官覈其事實送部引見候㫖三品以下官有犯議處由本管官覈實具疏劾叅六品以下者咨部察議月終彚疏以聞都統將軍副都統提督總兵官因公事檢舉者䟽列應得處分及應否寛免請㫖叅領協領副將以下照例酌減若事屬營私或先經發覺及罪已論决者雖經檢舉不準寛免凡休致二品以上具疏自陳三品以下在京由都統奏請在外由將軍具題交部覈覆其出征臨陣受傷得有功牌者給以全俸若出征並未禦敵及無功牌者給以半俸皆請㫖令其原品休致凡病假以六月為限逾限未痊見任官注闕痊日候補世爵停俸痊日起支欽定大清㑹典卷六十五
