body:
  text: 康熙六十年四月初六日奉㫖朕披覽史冊於前代帝王每加留意書生輩但知譏評往事前代帝王雖無過失亦必刻意指摘論列短長無一人為帝王公言者朕見厯代帝王廟每朝崇祀不過一二主或廟享其子而不及其父或配食其臣而不及其君皆因書生議論而定甚未允當况前代帝王曽為天下主後世之人俱分屬臣子而可輕肆議論定其崇祀與不崇祀乎今宋明諸儒人尚以其宜附孔廟奏請甚多至古帝王宜入廟崇祀從未有人奏請前代帝王皆無後裔後之君天下者繼其統緒即當崇其祀典朕君臨宇内不得不為前人言也朕意以為凡曽在位除無道被弑亡國之主此外盡應入廟即一二年者亦宜入廟崇祀爾等將朕此㫖寫出㑹同從容詳議具奏欽此康熙六十一年四月初三日奉㫖這所議應崇祀之處皆是但其中尚有應詳細斟酌者明代甚近朕少時嘗問有明遺舊宦官愍帝無甚過失皆由萬厯泰昌天啟時衰微及至愍帝雖勵精圖治終不能補救也國之滅亡皆伊祖所壊於愍帝何涉稗官野史所載豈足為憑愍帝不可與亡國者一例同論而萬厯㤗昌天啟實不應入崇祀之列至從前所配享之功臣大概皆開國元勲居多如明之徐達不過一草莽武夫劉基係元之進士皆遭遇成功遂以元勲配享耳其有治安之世輔佐太平有功君國者反不得與配享之列是皆未為允當大學士㑹同九卿詹事科道將此等處詳悉從容確議具奏欽此乾隆四十九年七月初二日奉上諭朕因覽四庫全書内大清通禮一書所列廟祀厯代帝王位號乃依舊㑹典所定有所弗愜於心敬憶皇祖實録有勅議増祀之諭令查取禮部原議紅本則係康熙六十一年十一月内具題爾時諸臣不能仰體聖懐詳細討論未免因陋就簡我皇祖諭㫖以凡帝王曽在位者除無道被弑亡國之主此外盡應入廟即一二年者亦應崇祀煌煌聖訓至大至公上自羲軒下至勝國其間聖作明述之君守文繼體之主無不馨香妥侑不特書生臆論無能仰喻髙深即厯代以來升歆議禮未有正大光明若此者也乃㑹議疏内聲明偏安亡弑不入祀典而仍入遼金二朝不入東西晉元魏前後五代未免意有偏向視若仰承聖意而實顯與聖諭相背朕意若謂南北朝偏安不入正統則遼金得國亦未奄有中原何以一登一黜適足啟後人之訾議即因東西晉前後五朝有因簒得國擯而不列如操丕不得為正統之例殊不知三國時正統在昭烈故雖以陳夀三國志之尊魏抑蜀而卒不能奪萬世之公評至司馬氏簒竊以還南朝神器數易如宋武帝掘起丹徒手移晉祚自不能掩其簒奪之罪其他雖祖宗得國不正而子孫能繼緒承休即為守文中主亦不可概從缺畧況自漢昭烈以至唐髙祖統一區夏時之相去三百餘年其間英毅之辟節儉之主史不絶書又安可置而不論至於後五代如朱温以及郭威或起自冦竊或身為叛臣五十餘年更易數姓中華統緒不絶如綫然周世宗承藉郭氏餘業憑有疆域尚不失為令主此而概不列入則東西晉前後五代數百年間創守各主祀典缺如何以協千秋公論他若元魏雄據河北地廣勢强太武道武勤思政理講學興農亦可為偏安英主並當量入祀典以示表章朕前命館臣録存楊維楨正統辨諭内詳晰宣諭以維楨所辨正統在宋不在遼金之説為是所以存春秋綱目之義見人心天命之攸歸且檢閲孫承澤春明夢餘録所載明代崇祀古帝王位號原未列遼金二朝今帝王廟崇祀遼金而不入東西晉前後五代似此互相入主出奴伊於何底是皆議禮諸臣有懐偏見明使後世臆説之徒謂本朝於厯代帝王未免區分南北意存軒輊甚失皇祖降諭之本意也至明之亡國由於神熹二宗紀綱隳而法度弛愍帝嗣統時國事已不可為雖十七年身厯勤苦不能補救傾危卒且身殉社稷未可與荒淫失國者一例而論是以皇祖睿裁將神熹二宗撤出而愍帝則特令廟祀褒貶予奪毫釐不爽實千古大公定論乃諸臣於定議時轉復將漢之桓靈増入豈未思炎漢之亡亡於桓靈而不亡於獻帝乎從前定議未將東漢全局詳審論斷轉使昏闇之君濫叨廟食所議未為允協夫自古帝王統緒相傳易代以後饗祀廟庭原以報功崇徳至於嚴簒竊之防戒守成之主或予或奪要必衷於至當而無所容心於其間方協彰癉之義所有厯代帝王廟祀典著大學士九卿更行悉心詳議具奏並著於定議後交四庫館恭録皇祖諭㫖並朕此㫖於通禮廟饗卷首以昭殷鑒厯朝垂示萬年之至意欽此乾隆四十九年七月二十八日奉上諭據大學士九卿等㑹議増祀兩晉元魏前後五代各帝王一摺並聲請唐憲宗金哀宗應否一體増祀等語憲宗處唐中葉各鎮節度憑陵跋扈僭叛不臣憲宗命將專征削平淮西厥功頗偉在有唐一代中尚屬英主其末年被弑係禍變猝乘與荒亂失徳召變致衅者不同至金哀宗處衰弱之時國勢已不可問推其致敗之由實因熙宗海陵淫虐階厲哀宗自縊殉國與明之愍帝事同一例自應一體増祀餘俱著照所議行欽此欽定四庫全書欽定大清會典卷四十五禮部祠祭清吏司中祀二凡祭前代帝王之禮為廟於皇城之西殿曰景徳崇聖内設七室中一室奉太昊伏羲氏炎帝神農氏黄帝軒轅氏東一室奉少昊金天氏顓頊髙陽氏帝嚳髙辛氏帝堯陶唐氏帝舜有虞氏西一室奉夏王禹啟仲康少康杼槐芒泄不降扄厪孔甲臯發商王湯太甲沃丁太庚小甲雍己太戊仲丁外壬河亶甲祖乙祖辛沃甲祖丁南庚陽甲盤庚小辛小乙武丁祖庚祖甲廪辛庚丁太丁帝乙東二室奉周武王成王康王昭王穆王共王懿王孝王夷王宣王平王桓王莊王僖王惠王襄王頃王匡王定王簡王靈王景王悼王敬王元王貞定王考王威烈王安王烈王顯王慎靚王西二室奉漢高祖惠帝文帝景帝武帝昭帝宣帝元帝成帝哀帝光武帝明帝章帝和帝殤帝安帝順帝冲帝昭烈帝晉元帝明帝成帝康帝穆帝哀帝簡文帝宋文帝明帝孝武帝齊武帝陳文帝宣帝魏道武帝明元帝太武帝文成帝獻文帝孝文帝宣武帝孝明帝東三室奉唐高祖太宗高宗睿宗元宗肅宗代宗徳宗順宗憲宗穆宗文宗武宗宣宗懿宗僖宗後唐明宗後周世宗宋太祖太宗真宗仁宗英宗神宗哲宗高宗孝宗光宗寧宗理宗度宗端宗遼太祖太宗景宗聖宗興宗道宗西三室奉金太祖太宗世宗章宗宣宗哀宗元太祖太宗定宗憲宗世祖成宗武宗仁宗㤗定帝文宗寧宗明太祖惠帝成祖仁宗宣宗英宗景宗憲宗孝宗武宗世宗穆宗愍帝位均南嚮凡異代同室者隔别之兩廡各以其名臣配饗東廡風后倉頡夔伯夷伊尹傅説召公奭畢公高召穆公虎仲山甫張良曹參周勃魏相鄧禹耿弇諸葛亮房元齡李靖宋璟郭子儀許逺李晟裴度曹彬李沆王曾富弼文彦博李綱韓世忠文天祥宗翰穆呼哩布呼宻徐逹常遇春楊士竒于謙劉大夏位均西嚮西廡力牧臯陶龍伯益仲虺周公旦太公望吕侯方叔尹吉甫蕭何陳平劉章丙吉馮異馬援趙雲杜如晦狄仁傑姚崇張巡李泌陸贄耶律赫嚕吕䝉正寇準范仲淹韓琦司馬光趙鼎岳飛斡魯宗望巴延托克托劉基李文忠楊榮李賢位均東嚮嵗以春秋仲月諏日遣官致祭皇帝特行崇典則親詣行禮景徳崇聖殿中三皇各一案五帝共三案夏商周代設一案其餘每室三案每位帛一每室牛一羊一豕一尊一每案登一鉶二簠簋各二籩豆各十爵三鑪一鐙二兩廡各設十案每位帛一爵三每案鉶二簠簋各二籩豆各四東西各羊二豕二尊二鑪四鐙八先祭一日樂部設中和韶樂於殿外階上分左右懸鑾儀衛陳法駕鹵簿於午門外日出前六刻太常卿詣乾清門告時皇帝御祭服乘禮輿出宫前引後扈如常儀駕發警蹕午門鳴鍾法駕鹵簿前導不陪祀王公百官咸朝服跪送導迎鼓吹設而不作鑾儀衛校鳴廟内鐘皇帝至廟由中門入至景徳門降輿賛引太常卿二人恭導皇帝入大次少憇太常卿奏請行禮皇帝出幄次盥洗賛引官恭導皇帝由景徳中門陞中階入殿中門至拜位前北嚮立太常賛禮郎引分獻官至階下夾甬道立鴻臚官引陪祀王公位殿外階上百官位階下左右序立均北面典儀官賛樂舞生登歌執事官各共迺職以下自迎神至送神皆典儀官唱賛武舞八佾進賛引官奏就位皇帝就拜位立迺迎神司香官各奉香盤進司樂官賛舉迎神樂奏肇平之章凡舉樂皆司樂官唱賛賛引官奏就上香位恭導皇帝詣太昊伏羲氏香案前司香官跪進香賛引官奏上香皇帝立上柱香次三上瓣香畢以次詣炎帝神農氏黄帝軒轅氏香案前上香儀同各室司香官詣各香案前上香賛引官奏復位皇帝復位奏跪拜興以下行禮皆有奏皇帝行二跪六拜禮王公百官皆隨行禮奠帛行初獻禮司帛官奉篚司爵官奉爵以次進奏興平之章舞干戚之舞司帛司爵各詣神位前司帛官跪奠帛三叩司爵官立獻爵奠正中兩廡分獻官上香執事生奠帛獻爵如儀皆退司祝至祝案前跪三叩奉祝版跪案左樂暫止皇帝跪羣臣皆跪司祝讀祝畢詣太昊伏羲氏位前跪安於案三叩退樂作皇帝率羣臣行三拜禮興樂止武功之舞退文舞八佾進行亞獻禮奏崇平之章舞羽籥之舞司爵官獻爵奠於左儀如初獻行終獻禮奏恬平之章舞同亞獻司爵官獻爵奠於右儀如亞獻兩廡畢獻儀如初樂止文徳之舞退太常官賛答福胙光禄卿二人自東案奉福胙進至太昊伏羲氏位前拱舉降立於皇帝拜位之右侍衛二人進立於左皇帝跪左右執事官皆跪右官進福酒皇帝受爵拱舉授左官進胙受胙亦如之三拜興率羣臣行二跪六拜禮徹饌奏淳平之章徹饌畢送神奏匡平之章皇帝率羣臣行二跪六拜禮有司奉祝次帛次饌次香恭送燎所皇帝轉立拜位旁西嚮候祝帛過復位樂作祝帛燎半奏禮成恭導皇帝由景徳中門出陞禮輿導迎樂作奏祐平之章皇帝回鑾王公從百官以次退不陪祀王公百官於午門外跪迎午門鳴鐘王公隨駕入至内金水橋恭候皇帝還宫各退遣官王公由景徳門左門入於階上大臣由左旁門入於階下均行三跪九叩禮讀祝王公引入殿内大臣引至階上賛引以太常賛禮郎上香時賛就上香位引承祭官進殿詣三皇案前上香五帝以下均執事官上香升降自東階出入由殿左門祝帛送燎所避立西旁東面不飲福受胙王公等不陪祭餘均如儀皇帝巡狩方嶽所至之地遣行在三品以上官致祭帝王陵寢在三十里以内者其功徳隆重之君間親詣行禮至日昧爽行在鑾儀衛陳騎駕鹵簿於行宫門外扈從王公暨文武官應陪祭者均陪祭守土官文知府武副將以上亦如之咸采服日出前三刻行在太常卿詣行宫告時皇帝御龍袍衮服乗輿出行宫前引後扈如常儀不陪祭扈從官咸集行宫前跪送駕發警蹕及祭所不陪祭守土官朝服跪迎廟中不設樂舞不飲福受胙餘儀與京師廟祭禮同恭遇國家大慶舉行典禮遣官齎祭文香帛祭伏羲氏陵於淮寧女媧氏於趙城神農氏於酃軒轅氏於中部少昊氏於曲阜高陽氏高辛氏於滑陶唐氏於濮有虞氏於寧逺夏王禹於㑹稽商王湯於滎河中宗於内黄高宗於西華周文王武王成王康王於咸陽漢高祖於涇陽文帝於咸寧宣帝於長安光武帝於孟津後魏孝文帝於富平宋開寳中葬衣冠之地唐高祖於三原太宗於醴泉憲宗於蒲城宣宗於涇陽後周世宗於鄭宋太祖太宗真宗仁宗於鞏遼太祖於廣寧金太祖世宗於房山元太祖世祖於宛平城北望祭明太祖於江寧宣宗孝宗世宗於昌平所在有司具帛一牛一羊一豕一豋一鉶二簠簋各二籩豆各十尊一爵三遣官前祭期致齋二日將事行禮與遣官祭嶽鎮海瀆儀同所在直省府州