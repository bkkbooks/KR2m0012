  text: 欽定四庫全書欽定大清㑹典卷六
  hash: sha256:a0d14972f9d90dac398f123a07a4631c597b0654fdfcad9528fd5dac9083bca8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_006-1a, image: WYG0619/WYG0619-0076a.png}
body:
  text: 吏部考功清吏司考察凡天下文官三載考績以定黜陟在内曰京察在外曰大計京察之制三品京堂由部開列事實具奏候旨四五品京堂請特簡王大臣驗看分別等第引見餘官各聽察於其長考以四格曰守曰政曰才曰年糾以八法曰貪曰酷曰罷軟無為曰不謹曰年老曰有疾曰浮躁曰才力不及各注確實考語具册宻送吏部都察院吏科京畿道各封門覈定等次守清才長政勤而年或青或壮或健稱職者為第一等守謹而或政平或才平年或青或壮或健勤職者為第二等守謹而才政平或才長政勤而守平年青及壮健供職者為第三等皆照舊供職八法官貪酷者革職提問罷軟無為不謹者革職年老有疾者勒令休致浮躁者降三級調用才力不及降二級調用加級紀録均不準援抵覈畢集聽察各官於部以次過堂㑹大學士都察院堂官吏科給事中京畿道監察御史公同閱看别其去畱繕册具題命下後榜示以昭勸懲凡出征公差丁憂告病養親給假候補降調未補者均由該衙門注考升轉降調及旗員改授部院官到任半年者從新任考覈未及半年者從原任考覈一等官除内閣侍讀學士翰詹開坊各官不引見不優叙其餘各官由部引見準一等者加一級遇保薦時該堂官即於一等人員内選取閱俸未滿三年及離任已逾半年者均不得與一等升補官通理前俸降調起廢及外任改補京官均不通理前俸其入八法應去之員除貪酷外均引見老疾不能引見者聽注考徇情及遺漏舛錯者罪之一等官於本任内犯貪劣事蹟者并罪原薦官自覺舉者免議在他處犯者亦免議八法降革官呈辯已寃及誣訐注考官者罪之所告事不準行大計同京察官以二月二十五日為始停其議處竢事畢出榜後補行奉特㫖者不在此例大計之制直省督撫覈其屬官功過事蹟注考繕册舉以卓異劾以八法不入舉劾者為平等限十一月内具題到部㑹同都察院吏科京畿道考察題覆如督撫蒞任未久不及周知屬官賢否者疏請展限丁憂裁汰官未補授者從原任考覈升轉降調官改任一年以上者從新任考覈未及一年者從舊任考覈其老病休致終養官不必注考解任官惟糾叅貪汚者不注考餘或一事論劾或彼此訐告仍覈其平日政績注考不以一時緣事畧之上考曰卓異自道府以至佐雜才守兼優閱俸滿三年者調任官員通計前俸均準薦舉其因公罣誤罰俸降級之員如居官廉能亦許别疏列薦由部覈覆得㫖後檄令赴京引見準卓異者注冊賜衣一襲回任候升如薦舉不實遺漏該員處分之案者分别議處卓異官犯貪酷不法其原薦官或同省或不同省分别察議能自覺舉及經同薦舉官覺舉者皆免議八法官處分及引見均如京察例糾劾失實者罪之不入舉劾官自知州知縣以上仍令督撫以守政才年四格注考具册咨部覈定等次彚繕黃冊進呈致仕凡滿漢大臣引年乞休得㫖或以原品休致或晉秩或加銜或令乘傳還鄉或官其子孫或給以原俸皆出自特恩不為定制凡四品以下官吿休内則堂官覈咨外則督撫覈咨由部具題以原品休致其年老有疾戀職曠官者糾叅勒令休致告病凡京官告病聽囘籍調理不限年三品以上自行陳奏餘皆取具同鄉官結咨部彚題病痊赴補旗員告病該管官委官􅃀驗酌給假期調治以半年為限逾限者咨部別選外任官告病督撫委官確驗平庸者勒令休致優者疏請聽囘籍調治道府以上應否囘籍由部請旨病痊後州縣以上官督撫咨部引見以原官補用佐雜官州同以下咨部補用試用官仍赴原省試用内外官員揑飾告病者本人及驗看出結官皆議處囘籍官營私滋事擾害地方者奪職有司不行申報及既報而督撫不具題者皆議處功過凡外任官地丁漕項全完鹽課鹽引全完運糧全完勸民墾荒營田緝獲􅇯盗逃叛私鑄私銷製造賭具私出海洋等犯以及牧字蕃息獄無疎脱修築水利捐穀貯倉河工栽桞栽葦者均分别議叙加級紀録有差凡議處官貟援引律文笞杖等罪名審其公私以定議公罪應笞一十罰俸一月二十三十各遞加一月四十五十各遞加三月杖六十罰俸一年七十降一級八十降二級九十降三級皆留任杖一百降四級調用私罪應笞一十罰俸兩月二十罰三月三十四十五十各遞加三月杖六十降一級七十降二級八十降三級九十降四級皆調用杖一百革職凡因公降革各部司官及五城指揮等官如實習練政務人才出衆者許該堂官保奏引見請旨或以所降之級從寛留任或降用或别用或照部議降革外任官自知縣以上均繕該員履歴附疏進呈如奉旨令督撫出具考語送部引見或以原官銓選者仍帶所降之級或降用或别用或照部議降革凡官員議罰升轉及降調者各罰現任俸裁汰給假丁憂解任官各竢補官日罰俸革職留任官竢開復扣抵王公以下世爵任部院事者遇罰俸之案照本任應罰之俸於世爵俸内扣除餘俸仍給外任官應追罰俸銀休致病故者豁免革職知縣以上仍追食過編俸佐貳雜職因貪贓枉法革職者追俸因公罣誤者免追凡官員升任後遇原任内應得降調處分以見任之職降調大銜借補小任之員遇降調之案係捐職考職者照現任降調原銜帶於降調之任不凖以原銜升轉如現任無級可降即革任以原銜休致不準補用係候補候選捐職即用者仍照原銜降調降級留任官遇恩詔及議叙加級準其抵銷凡降罰係京察大計處分及虚降者皆不抵銷餘皆準以加級紀錄抵銷紀錄一次抵罰俸六月四次抵降一級軍功紀錄一次準作二次加一級準作二級有卓異即升注冊者皆準抵降一級因公罣誤降革後經開復仍給還原任内加級紀錄老病休致官任内應得加級紀錄仍注冊催徴督徴未完處分惟軍功及錢糧全完所得加級紀錄準抵餘不準抵司官遺漏抵銷及重複抵銷者皆議處凡降級留任官三年無過開復革職留任官四年無過開復在京三品以上在外督撫咨部具題餘由堂官及上司覈明送部奏請未開復之前有罰俸之案於年限内加扣罰俸月日見繳者免扣如復有降革之案係奉旨從寛留任者計案逓加扣滿年限方許開復係例應留任則計其後案開復在前案年限之内者前後案並準開復如在前案年限之外者以後降後革之日為始計滿年限開復筆帖式從九品未入流等官無級可降議以革職如所降在三級以内咨詢平日居官賢否以别去留降級數多者仍革職其留任未開復又罹降調者革任凡官員兼文武職任並世爵兼文武職任者惟犯貪汚及行止不端爵職並革溺職者文武職任皆革其世爵應否存留具奏請旨若奉特旨革職者其所兼之職及世爵應否去留亦具奏請旨至因公罣誤革職者止革本任降級停俸亦如之若所犯不由職任者從大銜議處凡出師官員應罰俸者注册事竣補罰應降調者帶所降之級仍留軍營應革職者應否留營効力具奏請㫖準留者事竣日送部引見老病休致官應降者降去頂帶應革者革去職銜革職官有應罰俸降革者注冊凡内外官辦事錯誤自行檢舉者内自京堂外自藩臬以上或處分或寛免由部請㫖餘官按處分例酌減應革職者革職留任應革職留任者降四級留任應降調者降一級留任應降留者罰俸一年應罰俸者減半三月以下免議如係營私或先經發覺及斷罪已行論決雖經檢舉不得寛減凡官員議處之案一事有兩罪名相因而致者從重議處餘皆分别察議一人兼數任者遇同案處分止以一任議處至律例無正條又無可比擬者􅃀察酌議於疏内聲明請㫖着為定例期限凡政事期㑹計各部院所受之日立之程限事易決者各部院衙門二十日戸部刑部三十日待咨詢及㑹藁各展二十日所㑹衙門吏禮兵工五日户刑十日九卿㑹議三十日户部奏銷四十日月終則㑹計已結未結之案具冊送科道察覈無故逾限者計日議處外省奉㫖及部咨應題覆者限文到後四閱月具題兼轄兩省之總督於所轄隔省事件限六閱月違限者計月降罰有差如案情繁重限内不能完結者􅃀覈具題展限凡承審限期盗案以十月為限命案以六月為限一切審案以四月為限限滿不結均再限四月定限之内自州縣至督撫又各有分限定限十月者州縣限五月解府州府州限両月解司司限一月有半解督撫督撫限一月有半題結餘仿此州縣初叅逾限罰俸二叅逾限奪職知府直隸州知州并議處其事屬難結二限不能審解者題叅展限承審官革職留任復限四月審結再逾革任䑃溷請展者州縣至督撫降革有差承審官公出及人犯患病解審在途各日期均許於定限内扣除接審官視前官承審過日期分别展限上司苛駮以致遲延許承審官直掲三法司刑科覈實議處妄掲者罪之甘肅各屬廣東瓊州及湖南苖疆州縣均於正限外展限兩月臺灣限十閱月凡承緝限期命案初限半年盗犯初限四月限滿不獲罰俸再限一年嚴緝三限亦如之如仍不獲命案降級留任盗案降級調用詳見則例其餘一切承追接緝等事均以一年限滿察叅分别議罰公出日期不準扣除凡各官承督未完遇赦免議即於赦後起限限滿不結仍作初叅處分其限未滿而告病終養者仍照例議處其特㫖升調及丁憂别案降革者皆以罰俸完結凡督撫題案違限不及一月者免議一月以上降罰有差因公出境入闈監臨並計日展限新任及接署者按定限展半通行各屬詳議之案視事理難易分别展限交代囘籍凡升轉降革裁汰患病休致丁憂各官任内無未完事件方許離任如不候交代即離任者本官及上司皆議處知府州縣運使等官新舊交代各有定限倉穀錢糧自二萬五千至十五萬以上及一人而有兩䖏交代者照例酌展限期逾初限者議罰逾二限者奪職上司督催不力或限滿不察叅及借端抑勒者降罰有差未完揑報已完及被役燬匿文冊侵匿銀者降革有差河工廳汛各官及教官交代一如州縣例凡交盤前官虧空後官不報者照徇隱虧空例議處虧項責後官賠補如上司䕶庇前官抑勒新官接受者許被抑之人直掲部科上司照徇庇例議處署印官有意遲延不肯接受者降調凡外任旗員離任歸旗以五閱月為限計程咨部旗察覈無故逾限或中塗逗遛及寄住他處者皆革職已革者治罪地方官不速催起程督撫以下皆議處患病及中塗阻滯情實者結報免議歸旗人員家口令地方官具冊咨送部旗察覈隱匿者議處沿塗地方有潛匿者亦如之歸旗之人不候給咨不竢察㸃䕶送而越渡者比照逗遛例議處凡内外漢官休致丁憂給假均聽囘籍如係叅革應於原籍追贓治罪者有司計程定限到籍後咨部察覈若罪止革職者立限催囘違限及中塗逗遛者本人及地方官皆議處微員離任病故家口無力囘籍者地方有司酌給路費無親僕扶柩者遣役送還本鄉稽勲清吏司守制終養附凡漢官丁憂及承重者以聞訃日始解任囘籍守制不計閏二十七月服闋以原官起用其匿喪短喪及揑飾規避呈報遲延者皆議處月選官在京聞訃取具同鄉官結報即聽囘籍仍令原籍有司結報在籍選補官呈報有司具結咨部喪服未闋輙易衣冠拜官長與燕㑹者罪之在京旗員丁憂及承重者百日後入署供職二十七月内停升外任則定限歸旗百日後本旗引見候㫖以京職委署服闋仍補外任不宜外任者改用京職出師者不得於軍營發喪以囘京日守制凡官員為人後者聞本生父母訃許囘籍治喪一年後赴補凡漢官祖父母父母年七十以上家無兄弟及有兄弟而篤疾不能侍養者許告歸終養年八十以上雖有兄弟或母老雖有異母兄弟亦許歸養其未合例而情有可憫者請㫖定奪旗員外任者亦如之外任官於選補抵任後請歸養者補官日仍補原任凡滿漢官員筆帖式應給俸廪先期由各該衙門各該旗繕册送部察覈無訛方準移送户部仍於嵗終彚造清册具題欽定大清㑹典卷六
