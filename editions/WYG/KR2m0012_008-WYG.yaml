body:
  text: 户部尚書滿漢各一人左右侍郎滿漢各一人掌天下土田户口財榖之政平準出納以均邦賦屬司十有四山東清吏司郎中滿二人漢一人員外郎滿三人漢一人主事滿漢各一人掌稽山東布政使司及盛京民賦收支奏册兼覈長蘆等處鹽課請引疏銷山西清吏司郎中滿漢各一人員外郎滿洲䝉古漢各一人主事滿漢各一人掌稽山西布政使司民賦收支奏册兼覈㳺牧察哈爾地畝河南清吏司郎中滿漢各一人員外郎滿二人漢一人主事滿漢各一人掌稽河南布政使司民賦收支奏册兼覈游牧察哈爾及圍場捕盜官兵俸餉江南清吏司郎中滿漢各一人員外郎滿三人漢一人主事滿漢各一人掌稽江蘇安徽二布政使司民賦收支奏册兼覈江寜蘇州織造支銷奏册江西清吏司郎中滿漢各一人員外郎滿二人漢一人主事滿漢各一人掌稽江西布政使司民賦收支奏册福建清吏司郎中滿二人漢一人員外郎滿五人漢一人主事滿洲䝉古漢各一人掌稽直隸福建二布政使司民賦收支奏册兼覈直屬内府莊田及游牧察哈爾地畝浙江清吏司郎中滿漢各一人員外郎滿二人漢一人主事滿漢各一人掌稽浙江布政使司民賦收支奏册兼覈杭州織造支銷奏册湖廣清吏司郎中滿二人漢一人員外郎滿二人漢一人主事滿漢各一人掌稽湖北湖南二布政使司民賦收支奏册陜西清吏司郎中滿洲䝉古漢各一人員外郎滿三人漢一人主事滿漢各一人掌稽西安甘肅二布政使司民賦收支奏册並行銷茶引兼覈在京漢官俸廪外藩俸幣及廵捕三營俸餉各衙門經費四川清吏司郎中滿漢各一人員外郎滿二人漢一人主事滿漢各一人掌稽四川布政使司民賦收支奏册兼覈本省闗税及在京入官户口廣東清吏司郎中滿漢各一人員外郎滿三人漢一人主事滿漢各一人掌稽廣東布政使司民賦收支奏册兼覈八旗繼嗣歸宗更正户口廣西清吏司郎中滿漢各一人員外郎滿四人漢一人主事滿漢各一人掌稽廣西布政使司民賦收支奏册兼覈京省錢局運銅鼓鑄及内倉支放供應芻豆雲南清吏司郎中滿二人漢一人員外郎滿三人漢一人主事滿漢各一人掌稽雲南布政使司民賦收支奏册兼覈山東河南江南江西浙江湖廣等省嵗運漕糈京通倉儲及江寜水次六倉收支考覈貴州清吏司郎中滿漢各一人員外郎滿三人漢一人主事滿漢各一人掌稽貴州布政使司民賦收支奏册兼覈各闗各口徴收税課堂主事滿二人掌八旗編審滿二人漢軍二人掌酌撥餉銀校勘奏章司務滿漢各一人筆帖式滿百人䝉古四人漢軍十有六人分隸各司視事之繁簡以為額管理三庫大臣於大臣内簡用無定員掌總稽庫藏節制出納銀庫郎中一人員外郎二人大使二人司庫一人段疋庫郎中一人員外郎二人大使一人司庫二人顔料庫郎中一人員外郎二人大使一人司庫二人分掌銀幣物料解納收支堂主事一人掌稽覈文移筆帖式十有五人庫使二十六人分隸三庫寶泉局監督滿漢各一人無專員於司官内遴選引兼管見令其掌鑄造制錢收納銅課大使滿五人於筆帖式内遴委分理匠役工料總督倉場户部右侍郎滿漢各一人總稽嵗漕之入以均廪禄以儲軍餉凡南北漕艘京通倉庾悉隸焉坐糧廳滿漢各一人掌通濟庫收支錢糧兼覈漕船程限大通橋監督滿漢各一人掌掣驗漕糧京通十有五倉監督滿漢各一人分掌漕白糧出納筆帖式四人收掌文書内倉監督滿二人於滿司官内奏委掌支放外藩朝貢及各學教習官役廪粟疆理國家統壹寰宇風行海表居重馭輕宏規無外矣兩京設尹崇首善也外列十有八省分之為府府領州縣直隸州亦領縣皆屬於布政使司而統治於總督廵撫廵撫專轄本省總督所統或三省或兩省乂或以總督管廵撫事或專設廵撫不隸總督莫非因地因時而立之經制以至苖服土司多歸郡邑長官夷目胥入版圖各相其山川道里形勢利便以定厥疆理任土任民而作之貢賦京師順天府領京縣二大興宛平州五通昌平涿霸薊縣十有七良鄉固安永清東安香河三河武清寶坻寜河順義密雲懐柔房山文安大城保定平谷盛京南距大海訖於西南西達山海闗北接邊塞黑龍江東北繞之東南界朝鮮國奉天府領京縣一承徳州二遼陽復縣五海城蓋平開原鐵嶺寜海錦州府治錦縣領州二寜逺義縣二錦廣寜直隸總督治保定府兼管順天府屬各州縣所屬府九直隸州六東至於海南界山東西接山西北控邊塞東北達山海闗西南距河南保定府治清苑縣領州二祁安縣十有五清苑滿城安肅定興新城唐博野望都容城完蠡雄束鹿高陽新安永平府治盧龍縣領州一灤縣六盧龍遷安撫寜昌黎樂亭臨榆河間府治河間縣領州一景縣十河間獻阜城肅寜任邱交河寜津呉橋故城東光天津府治天津縣領州一滄縣六天津青靜海南皮鹽山慶雲正定府治正定縣領州一晉縣十有三正定𫉬鹿井陘阜平欒城行唐靈夀平山元氏贊皇無極藳城新樂順徳府治邢臺縣領縣九邢臺沙河南和平鄉廣宗鉅鹿唐山内邱任廣平府治永年縣領州一磁縣九永年曲周肥鄉雞澤廣平邯鄲成安威清河大名府治元城縣領州一開縣七元城大名南樂魏清豐東明長垣宣化府治宣化縣領州三蔚延慶保安縣七宣化赤城萬全龍門懐來西寜懐安直隸遵化州領縣二玉田豐潤易州領縣二淶水廣昌冀州領縣五南宫新河棗强武邑衡水趙州領縣五栢鄉隆平高邑臨城寜晉深州領縣三武强饒陽安平定州領縣二曲陽深澤山東廵撫治濟南府所屬府十東至於海南至江蘇西至河南北至直隸東北至盛京濟南府治歴城縣領州一徳縣十有五歴城章邱鄒平淄川長山新城齊河齊東濟陽徳平禹城臨邑平原陵長清泰安府治泰安縣領