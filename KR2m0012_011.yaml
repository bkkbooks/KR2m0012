  text: 欽定四庫全書欽定大清㑹典卷十一
  hash: sha256:4e2b67b1239369ffb37cbf21b2e08b019c81e15fd59d2ef61c711be5f7fd21c5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_011-1a, image: WYG0619/WYG0619-0127a.png}
body:
  text: 戶部權量度量衡受法於律黃鐘絫黍漢志僅存其說聖祖仁皇帝考古法以制度而量與權衡準焉皇帝參古今尺度制為嘉量而權衡攸同聖明相繼作述兼隆誠度越前規式昭萬祀矣度橫黍度古尺縱黍度今尺以絫黍定分寸之率一黍之廣度為一分橫絫十黍得古尺一寸一黍之縱度為一分直絫十黍得今尺一寸今尺八寸一分當古尺十寸今尺七寸二分九釐當古尺九寸即黃鐘之長十寸為尺十尺為丈十丈為引總以尺該之工部製造頒直省布政使司通頒所屬以準度營造權以寸法定輕重之率鑄金為方上下四旁均一寸各按其質求之赤金方寸得十有六兩八錢白金方寸得九兩紅銅方寸得七兩五錢黃銅方寸得六兩八錢黑鉛方寸得九兩九錢三分倭鉛方寸得六兩輕重之準既得乃隨大小之用制以為權其形圓其制以黃銅由部定式工部鑄造頒直省布政使司通頒所屬以出納邦賦量以寸法定容積之率升方積三十一寸六百分靣底方四寸深一寸九分七釐五毫斗方積三百一十六寸靣底方八寸深四寸九分三釐七毫五絲斛方積一千五百八十寸口方六寸六分底方一尺六寸深一尺一寸七分兩斛為石容積三千一百六十寸各得容量之準斛之制由部定式工部鑄造以鐵頒倉場侍郎漕運總督直省布政使司布政使司如式造木斛通頒所屬以出納倉糧凡官司所掌營造官物收支糧賦貨賦下逮市廛里巷商民日用度量權衡皆如式較定有違制私造增减成憲者皆論如律嘉量圓制東漢嘉量度數中今太簇仿其式用今律度合黃鐘焉斛積八百六十寸九百三十四分四百二十釐容十斗深七寸二分九釐冪一百十有八寸九分八十釐徑一尺二寸二分六釐二毫斗積八十六寸九十三分四百四十二釐容十升深七分二釐九毫冪一百十有八寸九分八十釐徑一尺二寸二分六釐二毫升積八千六百有九分三百四十四釐二百毫容十合深一寸八分二釐二毫五絲冪四百七十二分三十九釐二十毫徑二寸四分五釐二毫合積八百六十分九百三十四釐四百二十毫容二籥深一寸有九釐六毫冪七十八分五十三釐九十八毫徑一寸籥積容深為合之半冪徑同按工部營造尺為縱絫百黍之度營造尺九之九即律尺為橫絫百黍之度嘉量方制唐太宗時張文收造嘉量形方亦仿其制而用今律度斛積八百六十寸九百三十四分四百二十釐容十斗深七寸二分九釐冪一百十有八寸九分八十釐方一尺有八分六釐七毫斗積八十六寸九十三分四百四十二釐容十升深七分二釐九毫冪一百十有八寸九分八十釐方一尺有八分六釐七毫升積八千六百有九分三百四十四釐二百毫容十合深一寸八分二釐二毫五絲冪四百七十二分三十九釐二十毫方二寸一分七釐三毫合積八百六十分九百三十四釐四百二十毫容二籥深八分六釐有九絲冪八分方一寸籥積容深為合之半冪方同按工部營造尺為縱絫百黍之度營造尺九之九即律尺為橫絫百黍之度右嘉量圓方各一皆範銅塗金上斛下斗左耳為升右耳為合籥其重二鈞聲中黃鐘之宫掌以工部陳之殿廷垂憲於億萬斯年欽定大清會典卷十一
