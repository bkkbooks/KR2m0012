body:
  text: 内務府上駟院兼管院事大臣無定特簡員卿二人掌羣牧之政所屬左司郎中一人侍衛員外郎各二人主事一人掌均齊賞罰右司侍衞員外郎各二人主事一人掌俸餉芻菽堂主事二人掌章奏文移筆帖式二十五人分隸堂司掌繙譯侍衞二十一人掌侍直内八人兼試御馬司鞍長二人司鞍八人司轡二十人皇子每位司鞍二人司轡八人掌服駕凡圉牧設内廐於皇城外廐於南苑設牧羣於盛京及張家口外以畜馬蕃庶籍其數而頒之内廐御馬副馬川馬各一廐均無定數仗馬一廐七十匹公馬五廐廐各二百附橐駝十匹駕車馬二廐廐各馬五十驘五十匹外廐御馬内馬備充御馬之選及皇子乗騎凡六廐内挏馬備取湩一羣騰馬四牝馬三十有六餘無定數安河公馬一廐二百匹又應差廵羣馬二百十匹附各廐大凌河牝馬二十四羣扇馬十羣每羣附駝三匹張家口外上都達布遜諾爾牝馬百三十四羣扇馬二十四羣扇駝六羣達里岡崖牝馬六十羣走馬一羣牝駝十有六羣烏良海牝馬三羣各牧羣每羣馬自二百匹至五百匹駝自百匹至二百匹有差凡典牧設牧長五人副牧長五人牧副十人牧丁百名内外廐每廐設廐長一人廐副二人川馬廐以公馬廐長兼轄廐丁二十人草夫自十有四人至四十四人有差凡五百八十六人内百總六人外郎十有四人駕車馬二廐各設驍騎四十人大凌河牧羣設總管一人翼領二人効力筆帖式二人每羣牧長一人副牧長一人牧副一人署牧副一人在牧丁數内扇馬羣牧丁各二十人牝馬羣各十有五人上都達布遜諾爾牧羣總管一人兼轄達里岡崖牧羣副管一人翼領五人署翼領九人筆帖式七人効力筆帖式三人達里岡崖牧羣翼領二人署翼領三人効力筆帖式二人每羣皆牧長一人上都達布遜諾爾毎扇馬羣牧副二人餘羣皆一人牧丁每駝羣十人馬羣七人凡捍牧官兵上都達布遜諾爾牧羣設防禦三人驍騎校二人護軍校十有二人兼充牧長護軍三百四十五人内以二百八十五人兼充牧丁達里岡崖牧羣防禦一人驍騎校一人護軍校三人兼充牧長䕶軍百人内以四十人兼充牧丁司巡羣緝匪如馬駝有被竊者論如法凡考牧内外各廐院卿歲一按視各牧羣每三歲由總管申院奏遣堂屬官二人徃驗牝駝羣間六歲奏遣所屬官一人徃驗亦如之各具息耗實數以聞惟苑廐挏馬歲閲積三歲具奏不議賞罰其餘疲瘠斃損及孳生各計其數以賞罰廐牧長副有差内外廐疲瘠之數於百匹内計多寡一二匹議賞三四匹免議五六匹罰責游牧羣同六匹以上及游牧羣五匹以上皆議賠斃損之數内外廐合較分數少數平數多為三等以定賞罰上都達布遜諾爾達里岡崖牧羣賞罰與内外廐同大凌河牧羣及上都扇駝羣以百匹計自一匹至四匹五匹至八匹皆議賞十匹至十二匹免議十三匹至十六匹以上皆罰責上都達布遜諾爾達里岡崖每三歲牝馬三匹額生駒一大凌河每三歲牝馬五匹額生駒二扇馬合羣馴養之牝駝及達里岡崖駝羣每六歲牝駝五匹額生駝二各牧長牧副孳生馬浮額百六十匹以上八十匹以上一匹以上闕額百匹以上五十匹以上一匹以上孳生駝浮額闕額二十一匹以上十有一匹以上一匹以上均分為三等賞罰有差總管副管合計所轄各羣原數以多五百匹為一分闕二百匹為一分依分數以議賞罰上都翼領賞罰如之餘翼領合所轄馬駝作十二羣計之以各羣之賞罰多寡為賞罰賞罰均者免議凡出牧歲四月朔以内外廐公馬四百匹就草張家口外限九月望囘廐豫月奏遣侍衞二人率廐長廐副經理出入南苑六廐廵羣馬以九十匹挏馬全羣卽南苑就草出入期如之大凌河牧羣歲四月朔始迄九月底以扇馬牝馬全羣就草均典牧官掌其出入之事凡供直馬日以内廐御馬四齊其毛具鞍轡立院門外行幸駐蹕以御馬六立園門右如之直班侍衞司鞍司轡咸侍恭遇車駕巡幸日以十馬備上乘御由掌御馬大臣奏請於御馬内馬内簡其尤良者以從其需用駕車馬公馬及橐駝之數附疏以聞由院奏遣卿及侍衞各一人掌御馬侍衞一人沿塗監視支放馬駝芻菽若扈蹕之尚茶尚膳各執事官役及内監所乘之馬由所司行院如數以公馬撥給囘日繳院不足具數奏行兵部以八旗官馬撥給皇子出行撥給官役應乘公馬如之凡禂馬歲春秋二季禱馬於神繫絳帛於御馬鬛尾以為識凡三十匹大凌河扇馬羣繫青帛者三十匹牝馬羣繫絳帛者千三百匹青帛者百七十六匹仗馬廐附養四色馬四十匹香初堂子青馬花馬於天命黑馬黄馬䝉古神前繫記今祭堂子率以十匹詣神前受釐繫綠帛亦如之凡用馬歲四孟月敬神用青白馬二皇子婚禮薦幣以馬旣婚迺給乘馬公主釐降薦幣以馬駝生子彌月以馬充賞分封王貝勒貝子給馬駝公給馬直省將軍都統副都統督撫提鎭入覲各錫馬朝鮮國使臣來朝如之均由所司行院於公馬中選其良者給用凡貢馬䝉古歲貢馬駝由理藩院具奏送院欽命掌御馬大臣侍衞視選不入選者罷還之其選受者行廣儲司如例給賞駝發内廐馬發南苑六廐芻秣索倫貢馬選取給賞亦如之歸化城兩旗䝉古歲貢馬喀爾喀澤卜尊丹巴胡圖克圖歲貢馬駝陜西岷州各寺番僧歲貢馬均由理藩院咨送發各廐芻秣其發南苑貢馬掌御馬大臣率本院侍衞詣廐盤試辨御馬内馬公馬之屬疏其等以聞凡汰補馬駝御馬之不馴者汰入公馬廐疲瘠病斃應補者上乘御馬闕以内廐御馬補内廐御馬闕以外廐御馬補外廐御馬闕簡内馬之良者奏補仗馬及祭神受釐四色馬闕行取大凌河良馬充補川馬闕行崇文門税務駕車驘闕行戸部轉行左右翼税務各監督買補駕車馬闕以公馬補公馬及應差巡羣馬闕彚數行各牧羣總管盛京應差馬闕