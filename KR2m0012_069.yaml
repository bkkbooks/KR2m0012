  text: 欽定四庫全書欽定大清㑹典卷六十九
  hash: sha256:5bb22139c37adfd6a1c2ddad754d4d0de4a4be3b557be07da76a6acaa3b08acf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_069-1a, image: WYG0619/WYG0619-0592c.png}
body:
  text: 刑部聽斷凡鞫獄官聽訟依原告人本狀推問不得於狀外别求他事托拾人罪讞獄必研訊實情得確供孚合乃定爰書囚不能自書者吏録供辭讀之兩造允服乃麗於法不得删改供辭煆錬成招或證據無慿草率定案凡停囚待對囚有同犯在他所者聽勾取其在他所事發見問者以輕囚就重囚罪相等者少囚就多囚數相等者後發從先發若地隔三百里者移文關白各從事發處歸斷凡罪囚決配在京徒流罪從順天府軍罪從兵部在外軍流徒罪從府州縣內外問邊外為民者並從户部問發遣者並從兵部死罪在京法司定議在外督撫擬斷法司覆核定議奏聞得㫖處決者內委刑曹外委正官監視行刑印官因公出境令同城佐二官㑹武職監之如無同城佐二官則轉委府屬代監官仍具由申報凡引律斷罪遇律例數事同條得止引所犯本罪若一條止斷一事不得删截原文附㑹入罪罪無正條許比律加減定議於疏內陳明若本有正律正例不得傅㑹虛辭别引重條新定之例以頒行日為始有年限者以限年為始犯在定例之先者仍依舊律若新律從寬則依新例奉特㫖斷罪臨時處治者不為定律成案未通行者不得援引凡用刑具毋違式刑毋濫加督撫頒印簿於鞫獄官歲聽獄幾某案某人坐某事治某罪具識於印簿歲終繳督撫稽核監獄毋禁平人毋設私禁立循環簿識獄囚出入姓名月終送知府稽核凡限期刑部審案笞杖限十日軍流徒限二十日命盜及重案應題者限三十日應㑹題者限五十日各省具題欽部案均限二月人命發冢搶奪竊賊私鑄私銷私鹽燒鍋賭具姦誘限四月盜案限一年其總督所轄兩省之隔屬及邊海苗疆均得展限若督撫新任並署事者原限二月展一月四月展二月公事出境監臨科場題明扣展州縣新任接審前官涖任一月內外者按日扣展涖限過半者扣半加展前官於二參限內離任者扣限四月刑部於八旗內務府五城順天府移詢行提者三日送解直省於隔屬移詢行提者兩月送解其內外承審扣限有人犯患病者以病愈日始提質犯證者以人到日始移咨行察者以文到日始凡農忙停訟歲以四月始七月止户口婚姻田土細事不得受理命盜重案不在此限凡殺人謀故論意鬬毆論傷共毆論傷之輕重先後戲殺論戲之情誤殺論誤之由殺訖者皆抵死惟過失不期而殺者得收贖凡盜强取竊取皆為盜器物錢帛移徙已離本所者是若木石重器已䭾載者是若牛馬駝騾已出䦨廄者是若鷹犬專制在已者是若珠玊金寶已入手隱藏未將行者亦是未成盜而有顯跡證見者依已行未得財律科之已成盜者依得財律科之凡檢驗尸傷在京旗人委刑部司官民人委知縣指揮等官在外委州縣正官正官因公出境移鄰邑官代驗鄰邑遙逺或他出者委佐二官佐二官具結及傷格通報仍由正官承問各省駐防令管旗官㑹理事同知通判檢驗申報審理如無理事官即㑹州縣人命報到必䆒問果非自盡病亡而揑控方豫檢驗先鞫凶器傷痕據供立案隨帶仵作一人吏一人役二人親詣尸所如法檢報立尸格具圖詳開致命不致命各傷形色分寸通報再質原供證據符合然後定讞若親屬控稱傷痕互異具願檢甘結許復檢一次其輕生自盡親屬告免者準免檢凡傷而未死者驗傷官親往不得舁傷者就驗驗明立限責令犯人保辜以手足他物傷者限二十日刃及湯火傷者三十日折傷肢體及破骨墮胎者五十日限內因傷死者始論抵限外因本傷死及限內因他故死者各從本法凡勘被盜之家地方官㑹營汛親詣驗明出入情形並事主有無毆縛傷痕開具失單參報疏防獲盜即收禁毋許捕役私拷起贓必由捕官止令事主認贓一次聽審一次拖纍及抑勒諱盜者論凡贓欵曰枉法曰不枉法曰坐贓曰竊盜曰常人盜曰監守盜侵官之贓還官犯禁之物及與受同罪之贓入官公取竊取及求索之贓給主還官贓至十兩入官贓至二十兩給主贓至三十兩並限一年追徵逾限無力完者彚題請㫖豁免若犯人身死與不及前數而無力完者從所司勘免惟監守盜數多者徵足還官不得濫請豁免凡鞫獄官與被鞫人有親故仇嫌者申請回避毋得受理秋朝審凡秋審録直省獄囚朝審録刑部獄囚歲以四月督撫率其屬集囚之坐大辟者親訊而覆核之其審經三次無異情無可疑者免提訊分擬情實緩決可矜可疑具題不得逾五月刑部總其成分案刋册以七月初旬進呈御覽八月中旬㑹九卿詹事科道有䝉古人犯兼㑹理藩院於天安門外之金水橋西公閲直省審册所擬情實緩決可矜可疑有不當者正之刑部具疏以情實各犯招册官犯及卑幼犯尊長由立決改監候者親老議留養者皆别為一册審朝同恭呈御覽命下可矜可疑者減流緩決者仍監候其情實者內閣按地逺近以序先後首雲貴次四川兩廣福建次盛京陜甘次湖北湖南浙江江西次安徽江蘇次河南次山東山西次直𨽻命欽天監擇期以冬至六十日前奏請勾決及期刑科給事中覆奏一次皇帝素服御便殿大學士學士刑部尚書侍郎起居注官咸常服侍滿學士一人按册奏犯人名皇帝降㫖大學士一人秉筆勾畢進御覆閲閲實內閣授之刑科刑科授之該道御史齎送刑部行文各省勾者處決未勾者牢固監禁文到之期雲貴川廣福建限四十日江西浙江湖南甘肅二十五日江蘇安徽陜西湖北十八日河南十二日山東山西九日直𨽻四日盛京十五日黑龍江吉林三十日皆以州縣正官監視行刑朝審册以霜降前進集刑部大辟囚於天安門外金水橋西㑹九卿詹事科道按册鞫之分情實緩決可矜可疑具題候勾刑科三覆奏擇日於冬至齊戒前御便殿勾決悉如秋審河南道御史齎本至行刑處刑部侍郎一人率所屬㑹刑科給事中監視行刑秋審朝審歲舉行或勾決或停決皆候㫖遵行遇停勾之年有情罪極重之案如聚衆抗官毆差奪犯侵貪多贓者由部節叙情由請㫖正法欽恤凡老幼疾病犯罪不拷掠據證定罪軍流以下並免的決準收贖至死罪者年七十以上十五以下及廢疾如常法八十以上十歲以下及篤疾具議奏聞九十以上七歲以下雖犯死罪不加刑有教令主使者坐之犯反逆者不在此限未老疾犯罪老疾發覺者依老疾論幼小時犯罪長大發覺者依幼小論凡留養兄弟同犯死罪者奏留一人養親若獨子犯罪應死非常赦所不原有祖父母父母年七十以上及成篤廢疾合留養鞫獄官録具初情詳報繫戲誤殺人並鬭毆殺人理直傷輕之犯移詢被殺之家如親非老疾及有次丁者並準申請留養督撫開具罪名將應留情由附讞陳奏三法司核實請㫖準留養者免死減流不論旗民折枷責釋殺人之犯量力徵埋葬銀給死者之家其情罪稍重不準留養者督撫於秋審時察其父母尚存次丁未立取結報部彚為一册奏請欽定至軍流徒及免死減等之犯未起發以前告請留養者非常赦所不原皆準折枷責釋嫠婦獨子有犯軍流徒罪及戲誤殺人應死告留養者以守節二十年為斷犯鬭毆殺人以守節二十年見年五十餘者為斷不在七十為老之限凡承祀夫毆妻至死非故殺者果父母皆亡家無承祀之人督撫附讞陳奏三法司核實請㫖準承祀者免死減流不論旗民折枷責釋凡熱審歲於小滿後十日始立秋前一日止如六月立秋以七月朔日止由部先期奏聞頒行中外笞罪寬免摘釋杖枷減等保候徒罪以上在監之犯咸令寬減刑具清理獄舍惟盜犯遇熱審不準寬減凡獄囚日給倉米一升冬給棉衣一襲夜給鐙油病者給醫藥酌寬刑具凡疑獄監候待質過三年者殺人及强盜之案附入秋朝審詳鞫贓實證確者入情實册稍涉疑似者入緩決册餘犯保釋其逆案牽連之犯雖過三年仍監候凡寃獄詳鞫得情開具所枉事蹟實封奏聞委官追問昭雪罪坐誣告人原問官以故失入人罪論其罪囚在獄果有寃濫許獄官據實申明長官追問若詐稱寃者不得輒與辨理凡立決死囚遇正月六月停止行刑俟二月初及七月立秋後正法如五月小暑六月立秋者均作六月論若遇慶賀祭祀齊戒封印之期元宵端午中秋重陽令節每月初一初二日四月初八日及素服日期皆停刑並不得決罰拷訊其孕婦犯罪應死者俟産後百日行刑百日未滿應拷決者並停拷決凡起解軍流遣犯每年自十月至正月及六月皆停發已起發者十月照常接遞餘月悉於所過處停留或抵配不逺本犯願前進者聽其從配所逃回應發原配及改發者雖遇寒暑並不準停異地犯徒應遞回原籍轉發計程越千里者並準停解在塗亦如之若各犯中塗患病無論寒暑皆報官取結留養醫治隨行親屬同凡犯煙瘴充軍者擇其少輕之地發之水土惡劣之地不得安置凡軍流遣犯妻妾如强竊盜及情重律應緣坐者皆僉發若無妻及有妻而願留養親或其妻年踰六十有痼疾不能行者皆免僉餘犯不願僉者聽僉者開具犯妻姓氏年貌籍貫旗人發遣開明旗分佐領附讞聲明行知配所若各犯有子女願隨者免其差押到配之後别載册籍不得一例羈管不願隨者聽有子女隨行之遣犯而妻已物故者仍改發內地勿同有妻論凡軍流在配身故非干遇赦不還之條其僉隨妻子願還故土者所司報部給咨準令攜骸回籍若發遣當差之犯身故其妻子自隨遣所者並如前律情罪重者不準回籍凡流徒以下刺字之犯有安分悔過及在配所原籍充警能獲盜者準其報明官司起除所刺之字私起除者論如法凡犯罪未發而自首者免其罪猶徴正贓其一罪雖發因首他罪輕罪雖發因首重罪者各免其所首之罪遣人代首若於法得相容隱者為之首及相告言各如自首法自首不實不盡者仍科不實不盡之罪至死減一等知人欲告及逃叛而自首者減罪二等逃叛雖不自首能還歸本所者亦是强竊盜詐欺取人財物而於事主處首服及受枉法不枉法贓悔過還主並知人欲告而首還者與經官司自首同皆得減免若損傷於人於物不可賠償事發在逃私越度關犯姦及强竊盜首免後再犯强盜之殺人行姦放火毆事主傷重者雖自首並不準減免凡大赦特赦臨時取自上裁若常赦則十惡殺人放火發塜姦盜詐僞受枉法不枉法贓略賣和誘人姦黨讒言左使殺人故出入人罪及一應有心實犯並不原宥餘皆宥之錢糧婚姻田土之事罪雖赦免仍追徵改正若流犯在道㑹赦計程無違及雖至配所而程限未滿者與徒犯㑹赦不論已未到配並聽放還流犯已到配及緣坐應流者遇赦並不準還凡出征陳亡者之子孫犯罪應死量情奏免一次督捕凡旗下逃人不論良賤均分初犯二犯三犯治罪逃而十日內獲者不計次並如初逃法竊騎仗逃而獲者不在此限竊主財物逃贓重者依盜例家長同逃者坐家長若年六十以上十五以下逃者並免議婦女逃者計次定罪收贖定例前白契所買人逃者與奴同法莊頭家下壯丁公主等所屬家人逃者與家奴同宗室公以上家下莊頭戶部官莊頭光祿寺園頭開戶人及公主等所屬正户人逃者與正身同凡窩家以逃人所隱末家為斷旗人窩逃不知情者過三月罪之知情者不計日旗奴犯者同並罪其主民人窩逃不知情者過六月罪之知情者計日加等保甲鄰右各如之官犯者與民同婦人犯者坐夫男若逃人賃典房産及傭工本主不知情者坐保人無保者仍罪本主逃人於空地結舍居者坐地主無地主者坐鄉長無鄉長者坐地保其甲長以鄰右論凡逃人自首初犯限一年二犯限六月三犯限三月限內首者免罪限外首者減等其親屬或同逃之人首告者與自首同窩家能首告逃人及首逃人之家屬者免罪聞捕而首逃人之家屬者減等其親族相首告者亦與自首同其有知逃人消息者旗人許於刑部首告民人於所在官司首告不得私自拘拏如所首逃人帶家業者將家業三分為率二分給主一分給告人充賞凡逃人罪不至遣者並給主無主認領者給八旗兵丁為奴其在逃所娶妻及隨逃之妻生有子女並斷給主其女私聘未嫁者斷給主已嫁者免離異逃人獲後主家轉賣與人其外娶家屬事發者斷給後買之主逃人未獲而身故者家屬免提口外䝉古人逃入內地娶妻者其妻斷歸母家公主屬下人不在此限凡逃人雜犯他罪若借逃行詐告提妻子供稱窩家而不實及誣認他人妻子誣指良人為窩家者並於本罪外分别擬斷凡投遞逃牌在京限五日二百里內限十日四百里內限十五日赴該管官司投遞不得隱匿遺漏又無故謊遞該管官據牌移知緝逃衙門獲日在京逃者刑部斷決奉天所屬逃者盛京刑部斷決若外省逃而罪止鞭刺者督撫斷決仍關白刑部銷案有窩家及三犯者送部斷決各省駐防獲逃㑹同城地方官審理申報凡旗人告假外出該管官將所往某地某事並限期注册給與印票回日繳銷不得領票他往及無票私出凡民人賣身旗下即開除丁糧無丁糧者地方官曉諭存案其例後白契所買人犯逃應斷為民者即遞回原籍管束若旗人詐稱民人賣身民人犯罪潛逃賣身旗下旗人將家人賣充逃人抵數民人詐稱旗奴並冒抵逃人者罪如例欽定大清㑹典卷六十九
