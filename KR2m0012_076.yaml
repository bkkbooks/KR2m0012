front:
  text: 欽定四庫全書欽定大清會典卷七十六
  hash: sha256:b30787b54c4db5dc0347f0b6923f3a8a590f463935ae62bf3cc9e1529b7cc120
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_076-1a, image: WYG0619/WYG0619-0652c.png}
body:
  text: 工部屯田清吏司山陵永陵在興京啓運山距盛京二百四十里福陵在盛京天柱山距盛京二十里昭陵在盛京隆業山距盛京十里規制見京工部盛孝陵在遵化州昌瑞山距京師二百四十里孝陵居中東南昭西陵東孝東陵又東景陵泰陵在易州永寧山距京師二百八十里孝賢皇后陵寢在遵化州昌瑞山孝陵之西凡山陵規制甃石為地宫築以黃土環以寶城前起方城覆以崇樓上題陵名內碑一鐫廟號方城階下設祭臺上陳石香爐一燭臺花瓶各二祭臺前二石柱一門朱櫺又前琉璃花門三為陵寢門前為隆恩殿重檐五間殿中設暖閣寢室如太廟制東西廡各五間左右燎爐各一前為隆恩門五間三門繚以朱垣門外東西廂各五間守護官軍班房東西各三間前為神道碑備鐫尊諡廟號覆以亭皆繪五采飾金亭前石橋三橋左右下馬石牌各一宰牲亭神廚神庫井亭皆繪采橋南神路正中龍鳳門門外兩旁班房各三間文臣武士及麒麟獅象馬駝等石像左右序列前為望柱二又前石橋一橋前聖德神功碑覆以崇樓擎天柱前後各二神路前為大紅門門三繪采脊四下左右角門二門南石坊一東西石坊二左右下馬石牌一大紅門內左為具服殿三間繚以周垣門一殿三間均西嚮皆覆以黃琉璃為乘輿更衣之所凡神路兩旁封以樹十株為行各間二丈周垣之外植紅柱以為界限禁樵採耕種凡園寢規制妃皇太子均以石嬪貴人以甎為壙均砌月臺上築土為塜各以位次序列前為琉璃花門三前饗殿五間東西廡各五間燎爐一前為門三間均覆緑琉璃繪五采飾金繚以周垣大門外東西廂各五間官軍班房各三間朱飾門前石橋一凡陵寢工部設郎中員外郎專司歲時祭饗之事先期赴部請領庫帑核給供應事竣報銷凡陵工修葺總理貝勒大臣等歲以冬十月察明應修之所彚疏下部委官確勘計費以聞春融部遣官會修工竣核實題銷其有急需葺治者隨時專案疏請部遣官估修亦如之凡陵工歲需甎瓦灰石悉於去山遙逺無關龍脈之地酌定處所燒造採取以資修造之用凡陵寢廨舍營房昭西陵孝陵孝東陵景陵孝賢皇后陵寢及妃園寢守衛貝勒公官員執事人役共府第舍宇三千八百三十三間八旗官兵營房千三百五十九間馬蘭鎮官兵營房千三百有八間泰陵及妃園寢守衛貝子公官員執事人役共府第舍宇千二百七十八間八旗官兵營房三百七十三間泰寧鎮官兵營房二千有五十五間遇有應修兩鎮由直督餘由皇陵工部皆確估咨部工竣核銷墳塋凡墳塋饗堂親王五間世子以下至輔國公皆三間親王世子郡王門三貝勒以下門一親王繪五采飾以金覆以緑琉璃世子郡王止繪五采皆覆緑琉璃瓦貝勒以下施朱不繪用㼧瓦凡墓碑親王至輔國公皆交龍首龜趺惟郡王以上得建碑亭鎮國將軍螭首輔國將軍麒麟首奉國將軍天祿辟邪首皆龜趺奉恩將軍圓首方趺凡墳院親王周百丈世子郡王八十丈貝勒貝子七十丈鎮國輔國公六十丈鎮國輔國將軍三十五丈奉國奉恩將軍均三十丈凡守塜人親王十戶世子郡王八戶貝勒貝子六戶鎮國輔國公四戶鎮國輔國將軍二戶凡固倫公主墳塋規制視世子郡王和碩公主郡主視貝勒貝子縣主郡君縣君視鎮國公凡公侯伯墓碑視鎮國將軍墳院四十丈守塜人視輔國公一品官墓碑視鎮國將軍二品官視輔國將軍墳院守塜均視鎮國將軍三品官墓碑視奉國將軍四五品視奉恩將軍墳院同守塜皆一戶凡建墳立碑自宗室王公將軍五等世爵至一二品官皆給費由本家營造以爵秩為差三品官以下殁於王事者視加贈官品給與凡古昔帝王聖賢忠烈陵墓令直省督撫飭所在州縣官防護修葺歲終册報由部覆核以聞薪炭凡內廷歲需薪炭各設廠委官豫期給價以時儲備遞年盈縮由內務府經理部稽其出入歲終彚核奏銷凡車駕巡幸行營所需薪炭先期定數飭知地方有司動帑豫備事竣報部核銷凡壇廟需用薪炭太常寺隨時咨部取給凡陵寢歲需薪炭守土官以時供應彚數報銷凡在京衙署及文武會試外藩賓館需用薪炭均按經制定數憑文支給凡薪炭兩厰各設監督鑄給關防以董其事歲周更代凡開採煤窰如出邊關隘口者均酌指處所報部給票與內地官山各輸常課民業聽之其不遵禁約私擅開採者論如法匠役凡內廷工程需用匠役監工官選朴實有身家者為夫頭召募匠夫責令具結備案人給腰牌稽察出入不奉法者懲逐有竊匪隱藏工所夫頭不舉者論如法凡匠役之留部待用者遇有營造量豫工直閒日按月給米夫役廩食於各司及庫廠者月給銀米皆按季關支各有差若臨時召募工匠及暫雇夫役計日給直均有定價凡食糧匠役設有定數營繕司九十七名虞衡司五十九名都水司百有八名屯田司十有六名各司庫局隸役七十九名其支領銀米均會核應給之數造册移戶部關支虞衡司庫硝黃庫濯靈廠庫丁二十四名每三歲各給羊裘由製造庫辦給節慎庫凡收納帑項每歲奏支戶部庫帑十萬兩或二十萬兩貯庫潘桃古北殺虎等口木稅密雲縣出口炭稅山東河南江南建曠裁夫存銀均解部由各司於文到日核數移庫解官赴庫交收寶源局歲鑄錢按月按卯各工營造費餘按限均輸庫以備支發凡支發帑項各工所物價工直均由各司各庫核明應給之數具領移庫按數給發戶部移取寶源局錢配發兵餉按月支給歲以三十六萬緡為度凡奏銷帑項月要其數具奏歲終則會計一歲收發存留之數列册具疏以聞凡遇大興作庫存帑項不敷用度隨時疏請咨戶部移取備支工竣奏銷欽定大清會典卷七十六
