front:
  text: 欽定四庫全書欽定大清會典卷十八
  hash: sha256:ec3066ad1a4b83660596bdc10848bead37d7420da2b6e8a7981edf7137690a58
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_018-1a, image: WYG0619/WYG0619-0156a.png}
body:
  text: 戶部俸餉凡頒祿親王嵗支俸銀萬兩世子六千兩郡王五千兩長子三千兩貝勒二千五百兩貝子千三百兩鎮國公七百兩輔國公五百兩一等鎮國將軍至奉恩將軍凡十有三等祿自四百十兩每降一等減二十五兩宗室雲騎尉八十五兩授雲騎尉品級者八十兩固倫公主四百兩和碩公主三百兩郡主至鄉君凡五等祿自二百五十兩遞減三十兩固倫公主額駙二百八十兩和碩公主額駙二百五十五兩郡主額駙二百三十兩縣主額駙百八十兩郡君額駙百五十五兩縣君額駙百三十兩鄉君額駙百有五兩一等公七百兩二等公至雲騎尉凡二十五等祿自六百八十五兩遞減二十五兩恩騎尉四十五兩不入等次之公侯伯子男及授輕車都尉騎都尉雲騎尉品級者自二百五十五兩遞減至八十兩亦以二十五兩為差在京文職八旗武職一品官百八十兩二品百五十五兩三品百三十兩四品百有五兩五品八十兩六品六十兩七品四十五兩八品四十兩均正從同祿九品三十三兩從九品三十一兩各有竒未入流與從九品同筆帖式七品三十三兩八品二十八兩九品二十一兩文職於正俸外加增一倍曰恩俸又一品至九品月給銀五兩至一兩有差曰公費每銀一兩折制錢九百文祿米自王公至文武官辨均以俸定數每俸銀一兩支米一斛盛京五部及陵寢文武各官俸銀與京官正俸同王公公主額駙領俸以旗册呈宗人府滿世爵暨文武官由本旗漢文官由本部院册送吏兵二部核實咨部嵗以春二月秋八月給發外文職自一品至未入流頒祿與內文職正俸同中外緑旗武職正一品嵗支俸銀九十五兩從一品八十一兩正二品六十七兩從二品五十三兩各有竒薪銀均百四十四兩三品俸銀三十九兩薪銀百二十兩四品俸銀二十七兩薪銀七十二兩五品俸銀十有八兩薪銀四十八兩六品俸銀十有四兩薪銀三十三兩各有竒正從相同七品俸銀十有二兩有竒薪銀與六品同京營緑旗武職領俸由步軍統領册送兵部核實咨部給發外省文武各官册送布政使司給發外藩喀爾喀杜爾伯特等汗科爾沁親王嵗支俸銀二千五百兩俸幣四十各親王均銀二千兩幣二十有五世子銀千五百兩幣二十科爾沁扎薩克圖郡王同各郡王均銀千二百兩幣十有五長子銀八百兩幣十有三貝勒同貝子銀五百兩幣十鎮國公銀三百兩幣九輔國公銀二百兩幣七扎薩克台吉等銀百兩幣四下嫁外藩固倫公主銀千兩幣三十和碩公主銀二百兩幣十有二郡主銀百五十兩幣十縣主銀百兩幣八郡君銀五十兩幣六縣君銀四十兩幣五鄉君銀三十兩幣四固倫公主額駙銀三百兩和碩公主額駙銀二百兩均幣九郡主額駙銀百兩幣八縣主額駙銀五十兩幣五郡君額駙銀四十兩幣四縣君額駙銀三十兩幣三乾清門一等台吉銀百兩二等八十兩三等六十兩四等四十兩子男輕車都尉騎都尉雲騎尉視八旗世祿減半授逹爾漢號者銀二十兩幣四八品官俸祿同均由理藩院咨部嵗終給發凡兵餉京師八旗前鋒軍親軍護軍領催弓匠長月支餉銀四兩驍騎弓匠銅匠三兩均嵗支米四十八斛步軍領催二兩步軍一兩五錢鐵匠一兩至四兩均嵗支米二十四斛炮手二兩嵗支米三十六斛由覺羅充前鋒軍親軍護軍者加一兩教養兵一兩五錢馬駝芻牧月給銀三兩出牧之月停支均由本旗佐領具册申都統核實咨部按月給餉按季給米閏月如之緑旗巡捕三營馬兵月支銀二兩步兵一兩米均三斗馬月給豆草銀二兩五錢由本營將備具册申步軍統領核實咨部給發直省駐防八旗兵餉月支銀二兩米二斗五升馬月支豆九斗至七斗五升草四十束至三十束各有差炮手月餉二兩弓匠鐵匠一兩水手修船匠一兩至二兩有差均由該旗册送布政使司申督撫咨部豫年撥本省正賦給發惟盛京陵寢及上駟院馬駝牧羣內務府牛羊牧羣太僕寺左右兩翼牧場並熱河古北口圍場各官兵均由部給發直省標營兵餉馬戰兵月支銀二兩步戰兵一兩五錢守兵一兩均月支米三斗馬冬春月支豆九斗夏秋六斗草均三十束由標營册送布政使司申督撫咨部如前撥給凡優恤俸餉王公薨逝無子襲封者親王郡王福晉嵗給銀千五百兩貝勒貝子夫人五百祿米如之公將軍夫人給夫俸之半咸終其身有子未襲封者鎮國將軍以下給半俸一年宗室無官爵者十嵗以上月給銀二兩年至二十者三兩覺羅年至十八者二兩孤子不拘年限宗室給三兩覺羅給二兩均銀一兩支米一斛八旗世爵年幼未入朝班及年老休致未承襲者均給半俸殁後無子襲封者給母妻半俸以終其身內外文職一品官豫告歸里者請旨給以全俸武職一二品因老病乞休奉旨以原官致仕者所司上其軍功或給全俸或半俸請旨定奪三品以下武職乞休曾出師受傷及得有功牌者給以全俸但經出師者半之八旗兵丁年老告退無親族可倚者月給銀一兩曾出師得有功牌者銀一兩米一斛官兵已故其妻守節者視其夫應得俸餉之半佽助一年其夫曾出師得功牌者全給之陳亡者嵗給俸餉之半俟其子入伍支餉足抵嵗給之數而止欽定大清會典卷十八
