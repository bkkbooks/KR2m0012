body:
  text: 刑部尚書滿漢各一人左右侍郎滿漢各一人掌法律刑名以肅邦憲所屬十有八司直𨽻清吏司郎中滿漢各一人員外郎滿一人蒙古一人漢二人主事滿漢各一人掌直𨽻及八旗遊牧察哈爾左翼所屬正黃東半旗鑲黃正白鑲白正藍四旗刑名奉天清吏司郎中蒙古一人漢一人員外郎滿漢各一人主事滿漢各一人掌盛京黑龍江吉林將軍及奉天府所屬刑名兼宗人府理藩院文移關白之事江蘇清吏司郎中滿漢各一人員外郎滿二人漢一人主事滿漢各一人掌江蘇所屬刑名安徽清吏司郎中滿漢各一人員外郎滿漢各一人主事滿漢各一人掌安徽所屬刑名兼鑲紅旗文移關白之事江西清吏司郎中滿漢各一人員外郎滿漢各一人主事滿漢各一人掌江西所屬刑名兼正黃旗文移關白之事福建清吏司郎中滿漢各一人員外郎滿漢各一人主事滿漢各一人掌福建所屬刑名兼户部户科鑲藍旗文移關白之事浙江清吏司郎中滿漢各一人員外郎滿一人漢二人主事滿漢各一人掌浙江所屬刑名及都察院刑科文移關白之事兼司本部條奏彚題及各司爰書駮正者會其成比年一奏湖廣清吏司郎中滿一人漢二人員外郎滿二人漢一人主事滿漢各一人掌湖北湖南所屬刑名河南清吏司郎中滿漢各一人員外郎滿二人漢一人主事滿漢各一人掌河南所屬刑名兼禮部詹事府太常寺光祿寺國子監鴻臚寺禮科正紅旗文移關白之事凡夏令熱審則布告各司頒行天下欽恤如制山東清吏司郎中滿漢各一人員外郎滿二人漢一人主事滿漢各一人掌山東所屬刑名兼兵部太僕寺兵科文移關白之事凡步軍營捕獲盜窩歲登其數請敘山西清吏司郎中滿漢各一人員外郎滿漢各一人主事蒙古一人漢一人掌山西及八旗遊牧察哈爾右翼正黃西半旗正紅鑲紅鑲藍三旗建威將軍右衛都統所屬刑名兼內閣翰林院起居注館中書科內務府奉宸苑武備院上駟院欽天監鑲白旗文移關白之事陜西清吏司郎中滿一人漢二人員外郎滿二人漢一人主事滿漢各一人掌陜西甘肅所屬刑名兼大理寺文移關白之事並稽核囚糧出納俾無侵冒四川清吏司郎中滿漢各一人員外郎滿漢各一人主事滿漢各一人掌四川所屬刑名兼工部工科文移關白之事秋審則序次直省之爰書而稽核之總辦秋審滿漢司官各四人於通部司官內簡委廣東清吏司郎中滿漢各一人員外郎滿二人漢一人主事滿漢各一人掌廣東所屬刑名兼鑾儀衛正白旗文移關白之事廣西清吏司郎中滿漢各一人員外郎滿漢各一人主事滿漢各一人掌廣西所屬刑名兼通政使司文移關白之事及以時散給囚衣朝審則序其爰書而稽核之雲南清吏司郎中滿漢各一人員外郎滿漢各一人主事滿漢各一人掌雲南所屬刑名兼太醫院鑲黃旗文移關白之事貴州清吏司郎中滿漢各一人員外郎滿漢各一人主事滿漢各一人掌貴州所屬刑名兼吏部吏科正藍旗文移關白之事督捕清吏司郎中滿漢各一人員外郎滿一人主事滿漢各一人掌中外旗人逃亡之事堂主事掌文案者滿二人掌章奏者滿三人漢軍一人司務滿漢各一人掌巡察出入約束胥𨽻凡直省解囚投文登其數給以批回訟者收其狀呈堂分司聽之筆帖式百二十有四人滿百有五人蒙古四人漢軍十有五人分𨽻各司視事之繁簡以為額提牢主事於額外及試俸主事內簡選滿漢各一人掌之歲周更代掌稽核罪囚出入所屬司獄滿四人漢軍二人漢二人分掌南北監禁官醫二人以療囚之疾病禁卒更夫晝夜巡警凌虐需索者問如法贓罰庫司庫一人庫使二人皆滿員掌收見審贓贖銀律例館以滿漢司官提調纂修五年一編輯刑制凡五刑一曰笞刑自一十至五十分五等用小竹板折責一十折四板二十折五板三十折十板四十折十五板五十折二十板旗人及旗奴犯笞者以鞭代之不折責杖罪同二曰杖刑自六十至一百分五等用大竹板折責六十折二十板七十折二十五板八十折三十板九十折三十五板一百折四十板凡行杖之數不得過此罪重於杖者枷示自一月至三月悉從本法皆先枷後責三曰徒刑發本省驛遞自一年至三年分五等各依年限應役役滿回籍徒一年者杖六十一年半杖七十二年杖八十二年半杖九十三年杖一百若犯遷徙者準徒二年雜犯三流準徒四年雜犯斬絞準徒五年並杖一百五徒及準徒皆於充徒之所折責旗人旗僕犯徒者並折枷示徒一年者折枷二十日一年半折二十五日二年折三十日準徒二年同二年半折三十五日三年折四十日準徒四年者折五十日五年折六十日各按杖數鞭責凡此皆徒之屬四曰流刑安置逺方終身不返分二千里二千五百里三千里為三等三流並杖一百至配所折責惟緣坐者不杖旗人犯流二千里者折枷五十日二千五百里折五十五日三千里折六十日並鞭一百旗僕犯流發駐防兵丁為奴罪重於流者為充軍軍有五均發衛所改設州縣者則發州縣各量地逺近發之附近發二千里邉衛發二千五百里邉逺發三千里極邊及煙瘴皆發四千里如無煙瘴地方即以極邉為煙瘴五軍並杖一百至戍所折責旗人犯附近軍折枷七十日邊衛七十五日邊逺八十日極邊及煙瘴九十日並鞭一百旗僕犯軍發邊省給駐防兵丁為奴若發邊外為民者杖與軍等旗人折枷如邊衛軍旗僕亦發駐防為奴重於軍者為發遣免死強盜發黑龍江等處給兵丁為奴其以他罪犯遣者旗人正身當差旗僕為奴民犯視其情稍可原或無妻室改發雲貴川廣煙瘴地安置凡此皆流之屬五曰死刑曰絞曰斬皆下三法司核擬罪當者監候秋後處決其罪應立決者三法司奏上得旨乃行刑若罪大惡極者梟首示衆凌遲處死皆決不待時凡贖刑輕者為收贖若年七十以上十五以下及廢疾犯軍流以下罪者若婦人犯非姦盜不孝及習業已成之天文生有犯罪止杖笞者若過失殺傷人自笞罪至絞罪者並準收贖次輕者為贖罪若官員正妻若婦人有力及例難的決者杖罪餘罪並準贖免重者為納贖分有力稍有力二等若軍民有力若舉人監生生員冠帶官犯非姦盜詐偽者若官員革職有餘罪及革後别犯流以下罪者並聽納贖受贓者不準凡刺字犯逃盜者刺謀故及拒捕殺人者刺死囚決不待時者刺旗人刺臂奴僕刺靣民徒罪以上刺靣杖罪以下刺臂再犯者亦刺靣刺靣在鬢之下頰之上刺臂在腕之上肘之下逃犯刺左餘犯刺右初犯刺左者再犯纍犯刺右初犯刺右者再犯纍犯刺左罪名刺左者地名刺右罪名刺右者地名刺左地名謂遣犯應刺所遣地方者字方一寸五分畫濶一分有半並不得過限立決者獄成即刺監候者奉旨始刺餘犯悉於起解責釋之前刺之若官員犯侵盜旗人正身脫逃及準盜論罪與婦人有犯者不論輕重皆免刺字凡刑具板以竹箆為之小竹板重一斤八兩濶一寸五分大竹板重二斤濶二寸梢各減五分長各五尺五寸枷以乾木為之長三尺濶二尺九寸重二十五斤絏頸以鉗以鐵為之承以貫索俗名鍊共長七尺重五斤輕重囚皆用械手以杻以乾木為之俗名手靠有以鐵代者式與鐐同長一尺六寸厚一寸死罪及重囚用之絏足以釱鐵為之俗名鐐連環重一斤徒罪以上用之夾棍用木三根中梃木長三尺四寸旁木各長三尺上圓徑一寸八分下方濶二寸自下而上至六寸於三木四靣相合處各鑿圓窩徑一寸六分深七分重案不輸實情始用之不得過二次拶指用圓木五根各長七寸徑圍各四分五釐婦人犯重案不得實用之凡監禁死囚禁內監軍流以下禁外監其強盜十惡謀故殺及奉特旨拏問之犯手足頸各絏三道竊盜鬬毆人命及軍流徒犯之情重者手足頸各絏一道情輕各犯及罪止杖笞與婦人犯輕重罪者止絏頸一道老幼廢疾者散禁婦人犯罪應禁者皆别置一室官員犯罪公罪自流以下私罪自杖以下皆散禁並責令禁卒看守律綱凡明刑敕法其文有二曰律曰例律以定罪例以輔律凡三十篇曰名例曰職制曰公式曰户役曰田宅曰婚姻曰倉庫曰課程曰錢債曰市廛曰祭祀曰儀制曰宫衛曰軍政曰關津曰廄牧曰郵驛曰賊盜曰人命曰鬬毆曰罵詈曰訴訟曰受贓曰詐偽曰犯姦曰雜犯曰捕亡曰斷獄曰營造曰河防其目三百四十有六例各隨之以平庶獄以警官邪以靖凶頑以昭風勸乃列十惡之條定八議之典别公私之罪量輕重之情分首從之法立加減之科頒行天下永為遵守凡十惡一曰謀反謂謀危社稷二曰謀大逆謂謀毁宗廟山陵宫殿三曰謀叛謂謀背本國潛從他國四曰惡逆謂毆及謀殺祖父母父母夫之祖父母父母殺伯叔父母姑兄姊外祖父母及夫者五曰不道謂殺一家非死罪三人及支解人若採生折割造畜蠱毒魘魅六曰大不敬謂盜大祀及偽造御神御物寶合和乘輿服御物盜御藥誤不依本方及封題錯誤若造誤不御膳誤犯食禁御幸舟堅固七曰不孝謂告言咒罵祖父母父母夫之祖父母父母及祖父母父母在别籍異財若奉養有闕居父母喪身自嫁娶若作樂釋服從吉聞祖父母父母喪匿不舉哀詐稱祖父母父母死八曰不睦謂謀殺及賣緦麻以上親毆告夫及大功以上尊長小功尊屬九曰不義謂部民殺本府州縣正官軍士殺本管官吏卒殺本部五品以上長官若殺見受業師及聞夫喪不舉哀若作樂釋服從吉及改嫁十曰內亂謂姦小功以上親父祖妾及與和者此十者常赦之所不原凡八議一曰議親二曰議故三曰議功四曰議賢五曰議能六曰議勤七曰議貴八曰議賔八議條目詳刑律此八者犯罪所司陳奏請旨毋擅勾問若奉旨推鞫者開具所犯罪名奏請上裁應議者之祖父母父母妻及子孫犯罪亦如之犯十惡者皆不用此律其親屬奴僕倚勢虐民者加常人罪一等凡文武官犯公罪應笞一十者罰俸一月二十三十各遞加一月四十五十各遞加三月應杖者六十罰俸一年七十降一級八十降二級九十降三級皆留任一百降四級調用犯私罪應笞一十者罰俸兩月二十罰俸三月三十四十五十各遞加三月應杖者六十降一級七十降二級八十降三級九十降四級皆調用一百革職無官犯罪有官事發公罪笞杖納贖私罪論如律卑官犯罪遷官事發在任犯罪去任事發皆依律分公私罪科斷其以理去官者與見任同封贈官與正官同婦人義絶於夫不改適者得與其子之官品同犯罪者並依職官犯罪律擬斷失陷城池獲罪軍旅及犯貪墨者追奪誥敕無官犯贓有官發覺以無祿人科有官犯贓無官發覺以有祿人科致仕及封贈官犯贓與無祿人同同僚官犯公罪以吏典為首首領官減吏典二等佐二官又減二等長官又減一等若同僚官斷罪一人有私者自依故出入論餘不知情者止以失出入論下司申上司失誤準行者各遞減下司官吏二等上司行下司失誤奉行者各遞減上司官吏三等公事失錯自覺舉免罪同僚有一人覺舉者餘人並免罪斷罪已論決者不用此律凡數罪並發及一罪先發未論決餘罪後發者並從其重者論罪同者從一科斷一罪先發已論決餘罪後發罪同者勿論重者通計已決之數以充後數若應入官賠償刺字罷職罪止者各盡本法本條雖有罪名而有所規避罪重者從其重論犯時不知者本應罪重依凡人論本應罪輕聽從本法其因人連纍致罪而正犯自死者減本罪二等若正犯原免及減等收贖亦準原免減等收贖法凡人共犯罪者以先造意一人為首餘人為從減為首罪一等一家人共犯罪者止坐尊長尊長老疾坐尊長之次者侵盜損傷於人以凡人首從論共犯罪而首從本罪異者各以本律首從論其律本文言皆者罪無首從不言皆者依首從法犯罪事發在逃有見獲者稱逃者為首更無明證即決其從罪逃者後獲轉稱前獲人為首質問得實還依首論通計已決之數以充後數如逃者所犯衆證明確獲日即同獄成不必更質以應得之罪罪之凡加罪就本罪遞加而重減罪自本罪遞減而輕加者數滿乃坐罪止杖一百流三千里不得加至於死減者死罪減一等為流流罪減一等為徒二死三流皆同一減準徒減以一年為差正徒減以半年為差流罪加徒者一減為準徒四年再減為正徒三年杖以下遞減以十其罪之應減者若為從若自首若故失若公罪若因人干連正犯自死者並得纍減減盡者無科凡同居親屬及不同居大功以上親外祖父母外孫妻之父母子壻孫之婦夫之兄弟兄弟之妻有罪相為容隱奴僕雇工人為家長隱者皆勿論若漏泄其事通報消息致罪人匿逃者亦不坐小功以下減凡人三等無服之親減一等謀叛以上者不用此律凡化外人犯罪者依律擬斷𨽻理藩院者依蒙古例苗夷犯軍流徒者折枷情重者同家口遷徙六百里外安置罪應論死者如常法其自相訟者以苗例科之凡讀律內外諸司百執事不得妄生意見變更成法歲終各從上司考校有不能講解律義者論律之書法有八非正犯而與正犯同罪者曰以如監守貿易官物無異實盜故以枉法論以盜論並除名刺字罪至斬絞並全科取此以例彼曰準如準枉法準竊盜論但準其罪不在除名刺字之例罪止杖一百流三千里不分首從曰皆如監臨主守職役同情盜所監守官物並贓滿數皆斬之類情有别而法無異者曰各如諸色匠人撥赴內府工作若不親自應役雇人冒名私自代替及替之人各杖一百之類更端而竟所未盡者曰其如論八議罪犯先行奏請其犯十惡不用此律之類因類而推曰及如彼此皆罪之贓及應禁之物則沒官之類無庸再計者曰即如犯罪事發在逃者衆證明白即同獄成之類設言以廣其義曰若如犯罪時未老疾事發時老疾以老疾論若在徒年限內老疾者亦如之之類律中稱期親祖父母者曽高同稱孫者曽元同適孫承祖與父母同緣坐者各從祖孫本法適母繼母慈母養母與親母同改嫁義絶及毆殺子孫者異是稱子者男女同稱道士女冠者僧尼同若於其受業師與伯叔父母同其於弟子與兄弟之子同犯謀故殺者異是稱監臨以分位言凡統攝所屬專制由己者並是稱主守以責任言凡官吏庫級躬親典守者並是稱一日者以百刻惟計工者自朝至暮不以百刻為限稱年者以三百六十日稱人年者以籍册為定稱衆者三人以上稱謀者二人以上有謀諸心者一人同二人之法稱與同罪者至死減一等稱罪同者不減欽定大清會典卷六十八
