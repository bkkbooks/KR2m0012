  text: 欽定四庫全書欽定大清會典卷三十七
  hash: sha256:ca38960a4151b8292bf4cc2e967cebcb3478b782d62bef1ae99558d97722bfaf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_037-1a, image: WYG0619/WYG0619-0291a.png}
body:
  text: 禮部祠祭清吏司大祀一凡郊天之禮兆陽位於南郊圓以象天曰圜丘其制三成嵗以冬日至祀皇天上帝奉太祖髙皇帝太宗文皇帝世祖章皇帝聖祖仁皇帝世宗憲皇帝配以大明夜明星辰雲雨風雷從祀上帝位第一成南嚮列聖東西嚮四從位第二成大明西嚮星辰在其次夜明東嚮雲雨風雷在其次均設青幄上帝蒼璧一帛十有二犢一登一簠二簋二籩豆各十有二尊一爵三爐一鐙六燔牛一列聖均帛一犢一登一簠簋各二籩豆各十有二尊一爵三爐一鐙四大明夜明均帛一牛一登一簠簋各二籩豆各十尊一爵三盞二十爐一鐙二星辰帛十有一雲雨風雷帛四均牛一羊一豕一登一鉶二簠簋各二籩豆各十尊一爵三盞三十爐一鐙二玉帛實於篚牲載於俎尊實酒疏布冪勺具先祀一日樂部設中和韶樂於壇下分左右懸鑾儀衛陳大駕鹵簿於午門外玉輦於太和門階下已刻太常卿詣乾清門奏請皇帝詣齋宫皇帝御龍袍衮服乘禮輿出宫前引內大臣十人後扈內大臣二人豹尾班執槍佩刀侍衛二十人佩弓矢侍衛二十人翊衛如儀至太和門階下降輿乘輦駕發警蹕午門鳴鐘大駕鹵簿前導不陪祀王公文武各官咸朝服跪送導迎鼓吹設而不作鑾儀衛校鳴齋宫鐘皇帝入壇西門至昭亨門外降輦贊引太常卿二人恭導皇帝由左門入詣皇穹宇於上帝列聖前上香畢行三跪九拜禮兩廡從位遣分獻官上香行禮皇帝詣圜丘視壇位詣神庫視籩豆並視牲牢畢由內壝南左門出外壝南左門至神路右升輦詣齋宫陪祀王公百官咸采服分班集齋宫門外恭候皇帝入乃退祀日日出前七刻太常卿詣齋宫告時皇帝御祭服乘禮輿出降輿乘輦鑾儀衛校鳴齋宫鐘皇帝至外壝南門外神路右降輦贊引太常卿二人恭導入大次禮部尚書率太常官詣皇穹宇恭請神位安奉青幄畢太常卿奏請行禮皇帝出大次盥洗贊引太常卿恭導皇帝由外壝南左門入內壝南左門升午階至二成黃幄次拜位前立大常贊禮郎引分獻官四人由南右門入至階前夾甬道立鴻臚官引陪祀諸王貝勒位第三成階上貝子公位階下百官位外壝門外左右序立均北面典儀官贊樂舞生登歌執事官各共乃職以下自燔柴至徹饌望燎皆典儀官唱贊武舞八佾進贊引官奏就位皇帝就拜位立乃燔柴迎帝神司香官各奉香盤進司樂官贊舉迎帝神樂奏始平之章凡舉樂皆司樂官唱贊後同贊引官奏升壇恭導皇帝詣第一成上帝位前司香官跪進香贊引官奏跪皇帝跪奏上香皇帝上柱香次三上瓣香興以次詣列聖配位前上香儀同贊引官奏復位皇帝復位贊引官奏跪拜興凡升壇復位行禮均有奏後同皇帝行三跪九拜禮王公百官均隨行禮司玉帛官各奉篚進奏景平之章皇帝升壇詣上帝位前司玉帛官跪進篚皇帝跪受篚奠玉帛興以次詣列聖配位前奠帛儀同皇帝復位乃進俎皇帝轉立拜位旁西嚮有司貯羮於壺恭執自壇下陟午階升詣上帝位列聖位前各跪拱舉興以羮沃俎者三皆退由西階降皇帝復位奏咸平之章皇帝升壇詣上帝位配位前跪進俎興復位行初獻禮司爵官各奉爵進奏夀平之章舞干戚之舞皇帝升壇詣上帝位前司爵官跪進爵皇帝跪獻爵奠正中興退就讀祝拜位立司祝至祝案前跪三叩奉祝版跪案左樂暫止皇帝跪羣臣皆跪司祝讀祝畢奉祝版詣上帝位前跪安於案三叩退樂作皇帝率羣臣行三拜禮興詣配位前以次獻爵儀同贊禮郎引分獻官由東西階升壇各詣從位前上香奠帛以次獻爵畢降階退立原位樂止武功之舞退文舞八佾進行亞獻禮奏嘉平之章舞羽籥之舞皇帝升壇以次獻爵奠於左儀如初獻復位行終獻禮奏永平之章舞與亞獻同皇帝升壇以次獻爵奠於右儀如亞獻復位分獻官獻爵均如初樂止文德之舞退太常官贊賜福胙光祿卿二人就東案奉福胙進至上帝位前拱舉皇帝詣飲福受胙拜位立侍衛二人進立於左奉福胙官降立於右皇帝跪左右執事官咸跪右官進福酒皇帝受爵拱舉授左官進胙受胙亦如之三拜興復位率羣臣行三跪九拜禮徹饌奏熙平之章有司詣上帝位前奉蒼璧退送帝神奏清平之章皇帝率羣臣行三跪九拜禮有司奉祝次帛次饌次香恭送燎所皇帝轉立拜位旁西嚮候祝帛過復位從位香帛均由東西階奉送至各燎爐奏太平之章祝帛燎半奏望燎恭導皇帝由內壝南左門出至望燎位望燎引分獻官各詣左右門外望燎奏禮成恭導皇帝由外壝南左門出入大次更衣禮部尚書率太常官恭請神位還御皇穹宇皇帝至昭亨門外升禮輿大駕鹵簿前導導迎樂作奏祐平之章皇帝回鑾王公從各官以次退不陪祀王公百官仍朝服於午門外跪迎午門鳴鐘王公隨駕入至內金水橋恭候皇帝還宫各退因事祗告遣官將事五鼓太常寺設青幄於圜丘雞初鳴遣官恭俟於昭亨門外太常卿率所屬恭奉皇天上帝神位安奉幄內陳帛一尊一爵三爐一鐙二薦鹿脯鹿醢醢果五品不設牲俎不奏樂贊引太常贊禮郎二人引遣官入昭亨門右門由外壝南右門入內壝南右門詣圜丘升自西階至第三成午階上拜位前北面立典儀官贊執事官各共乃職以下自迎神至望燎皆典儀官唱贊贊引官引遣官就拜位立乃迎神司香官奉香盤進贊引官贊升壇引遣官由西階升至第一成香案前司香官跪奉香贊引官贊跪遣官跪贊上香遣官上柱香次三上瓣香興贊復位引遣官自西階降復位贊跪叩興以下升壇復位行禮皆有贊遣官行三跪九叩禮乃奠帛行初獻禮司帛官奉篚司爵官奉爵以次進遣官升壇詣上帝位前司帛官跪奉篚遣官跪受篚奠於案司爵官跪奉爵遣官跪受爵恭獻奠正中興司祝詣祝案前跪三叩奉祝版跪案左贊引官引遣官由第一成午階右降至第二成讀祝拜位北面跪司祝讀祝畢詣神位前跪安於案叩如初退遣官行三叩禮仍降西階復位次亞獻奠爵於左次終獻奠爵於右儀並同乃送神遣官行三跪九叩禮有司奉祝次帛次香恭送燎所遣官轉立拜位西旁東面候過復位引詣內壝南右門外望燎位望燎告禮成引由外壝南右門出太常卿率所屬恭請神位還御皆退凡祈榖之禮於南郊圜丘之北為壇三成上覆以殿曰祈年嵗以月正上辛祀上帝為民祈榖皇天上帝位第一成殿中南嚮奉太祖髙皇帝太宗文皇帝世祖章皇帝聖祖仁皇帝世宗憲皇帝配饗東西嚮先祀一日皇帝詣南郊齋宿至祈榖壇外壝南門右降輦贊引太常卿二人恭導皇帝入祈年門左門詣皇乾殿上香行禮詣祈年殿恭視壇位畢由東門出詣神庫視籩豆並視牲牢畢乃詣齋宫祀日設皇帝拜位於第一成殿門內設讀祝受福胙位於拜位之前皇帝由祈年門左門入升左階進殿左門至拜位行禮陪祀王公位殿外第一成階上文武百官位第三成階下禮部尚書率太常官詣皇乾殿恭請神位安奉祈年殿上帝前用帛一樂章燔柴迎帝神奏祈平奠玉帛奏綏平進爼奏萬平初獻奏寶平亞獻奏穰平終獻奏瑞平徹饌奏渥平送帝神奏滋平望燎奏榖平禮成禮部尚書率太常官恭請神位還御皇乾殿餘儀均與圜丘同凡常雩之禮嵗以已月龍見卜日祀皇天上帝於圜丘為百榖祈膏雨先祀一日皇帝齋宿於南郊詣皇穹宇上香詣圜丘視壇位神庫視籩豆並視牲牢祀日設皇天上帝位配位從位均與冬日至大祀同上帝前用帛一與祈榖同樂章燔柴迎帝神奏靄平奠玉帛奏雲平進爼奏需平初獻奏霖平亞獻奏露平終獻奏霑平徹饌奏靈平送帝神奏霮平望燎奏霈平餘儀均與冬日至大祀同凡大雩之禮嵗孟夏常雩之後如不雨遣官祗告天神地祇太嵗越七日不雨告社稷仍不雨復告神祇太歲三復不雨乃大雩先祀一日以舉行大雩遣官祗告太廟是日巳刻皇帝御常服詣齋宫不作樂不除道不設鹵簿祀日雨冠素服躬禱於圜丘設皇天上帝位四從位陪祀王公以下咸雨冠素服三獻禮終樂闋列舞童十有六人為皇舞衣元衣執羽翳歌御製雲漢詩八章以祈優渥餘儀及樂章均與常雩同雨則報祀遣官朝服行禮如常儀已齋末祈而雨報祀亦如之謹按列聖家法念切民天偶遇亢暘輒先期竭誠祈請順治康熙年間皆嘗步禱迄致屢豐之慶郊壇皇帝稽古定制雩大雩典禮以昭至敬乾隆九年定特命禮臣議常議後每遇雨澤稍愆有禱輒應二十四年自春徂夏望雨甚殷聖心宵旰靡寧行大雩禮先期虔齋由皇帝親製祭文圜丘齋宫步禱四布大祀夕霡霂方施自是連旦滂沱始齋油雲常雩之田疇沾足會典殷禮攸關敬謹備載次以垂永久欽定大清會典卷三十七
