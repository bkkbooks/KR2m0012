body:
  text: 吏部驗封清吏司世爵國初開創功臣䇿勲錫爵爰及苖裔與河山共永矣定鼎以來凡忠誠宣力𢡟建軍功膺受封爵者或世襲罔替或承襲數世咸差等功次載在旂常若夫外戚之封以推恩澤衍聖公延恩侯以奉烝嘗酬庸展恩崇徳象賢典並隆焉凡世爵之等有九曰公曰侯曰伯曰子曰男曰輕車都尉曰騎都尉曰雲騎尉曰恩騎尉自公至輕車都尉又各有三等凡授爵自雲騎尉始如雲騎尉加一雲騎尉則合為騎都尉再加為騎都尉兼一雲騎尉再加為三等輕車都尉遞加至一等輕車都尉如再加一雲騎尉則為一等輕車都尉兼一雲騎尉再加則為三等男積雲騎尉二十有六為一等公凡公侯伯皆按其勲閥褒錫嘉名以垂永世凡軍功議叙由兵部覈定等第移部疏請授爵以戰功議叙者統兵參贊都統䕶軍統領前鋒統領副都統得一等功牌二再得二三四五等功牌各一授雲騎尉營總叅領散秩官前鋒侍衞得一等功牌三再得二三四五等功牌各一授雲騎尉委署同一二三四五等皆全者方授爵或不全有可抵算者準以上等功牌一作下等功牌二下等者不得積算上等若前後兩任所得亦準合算前鋒校䕶軍校驍騎校得一等功牌四再得二三四五等功牌各一授雲騎尉署前鋒校䕶軍校驍騎校得一等功牌五再得二三四五等功牌各一授雲騎尉多一倍至數倍者由雲騎尉逓加不足者注册以攻城議叙者視城之大小攻之難易分六等一等城池叙六人第一登城者授一等輕車都尉第二至第六以次遞減第二授二等輕車都尉第三授三等輕車都尉第四授騎都尉兼一雲騎尉第五授騎都尉第六授雲騎尉餘仿此都統及領雲梯攻戰官弁授騎都尉指路官弁授雲騎尉二等城池叙四人第一登城者授三等輕車都尉第二至第四以次遞減領雲梯攻戰及指路官與一等城池同三等城池叙三人第一登城者授騎都尉兼一雲騎尉第二第三以次遞減領雲梯攻戰官弁授雲騎尉指路官弁克兩城者授雲騎尉克一城者注冊四等城池叙二人第一登城者授騎都尉第二授雲騎尉領雲梯等官弁與三等城池同五等城池第一無雲梯登城者授雲騎尉率領攻戰官弁克兩城者授雲騎尉克一城者注冊凡已攻毁城池第一先登者授雲騎尉領戰官弁授騎都尉登城死者不論城池大小均授騎都尉以水戰議叙者奪一等舟叙五人先登者授騎都尉第二授雲騎尉第三四五注冊奪二等舟叙四人先登者授雲騎尉第二三四注冊奪三等舟叙三人均注册在舟督戰官弁各照所奪之舟與第二人同其餘官弁與第三人同以陣亡贈爵者統兵參贊都統授騎都尉兼一雲騎尉前鋒䕶軍統領副都統授騎都尉委署同營總叅領前鋒校䕶軍校驍騎校及有頂帶官授雲騎尉其先授世爵後陣亡者按其等次加以應贈之秩合為一爵令其子孫承襲至一等公以上爵無可加令以適子襲一等公以别子襲其餘爵凡八旗世爵承襲順治七年九年恩詔以前封爵均世襲罔替或論功授爵在詔後立功在詔前者亦世襲罔替其詔後軍功封爵除奉特㫖世襲罔替外其餘自雲騎尉襲一次遞加至一等公襲二十六次功臣封爵表一等公襲二十六次二等公襲二十五次三等公襲二十四次一等侯兼一雲騎尉襲二十三次一等侯襲二十二次二等侯襲二十一次三等侯襲二十次一等伯兼一雲騎尉襲十九次一等伯襲十八次二等伯襲十七次三等伯襲十六次一等子兼一雲騎尉襲十五次一等子襲十四次二等子襲十三次三等子襲十二次一等男兼一雲騎尉襲十一次一等男襲十次二等男襲九次三等男襲八次一等輕車都尉兼一雲騎尉襲七次一等輕車都尉襲六次二等輕車都尉襲五次三等輕車都尉襲四次騎都尉兼一雲騎尉襲三次騎都尉襲二次雲騎尉襲一次凡詔前已得世襲之爵詔後又以軍功得封合為一爵者至一等男以上世襲罔替自二等男以下除原世襲之爵仍世襲罔替其詔後所得之爵令按次承襲内有因陣亡給與者襲次已完仍授恩騎尉令其世襲若二人軍功所封之爵合於一人承襲者仍分計其應襲次數襲畢者次第覈銷順治七年九年三次恩詔所加雲騎尉承襲時覈銷世爵承襲均由各旗以誥勅送部覈定咨覆該旗奏請承襲得旨後仍以誥勅送部由部掲送内閣書承襲之姓名年月用寳給發凡外戚推恩皇太后皇后之父特封一等公殁者追贈其子孫世襲罔替由該旗具奏承襲咨部如不繫封之適后及時請推恩所公承襲誕聖㫖其已襲之子孫有罪至革爵者不準承襲先師後裔以本支適長子襲封衍聖公由廵撫疏請部覆承襲明後裔延恩侯世爵由該旗具奏承襲咨部凡世爵之姓氏及承襲之子孫均彚書於皇冊歳終合計一歳承襲之爵由部奏聞移内務府将皇冊送至保和殿㑹同内閣增注襲以錦囊貯以金匱藏之内府封贈凡職官恭遇覃恩得膺封典均如其品秩給以誥勅並推恩於其先五品以上授誥命六品以下授勅命一品封贈及三代存者曰封殁者曰贈二品三品及二代四品至七品一代八九品止封本身不封父母凡封贈之階十有七正一品從一品均封光禄大夫正二品資政大夫從二品通奉大夫正三品通議大夫從三品中大夫正四品中憲大夫從四品朝議大夫正五品奉政大夫從五品奉直大夫正六品承徳郎從六品儒林郎吏員出身封宣徳郎正七品文林郎吏員出身封宣議郎從七品徵仕郎正八品修職郎從八品修職佐郎正九品登仕郎從九品登仕佐郎命婦視夫若子之品一品封一品夫人二品夫人三品淑人四品恭人五品宜人六品安人七品孺人八品八品孺人九品九品孺人命婦但論品級不分正從有加級者得進階受封級多仍限以制七品以下不得逾五品五六品不逾四品三四品不逾二品凡推封父祖見任者不得受子孫封願解職就封者聽父職髙從父官卑則從子官武職之子任文職者亦如之武職給封舊隸吏部康熙三年改屬兵部兩子皆仕其父母受封從優品適母繼母適子謂父之繼妻曰繼母生母庶出之子謂所生母曰生母並得給封如父之職髙於子嫡母繼母從父官生母從子官或被出未嫁子有官者亦準封命婦因子孫受封者加太字受贈則否若夫在及夫之曾祖祖父在雖封亦不加封妻止於一適一繼宗室女適公侯伯以下經禮部疏請賜鄉君以上名爵者不封外餘均視其夫若子官給封為人後者已封贈祖父母父母始許以本身妻室封典貤封本生祖父母父母四品至七品官應封一代者許以本身妻室封典貤封祖父母八九品官許以本身封典貤封父母三品以上貤封者請㫖定奪㓜為外祖父母撫飬其外祖父母歿無嗣者許捐贈凡給封見任官應封之職以詔下日為定署事官奉㫖及題明者許給佐雜微員咨部署理已準部覆者亦準給升銜留任者以升銜給封兼任者以本任給封丁憂終養官及詔後身故者仍給病解候補者不得與各官任内遇前詔已封後改任者照改任封升任者照升任封加級者不準重封各官有應封遺漏及先緣事革職復還職者補給所領誥勅燬失者許重給均疏請或誤開姓氏遺忘履歴檢舉求更改者掲送内閣更改各官曾祖父母祖父母父母有曽犯十惡等罪及妻非禮聘正室或再醮不許請封貪汚革職者不得封贈因公罣誤者仍許封贈詔後犯事革職及計察降調者不封失誤軍機及貪汚革職者所領誥勅追奪若因公罣誤與别項革職者免追其祖父本有官階非因子孫封贈者不在追奪例廕叙凡官員恭遇覃恩文職在京四品以上在外三品以上武職京外二品以上送一子入監讀書三年期滿候銓銓選品級詳文選司不論加級及宫保等銜均照實俸廕子非見任者不廕原品解任食俸者準廕凡承廕必以適長子孫適長子孫出仕或有故方廕適次子孫無適次子孫方廕庶長子孫如庶長皆無方廕弟及兄弟之子應合承繼者其子孫在詔後生及縁事治罪者均不準廕凡補廕各官廕監生未經出仕中式而病故及殘廢者許以詔前所生子孫補廕已補者不再補各官縁事革職其廕子未仕者革廕已仕者免止於降調及文職雖革尚存武職者均留廕革職後如於本案還職即準還廕或特㫖起用品秩相當並逾於原品者亦将原廕監生題請還廕倘原廕之子殘廢病故或已出仕中式許以詔前所生之子補廕凡官員殁於王事者照本官應升品級加贈並廕一子入監讀書六月期滿候銓銓選品級詳文選司其父母妻有申請恩䘏誥勅者察明題給土官四川龍安府土通判一人龍安府土知事一人牟托水草坪土廵檢各一人竹木坎土副廵檢一人廣西果化州歸徳州忠州安平州萬承州全茗州龍英州下石西州太平州茗盈州結安州佶倫州都結州鎮逺州上下凍州思州江州憑祥州思陵州向武州都康州上暎州下雷州南丹州那地州田州土知州各一人東蘭州土州同一人陽萬州土州判一人羅陽縣羅白縣忻城縣上林縣土知縣各一人上龍司白山司興隆司那馬司定羅司舊城司下旺司安定司都陽司古零司大村峝小村峝小鎮安土廵檢各一人雲南景東府䝉化府孟定府永寧府土知府各一人廣南府土同知一人麗江府鶴慶府土通判各一人開化府土經歴一人北勝州冨州灣甸州鎮康州土知州各一人北勝州順州鎮南州姚州土州同各一人鎮南州新興州土州判各一人景東府土知事一人楚雄縣平彜縣雲南縣新平縣南澗土縣丞各一人雲南縣定遠縣土主簿各一人浪穹縣土典史一人練象關南平關定西嶺青索鼻鳳羽鄉上江觜下江觜箭杆場蒲陀崆鎮南關納更山囘磴關沙矣舊三岔河保甸猛麻觀音山阿雄闗土廵檢各一人版橋驛在城驛觀音山驛土驛丞各一人貴州鎮逺府獨山州土同知各一人鎮遠府土通判一人鎮遠府土推官一人安化縣印江縣甕水司草塘司餘慶縣土縣丞各一人安化縣餘慶縣土主簿各一人重安司朗城司土吏目各一人安化縣盤江土廵檢各一人凡土知府同知通判推官知州州同州判吏目知縣縣丞主簿典史經歴知事廵檢驛丞等文職承襲由部給牒書其職銜世系及承襲年月於上曰號紙應承襲者督撫察覈先令視事令司府州縣鄰封土司具結及本族宗圖原領號紙納部具疏請襲適庶不得越序無子許弟襲族無可襲者或妻或壻為夷衆信服亦許襲子或年㓜由督撫選本族土舎䕶理竢其年十有五請襲土官年老有疾請以子代者聽土官受賄隱匿兇犯逃人者革職提問不準親子承襲擇本支伯叔兄弟兄弟之子繼其職若有大罪被戮則立夷衆素所推服者土官支庶子弟馴謹能率衆者許申請督撫題給職銜視本土官降二等分管疆土視本土官或三之一或五之一再有子孫可分者分土如前例授職再降一等凡土官公罪應降三級以内調用者降一級留任應降五級以内調用者降二級留任應革職者降四級留任如有貪酷不法等罪仍革職遇降罰俸各按品級計俸罰米毎俸銀一兩折罰米一石書吏凡吏員充補内閣供事及在京各衙門書吏均有定額由召募考補或貼冩内遴選掣補嚴假冒禁闕主毋朋充毋濫役其承充者由部取原籍有司印結按遠近立限以結到日著役無結者黜外省吏攅司道府州縣為典吏首領雜職等衙門為攅典經制闕擇勤慎無違礙者承充具結送該管衙門準著役每嵗終仍取結送覈内閣事繁供事各衙門事繁書吏五年役滿無過犯送部免其考職以從九品未入流兼掣選用供事赴軍營効力者亦免考職給正八品銜先用事簡供事書吏役滿報部毎季闗防考試事繁供事書吏送修書各館者亦考職以館班别選告示申文各一道試卷封貯一考不到下次準補兩次不到除名其直省吏攅五年期滿申督撫毎年七月内闗防考試其試卷封固並原著役日期履歴册送部嵗終合内外吏員試卷校定等第具奏分别録用詳見文選司事繁書吏掣定職銜及各書吏考試後不得在京稽留即令五城官嚴催一月内囘籍令原籍官以到籍日期申報其考授執照發各省廵撫轉給欽定大清㑹典卷七
