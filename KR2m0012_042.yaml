薦維馨伏惟昭格尚饗冬至祝文曰節届陽初日逢南至永懷怙恃莫逮瞻依遙望山陵肅陳俎豆伏惟昭格鑒此馨香尚饗嵗暮祝文曰時維嵗暮節届履端䖍備庶品因時致祭伏惟尚饗忌辰祝文曰禮隆孝饗遇時序而增傷時際諱辰望山陵而永慕兹因皇祖忌辰謹以牲醴庶品用申祭獻尚饗曰禮隆孝饗撫時序而增傷時際諱辰望山陵而永慕兹因皇祖妣孝誠仁皇后忌辰謹以牲醴庶品用申祭獻尚饗孝昭仁皇后忌辰孝懿仁皇后忌辰孝恭仁皇后忌辰祝文同泰陵清明祝文維乾隆年嵗次二三月朔越日孝子嗣皇帝御名謹遣昭告於皇考世宗敬天昌運建中表正文武英明寬仁信毅大孝至誠憲皇帝皇妣孝敬恭和懿順昭惠佐天翊聖憲皇后曰節届清明感深春露䖍修時祭肅薦維馨伏惟尚饗孟秋望祝文曰玉露初零金風應候中元節届肅薦馨香伏惟尚饗冬至祝文曰葭琯初調日當長至永懷顧復莫報恩勤瞻望山陵䖍陳牲醴伏祈昭鑒俯賜格歆尚饗嵗暮祝文曰節近履端因時餞嵗敬陳柏酒鑒此苾芬伏惟尚饗忌辰祝文曰欽惟皇考世宗憲皇帝德合乾坤道光日月聰明睿智十三年普被照臨文武聖神千百國咸歸廣運綜憲承之謨烈佑啓詒庥仰陟降之神明音容如在恭逢諱日愴念終天陳筵几以伸忱撫嵗時而增感澤餘寰海方深遺慕於山陵露湛松楸彌切追思於風木伏祈昭格俯鑒苾芬尚饗曰深秋届候諱日驚心愴霜氣之寒凝痛慈顔之永隔春暉莫報孺慕無窮瞻企山陵肅陳奠醊伏祈昭鑒俯賜格歆尚饗孝賢皇后陵寢清明祝文維乾隆年嵗次二三月朔越日皇帝遣致祭於孝賢皇后之靈曰懿則垂芳清明届序肆陳瑶斚用迓雲軿尚饗孟秋望祝文曰坤教常昭中元應候苾芬式薦靈爽斯憑尚饗冬至祝文曰時逢長至眷念坤儀爰薦馨香庶期來格尚饗嵗暮祝文曰嵗月其除坤貞永著用修嘉薦惟冀居歆尚饗忌辰祝文曰融風應候諱日縈懷睇淑序之頻遷愴徽音之長逝追維懿德鐫琬琰以難窮眷企儀型閲嵗時而彌永撫三春而增感覽百世以含悽薦此苾芬靈其歆格尚饗景陵皇貴妃園寢清明祝文維乾隆年嵗次二三月朔越日皇帝遣致祭於慤惠皇貴妃之靈曰禁煙節届雨露既濡用薦苾芬庶幾歆格尚饗孟秋望祝文曰序届初秋白露既肅爰將祀事庶克歆承尚饗冬至祭文曰序届仲冬一陽來復用修時祀庶達馨香尚饗嵗暮祭文曰嵗周星紀臘謝春回爰展祀儀載歆載格尚饗景陵妃園寢清明祝文維乾隆年嵗次二三月朔越日皇帝遣致祭於溫僖貴妃慧妃惠妃宜妃榮妃平妃良妃宣妃成妃順懿密妃純裕勤妃定妃之靈曰陽和應候節届清明爰薦苾芬庶其來格尚饗孟秋望祝文曰序屬中元秋露始降感時展祭用達馨香尚饗冬至祭文曰一陽始升節届長至聿申時祀庶克歆承尚饗嵗暮祝文曰時當餞臘節序將新芬苾載陳庶幾歆格尚饗泰陵妃園寢清明祝文維乾隆年嵗次二三月朔越日皇帝遣致祭於齊妃寧妃之靈曰陽和應候序屬清明式薦苾芬庶其來格尚饗孟秋望祝文曰秋露既零中元節届感時陳祭來格來歆尚饗冬至祝文曰律轉初陽候逢長至聿修時祀用達馨香尚饗嵗暮祝文曰節逢除嵗淑氣方回酒醴式陳用申時祭尚饗端慧皇太子園寢清明祝文維乾隆年嵗次二三月朔越日皇帝遣諭祭於端慧皇太子之靈曰榆火方新物候初易薦以馨香尚其來格孟秋望祝文曰秋氣始肅節届中元撫時以祀用克歆承冬至祝文曰律回舜琯氣以升新芬苾載陳尚其歆饗嵗暮祝文曰嵗聿云莫斗杓回春修我時祀以薦維馨欽定大清㑹典卷四十二
