body:
  text: 禮部祠祭清吏司陵寢凡山陵肇祖原皇帝興祖直皇帝景祖翼皇帝顯祖宣皇帝陵曰永陵在興京啓運山距盛京二百四十里原皇后直皇后翼皇后宣皇后各合葬太祖髙皇帝陵曰福陵在奉天府之承德縣天柱山距盛京二十里孝慈髙皇后合葬太宗文皇帝陵曰昭陵在奉天府之承德縣隆業山距盛京十里孝端文皇后合葬孝莊文皇后陵曰昭西陵在順天府之遵化州昌瑞山之南世祖章皇帝陵曰孝陵在順天府之遵化州昌瑞山距京師二百四十里孝康章皇后合葬孝獻皇后祔葬孝惠章皇后陵曰孝東陵在昌瑞山孝陵之東聖祖仁皇帝陵曰景陵在昌瑞山孝東陵之東孝誠仁皇后合葬孝昭仁皇后孝懿仁皇后孝恭仁皇后祔葬敬敏皇貴妃從葬世宗憲皇帝陵曰泰陵在易州永寧山距京師二百八十里孝敬憲皇后合葬敦肅皇貴妃從葬孝賢皇后陵寢在昌瑞山孝陵之西均設禮部工部內府奉祀各官暨官兵人役以重守衛以供灑掃又各設牛羊圈置吏以飼犧牲各設莊園置長以供粢盛界內禁止樵採嵗時祭饗國有大慶則告孝陵景陵泰陵特命王公大臣侍衛前往守護永陵饗殿曰啓運殿福陵以下均曰隆恩殿各設龍鳯寶座几案後為寢室設神龕寶牀帷幔衾枕楎椸以奉神主大饗將事於隆恩殿展謁山陵拜於寶城前凡謁陵之禮皇帝展謁山陵或躬祭山陵前期行展謁禮是日不啓隆恩殿門禮部堂官二人於降輿處恭候皇帝素服扈蹕王公百官咸素服皇帝至隆恩門外兩廂南降輿禮部堂官二人恭導皇帝由隆恩門陵寢門左門入至寶城明樓前祭臺北正中行三跪九拜禮不贊鴻臚官引王以下各官咸按翼於陵寢門外東西上北面序立隨行禮有司進奠几酒罍於拜位前正中皇帝詣几前北嚮跪羣臣東西面跪進爵大臣進爵皇帝三祭酒每祭行一拜禮興東立西嚮舉哀王公百官隨行禮舉哀畢禮部堂官恭導皇帝出以次詣各陵行展謁禮儀同至孝賢皇后陵寢禮部堂官不導引皇帝乘輿由中門入自饗殿左直至明樓前階下降輿升階旁坐祭酒鴻臚官引王公百官於大門外按翼北嚮行三跪九叩禮興東西面立皇帝祭酒時行禮舉哀是日遣王公大臣詣景陵皇貴妃園寢妃園寢行禮凡恭遇皇太后皇后謁陵之禮守陵女官二人自隆恩門恭導皇太后進隆恩門至殿階下左旁降輿皇后貴妃妃嬪至隆恩門內降輿公主於門外扈從婦女於橋南各下車馬女官二人恭導皇太后皇后至寶城明樓前祭臺北貴妃妃嬪於祭臺旁公主等於祭臺南行六肅三跪三拜禮執事女官進奠几於拜位前正中皇太后詣几前北嚮正中跪皇后貴妃妃嬪公主等西嚮跪女官進爵皇太后三祭酒每祭行一拜禮興東立西嚮舉哀皇后等均隨行禮舉哀畢女官恭導皇太后皇后至降輿處乘輿還行宫如至孝賢皇后陵寢皇太后乘輿由中門入至明樓前降輿旁坐祭酒皇后率貴妃妃嬪公主降輿行禮如前儀凡恭謁盛京祖陵之禮皇帝親詣盛京展謁祖陵駕發前一日皇帝親祗告於奉先殿啓鑾日陳騎駕鹵簿不作樂導從扈衛與時巡同午門鳴鐘不隨從王公百官咸常服跪送於午門外鑾輿所經守土官咸常服跪迎道右如儀駕至興京先期盛京文武各官咸朝服出境跪迎朝鮮國王遣使表請起居至日恭謁永陵皇帝素服由行營乘輿出王公內大臣侍衛三品以上官咸素服從皇帝至永陵正門之右垣側降輿禮部堂官二人恭導皇帝由左門入進啓運門左門至寶城前立鴻臚官引王公於啓運殿左右百官於門外按翼序立皇帝就拜位率羣臣行三跪九拜禮興有司進奠几於拜位前正中皇帝詣几前北嚮跪羣臣東西面跪進爵大臣進爵皇帝仰瞻四陵各三祭酒每祭行一拜禮興東立西嚮舉哀王公百官隨行禮舉哀畢禮部堂官恭導皇帝出至右垣側乘輿還行營翼日皇帝御禮服羣臣咸朝服行大饗禮如儀禮成賞賚守陵官兵有差是日遣官致祭永陵內祔葬之武功郡王恪恭貝勒墓其附近之覺羅等祖塋皆遣官往奠駕至盛京日恭謁福陵至紅門外左門降輿禮部堂官恭導皇帝入隆恩門左門至寶城前率羣臣行三跪九拜禮有司進奠几進爵大臣進爵皇帝詣几前北嚮跪三祭酒每祭行一拜禮興東立西嚮舉哀衆皆隨行禮舉哀畢禮部堂官恭導皇帝出升輿還行營翼日行大饗禮禮成皇帝即往謁昭陵翼日行大饗禮儀均與永陵同是日分遣官致祭福陵之壽康太妃園寢昭陵之宸妃懿靜大貴妃康惠淑妃園寢皇太后皇后謁祖陵之禮皇太后率皇后貴妃妃嬪至永陵啓運門前降輿至門下行六肅三跪三拜禮女官設奠几進爵皇太后北嚮跪仰瞻四陵各三祭酒每祭行一拜禮皇后貴妃妃嬪隨行禮興西嚮舉哀如儀福陵昭陵於正門之右門內降輿至寶城明樓前行禮各祭酒三爵餘儀與謁永陵同祀事禮成賞賚守陵官兵及盛京官兵各有差越日皇帝親臨克勤郡王暨功臣武勳王揚古利信勇公費英東果毅公額宜都墓祭酒其餘親王貝勒及大臣墓皆以次遣官往奠皇帝回鑾守土官咸朝服跪送如前駕至京在京王公百官咸朝服跪迎候皇帝還宫皆退翼日皇帝以恭謁祖陵禮成親祗告於奉先殿禮部奏請擇吉行慶賀禮儀與三大節同凡大饗之禮嵗於忌辰清明孟秋望冬日至嵗暮及國有慶典行大饗禮是日恭請帝后神位奉安於隆恩殿寶座南嚮如皇貴妃同殿設位於西旁東嚮帝后同案共牛一羊二以一羊代豕尊四各奉先制帛一羮飯脯醢一筵計十八盤餅餌果品一筵計六十五盤茶碗一金碗座一金爵三爵墊一金匕一金箸一雙帛共篚牲共俎尊實酒疏布羃勺具夏則薦瓜孝賢皇后陵寢用素帛餘同皇貴妃各素帛一羮飯脯醢一筵計十八盤餅餌果品一筵計五十四盤餘同恭遇皇帝親詣行禮禮部堂官詣行宫告時皇帝素服乘輿出行宫內大臣侍衛前引後扈如儀凡陪祀扈從王公百官及執事官咸素服皇帝至隆恩門外兩廂南降輿贊引太常卿二人恭導皇帝入東旁大次內府奉祀官恭請神位奉安寶座鴻臚官引扈蹕王公於兩廂前引各官豫進至隆恩殿階下兩旁北上東西面序立禮部堂官奏請行禮皇帝出大次前引大臣十人前導後扈大臣二人隨從贊引官恭導皇帝入隆恩門左門升正面左階入隆恩殿左門東立西嚮鴻臚官引王等於階上兩旁東西面序立內府官獻茶畢贊引官恭導皇帝至拜位前北嚮立鴻臚官引王公百官各就班位均東西上北面序立典儀官贊執事官各共乃職以下奠獻送祝帛均典儀官唱贊贊引官贊就位皇帝就拜位司香官奉香合進贊引官恭導皇帝詣香几前立司香官跪進香奏跪皇帝跪奏上香皇帝受香合拱舉授司香官興三上香奏復位皇帝復位奏跪拜興凡行禮皆有奏皇帝行三跪九拜禮王公百官均隨行禮奠帛爵行初獻禮司帛官奉篚司爵官以次奉爵進司帛官跪奠於帛案三叩司爵官以次立獻爵奠正中皆退司祝至祝案前跪三叩奉祝版跪案左皇帝跪羣臣皆跪司祝讀祝畢奉祝版詣神位前跪安於案三叩退皇帝率羣臣行三拜禮行亞獻禮司爵官以次獻爵奠於左儀如初獻行終獻禮司爵官以次獻爵奠於右儀如亞獻皇帝率羣臣行三跪九拜禮司祝司帛官各進至案前一跪三叩奉祝在前次帛恭送燎所皇帝轉立拜位旁西嚮候祝帛過復位祝帛燎半奏禮成恭導皇帝由隆恩殿左門出降東階進陵寢門左門至明樓前西嚮舉哀鴻臚官引王公百官於陵寢門外東西面序立隨行禮舉哀畢恭導皇帝由隆恩門左門出至兩廂南乘輿還行宫王公百官以次退皇陵內府奉祀官恭奉神位還御寢室如因慶典躬行大饗禮皇帝御禮服陪祀王公百官咸朝服行禮如儀禮成仍由左階降不詣明樓前遣官行禮贊引執事官均用各陵奉祀禮部贊禮郎讀祝官承祭官及陪祀執事各官咸朝服是日奉祀官備陳俎豆畢進祝版內監啓寢室神龕內府官恭請神位奉安寶座贊禮郎豫引陪祀官先進至階下贊引贊禮郎二人引承祭官由隆恩門右門入升正面右階於西旁東面立獻茶畢引至正中北面行禮上香復位由隆恩殿右門出入讀祝時司祝進至祝案奉祝版由中門循右闑出於西旁跪讀畢仍循右闑進詣神位前跪安於案祝帛恭送燎所時引承祭官避立西旁東面餘儀同禮成仍由隆恩門右門引出陪祀官以次退各易素服俟徹饌闔門贊禮郎引承祭官於隆恩門外左階上西面各官於階下舉哀畢皆退冬日至暨慶典不舉哀孝賢皇后陵寢祭日於未啓寢室前各執事官陳設俎豆牲牢畢皆退出司祝官奉祝版至中門內監接進安設祝案行三叩禮司祝於門外左旁隨行禮乃啓龕門祭時尚茶獻茶內監於中門接奉奠獻遣官就拜位司香內監奉香合進贊引官引遣官至右門止遣官自入右門贊引官由門外趨至中門左右贊上香復位仍由右門引出奠帛獻爵均以內監將事初獻後奉祝內監就祝案司祝進至中門外右旁各行三叩禮內監奉祝至中門內東面跪授司祝司祝跪受讀畢仍授內監內監跪安於帛篚各三叩如前祝帛送燎內監二人就帛案司祝司帛於中門外兩旁各行一跪三叩禮內監奉祝帛授司祝司帛恭送燎所禮成恭奉神位還御寢室闔門各執事官進殿徹饌餘如前儀凡每年清明上土之禮前一日皇陵工部官每陵進設掛紙錢寶花一座各設於隆恩殿內東旁嵗暮舁出同楮帛焚燎於附近處取黃土各一擔如恭遇躬行上土禮於祭前二刻禮部太常寺堂官二人恭導內大臣二人後扈王公大臣二人隨進一人荷土皇帝素服進至明樓方城下親荷土王公大臣二人前後翼衛禮部太常官前導由明樓東磴道升方城至東石䦨王公大臣以二筐土並為一筐跪進衆皆止皇帝奉筐升跪奠土於寶頂降授筐王公大臣跪受禮部太常官恭導由原路出至隆恩門外入大次俟奉請神位畢行大饗禮如儀遣官上土素服奉祀禮部贊禮郎二人前引一人荷土隨進至方城下遣官荷土由明樓西磴道升方城至西石䦨以二筐土並為一筐奉筐升跪奠土於寶頂退引出更朝服行禮如儀凡祭告之禮帝后同案各陳果實十二盤羊一酒三爵內監啓神龕帷幔守陵王公大臣總管分詣將事奉祀禮部贊禮郎唱贊讀祝奠帛獻爵行禮萬壽聖節不用羊餘儀同凡朔望致祭之禮陳羊酒果實內監啓神龕帷幔守陵王公大臣及內府掌關防官將事奉祀禮部贊禮郎導引惟十月朔贊禮餘朔望日不贊皇貴妃園寢妃園寢朔望內府官上香行禮凡皇子謁陵之禮皇子至下馬石牌下馬皇陵奉祀禮部贊禮郎導引由左階升至隆恩門階上虛中位於左旁行禮畢立門東西嚮舉哀如入門禮部官引至隆恩門右門止內府奉祀官接引至陵寢門外右旁行禮西立東嚮舉哀祭日由右門進於隆恩殿階上正中行禮遣官奉祀禮部贊禮郎引王公於隆恩門外階上虛中位按翼行禮祭日由右門進於階上正中行禮各妃園寢皇太子園寢祭日承祭官均由東路行由左門出入於階上正中行禮王公有生母在妃園寢內者行禮畢內府官引由左右門生母墓在左由左在右由右進園寢門左右門至墓前月臺上設奠几內府官進爵祭酒舉哀行禮如儀凡公主皇子福晉謁陵之禮是日啓陵寢門公主福晉至下輿處下輿本陵女官二人導引由神道西進隆恩門右門至陵寢門外虛中位於右旁行六肅三跪三叩禮退立門西東嚮舉哀畢女官仍由原路引出至妃園寢於琉璃花門外行四肅二跪二叩禮畢女官引進至墓前月臺上設奠几女官進爵祭酒舉哀行禮如儀凡出使官員謁陵之禮親王以下三品以上官奉使盛京者於福陵昭陵門外行三跪九叩禮遇祭饗日二品以上官入門內