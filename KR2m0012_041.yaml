front:
  text: 欽定四庫全書欽定大清會典卷四十一
  hash: sha256:d5a7c6debe3dfd0c6c3d6b52dd1180ebfe2c2d721bb66ea54b0f3934569afbc9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_041-1a, image: WYG0619/WYG0619-0315c.png}
body:
  text: 禮部祠祭清吏司凡升祔之禮山陵禮成皇帝恭奉神主還京師升祔太廟前期三日遣官以祔廟祗告於天地太廟社稷前一日皇帝還宫恭候奉迎神主遣官一人恭代行朝夕奠禮升祔之日王公率宗室官恭請中殿列祖列后神位奉安於前殿所司恭設升祔寶座於列祖之次屆時神主黃輿入城隨行之王公各官咸朝服以從在京百官朝服跪迎於大清門外皇帝御禮服率王公內大臣侍衛等朝服恭迎於太廟街門外神主黃輿入天安門皇帝率羣臣南嚮跪黃輿由太廟街門中門入皇帝率王公百官由左門隨入至太廟南門外輿止皇帝盥洗詣黃輿前行一跪三拜禮恭奉神主御仗黃蓋前導贊引太常卿二人恭導由左門入至戟門外黃蓋御仗止入戟門左門升左階進太廟左門至正中北嚮立執事官豫設神主拜席於正中設皇帝拜位於後贊引官跪奏廟號皇帝尊恭宣諡祗見列祖皇帝恭奉神主跪安於正中拜席退就拜位恭代行三跪九拜禮興贊引官跪奏請升座皇帝恭奉神主依昭穆之序奉安於列祖之次行一跪三拜禮乃行大饗禮與時饗儀同列后升祔禮節並如前儀凡加上尊諡之禮皇帝御極之初仰思創守隆規敕禮臣定議恭加列祖列后尊諡以大追崇之典大學士九卿翰林詹事科道會同議上皇帝恭定乃改題神主於太廟中前期遣官行祗告禮屆日內閣翰林院官敬書大學士二人上香行禮既成諏吉行恭加上尊諡禮先期遣官祗告天地社稷屆期遣親王祭太廟後殿皇帝禮服詣前殿安奉神位恭上尊諡行大饗禮與時饗同凡恭進玉册玉寶之禮皇帝恭上大行皇帝大行皇后尊諡廟號敕工部敬製玉册玉寶恭加列祖列后尊諡敕重造玉册改鐫玉寶均於太廟街門內奉祠署敬造內閣大學士禮工二部堂官咸朝服上香行禮既成卜吉獻於太廟是日昧爽太常官豫設册寶案於太廟前殿工部官豫設采幔於奉祠署外設黃案於采幔正中各陳玉册玉寶於案設香案於前張幄次於太廟戟門外之左鑾儀衛官布皇帝拜褥於香案前正中設奉安册寶采亭於采幔左右奉册寶王公大學士尚書都統侍郎咸朝服分班序立於采幔外兩旁祗俟屆時禮部堂官奏請行禮皇帝御禮服出宫陳法駕鹵簿不作樂午門嚴鼓王公文武百官咸朝服跪送皇帝至降輿處降輿盥洗禮部堂官恭導皇帝詣册寶案前恭視玉册玉寶詣香案前上香退就拜褥行一跪三拜禮興立案東奉册寶王公大臣進至案前各一跪三叩恭奉册寶安采亭內跪叩如前校尉舁亭御仗前導册寶采亭以次至太廟南門由中門入皇帝率王公大臣等由左門隨入皇帝至戟門外幄次少俟亭至殿外階上止以次序列均南嚮王公大臣詣亭前一跪三叩各奉册寶入太廟前殿中門至案前各恭設於案上跪叩如初退立左右鑾儀衛官布拜褥於正中禮部堂官恭導皇帝由戟門左門入升東階入殿左門就拜位行三跪九拜禮執事王公大臣均隨行禮畢王公大臣各至册寶案前一跪三叩興恭奉册寶出殿後門皇帝隨行至中殿立案東西嚮王公大臣奉册寶分藏於金匱跪叩如初退禮部堂官恭導皇帝由左門入詣各寢室香案前上香畢至正中拜位行一跪三拜禮禮成禮部堂官恭導經前殿左出戟門南門至乘輿處乘輿還宫作樂午門鳴鐘王公百官跪迎如儀凡功臣配饗之禮既得旨乃敕工部製神主鐫字並龕座祭案祭器如儀恭遇四時大饗前期奏遣官一人祗告太廟遣官一人奉主配饗東廡遣郡王西廡遣大臣太常寺官設龕座陳俎豆至日設采亭於工部大堂露臺上遣官詣工部奉主置采亭民校舁行前列仗王吾仗功臣引仗自工部中門出鴻臚寺官二人前引至長安左門王至門天安仗采亭止遣官奉主鴻臚官二人導引由長安左門北門端門左門太廟街門北門廟南門西門入至戟門右門鴻臚官止太常官引進至神路右拜位王於階上大臣於階下北面立遣官置神主於拜位代行三跪九叩禮畢奉神主興奉安於兩廡功臣之次王於東廡大臣於西廡行三叩禮屆祭時分獻如儀欽定大清會典卷四十一
