body:
  text: 禮部祠祭清吏司吉禮祭統凡祭三等圜丘方澤祈榖雩祀太廟社稷為大祀日月前代帝王先師孔子先農先𧖟天神地祇太嵗為中祀先醫等廟賢良昭忠等祠為羣祀凡大祀天地太廟社稷皇帝親行禮太廟後殿遣官行禮天地從壇太廟兩廡均遣官分獻甲丙戊庚壬年親朝日丑辰未戍年親夕月從壇遣官分獻餘年均遣官致祭每嵗耕耤親饗先農特行崇典則親饗前代帝王先師孔子餘均遣官致祭凡齊戒大祀三日中祀二日南北郊祀皇帝於大内齋宫致齋二日壇内齋宫致齋一日頒勅羣臣誓戒百執事恭書於版王公陳設於府第文武官陳設於公署各致齋二日隨壇齋宿一日饗太廟祭社稷皇帝於大内致齋王公於府第文武官於公署各致齋朝日夕月饗前代帝王先師先農皇帝於大内致齋王公百官均於私第致齋齋戒之日不理刑名不燕會不聽樂不入内寢不問疾弔喪不飲酒茹葷不祭神不埽墓有疾有服者皆弗與皇后親饗先蠶致齋二日陪祀妃嬪公主福晉以下文三品武二品命婦以上皆齋如遣妃恭代公主福晉命婦致齋亦如之凡郊壇齋宿皇帝祀南郊乘玉輦設大駕鹵簿祭北郊乗金輦設法駕鹵簿前祀一日詣壇先至皇穹宇皇乾殿皇祇室上香次視壇位次閲籩豆牲牢迺御齋宫是夜嚴更宿衛警蹕環巡凡祀期圜丘以冬日至方澤以夏日至朝日以春分夕月以秋分孟春祈榖以辛龍見而雩太廟時饗孟春諏吉以上旬夏秋冬均以孟月朔季冬大祫以嵗除前一日春秋二仲祈報社稷以戊釋奠於先師以丁仲春饗先農以亥遇天寒用季春季春饗先蠶以巳仲春仲冬饗先醫以甲祭太嵗於每嵗終始孟春以上旬諏吉季冬以嵗除前一日春秋饗前代帝王廟賢良祠昭忠祠及羣祀皆卜吉祭日均質明行事惟朝日以夘時夕月以酉時凡玉六等以蒼璧祀天黄琮祭地黄珪祭社青珪祭稷赤璧祀日白璧祀月凡帛七等郊祀制帛以祀天地告祀制帛以祈以雩以昭告於天地奉先制帛以饗太廟禮神制帛以祭社稷祀日月神祇饗前代帝王先師先農先蠶先醫展親制帛以饗宗藩報功制帛以饗功臣素帛徧於羣祀其色各以類從凡牲四等天地用犢配位同從位日月用特餘均太牢宗廟太牢配饗東廡太牢西廡少牢社稷太牢配位同日月神祇均太牢月壇配位同前代帝王先師先農先蠶太嵗先醫之祀如之配位少牢羣祀如之牛色尚黝大祀入滌九旬中祀三旬羣祀一旬凡樂四等九奏以祀天八奏以祭地六奏以饗太廟七奏以祭社稷朝日饗先農如之六奏以夕月饗前代帝王先師先𧖟祀神祇太嵗如之凡祝版祀天青質朱書祭地黄質墨書饗太廟祭社稷白質墨書朝日赤質朱書夕月白質墨書太嵗以下均白質墨書凡祭器天地匏爵籩竹絲純裏髤以漆豆登簠簋犧尊皆用陶太廟玉爵籩竹絲畫裏登用陶飾以文采豆與簠簋皆木髤漆飾以玉鉶範銅為之飾以金春用犧尊夏象尊秋著尊冬壺尊大祫山尊皆範銅為之社稷玉爵配位用陶日月先農先蠶陶爵豆登簠簋鉶尊同前代帝王先師及諸人鬼之祭豆登鉶簠簋尊爵皆範銅不飾篚用竹俎用木皆髤以漆凡祭物登實以大羮鉶實以和羮簠實以黍稷簋實以稻梁籩實以形鹽藁魚棗栗榛菱芡鹿脯白餅黑餅糗餌粉餈豆實以韭菹醓醢菁菹鹿醢芹菹醢筍菹魚醢脾析豚拍酏食糝食凡祭服皇帝有事於郊廟皆御祭服祀天青色祭地黄色朝日赤色夕月玉色餘祭均黄色陪祀王公百官咸朝服凡閲祝版香帛南郊御太和殿北郊太廟社稷日月前代帝王先師先農均御中和殿如遇忌辰天地太廟祝版仍躬閲社稷等祀均太常寺官由内閣恭奉至祭所安設遣官恭代及羣祀亦如之凡視牲大祀天地前五日遣官恭代視牲前二日遣禮部尚書一人省牲饗太廟祭社稷前三日朝日夕月饗前代帝王先師先農先蠶前二日均禮部尚書一人省牲凡省齍展器祀日漏未盡禮部侍郎一人率屬視太常寺官展祭器陳祭物迺省齍盛及登鉶籩豆之實凡刲牲大祀中祀前一日光禄寺卿禮部都察院太常寺官具朝服監視并瘞毛血羣祀太常寺官監視凡陪祀皇帝大祀郊壇自王公至文職五品員外郎武職四品佐領騎都尉以上外任官來京文職四品武職三品以上饗太廟祭社稷至文職五品科道郎中武職三品冠軍使叅領輕車都尉以上咸齋戒陪祀若遣官行禮王公内大臣侍衛不與自大學士以下文武各官咸陪祀如儀凡恭請神位郊壇於齋宫鳴鐘時各壇廟於皇帝降輿時均禮部尚書率太常寺官恭奉神位安於祭所禮成而復太廟以王公二人率宗室覺羅官將事凡執事皇帝親祀壇廟贊引用太常寺卿二人奉福胙用光禄寺卿二人接福胙用侍衛二人奠帛獻爵各壇廟均用太常寺官太廟前殿用宗室官後殿用覺羅官南北郊奠帛六人獻爵六人太廟時饗奠帛五人獻爵十有五人後殿奠帛四人獻爵八人祫祭奠帛九人獻爵二十有三人社稷壇奠帛獻爵各四人日壇奠帛獻爵各一人月壇奠帛獻爵各二人前代帝王廟奠帛獻爵各三人先師先農均奠帛獻爵各一人凡侍儀皇帝親行禮禮部尚書侍郎二人西面都察院左都御史左副都御史二人東面王公拜位御史二人禮部官二人百官拜位御史四人禮部官二人均東西面凡陪祭執事有違誤失儀者劾之凡告祭國有大事祇告天地宗廟社稷遇慶典遣官致祭陵寢及五嶽五鎮四海四瀆前代帝王陵寢先師闕里皇帝巡狩所至親祭方岳命所在地方官徧祭嶽鎮海瀆所過名山大川帝王陵寢先聖祠墓或親祭或遣官致祭亦如之欽定大清會典卷三十六
