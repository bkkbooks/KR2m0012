  text: 欽定四庫全書欽定大清㑹典卷九
  hash: sha256:c71ac831952b27ac1ea5ccbc9c9e3a69af1ddf4cf81eee23b20c4990c36eb98e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_009-1a, image: WYG0619/WYG0619-0113a.png}
body:
  text: 户部户口凡編審八旗戸口以三年為率屆期移文八旗滿洲䝉古漢軍都統及盛京將軍各省駐防將軍都統副都統飭所屬佐領簡稽丁壯登名於籍達部彙疏以聞以周知八旗繁衍之數凡編旗丁每户書某氏某官未仕者曰閒散某上書父兄官職名氏旁書子弟兄弟之子及户下若干人或在籍或他往皆備書駐防及居外省者編二册一申部一咨旗檢校凡八旗氏族載在册籍者曰正户僮僕而本主聽出户者曰開户由所隸佐領别宗支覈眞偽稽逺近考其譜系以時除注其有年久丁册脱漏世系無可稽考者别載册籍均條晰申部用資簡閱凡八旗漢軍除從龍勲戚子孫外或有田宅或依婣戚或操工作需在各省營生食力者許呈本旗都統及所在督撫隨其人地之宜聽其生業督撫於嵗終具册咨部彚奏凡旗人立後先兄弟之子次從兄弟之子次族姓擇昭穆相當者聽立為後立後時必聞族長呈叅佐領押字若本宗無人許撫異姓正户之子為嗣呈兩家族長佐領亦如之有同宗而立異姓及收僮僕並漢人者禁之凡旗人儥僮者官給印票記户册稽親鄰察其非犯罪脱籍假冒者徴信而質劑焉所儥繋旗人領催押字漢人兵馬司書劵在奉天各省者所在官掌其成市亦如之若滿洲䝉古壯丁越旗自鬻及以僮僕鬻漢人者論凡户下人隨主出征有先登得城者準其出户其親伯叔兄弟亦準隨出編入正户册凡直省户口以乾隆十八年奏報民數册計之得户三千八百八十四萬五千三百五十有四口萬有三百有五萬直隸人丁三百七萬一千九百七十五户九百三十七萬四千二百十有七口盛京人丁五萬九千二百十有二户二十二萬一千七百四十二口山東人丁四百五十三萬九千九百五十七户一千二百七十六萬九千八百七十二口山西人丁百七十七萬九千二百四十七户五百十有六萬二千三百五十一口河南人丁三百二萬九千五百二十八户七百十有一萬四千三百四十六口江南江蘇人丁五百四十七萬八千二百八十七户一千二百六十一萬八千九百八十七口安徽人丁四百十有三萬六千一百二十五户一千二百四十三萬五千三百六十一口江西人丁二百十有八萬五千一百九十五户五百五萬五千二百五十一口福建人丁一百十有二萬七千七百四十六户四百七十一萬三百三十九口浙江人丁三百四萬三千七百八十六户八百六十六萬二千八百有八口湖廣湖北人丁百七十五萬六千四百二十六户四百五十六萬八千八百六十口湖南人丁百六十六萬四千七百二十一户四百三十三萬六千三百三十二口陜西西安人丁一百三萬三千一百七十七户三百八十五萬一千四十三口甘肅人丁百萬二千五百十有八户二百十有三萬三千二百二十二口四川人丁七十五萬七百八十五户一百三十六萬八千四百九十六口廣東人丁百二十四萬一千九百四十户三百九十六萬九千二百四十八口廣西人丁九十四萬三千二十户一百九十七萬五千六百十有九口雲南人丁三十七萬一千二百八十四户百萬三千有五十八口貴州人丁六十二萬九千八百二十五户一百七十一萬八千八百四十八口凡編審直省户口以五年為期州縣官通稽境内民數每百有十户推丁多者十人為長餘為十甲甲繋以户户繋以口編為一册城中曰坊近城曰廂在鄉曰里民年十六始傅六十以上除之布政使司以所屬比册上之督撫督撫疏報以册達部部受直省之册彚疏以聞以周知天下生民之數凡人丁計口出銀以代徭役前代相沿載在版籍者曰徭銀自昇平嵗久生齒益繁康熙五十二年廼因恩詔以五十年編册為率永免增丁之賦雍正二年以册存見數按直省州縣均入田賦代輸其無田之户悉免之閒有不便均輸者仍依舊制丁地分徴以從土俗之宜凡直省徭銀均入田賦者二百七十二萬六千二百十有一兩有竒每五年編審丁有滋生徭無加額若田有墾復升科者仍取田賦内代輸徭銀計其輕重而通均之凡保甲之法户給印单書其姓名習業出注所往入稽所來十户為牌立牌長十牌為甲立甲長十甲為保立保長自城市達於村鄉使相董率遵約法察姦宄勸媺行善則相共辠則相及以安保息之政欽定大清㑹典卷九
