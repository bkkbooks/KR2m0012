front:
  text: 欽定四庫全書欽定大清㑹典卷二十七
  hash: sha256:d3205c1eae57b78a25d155345c61e42e14a5fc38b9e71833e19640f7a62860ed
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_027-1a, image: WYG0619/WYG0619-0215c.png}
body:
  text: 禮部儀制清吏司授時凡頒朔之禮嵗以孟冬一日頒來嵗十有二月之朔欽天監官設黃案於午門外正中又設二案於御道左右奉恭進皇帝皇太后皇后時憲書於中案奉頒給王公百官時憲書於左右案陳設畢舉中案由午門中門入監正監副從至太和門陳於左右階監正等於丹墀左行三跪九叩禮畢授内務府掌儀司官奉至乾清門慈寧門恭進是日王貝勒貝子公以下文武百官咸朝服集闕下鴻臚寺鳴贊贊排班王貝勒貝子公序立御道上文武百官序立御道左右皆北靣東班西上西班東上贊有制衆咸跪宣讀官西靣宣制訖衆行三跪九叩禮王公百官皆以次跪領遂頒布於畿甸以前民用直省布政使司各給欽天監時憲書印貯於庫歳四月欽天監以奏準來嵗時憲書式頒各布政使司刋刻成書鈐以所貯監印孟冬月彙送督撫署督撫設香案陳時憲書禮生引贊率所屬文武官朝服望闕行三跪九叩禮祗領訖布政使司廼分發專城之道府轉行所屬州縣分駐之提鎮轉行所屬標營到日行禮祗領均與㑹城同廼頒布民間山陬海澨無有不徧偽造者論如律外藩䝉古部落内外扎薩克諸邊番夷由驛給發朝鮮國遣使赴部祗領凡迎春之禮順天府豫於東直門外製芒神春牛視嵗建干支辨其形色以迎生氣占嵗時立春前一日府尹率僚屬朝服迎春於東直門外隸役舁芒神土牛導以鼓樂至府署前陳於采棚立春日大興宛平縣令設案於午門外正中奉恭進皇帝皇太后皇后芒神土牛配以春山各陳於案欽天監候時官報屆時府縣學生員舁案禮部司官前導尚書侍郎順天府尹暨丞後隨由午門中門入至乾清門慈寧門恭進皇帝皇太后皇后内監各接奏禮畢皆退順天府尹廼出土牛環擊以示勸耕之意直省府州縣豫於東郊外各製芒神土牛立春之日率丞倅掾史暨師儒耆老迎春於東郊如順天府之儀頒詔凡頒詔之禮禮部鴻臚寺官豫設詔案於太和殿内左楹之南及丹陛正中鑾儀衞設黃盖雲盤於丹墀内龍亭香亭於午門外工部豫設金鳳朶雲於天安門上堞口正中設宣詔臺於東第一楹設黄案於臺上奉詔宣詔各官咸朝服恭竢領催耆老咸齊集天安門外金水橋南屆時内閣學士奉詔至乾清門恭用御寳畢奉至太和殿陳於東案皇帝御殿羣臣朝賀行禮畢儀別具大學士一人入殿左門詣案奉詔由中門循左闑出至殿檐下授禮部尚書禮部尚書跪受興由中階左降至丹陛正中陳於案行一跪三叩禮跪奉詔興由中階降置雲盤内禮部儀制司官奉雲盤張黃蓋由中道出太和門文武各官由昭徳門貞度門隨出詔至午門外禮部官奉雲盤設龍亭内鑾儀校舁亭前列御仗導引樂作禮部尚書率屬隨至天安門登城陳詔書於宣詔臺案上文武各官於金水橋前按翼序立鴻臚官贊排班文武各官按班次北靣立領催耆老序立於後宣詔官登臺西面立鴻臚官贊有制衆皆跪宣詔畢文武各官領催耆老均聽贊行三跪九叩禮奉詔官奉詔承以朶雲由金鳳啣下禮部官祗受仍設龍亭内鑾儀校舁行前列黃蓋御仗導迎樂作由大清門出至禮部禮部尚書侍郎率屬跪迎於儀門陳詔於大堂行三跪九叩禮畢恭鑴詔書謄黃頒行天下直省㑹城傳集耆老衆庶於公廨候聽宣讀将軍督撫提鎮率所屬文武官具龍亭黃蓋龍旗御仗出郭恭竢詔至跪迎齎詔官奉設龍亭内旗仗導行各官興皆乘馬從至公廨陳詔於堂上正中通贊贊排班禮生引各官就階下拜位文東武西北靣序立如朝賀儀贊跪衆咸跪宣詔官恭奉西靣宣讀訖贊跪叩興衆行三跪九叩禮畢廼謄黃頒布府州縣衞營汛宣播徳音無有不徧頒賞凡頒賞恭遇慶典恩詔王公百官公主福晉命婦各賜金幣有差詳見則例恭修實録告成賜監修總裁副總裁各金幣有差鞍馬一提調纂修收掌謄録官各金幣有差供事各金幣有差匠役各金布有差詳見則例玉牒告成賜總裁副總裁各金幣有差提調纂修官各金幣有差收掌謄録官供事匠役各白金有差詳見則例均由部移取頒給監修總裁以下各祗領如儀将軍總督都統廵撫副都統提督總兵官奉命除授述職入覲均由吏兵二部覈明咨部具奏請旨賜廵撫副都統總兵官鞍馬一将軍都統提督加賜櫜鞬一弓一矢十總督加賜朝服一由部於午門外頒賞本官朝服行三跪九叩禮直省卓薦官得㫖準其注册者文官賜朝服武職賜采服各按品級詳見則例均由部發郵遞各省督撫轉給後報部欽定大清㑹典卷二十七
