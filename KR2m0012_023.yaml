front:
  text: 欽定四庫全書欽定大清㑹典卷二十三
  hash: sha256:3a96c94b7d1a2b70d2b5e03b741704105715df384b3722b9f63afb47be80fb20
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_023-1a, image: WYG0619/WYG0619-0181a.png}
body:
  text: 禮部儀制清吏司登極凡登極之禮先期分遣官祗告天地太廟社稷至日五鼓各執事官入太和殿設寶案於御座前正中設詔案筆硯案表案陳法駕鹵簿樂懸均如儀内閣學士一人奉詔書禮部儀制司官奉表内閣中書奉筆硯均陳於案大學士一人率學士詣乾清門恭奉皇帝之寶至太和殿奉安寶案正中質明皇帝詣几筵前行祗告受命禮畢至側殿更禮服詣皇太后宮皇太后更吉服陞座皇帝行三跪九拜禮至時禮部堂官二人詣乾清門告時皇帝由乾清門左旁門出乘輿導引扈衛如儀午門鳴鐘鼓皇帝御中和殿内大臣侍衛内閣禮部都察院執事各官於殿前行禮畢各共執事禮部尚書一人進至檐下跪奏請即皇帝位皇帝御太和殿陞座鳴鞭王公百官行三跪九叩禮畢大學士奉詔詣寶案恭視學士用寶訖廼頒詔布告天下頒詔詳見儀禮成鳴鞭皇帝退朝至乾清門外降輿仍由左旁門入更衣還苫次大學士率學士奉寶至乾清門交貯大内是日宮懸大樂皆設而不作表陳而不宣餘儀均與大朝同尊崇凡恭上皇太后尊號徽號之禮遇國有大慶加晉鴻稱則有尊崇之儀均先期勅所司備儀物製册寳既諏吉分遣官祗告天地太廟後殿奉先殿社稷前期一日恭上皇太后奏書所司陳皇太后儀駕樂懸如常儀設案於中和殿及慈寧門均正中南嚮大學士朝服奉奏書至中和殿陳於案禮部堂官二人奏請閲奏書皇帝禮服乘輿出宫導引扈衛如常儀禮部堂官恭導至保和殿北階降輿詣中和殿奏書案前北嚮立祗閲訖大學士一人恭奉奏書禮部堂官二人前導詣慈寧宮皇帝乘輿從至永康左門外降輿入奉奏書大學士由慈寧門中階升郤立左門之東西面皇帝陞自東階西嚮立大學士一人由西階升立於西檐下宣讀官一人從升稍後立鴻臚寺鳴贊二人分立於東西檐下禮部尚書奏請皇太后御慈寧宮内監接奏皇太后禮服出宮中和韶樂作樂章與三大節同皇太后陞座樂止禮部尚書奏行禮恭導皇帝詣案南北嚮立大學士進至案前左右立鳴贊官奏跪皇帝跪大學士跪進奏書於右皇帝受奏書恭獻授於左大學士跪接奉奏書詣案跪陳興皆退自東西階降贊宣奏書宣讀官進至案前北面奉奏書跪宣訖陳於案興退自西階降奏拜興丹陛大樂作樂章與三大節同皇帝行三跪九拜禮樂止復位立中和韶樂作樂章與三大節同皇太后還宮樂止禮部尚書奏禮成恭導皇帝降階出永康左門乘輿還宮大學士以下皆退至日五鼓所司陳法駕鹵簿樂懸陳皇太后儀駕樂懸皆如儀設案於太和殿内又設案於慈寧門外暨階下均正中南嚮又設案於左門之東西嚮質明禮部堂官詣内閣奉金册金寶並册寶文於龍亭鑾儀校舁行禮部官前導至太和殿設册亭於案東寶亭於案西奉册寶陳於案皆退鴻臚官引王公由太和門左右門入序立丹陛上引公侯伯子男文武一二品官序立右翼門外三品以下各官序立午門外咸朝服届時禮部堂官奏請進册寶皇帝禮服乘輿出宮導引扈衛如常儀禮部堂官二人恭導至太和殿北階降輿詣册寶案前北嚮立祗閱訖奉册寶官奉安於龍亭鑾儀校舁行詣慈寧宮皇帝乘輿從禮部堂官前導王公暨文武二品以上官各於所立位跪候册寶龍亭御駕過興以次從至永康左門外皇帝降輿入龍亭至慈寧門東階下止奉册寶官恭奉金册寶陳於階下案大學士二人奉册文寶文由中階升陳於門左案退立於案東西面皇帝陞自東階西嚮立大學士二人由西階升立於西檐下宣讀官二人從升稍後立均東面鴻臚寺鳴贊二人立東西檐下王公文武二品以上官記注糾儀傳贊各官序立均與三大節同禮部尚書奏請皇太后御慈寧宮内監接奏皇太后禮服出宮樂作樂章與三大節同皇太后陞座樂止奉册寶官就案奉金册寶升中階陳於中案退自西階降禮部堂官恭導皇帝詣拜位北嚮立羣臣各就拜位大學士進至中案前左右立鳴贊官奏跪皇帝跪羣臣皆跪奏進册大學士跪進册文於右皇帝受册恭獻授於左大學士跪接詣中案跪陳興皆退奏進寶皇帝恭獻大學士跪進跪接如之皆退自東西階降贊宣册宣讀官進至案前北面奉册跪宣訖陳於案興退贊宣寶亦如之皆退自東西階降内監四人舁册寶案二人前引由中門入陳於慈寧宮門外正中奏拜興丹陞大樂作樂章與三大節同皇帝率羣臣行三跪九拜禮畢樂止恭導皇帝復位羣臣復位立中和韶樂作樂章與三大節同皇太后還宮樂止禮部尚書奏禮成恭導皇帝降階出永康左門乘輿還宮羣臣各退是日皇后禮服率妃嬪公主福晉命婦詣皇太后宮行慶賀禮次日皇帝御太和殿羣臣上表行禮頒詔布告天下直省文武官及四夷屬國進表稱賀均與三大節同欽定大清㑹典卷二十三
