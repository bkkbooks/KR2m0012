  text: 欽定四庫全書欽定大清會典卷三十五
  hash: sha256:cc0091473400c213ec1959691582560a738a29334912bd33ae943738935f4b8e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_035-1a, image: WYG0619/WYG0619-0274c.png}
body:
  text: 禮部儀制清吏司軍禮親征凡親征之禮皇帝將有討於弗庭者既卜日先期遣官祗告天地宗廟社稷太嵗頒行軍律令詳見兵部至日遣官致祭道路之神於天安門祭火炮之神於教場鑾儀衛陳騎駕鹵簿於午門外兵部陳八旗䝉古畫角十有六海螺二百於堂子街門外西嚮設御營黃龍大纛於堂子內門外設八旗護軍纛八火器營纛八於黃龍大纛後均北嚮所司豫設皇帝拜位於圜殿外甬道正中及大纛前從征王公將士咸征衣佩刀不從征之王公暨滿一品官咸采服至街門內東靣祗俟禮部堂官詣乾清門奏吉時皇帝御征衣佩刀出宫乘騎前引後扈如常儀駕發警蹕午門鳴鐘騎駕鹵簿前導至長安橋八旗鳴角軍鳴角護軍吹螺駕入堂子街門螺角止皇帝降騎禮部堂官二人恭導由內門中門入就圜殿外拜位南嚮立鴻臚官引王公於丹陛上衆官於丹陛下序立鳴贊官奏跪拜興皇帝率羣臣行三跪九拜禮畢恭導皇帝就大纛前拜位南嚮立引王公百官咸就拜位皇帝率從征將士及羣臣行三跪九拜禮不贊螺角齊鳴禮部尚書跪奏禮成皇帝屬櫜鞬乘騎導迎樂作奏祐平之章內大臣侍衛率親軍舉黃龍大纛隨行駕由都門出八旗官軍分翼陳列郭外皇帝出郭三舉炮官軍皆馬上俯伏候駕過不從征之王公百官咸采服於郊外跪送乃啓行軍士各整伍以次扈蹕每舍遠偵候設巡警詳見兵部如制所過名山大川及應祀風雨之神均遣官祗告六軍凱旋是日鑾儀衛陳法駕鹵簿自郊外五里設至堂子街門外在京王公以下有頂帶官以上咸采服出郭五里跪迎於道右京城紳士軍民各懸采設香案跪迎皇帝由都門入前引後扈如儀法駕鹵簿前導導迎鼓吹皆作駕詣堂子率從征不從征之王公一品官於圜殿行三跪九拜禮畢皇帝回鑾百官於午門外按翼跪迎王公隨至內金水橋候駕還宫皆退翼日遣官祗告天地宗廟社稷致祭陵寢行飲至禮凡從征將士皆與燕策勳行賞各有差擇吉禮部奏請皇帝御太和殿受羣臣表賀如大朝儀頒詔布告天下直省文武官咸奉表賀遣官祭隨營旗纛火炮之神於都門外教場分遣各官致祭嶽鎮海瀆前代帝王陵寢先師闕里乃告成太學勒石紀功以平定方略宣付史館命將凡命將之禮皇帝命大將軍統帥軍旅擇吉出師先期臨軒授敕印是日鑾儀衛陳法駕鹵簿大將軍率從征諸將咸采服集午門外內閣豫陳敕印於太和殿內東旁黃案皇帝御殿王公百官咸朝服侍班鴻臚官引大將軍由左階升至殿檐下大學士一人奉敕一人奉印出授大將軍大將軍跪受轉授內閣官跪接畢行三跪九叩禮興隨奉敕印官降左階出太和門中門皇帝還宫至日遣官祗告於奉先殿所司張黃幄於長安左門外設御座皇帝率大將軍詣堂子行禮拜纛均如儀禮畢御黃幄升座賜大將軍巵酒大將軍跪受飲畢屬櫜鞬乘馬文武大臣承詔餞於郊設祖帳禮兵二部堂官奉茶大將軍率從征將士望闕謝恩乃率大軍進發既涖營申明軍令肅隊啓行大軍凱旋次於近郊或御駕親臨或命廷臣迎勞還京日皇帝御太和殿大將軍由左階升奉上敕印行三跪九叩禮畢乃賜大將軍等燕及爵賞有差遣官以成功祗告天地宗廟社稷陵寢釋奠於先師均如儀王公內外文武百官咸奉表賀並勒碑太學命儒臣輯平定方略軍前受降露布入告得旨乃許成築壇於營左南嚮壇南百步建大旗降人匐伏前大將軍登壇納款宣上德意乃班師命重臣經略軍務亦如之若即軍中命大將軍以大臣充正副使齎敕印往封將至軍大將軍率所屬將辨詣教場豫設敕印案香案於聽事正中正副使至陳敕印於案大將軍詣香案前跪候宣敕畢正使奉敕副使奉印授大將軍大將軍跪受轉授左右將辨跪接行三跪九叩禮畢乃奉敕印回營視事獻俘凡獻俘之禮擇日皇帝遣官獻俘於太廟兵部官率解俘辨兵以白組繫俘頸由長安右門天安門右門入至太廟街門外北靣立候遣官至皆跪遣官入廟行禮復獻俘於社稷壇兵部官仍以俘跪候於社稷街門外遣官詣壇行禮畢兵部官率辨兵解俘出受俘凡受俘之禮獻俘之次日皇帝受俘於午門樓先期工部設御座於午門樓正中至日質明內大臣率侍衛咸采服立兩觀翼樓階上護軍統領率護軍立階下均佩刀環衛武備院張黃蓋於樓檐外鑾儀衛設丹陛鹵簿於闕下丹墀鹵簿於闕左右門南金鼓鐃歌於鹵簿前樂部和聲署設丹陛大樂於鹵簿之末內閣大學士學士翰林院學士都察院左都御史左副都御史於丹陛鹵簿之左右王公於丹陛鹵簿外文武各官於丹墀鹵簿外均按翼東西序立糾儀御史鴻臚寺官各分班立均與太和殿大朝禮同兵刑二部尚書侍郎立於右翼丹墀鹵簿外兵部官率解俘將校押俘立俟於右翼金鼓外刑部官立於兵部之次禮部堂官詣乾清門請駕皇帝御龍袍衮服乘輿出宫午門鳴鐘前引後扈如常儀駕至太和門鳴金鼓奏鐃歌皇帝升午門樓至檐前降輿升座樂止宣旨大臣二人立於階下鴻臚官贊排班以下行禮皆有贊引解俘將校進至御道西北靣立樂作將校行三跪九叩禮畢退立原位受俘兵部官率將校引俘至金鼓下跪兵刑二部堂官均趨至午門前兵部尚書跪奏平定某地所獲俘囚某等謹獻闕下宣旨大臣宣制曰所獻俘交刑部刑部堂官跪領旨兵部官引俘出金鼓外交刑部官刑部官械俘出施行若得旨赦俘罪宣制釋縛俘叩首畢將校引由天安門右門出丹陛大樂作王公百官各就拜位行三跪九叩禮畢樂止禮成鳴金鼓奏鐃歌皇帝乘輿還宫王以下各官皆退是日賜解俘辨兵銀幣有差欽定大清會典卷三十五
