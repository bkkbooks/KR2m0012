front:
  text: 欽定四庫全書欽定大清會典卷二十一
  hash: sha256:215225fada1633b9841396cb9c7a5f420079e8cb053d04a42d6db40ac1e082ee
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_021-1a, image: WYG0619/WYG0619-0170c.png}
body:
  text: 禮部儀制清吏司朝會二凡大朝之禮元日長至次日萬夀聖節皆豫月由部疏請御殿受賀得旨先期戒百執事至日五鼓鑾儀使率官校至太和殿前陳法駕鹵簿樂部率和聲署陳樂懸儀制司郎中奉在京王公百官賀表入殿內陳左楹表案內閣中書奉筆硯陳右楹案上皆退質明王公暨文武一二品官從皇帝朝於皇太后宫三品以下官會午門闕下均行禮畢儀别具鴻臚官引王公暨一二品官入右翼門引三品以下官入左右掖門東班由昭德門西班由貞度門外國使臣從西班咸入就位立禮部堂官二人詣乾清門奏請御殿午門鳴鐘鼓領侍衛內大臣二人率豹尾班執槍侍衛十人佩刀侍衛十人立於乾清門外禮部堂官二人立於乾清門階下前引大臣十人立於太和殿後階下祗俟導引皇帝乘輿出乾清門後扈內大臣二人及御前乾清門侍衛從禮部堂官二人恭導由保和殿御中和殿座侍班導從官於殿前行三跪九叩禮不贊禮畢侍班官趨出各就班位立駕興禮部堂官二人暨十大臣前導後扈如初中和韶樂作皇帝御太和殿升寶座導從官各就位立樂止鑾儀衛官進至中階之右三傳鳴鞭階下三鳴鞭退復位鳴贊官贊排班丹陛大樂作鴻臚官引王公百官各就拜位班齊贊進衆進贊跪衆跪贊宣表宣表官入殿左門詣表案前奉表出大學士二人同至殿簷下宣表官正中北面跪大學士二人左右跪展表樂暫止宣表官宣訖奉表還於案復位立樂作鳴贊官贊叩興王公百官行三跪九叩禮畢樂止引退復位立次引外國使臣就拜位樂作贊跪叩興各行三跪九叩禮畢樂止引退復位立賜羣臣坐諸王公由殿左右門入大學士由殿左門入就位內大臣等各就本立位均跪行一叩禮坐賜王公以下文官三品武官二品以上暨外國使臣茶受茶及坐飲畢皆行一叩禮鑾儀衛官傳鳴鞭如初衆皆興階下三鳴鞭駕興中和韶樂作還宫樂止鴻臚官引王公百官各以次退凡內朝之禮元日長至次日萬夀聖節及恭遇國家慶典內監設中和韶樂於乾清宫簷下設丹陛大樂於乾清門內均左右北嚮皇帝御太和殿受羣臣朝賀畢乘輿還宫入至乾清宫簷下降輿中和韶樂作樂章與外朝同後仿此皇帝御座樂止內監引皇后率貴妃妃嬪具禮服詣乾清宫皇后就正中拜位立貴妃妃嬪稍後左右立均北面丹陛大樂作奏雍平之章行六肅三跪三拜禮畢樂止皇后率貴妃妃嬪各回後宫內監引皇子由東西階升丹陛就拜位立東班西上西班東上均北面丹陛大樂作行三跪九叩禮畢樂止退立兩旁北上東西面立中和韶樂作皇帝降座樂止皇子各退盛京三大節朝賀之禮是日漏未盡內務府官詣崇政殿啓扉拂拭御座禮部官恭設香案於殿外正中黎明將軍及戶禮兵刑工五部侍郎率所屬官辨按旗分左右翼於丹墀內列九班班如其品奉天府尹丞治中通判京縣等官從右翼協領參領視府尹暨丞降一等東班西上西班東上朝服行禮與京師同直省三大節朝賀之禮於行禮公所恭設萬夀龍亭於正中南嚮設香案於亭南將軍總督巡撫提督學政率所屬官辨文東武西於階下列班行禮分駐之提鎮道府州縣率僚屬行禮與省會同凡常朝之禮先期由鴻臚寺奏請御殿得旨戒百執事至日各入陳設如儀鴻臚官引王公由午門左右門入太和門左右門引百官由午門左右掖門入昭德門貞度門各就立位鴻臚卿二人鳴贊官二人詣乾清門請駕前導皇帝御太和殿受朝謝恩官暨見朝辭朝各官以次出班就拜位行禮外國使臣之以時至者行禮亦如之禮畢皇帝還宫餘儀與大朝同若常朝日皇帝不御殿王公會太和門階上百官會闕下左右門之南若皇帝行幸駐蹕王公百官均會午門前王公於闕下百官於闕門之南咸朝服按朝班東西列坐如儀糾儀用御史二人吏部禮部司官各二人坐班首御史二人吏部禮部司官各二人坐班末東班西面西班東面皆北上每月左右翼王公分單日雙日常服列坐月朔及月之十日二十日王公分翼暨八旗武官咸補服列坐班位均如常朝元日萬夀聖節均七日上元節三日上三旗四品以上官於太和門外五品以下暨下五旗官於午門外咸朝服列坐亦如之盛京文武官遇月朔及每旬五日咸朝服會崇政殿八旗朝堂前按班列坐班視三大節皆東西面北上與京師同凡御門聽政之禮先期內閣得旨傳知各部院官至日黎明咸集俟侍衛傳旨宣入乃魚貫以進皇帝升座記注官由西階升翰林科道至西階下咸就位立部院奏事官由東階升尚書一人奉疏折旋而西餘入就位西面跪奉疏者至正中北面進詣黃案前跪恭設於案興少退趨至左楹轉入班跪奏某事畢興少退循東階左降其次各班依序進奏如前儀吏部引見各部院屬官畢退內閣侍讀學士二人升東階詣案前跪奉奏疏退降階翰林科道暨侍衛皆退大學士學士升自東階以次跪御榻之左西面北上記注官進立御榻之右滿內閣學士一人奉折本至黃案前北面跪奏每奏一事皇帝降旨大學士學士承旨訖興由東階降記注官由西階降皇帝還宮皆退欽定大清會典卷二十一
