  text: 欽定四庫全書欽定大清會典卷九十四
  hash: sha256:4395fe9d36c6bb23a1ace336070f4cbf318d34f77a43bdba499baba6b08b1d46
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_094-1a, image: WYG0619/WYG0619-0870a.png}
body:
  text: 領侍衞府國初以八旗將士平定海内鑲黄正黄正白三旗皆天子所自將爰選其子弟命曰侍衞用備隨侍宿衞統以勲戚大臣視古虎賁旅賁氏職綦重焉領侍衞内大臣六人三旗各二人内大臣六人散秩大臣無定員掌統領侍衞親軍以先後宸御左右翊衞侍衞一等六十人二等百五十人三等四等二百七十人藍翎侍衞九十人三旗宗室侍衞一等九人二等十有八人三等六十三人每十人各設什長一人御前侍衞乾清門侍衞皆無定員於三旗侍衞内簡擢隨印協理事務侍衞班領十有二人於班領署班領什長内選用漢侍衞無定員分一二三等及藍翎侍衞同主事一人筆帖式十有二人貼寫筆帖式十有五人掌辦理章奏收發文移凡宿衞更畨輪直凡六班班分兩翼各設侍衞班領一人署班領一人侍衞三十人宿衞乾清門為内班散秩大臣一人侍衞親軍十人宿衞中和殿侍衞什長三人侍衞親軍三十人宿衞太和門為外班以領侍衞内大臣一人總統之内大臣散秩大臣二人隨班入直行幸駐蹕宿衞一如宫禁之制凡扈從後扈二人於領侍衞内大臣内簡命前引十人於内大臣散秩大臣曁統領副都統内簡用豹尾班侍衞於三旗侍衞内選功臣後裔六十人日以二十人直後左門乘輿出入以十人執豹尾槍十人佩儀刀侍於乾清門階下左右駕出豹尾班侍衞殿於後以領侍衞内大臣一人侍衞班領二人領之駕還宫隨至乾清門退歸直皇帝詣皇太后宫行禮前引大臣自隆宗門内導引至慈寧門階止豹尾班至門階下牆角左右止立後扈大臣隨升階稍後立皇帝御殿前引大臣自太和殿後導引由寳座兩旁趨至寳座前左右東西面立後扈大臣二人自宫内隨出升至御座左右僉立豹尾班於寳座後左右南嚮立躬祀壇廟以一二等侍衞二十人佩弓矢竢於太和門於豹尾班之次隨行前引後扈大臣均佩刀引扈如儀南郊前引大臣立於三成階上豹尾班立於内壝門外祈年殿太廟前引大臣立於第一成階上殿門前豹尾班立於三成階下北郊日壇月壇前引大臣立於階下豹尾班立於内壝門外社稷壇前引大臣立於内壝門外豹尾班立於拜殿南門外展拜堂子前引大臣立於甬道北豹尾班立於祭神殿兩旁先農壇前引大臣立於階下豹尾班立於樂懸南均分左右序立後扈大臣均隨升降於皇帝後左右僉立廵狩方岳御前大臣侍衞曁乾清門侍衞均隨從輪直侍衞以二班或三班隨從日行以侍衞二十人前導左右各十人豹尾班侍衞二十人扈從領侍衞内大臣侍衞班領率之次二班侍衞列隊行次王公一二品文武大臣隨行次領侍衞内大臣或内大臣散秩大臣一人侍衞什長二人率黄龍大纛行餘侍衞曁扈從各官均於大纛後以次行仍分令侍衞稽察踰越喧譁者駐蹕行營以内大臣一人散秩大臣二人入直御前内大臣侍衞暨乾清門侍衞分宿御營兩廂御營黄幔城旌門以侍衞班領一人署班領一人内班侍衞二十人四隅班領二人署班領二人率内班侍衞各十人網城門内以侍衞什長三人率外班侍衞親軍三十人環共宿衞大閲日前引後扈大臣均甲胄前引後扈豹尾班侍衞甲胄殿後如儀御前大臣侍衞等均甲胄隨行其次黄龍大纛隨行上三旗侍衞親軍均甲胄按次隨行駕御帳殿豹尾班侍衞按翼排列左右建設黄龍大纛三旗侍衞親軍按隊環衞凡常朝三旗領侍衞内大臣内大臣散秩大臣侍衞除直宿出差外日於黎明㑹集於太和門按翼坐班凡朝㑹班次嵗於十二月將應入坐次之一品大臣散秩大臣前鋒䕶軍統領曁外省来京將軍都統職名開列進呈恭候欽定凡升除領侍衞内大臣員闕除奉特㫖補授外將滿洲都統内大臣散秩大臣前鋒䕶軍統領曁各省滿洲將軍職名開列具奏恭候簡命内大臣員闕以散秩大臣曁都統前鋒䕶軍統領各省滿洲將軍職名開列亦如之散秩大臣多由特恩補授或人員不敷於宗室鎮國輔國公鎮國輔國將軍宗室一等侍衞曁公侯伯子男内簡選引見或授散秩大臣或署散秩大臣恭候欽定世襲散秩大臣員闕移咨該旗將應襲人員開送引見補授鑾儀衞掌衞事内大臣員闕由府以領侍衞内大臣内大臣列名疏請補授隨印協理事務侍衞班領員闕於侍衞班領署班領什長内不論等級遴選引見補授侍衞班領員闕於署班領什長内遴選署班領什長員闕於侍衞内遴選均引見補授侍衞初選均授為三等侍衞藍翎侍衞嵗以冬月推升一等侍衞員闕以二等侍衞引見升補二等三等侍衞員闕以次遞行引見升補至勲戚後裔内有特㫖初選卽授為一二等侍衞者卽坐補本旗員闕宗室侍衞不論鎮國輔國奉國奉恩將軍先選三等四等侍衞遇闕以次升補亦如之上駟院侍衞每旗七人司轡司鞍侍衞無定員隸上駟院其兼尚虞鷹鷂房鶻房狗房十五善射善騎射善射鵠善强弓善撲䓁處侍衞各有専管統在三旗額内無定員漢一等侍衞以一甲一名武進士補授二等以一甲二名三名武進士補授三等於二甲内簡選藍翎侍衞於三甲内簡選侍衞主事員闕於三旗侍衞筆帖式内遴選引見補授移咨吏部注册照保題例按俸升轉筆帖式員闕於貼寫筆帖式内按資開列咨吏部考試補用三年期滿如題留者候補本府主事移送吏部者調選貼寫筆帖式員闕於親軍内考試補用凡習射三旗侍衞按期於該旗侍衞教場騎射二次歩射六次領侍衞内大臣曁侍衞班領察驗遇閲軍器之年更番擐甲胄騎射親軍按期習騎射於侍衞教場協理事務侍衞班領及親軍校察驗凡考察遇京察之年主事筆帖式由領侍衞内大臣甄别賢否册送吏部都察院吏科京畿道考覈侍衞例不入兵部軍政有庸惰老疾者班領什長隨時呈領侍衞内大臣覈奏以别去留欽定大清㑹典巻九十四
