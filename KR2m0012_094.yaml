front:
  text: 欽定四庫全書欽定大清會典卷九十四
  hash: sha256:4395fe9d36c6bb23a1ace336070f4cbf318d34f77a43bdba499baba6b08b1d46
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_094-1a, image: WYG0619/WYG0619-0870a.png}
body:
  text: 領侍衛府國初以八旗將士平定海內鑲黃正黃正白三旗皆天子所自將爰選其子弟命曰侍衛用備隨侍宿衛統以勳戚大臣視古虎賁旅賁氏職綦重焉領侍衛內大臣六人三旗各二人內大臣六人散秩大臣無定員掌統領侍衛親軍以先後宸御左右翊衛侍衛一等六十人二等百五十人三等四等二百七十人藍翎侍衛九十人三旗宗室侍衛一等九人二等十有八人三等六十三人每十人各設什長一人御前侍衛乾清門侍衛皆無定員於三旗侍衛內簡擢隨印協理事務侍衛班領十有二人於班領署班領什長內選用漢侍衛無定員分一二三等及藍翎侍衛同主事一人筆帖式十有二人貼寫筆帖式十有五人掌辦理章奏收發文移凡宿衛更畨輪直凡六班班分兩翼各設侍衛班領一人署班領一人侍衛三十人宿衛乾清門為內班散秩大臣一人侍衛親軍十人宿衛中和殿侍衛什長三人侍衛親軍三十人宿衛太和門為外班以領侍衛內大臣一人總統之內大臣散秩大臣二人隨班入直行幸駐蹕宿衛一如宫禁之制凡扈從後扈二人於領侍衛內大臣內簡命前引十人於內大臣散秩大臣暨統領副都統內簡用豹尾班侍衛於三旗侍衛內選功臣後裔六十人日以二十人直後左門乘輿出入以十人執豹尾槍十人佩儀刀侍於乾清門階下左右駕出豹尾班侍衛殿於後以領侍衛內大臣一人侍衛班領二人領之駕還宫隨至乾清門退歸直皇帝詣皇太后宫行禮前引大臣自隆宗門內導引至慈寧門階止豹尾班至門階下牆角左右止立後扈大臣隨升階稍後立皇帝御殿前引大臣自太和殿後導引由寶座兩旁趨至寶座前左右東西面立後扈大臣二人自宫內隨出升至御座左右僉立豹尾班於寶座後左右南嚮立躬祀壇廟以一二等侍衛二十人佩弓矢俟於太和門於豹尾班之次隨行前引後扈大臣均佩刀引扈如儀南郊前引大臣立於三成階上豹尾班立於內壝門外祈年殿太廟前引大臣立於第一成階上殿門前豹尾班立於三成階下北郊日壇月壇前引大臣立於階下豹尾班立於內壝門外社稷壇前引大臣立於內壝門外豹尾班立於拜殿南門外展拜堂子前引大臣立於甬道北豹尾班立於祭神殿兩旁先農壇前引大臣立於階下豹尾班立於樂懸南均分左右序立後扈大臣均隨升降於皇帝後左右僉立巡狩方嶽御前大臣侍衛暨乾清門侍衛均隨從輪直侍衛以二班或三班隨從日行以侍衛二十人前導左右各十人豹尾班侍衛二十人扈從領侍衛內大臣侍衛班領率之次二班侍衛列隊行次王公一二品文武大臣隨行次領侍衛內大臣或內大臣散秩大臣一人侍衛什長二人率黃龍大纛行餘侍衛暨扈從各官均於大纛後以次行仍分令侍衛稽察踰越喧譁者駐蹕行營以內大臣一人散秩大臣二人入直御前內大臣侍衛暨乾清門侍衛分宿御營兩廂御營黃幔城旌門以侍衛班領一人署班領一人內班侍衛二十人四隅班領二人署班領二人率內班侍衛各十人網城門內以侍衛什長三人率外班侍衛親軍三十人環共宿衛大閲日前引後扈大臣均甲胄前引後扈豹尾班侍衛甲胄殿後如儀御前大臣侍衛等均甲胄隨行其次黃龍大纛隨行上三旗侍衛親軍均甲胄按次隨行駕御帳殿豹尾班侍衛按翼排列左右建設黃龍大纛三旗侍衛親軍按隊環衛凡常朝三旗領侍衛內大臣內大臣散秩大臣侍衛除直宿出差外日於黎明會集於太和門按翼坐班凡朝會班次嵗於十二月將應入坐次之一品大臣散秩大臣前鋒護軍統領暨外省來京將軍都統職名開列進呈恭候欽定凡升除領侍衛內大臣員闕除奉特旨補授外將滿洲都統內大臣散秩大臣前鋒護軍統領暨各省滿洲將軍職名開列具奏恭候簡命內大臣員闕以散秩大臣暨都統前鋒護軍統領各省滿洲將軍職名開列亦如之散秩大臣多由特恩補授或人員不敷於宗室鎮國輔國公鎮國輔國將軍宗室一等侍衛暨公侯伯子男內簡選引見或授散秩大臣或署散秩大臣恭候欽定世襲散秩大臣員闕移咨該旗將應襲人員開送引見補授鑾儀衛掌衛事內大臣員闕由府以領侍衛內大臣內大臣列名疏請補授隨印協理事務侍衛班領員闕於侍衛班領署班領什長內不論等級遴選引見補授侍衛班領員闕於署班領什長內遴選署班領什長員闕於侍衛內遴選均引見補授侍衛初選均授為三等侍衛藍翎侍衛嵗以冬月推升一等侍衛員闕以二等侍衛引見升補二等三等侍衛員闕以次遞行引見升補至勳戚後裔內有特旨初選即授為一二等侍衛者即坐補本旗員闕宗室侍衛不論鎮國輔國奉國奉恩將軍先選三等四等侍衛遇闕以次升補亦如之上駟院侍衛每旗七人司轡司鞍侍衛無定員隸上駟院其兼尚虞鷹鷂房鶻房狗房十五善射善騎射善射鵠善強弓善撲等處侍衛各有専管統在三旗額內無定員漢一等侍衛以一甲一名武進士補授二等以一甲二名三名武進士補授三等於二甲內簡選藍翎侍衛於三甲內簡選侍衛主事員闕於三旗侍衛筆帖式內遴選引見補授移咨吏部注册照保題例按俸升轉筆帖式員闕於貼寫筆帖式內按資開列咨吏部考試補用三年期滿如題留者候補本府主事移送吏部者調選貼寫筆帖式員闕於親軍內考試補用凡習射三旗侍衛按期於該旗侍衛教場騎射二次步射六次領侍衛內大臣暨侍衛班領察驗遇閲軍器之年更番擐甲胄騎射親軍按期習騎射於侍衛教場協理事務侍衛班領及親軍校察驗凡考察遇京察之年主事筆帖式由領侍衛內大臣甄别賢否册送吏部都察院吏科京畿道考核侍衛例不入兵部軍政有庸惰老疾者班領什長隨時呈領侍衛內大臣核奏以别去留欽定大清會典卷九十四
