front:
  text: 欽定四庫全書欽定大清㑹典卷四十三
  hash: sha256:a19600a2da102de9fd84123d5b7cec56d89ac40367807519f5f2861cda010c04
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_043-1a, image: WYG0619/WYG0619-0346c.png}
body:
  text: 禮部祠祭清吏司大祀四凡祭社稷之禮崇建社稷壇於端門之右為壇二成上敷五色土如其方色嵗春祈秋報皆以仲月上戊日祭太社太稷之神以后土句龍氏后稷氏配太社位右太稷位左均北嚮后土句龍氏東位西嚮后稷氏西位東嚮太社太稷各方圭一色一黃一青帛一牛一羊一豕一登一鉶二簠簋各二籩豆各十有二尊一玉爵一陶爵二爐一鐙二后土句龍氏后稷氏各帛一牛一羊一豕一登一鉶二簠簋各二籩豆各十有二尊一陶爵三爐一鐙二先祭一日樂部設中和韶樂於壇下分左右懸祭日鑾儀衛陳法駕鹵簿於午門外陳金輦於太和門階下日出前四刻太常卿詣乾清門告時皇帝御祭服乘禮輿出宫內大臣侍衛前引後扈如常儀至太和門階下降輿乘輦駕發警蹕午門鳴鐘法駕鹵簿前導不陪祀王以下各官咸朝服跪送導迎鼓吹設而不作皇帝由闕右門至壇北門外神路右降輦贊引太常卿二人恭導入壇北門右門詣㦸門幄次禮部尚書率太常官恭請神位安奉畢太常卿奏請行禮皇帝出幄次盥洗贊引官恭導皇帝至內壝北門外拜位前南嚮立鴻臚官引陪祀王公至拜殿南百官至拜殿東西隅各就位序立典儀官贊樂舞生登歌執事官各共乃職以下自迎神至送神望瘞皆典儀官唱贊武舞八佾進贊引官奏就位皇帝就拜位立乃瘞毛血迎神司香官二人奉香盤升壇司樂官贊舉迎神樂奏登平之章凡舉樂皆司樂官唱贊後同贊引官奏升壇恭導皇帝進內壝北門升壇詣太社位前司香官跪進香贊引官奏跪皇帝跪奏上香皇帝上柱香次三上瓣香興次詣太稷位前上香儀同奏復位皇帝復位司香官二人以次升壇詣東西配位前上香畢退贊引官奏跪拜興以下跪拜興皆有奏皇帝行三跪九拜禮王公百官均隨行禮奠玉帛行初獻禮司玉帛官奉篚司爵官奉爵各升壇詣太社太稷位前奏茂平之章舞干戚之舞司玊帛官跪奠玊帛三叩司爵官跪獻爵奠正中配位前奠帛獻爵儀同皆退司祝至祝案前跪三叩奉祝版興升壇稍西跪樂暫止皇帝跪羣臣皆跪司祝讀祝畢詣太社位前跪安於案三叩退樂作皇帝率羣臣行三拜禮興樂止武功之舞退文舞八佾進行亞獻禮奏育平之章舞羽籥之舞司爵官詣神位前跪獻爵奠於左儀如初獻行終獻禮奏敦平之章舞同亞獻司爵官跪獻爵奠於右儀如亞獻樂止文德之舞退太常官贊賜福胙光祿卿二人自壇下西案奉福胙升壇進至神位前拱舉降階出內壝北門立皇帝拜位之右侍衛二人進立於左皇帝跪左右執事官皆跪右官進福酒皇帝受爵拱舉授左官進胙受胙亦如之三拜興率羣臣行三跪九拜禮徹饌奏博平之章有司奉方圭退送神奏樂平之章皇帝率羣臣行三跪九拜禮有司奉祝次帛次饌次香恭送瘞所皇帝轉立拜位旁西嚮候祝帛過復位乃望瘞奏徵平之章恭導皇帝詣望瘞位望瘞奏禮成恭導皇帝由㦸門出禮部尚書率太常官恭請神位還御皇帝至壇北門外神路右升禮輿法駕鹵簿前導導迎樂作奏祐平之章皇帝回鑾王公從各官以次退不陪祀王公百官朝服於午門外跪迎午門鳴鐘王公隨駕入至內金水橋恭候皇帝還宫各退因事祗告遣官將事太常卿率所屬恭請太社太稷神位奉安壇上陳帛二尊爵爐鐙如常祭薦脯醢果實太常贊禮郎二人引遣官入社稷街門由壇南門入循內壝西行至內壝北門外拜位行禮餘儀均與常祭同嵗孟夏常雩後不雨既祈神祇太嵗如未應越七日乃祈於太社太稷並設配位薦玉遣官素服將事作樂行禮樂章迎神奏延豐奠玊帛初獻奏介豐亞獻奏滋豐終獻奏霈豐徹饌奏綏豐送神奏貽豐望瘞奏溥豐文武官應陪祭者咸與祈禱其儀物與因事祗告同得雨報祭與常祭同水潦祈晴冬旱祈雪禮亦如之直省府州縣各擇爽塏之地建社稷壇均北嚮嵗以春秋仲月上戊日為民祈報會城則總督若巡撫主之道官分治各府者於所治主其祭其餘府州縣皆正官將事以各學教官紏儀生員充禮生會城以丞倅府州縣以掾史執事社稷位前各帛一鉶二簠二簋二籩四豆四爵三共羊一豕一尊一祭日雞初鳴承祭官以下咸朝服齊集黎明贊引禮生二人引承祭官詣盥洗所盥洗通贊禮生贊執事者各司其事以下自迎神至望瘞皆唱贊贊引禮生贊就位引承祭官至階前拜位立引班禮生二人分引陪祭官文東武西班與外省朝賀同各就拜位序立乃迎神贊引贊升壇引承祭官升壇詣香案前司香跪奉香贊引贊上香承祭官三上香贊復位引承祭官降復位贊跪叩興以下行禮皆有贊承祭官行三跪九叩禮陪祭各官皆隨行禮奠帛初獻爵司帛奉篚進跪奠篚司爵奉爵進獻爵奠正中皆退司祝禮生至祝案前跪承祭官暨陪祭各官皆跪司祝讀祝畢詣神位前跪安於案叩如初退承祭官暨陪祭各官行三叩禮亞獻爵奠於左終獻爵奠於右均儀如初獻乃徹饌送神承祭官行三跪九叩禮陪祭各官皆隨行禮司祝奉祝司帛奉帛恭送瘞所承祭官轉立拜位西旁東面候祝帛過復位引至望瘞位望瘞贊引告禮成引退衆皆退欽定大清會典卷四十三
