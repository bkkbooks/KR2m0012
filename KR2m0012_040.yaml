  text: 欽定四庫全書欽定大清會典卷四十
  hash: sha256:d6117d4ed90ea93837ba9a75c93c0cdbbb2f935136e2ca38cbec9a4175edc7c6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_040-1a, image: WYG0619/WYG0619-0308c.png}
body:
  text: 禮部祠祭清吏司大祀三凡饗太廟之禮崇建太廟於端門之左前殿為饗祫行禮之地後殿中室奉安肇祖原皇帝原皇后神位左一室奉安興祖直皇帝直皇后神位右一室奉安景祖翼皇帝翼皇后神位左二室奉安顯祖宣皇帝宣皇后神位中殿中室奉安太祖高皇帝孝慈高皇后神位左一室奉安太宗文皇帝孝端文皇后孝莊文皇后神位右一室奉安世祖章皇帝孝惠章皇后孝康章皇后神位左二室奉安聖祖仁皇帝孝誠仁皇后孝昭仁皇后孝懿仁皇后孝恭仁皇后神位右二室奉安世宗憲皇帝孝敬憲皇后神位均設几陳玉册玉寶篋並設牀榻衾枕楎椸帷幔如事生儀前殿東廡配饗通達郡王武功郡王武功郡王福晉慧哲郡王慧哲郡王福晉宣獻郡王宣獻郡王福晉怡賢親王西廡配饗信勇公費英東𢎞毅公額宜都武勳王揚古利果毅公圖爾格雄勇公圖賴忠達公圖海超勇襄親王䇿淩勤襄伯鄂爾泰大學士張廷玉每嵗孟春上旬諏吉夏秋冬以孟月朔行時饗禮嵗除前一日行大祫禮時饗之日恭奉後殿列祖列后神位於殿中寶座皆南嚮奉中殿列聖列后神位於前殿寶座太祖位南嚮列聖以昭穆序東西嚮前殿皇帝恭詣行禮後殿遣官將事帝后同案皆牛一羊一豕一簠二簋二籩十有二豆十有二爐一鐙二各帛一登一鉶一尊一玉爵三金匕一金箸二帛共篚牲共俎尊實酒疏布羃勺具東廡五案皆牛一羊一豕一簠二簋二籩十豆十爐一鐙二各帛一鉶一爵三共尊三西廡九案皆羊一豕一鉶一簠一簋一籩四豆四爐一鐙二各帛一爵三共尊五帛各實於篚牲俎尊酒羃勺具大饗前一日樂部設中和韶樂於前殿第一成階上分左右懸祭日鑾儀衛陳法駕鹵簿於午門外金輦於太和門階下日出前四刻太常卿詣乾清門告時皇帝御祭服乘禮輿出宫內大臣侍衛前引後扈如常儀至太和門階下降輿乘輦駕發警蹕午門嚴鼓法駕鹵簿前導不陪祀王以下文武各官咸朝服跪送導迎鼓吹設而不作皇帝由太廟街門左門入至外垣南門外神路右降輦贊引太常卿二人恭導皇帝由太廟南門左門入至戟門幄次公一人率覺羅官詣後殿上香行禮恭請神位安奉殿中寶座王一人率宗室官詣中殿上香行禮恭請神位安奉前殿寶座畢太常卿奏請行禮皇帝出幄次盥洗贊引太常卿恭導皇帝由戟門左門入升左階入前殿左門就拜位前北嚮立太常贊禮郎引分獻官至階前夾甬道立鴻臚官引陪祀王公位殿外階上陪祀百官位階下左右序立均北面典儀官贊樂舞生登歌執事官各共乃職以下自迎神至徹饌皆典儀官唱贊武舞八佾進贊引官奏就位皇帝就拜位立乃迎神司香官各奉香盤進司樂官贊舉迎神樂奏貽平之章凡舉樂皆司樂官唱贊後同贊引官奏詣香案前恭導皇帝詣太祖高皇帝香案前司香官跪進香贊引官奏跪皇帝跪奏上香皇帝上柱香次三上瓣香興以次詣列聖香案前上香儀同奏復位皇帝復位奏跪拜興凡行禮復位皆有奏後同皇帝行三跪九拜禮王公百官均隨行禮奠帛爵行初獻禮宗室司帛官奉篚司爵官奉爵各詣列聖列后神位前奏敉平之章舞干戚之舞司帛官跪奠帛三叩司爵官立獻爵奠正中皆退兩廡分獻官上香執事生奠帛獻爵各如儀司祝至祝案前跪三叩奉祝版跪案左樂暫止皇帝跪羣臣皆跪司祝讀祝畢奉祝版詣太祖神位前跪安於案三叩退樂作皇帝率羣臣行三拜禮興樂止武功之舞退文舞八佾進行亞獻禮奏敷平之章舞羽籥之舞司爵官獻爵奠於左儀如初獻行終獻禮奏紹平之章舞同亞獻司爵官獻爵奠於右儀如亞獻兩廡畢獻儀如初樂止文德之舞退太常官贊賜福胙光祿卿二人就東案奉福胙進至太祖位前拱舉降立於皇帝拜位之右侍衛二人進立於左皇帝跪左右執事官咸跪右官進福酒皇帝受爵拱舉授左官進胙受胙亦如之三拜興率羣臣行三跪九拜禮徹饌奏光平之章徹饌畢太常官跪告禮成於神三叩退舉還宮樂奏乂平之章皇帝率羣臣行三跪九拜禮有司奉祝次帛次香恭送燎所皇帝轉立拜位旁西嚮候祝帛過復位樂作祝帛燎半奏禮成恭導皇帝由戟門左門出先是於皇帝入戟門幄次時太常贊禮郎二人引後殿承祭官至殿垣門右東面立俟皇帝入戟門贊引官引後殿承祭官入右門升自右階至殿外中階拜位前北面立典儀官贊執事官各共乃職以下奠獻皆典儀官唱贊贊引官贊就位引承祭官就拜位立司香官奉香盤進贊引官贊詣香案前引承祭官由殿右門入詣香案前司香官跪奉香贊引官贊跪承祭官跪贊上香承祭官上柱香次三上瓣香興以次詣各香案前上香儀同贊復位引承祭官出殿右門復位贊跪叩興以下行禮皆有贊承祭官行三跪九叩禮奠帛爵行初獻禮覺羅司帛官奉篚詣案前跪奠帛三叩司爵官奉爵立獻奠正中皆退司祝至祝案前跪三叩奉祝版跪案左承祭官跪司祝讀祝畢奉祝版詣正中神位前跪安於案叩如初退承祭官行三叩禮次亞獻司爵官獻爵奠於左次終獻司爵官獻爵奠於右均如初獻儀承祭官行三跪九叩禮有司奉祝次帛次香恭送燎所承祭官轉立西旁東面候過復位祝帛燎半告禮成引承祭官仍降自西階由戟門右門出王公二人率宗室覺羅官恭請前殿神位還御中殿寢室後殿神位還御後殿寢室上香行禮如前儀皇帝至外垣南門外神路右升禮輿法駕鹵簿前導導迎樂作奏祐平之章皇帝回鑾王公從各官以次退不陪祀王公百官朝服於午門外跪迎午門鳴鐘王公隨駕入至內金水橋恭候皇帝還宮各退歲暮大祫日王公二人各率宗室官恭奉後殿中殿列聖列后神位安奉前殿寶座肇祖原皇帝原皇后興祖直皇帝直皇后景祖翼皇帝翼皇后顯祖宣皇帝宣皇后太祖高皇帝孝慈高皇后皆南嚮太宗文皇帝孝端文皇后孝莊文皇后世祖章皇帝孝惠章皇后孝康章皇后聖祖仁皇帝孝誠仁皇后孝昭仁皇后孝懿仁皇后孝恭仁皇后世宗憲皇帝孝敬憲皇后以昭穆序東西嚮樂六奏迎神奏開平初獻肅平亞獻協平終獻裕平徹饌諴平還宮成平餘儀均與時饗同大祫前一日遣官一人祗告後殿一人祗告中殿內監恭啓各寢室帷幕執事官各陳帛篚及尊爵爐鐙如常祭薦脯醢果實太常贊禮郎引遣官由廟街門右門戟門右門入經前殿西分詣後殿中殿皆升自西階至中階上拜位行禮詣列聖位前上香出入由殿右門祝帛送燎所避立拜位西旁東面均與後殿時饗同因事祗告天地宗社則告於太廟中殿若同時並告奉先殿則告於太廟後殿將事之儀均與大祫祗告同如皇帝親祗告於中殿王公陪祀百官不陪祀出入由殿左門於殿內行禮餘與祗告同欽定大清會典卷四十
