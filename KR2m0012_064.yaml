front:
  text: 欽定四庫全書欽定大清㑹典卷六十四
  hash: sha256:bdf261f0f588c73cd995c8e2b22179b29d85d595fb7d8d957ca437dbc5e773d1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_064-1a, image: WYG0619/WYG0619-0556a.png}
body:
  text: 兵部職方清吏司軍政凡軍政五年一舉考察中外武職以定黜陟注上考者薦舉卓異注下考者糾劾均具疏以聞不入舉劾者以中平注考彚册送部以備稽覈凡軍政薦舉奉㫖以卓異注册候升者賜采服一襲凡軍政糾劾貪酷革職提問罷軟不謹革職老疾休致才力不及降二級浮躁降一級皆調用前有卓異應升及加級紀錄均不準抵如遇恩赦提問免罪餘仍照例處分凡考察八旗武職都統統領副都統駐防將軍都統副都統由部列其官階稽其治績具疏請㫖王公領侍衛内大臣尚書暨近侍諸臣兼理旗務者不與三品以下官以次考察於其長定以四格曰操守曰才能曰騎射曰年歳糾以八法曰貪曰酷曰罷軟無為曰不謹曰年老曰有疾曰浮躁曰才力不及有出征受傷及得功者並書於册在京八旗武職由部疏請特簡大臣考察各省駐防協領以下由將軍都統副都統廵撫覈實具疏部會都察院兵科京畿道覈議彚疏以聞薦舉官必行止端方居官勤愼弓馬嫻習馭兵有律給餉無虚廼為合格令送部引見奉㫖準卓異者注册候升薦舉駐防旗員視地之大小官之多寡以定額黒龍江七人盛京六人吉林五人西安綏逺城各四人江寜杭州荆州各三人天津京口寜夏凉州廣州成都各二人熱河山海關青州福州各一人餘無定額舉非其人者論如法糾劾官干六法者謂不謹以下六條五品以下應否引見由部疏請其應革職官罷任候㫖曾出征効力以老疾休致者審其資格覈其軍功量予恩俸有差凡考察綠旗武職鑾儀衛漢冠軍使至整儀尉由本管官注考達部京營千總以上直省營守備以上以次聽察於其長册注考語定以四格曰才技曰年力曰馭兵曰給餉糾以八法與八旗考察同京營由提督九門廵捕三營歩軍統領覈實達部直省營由將軍江寜福州廣州三將軍管轄綠旗營將備者督撫提督覈實具疏衛所守備千總由司道注考督撫覈疏部㑹都察院兵科京畿道覈議彚疏以聞薦舉官必以才技優長年力强壯馭兵有術給餉無虚人覈其閱俸三年任内並無叅罰迺為合格其因公降罰而亷能過人者除盗案處分外亦準卓異合格之游擊以上引見未滿三年者具奏請㫖已滿三年及都司以下均檄令送部引見奉㫖準卓異注册候升糾劾官如曾出征受傷著有勞績除犯貪酷外應革職者仍給原品應休致者或酌調簡任不堪錄用者或予守兵糧或令子弟入伍以養餘年如願引見由督撫提鎭給咨送部凡甄别綠旗將備以二年半為期由督撫提鎭簡副將至守備賢能合格者陜西舉五人直𨽻江南福建浙江湖廣四川廣東各四人山東山西廣西雲南貴州各三人河南二人及應糾劾之將備均具疏以聞部覆得㫖薦舉者予紀録糾劾者凖八法議處如值軍政之年停其甄别軍功凡議叙軍功或開闢疆宇或平定絶域或飛輓以給軍或乗險以滅冦或攻取關隘俘獲渠魁有㫖優叙者由部覆議奏請隨時酌定其由統兵將帥列序官兵功績等次造册送部者部覈其實分為五等八旗官兵給以印軸曰功牌應授爵者移吏部甄别授爵自雲騎尉始授功遞加詳見吏部未至授爵者注册仍令圖功凖其積算從征有功者文職視武職王公所屬䕶衛親軍視官兵委署官視見任各以所得軍功等第予叙綠旗官兵第功議叙者曰功加立一等功者凖功加一等紀錄二次二等加一級紀録一次三等紀録三次四等紀録二次五等紀録一次立功多者積算授以世爵文職軍功應功加一等者準加一級敘功不實者各論如法凡敘八旗官兵戰功用雲梯攻城視城之大小攻之難易分五等一等敘六人二等敘四人三等敘三人四等敘二人五等敘一人均移吏部授爵賞賚以府州縣衛所為差等克府城者賞五人第一人賞銀五百兩第二人三百五十兩第三人二百五十兩第四人百五十兩第五人百兩領戰官視第二人指示官視第三人射箭官視第五人克州城者減府城一等克縣城者減州城一等衛城與州城同所城與縣城同鑿毁城垣者視雲梯攻城議敘以礮攻城及奪門入城者減雲梯攻城一等議敘敵兵堅壁未克能越衆前驅破敵獲賊者敘三人第一人移吏部授爵賞銀百兩第二人給二等功牌銀八十兩第三人給三等功牌銀六十兩均注册積兩次三等者準作一次二等積兩次二等者移吏部授爵交鋒時於本旗内出衆衝鋒克敵者敘三人第一人給一等功牌第二人給二等功牌第三人給三等功牌均注册賞賚減前驅之半積至三次一等移吏部授爵執纛人以首進續進為差首進者兵未進而纛先之敘三人第一人移吏部授爵賞銀百兩第二人八十兩第三人六十兩續進者兵將進而纛隨之敘一人賞銀五十兩交鋒時一叅領下執纛人首進者敘三人第一人給一等功牌賞銀五十兩積至三次一等移吏部授爵第二人賞銀四十兩第三人三十兩續進者敘一人賞銀二十兩水戰奪舟分舟之大小為三等一等舟敘五人第一先豋者賞銀二百五十兩第二人二百兩均移吏部授爵第三人給三等功牌賞銀百五十兩第四人給四等功牌賞銀百兩第五人給五等功牌賞銀五十兩功牌内注明舟之等次均注册二等舟敘四人第一先登者賞賚視一等舟之第二人其餘以次遞減三等舟敘三人第一先登者賞賚視一等舟之第三人其餘以次遞減其不列等次之舟敘三人賞賚減三等舟十分之四先後所得功牌準其積算得兩次一等舟三等功牌者移吏部授爵餘均準此招撫敵兵千人敵舟三十艘者為第五等軍功兵増五百人舟増至十艘各加一等兵至三千五百人舟至七十艘者為一等軍功招撫城池以府州縣衛為差等立功官兵未及議敘病故者均按其立功等次以為敘官得一二等軍功者給一子監生食七品官俸三四等軍功者給一子監生食八品官俸均令隨旗効力五等軍功給一子監生準其應試兵丁給葬銀二十兩得一等軍功者賞功牌銀五十兩二等以下每等減銀十兩凡敘綠旗官兵戰功用雲梯克府城者視城之大小分五等一等敘五人第一人授職叅將其次游擊次都司次守備次千總二等敘四人授職自游擊以下三等敘三人授職自都司以下四等敘二人授職自守備以下五等敘一人授千總克州城者分四等一等議敘視克府城二等二等以下遞降授職克縣城者分三等克衛所城者分二等遞降授職亦如之議敘四人以上者領戰官加四等指示官加一等議敘二人以上者加等半之議敘一人者領戰官加一等指示官不敘若攻䧟城垣乘勢先登者授千總領戰官加二等賞賚以府州縣衛所為差等克府城者賞五人第一人賞銀二百五十兩次二百兩次百五十兩次百兩次五十兩克州城者減府城一等克縣衛所城者減州城一等强敵在前陣堅壘固倡衆戰勝者敘三人第一人授職守備賞銀五十兩次千總賞銀四十兩次把總賞銀三十兩勢均力敵率先摧鋒者敘二人第一人授千總賞銀三十兩次把總賞銀二十兩水戰奪舟者視舟之大小分三等大舟敘四人第一人授職都司賞銀百兩次守備賞銀八十兩次千總賞銀六十兩次把總賞銀四十兩中舟敘三人授職自守備以下賞賚視大舟之次以次遞降小舟敘二人授職自千總以下賞賚視中舟之次以次遞降在舟之本管官及同戰官視舟之大小加級紀錄有差礮手奪舟者敘功與兵丁同以礮沉舟者一舟賞銀二十兩二舟授把總賞銀四十兩三舟授千總賞銀六十兩多者依次遞加招撫敵人自五百人以上舟自五艘以上難民五千人以上計其多寡大小紀録加級及功加等次各有差立功官未及議敘病故者一二等軍功給一子監生以把總用三四等軍功給一子監生以外委把總用五等軍功給一子監生隨營食糧願應試者聽簡閱凡八旗簡閱軍士春月分操二次合操一次秋月合操二次列陣之法與大閱同驍騎營官兵校射月凡六次由本旗都統監視春秋擐甲歩射二次由旗定期咨部騎射二次由部定期通行前鋒䕶軍各營官兵校射月凡六次春秋擐甲騎射均由統領監視三年考驗由部疏列領侍衛内大臣八旗都統統領副都統奏請每翼特簡四五人監視甄别優劣以聞蘆溝橋演礮三歳一次疏列本部尚書侍郎滿洲䝉古漢軍均列名奏請特簡一人監視仲春孟秋習鳴螺部遣官稽閱歳以為常各省駐防官兵合操騎射與京營同八旗水師營操舟張㠶鳴角發礮進退疾徐之節講習於四時其出洋練習候各不齊或於春秋或於夏秋視潮平風正之日乘戰艦列陣將軍都統副都統遞臨閱之視其優劣以為賞罰凡直省簡閱營伍直𨽻提督分所屬為三路歳閱一路三歳而徧馬蘭宣化正定三鎭歳一閱泰寜天津二鎭二歳一閱山東兩鎭均歳閱二歳而徧山西二鎭歳一閱河南兩鎭江南提鎭歳各一閱江西兩鎭均歳閱二歳而徧閩浙總督涖任一閱浙江提督三歳一閱定海黃巖温州三鎭歳各一閱衢州處州兩鎭一歳再閱福建水陸二提督各分所屬為二路歳閱一路二歳而徧八鎭歳各一閱湖廣總督涖任一閱提督歳閱湖北湖南三歳而徧四鎭歳各一閱陜甘總督五歳提督三歳均一閱七鎭歳各一閱四川四鎭三歳一閱廣東七鎭歳各一閱廣西提督三歳一閱兩鎭歳各一閱雲南貴州提鎭酌數年内一閱各疏報出廵囘任日期及所屬營伍之整玩以待部覈凡特命大臣出京簡閱部列滿大學士領侍衞内大臣都統尚書侍郎名疏請簡命直𨽻山西一人山東河南一人江南江西一人福建浙江一人湖廣一人陜西四川一人甘肅一人廣東廣西一人雲南貴州一人詰士伍稽戎馬覈軍實備陳戎政之修廢具疏以聞首直𨽻山西陜甘四川次湖廣雲貴次閩浙兩廣次山東河南兩江四歳而徧直省應簡閱之年或差在京大臣或交本省督撫或仍循常例均候㫖遵行提督簡閱之年則各鎭停簡閱督撫簡閱之年則提鎭停簡閱特命大臣簡閱則督撫提鎭槩停墩臺營房設於邊關扼要及水陸孔道撥兵駐宿以備偵候防守遇有傾圮次第修理本營官隨時廵閱遇新舊接替時察驗交代欽定太清㑹典卷六十四
