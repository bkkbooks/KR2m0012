  text: 欽定四庫全書欽定大清會典卷十六
  hash: sha256:16c66e1bc779dd821855173162eb6873ac2151e7452cef99aa7a988637e64aa1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_016-1a, image: WYG0619/WYG0619-0150c.png}
body:
  text: 户部關稅凡天下水陸衢會舟車之所輻輳商旅之所聚集設關置尹掌其治禁以安行旅以通貨賄爰繫之稅以便詗幾以佐國家經費凡直省關稅以乾隆十八年奏銷册計之稅入四百三十二萬四千有五兩有竒京師崇文門稅入十萬二千百七十五兩左翼右翼均萬兩通州萬二千六百四十七兩直隸天津關七萬四千五百六十九兩山海關三萬二千二百兩龍泉紫荆獨石等關口四千三百有六兩張家口二萬兩殺虎口萬六千九百十有九兩內工關銀七千六百四十兩稅解本部考核由工部凡工關同潘桃口七千六百四十五兩古北口二千六百六十九兩胡納胡河二千三十兩輝發莫欽二百八十兩白都訥二百有七兩均工關奉天四千八十八兩中江三千二百九十四兩山東臨清關四萬三千三百有五兩內工關四千五百七十二兩山西武元城千二百三十一兩工關江蘇海關七萬七千五百有九兩滸墅關四十九萬五千二百二十六兩淮安關三十二萬五千一百六十三兩內宿遷工關四萬八千八百八十四兩繫淮安關兼管揚州關二十萬一千九百有八兩西新關十有二萬九千九百十有五兩內龍江工關五萬七千六百有七兩繫西新關兼管安徽鳯陽關二十八萬七千九百二十兩蕪湖關三十一萬六千八百二十五兩內工關七萬一百四十六兩江西九江關三十五萬四千二百三十四兩贑關九萬六百八十二兩福建海關三十一萬四千四百四十八兩閩安關二萬三千三百六十五兩浙江海關八萬七千六百五十四兩北新關二十一萬六千五百六十二兩內南新工關三萬二百四十七兩繫北新關兼管湖北武昌廠五萬三千九百六十七兩荆關四萬一千六百十有七兩工關湖南辰關萬六千四百二十二兩工關四川䕫關舊名渝關十有六萬三千一百十有四兩內工關五千兩打箭爐一萬九千六百七十五兩廣東海關五十一萬五千一百八十八兩太平關十有三萬七千二百九十七兩廣西梧廠六萬三千有八兩尋廠四萬五千八百二十兩各有竒凡直省關務或差京官監督或以督撫總理或以將軍織造鹽政兼理京差由部疏請嵗周更代督撫委所屬道府專司之具疏以聞凡貨財之經過關津者必行商大賈挾資貨殖以牟利者乃徵之物有精粗直有貴賤利有厚薄各按其時地以定應徵之數部設科條頒於各關刋之木榜俾商賈周知而吏不能欺其有匿應稅之物者論如法至小民日用所需擔負竒零之物皆不在徵𣙜之條凡海舶貿易外洋者給之照以稽察之其出洋歸港皆慿照為信因按其照稅之有藏匿姦匪私帶違禁之物者論如法凡內江內河賃載客貨之船經遼曠閲險阻皆給之照抵關投驗以辨姦良各關稅貨稅船各隨其地之宜有私冒越渡者論如法凡關津之徵每嵗豫作空白册申部部於册內編定年月鈐印發還一曰親填簿商賈到關輸稅令揭其貨物按次月日親書於册不得假手吏胥一曰循環簿一留署一發關據商賈所書貨物分析其應稅之數亦按次月日備書於册循發則環留環發則循留司關者隨時計度而鉤考之一曰稽考簿以循環簿所書一嵗徵收之數分記而總結之亦按次月日備書於册一送部一存關一自收執親填簿循環簿於嵗終繳部稽考簿於任滿繳部由部覆核之以待奏銷凡商販米穀往被災地方售儥者所在官司給照過關毋許羈留及各省鼓鑄銅鉛官倉營汛所糴米穀驗其文符並免輸稅凡關稅考成監督一嵗差滿條析經徵之數具疏專逹其隸督撫總理者嵗周疏報亦如之皆以册逹部部受其要而會之定其殿最以聞惟關隸工部者賦輸部庫考核則由工部欽定大清會典卷十六
