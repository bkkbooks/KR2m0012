body:
  text: 禮部祠祭清吏司羣祀三凡祭先醫之禮為廟於太醫院內殿曰景惠中奉太昊伏羲氏左炎帝神農氏右黃帝軒轅氏均南嚮配位句芒風后西嚮祝融力牧東嚮兩廡從祀東僦貸季岐伯伯高少師雷公伊尹淳于意華陀皇甫謐巢元方韋慈藏錢乙劉完素李杲皆西嚮西鬼臾區俞跗少俞桐君馬師皇扁鵲張機王叔和葛洪孫思邈王冰朱肱張元素朱彥修皆東嚮歲以春秋仲月上甲日遣官致祭三皇位前牛一羊一豕一各帛一鉶二簠二簋二籩十豆十尊一爵三爐一鐙二配位東西各一案每案帛一羊一豕一鉶一簠簋各二籩豆各十尊一爵六爐一鐙二兩廡各帛一爵三尊一爐一鐙二各設三案每案簠一簋一籩四豆四腥二盞十和聲署設樂於西階下自迎神至望燎皆奏樂作止視禮儀為節日出前四刻遣官朝服俟於醫署至時贊引太常贊禮郎二人引遣官由廟左門入咸濟左門贊盥洗遣官盥洗引詣中階下拜位前立分獻官於遣官後夾甬道序立太醫院陪祭官以次分左右序立咸北面典儀官贊執事官各共乃職以下自迎神至望燎皆典儀官唱贊贊引官贊就位遣官就拜位立乃迎神司香官奉香盤進贊引官贊就上香位引遣官由殿左門入詣太昊伏羲氏位司香官跪奉香贊引官贊跪遣官跪贊上香遣官上柱香次三上瓣香興以次詣炎帝神農氏黃帝軒轅氏位司香官詣配位上香各如儀贊引官贊復位引遣官復位贊跪叩興以下升降行禮皆有贊遣官行三跪九叩禮分獻陪祭官均隨行禮奠帛初獻爵司帛官司爵官各詣神位前司帛官跪奠帛三叩司爵官立獻爵奠正中皆退贊引官贊就讀祝位引遣官詣讀祝拜位立司祝至祝案前跪三叩奉祝版跪案左遣官跪分獻陪祭官咸跪司祝讀祝畢奉祝版詣太昊伏羲氏神位前跪安於案叩如初退遣官暨分獻陪祭官行三叩禮贊復位引遣官復位分獻官詣兩廡上香執事生奠帛獻爵畢分獻官退復位亞獻司爵官獻爵奠於左終獻司爵官獻爵奠於右兩廡以次畢獻儀均如初乃徹饌送神遣官暨分獻陪祭官行三跪九叩禮有司奉祝次帛次饌次香恭送燎所遣官轉立拜位旁東面候祝帛過復位祝帛燎半引遣官詣望燎位望燎告禮成引遣官出衆咸退凡祀關帝之禮歲以春秋仲月諏吉遣官祭關帝於地安門外之西關帝廟前殿後殿神位均南嚮前殿帛一牛一羊一豕一登一鉶二簠二簋二籩十豆十尊一爵三爐一鐙二和聲署設樂後殿祭追封三代公三案各帛一羊一豕一鉶二簠簋各二籩豆各八尊一爵三爐一鐙二祭日前後殿承祭官咸朝服詣廟贊引太常贊禮郎各二人引由廟左門入分詣前後殿各升階至殿門外就拜位前北面立典儀官贊執事官各共乃職以下自迎神至望燎皆典儀官唱贊贊引官贊就位承祭官就拜位乃迎神司香官奉香盤進贊引官贊就上香位引承祭官由殿左門入詣香案前贊上香司香官跪奉香承祭官上柱香次三上瓣香贊復位引承祭官復位贊跪叩興以下行禮皆有贊承祭官行三跪九叩禮後殿贊引官引後殿承祭官詣三案上香行二跪六叩禮奠帛初獻爵司帛官奉篚司爵官奉爵進至神位前司帛官跪奠帛三叩司爵官立獻爵奠正中皆退司祝至祝案前跪三叩奉祝版跪案左承祭官跪司祝讀祝畢奉祝版詣神位前跪安於案叩如初退承祭官行三叩禮後殿執事生奠帛獻爵司祝官讀祝各如儀亞獻司爵官獻爵奠於左終獻司爵官獻爵奠於右後殿以次畢獻均如初送神承祭官行三跪九叩禮後殿承祭官行二跪六叩禮有司奉祝次帛次饌次香恭送燎所承祭官避立拜位旁東面候祝帛過復位引承祭官望燎告禮成引退後殿承祭官望燎引退如儀仲夏中旬三日歲遣官致祭前殿後殿惟不設籩豆陳果實五盤餘與春秋祭同直省府州縣春秋二仲及仲夏中旬三日均祀關帝牲帛禮儀均與祭京師關帝廟儀同凡祀禦災捍患諸神之禮因所捍禦之地建立專祠特加封號飭所在有司歲以春秋諏吉致祭祭英衛公伍員於浙江錢塘縣通佑王李冰於四川灌縣安瀾之神張巡於江西浮梁縣誠應武肅王錢鏐於浙江臨安縣顯佑通濟王謝緒於江南宿遷縣靜安公張夏於浙江蕭山縣寧江伯湯紹恩於紹興府寧漕公宋禮永濟之神白英於山東汶上縣均帛一羊一豕一尊一爵三儀與祭關帝同凡祭賢良祠之禮為祠於地安門外之西歲以春秋仲月諏吉遣官致祭前殿中設和碩怡賢親王神位左設和碩超勇襄親王神位均南嚮後祠設天聰名臣大學士榜式達海崇德名臣大學士范文程副都統褚庫巴圖魯順治名臣大學士寧完我額色黑定西將軍公愛星阿內大臣哈世屯都統墨勒根轄李國翰總督孟喬芳李國英康熙名臣大學士圖海魏裔介王熙李之芳阿蘭泰伊桑阿張玉書吳琠馬齊張英李光地領侍衛內大臣福善費揚古尚書米思翰姚文然魏象樞湯斌顧八代馬爾漢勵杜訥趙申喬徐潮徐元夢陳璸靳輔都統根特賴塔馮國相提督施琅張勇孫思克王進寶護軍統領莽依圖將軍佛尼勒總督趙良棟傅臘塔于成龍雍正名臣大學士富寧安朱軾張鵬翮田從典高其位內大臣尹德阿爾納尚書楊名時總督楊宗仁齊蘇勒李衛乾隆名臣都統傅清左都御史拉布敦總督那蘇圖陳大受喀爾吉善巡撫徐士林潘思矩位均南嚮前殿二案各素帛一羊一豕一果五盤尊一爵三爐一鐙二後祠五案共帛一羊一豕一尊一爵三爐一鐙二每案果實五盤前後承祭官咸朝服行二跪六叩禮所祀王公後裔暨大臣子孫在京有爵秩者咸朝服隨行禮上香奠帛讀祝三獻爵望燎均如儀直省㑹城咸立賢良祠凡守土大臣有功德於民者由督撫疏請設位歲春秋以少牢致祭祭日視京師賢良祠承祭官行禮儀亦如之凡祭功臣專祠之禮歲以春秋仲月諏吉遣官致祭武壯王孔有德並妃白氏李氏於廣寧門外專祠帛三羊一豕一果五盤爵九尊一祭恪僖公遏必隆並夫人舒舒覺羅氏於安定門外專祠帛二羊一豕一果五盤爵六尊一祭承恩公諡勤襄佟圖賴並夫人覺羅氏承恩公諡忠勇佟國綱並夫人他塔喇氏溫都氏承恩公諡端純佟國維並夫人赫舍里氏於朝陽門外專祠帛七羊三豕三果十有五盤爵二十有一尊三祭大學士公諡文襄圖海並夫人覺爾禪氏鈕祜祿氏於德勝門外專祠帛三羊一豕一果五盤爵九尊一祭宏毅公額宜都於安定門外專祠帛一羊一豕一果五盤爵三尊一祭承恩公諡恪僖哈世屯並夫人覺羅氏承恩公諡敏果米思翰並夫人穆溪覺羅氏博爾濟吉特氏承恩公諡莊慤李榮保並夫人覺羅氏於東安門內專祠帛七羊三豕三果十有五盤爵二十有一尊三均爐一鐙二凡祭昭忠祠之禮為祠於崇文門內自王公大臣及偏裨士卒授命戎行者咸設位祠中歲以春秋仲月諏吉遣官致祭前殿和碩敬謹莊親王尼堪簡親王巴爾堪巴賽英誠武勳王揚古利定南武壯王孔有德忠勇王黃芳度居中南嚮東第一室一等公佟養正西哈二等伯巴都里一等伯巴什泰程尼續順公沈瑞一等公佟國剛一等侯馬得功一等伯宜理布三等伯穆和琳一等子覺羅莫洛渾三等伯王之鼎一等公達福一等伯傅清一等公班第西第一室三等子錫喇巴一等子代音布額駙托柏大學士龍西尚書圖捫二等子博波圖一等輕車都尉綽和諾一等子穆克覃三等子圖魯錫羅沙拜蘭巴朗都爾莽鼐大學士張泰太子太保佟濟佐領佛義保尚書布顔岱都統沙里布一等伯拉布敦襄勤伯鄂容安東第二室總督佟養甲二等子覺羅顧納岱大學士莫洛色思泰雲騎尉吳丹總督甘文琨范承謨巡撫馬雄鎮傅宏烈鹽運使高天爵尚書道禪總督額倫特一等子阿南達內大臣馬爾薩副將軍查弼納尚書名蓋二等子拜三西第二室護軍統領新泰三等男阿蘭柱護軍統領阿爾岱喀爾護吉侍郎朝哈爾訥爾特巡撫賈維鑰副都統孟魁羅濟三等男覺羅拜三竒塔特魏正羅立納海護軍統領葉喜喀爾他拉東第三室護軍參領吳沙郭色前鋒統領劉哈三等輕車都尉薩蘇哈侍郎馬如璧巡撫張文衡副都統吉三白魏正渾錦多頗洛盧錫覺羅阿克善三等輕車都尉金玊和三等男甘都伊爾格德阿喇密何特赫二等男胡伸布祿三等男阿納海一等男拜才前鋒統領胡里布護軍統領哈克三巡撫朱國治巡海道陳啓泰護軍參領費揚古糧儲道葉映榴三等男色楞總督王秉仁巡撫柯永升副都統科普蘇長史雅賚西第三室副都統阿仕國巴雅思虎朗阿喀倪科爾坤阿爾護穆舒邁圖前鋒參領葛思特一等男克什圖三等男察渾二等輕車都尉訥爾布三等男艾音察羅希二等男色經口一等男路什三等男巴查爾噶爾都巴雅爾傑士前鋒統領定夀侍郎永國副都統戴豪蘇圖海蘭錫密賚常祿舒楞格馬爾齊三等輕車都尉郎保三等男阿哈丹隨德蘇班達立東第四室將軍董廷儒提督孫定遼總兵徐勇提督假應舉紀法康泰一等輕車都尉博爾和對總兵吳萬福張存福費雅達王承業都督僉事洪徵副將楊三虎蔡隆總兵司九經參將趙登舉總兵任舉三等侍衛丹泰遊擊陳維屏西第四室武備院卿胡穆散兵備道李懋祖巡道金漢惠水利道副使于躍龍兵備道塢象鼎御史劉顯名知府紀國相定邊道夏時芳知府楊致祥黃廷柏巡道陳丹赤按察使李興元知府郭萬國王之儀張瑞午劉浩通政使莫洛渾武備院卿達穆布巡道楊三知知縣張令憲總兵劉良臣楊佐雲騎尉張廷輔總兵郝效忠阿爾泰參將甘應龍總兵朱天貴康海歐陽凱游擊楊光祖均分左右以次南嚮東配樓七品官覺羅星德等西配樓護軍校雅思哈等均東西相嚮後正室布政使遲變龍等均南嚮東廡三等輕車都尉郝爾德等西廡守備劉澤久等均東西相嚮祔祀兵丁共萬餘人前正殿設七案中一案羊一豕一左三案共羊一豕一右三案如之每案各帛一果五盤爵三兩配樓各設五案東西各羊一豕一每案帛爵果品之數與正殿同後正室設五案共羊一豕一後兩廡各設三案東西各羊一豕一每案帛爵果品之數均與前殿同祔祀兵丁共設三十六案案各豕肉一盤果二盤爵三祭日所祭王公諸臣後裔陪祭前後殿承祭官及分獻官行禮均與祭賢良祠儀同凡祭雙忠祠之禮為祠於崇文門內歲以春秋仲月諏吉遣官致祭都統一等伯諡襄烈傅清左都御史一等伯諡壯果拉布敦帛二羊一豕一果五盤尊一爵六爐一鐙二儀與祭昭忠祠同直省府州縣咸立忠義孝弟祠祠內設本鄉忠臣義士孝子悌弟各牌位所在有司歲以春秋致祭用帛一羊一豕一爵三尊一承祭官行禮儀與祭省㑹賢良祠同八旗左右翼及直省郡縣均立節孝祠婦女以節孝貞烈被旌者已故設牌位於祠有司春秋致祭陳設禮儀均與祭忠義孝弟祠同直省府州縣歲清明節七月望十月朔日祭厲壇於城北郊前期守土官飭所司具香燭公服詣城隍廟以祭厲告本境城隍之神上香跪三叩興退至日所司陳羊三豕三米飯三石尊酒楮帛於祭所設燎爐於壇南黎明禮生奉請城隍神位入壇設於正中香案一爐鐙具贊禮生二人引守土官公服詣神位前贊跪守土官跪贊上香守土官三上香贊叩興守土官三叩興退執事者焚楮帛守土官詣燎爐前祭酒三爵退禮生仍奉城隍神位還廟各退欽定大清㑹典卷四十九
