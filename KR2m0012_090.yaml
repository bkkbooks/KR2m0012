front:
  text: 欽定四庫全書欽定大清會典卷九十
  hash: sha256:66a0d50cb2a3556068daed0621b884aa3beb22ef8865271599f3916b6deda150
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_090-1a, image: WYG0619/WYG0619-0831a.png}
body:
  text: 內務府掌儀司三凡列聖列后大事皇太子皇貴妃妃嬪之事皆由司豫行知㑹禮部檢稽案卷工部營造司備物材器皿兵部備守衛光祿寺備供用其一切應行典禮皆㑹同禮部具題請㫖按例遵行詳見禮部祠祭司所需白布取於户部梓宮大事應用幣帛取諸內庫金棺之事取諸户部其製造定式及應用事宜自初喪以及除服內務府實司之凡陳設初喪設几筵奉安梓宮於殿中南嚮覆以幃帳前設寶榻藉以錦茵榻前設香案陳銀香鼎燭檠花瓶案前設香几陳博山爐香合筯瓶案左右設鐙几陳羊角鐙幃帳左右設白綾幔障數架以别內外幔前列几四陳册於左寶於右次設金蓮花瓶左右各一地皆藉以氊席每奠暫移香案香几鐙几於旁奠畢復設如初皆內監司其事金棺前不設香几鐙几同册寶金蓮花瓶餘皆建織金九龍綺丹旐於宮門外之左旐懸以竿承以座竿及座皆髤以黃日以工部內務府廣儲司營造司司官各一人守之每日暮下旐廣儲司官恭奉內務府總管一人率至宫門授宮殿監督領侍等首領內監一人接受奉入設几筵左側次日黎明宮殿監督領侍等率首領內監奉出至宮門外授內務府總管廣儲司官接受升懸至暮仍送進如前列后丹旐用織金九鳯綺建於宮門外之右暮則陳於几筵右側餘皆同金棺以下皆織金丹旐竿座各如金棺槓輿之色由司官送至宮門授內監奉進餘如前凡奠獻朝夕奠設肴饌筵一計槃十有五羮飯碗各一饌筵下設承案一左右設几二陳熟牲午奠設果實餅餌筵一餘並同午奠以正午朝夕奠隨月令之氣候以為制恭理喪儀王公大臣內務府總管率尚茶尚膳正尚茶尚膳人員內管領掌儀司官等執事屆時舉饌筵至宮門皆辦內監啓門衆皆舉哀恭理喪儀王公大臣內務府總管率尚茶正尚膳正舉承案尚茶副一人舉茶几尚茶奉茶筒茶碗尚膳舉肴饌案牲几羮飯內管領舉奠盆奠几掌儀司官奉壺爵以次進至几筵殿前尚茶尚膳正進承案由中門入陳於几筵前乃進茶几尚茶奉茶由中門入跪奠於茶几退行一叩禮進前舉茶出酹於門外階上尚茶副徹茶几各退尚膳舉饌案奠於承案設牲几於兩旁尚膳正進羮飯於饌案畢由右門退出如用尚茶尚膳內監則由殿門授受奠獻如儀內管領進奠几於正中如如爵親祭酒設於酒殿內正中進爵大臣進皇子大臣祭設於丹陛正中掌儀司官進爵祭酒行禮畢徹奠几進爵大臣掌儀司官舉奠盆酹酒畢尚膳正等入殿徹饌奠几前行次饌案牲几次茶几承案以次出恭理喪儀王公大臣內務府總管隨後出哀止內監闔門遇元正仍奠獻惟內外輟哭一日列后喪三大節皆輟哭列后几筵前奠獻用女官恭理喪儀王公大臣內務府總管率尚茶尚膳進至二門授內管領妻尚茶尚膳女官率婦女進奠午奠饌筵內監進奠如親臨祭酒奠几壺爵授內監惟恭理喪儀王公大臣內務府總管引入妃嬪以下喪儀如皇子祭酒內務府總管率入內管領進奠几於殿內掌儀司官進爵酹酒餘皆內管領妻率諸女官婦女奠獻內管領妻祭酒於殿外階上女官進爵酹酒內務府總管掌儀司官於二門下監視凡祭日內監陳冠服於几筵工部張黃幕於宮門外之右東嚮內管領設反坫於黃幕正中廣儲司官陳尊罍掌儀司光祿寺陳牲二十七及環餅飥餌於反坫兩旁前列酒尊四十皆內務府光祿寺官將事饌筵羊酒各按品位遞減詳見禮部禮部內務府光祿寺堂官立幕下皆東嚮內務府總管率內管領所屬人員由左右門豫進隨筵七十九席列於几筵殿外丹陛兩旁各加牲體夏月每筵隨瓜一筐次率尚茶尚膳正內管領等豫進承案稍前設餅餌饌筵於几筵殿內皆北嚮積楮帛於燎位設奉安冠服牀於前屆時啓宮門進茶進饌奠獻如儀讀文祭酒舉哀行禮畢乃徹饌以次出內管領舉奠几至燎位立於右俟陳冠服於牀乃進奠几於牀前正中南嚮祭酒行禮酹酒畢各退內務府總管同宮殿監督領侍內監等視燎畢率內管領所屬由左右門入徹饌筵及兩旁隨筵出凡臨喪皇帝親臨皇祖皇考太妃之喪內監進奠几於殿內北嚮內監跪進爵皇帝跪祭酒行三拜禮餘皆左旁設榻內監進奠几西嚮衆皆跪內監跪進爵皇帝坐祭酒不行禮衆仍行一叩禮致祭日如皇帝親臨由內務府豫進儀注凡果園徴收南苑五園各給地一頃十有九畝别給贍家地各二頃十畝歲納桃李不徴地賦盛京百三十六園給地自七十畝至二頃十畝畿輔置百四十八園地自一頃至五十頃每園設園長一人徴收之法以丁計者丁給地三十五畝歲徴銀三兩家不過六丁如有餘丁止編名入籍地不增給丁不起徴以地計者投充果園每畝徴銀五分新增果園每畝徴銀一錢通計地千頃四十畝有奇丁千二百六十賦九千二百三兩有奇完缺以十分定殿最核功過偶有水旱偏災蠲賦與㑹計司糧莊同歲納時果按其直以抵丁賦不準抵者與雜徴同各園貢果及由司置備之乾鮮各果均貯內果房設未入流掌果二人署掌果二人司果執事十有二人專司出納歲委司官二人筆帖式二人經理以供內廷之用其由司置備之果即支丁賦和買均於歲終奏銷畿輔果園各選三人為承催免其身及子孫一人丁賦盛京設筆帖式一人催長一人領催三人副領催三人廣寧設催長一人領催三人均𨽻盛京內務府總管三旗佐領闕則依次選補各園充補園長及三年一次編審均與㑹計司糧莊同凡內監品級及升降黜陟據宮殿監督領侍來文呈堂移咨吏部官學凡學舍景山六學清書漢書學各三萬善殿漢書學一咸安宮十有六學清書學四漢書學十有二凡教習滿教習簡選八旗之善於書射者充補漢教習景山及萬善殿官學於舉人貢生咸安宮官學於進士舉人考選充補均三年期滿引見咨送吏部凡官學生景山官學選內府三旗幼丁每滿洲佐領下八名旗鼓佐領下四名內管領下六名萬善殿官學選幼年內監無定額咸安宮官學於八旗及內府三旗貢監生員及官學生內選其秀者每旗不過十名凡考校滿漢教習各以時訓課毋或曠廢景山官學每三年咸安宮官學每五年一次奏請欽命大臣考試考列優等者引見以筆帖式庫使録用未録用者分别奬賞劣者黜之藥房凡合藥醫生十名召募合藥民醫生二十名凡合和御藥由藥房官會同太醫院醫官敬謹監視凡藥料由太醫院醫官詳驗擇其佳者送藥房備貯凡奏銷每歲伏暑設暑湯除夕進蒼术及隨時所用藥味均三月一次具奏人參無定額每次酌量斤兩奏請備用用畢以某人某月日患某症服參若干繕册進呈如前奏請於廣儲司茶庫支領欽定大清㑹典卷九十
