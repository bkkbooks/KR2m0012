body:
  text: 都察院左都御史滿漢各一人左副都御史滿漢各二人掌察核官常整飭綱紀右都御史右副都御史均為督撫兼銜經歷滿漢各一人都事滿漢各一人筆帖式十人給事中滿漢各十有二人掌傳達綸音稽考庶政吏科掌印給事中滿漢各一人給事中滿漢各一人分稽銓衡注銷吏部順天府文卷戶科掌印給事中滿漢各一人給事中滿漢各一人分稽財賦注銷户部文卷禮科掌印給事中滿漢各一人給事中滿漢各一人分稽典禮注銷禮部宗人府理藩院太常寺光祿寺鴻臚寺國子監欽天監文卷兵科掌印給事中滿漢各一人給事中滿漢各一人分稽戎政注銷兵部太僕寺鑾儀衛文卷刑科掌印給事中滿漢各一人給事中滿漢各一人分稽刑名注銷刑部通政使司大理寺文卷工科掌印給事中滿漢各一人給事中滿漢各一人分稽工程注銷工部文卷筆帖式吏科户科兵科刑科各十有五人禮科工科各十人監察御史滿漢各二十八人宗室二人蒙古二人在滿御史額內掌糾劾官邪條陳治道京畿道掌印監察御史滿漢各一人監察御史滿漢各一人分理院事及直𨽻盛京刑名稽察內閣順天府大興宛平縣河南道掌印監察御史滿漢各一人監察御史滿漢各一人分理河南刑名照刷部院諸司卷宗稽察吏部詹事府步軍統領五城江南道掌印監察御史滿漢各一人監察御史滿漢各三人分理江南刑名稽察户部寶泉局宣課司左右翼監督在京十有二倉總督漕運磨勘三庫月終奏銷之籍浙江道掌印監察御史滿漢各一人監察御史滿漢各一人分理浙江刑名稽察禮部都察院山西道掌印監察御史滿漢各一人監察御史滿漢各一人分理山西刑名稽察兵部翰林院六科中書科總督倉場坐糧廳大通橋監督通州二倉山東道掌印監察御史滿漢各一人監察御史滿漢各二人分理山東刑名稽察刑部太醫院總督河道催比五城命盜案牘緝捕之事陜西道掌印監察御史滿漢各一人監察御史滿漢各一人分理陜西刑名稽察工部寶源局核勘在京工程湖廣道掌印監察御史滿漢各一人監察御史滿漢各一人分理湖廣刑名稽察通政使司國子監江西道掌印監察御史滿漢各一人監察御史滿漢各一人分理江西刑名稽察光祿寺福建道掌印監察御史滿漢各一人監察御史滿漢各一人分理福建刑名稽察太常寺四川道掌印監察御史滿漢各一人分理四川刑名稽察鑾儀衛廣東道掌印監察御史滿漢各一人分理廣東刑名稽察大理寺廣西道掌印監察御史滿漢各一人分理廣西刑名稽察太僕寺雲南道掌印監察御史滿漢各一人分理雲南刑名稽察理藩院欽天監貴州道掌印監察御史滿漢各一人分理貴州刑名稽察鴻臚寺筆帖式京畿道江南道各三人河南浙江山西山東陜西湖廣江西福建四川廣東廣西雲南貴州道各二人巡視五城分中東南西北每城給事中或御史滿漢各一人於六科十五道內奏委二年更代掌彈壓地方釐剔姦弊其屬兵馬司指揮副指揮吏目各一人凡憲綱左都御史給事中御史皆許風聞言事事關朝政得失民生利弊大臣徇私骩法不飭簠簋並聽據實陳奏托拾陳言及瑣屑傷治體者不得瀆告官民寃枉所司不受理及受理不得伸者許赴院陳訴鞠實大事奏請上裁小事立豫昭雪奏章奉旨後給事中録送吏科御史録送京畿道封貯如奉旨褒奬或經訓飭備著於册三年一次進呈凡科鈔中外疏章既上旨下內閣日以給事中一人詣內閣祗領分致各科備録諭旨及原疏發所司奉行豫定注銷日期事涉數衙門者以主稿衙門為正鈔會稿及應關白之衙門為外鈔鈔畢别録二通敬謹校對鈐蓋印信一送內閣曰史書一貯科垣曰録書嵗終還原疏於內閣凡封駮奉旨事理確有未便施行者封還執奏閣臣擬旨批答字句舛錯部院督撫疏章事有謬誤者並聽駮正凡頒給敕書直省總督巡撫由吏科總督漕運總督倉場坐糧廳監督各關監督各鹽政由户科學政由禮科提督總兵官由兵科總督河道及各關監督之隸工部者由工科均於午門外授本官祗領如由外任升轉給該省提塘官齎往任滿各送科繳內閣凡掌察部院諸司所治之事以六科十五道分掌稽察月以已結未結之數兩次具册分送注銷月終各具題直省督撫題達之案具揭各科道察核事有難結者嵗終彚題罣漏及易結不結者劾宗人府以宗室御史二人內務府以滿御史二人專司稽察别給印信注銷具題同八旗各以滿給事中或御史一人稽察月一注銷月終奏聞滿洲蒙古漢軍同八旗暨九卿奉旨會議之事以滿漢御史各一人稽察無故不到者劾巡視五城科道審理之事嵗委滿漢御史各一人督催月具册申院送刑部者兩月具題五城振濟平糶左都御史左副都御史分城親察以絶弊端凡考核中外文武官三嵗京察大計五嵗軍政均由本院吏科兵科京畿道會吏兵二部核實具疏宗人府吏部有奉旨議處之事由院咨取職名定議各關監督任滿由户科考核鹽政任滿由京畿道考核驗視月選官列掌印給事中御史名咨吏部奏請簡命滿漢各二人隨班察核文職司道以下武職副將以下由吏兵二科給與赴任文憑違限者劾五城司坊官三年俸滿堪列薦剡者巡城科道詳具政迹申院核實咨吏部引見凡監試順天鄉試禮部會試外場以滿漢御史各二人外簾同內簾各一人殿試各二人順天武鄉試兵部會試外場兼外簾滿漢御史各二人會試內簾一人殿試各二人考校見任筆帖式考取中書官學教習各館謄録生選拔貢生朝考貢監生考授職銜均滿漢御史各一人有潛通關節懷挾及傳遞文字冒名代考武場選入好字號覆校技勇不符者並劾順天府考試文童滿漢御史各一人會府丞審音劾冒籍者凡讞獄重囚審案敕下三法司會核定擬者虛公擬斷期於明允或所見不同往復詳議以歸一是若始終不能畫一許兩議並陳恭候上裁不得一衙門為一議及用夾單申明前議指駮後議刑部見審之犯罪應死者承審司官録初供移知該道定期滿漢御史各一人至刑部會大理寺官公審既定讞左都御史左副都御史會刑部大理寺堂官詳審核擬具題不得據稿定擬草率從事秋審給事中御史皆與議御史不掌印者則分省與議朝審給事中及各道之掌印者與議京畿道不掌印亦與秋審勾決由各道具題刑科覆奏朝審勾決由京畿道具題刑科三覆奏均候命下各道御史齎本授刑部施行朝審決囚刑科給事中監視行刑熱審期內薄刑小罪院道皆與議刑部獄囚及各門枷犯每月滿漢御史各一人稽察凡侍儀朝會御殿左都御史左副都御史均於殿簷下西第三柱序立躬祀壇廟滿漢各一人於西南隅序立凡糾儀朝會御殿以滿御史十有四人漢御史八人皇帝率羣臣詣皇太后宫行禮以滿御史四人漢御史六人御門給事中御史滿漢各二人御經筵給事中御史滿漢各一人車駕出入午門耕藉常朝坐班天安門宣詔午門頒朔頒賞中式舉人進士詣闕謝恩均滿漢御史各二人有紊越班行言語喧譁威儀不肅者劾壇廟祭祀以滿漢御史各四人告祀各二人救護日月食各四人祈雨報祀各二人祭祀宰牲監視各一人有臨事不共牲幣不潔或刑餘喪服有隱疾之人濫與祀典齋期有違戒令齋宿不於其所及行禮失儀者並劾凡差遣巡視鹽政長蘆河東兩淮各一人均給敕書一年更代巡察京師通州十有四倉每倉給事中或御史一人一年更代巡視漕運以給事中或御史瓜儀濟寧每處一人楊村通州每處二人舊駐淮安今移瓜儀舊駐天津今移楊村嵗以次奏請各給關防事竣復命濟寧巡漕兼理疏濬運河之事巡察盛京吉林黑龍江各以滿給事中或御史一人福建臺灣府以給事中或御史滿漢各一人均閲三年奏請候旨差遣事竣復命稽察宗人府銀庫理藩院內外館銀庫鄂羅斯來京貿易各以滿給事中或御史一人銀庫三年期滿奏請更代餘事竣即還給事中御史奉旨離任在一年外者題請署理一年內者由院委署先奉差不離任繼奉别差離任其任其差署理亦如之凡升遷給事中御史三年內升滿漢各一人外轉宗室不與各一人由院覆無降革事故者序俸列疏並彚其任內敷陳奏章繕册進呈候旨簡用六科給事中員闕由院列御史無降革事故者咨吏部引見簡用科道掌印六科及京畿河南兩道由院於給事中御史內簡選正陪疏請補授餘以本道見任資深者轉補凡五城地方各以巡視科道為統轄官指揮為專管官副指揮吏目為分管官各治一坊中城中西中東二坊東城崇南朝陽二坊南城東南正東二坊西城宣南關外二坊北城日南靈中二坊凡條教每月朔望巡城科道率司坊各官集衆於公所令鄉約一人宣講聖諭孝父母敬長上睦鄉里教子孫各安生理毋作非為凡辭訟司坊各官分職而理各依限審訊録供詳報應解審者解犯送本城覆審定議完結事有疑竇駮令再審不得草率結案徒罪以上槩送刑部每月二次以已結未結之數造册申院注銷凡禁令首嚴邪教傳造妖言私銷私鑄聚衆開窰燒炭及書吏招搖骫法役滿逗遛寺院坊店容留行蹤詭祕之人巡城科道率所屬隨時稽察以警姦邪至於使酒罵街見即逮治不得以地非所屬過而不問凡平糶五城各設厰二遇米價騰貴由户部奏請酌撥京倉成色米分給各城減價平糶巡城科道率指揮副指揮經理其事凡振濟嵗於十月初一日至次年三月二十日每城各設厰二日支京倉米二石柴薪銀一兩煮飯以振貧民巡城科道率指揮副指揮吏目經理其事凡棲流所中東南北城各一西城二流民無依及衢巷卧病者總甲即報指揮悉令入所日給薪米病給醫藥冬給絮衣布被病故者給棺木巡城科道以時親察勿致屯膏凡承追承緝承變承驗傷痕並內外問刑衙門行提人犯或遞解回籍及各公事差委令副指揮吏目分任驗尸專委指揮通政使司通政使滿漢各一人副使滿漢各一人參議滿漢各一人掌達天下章奏經歷滿漢各一人知事滿二人掌出納文移筆帖式滿六人漢軍二人掌翻譯登聞鼓筆帖式滿一人漢軍一人凡內外臣工封事許自達其陳事之疏在京徑送內閣在外皆郵遞至司移送內閣進呈御覽凡疏章定式每幅六行行二十格平行空二格疏語稱宫殿者上一格稱皇帝上諭稱旨稱御者上二格稱天地宗廟山陵廟號列祖諭旨者逾格一字首列官銜姓名末書年月日鈐以印别紙摘録疏中要語黏於疏尾曰貼黃凡疏章不拘字數期於辭達其頌而諛繁以支者禁之凡上疏陳事在內由部院堂官在外由將軍督撫提鎮餘令上司官代奏毋得越職陳事凡接受疏章設案於堂正中經歷知事二人左右侍立通政使或副使參議一人出聽事至案側齎奏人奉疏及霤跪經歷恭接陳案上退乃校閲封送內閣五日後以隨疏齎到之牒應致各部院者授提塘官分投凡馳奏程限由具疏官計程刻日登注文內鈐印申司核驗違限者罪坐所由失注日期者並劾之如雨潦阻行致逾定限由所在官司具結申司者免議凡封發疏章篋內汚損議處具疏之官篋外汚損有專差者罪奉差官吏無專差者罪驛遞官役其錯誤遺漏及不合體式者由司勘明重則參處輕則請旨飭行凡軍民實有寃抑所司不受理擊登聞鼓陳訴者初專設登𨽻本聞鼓院後裁司由司核實奏聞得旨下所司昭雪誣控越訴者論如法大理寺卿滿漢各一人少卿滿漢各一人掌平反重辟以二邦刑左寺正滿一人漢軍一人漢一人評事漢一人右寺正滿一人漢軍一人漢一人寺副漢一人評事漢一人分掌京師五城順天府屬直省府州縣衛死罪之刑堂評事滿一人掌文案司務滿漢各一人掌收發文移筆帖式滿四人漢軍二人掌翻譯凡直省重辟寺受各省牒下其事於左右寺司讞者凖律定讞卿受其中俟刑部簡正既孚致辭於寺乃參核焉議合者弊之不合者反之刑部重辟囚以左右寺司讞者暨御史會刑司察其辭辨其死刑之罪而要之致辭於卿乃詣刑部暨都御史會聽之各麗其法以議獄議合者弊之不合者覆之必盡合乃會疏互異者各疏所見以聞凡秋審直省候決之囚刑部會其獄成寺受而核之嵗以八月會九卿詹事科道於天安門外察於獄辭之麗而求其情别其情實者緩決者矜疑者會疏以聞以為處決留繫減等之差凡朝審刑部候決之囚嵗以霜降後旬日出囚於天安門外會九卿詹事科道察於獄辭之麗而質訊之别其情實緩決可矜疑者與秋審同凡熱審每嵗小滿後旬日刑部小大之獄以左右寺官暨御史會刑司聽之質其成於卿笞者免杖者折減荷校者暫釋俟立秋浹旬一會疏俾夏暑無留獄至立秋前一日乃蕆事欽定大清會典卷八十一
