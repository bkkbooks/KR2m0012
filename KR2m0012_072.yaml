body:
  text: 工部營繕清吏司城垣凡都城之制內城周四十里闢九門南曰正陽崇文宣武東曰朝陽東直西曰阜成西直北曰安定德勝四維角樓各一四周修七千八百七十九丈八尺崇三丈五尺各有竒堞廣五尺有八寸趾厚六丈二尺上濶五丈下設水關七正陽門東西各一崇文門東宣武門西朝陽門南東直門南德勝門西各一外為重城環內城南靣轉抱東西兩角樓迤北而止廣袤二十八里闢七門南曰永定左安右安東曰廣渠東便西曰廣寧西便角樓六三靣修四千六百三十二丈七尺有竒崇二丈堞廣四尺趾厚二丈上濶丈有四尺下設水關三東便門東西各一西便門東一各門建城闉形皆圓內九門惟東直西直門外七門惟永定門形方東西便門無城闉門各啓樓樓前對峙者為譙樓城闉門各啓樓一惟正陽門樓三內外城各啓角樓城垜共二百三十有五旗炮房九儲火藥屋及列戍二百二十五所內城濠源發玉泉山西北入城經大內二支分流自東西御河出繞九門滙流逹大通橋兩岸各甃甎石其所經城下皆設閘以導出入外城濠亦自玉泉山分流環繞九門東逹運河凡都城修繕儲火藥屋傾圮由步軍統領移部察核奏修城靣滲漏城濠或水潦衝齧內城部遣其屬治之外城順天府尹及五城官治之工竣均由部勘驗堅否限以三年保固其驗不如式及限內坍損者令原修官賠修以示懲罰凡直省城垣各督撫察其所屬境內之崇廣深厚及傾圮與否詳核丈尺登諸册以時稽其修廢工省則有司於農隙繕治工費浩繁者州縣申督撫報部疏請興舉其有玩視不修不報者劾之守土官更代必按籍稽核有不符者分别先後賠修歲旱潦督撫酌量緩急次第修築寓振濟於工程凡城垣禁令內外城樓禁民登臨及竊甎者有犯皆論如律各省城垣令督撫率屬加意防護毋縱民登陟有殘闕處急修整嚴禁踰越以防姦宄府第凡親王府制正門五間啓門三繚以崇垣基高三尺正殿七間基高四尺五寸翼樓各九間前墀環護石闌臺基高七尺二寸其上後殿五間基高二尺後寢七間基高二尺五寸後樓七間基高尺有八寸共屋五重正殿設座基高尺有五寸廣十有一尺修九尺後列屏三高八尺繪金雲龍雕龍有禁凡正門殿寢均覆緑琉璃脊安吻獸門柱丹雘飾以五采金雲龍文禁雕刻龍首壓脊七種門釘縱九橫七樓屋旁廡均用㼧瓦其為府庫為倉廩為厨廄及典司執事之屋分列左右皆版瓦黑油門柱世子府制正門五間啓門三繚以崇垣基高二尺五寸正殿五間基高三尺五寸翼樓各五間前墀環護石闌臺基高四尺五寸其上後殿五間基高二尺後寢五間基高二尺五寸後樓五間基高一尺四寸共屋五重殿不設屏座梁棟繪金采花卉四爪雲蠎金釘壓脊各減親王七之二餘與親王府同郡王府制與世子府同貝勒府制基高三尺正門一重啓門一堂屋五重各廣五間㼧瓦壓脊五種門柱紅青油漆梁棟貼金采畫花草餘與郡王府同貝子府制基高二尺正門一重堂屋四重各廣五間脊用望獸餘與貝勒府同鎮國公輔國公制與貝子府同凡第宅公侯以下至三品官基高二尺四品以下高一尺門柱飾黝堊中梁飾金旁繪五采雜花二品以上房脊得立望獸公門釘縱橫皆七侯以下至男遞減至五五均以鐵士庶人惟油漆與職官同餘各有禁逾制者罪之凡賜宅以秩之崇卑定宅之大小其折價以宅之大小酌價之等差若賜侍衛等宅與視文職差等同凡八旗官兵分定居址禁毋逾越如遇調旗更地或仍居舊土或置宅遷移各隨其便隨所調旗分築室徙居者該都統酌給本旗官地凡衢市廬舍如有力不能修漸至傾圮者或酌貸官銀旗民自為修繕或給價置買動帑葺治均區别緩急先後完整其不告官司私行折售者依律科罪凡直省會試舉人至蘆溝橋於橋西北稅局旁築室以待其止宿俾行李不與客商相雜以免稽察之擾凡棲流所分設京師五城交司坊官經管俾流寓窮民無所棲止者歸焉以免失所公廨凡公廨國史館在午門內熙和門西南內閣在協和門東南誥敕房在午門內東廊起居注館在西廊六科中書科在午門外東西兩廊內務府在右翼門外內鑾儀衛在東華門內宗人府吏部户部禮部兵部工部翰林院鴻臚寺欽天監太醫院在長安左門外刑部都察院通政使司大理寺太常寺鑾儀衛在長安右門外理藩院詹事府在御河橋東順天府國子監在安定門內光祿寺在東安門內太僕寺在正陽門內之東四譯館在正陽門外河南道察院在大理寺後中城東城北城察院在正陽門內迤西南城察院在宣武門內迤東西城察院在刑部後步軍統領署在地安門外其制均築圍牆一重門二重前堂五間左右分曹兩廡列屋穿堂三間後堂三間左右政事廳各三間基高二尺門柱飾黝堊棟梁施五采觀象臺在崇文門內之東紫微殿五間官廳十有二間繚以兩廡臺高五十尺磴道百級上設儀器入北為貢院圍牆布棘東西門各一南嚮門三內為龍門樓曰明逺堂在外曰至公在內曰聚奎執事有所號舍萬間鎖院試廳六十有一宗學分建左右翼官學義學按旗分置八旗教場在崇文宣武朝陽阜成東直西直安定德勝等門外各有演武廳至於刑有犴獄財用器械有庫百官各居其所以治事焉凡修葺公廨由該部院衙門照例咨部委官核估會修工竣别委官察核奏銷定限保固如違例行文及工有浮冒者論凡直省文武官廨小修各官隨時苫補大修及有增建者均由督撫疏請部覆動帑興修工竣奏銷前後官接任入册交代如督撫提鎮監司及州縣守禦等官涖任有抑勒所屬修治衙署致纍及兵民者文官以科斂律武官以剋減律論倉厫凡倉厫之制京師倉十有三通州倉二均每間廣丈有四尺縱五丈三尺簷高丈五尺有竒下藉青甎上加木版牆址留下孔以泄其濕厫頂建氣樓以散其蒸門用棧版聨五間或四間六間為一厫統數十厫或百餘厫為一倉中建官舍四旁鑿井外環圍牆京師祿米倉建於朝陽門內凡五十七厫內二厫四間餘各五間共二百八十三間井六南新倉建於朝陽門內凡七十六厫內二厫六間餘各五間共三百八十二間井九舊太倉建於朝陽門內凡八十九厫內三厫六間餘各五間共四百四十八間井九海運倉建於東直門內凡百厫內四厫六間餘各五間共五百有四間井十北新倉建於東直門內凡八十五厫每厫五間共四百二十五間井十富新倉建於朝陽門內凡六十四厫每厫五間共三百二十間井十興平倉建於朝陽門內凡八十一厫每厫五間共四百有五間井八太平倉建於朝陽門外凡八十六厫每厫五間共四百三十間運水門三萬安東西二倉建於朝陽門外凡九十三厫每厫五間共四百六十五間西倉運水門五東倉井四裕豐倉建於東便門外凡六十三厫每厫五間共三百十有五間儲濟倉建於東便門外凡百有八厫每厫五間共五百四十間井三本裕倉建於德勝門外清河橋凡三十厫每厫五間共一百五十間井三豐益倉建於德勝門外安河橋凡三十厫每厫五間共一百五十間𨽻內務府通州西倉建於新城凡二百有三厫內一厫六間餘各五間共一千十有六間井九中倉建於舊城南門內凡一百十有九厫內一厫四間二厫六間餘各五間共五百九十六間井五凡漕糧輸運入倉所經之處曰土壩曰石壩及通州之南門各建屯屋以免露積大通橋為督催舟運稽察盤糧之要津屯屋之外更建監督官舍吏胥屋宇其各倉鋪藉席版放米後藏諸别屋以防朽蠹凡倉門外均開水道跨以橋梁每歲春秋仲月監督巡視疏濬凡各倉歲修倉場侍郎豫領户部庫帑每倉歲以百金為率隨時修葺年終彚報由部察核題銷其數逾歲修定數者倉場侍郎咨部會都統御史核計領帑各委官會修工竣報部核銷凡直省有漕州縣及積貯備荒米穀均設有倉厫如不敷收貯或有寄貯寺觀及露積者許詳督撫題建新倉其應建不建者守土官論如法營房凡京師營房在皇城內者八旗滿洲步軍宿衛之處九十所內城九門各設巡房左翼三百二十七所右翼二百九十九所分𨽻八旗滿洲蒙古漢軍門以內皆令循環巡警附城列屋三千六百十有六間每旗各撥滿洲蒙古漢軍官兵挈家駐防並於城門外各設巡房八間即令駐防官兵分班守衛外城七門設馬步兵巡房三百四十二所分隸巡捕三營巡守凡內外城門各設班房更房內城百有五間外城八十間城上各設戍守望內城八十四所外城四十三所圓明園等處共設馬步兵巡房百五十所凡八旗舊教場內每旗建屋二千間共萬有六千間分給官兵居止圓明園四周八旗護軍每旗各設官兵營房千五百五十間內府三旗護軍官兵營房共五百有四間靜宜園設健鋭營官兵營房左右翼共三千五百三十二間碉樓六十有八凡京城營房營建修繕各由該總管都統暨步軍統領咨部隨時葺治工竣核銷凡直省營房山海關熱河盛京吉林黑龍江綏逺城西安寧夏涼州成都控制邉關天津青州京口江寧福州杭州荆州廣州襟帶江海均分營列戍駐防八旗官兵若會城重地大府雄鎮標協兵丁皆酌給廬舍如有隨時增建者由各督撫疏請動帑營造報部核銷至水陸衝塗及地沿邊海均計里畫界設汛鋪置斥堠以資守望地方官會同營辨隨時稽察離任入册交代其歲修工費六年限內每間歲給銀二錢限外歲給銀三錢草房量減有差年終各督撫彚計報銷有頺壞不修理者文武官辨參劾分賠物材凡物材或成於鈞陶或市於商賈均有定制委積有所任載有費各異其宜凡陶甓之制設琉璃窰於正陽門外之西以陶琉璃器具質用澄泥色有青黃翡翠紫緑黑甎甓異名各按模式吻有大小垂脊之飾各有等差以供大工之用臨清窰設於山東臨清州以水土之良作甎堅膩部頒式於山東巡撫給帑製造用則徵解部辨堅脆而差其直蘇州窰設於江南蘇州府製造金甎大者方二尺二寸次二尺次尺有七寸每正甎十備副甎三由江蘇巡撫給帑委官監造輸部部選收其精良者以備用凡收木之制木倉設天安門右千步廊外及通州之張灣京師內外營建歲需各色木材由江蘇江西浙江湖南動支正賦市自民間輸運張灣部委官會監督驗收運入京倉以待需用其他出自逺方及非歲需者俟有取用計其多寡度其長徑行所産之省採辦運送亦如之凡採石之制工程需用之石各有宜稱視近畿州縣諸山産石最良者委官定限採取按工計運給發價直採石煆灰亦如之凡物價木辨良楛量其長徑石辨堅疏度其厚薄甎甓辨精粗計其大小以差等其價之高下若采飾之用雜需之材均因時採訪刋頒定則以便遵循俾百物之良要於平準凡輸運水以舟陸以車舟運木計顆甎甓計數車運甎木皆權輕重程近逺分春夏秋冬以辨其運價而差等之由糧艘附運者不給價運石之車以石方一尺為度積二十七尺以一馬御石大則按數遞增琉璃瓦吻運以人挽小車計數按程近逺均差等其價以時給領凡禁令官舍不得用琉璃瓦城甎民房不得用㼧瓦窰厰去城五里不近通衢處始許設立京師城北禁立私窰山地木石産於寺觀墳塋及有關墳脈者不得採伐違禁者論辦運官採擇不精良解送逾期交納虧數及驗收官藉端抑勒逾限不給實收者皆論報銷凡京師營建工程物價以銀計工直以錢計遇有大興作奏支户部庫帑其餘銀逾二百兩錢逾五十緡者奏請交部會核興工事竣報銷不及數者移部核修月一會計列册具奏直省營建工程由督撫疏請部覆興舉動存公帑項按數支給如有巨工需費浩繁經時告竣照原估之數陸續給發工竣題銷凡監工官修建壇廟宫殿欽命大臣董率選官任事各衙門工程部委司官筆帖式同該衙門委官監造管工官不料估原估官不承修以杜侵冒有浮多扣剋及造作不堅三年內傾圮者論凡料估京師工程無論大小皆豫為營度專設料估所以量丈尺權物價計傭直授成於督工之官工竣覆核委滿漢司官四人領其事直省工程所司視其緩急按時確估具其實申督撫報部急工則隨估隨修工在可緩俟部覆準鳩舉工竣均别委官勘實具結題咨其有增估續估者皆先事報部仍於報銷册內聲明待核凡核銷在京修造工竣委官察驗與原估相符數在二百兩以下者彚疏二百兩以上者專案題銷並令管工官備册移科道詳勘有浮冒及侵蝕者論直省報銷工程造正副册逹部有應駮減者籤注副册發還改造如駮詰再三終未清晰者由部酌數核減疏請完結若原估不敷續增工料未報請銷不得藉稱捐墊冀抵本案核減之數凡報銷期限特旨修理工程工竣管工官限十日呈報清册司官限十五日核銷應繳費餘限五日內交庫各工計費在二百兩以內者限一月五百兩二月二千兩三月五千兩四月五千兩以外按銀數至三千增限一月盛夏隆冬暫停工作餘月均令按限完竣仍於十日內呈報察驗核銷二千兩以上十五日外增限五日萬兩以上再增十日應繳費餘定限如前其不依限完工及核銷與繳庫遲延者並論專設督催所以掌催工完帑之事逾期呈堂察核直省工程督撫酌其大小難易定限報部或有他故不能如期告竣則題咨展限工完逾期及報銷遲延者參劾至工程核減承修承追各官均定以年限不完者論如律欽定大清會典卷七十二
