front:
  text: 欽定四庫全書欽定大清會典卷二十六
  hash: sha256:e06fddf39f253f7d7570db5ec12f47f88928c4851b621dd1ce524db59051c16b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_026-1a, image: WYG0619/WYG0619-0208c.png}
body:
  text: 禮部儀制清吏司耕藉凡耕藉之禮置藉田於南郊先農壇之東南中為帝藉築臺於藉田北為皇帝觀耕之位嵗仲春吉亥皇帝躬耕於帝藉豫期由部奏請命王三人卿九人從耕鴻臚寺豫於帝藉兩旁東西各設從耕位立表以識前期一日遣官祗告奉先殿如常儀是日順天府尹設二案於太和殿東簷下以龍亭三采亭四陳設耕具皇帝躬耕耒耜及鞭皆飾以黃布嘉種以稻從耕三王九卿布種以麥穀菽黍各貯青箱由長安左門入至午門外亭止府屬官恭奉入左門至太和殿東簷次第陳於案皇帝御中和殿閲祭先農祝版禮畢儀見祠祭司御保和殿戶部官舉案入中和殿陳於殿正中鞭耒案在前種箱案在後戶部禮部尚書侍郎率屬立中和殿丹陛之南重行北上均西面禮部尚書一人至保和殿請駕皇帝御中和殿閲耕具畢奏禮成乘輿還宮戶部官舁案出至太和殿東簷順天府官徹案奉耕具出午門仍陳各亭內鑾儀校舁行前列旗仗和聲署作樂前導送藉田耕所陳龍亭於帝藉左右陳采亭於東西從耕位至日皇帝禮服詣先農壇致祭畢儀見祠祭司御具服殿更龍袍從耕暨侍班各官咸退更采服以俟帝藉正中陳躬耕黃耒駕以黃犢戶部尚書一人立於右東面順天府尹奉鞭立於左西面藉田東西陳從耕朱耒各六駕以黝牛府屬丞倅奉青箱者咸俟於次樂部典樂一人和聲署正二人丞二人立藉田左右署史歌禾辭者十有四人司金鼓版笛笙簫者各六人頂帶老農四人以次立藉田左右麾五色采旗者五十人披蓑戴笠執錢鎛者二十人牽牛耆老三十四人上農夫十人中農夫十人下農夫十人立歌禾辭者之外相間為班均東西面魚貫序立鴻臚寺鳴贊二人侍儀御史二人夾藉田序立不從耕王公暨三品以上文武官序立於觀耕臺側禮部尚書奏請行耕藉禮皇帝出具服殿恭導至耕位南嚮立從耕三王九卿以次就耕位東西面立鴻臚官引王公各官至觀耕臺南左右隅均南嚮立鳴贊贊進耒戶部尚書北面跪進耒贊進鞭順天府尹北面跪進鞭皆興退皇帝右秉耒左執鞭耆老二人牽犢上農夫二人扶犁禮部太常寺鑾儀衛堂官各二人恭導皇帝行耕藉禮和聲署署史揚采旗司樂官引署史鳴金鼓歌禾辭左右隨行順天府丞奉青箱以從戶部侍郎播種皇帝三推三返每嵗奉返著旨加一推一為令畢歌止鳴贊贊受耒戶部尚書北面跪受耒贊受鞭順天府尹北面跪受鞭皆興暨順天府丞奉青箱仍設龍亭和聲署正率所屬退禮部尚書奏請御觀耕臺皇帝由午階升座記注官四人由西階升立臺上西南隅東面鴻臚官引王公百官退立於臺下左右均東西面北上從耕三王九卿以次受鞭耒皆耆老一人牽牛農夫二人扶犁順天府屬丞倅一人奉青箱一人播種三王五推五返九卿九推九返畢釋鞭耒入侍班位立執事官各設青箱於采亭鴻臚官引順天府尹及丞率所屬官耆老農夫至臺前甬道西北面東上鳴贊贊跪叩興行三跪九叩禮畢退至藉田終畝禮部尚書奏禮成駕興由東階降乘輿還宮導迎樂作奏祐平之章王公從各官以次退是日賚耆老農夫布各四匹及秋玉粒告成擇吉收貯神倉以供天地宗廟社稷之粢盛恭遇時巡省方遣官祭先農禮畢順天府尹率屬耕藉與直省督撫耕藉禮同直省耕藉之禮奉天府及直省府州縣於東郊先農壇側擇地為藉田嵗仲春吉亥既有事於先農乃行耕耕禮省會督撫秉耒府佐二一人奉青箱一人播種司道秉耒縣佐二奉青箱播種府縣秉耒首領雜職官奉青箱播種各府州縣如之專城衛所正印官秉耒掾史奉青箱播種咸采服每嵗收穫以供祭祀之粢盛督撫以奉行耕藉日期具疏以聞親蠶凡親蠶之禮置桑田於西苑先蠶壇之東南中為躬桑位築臺於桑田北為皇后觀採桑之位設蠶母二人蠶婦二十七人掌蠶事置內監蠶宮令丞各一人以董之詳見內務府掌儀司嵗仲春吉已皇后躬祀先蠶詳見祠祭司禮成乃於蠶生日行躬桑禮豫期宮殿監督領侍奏請妃嬪二位內務府奏以公主福晉夫人三人命婦四人從採桑所司於桑田設從採桑位於臺南東西立表以識前期一日宮殿監設案於交泰殿中內務府奉宸苑堂官率所屬以龍亭一采亭二陳採桑具皇后金鉤黃筐從採桑妃嬪銀鉤柘黃筐福晉夫人命婦鐡鉤朱筐各貯亭內由內務府入隆宗門至內右門外亭止宮殿監督領侍率蠶宮令丞暨內監恭奉入至交泰殿次第陳於案宮殿監督領侍等奏請皇后吉服御交泰殿閲採桑具畢奏禮成皇后還宮內監奉出內右門仍陳各亭內鑾儀校舁行前列旗仗和聲署作樂前導送採桑所陳龍亭於臺右陳采亭於東西從採桑位至日豫引從採桑暨侍班公主福晉命婦咸采服至觀採桑臺左右恭俟禮部內務府堂官詣乾清門奏請宮殿監督領侍等接奏皇后率從採桑妃嬪咸吉服乘輿出宮導從如常儀至內壝東門外降輿御繭館相儀女官二人奉鉤筐立於臺前左右東西面掌儀司內監率歌採桑辭內監十人司金鼓版笛笙簫內監二十四人立臺前麾五色采旗內監四十人於桑田內東西面魚貫序立傳贊女官二人立臺前左右不從採桑公主福晉命婦序立於臺側典儀女官奏請行採桑禮皇后出繭館引禮女官恭導至採桑位南嚮立從採桑妃嬪公主福晉夫人命婦以次就採桑位東西面立傳贊引不從採桑公主福晉夫人命婦至臺南左右隅南嚮立相儀二人北面跪進鉤筐興退皇后右執鉤左執筐蠶母二人恭助皇后行採桑禮內監揚采旗鳴金鼓歌採桑辭皇后於第一行東西三採畢歌止相儀二人北面跪受鉤筐皆興奉鉤仍設龍亭內典儀奏請御觀採桑臺皇后由午階升座妃嬪侍立於臺上左右傳贊引公主福晉夫人命婦於臺下東西面序立均北上從採桑妃嬪公主福晉夫人命婦以次受鉤筐蠶婦二人助採妃嬪於第二行各五採福晉夫人於第三行命婦於第四行各九採畢釋鉤筐入侍班位立執事女官各設鉤於采亭傳贊引蠶母升階至皇后前北面跪相儀舉筐授蠶母蠶母祗受興引退至蠶室切之授蠶婦灑於箔蠶母還告典儀奏請御繭館皇后降階前引暨贊引女官恭導贊引相儀從妃嬪以下咸從典儀奏請皇后升座傳贊贊行禮贊引引從採桑暨侍班妃嬪公主福晉命婦在丹陛上蠶母蠶婦在丹墀各就拜位北面行六肅三跪三叩禮畢典儀跪奏禮成皇后降座引從如初至內壝東門外乘輿還宮公主福晉命婦以次退至獻繭日蠶母率蠶婦擇佳繭貯以筐恭獻皇后皇后獻皇帝皇太后以告蠶事之登遂率妃嬪乘輿出宮導從如儀親臨織室蠶母率蠶婦全獻繭之所登者皇后行繅三盆手禮妃嬪從繅以五為節蠶婦助之畢遂布於蠶婦之吉者使繅既成絲乃命染人朱緑元黃之以供郊廟黼黻之用禮成賜執事女官暨蠶婦銀幣有差欽定大清會典卷二十六
