front:
  text: 欽定四庫全書欽定大清會典卷十七
  hash: sha256:1ad49d6c1f340eeff1667f4728882d194d2fa4ba847f584526fa3c340ba82c7a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_017-1a, image: WYG0619/WYG0619-0153a.png}
body:
  text: 戶部雜賦周禮山澤之賦供之大府金玉錫石之地草人守之絘布總布質布廛人斂之蓋利用通財而薄徵之以便民也前代以來雜賦繁重國家寬政頻施復除殆遍矣惟其治於有司者繫之賦籍俾在官者有稽焉凡瀕江沙淤成洲之地小民植蘆為業或治阡陌種麥稻與良田等均曰洲田其輸賦於官均曰蘆課以乾隆十八年奏銷册計之江蘇安徽江西湖北湖南所屬蘆洲共七萬九千九百四十六頃四十六畝賦入十有九萬八千二百五十兩三錢各有竒蘆洲夾大江兩岸沙隨水性遷移不常此落彼淤民以聞於官州縣官隨時親勘以申布政使司逹於巡撫備書之籍閲五年巡撫選道員廉能者按籍履畝而覆核之辨其坍於水者除賦水落沙長者分年起徵以方田之法度其丈尺周知其坍長之數而徵除之徵除之法以新淤之地補其坍者如有餘地别給民工築其隔江對岸地分兩屬則令所治牧令會勘酌其盈縮以定抵補之數有不以實者官劾民論如律清釐蘆洲以嵗十月水涸為始次年四月竣事巡撫疏聞下部部受其要而覆核之其報竣逾期者論蘆課之徵各隨其地之宜以定輕重之等其分隸兩江湖廣者各制上中下三則冬時開徵至次年嵗終乃綜其簿籍而申於部民有逋負者經理之官論凡山鄉宜茶之地土人樹藝為業者無徵惟商賈轉運而售之民者徵其商曰茶課𣙜茶之法由部頒引州縣官暨茶馬司甘肅五司以道府同知兼之批驗茶引所江蘇設大使一人受而布之商商採茶於山及經過關津居積待售於各府州縣運行於邊界土司皆憑引以為信無引冒行者為私茶私茶之禁與私鹽同茶引之頒於各省者江蘇安徽江西浙江湖北湖南陜西甘肅四川雲南貴州嵗行三十六萬四千九百四十有九已行之引由所司照驗截角更頒新引茶課之專入奏銷者陜甘嵗徵銀六千二百六十六兩有竒茶十有三萬六千四百八十箆十斤為箆四川嵗徵銀五萬九千七十兩有竒商有逋負者經理之官論若江蘇安徽浙江所屬茶課由經過關津驗引徵收歸入關稅江西湖北湖南及貴州仁懷一縣歸入雜稅雲南歸入田賦其他直省不産茶及雖産茶不頒引者皆聽民販運賦歸關市不列茶課陜甘茶商受引於本省市茶於湖南回經河南由陜州照驗出關均不徵課惟行於陜甘有徵其所賦箆茶初制於邊外互市以易番馬後停易馬之令所賦箆茶貯庫發售四川茶引行於內地州縣者為內引行於沿邊者為邊引行於土司者為土引其賦入不同各酌土俗之宜以定其徵輸之等凡五金之産為器用所必需其藏於山巖土石之中者曰礦小民入山開採以資生計有司者治之因賦其什一曰礦課廣西雲南貴州産黃金白金赤金錫鉛鐵水銀丹砂雄黃山西四川廣東産赤金錫鉛鐵湖南産赤金錫鉛鐵水銀丹砂雄黃皆召商試採礦旺則開竭則閉各省賦入視出産之衆寡嵗無常數深山窮谷資斧不能繼及近民墓宅田地均不開採承商鳩工必用土著辨姦良四方客民走集者禁爭訟滋事者禁以牧令丞倅掌其戒令戍之辨兵以防姦宄其經理之不善者論如法凡澤國多魚其漁者有稅曰魚課明代多設河泊所大使以幾其徵國朝弛澤梁之禁惟留江西二所廣東三所餘皆裁革嵗課江南江西福建浙江湖廣廣東共二萬四千四百十有二兩有竒凡民間賣買田宅皆憑書契納稅於官以成其質劑曰契稅稅契之法布政使司作契帖鈐以司印頒之州縣民之賣買田宅者領契帖於官徵其稅書其姓名揭其物數並原契豫之以防詐僞以治訴訟其稅輸藩庫布政使司覆核之以逹於部嵗無常數凡城廂衢市山場鎮集舟車所輳貨財所聚擇民之良者授之帖以為牙儈使辨物平價以通貿易而稅其帖曰牙稅質庫商行操竒贏以逐利者有行鋪稅牲畜之鬻於市者防其暴盜有馬牛稅豬羊稅水陸之珍自逺至者有落地稅若夫闤闠旗亭日陳百物販夫販婦擔負竒零皆無徵其徵於有司者嵗終則會與田賦合疏以聞以乾隆十八年奏銷之數計之直省嵗課共百有五萬二千七百有六兩有竒欽定大清㑹典卷十七
