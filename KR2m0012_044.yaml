  text: 欽定四庫全書欽定大清會典卷四十四
  hash: sha256:69a791e0d3ff74c90660393d72a1bb59f64d4bc7f6ec0b184df164a6afa26a90
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_044-1a, image: WYG0619/WYG0619-0351a.png}
body:
  text: 禮部祠祭清吏司中祀一凡朝日之禮兆陽位於東郊其制一成嵗以春分迎日出祀大明甲丙戊庚壬年皇帝親朝日奉大明位西嚮赤璧一帛一牛一羊一豕一登一鉶二簠簋各二籩豆各十尊一爵三琖三十鑪一鐙二先祀一日樂部設中和韶樂於壇下分左右懸祀日鑾儀衞陳法駕鹵簿於午門外日出前八刻太常卿詣乾清門告時皇帝御禮服乘禮輿出宫前引後扈如常儀駕發警蹕午門鳴鐘法駕鹵簿前導不陪祀王公百官咸朝服跪送導迎鼔吹設而不作鑾儀衞校鳴壇内鐘皇帝至壇北門外降輿賛引太常卿二人恭導皇帝由壇北門中門入詣具服殿更祭服禮部尚書率太常官恭請神位安奉壇上畢太常卿奏請行禮皇帝出具服殿盥洗賛引太常卿恭導皇帝入内壝左門由中階陞壇至黄幄次拜位前東嚮立鴻臚官引陪祀王公入内壝門位階下百官位内壝門外左右序立均東面典儀官賛樂舞生登歌執事官各共迺職以下迎神至送神皆典儀官唱賛武舞八佾進賛引官奏就位皇帝就拜位立迺迎神司香官奉香盤進司樂官賛舉迎神樂奏寅曦之章凡舉樂皆司樂官唱賛賛引官奏就上香位恭導皇帝詣香案前司香官跪進香賛引官奏跪皇帝跪奏上香皇帝上柱香次三上瓣香興奏復位皇帝復位奏跪拜興以下行禮皆有奏皇帝行三跪九拜禮王公百官均隨行禮迺奠玊帛司玉帛官奉篚進奏朝曦之章司玊帛官跪奠玊帛三叩退行初獻禮司爵官奉爵進奏清曦之章舞干戚之舞司爵官立獻爵奠正中司祝至祝案前跪三叩奉祝版跪案左樂暫止皇帝跪羣臣皆跪司祝讀祝畢詣神位前跪安於案三叩退樂作皇帝率羣臣行三拜禮興樂止武功之舞退文舞八佾進行亞獻禮奏咸曦之章舞羽籥之舞司爵官獻爵奠於左儀如初獻行終獻禮奏純曦之章舞與亞獻同司爵官獻爵奠於右儀如亞獻樂止文徳之舞退太常官賛答福胙光祿卿二人就南案奉福胙至神位前拱舉降立於皇帝拜位之右侍衞二人進立於左皇帝跪左右執事官皆跪右官進福酒皇帝受爵拱舉授左官進胙受胙亦如之三拜興率羣臣行二跪六拜禮徹饌奏延曦之章有司詣神位前奉赤璧退送神奏歸曦之章皇帝率羣臣行三跪九拜禮有司奉祝次帛次饌次香恭送燎所皇帝轉立拜位旁北嚮候祝帛過復位樂作祝帛燎半奏禮成恭導皇帝出内壝左門入具服殿更衣禮部尚書率太常官恭請神位還御皇帝出至壇北門外陞輿法駕鹵簿前導導迎樂作奏祐平之章皇帝回鑾王公從各官以次退不陪祀王公百官於午門外跪迎午門鳴鐘王公隨駕入至内金水橋恭候皇帝還宫各退遣官行禮由北門左門入内壝門右門行禮於壇下上香升壇升降均由右階賛引以太常賛禮郎祝帛送燎位避立右旁王公不陪祀百官陪祀如儀凡夕月之禮兆隂位於西郊其制一成嵗以秋分迎月出祀夜明以北斗五星二十八宿周天星辰配丑辰未戍年皇帝親夕月奉夜明位東嚮配位南嚮均設玉色幄夜明位白璧一帛一牛一羊一豕一豋一鉶二簠簋各二籩豆各十尊一爵三琖三十鑪一鐙二配位帛十有一牛一羊一豕一豋一鉶二簠簋各二籩豆各十尊一爵三琖三十鑪一鐙二祀日樂部豫設中和韶樂於壇下分左右懸鑾儀衞陳法駕鹵簿於午門外日入前四刻太常卿詣乾清門告時皇帝御禮服乘禮輿出宫前引後扈如常儀駕發警蹕午門鳴鐘法駕鹵簿前導不陪祀王公百官咸朝服跪送導迎鼔吹設而不作鑾儀衞校鳴壇内鐘皇帝至壇北門外降輿賛引太常卿二人恭導皇帝由壇北門中門入詣具服殿更祭服禮部尚書率太常官恭請神位安奉壇上畢太常卿奏請行禮皇帝出具服殿盥洗賛引太常卿恭導皇帝入内壝左門由中階陞壇至黄幄次拜位前西嚮立太常賛禮郎引分獻官入内壝右門至階前甬道北立鴻臚官引陪祀王公入内壝門位階下百官位内壝門外左右序立均西面典儀官賛樂舞生登歌執事官各共迺職以下迎神至送神皆典儀官唱賛武舞八佾進賛引官奏就位皇帝就拜位立迺迎神司香官各奉香盤進司樂官賛舉迎神樂奏迎光之章几舉樂皆司樂官唱賛賛引官奏就上香位恭導皇帝詣正位香案前司香官跪進香賛引官奏跪皇帝跪奏上香皇帝上柱香次三上瓣香興奏復位皇帝復位太常賛禮郎引分獻官由北階升壇詣配位前上香畢降階退立原位奏跪拜興以下行禮皆有奏皇帝行二跪六拜禮分獻官王公百官均隨行禮奠帛行初獻禮司玊帛官各奉篚司爵官各奉爵進奏升光之章舞干戚之舞司玊帛官各奠玊帛行三叩禮司爵官各獻爵奠正中退司祝至祝案前跪三叩奉祝版跪案左樂暫止皇帝跪羣臣皆跪司祝讀祝畢詣正位前跪安於案三叩退樂作皇帝率羣臣行三拜禮興樂止武功之舞退文舞八佾進行亞獻禮奏瑶光之章舞羽籥之舞司爵官獻爵奠於左儀如初獻行終獻禮奏瑞光之章舞與亞獻同司爵官獻爵奠於右儀如亞獻配位獻爵儀均同樂止文徳之舞退太常官賛答福胙光祿卿二人就北案奉福胙至正位前拱舉降立於皇帝拜位之右侍衞二人進立於左皇帝跪左右執事官皆跪右官進福酒皇帝受爵拱舉授左官進胙受胙亦如之三拜興率羣臣行二跪六拜禮徹饌奏涵光之章有司詣正位前奉白璧退送神奏保光之章皇帝率羣臣行二跪六拜禮有司奉祝次帛次饌次香恭送燎所皇帝轉立拜位旁南嚮候祝帛過復位樂作祝帛燎半奏禮成恭導皇帝出内壝左門入具服殿更衣禮部尚書率太常官恭請神位還御皇帝至壇北門外陞輿法駕鹵簿前導導迎樂作奏祐平之章皇帝回鑾王公從各官以次退不陪祀王公百官於午門外跪迎午門鳴鐘王公隨駕入至内金水橋恭候皇帝還宫各退遣官行禮由壇北門左門入内壝門右門上香時升降由右階分獻官位在遣官後之左升降由左階行二跪六叩禮餘儀與朝日遣官同欽定大清會典卷四十四
