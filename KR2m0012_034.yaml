body:
  text: 禮部儀制清吏司相見禮凡外藩親王見親王之禮至府第令從官致辭王府執事官轉啓乃延賓賓下馬入主人降階迎賓升入殿中門賓東面主人西面行二跪六叩禮興賓西主人東各就坐從官階下北面東上二跪六叩興由右門入從賓後坐執事官獻茶賓受茶一叩主人答飲訖從官楹前跪一叩先退賓離席一叩辭主人答興降階送賓出執事官送賓於大門外外藩郡王見親王主人出殿迎不降階賓升主人導賓入賓二跪六叩主人跪答禮半賓辭退離席跪一叩主人跪受如初興導賓出送於殿外餘如外藩親王禮外藩貝勒見親王賓由殿右門入主人出坐迎賓北靣行二跪六叩禮主人立受即席正坐賓侍坐辭退賓離席跪一叩餘如外藩郡王禮外藩貝子公見親王府屬官引賓入殿二跪六叩主人坐受辭退賓離席跪一叩從官趨階下跪一叩興隨賓出餘如外藩貝勒禮外藩親王見郡王主人迎送於大門內見畢辭退賓主各就坐一叩餘儀及外藩郡王見郡王均如內外親王相見禮外藩貝勒見郡王如外藩郡王見親王禮外藩貝子公見郡王如外藩貝勒見親王禮外藩親王見貝勒主人迎於大門外賓入主人從賓主各一跪三叩從官亦一跪三叩辭退主人送於大門外外藩郡王見貝勒賓主一跪三叩餘均如外藩親王見郡王禮外藩貝勒見貝勒賓主一跪三叩餘如內外郡王相見禮外藩貝子公見貝勒賓一跪三叩主人跪拱手受餘如外藩貝勒見郡王禮外藩王貝勒見貝子賓主一跪一叩坐從官一跪一叩辭退從官跪叩如初主人均拱手受送於大門外候乘馬乃退餘如外藩親王見貝勒禮外藩貝子公見貝子如內外貝勒相見禮外藩王貝勒見宗室公如外藩王貝勒見貝子禮外藩貝子見宗室公主人迎送於大門外餘如外藩郡王見貝勒禮外藩公見宗室公如內外貝子相見禮凡在京王公塗遇之禮親王出郡王讓道貝勒儀衛引避讓道旁行貝子鎮國公勒馬鞠躬立道旁候過輔國公固倫額駙和碩公主額駙鎮國將軍民公侯伯一品官以下皆下馬郡王出貝勒以下與遇親王同貝勒出貝子鎮國公固倫額駙和碩公主額駙讓道旁行輔國公鎮國將軍民公侯伯內大臣都統尚書勒馬立道旁候過二品官以下皆下馬貝子出鎮國公固倫額駙和碩公主額駙分道行輔國公鎮國將軍民公侯伯子內大臣都統尚書讓道旁行輔國將軍男副都統侍郎及參領等官勒馬立道旁候過佐領等官以下皆下馬鎮國公出輔國公鎮國將軍民公都統尚書分道行輔國將軍副都統侍郎及參領等官勒馬立道旁候過佐領等官以下皆下馬輔國公出鎮國將軍都統尚書分道行輔國將軍副都統侍郎等官讓道旁行奉國將軍參領佐領等官勒馬立道旁候過護軍校驍騎校等官及軍民人等皆下馬鎮國將軍出輔國將軍副都統侍郎分道行奉國將軍參領佐領等官勒馬立道旁候過護軍校驍騎校等官及軍民人等皆下馬輔國將軍出奉國將軍參領等官讓道旁行佐領等官勒馬候過護軍校驍騎校等官及軍民人等皆下馬奉國將軍出佐領等官讓道護軍校驍騎校等官及軍民人等皆勒馬候過凡王貝勒府慶賀之禮親王郡王生辰及元日本府屬員謁賀行二跪六叩禮貝勒生辰及元日所屬行一跪三叩禮凡京朝官敵體相見之禮賓至門主人迎於大門內賓降輿入主人揖賓入及階讓於賓賓西主人東升至聽事賓主皆北面再拜興主人趨正賓坐東嚮賓禮辭主人固請卒正坐左還賓正主人坐西嚮如賓禮賓就坐揖執事者獻茶賓受茶揖主人均答揖賓起告辭揖主人答揖賓降階主人降送及門賓揖主人答揖賓禮辭主人固請送賓於大門外賓升輿主人揖送賓降一品者主人趨正賓坐賓辭賓還正主人坐辭如之餘儀同二品以下京堂官至翰詹科道見大學士主人迎於儀門內送於大門外不視賓升輿餘儀同五品至七品官見大學士賓至大門外降輿入主人迎於堂階下賓由階東升主人導賓入賓北面拜主人辭賓三揖主人東面答揖賓趨正主人坐主人禮辭固請卒正坐左還告坐揖主人答揖賓西面主人東北面坐若旅見則賓以次西面坐北上茶至賓起受茶揖主人答揖坐飲啓事畢辭退三揖如初出主人送於二門外科道見左都御史左副都御史各部尚書如京堂官見大學士儀翰詹科道見二三品官如賓降一品禮見四品官如同官禮凡京朝官塗遇之禮固倫額駙出鎮國公和碩公主額駙分道行輔國公鎮國將軍民公侯伯都統尚書讓道旁行輔國將軍副都統侍郎及參領等官勒馬候過佐領等官以下皆下馬民公侯伯和碩公主額駙郡主額駙出都統子尚書分道行副都統侍郎等官讓道旁行參領郎中佐領員外郎雲騎尉主事等官勒馬候過護軍校驍騎校等官及軍民人等皆下馬內大臣都統子尚書縣主額駙出副都統侍郎等官讓道旁行參領以下與遇民公侯伯同前鋒護軍步軍統領副都統侍郎男郡君額駙出參領郎中等官讓道旁行佐領以下與遇都統同一等侍衛護衛參領輕車都尉郎中縣君額駙出佐領員外郎雲騎尉主事等官讓道旁行護軍校驍騎校等官及軍民人等皆勒馬候過二等侍衛騎都尉佐領員外郎鄉君額駙雲騎尉主事等官出護軍校驍騎校等官及軍民人等皆讓道行凡屬官見長官之禮初見屬官公服詣署首領官引自東階升堂具銜名履歷呈於各長官坐案屬官以次各嚮上三揖長官咸避席答揖退若燕見於私宅如五品官見大學士儀凡國學生見國子師之禮初見弟子公服詣學首領官引自東階升堂北面三揖侍立於左西面受教畢三揖如初退若燕見於私宅入門通名俟召師迎於階上弟子升階揖俟師入門從入北面再拜師西面答揖遂趨正師坐畢左還命坐北面揖弟子西面師東北面坐若旅見弟子均西面北上茶至起受茶揖坐飲受教畢辭退三揖師咸答禮送至二門師前行弟子從俟師入三揖乃退翰林院庶吉士見大學士暨教習庶吉士亦如之凡直省文武官敵體相見之禮賓乘輿至署門吏稟白啓門儀衛止門外賓由中門入至堂簷下降輿主人出迎於簷前揖入賓退送於初迎處視賓升輿退餘與京官同品相見儀同文職屬官見長官之禮司道初見督撫具銜名履歷公服詣署大門外降輿入自左門長官迎於堂後屏內先行屬官從至聽事稟庭參長官辭三揖命坐揖長官正坐屬官西面坐若旅見則東西面均北上受茶揖辭出三揖每揖長官咸答揖送至屏門外屬官北面三揖長官西面答畢先入屬官復三揖趨出至大門外升輿退若燕見常服通銜名不稟參餘儀同知府直隸州知州見督撫行庭參禮稟拜見免三揖長官不迎送餘與司道同府倅見督撫轅門外降輿餘與知府同州縣教職直隸州佐二官見督撫轅門外降輿入北面再拜興三揖告辭三揖長官皆立受不答揖餘與府倅同首領佐雜官進見行一跪三叩禮不揖不坐知府直隸州知州府倅見司道司迎送於屏門外道於堂簷下坐次屬官西面長官東北面餘與見督撫同州縣教職直隸州佐二官見司道長官不迎送餘與知府同首領佐雜官見司道與見督撫同州縣教職見知府迎送於屏門外餘與見司道同首領佐雜官見知府與見司道同州縣教職見府倅迎送於堂簷下餘與見知府同府首領縣佐二官見府倅與州縣見司道同雜職官見府倅與見知府同直隸州屬知縣教職及雜職官見知州與見知府同雜職官見州縣與州縣官見知府同見直隸州同州判與見知縣同武職屬官見長官之禮副將初見提督具銜名履歷披執佩刀至轅門外下馬門吏稟白傳命免披執易補服由左門入至聽事北面稟庭參長官辭三揖長官西面答揖正坐屬官西面坐茶畢辭退三揖如初長官送至簷下退若燕見常服通銜名餘儀同參將遊擊見提督北面跪三叩興三揖坐辭退揖如初長官起立於位答揖出不送餘與副將同都司守備初見提督披執長官正坐屬官入北面跪自宣銜名三叩興西面席地跪坐不設茶辭退三叩如初趨出長官不起立若燕見常服不宣銜名餘均與遊擊同千總把總見提督不坐餘與守備同副將見本鎮總兵官長官迎送於堂後屏內坐次長官東北面屬官西面屬官揖長官平立答揖餘與見提督同參將遊擊見總兵官坐次長官正坐屬官西面坐屬官揖長官西面答揖出不送餘與副將同若非本鎮所轄儀與副將見提督同都司以下官見總兵官皆與見提督同遊擊見本協副將茶畢辭退長官離坐送餘與見總兵官同都司守備初見副將三叩長官起立告辭不揖不送餘與參遊同燕見三揖長官答揖餘儀同非本協所轄與參遊同千總以下官進見與見總兵官同都司守備初見本管參將遊擊稟庭參長官辭三揖長官西面答揖告退長官離坐送餘與見副將同燕見三揖告辭揖如初長官咸答揖餘儀同非本管者迎送於大堂後屏內餘儀同千總以下官見參遊與見副將同千總初見都司守備與守備見參遊同燕見一揖告辭不揖餘儀同把總初見都司守備三叩長官答揖告辭起立不送餘與千總同文武官相見之禮提督見總督三揖總督正坐提督隅坐若提督帶一品世爵者總督西面提督東面餘與敵體相見同總兵官見總督與司道同副將見總督初見披執燕見常服佩刀均北面跪三叩興西面立茶畢北面三揖退見巡撫與知府同參將以下見督撫均侍立不坐餘與守備見提督同千把總見司道如之司道見提督與提督見總督同知府同知通判見提督總兵官與司道見提督同州縣見提督具銜名由左門入提督迎於階下至聽事三揖就坐提督正坐州縣西面坐茶畢辭出三揖如初提督送至堂後屏門外揖退見總兵官儀同八九品以下佐雜官見提督總兵官與見督撫同餘官相見均如敵體儀河道漕運各總督與直省官相見之禮與督撫同學政與督撫相見用敵體儀司道見學政具銜名儀門外降輿學政迎送於堂簷下餘與敵體儀同知府直隸州府同知通判見學政不稟參送至堂後屏門外餘與見督撫同州縣見學政初見庭參常見三揖學政咸避席答揖送至堂後屏門內餘與見督撫同教職見學政初見再拜常見三揖學政皆起立拱手餘與州縣同首領佐雜官見學政與見督撫同若學政官三品以上者司道以下官進見均與督撫同鹽政及欽差官與各官相見均與學政同運使鹽道見鹽政與司道見督撫同運同運判見鹽政與知府見督撫同科目出身鹽大使見鹽政與知縣見督撫同滿漢官相見之禮自司道以下官見將軍與見總督同見副都統與見總兵官同協領參領見督撫與司道同佐領防禦見督撫與知府同驍騎校以下官見督撫與州縣同餘官相見皆如敵體儀直省學校生員見師長之禮學政涖任後講學於明倫堂教職引本學生員謁見咸公服重行北面再拜學政拱立於位嵗科試畢生員列一二等者咸公服詣試院升堂三揖閲卷畢三揖退餘儀如之見本學學師與國學生見國子師同凡順天府屬官見長官之禮治中通判見府尹與直省司道見督撫同見府丞與直省司道見學政同所屬州縣教職見府尹與直省州縣教職見督撫同見府丞與見司道同見治中通判與見府倅同經歷以下官見尹丞治中通判與直省首領官見知府府倅同奉天府屬知府見府尹如直省知府見督撫見府丞如直省知府見學政餘均與順天府同府州縣見盛京五部侍郎與府尹同凡士相見之禮賓造門主人出迎於大門外揖賓賓入及門及階皆揖如初賓西主人東升賓再拜主人答再拜興主人趨正賓坐賓辭固請卒正坐左還賓正主人坐亦如之賓受茶揖辭退揖主人送賓及階及門賓揖辭主人皆答揖遂送賓於大門外揖如初迎儀凡弟子見受業師師東嚮坐弟子北面侍坐不迎送餘如國學生見國子師之禮凡見有服尊親父之執友之禮入門通名命見升階北面再拜尊者西面答揖命坐揖視尊者坐所嚮旁侍坐茶至揖辭退三揖尊者皆答揖出不送若尊長來見迎送於大門外餘如前儀欽定大清會典卷三十四
