body:
  text: 戶部田賦粵自東土肇基於燕斯宅瀋遼奧區稱九州之上腴焉近畿五百里內當明季兵燹之後野多曠土定鼎之初以錫羣策羣力垂為世業墟市不改邱冡如故有民田犬牙相錯者取别州縣閒田易之俾旗人各安其業以正經界其徵輸之籍盡除之直省民田則三壤以行兩稅而常賦以定修和歲久田野日闢乃取徭銀計畝而均輸之永免口率之徵以寬百姓之輸將底愼國家之財賦凡宗室王貝勒貝子公將軍賜畿輔莊園各有差通計八旗萬三千三百三十八頃有竒凡勳戚世爵職官軍士賜畿輔莊田各有差通計八旗十有四萬百二十八頃七十一畝有竒凡畿輔旗莊國初頒賜已定厥後皇子分封公主贈嫁皆取諸內府莊田承平以來邊界益拓盛京東北及諸邊口外古稱甌脫不毛之土多闢為腴壤八旗戶口滋繁咸取給焉凡八旗官兵所受之田毋許越旗賣儥及私售與民違者以隱匿官田論凡牧場近京之地阡陌相連盡給八旗官兵以沙地不耕者為場盛京及沿邊之地廣漠無際屯墾所不能盡擇水草肥美者為場以牧上廄馬及驝駝牛羊次給宗室王公八旗官兵以廣牧政凡直省田賦以乾隆十八年奏銷册計之共民田七百八萬千一百四十二頃八十八畝賦銀二千九百六十一萬千二百一兩糧八百四十萬六千四百二十二石各有竒草五百十有四萬五千五百七十八束直隸布政使司民田六十五萬七千百九十一頃八十七畝賦銀二百四十一萬千二百八十六兩糧十萬千二百二十九石各有竒草九萬四千四百四束糧草均留充本省經費盛京民田二萬五千二百四十三頃二十一畝賦銀三萬八千百有十兩糧七萬六千二百六石各有竒糧充本省經費山東布政使司民田九十七萬千有五十四頃七畝賦銀三百三十四萬六千二百五十七兩糧五十萬七千六百八十石各有竒歲漕留京師三十四萬八千七百七十八石充本省經費十有五萬八千九百二石各有竒山西布政使司民田三十二萬九千五百八十六頃二十一畝賦銀二百九十七萬二百六十六兩糧十有六萬九千二百四十六石各有竒糧充本省經費河南布政使司民田七十二萬二千八百二十頃三十六畝賦銀乾隆三年蠲除百六十兩實徵三百三十萬三千八十兩糧二十四萬八千八百六十五石各有竒歲漕九京師二十一萬千八百七十四石留充本省經費二萬八千九百九十一石各有竒江南江蘇布政使司民田六十八萬九千八百八十四頃四十五畝賦銀雍正三年蠲除四十五萬乾隆二年蠲除二十萬兩實徵三百三十七萬千三百三十四兩糧二百十有五萬五千二十一石各有竒歲漕八京師百七十一萬六千百八十九石留充本省經費四十三萬八千百三十二石各有竒安徽布政使司民田三十三萬八千百二十頃九十三畝賦銀百六十八萬八千兩糧八十四萬五千二百四十八石各有竒歲漕石京師五十六萬六千二百七十六留充本省經費二十七萬八千九百七十一石各有竒江西布政使司民田四十七萬九千二百七頃六十二畝賦銀雍正三年蠲除七萬五千五百四十九兩乾隆三年蠲除三萬七千七百七十四兩實徵百八十七萬九千八百十兩糧八十九萬九千六百三十二石各有竒歲漕經京師七十七萬百三十二石留充本省費十有二萬九千四百九十九石各有竒福建布政使司民田十有二萬八千二百七十頃八十七畝賦銀一百十有七萬七千八百九十九兩糧十有六萬八千四百五十三石各有竒糧充本省經費浙江布政使司民田四十五萬九千七百八十七頃七十畝賦銀雍正五年蠲除八萬七千二百兩乾隆三年四年蠲除四萬五百四十兩實徵二百八十一萬二千四百四十九兩糧一百十有三萬四百八十一石各有竒歲漕十京師八十五萬六千七百三九石留充本省經費二十七萬三千七百四十二石各有竒湖廣湖北布政使司民田五十六萬六千九百十有三頃四十九畝賦銀節年蠲除十有八萬二千四百五十四兩實徵百有十萬八千一百五十三兩糧二十八萬六千五百五十四石各有竒歲漕經京師十有三萬二千四百三石留充本省費十有五萬四千一百五十石各有竒湖南布政使司民田三十一萬二千二百八十七頃九十八畝賦銀節年蠲除十有八萬五百五十三兩實徵一百十有六萬三千六十三兩糧二十七萬七千六百四十一石各有竒歲漕千京師十有三萬三七百四十三石留充本省經費十有四萬三千八百九十七石各有竒陜西西安布政使司民田二十五萬二千三百七十一頃三畝賦銀百五十三萬九百七兩糧十有六萬八千四百五十三石各有竒糧充本省經費甘肅布政使司民田十有七萬七千八百三十一頃三十三畝賦銀二十五萬七千七百二十三兩糧五十萬三千四百七十六石各有竒草五百五萬千一百七十四束糧草充本省經費四川布政使司民田四十五萬九千百四十六頃六十七畝賦銀六十五萬九千七十五兩糧萬四千三百二十九石各有竒糧充本省經費廣東布政使司民田三十二萬八千八百三十二頃九十三畝賦銀百二十五萬七千二百八十六兩糧三十四萬八千九十五石各有竒糧充本省經費廣西布政使司民田八萬七千四百頃六十畝賦銀三十八萬二千五百九十七兩糧十有三萬三百七十五石各有竒糧充本省經費雲南布政使司民田六萬九千四百九十九頃八十畝賦銀十有五萬三千七百五十兩糧二十三萬八百四十八石各有竒糧充本省經費貴州布政使司民田二萬五千六百九十一頃七十六畝賦銀十萬一百五十六兩糧十有五萬四千五百九十石各有竒糧充本省經費凡天下屯田咸給運軍軍運漕糧隸衛所田賦歸州縣徵收隸布政使司國初田隸衛所設屯田御史屯田道以綜核之後裁御史及道以屯賦歸有司其賦或輸本色或輸折色或本折各半或本七折三所輸不同皆與民田同科屯田荒蕪召軍民墾復無力者官給牛具荒地內有軍指為民民詭為軍者以時清釐民册承差衛所毋許牽纍軍册有役州縣不得重科民佃軍田輸租則免軍役軍佃民田完賦則免民徭軍田許照民田售典與軍者聽與民者禁違則以田歸衛以直充公各省布政使司屯田以乾隆十八年奏銷册計之共田二十五萬九千四百十有六頃四十八畝賦銀五十萬三千五百五十七兩糧三百七十三石各有竒山東屯田二萬二千頃八十九畝賦銀五萬六千十有八兩各有竒山西屯田九千九百九十九頃三十畝賦銀五萬九千百二十一兩各有竒河南屯田七千二百五十二頃九十八畝賦銀萬七千九百九十一兩各有竒江南江蘇屯田萬一千五百九十六頃九十二畝賦銀三萬七千三十五兩各有竒安徽屯田萬一千八百五十六頃八十六畝賦銀四萬五千八百六十兩糧三百七十三石各有竒江西屯田六千四百三十五頃六十六畝賦銀萬四千九百三兩各有竒福建屯田七千八百四十五頃三十一畝賦銀四萬四千三百十有六兩各有竒浙江屯田千七百四十一頃六十四畝賦銀萬七千八百九十七兩各有竒湖廣湖北屯田二萬四百十有六頃二十三畝賦銀五萬二千七百兩各有竒湖南屯田五百十有一頃十有八畝賦銀三千二百四十八兩各有竒陜西西安屯田三萬九千二百三十六頃八畝賦銀七萬四百二十六兩各有竒甘肅屯田十萬七千二百四頃七十八畝賦銀二萬八千五百七十五兩各有竒四川屯田百三十四頃八十二畝賦銀一百兩各有竒廣東屯田五千二百七十一頃八十四畝賦銀千八百七十七兩各有竒廣西屯田千九百九十六頃六十二畝賦銀八千五百十有六兩各有竒雲南屯田五千九百十有五頃三十七畝賦銀四萬四千九百七十四兩各有竒凡免科田郊壇社稷山川厲壇學校闕里孔林四氏學周公廟各聖賢祠墓寺觀地計三千六百二十頃有竒凡學田專供修學及贍給貧士其田與賦即在州縣田賦之中惟佃耕收租以待學政檄發閒有山塘園屋統名曰田所收有銀有錢有糧統名曰租田之多寡租之重輕各學不齊舊無定額直隸學田千四百二十九頃八十八畝租銀二千七百七十六兩糧千九百十有六石各有竒山東學田四百十有七頃七十二畝租銀千三百二十九兩各有竒山西學田二百七十七頃九十八畝租銀二百五十七兩糧十有六石各有竒河南學田二百十頃七十一畝租銀九百六十五兩各有竒江南江蘇學田四百十有八頃五十八畝租銀五千四百九十一兩各有竒安徽學田二百二十頃十有八畝租銀千六百四十兩各有竒江西學田六十八頃租銀十有八兩糧八千四百十有七石各有竒福建學田九十頃七十畝山園池屋不計數租銀百五十四兩糧千二百四十九石各有竒浙江學田三百頃十有七畝租銀三千五十兩有竒湖廣湖北學田百二十頃五十七畝租銀八百三十二兩糧百九十二石各有竒湖南學田七千三百頃八十畝租銀二十九兩糧四千三百五十八石各有竒陜西西安學田五十五頃二十畝租銀百五十四兩糧千二百四十九石各有竒甘肅學田三百十有一頃二十五畝租銀八十九兩糧千二百九十四石各有竒四川學田二十三頃有竒田不起租以賦給貧士廣東學田百五十一頃十有六畝租銀千九百三十兩有竒廣西學田百三十四頃七畝租銀千七十三兩糧三十二石各有竒雲南學田十有四頃八十八畝租銀三十六兩糧五百九十一石各有竒貴州學田四十四頃十有八畝租銀二百四十六兩糧四百八十七石各有竒凡土司貢賦川廣雲貴布政使司所屬宣慰宣撫安撫長官等司及土府州縣社寨夷猺向化既久或比年一貢或三年一貢各因其土俗以定制焉四川布政使司所屬土司歲貢蕎麥馬牛狐皮貝母折銀四千七百二十三兩糧千二百七十石各有竒馬十有三匹三年一貢馬折銀三百十有二兩有竒馬五十三匹廣西布政使司所屬土司歲貢馬折等銀六百三十三兩有竒雲南布政使司所屬土司歲貢礦課及苧布鹿皮等折銀萬三千七百八十二兩有竒貴州布政使司所屬土司歲貢米穀萬六千四百三十石馬折等銀二萬二千四百八十兩各有竒凡丈量按部頒弓尺廣一步縱二百四十步為畝方廣十五步縱十六步有司於農隙時親率里甲履畝丈勘以定疆界杜占爭均畝賦有差委滋擾及徇私者罪之州縣册籍原載邱假四至不清者丈欺隱牽纍有地無糧有糧無地者丈畝步不符賦則或浮者丈熟荒相間旗民鹽竈以及邊地民番相錯者丈壤界相接畛域不分者丈荒蕪召墾寄糧分隸田在此邑糧寄彼縣者丈水衝沙壓公占如開渠築隄占用民地應抵以他地撥抵應豁豁除糧賦者丈瀕江瀕海之區五年一丈視其或漲或坍分别升免凡開墾各州縣衛所荒蕪膏腴地遷漲新開地各邊口外曠土咸分給兵民墾種沿邊牧地不準開墾無力者官給牛種招徠外籍入甲及徒流之人均準屯墾給照為業番夷地畝亦準租墾屯兵及邊地民苗不諳耕穫者為治耒耜傭夫教之以俟其嫻習開渠洞以資灌溉建房堡以備棲止水田六年起科旱田十年起科如本管官召墾及官生捐墾者以田歸佃次年起科隱墾首報者就首報年起科有豫徴私斂者罪之州縣衛所官勸墾多寡道府等督率勤惰歲終並入考成紳士倡率者豫叙隱匿自首者免罪有橫加科則抑報開墾者罪之凡勸課農桑由地方犬吏倡有司課民力耕耘修𧖟織廣樹蓄以勤生業戒遊惰懲蹂躪禁種妨農雜物以崇本計革暴殄浮靡以節物力舉力田老農榮以冠帶以勸勤勞凡有利於民生者均隨宜鼓舞令民樂於從事不得督責嚴急繩以官法有忽視民隱奉行不善者劾之凡直省田賦由州縣官徴解布政使司執其總而量度之或聽部撥解京或充本省經費或需鄰省酌劑歲陳其數析為春秋冬三册由巡撫咨部春二月秋八月冬十月部受其計簿核其盈絀授以式法列其留存撥解之數以時疏聞以定財用出納之經運解京餉除陜甘四川雲南貴州等布政使司賦稅全支本省經費餘省由部按巡撫所報實存册移文撥解布政使司具批二一申部一申科巡撫選委解官十萬兩上以府同知通判五萬兩上以州同州判官及縣丞簿五萬兩下以雜職皆擇其俸深亷幹者任之計程限日到部直隸近畿不立限山東山西河南以六十日江南江西浙江湖北湖南以八十日福建廣東廣西以百日過期者劾部限三日校數無闕以實收及原批發解官齎赴戶科驗畢回繳布政使司為信起運之時每程給腳直每櫝給扄鐍費銀有改煎給耗費所經州縣大道給車馬僻徑給擔夫不得沿塗纍民督撫飭辨兵防護書櫝數於兵牌按程稽核防護疏失者論留充經費布政使司以每歲經費之數申巡撫咨部留貯正賦以待支發歲終㑹訃以所屬計簿申巡撫奏銷鄰省協餉由部按巡撫所報實存册以應協之數移文發餉受餉二省撫司撥餉布政使司鈐封部定權衡付解吏齎往受餉布政使司驗印封核收如銀數闕少權衡不符者委運承運官皆論如法其按程給腳直按櫝給扄鐍等費並與解京餉同凡直省田賦酌留分貯備用於每歲經費外按直省事務之繁簡道里之遠近賦入之多寡各留賦銀有差或貯布政使司庫或貯知府直隸州庫貯司庫者遇省有急需督撫疏報即發貯府州庫者遇州縣有急需府州申詳即發事竣以時奏銷凡歲課奏銷布政使司㑹所屬見年賦稅出入之數申巡撫疏報以册逹部曰奏銷册備載舊管新收開除實在四柱條析起運存留支給撥協採辦為數若干以待檢校部㑹全數而覆核之彚疏以聞以慎財賦出入以定奏銷考成量地逺近以定報銷之期直隸山東山西河南陜西甘肅以四月到部江蘇安徽江西浙江湖北湖南以五月福建廣東廣西四川雲南貴州以六月有故疏聞展限若申册遲延一月至一年以上者册籍遺漏舛錯及數不符者巡撫以下皆論如法凡歲課考成按銀數以詔最見年賦稅奏銷前全完者豫叙經徵州縣以五萬兩下至十萬兩上督徵之道府直隸州以十萬兩下至二十萬兩上巡撫布政使司以五十萬兩下至百萬兩上為差經徵守備千總督徵都司於奏銷前全完者豫叙以千兩下三千兩上為差各衛督徵通判視知府經徵經歷視州縣按分數以詔殿州縣分經徵之數為十分撫司道府州分督徵之數為十分見年賦稅不完者州縣自不及一分至五分司道府州至六分巡撫至七分論劾有差舊逋賦稅催徵州縣限一年督催司道府州限一年有半巡撫限二年限年內不完者再分三限自原參不及一分至四分論劾有差各衛催徵守千視州縣督催都司視道府受代官見年徵催計賦額分數限年徵催計蒞任月日攝篆官見年徵催攝一月後限年徵催攝一年後均按所徵所缺為考成凡州縣官徵收田賦如期運解布政使司以待部撥其應充本地經費者如數存留以待支給布政使司受其出入之籍而鉤考之以待奏銷凡州縣上計布政使司自下申牒曰批文以一紙為兩牒相連兩牒之閒書銀數編號中分之一申巡撫一發解役赴司交納自上給單曰實收布政使司於批解到日以部定權衡掣櫝校數無闕給實收及原批呈巡撫合批相符發回州縣存據凡州縣催科以分限之法紓民力以輪催之法免追呼以印票之法徵民信以親輸之法防中飽分限之法州縣按全書所編賦額分為夏秋兩限及期榜諭俾納户周知其數二月開徵四月輸半五月停徵八月續徵十一月完徵若物土異宜四月未能輸半者督撫察所屬農事女紅收成早晚以定徵輸之期輪催之法簡閲里甲或五户或十戶同立一單名曰滚單書納戶姓名於上每戶區作十限以次遞催印票之法每票三聯名曰聯票書納戶所完賦額編號鈐印而三分之一留縣一附簿一給納戶徵信親輸之法置匭署前聽民封銀親投以部定權衡凖其輕重若竒零之數願以錢納者聽每十錢當銀一分以禁吏胥侵漁民有負賦者責追職官生監及吏役兵丁各以其所負之數别而論之橫斂加徵者劾凡稽察庫藏督撫司道及本管府州每歲於奏銷前核視所屬庫藏如有虧闕參革究追由法司核實依律罪之凡賦役全書由布政使司彚所屬州縣衛田賦各數以地丁賦糧商牙課稅為一書應支官役俸工驛傳料價為一書應解本色折色物貨為一書分别原額新增開除實在彚纂成編每十年則修輯之書成申部科頒州縣以備考核欽定大清會典卷十
