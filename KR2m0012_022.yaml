front:
  text: 欽定四庫全書欽定大清㑹典卷二十二
  hash: sha256:64fffe983c61d91debf3cfa9675f1c1d4096d0307780cc87b7616e8736df3981
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_022-1a, image: WYG0619/WYG0619-0175c.png}
body:
  text: 禮部儀制清吏司朝㑹三凡元日長至次日皇太后聖夀節直省文武官豫期進表稱賀至日五鼔内鑾儀衛陳儀駕於慈寧門階下至長信門外詳見鑾儀衛東西嚮内監陳中和韶樂於慈寧宫檐下陳丹陛大樂於長慶門内左右均北嚮鴻臚官設表案於慈寧門東鴻臚官引王以下入八分公以上詣隆宗門外祗竢引不入八分公以下暨二品以上官於長信門外引三品以下文武各官於午門外各序立内閣學士自内閣奉表大學士随行内閣官二人前導至永康左門外學士奉表授大學士禮部堂官前引升慈寧門東階陳表於案内監四人舁案二人前導由左門入陳於慈寧宫寶座之東武備院卿設皇帝拜位於慈寧門正中質明禮部堂官詣乾清門奏時皇帝禮服乘輿出宮扈衛如常儀禮部堂官恭導出隆宗門至永康左門外降輿入王公随入皇帝升東階至慈寧門左西嚮立王公等階下左右立前引十大臣及侍衛立儀駕外御史二人鳴贊官四人郤立慈寧門東西檐下御史禮部鴻臚官各二人立長信門外又二人立午門外均東西面北上鴻臚官八人分立於永康左門右翼門熙和門午門内外傳示禮部尚書奏請皇太后御慈寧宮内監接奏皇太后禮服出宮中和韶樂作奏豫平之章皇太后陞座樂止禮部尚書奏行禮恭導皇帝就拜位北嚮立丹陛樂作奏益平之章鴻臚官引羣臣各就拜位立鴻臚官由内接傳逹午門外凡傳如之羣臣各就拜位立左翼西上右翼東上均北面鳴贊官奏跪拜興皇帝率羣臣行三跪九叩禮畢樂止恭導皇帝復位立羣臣各復位立禮部尚書奏請皇太后還宫内監接奏中和韶樂作奏履平之章皇太后還宫樂止禮部尚書奏禮成恭導皇帝降階出永康左門外陞輿還宫王公百官各退内監移設丹陛樂於慈寧門内檐下左右北嚮女官設皇后拜位於慈寧宫檐前正中設貴妃妃嬪拜位於左右稍後公主福晉以下二品命婦以上自永康右門入進慈寧門序立東西丹墀禮部堂官奏請皇后行禮内監接奏皇后率貴妃妃嬪禮服乘輿出啟祥門前引女官八人恭導至徽音左門外降輿入皇后陞丹陛至檐前西嚮立貴妃妃嬪東西序立公主福晉命婦按翼於丹陛上立均東西面北上引禮女官四人立丹陛上左右東西面引禮女官奏請皇太后御慈寧宮内監接奏皇太后禮服出宮中和韶樂作樂章同前後仿此皇太后陞座樂止引禮女官恭導皇后貴妃妃嬪就拜位北嚮立公主福晉命婦各就拜位立左班西上右班東上均北面丹陛樂作奏雝平之章引禮女官奏行禮皇后率貴妃妃嬪行六肅三跪三拜禮公主福晉命婦随行禮畢樂止引禮女官恭導皇后貴妃妃嬪復位立公主福晉命婦各復位立引禮女官奏請皇太后還宮内監接奏中和韶樂作皇太后還宮樂止奏禮成恭導皇后貴妃妃嬪降階出徽音左門外陞輿還宮公主福晉命婦皆退内監引皇子詣皇太后宮行禮如儀萬夀聖節皇帝率王公百官於皇太后宮行禮皇后千秋節皇后率貴妃妃嬪公主福晉以下二品命婦以上於皇太后宮行禮均與前儀同恭遇皇太后聖夀大慶皇帝行慶賀禮大學士恭奉御製表文詣慈寧門東陳於案退竢於東檐宣表官稍後立大學士一人竢於西檐丹陛大樂作皇帝就拜位北嚮跪宣表官奉表至正中北面跪大學士二人同進左右跪展表樂暫止宣表官宣訖興奉表還於案樂作皇帝率羣臣行三跪九拜禮禮成皇帝還宮禮部堂官奉表授内監恭奉入宮餘同前儀凡元日長至次日皇后千秋節内外文武官皆豫期進箋稱賀是日皇后朝於皇太后皇帝禮畢御交泰殿行慶賀禮内鑾儀衛豫陳儀駕於殿前陳車輿於乾清門外均東西相嚮内監陳中和韶樂於交泰殿檐下陳丹陛大樂於儀駕之南均左右北嚮設貴妃妃嬪拜位於殿門内公主福晉以下二品命婦以上咸朝服集隆宗門外至時貴妃率妃嬪具禮服詣交泰殿陞丹陛序立於殿前東西嚮内監引公主福晉命婦由隆宗門内右門入序立於丹陛左班西面右班東面均北上引禮女官奏請皇后御殿内監接奏中和韶樂作奏淑平之章皇后禮服陞座樂止引禮女官引貴妃妃嬪就拜位立公主福晉命婦各就拜位立左班西上右班東上均北面丹陛樂作奏正平之章行六肅三跪三叩禮畢樂止引禮女官引貴妃妃嬪復位立公主福晉命婦各復位立引禮女官奏禮成中和韶樂作奏順平之章皇后還宮樂止貴妃妃嬪各還宮公主福晉命婦咸出内監引皇子詣皇后宮行禮如儀欽定大清㑹典卷二十二
