body:
  text: 禮部精膳清吏司燕禮凡大燕之禮恭遇元日萬夀聖節及大慶典前期部疏請得旨由領侍衛內大臣奏命進酒大臣尚茶庀茶尚膳內管領庀御饌王以下入八分公以上進饌席牲酒有不足者光祿寺供酒席兩翼稅務供羊均由司示備是日已刻內外王公台吉百官朝服咸集鑾儀衛設鹵簿樂部設樂懸如朝儀武備院張黃幕於丹陛正中內務府設反坫於幕下陳尊罍巵爵於坫上禮部設青幕於丹墀夾鹵簿東西各八豫陳御筵於寶座上稍南寶座下左右設內外王公大臣台吉席各七行席各四十有一均東西相嚮寶座左右陛後設後扈大臣席各一僉嚮寶座前左右設前引大臣席各三東西相嚮寶座後左右豹尾班侍衛席各一西豹尾班之次起居注日講官席一均南嚮殿門外西簷下都察院樂部堂官席一東嚮丹陛上一二品官侍衛各三行席各二十有三東西相嚮黃幕東禮部堂官席一西嚮西內務府堂官席一東嚮丹墀青幕下東為鑲黃正白鑲白正藍四旗官及內閣吏部户部禮部宗人府通政使司翰林院詹事府理藩院太常寺光祿寺吏科户科禮科鴻臚寺國子監欽天監太醫院席西為正黃正紅鑲紅鑲藍四旗官及兵部刑部工部都察院大理寺鑾儀衛太僕寺中書科兵科刑科工科順天府兵馬司外國貢使席各二十有四東西嚮午刻鴻臚寺官引內王公百官理藩院官引外藩王公入王以下公以上在丹陛上百官在丹墀東西序立禮部堂官奏請御太和殿皇帝禮服出宮前引後扈午門鳴鐘鼓中和韶樂作升座樂止鳴鞭記注官入殿右門立均如朝儀鴻臚官引王公大臣由殿左右門入暨百官各就席行一叩禮坐尚膳內管領護軍參領升邇御筵降乃進茶丹陛清樂奏海宇升平日之章尚茶正率尚茶侍衛執事等舉茶案以次由中道進至簷下進茶大臣奉茶入殿中門羣臣咸就本位跪進茶大臣由中陛升至御前跪進茶退立於西旁皇帝飲茶羣臣均行一叩禮進茶大臣跪受茶碗由右陛降出中門羣臣咸坐侍衛分賜王公大臣茶內府護軍執事等分賜幕下大臣官員茶尚茶正等徹茶案凡常朝皆同賜茶儀樂止展席羃乃進酒內府掌儀司官二人奉壺爵一人奉巵進丹陛清樂奏玉殿雲開之章羣臣起立掌儀司官於殿左門外西嚮酌酒進酒大臣出席釋補服元日則釋端罩入殿中跪羣臣咸於坐次跪掌儀司官奉爵入西嚮跪授大臣退進酒大臣奉爵興由寶座中陛升由御筵右進至御座側進爵興由右陛降至原位跪皇帝進酒進酒大臣行一叩禮羣臣均隨行禮進酒大臣由右陛升跪受爵仍由中陛降至原位跪掌儀司官入跪奉爵退羣臣起立賜進酒大臣酒掌儀司官酌金巵以入立授進酒大臣大臣受一叩卒飲掌儀司官立受巵退進酒大臣一叩興羣臣坐進酒大臣出加補服入席坐乃進饌中和清樂奏萬象清寧之章尚膳承旨分賜食品於各席遍樂止笳吹作奏畢慶隆舞進舞揚烈舞畢隊舞大臣進殿中舞喜起舞所司舉反坫進至殿陛下御前侍衛酌巵酒升至御座前皇帝簡召王公大臣賜酒領侍衛內大臣視侍衛遍賜殿陛王公大臣酒光祿寺官分賜左右青幕下百官酒羣臣咸跪受一叩卒飲一叩坐隊舞退朝鮮國俳進百技以次並作退尚膳升徹御筵降羣臣起立鴻臚官引殿內王公大臣由左右門出引丹陛各官皆降東西階丹墀百官咸出幕就東西班序立謝恩聽贊行一跪三叩禮丹陛大樂作禮畢樂止鳴鞭中和韶樂作皇帝還宫樂止所司徹席幕各退凡皇太后宫設燕之禮恭遇皇太后聖夀元日於正月初二日設燕各慶典前期部疏請得旨命所司庀饌尚膳內管領庀皇太后皇后御筵貴妃妃嬪饌筵親王郡王各進饌筵牲酒不足者光祿寺備具以足四十席至日內鑾儀衛設皇太后儀駕內監設樂懸如朝儀尚膳女官內管領妻設皇太后御筵於寶座上稍南寶座之東僉設皇后筵稍後設貴妃妃嬪筵又後設公主福晉以下鄉君入八分公夫人以上席重行均東西相嚮丹陛上設公侯伯子男滿一二品大臣命婦侍衛妻席均東西相嚮張黃幕於慈寧門外正中幕下設反坫上陳尊罍巵爵屆時行燕禮儀詳內務府凡保和殿賜燕之禮歲除日燕外藩蒙古於保和殿前期內務府庀饌請旨命進酒大臣是日武備院張黃幕於殿南正中所司設反坫於幕下陳尊罍巵爵如儀尚膳設御筵於寶座上殿內設外藩王公暨內大臣並與燕文武大臣席丹陛上設台吉暨侍衛席均按翼東西相嚮樂部設宫懸於殿左右簷下設丹陛大樂於中和殿北左右均北面屆時行燕禮儀詳內務府正月十四日十五日燕外藩蒙古或於保和殿或於行幸駐蹕儀同凡視學禮成翼日燕有事諸臣於禮部司視人數付光祿寺庀饌是日朝服視設布席於堂視官次為左右衍聖公大學士內閣學士翰林院詹事府官國子監祭酒司業禮部太常寺光祿寺鴻臚寺及執事官十三氏子孫咸與三品以上異席四品以下共席設香案於露臺上序班引各官詣香案前望闕序立鳴贊贊排班贊行三跪九叩禮畢乃就席坐茶至一叩酒至一叩飲畢一叩茶一行酒三行興詣香案謝恩行禮如前各退凡經筵禮成燕進講暨侍班執事各官於協和門前期付光祿寺庀饌至日門南西嚮設席講官大學士尚書侍郎左都御史左副都御史通政使副使大理卿少卿詹事少詹事起居注日講官鴻臚卿糾儀科道鴻臚寺鳴贊各官序坐以北為上燕畢詣太和門前金水橋南謝恩一跪三叩畢各退凡會試入闈日燕有事各官於禮部是日本部官朝服齊集視設堂後楣之東設主考官知貢舉監場副都統席同行西嚮前楣西設本部堂官席後設司官席重行東嚮堂左右設同考監試監場參領參將收掌外簾四所官席露臺左右設鳴贊醫官監門巡綽等官席均重行相嚮設香案露臺上南嚮主考以下官咸朝服集午門外候宣旨畢乃赴燕陪燕堂官迎於堂簷下拱揖遂詣香案前鳴贊官夾案立贊排班贊跪叩興衆北面望闕行三跪九叩禮畢乃升堂光祿寺官奉壺爵尚書立揖祭酒三遂送主考酒以次送知貢舉副都統光祿寺官分送同考以下各官主考酬酢主席遍依次就席光祿寺供饌燕畢仍詣香案謝恩行禮如前主考各官入闈送如迎儀徹闈燕同凡殿試傳臚翼日燕有事各官及諸進士於禮部曰恩榮燕豫期由部奏請命主席大臣至日司官朝服視設堂後楣之東設主席大臣席於正中讀卷官鑾儀衛堂官席於左右同行西嚮前楣西設本部堂官席同行東嚮皆異席受卷彌封收掌監試護軍參領填榜印卷各官席堂左右供給官席露臺左鳴贊官席露臺右相嚮二人共席一甲進士在供給官席前二甲一名三甲一名進士在一甲南稍後均西嚮專席餘進士席露臺下左二甲右三甲相嚮二人共席設香案如入闈燕儀主席大臣各官朝服集金水橋諸進士集於部以俟席備光祿寺官詣金水橋以告主席大臣各官至部堂官迎簷下揖遂率諸進士詣香案前鳴贊贊排班贊行三跪九叩禮如儀退各官依席次序立旅揖和聲署樂作序班引一甲進士至堂簷下東面立諸進士序立於後嚮主席大臣四拜主席答揖次讀卷官本部鑾儀衛堂官如之次執事官再拜執事官答再揖畢主席出堂簷前立光祿寺官奉壺注酒於爵主席受爵揖祭酒三揖授虛爵光祿寺官復注酒授一甲進士進士受爵揖立飲卒三爵主席復位各官就坐諸進士依席次坐乃燕和聲署樂作燕畢謝恩如前儀凡恭修實録開館日燕監修總裁各官或於禮部或於館內前期由部奏請命主席大臣付光祿寺庀饌監修總裁官主席大臣均專席在部則堂官陪燕纂修提調收掌謄録翻譯各官共席均左右相嚮燕畢謝恩如儀在館於金水橋南在部設香案行禮凡衍聖公來朝燕於禮部以尚書陪燕是日設賓主席於後堂東嚮以南為上博士席北嚮以西為上設香案於露臺上乃速賓衍聖公入儀門降輿尚書迎於堂簷下揖又旅揖博士詣香案前聽贊行三跪九叩禮畢乃坐光祿寺官奉茶酒饌和聲署作樂燕畢詣香案前謝恩行一跪三叩禮畢送如迎儀凡外國貢使朝見畢燕於禮部以堂官主席至日設席主席位堂正中正使居其右副使在正使下均專席從官從人席副使後均共席露臺上設香案乃速貢使至二門步入主席率詣香案前聽贊行三跪九叩禮畢正副使見主席一跪三叩主席答揖三乃坐茶一行酒三行燕畢詣香案謝恩行一跪三叩禮使者稟辭各退凡外藩王公入朝元正在京正紅鑲白鑲紅正藍鑲藍五旗王公於元日後擇吉各筵燕一次每旗主席以親王或郡王一人就府中設席其餘本旗諸王貝勒貝子公咸赴陪燕主人席西嚮賓席東嚮均專席北上從官席門外簷下及露臺上東嚮稍後咸共席賓至主人迎入行禮序坐視賓秩尊卑各以其班接待詳見儀制司相見儀既入坐從官門外行二跪六叩禮各就坐王府樂作雜劇並陳燕畢從官先出謝燕行禮賓主各行禮出席賓辭出送如迎禮餼廩凡會試饔餼豫劄順天府移取直𨽻布政使司庫銀送部委大宛二縣丞倅承辦咨取户部米給領又咨取工部薪炭委順天府治中領辦臨期委司官一人充供給所官監視舉子三場飲食毋有不潔自考官知貢舉以下場內有事官吏日供肴饌各有差等𨽻卒匠役均豫稍食事竣部會順天府尹奏銷凡賓館饔餼東南西徼外及海島諸國朝貢使者日給脯資餼牽部劄光祿寺二日一送館西北諸番部落遣使西域番僧遣徒盛京及陜甘邊境諸寺番僧朝貢至京者由理藩院咨部轉劄光祿寺供備凡饋餼下嫁外藩公主暨額駙館於京師外藩王公來朝遇元旦令節均由部奏賜除夕筵席從官酒肉各有差分行所司供備衍聖公來朝初至由所司具食品致餼外國朝貢陪臣在京度歲除夕賞賚均劄光祿寺供備凡廩給盛京以北人户移家來京及邊界新附人户來京者由旗咨部劄光祿寺按其人數日給肉鹽至三歲乃止盛京禮部歲進陵寢供品盛京吉林等處將軍及户部內務府所屬採捕地方歲進水陸物産齎送官役日有廩給均咨到部劄光祿寺供備牲牢凡供祭牲牢盛京禮部設牛羊牧羣以供三陵歲時祭饗歲以滋息及取用之數咨部並咨户部察核東陵西陵每祭取乳牛行左右翼稅務供備領牛官役行糧乳牛芻牧移文户部給票沿塗支取凡燕會牲牢慶典令節賜燕於宫殿各典禮及番夷來朝入貢賜燕於衙署館舍均行左右翼稅務供羊凡賓館牲牢下嫁外藩公主館於京師日給羊一郡主以下三日給羊一除夕賜公主額駙外藩王公席賞賚外國陪臣及番夷貢使每日館餼所用蒙古羊行左右翼稅務漢羊行光祿寺按數供備凡賜恤牲牢宗室王公暨福晉夫人諭祭行左右翼稅務備羊下嫁外藩公主郡主以下暨外藩王公諭祭所用牛羊行户部給價各有差欽定大清會典卷五十七
