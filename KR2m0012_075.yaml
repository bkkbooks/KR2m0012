  text: 欽定四庫全書欽定大清㑹典卷七十五
  hash: sha256:4118c26a32b0c294ca53f8bf5f45eaa0b36b95728ba0873dc6d04d94b78fe3cb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_075-1a, image: WYG0619/WYG0619-0648c.png}
body:
  text: 工部都水清吏司器用凡表函皇帝恭進皇太后表文函髙三寸長尺有六寸廣六寸杉木質黃髤繪金雲龍文上皇太后奏書函髙二寸一分長尺有一寸五分廣五寸八分杉木質糊以黃雲龍綺王公百官恭進皇帝表文函髙六寸長尺有八寸廣五寸五分杉木質糊以黃綾恭進皇太后表文皇后箋文同凡尊藏實録金匱髙四尺五寸廣四尺一寸五分縱二尺二寸楠木質裹以銅塗金琢雲龍文內貯格四及裹均糊以黃繒凡尊藏玉牒匱廣四尺深三尺九寸箱廣三尺一寸深尺有九寸髙視卷帙以為度每屆纂修之年各依成式增髙六寸杉木質黃髤者匱二箱四朱髤者匱二箱六均繪金雲龍文凡歲藏記注匱髙二尺長二尺五寸廣尺有六寸松木質朱髤凡銜詔金鳯髙二尺一寸五分承以朵雲廣三尺四寸均銅製塗金凡詔敕均用黃紙詔書表裏二層敕書三等龍香箋表裏四層畫龍箋三層印龍箋二層殿試金榜與詔書同凡世襲佐領印軸黃紙製表裏二層髙尺有五寸五分長數丈至數十丈有差四周作螭文緣以色綾軸端用紫榆木凡功牌五等均白紙製表裏二層一等功牌長三尺六寸五分二等三尺三寸五分三等三尺有五分四等二尺八寸五分五等二尺六寸五分均髙尺有五寸五分餘制與印軸同凡糊飾太和殿保和殿中和殿文華殿窗牖用朝鮮貢紙歲一糊飾博縫用黃綾二年一糊飾各壇廟窗牖路鐙由太常寺移文外藩王公外國貢使館舍由禮部理藩院移文到部委官糊飾凡設案朝㑹慶賀諸典禮設表案經筵設御書案講案頒賞設賞案賜燕設食案考試設閲卷案準各該衙門移文供用凡簪花進士赴恩榮燕用金飾銀花一枝采花五百枝各筵燕及安吻上梁需用銀花均準禮部移文置造供用凡公署館舍日用器物及欽差官恭齎詔敕筒箱鎖鑰之屬均詳具明目由部核給造作器用需用竹木砂石由部行直省出産州縣採買解送織造凡祭帛七等曰郊祀制帛曰告祀制帛其色青黃曰奉先制帛色白曰禮神制帛青赤黃白黑五色曰展親制帛曰報功制帛均色白各制帛名皆織清漢文於帛端曰素帛無文歲由江寧織造入貢輸部以供太常祭祀之用凡誥敕軸誥曰奉天誥命敕曰奉天敕命皆織清漢文於軸端繞以龍文誥命四品以上用五色紵絲五品以下三色敕命用白綾一品玉軸鶴錦面二品犀軸螭錦面三四品裹金軸五品角軸均花錦面六品以下軸同五品小團花錦面凡校尉服色供壇廟及宫殿之役者服遜衣舁輦輿用紬執事用絹色赤織團花文凡采繪織染五色以供國家慶典耕藉親蠶祭祀筵燕及各公署典禮張幔結采之用關稅凡天下關津𣙜務戶部掌之其隸工部者專稅竹木商旅輻輳之地間𣙜船貨皆因地制宜凡直省工關應徵木稅悉收折色惟盛京寧古塔或十五取一以供工作或十取其一變價解京凡工關稅額以乾隆十八年奏銷册計之歲入二十七萬千五百四十六兩有奇潘桃口七千六百四十五兩古北口千十有二兩殺虎口七千六百四十六兩武元城千二百三十一兩寧古塔輝發穆欽等處三百七十兩各有奇甎版閘四千五百七十二兩臨清關兼管龍江關五萬七千六百有七兩西新關兼管宿遷關四萬八千八百八十四兩淮關兼管瓜儀由閘七千六百六十六兩揚關兼管蕪湖關七萬一百四十六兩南新關三萬二百四十七兩北新關兼管荆關萬七千十有九兩辰關萬二千五百兩渝關五千兩䕫關兼管凡工關解餉潘桃口古北口殺虎口歲入節慎庫餘輸戶部歲要其成定殿最以聞凡司𣙜務或戶關并攝或由部疏請京差監督或督撫奏聞委官專司或以將軍織造兼管制如戶部凡竹木經過關津驗量得實各按時地以權徵𣙜之平部頒科則規條諸關刋榜昭示俾吏不能欺有匿稅者論如法凡司關歲領部册曰循環簿親填簿稽考簿皆排次月日按實備書條析無遺歲終申部以待覆核法與戶部各關同欽定大清㑹典卷七十五
