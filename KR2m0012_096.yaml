body:
  text: 八旗都統兵制凡八旗設兵之制滿洲蒙古旗每佐領下親軍二人上三旗隸領侍衛內大臣下五旗隸宗室王公前鋒二人𨽻前鋒統領護軍十有七人隸護軍統領步軍領催二人步軍十有八人隸步軍統領鳥槍護軍三人鳥槍驍騎四人炮驍騎一人隸火器營詳見各營典則領催五人驍騎二十人弓匠一人鐵匠或鞍匠一人各隸本旗都統口外八旗游牧察哈爾每佐領下親軍二人前鋒二人護軍二十五人領催六人驍騎三十五人每旗捕盜兵二十人各屬本旗總管管轄統隸於八旗蒙古都統圓明園護軍營護軍三千八百人教養兵四百八十人健鋭營前鋒軍千人委前鋒千人教養兵百人漢軍旗每佐領下領催五人鳥槍驍騎四十二人每旗藤牌軍百人於驍騎內選充各隸本旗都統步軍領催一人步軍十有二人隸步軍統領凡教養兵八旗餘丁及孤子未成丁者給餉養贍教之藝業以備軍伍之選各旗佐領下多寡不齊於本參領下均勻選取凡守衛陵寢官員詳見官制永陵福陵昭陵昭西陵孝陵孝東陵景陵泰陵孝賢皇后陵寢各總管所屬均驍騎八十人景陵皇貴妃園寢妃園寢泰陵妃園寢勝水峪妃園寢端慧皇太子園寢各防禦所屬均驍騎四十人凡畿輔駐防官員詳見官制後仿此鄭家莊城守尉所屬八旗滿洲蒙古兩旗合設一佐領每佐領下領催四人驍騎九十六人弓匠一人鐵匠一人漢軍左右翼各立一佐領每佐領下鳥槍領催四人鳥槍驍騎九十六人弓匠一人鐵匠一人共領催十有六人鳥槍領催八人驍騎三百八十四人鳥槍驍騎百九十二人匠役十有二人昌平州防守尉所屬正黃旗滿洲領催四人驍騎三十三人蒙古領催一人驍騎十有二人良鄉縣防守尉所屬正紅旗滿洲蒙古寶坻縣防守尉所屬鑲白旗滿洲蒙古固安縣防守尉所屬鑲紅旗滿洲蒙古東安縣防守尉所屬鑲藍旗滿洲蒙古霸州防守尉所屬正黃正紅兩旗滿洲雄縣防守尉所屬鑲紅旗滿洲蒙古鑲藍旗滿洲蒙古均領催五人驍騎四十五人采育里防守尉所屬正藍旗滿洲領催四人驍騎二十九人蒙古領催一人驍騎十有六人保定府城守尉所屬正紅鑲紅兩旗滿洲蒙古領催四十人驍騎鳥槍驍騎共四百六十人弓匠二人鐵匠二人天津府水師營都統所屬八旗滿洲蒙古領催百二十八人前鋒百人驍騎二千七百三十二人炮軍四十人教養兵百九十二人戰船八號水手七十二人兼轄之滄洲城守尉所屬八旗滿洲蒙古領催三十一人驍騎四百八十人弓匠二人鐵匠二人山海關副都統所屬八旗滿洲蒙古漢軍領催四十人前鋒四十人鳥槍驍騎二百人驍騎四百四十人炮軍八十人兼轄之永平府防守尉所屬鑲白正藍二旗滿洲蒙古三河縣防守尉所屬正白旗滿洲蒙古均領催十人驍騎九十人順義縣防守尉所屬鑲黃旗滿洲蒙古領催五人驍騎四十五人玉田縣防守尉所屬鑲黃正白二旗滿洲領催八人驍騎六十人蒙古領催二人驍騎三十人冷口防守尉所屬正黃正藍二旗滿洲蒙古領催十有二人驍騎百三十八人喜峯口防守尉所屬八旗滿洲蒙古領催十有六人驍騎百八十四人羅文峪防禦所屬鑲白正藍二旗滿洲蒙古領催八人驍騎九十二人張家口總管所屬八旗滿洲蒙古領催十有六人驍騎二百八十四人古北口防守尉所屬正黃正紅鑲白正藍四旗滿洲領催十有二人驍騎百八十八人獨石口防守尉所屬八旗滿洲領催四人驍騎九十六人兼轄之千家店防禦所屬八旗滿洲領催四人驍騎三十六人熱河副都統所屬八旗滿洲蒙古委前鋒校八人前鋒九十二人領催百人鳥槍驍騎五百人驍騎千二百人炮手四十人弓匠箭匠鐵匠各二十人凡盛京駐防盛京將軍所屬八旗滿洲蒙古漢軍領催五百二十八人前鋒二百人驍騎四千九百三十四人弓匠六十六人守門軍八人庫軍二十四人守黃寺軍八人守御花園軍八人步軍領催八十人步軍七百二十人鐵匠六十六人箭匠六十三人夜捕手二十九人盛京將軍統轄之興京城守尉所屬八旗滿洲蒙古漢軍領催六十四人驍騎四百十有一人又鐵匠十人興京城守尉兼轄之撫順防禦所屬席伯及左翼四旗漢軍領催十有六人驍騎百二十四人又鐵匠二人開原城守尉所屬八旗滿洲領催六十八人驍騎九百二十三人弓匠九人又鐵匠十人開原城守尉兼轄之鐵嶺防禦所屬席伯及右翼四旗漢軍領催十有六人驍騎百二十四人又鐵匠二人法庫邊門防禦所屬領催一人驍騎三十七人臺領催二人遼陽州城守尉所屬八旗滿洲蒙古領催五十四人驍騎六百有二人又鐵匠九人廣寧縣協領所屬八旗滿洲蒙古漢軍領催四十八人驍騎四百五十二人弓匠五人又鐵匠六人廣寧協領兼轄之巨流河白旗堡小黑山閭陽驛各佐領所屬滿洲漢軍均領催十有六人驍騎百二十四人又鐵匠二人彰武臺邊門防禦所屬滿洲漢軍領催一人驍騎三十九人牛莊協領所屬滿洲漢軍領催四十人驍騎三百六十人又鐵匠二人鳳凰城城守尉所屬滿洲蒙古漢軍領催六十二人驍騎六百三十五人弓匠八人又鐵匠十二人錦州府副都統所屬八旗滿洲領催百有四人驍騎八百八十八人弓匠八人又鐵匠十有三人錦州府兼轄之義州城守尉所屬八旗滿洲蒙古漢軍領催百二十四人驍騎千一百五十八人弓匠十有八人又鐵匠二十人寧遠州小凌河中前所中後所佐領所屬席伯漢軍領催均十有六人驍騎均百二十二人弓匠二人又鐵匠二人松嶺邊門新臺邊門兩防禦所屬均領催一人騎騎三十九人臺領催二人白石觜邊門防禦所屬領催一人驍騎三十九人臺領催一人梨樹溝邊門明水塘邊門兩防禦所屬均領催一人驍騎二十九人臺領催一人義州城守尉兼轄之清河邊門防禦所屬領催一人驍