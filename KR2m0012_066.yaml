front:
  text: 欽定四庫全書欽定大清㑹典卷六十六
  hash: sha256:44dc7ee8f41661415416dd57fb7fae8825938d65fc1e9708a54bde25d43d6e14
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_066-1a, image: WYG0619/WYG0619-0569a.png}
body:
  text: 兵部車駕清吏司馬政凡牧馬八旗馬每歳季春由部以出牧之數具奏並列副都統名請每翼簡用一人掌出牧事每旗視馬多寡撥委官兵陸續領赴口外馬場擇水草豐茂處牧養聽副都統管轄調度歸牧之期以八九月為率在場禁縱逸在塗禁踐踏田禾囘京由部察驗肥瘠副都統及官兵議叙議處有差出牧橐駝亦如之陜西甘州凉州西寜肅州各設牧馬場以游擊為總統場分五羣各以千把總為牧長外委為牧副兵為牧丁羣各牧馬二百四十匹歳課孳生之數通計三馬得一匹至三歳均齊計其盈虧為賞罰差以三等由總督報部察覈具各官功過以聞橐駝牧場五歳均齊官兵賞罰如馬場例江南營馬有牧場者依界植桞編籬或掘溝為限越境及蹂躪禾稼者兵論如律本管官弁分别降罰凡直省營馬提督二十匹總兵官十有六副將十有二叅將八游擊六都司守備各四千總把總各二兵由馬歩各半至馬一歩九各按營制歳終奏銷芻秣之數具册報部察覈官兵每月朋扣俸餉存營馬闕動支買補直省營馬報斃各限以數福建歳準九百三十五匹廣東九百二十一匹直𨽻及餘省均不得過十分之三報斃之馬定以年限江南江西福建浙江湖北湖南四川廣東廣西雲南貴州三年直𨽻山東山西河南陜西甘肅五年未及期斃者責賠其買補按省按年各定價有差直省由督撫京城廵捕營由叅將各具册報部察覈題銷凡馬禁官馬飼秣失宜致有疲瘦因公領騎事竣交還不如數及私賣官馬者皆劾論該管官議處有差直省購買營馬至口外者咨部至鄰省者咨該地督撫均按數印烙給照令所過地方官弁察驗若於照外多買及將私馬附入照内者罪之文武官有以自畜之馬及受商販行賄以不堪騎乘之馬抑勒營汛驛站並所屬官索取高價者從重治罪督撫不糾叅者並論失察商販賣馬與賊者論如法挐獲者議敘有差盗竊官馬營汎追捕不力者論收獲逸馬者不得隱匿報官竢失主認領外夷貢使不得私買内地馬攜歸有犯並通事皆治其罪郵政凡置郵視道塗逺近衝僻適中設驛郵遞之事州縣官及驛丞掌之以司道總其成凡郵符勘合火牌編號鈐印書奉使所由及應得夫馬舟車廩給口糧繫其官職姓名司驛官驗符廼應防詐偽嚴驛擾濫支濫給者皆論勘合火牌在京由部給發月終彚其所用之數疏聞在外由部豫頒以待用各有定數歳終直省由司道造册報督撫駐防將軍都統及提鎭歳終亦造册送督撫督撫覈明具疏奉天由盛京兵部吉林黒龍江由各將軍造册具疏部㑹兵科察覈奏銷劾違例者奉差官夫馬舟車廩給及僕從口糧均以品秩定差等齎奉詔勅並攜有甲胄者増給急差及取道口外軍臺者減給駐防官計家衆定數各有差頒詔及遣祭官齎香帛奉差官齎勅印者解送帑項及要犯者在京由部在外由督撫給發兵牌撥兵䕶送沿塗官弁驗牌廼應歳終督撫開具所屬標營撥兵數目造册報部覈題其以私事擅撥及藉端擾累者論如法解送内外帑項隨征督餉及應聘鄰省同考者用馬不得過三匹章奏專差齎進者不得過二匹雲貴㑹試舉人馬一匹從征官病故給夫馬送歸籍在任在差病故者京官一品至九品外官文職道以上武職游擊以上四川廣西雲南貴州文職八品以下武職五品以下均給夫馬歸籍之日各將勘合火牌由地方官申送督撫繳部凡驛費直省均於田賦編徴本部館所張家喜峯獨石三口盛京吉林黒龍江均於户部支領一歳所費日月有籍以待奏銷奏銷册直𨽻由按察使餘省由驛道申報督撫逹部館所張家口由司驛官徑逹於部喜峯口由熱河副都統獨石口由提督盛京由兵部吉林黒龍江由各將軍各以其册逹部均以五月為期部受其册咨户部㑹覈具疏以聞凡驛程自京師達於四方一曰東北路達盛京一曰東路達山東一曰中路達河南一曰西路達山西由盛京以達於吉林黒龍江餘省皆由山東河南山西以達由山東者二路一達江寜安徽江西廣東一達江蘇浙江福建由河南者二路一達湖北湖南廣西一達雲南貴州由京師至山西二路一經關内一經關外由山西以達於西安甘肅四川勘合火牌均注道所由紆迴逗遛者有禁紀程直省以督撫關外以將軍都統駐劄之地為準至直𨽻三百三十里盛京千四百六十里吉林二千八百八十里黒龍江四千一百二十七里山東九百二十里山西二千九十有五里河南千四百九十里江寜東路二千五百五十七里中路二千二百九十五里水路二千八百七十里江蘇二千七百三十七里水路三千九十一里安徽二千六百十五里水路三千四百三十里江西三千二百二十五里水路四千九十里福建四千八百六十二里浙江三千一百十有七里水路三千四百八十六里湖北二千七百七十里水路四千三百三十里湖南三千六百七十里水路五千九十里西安二千四百七十五里甘肅四千三十有五里四川四千六百七十五里廣東五千六百七十里廣西四千九百有九里雲南五千九百三十里貴州四千七百七十五里齎進本章分别緩急日行有限司驛官無故稽遲計其時刻議處至奏章有關機要不可緩待者許由驛立限馳遞尋常之事不準凡驛夫陸驛供芻牧輿臺奔走之役水驛供舟楫牽挽之役視事繁簡以上下其食需用之時先盡見夫應付不敷迺募於民計里授直凡驛馬按衝僻以差多寡各有定數若飼秣失宜以致罷瘦並强索民馬充應者皆論如法驛馬倒斃歳有常依數買補給價有差倒斃逾額及懸額不買者禁驛馬交代新舊司驛官限一月竣事出結申報逾限者劾凡驛船江蘇安徽浙江湖北湖南四川廣東廣西均設船以供差使船各烙號於上以杜私賃私借編保甲以防姦匪小修大修拆造責成驛傳道經理届期督撫報部㑹工部察覈題覆凡驛車計人之衆寡物之重輕以定應給之數由部覈給車票沿塗司驛官驗票撥官車以應無官車者準和雇欽定大清㑹典卷六十六
