body:
  text: 前鋒統領統領左右翼各一人或以王公大臣兼領掌本翼四旗前鋒之政令前鋒參領前鋒侍衛左右翼各八人署前鋒參領各四人掌督率前鋒警蹕宿衛每翼隨印協理事務前鋒參領侍衛各一人前鋒校二人筆帖式二人凡營制鑲黃正白鑲白正藍為左翼正黃正紅鑲紅鑲藍為右翼前鋒校左右翼各四十八人每旗十有二人為一隊鳥槍什長左右翼各二十四人隊長如之前鋒八旗滿洲蒙古每佐領二人本旗教場操演步射月六次騎射嵗二次或四次三年考驗一次又於左右翼內各分前鋒之半兼習鳥槍月演十次均由統領督率參衛校長如法訓練以定黜陟凡卡倫距御營一二里外安設立前鋒旗二以為門戶左右以次列帳日則瞭望夜則守衛以前鋒參領前鋒侍衛共八人前鋒校前鋒共百二十人董其役犯卡倫者坐以軍法凡升除統領由兵部列名奏請簡命筆帖式由吏部補用外前鋒參領員闕於本旗護軍參領一二等侍衛宗室將軍一二等侍衛前鋒侍衛內遴選六人或七人前鋒侍衛員闕以署前鋒參領一人列於前再於本旗二三等侍衛護衛副護軍參領前鋒校內遴選五人或六人署前鋒參領員闕於本翼前鋒校內遴選正陪前鋒校員闕於本旗鳥槍什長隊長內遴選正陪若闕多人少於前鋒內每闕遴選四人或五人均由統領引見補授協理事務前鋒參領侍衛員闕於本翼前鋒參領侍衛內各遴選正陪引見補授隨印前鋒校闕於本翼前鋒校內選委前鋒烏槍什長闕於本旗隊長隊長闕於本旗前鋒各遴選充補凡拔補前鋒由統領會本旗護軍統領於護軍驍騎執事人教養兵間散壯丁內遴選補用凡兩翼前鋒統領遇一人奉差外出者即以未出差之人兼攝如二人均差奏請簡署護軍統領護軍統領每旗一人掌護軍之政令護軍參領每旗滿洲十人蒙古四人內司鑰長署司鑰長各一人副護軍參領如參領之數護軍校署護軍參領每旗七人隨印協理事務護軍參領副護軍參領各一人護軍校各二人筆帖式各二人門筆帖式鑲黃正黃正白三旗各十人護軍校八旗滿洲蒙古每佐領各一人護軍每佐領各十有七人凡宿衛景運門統領一人司鑰長一人護軍校三人門筆帖式二人閲門籍護軍即巴克什一人護軍十有七人隆宗門協理事務護軍參領一人護軍參領二人護軍校三人門筆帖式一人閲門籍護軍一人護軍十有七人後左門後右門各護軍參領一人護軍校三人門筆帖式一人閲門籍護軍一人護軍十有二人左翼門右翼門各護軍校二人閲門籍護軍一人護軍八人中左門中右門各護軍校二人閲門籍護軍二人護軍八人太和殿體仁閣𢎞義閣昭德門貞度門各護軍校二人護軍八人太和門左右門各親軍校二人親軍八人協和門熙和門各護軍校二人護軍八人中和殿護軍校二人護軍三人東廊西廊各護軍校一人護軍四人蒼震門護軍參領一人護軍校三人閲門籍護軍二人護軍十有二人啓祥門護軍參領一人護軍校三人閲門籍護軍一人護軍十有二人吉祥門西北隅銀庫各護軍參領一人護軍校二人護軍八人凝華門中正殿後門東北隅東南隅文華殿箭亭紫禁四門內磴道柵闌各護軍校二人護軍八人防範火班護軍校一人護軍七人午門護軍參領一人左門閲門籍護軍二人左右門各護軍校三人護軍十有二人東華門西華門神武門各護軍參領一人護軍校四人閲門籍護軍二人護軍十有六人北上門護軍校二人護軍八人恭遇車駕巡幸東華門西華門神武門各增統領或協理事務前鋒護軍參領一人以鑲黃正黃正白三旗官軍按日分班直宿每班五百二十五人闕左門司鑰長一人護軍校一人護軍九人闕右門護軍參領一人護軍校一人端門天安門大清門各護軍參領一人護軍校二人護軍十有八人紫禁城外周環十六堆鋪各參領一人護軍校一人護軍九人四柵闌各護軍校一人護軍九人以正紅鑲白鑲紅正藍鑲藍五旗官軍分班直宿每班三百有一人統𨽻於景運門直班統領稽察曠誤者論如法凡禁門啓閉各以其時車駕出入啓中門以景運門直班統領率隆宗門參領祇承其事並令護軍清蹕每夕景運門直宿司鑰長自後左門後右門中左門中右門左翼門右翼門太和門昭德門貞度門以次驗視扃鐍午門以隆宗門護軍參領東華門以蒼震門護軍參領西華門以啓祥門護軍參領神武門以吉祥門護軍參領分視扃鐍畢各遣護軍校納鑰於司鑰長司鑰長受驗諸門鑰彙貯於篋復加扃鐍詰朝各門校以次領鑰啓門紫禁城外各門啓閉由闕左門司鑰長委護軍參領一人驗視扃鐍紫禁城內景運門隆宗門東華門西華門神武門各頒隂文合符如遇夜間有旨啓門大內出陽文合符該護軍參領即取隂文合符驗明啓鑰其蒼震門啓祥門等門報統領齎隂文合符至門與陽文合符比驗乃啓均於次日奏聞凡門禁百官執事人出入紫禁城門皆憑門籍籍內備書爵秩姓名於經由之門各置一通擅入及縱入者並論凡禁門軍器紫禁城內各門各堆鋪及午門東華門西華門神武門外班房均陳列櫜鞬弓矢長槍之屬弓日令弓人張弛矢旬日簡視必利必整槍及韜嵗終皆易以新櫜鞬以八年弓矢以十年槍以十五年移文武備院更換一次損失者論凡扈蹕恭遇親祀壇廟統領一人同內大臣侍衛於豹尾班後管束駕宿齋宫南郊輦路清蹕護軍參領三十二人護軍校護軍八百人神樂署周圍清蹕護軍參領八人護軍校護軍八十人圜丘外清蹕參領二人護軍校護軍二十人門五以統領一人協理事務參領二人護軍參領五人司鑰長二人護軍校護軍百人宿衛設十四堆鋪以護軍參領六人護軍校護軍百五十四人巡守北郊輦路清蹕與南郊同壇外清蹕護軍參領十有一人護軍校護軍百有十人門四以統領一人協理事務參領二人司鑰長二人護軍參領四人護軍校護軍八十人宿衛設十一堆鋪以護軍參領八人護軍校護軍百有十人巡守車駕經行城內以上三旗官軍城外以八旗官軍衛道清蹕均由景運門直班統領計程逺近隨時酌委以統領一人率護軍參領一人稽察回鑾亦如之凡行在宿衛扈蹕以統領三人營總三人掌其政令御營宿衛網城三門以上三旗護軍參領六人護軍校護軍六十人設九堆鋪以上三旗護軍參領九人護軍校護軍九十人外連帳四門以下五旗護軍參領八人護軍校護軍八十人設四堆鋪以下五旗護軍參領四人護軍校護軍四十人警蹕以八旗護軍參領八人護軍校護軍百二十人頓營守衛以護軍參領二人護軍校護軍四十人每日扈從及合圍官軍並於八旗內酌簡凡訓練月以初二初六十一十六二十一二十六等日步射六次嵗以春秋擐甲胄騎射各一次或二次三年考驗一次均由統領督率參校軍士如法訓練以嚴黜陟凡升除統領由兵部列名奏請簡用筆帖式咨吏部考取補用外協理事務參領員闕於護軍參領內司鑰長署司鑰長員闕於護軍前鋒鳥槍參領內護軍參領員闕於本旗驍騎參領冠軍雲麾使一二等侍衛護衛前鋒侍衛副護軍參領宗室一二等侍衛鎮國輔國等將軍子男輕車都尉等官內選六人或七人副護軍參領員闕以署護軍參領一人列於前再於本旗副驍騎參領雲麾使治儀正二三等侍衛護衛宗室二三等侍衛奉國奉恩將軍佐領騎都尉雲騎尉等官內選二人並於護軍校內選一人署護軍參領員闕於本旗護軍校內均由該統領會本翼四旗統領遴選正陪引見補授護軍校員闕於本佐領下前鋒親軍護軍領催及食四兩餉銀之執事人內遴選二人擬定正陪由該旗統領會同本翼四旗統領引見補授凡拔補護軍由該統領會同本旗都統於本佐領下驍騎執事人教養兵步軍間散壯丁內遴選善於國語弓馬嫻熟人材壯健者補用凡官員親隨兵養亷支借俸銀官軍優恤均與八旗驍騎營同嚮導總統無定員以前鋒統領護軍統領八旗副都統兼理於八旗前鋒營護軍營內選參領侍衛四人前鋒校護軍校前鋒護軍六人佐之恭遇時巡省方以嚮導總統一人先期率官校詣車駕經行之地周覽山川通橋梁夷險隘計程入告駕行佩櫜鞬前導既駐蹕以次日程塗及駐蹕之所奏聞交行在兵部曉諭闔營回鑾亦如之駐蹕御營及頓營看城均由嚮導總統先期指示飭所在有司修築營盤欽定大清會典卷九十八
