  text: 欽定四庫全書欽定大清會典卷二十五
  hash: sha256:72d681b8a1cb624dca27774846bc5c9f2a90b2c95f6a01188f42af9c6e855003
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_025-1a, image: WYG0619/WYG0619-0197a.png}
body:
  text: 禮部儀制清吏司經筵凡經筵之禮以大學士尚書左都御史侍郎學士詹事充經筵講官滿漢各八人嵗春秋仲月由部疏請得旨翰林院列講官名具奏以滿漢各二人分講經書掌院學士暨直講官擬篇目撰講章奏請欽定至日黎明遣大學士一人祗告皇師帝師王師先聖先師於傳心殿親詣行禮則於前一日均詳見吉禮鴻臚官設御案於文華殿御座前南嚮設講案於御案之南北嚮翰林院官奉講章及進講副本左書右經各陳於案退記注官四人立西階下東面滿講官暨侍班之大學士吏部戶部禮部尚書侍郎通政使副使詹事少詹事立丹墀左西面漢講官暨侍班之兵部刑部工部尚書侍郎左都御史左副都御史大理卿少卿立丹墀右東面糾儀給事中御史各二人鴻臚寺鳴贊二人立侍班官稍後東西面均南上如衍聖公入覲恭遇經筵立於東班之首至時禮部堂官詣乾清門奏請御經筵皇帝御常服乘輿出宮導引扈衛如常儀由後左門出左翼門至文華殿丹陛上降輿入升座記注官升西階入立殿內右楹之西鳴贊升立東西簷下贊排班講官暨侍班官咸就拜位北面立贊跪叩興行二跪六叩禮畢鴻臚卿東西各一人引講官暨侍班官分行升自東西階滿講官由殿左門之右漢講官由右門之左入立於東西楹之南東侍班官由左門之左西侍班官由右門之右入立於講官後糾儀官隨入立東西隅均東西面北上鴻臚卿退立於殿簷下鳴贊贊進講滿漢直講官四人出至講案前東班西上西班東上行一跪三叩禮復位立滿講官一人出就案左北面展講章進講四子書畢復位漢講官一人趨過案左進講如之皇帝闡發書義宣示臣工講官暨侍班官跪聆畢興又滿講官一人趨過案右漢講官一人出就案右先後進講經義畢皇帝闡發經義各官跪聆亦如之鴻臚卿引出殿至丹墀各就拜位立鳴贊贊如初行二跪六叩禮畢內監設坐氊於殿內東西各二行鴻臚卿引講官侍班官按品臚序仍升東西階入殿內賜坐賜茶儀與常朝同禮部尚書奏禮成駕興至丹陛升輿還宮是日賜燕於太和門東廊講官暨侍班記注糾儀各官咸與燕畢詣內金水橋南丹墀東行一跪三叩禮各退視學凡視學之禮豫期由部疏請行取衍聖公五經博士至聖裔五人元聖周公裔四配十二哲裔各二人乘傳赴京暨各氏子孫列官於朝者各官學師生直省在京需次之進士舉人貢監生咸與觀禮內閣擬經書國子監祭酒司業撰講章均進呈欽定至日工部官張大次於大成門東設黃幄御座於彛倫堂內鴻臚寺設御案於幄前少東均南嚮設講案二於左右東西嚮祭酒司業奉講章及進講副本左書右經各陳於案皇帝禮服乘輿詣學親詣儀與丁祭同法駕鹵簿前導前引後扈如常儀祭酒司業率所屬官暨進士舉人朝服諸生公服跪迎於成賢街道右皇帝至廟門外降輿入太常卿二人恭導詣大成殿釋奠於先師孔子儀詳吉禮禮畢出大成門入大次更衮服王公以下咸更采服王公序立於大次之南各官均先詣彛倫堂庭中按朝班東西序立衍聖公在東班之首五經博士各氏後裔在班末均東西面北上記注官四人立西階下東面糾儀給事中御史各二人鴻臚寺鳴贊二人立東西階下均東西面北上宣制官一人立東簷下西面祭酒司業率所屬官及進士舉人肄業諸生序立太學門內東西面南上禮部尚書奏請行講學禮太學鳴鐘鼓皇帝出大次至門外乘輿導迎樂作由太學中門入王公等隨入祭酒以下跪候駕過興咸隨入皇帝至彞倫堂降輿御講幄升座記注官升西階入立堂內右楹之西糾儀官升東西階立東西簷下第三柱鳴贊升立第二柱王公立階上各官立階下均東西面鳴贊贊排班衍聖公率五經博士各氏後裔祭酒司業率所屬官及進士舉人諸生咸就拜位北面立班齊贊進衆進贊跪叩興衆行三跪九叩禮畢賜王公暨衍聖公大學士九卿坐鴻臚官引由左右門入堂內咸跪行一叩禮坐翰詹四品以下官國子監官六堂諸學師儒五經博士各氏後裔進士舉人肄業諸生皆列東西階下圜堂下聽講鳴贊贊進講滿漢祭酒二人由左門入司業二人由右門入均北面立贊舉案執事官舉御案至御座前賜直講官座祭酒就東案西面司業就西案東面各行一叩禮坐滿漢祭酒以次講四子書司業講經亦如之講畢贊舉案執事官舉御案置原位王公以下起立祭酒司業出率所屬官暨進士舉人諸生就拜位北面立禮部尚書奏傳制鳴贊贊有制祭酒以下皆跪宣制官進至中門左宣制曰聖人之道如日中天講究服膺用資治理爾諸生其勉之宣訖贊叩興祭酒率衆行三跪九叩禮先退至成賢街恭俟賜王公大臣茶跪受坐飲各行一叩禮畢由左右門出就階下序立禮部尚書奏禮成駕興升輿出太學門導迎樂作祭酒以下跪送如初迎儀皇帝還宮次日衍聖公率五經博士各氏後裔祭酒司業率所屬官暨進士舉人諸生具表謝恩所司陳法駕鹵簿樂懸如常儀王公百官咸朝服會闕下皇帝禮服御中和殿執事各官行禮畢御太和殿鴻臚官引王公百官各就位贊行三跪九叩禮次引衍聖公暨祭酒以下東西分班各就拜位跪宣表官奉表跪宣訖贊行三跪九叩禮賜坐賜茶均如大朝之儀是日賜衍聖公內閣翰林院詹事府國子監各官燕於禮部五經博士各氏後裔暨執事官咸與越三日頒敕於太學詔諸生而策勵之賜衍聖公貂冠朝服祭酒司業監丞五經博士各氏在京官衣皆一襲各氏後裔太學六堂師生宗學覺羅學咸安宮學景山學八旗學義學副管教長助教教習學生暨進士舉人白金有差增廣是科太學鄉試中額送各氏後裔觀禮者入監讀書皇帝特舉幸魯盛典展禮先師乃講學於闕里豫期命大臣偕衍聖公遴選聖裔賢裔二人充直講官翰林院撰擬講章均奏請欽定前期一日有司張大次於奎文閣前設御座於詩禮堂內設御案於座前設敕案於左楹之東均南嚮設講案於堂西簷下東嚮至日翰林院官陳講章於御案進講副本於講案內閣官陳敕於敕案皇帝龍袍衮服乘輿出行宮詣闕里騎駕鹵簿前導前引後扈如常儀衍聖公采服率五經博士暨各氏後裔跪迎於廟門外道右皇帝至奎文閣前降輿太常卿二人恭導詣大成殿致祭於先師孔子親詣儀與丁祭同禮畢出同文門至奎文閣入大次少憩隨駕官暨地方守土官序立於承聖門左衍聖公以下序立於承聖門右禮部尚書奏請行講學禮皇帝出大次乘輿禮部堂官二人恭導入承聖門衆皆跪候駕過興地方官司道以下俟立於門外各官隨入皇帝至詩禮堂降輿升座各官至庭中仍按左右序立大學士一人立東簷下西面宣敕官一人立大學士後鴻臚卿二人鳴贊二人立兩階上東西面鳴贊贊排班衍聖公五經博士各氏後裔就西階拜位立北面東上贊跪叩興行三跪九叩禮畢復位贊進講直講一人升自西階詣講案前一跪三叩興東面立講四子書訖次直講一人詣案講經亦如之皆退復位立鴻臚卿奏宣敕衍聖公以下詣拜位立鳴贊贊跪衆皆跪大學士由堂左門入奉敕由堂中門循闑左出授宣敕官奉至階前西面立宣訖降自中階授衍聖公衍聖公祗受授執事官鳴贊贊叩興衍聖公率五經博士各氏後裔行三跪九叩禮畢鴻臚官引各官出育粹門序立祗俟禮部尚書奏禮成駕興乘輿禮部堂官二人恭導出育粹門詣孔林行禮畢儀見吉禮還行宮衆皆退翼日賜衍聖公蟒衣狐裘貂裘表裏書籍五經博士書籍衣幣各氏後裔衣幣白金各有差學政簡各氏弟子員有文行者貢入太學其在仕籍者均進一階增廣是年山東各府州縣入學名額巡幸凡巡幸之禮皇帝省方觀民特舉時巡盛典既諏吉王公暨內閣部院府寺監各官均列名具奏請旨扈蹕先期一日遣官以巡狩祗告奉先殿至日鑾儀衛陳騎駕鹵簿於鑾輿所出禁門外皇帝御征衣乘輿出宮領侍衛內大臣前鋒護軍統領率禁旅翊衛扈蹕諸臣皆征衣乘騎以次隨發王公百官咸采服跪送內閣學士率中書恭奉御寶以從部院有執事者攜行在印備用鑾輅所經禁隨駕官辨軍士擾吏民踐禾稼內務府供御營器用守土官動公帑備糗糧芻茭有借端科斂者論如法直省將軍督撫提鎮及所屬文武官辨咸朝服各於所治境外恭迎道右紳士耆老隨逺近跪迎既駐蹕督撫提鎮率屬朝於行營正門之外至巡省之方翼日望秩於方嶽及祭古昔帝王功德隆重者先聖先師皆親詣行禮境內山川先賢名臣忠烈祠墓並遣官致祭詳見祠祭司駐蹕行營日覲封疆大吏監司郡縣咨詢風土人情臨視河防指授方略召試陳詩獻賦之士拔其尤者量授以官親閲方鎮重兵以辨將備軍士材武經過州縣賜復蠲租存問髙年賞賚各有差皇帝回鑾守土官於所治境外跪送在京王公文武京堂武官副都統以上暨內廷供奉記注翰林科道等官咸采服出郊外跪迎駕還宮次日遣官以回鑾祗告奉先殿如初禮御新宮凡皇帝御新宮前期一日遣官各一人祗告天地太廟社稷屆期內大臣侍衛齊集候隨皇帝臨新宮鑾儀衛設法駕鹵簿樂部設樂懸於太和殿前禮部官設王等所進慶賀表文於太和殿內左楹黃案上王以下文武各官咸朝服齊集於太和殿前禮部堂官奏請升殿皇帝御中和殿升座內大臣侍衛內閣大學士禮部都察院堂官鴻臚寺鳴贊官行三跪九叩禮畢皇帝御太和殿鳴鐘鼓樂作升座樂止鳴鞭內外王以下公以上於丹陛上兩旁立鳴贊官贊進贊跪衆皆跪贊進表宣表官奉表文至簷下正中跪宣畢鳴贊官贊行三跪九叩禮畢各就原位立乃賜燕王公等入殿內內大臣侍衛在丹陛上各官在丹墀青幕內各就坐行一叩禮燕畢謝恩行一跪三叩禮禮成鳴鞭作樂皇帝還宮衆皆退凡皇太后御新宮前期一日遣官祗告太廟後殿奉先殿屆期豫設皇太后儀駕樂懸於宮門內外皇太后禮服乘輿出宮樂作儀駕前導引禮大臣命婦前引至慈寧宮候皇太后升後宮暫憩執事官豫設皇帝拜位於慈寧門正中禮部堂官奏請皇帝禮服乘輿出宮禮部堂官恭導出隆宗門至永康左門降輿至慈寧門下東旁立禮部堂官轉傳內監奏請皇太后升座樂作皇太后御慈寧宮升座樂止禮部堂官恭導皇帝詣正中拜位上立鴻臚寺官引內大臣侍衛於儀駕末排立鳴贊官奏跪拜興丹陛樂作皇帝行三跪九拜禮內大臣等皆隨行禮畢禮部堂官恭導皇帝復原位立轉傳內監奏請皇太后還宮樂作還宫樂止禮部堂官導皇帝出乘輿還宮執事女官豫設皇后拜位於慈寧宫簷前正中設貴妃妃嬪拜位於左右稍後禮部堂官轉傳內監奏請皇后禮服率貴妃妃嬪詣皇太后宫行禮依次乘輿自啓祥門出前引命婦八人恭導至徽音左門外降輿至慈寧門下東旁立貴妃妃嬪等序立引禮女官轉傳內監奏請皇太后升座皇太后御慈寧宮樂作升座樂止引禮女官恭導皇后詣正中拜位立貴妃妃嬪於左右稍後均北嚮立丹陛樂作二大臣命婦奏請皇后率貴妃妃嬪行六肅三跪三拜禮禮成咸入慈寧宮內賜燕燕畢謝恩行二肅一拜禮二大臣命婦導皇后率貴妃妃嬪復原位立轉傳內監奏請皇太后還宮樂作皇太后還宮樂止引禮女官恭導皇后率貴妃妃嬪自徽音左門出乘輿還宮衆皆退欽定大清會典卷二十五
