  text: 欽定四庫全書欽定大清㑹典卷二
  hash: sha256:9967fb826ca7bd1efe91048f3752a439fff8c1c9342d3a8672d0154b03b01442
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_002-1a, image: WYG0619/WYG0619-0036c.png}
body:
  text: 内閣大學士滿漢各二人均由特簡贊理機務表率百寮補授後請㫖兼殿閣及六部尚書銜欽定殿閣名保和殿文華殿武英殿體仁閣文淵閣東閣尚書協辦閣務滿漢各一人學士兼禮部侍郎銜滿六人漢四人掌敷奏本章傳宣綸綍侍讀學士滿四人䝉古二人漢二人掌收發本章總稽繙譯侍讀滿十人䝉古漢軍漢人各二人掌勘對本章檢校籤票典籍滿洲漢軍漢人各二人掌收貯圖籍出納文移中書滿七十人䝉古十有六人漢軍八人漢三十人貼寫中書滿四十人䝉古六人掌撰擬紀載繙譯繕書之事中書科中書舎人滿二人漢四人筆帖式十人掌書誥勅凡朝廷徳音下逮宣示百官曰制布告天下曰詔昭垂訓行曰誥申明職守曰勅中外封章上達慶賀皇帝皇太后曰表皇后曰箋陳事曰疏内閣檢校出納惟允皇帝登極諸王貝勒文武各官賀表内閣撰擬其餘慶賀表箋翰林院撰擬均由大學士奏定頒中外遵行各部院及直省題疏到内閣舊制公事用題本私事用奏本乾隆十三年定並改題夲大學士票擬進呈得㫖轉下六科鈔發各部院施行以副夲錄㫖送皇史宬存貯如原疏折出未定處分竢御門聼政時滿學士一人敷奏折夲大學士面奉諭㫖如前施行凡恭上皇太后尊號徽號奏書册寳册立皇后皇太子册寳由大學士恭閱所司撰擬文篆進呈欽定勅下禮部奉行尊封皇貴太妃皇太妃册封皇貴妃貴妃妃嬪各册寳皆大學士恭閱所司撰擬文篆進呈欽定勅下禮部施行凡命皇太子皇子皇孫名大學士承㫖選擬奏請欽定諸王公主封號亦如之凡封諸王公主福晉以下册寳誥命由大學士奏定封外藩王以下及公侯伯以下誥命亦如之其子孫襲封即於原奉誥勅内開注人名年月加用御寳給還中外文武各官遇覃恩封贈五品以上者誥命六品以下者勅命宗室自鎮國公以下用為大臣侍衛者封贈與文武官同外任官督撫學政鹽政織造提督總兵等官撰給坐名勅書布政使按察使道員運使及副将叅㳺等官止給傳勅凡覃恩肆赦大學士承㫖擬恩詔應行事款恭請欽定凡請用御寳先期知㑹内務府轉行宫殿監至期學士率典籍官赴乾清門驗用如遇行幸駐驆以内務府總管一人監視之交泰殿貯御寳二十有五大清受命之寳以章皇序白玉方四寸四分厚一寸盤龍紐髙二寸皇帝奉天之寳以章奉若碧玉方四寸四分厚一寸一分盤龍紐髙三寸五分大清嗣天子寳以章繼繩金方二寸四分厚八分交龍紐髙一寸七分皇帝之寳以布詔赦青玉方三寸九分厚一寸交龍紐髙二寸一分皇帝之寳以肅法駕栴檀香木方四寸八分厚一寸八分盤龍紐髙三寸五分天子之寳以祀百神白玉方二寸四分厚八分交龍紐髙一寸三分皇帝尊親之寳以薦徽號白玉方二寸一分厚七分盤龍紐髙一寸三分皇帝親親之寳以展宗盟白玉方二寸二分厚一寸二分交龍紐髙一寸二分皇帝行寳以頒錫賚碧玉方四寸八分厚一寸九分蹲龍紐髙二寸五分皇帝信寳以徴戎伍白玉方三寸三分厚六分交龍紐髙一寸六分天子行寳以册外蠻碧玉方四寸八分厚一寸九分蹲龍紐髙二寸三分天子信寳以命殊方青玉方三寸八分厚一寸三分交龍紐髙一寸七分敬天勤民之寳以飭覲吏白玉方三寸一分厚一寸五分交龍紐髙一寸七分制誥之寳以諭臣僚青玉方四寸厚二寸交龍紐髙二寸七分勅命之寳以鈐誥勅碧玉方三寸五分厚一寸三分交龍紐髙一寸八分垂訓之寳以揚國憲碧玉方四寸厚一寸五分交龍紐髙二寸命徳之寳以奬忠良青玉方四寸厚一寸四分交龍紐髙二寸一分欽文之璽以重文教墨玉方三寸六分厚一寸五分交龍紐髙一寸六分表章經史之寳以崇古訓碧玉方四寸七分厚二寸一分交龍紐髙二寸二分廵狩天下之寳以從省方青玉方四寸七分厚二寸交龍紐髙二寸五分討罪安民之寳以張征伐青玉方四寸八分厚二寸交龍紐髙二寸五分制馭六師之寳以整戎行墨玉方五寸三分厚一寸四分交龍紐髙二寸二分勅正萬邦之寳以誥外國青玉方三寸八分厚一寸五分盤龍紐髙二寸三分勅正萬民之寳以誥四方青玉方四寸一分厚一寸五分交龍紐髙二寸廣運之寳以謹封識墨玉方六寸厚二寸一分交龍紐髙二寸盛京尊藏御寳十大清受命之寳碧玉方四寸八分厚一寸九分蹲龍紐髙二寸四分皇帝之寳青玉方四寸八分厚一寸九分交龍紐髙二寸七分皇帝之寳碧玉方五寸厚一寸八分盤龍紐髙三寸皇帝之寳栴檀香木方三寸八分厚六分素紐髙五分奉天之寳金方三寸七分厚九分交龍紐髙二寸天子之寳金方三寸七分厚九分交龍紐髙二寸奉天法祖親賢愛民碧玉方四寸九分厚一十五分交龍紐髙二寸丹符出騐四方青玉方四寸七分厚二寸交龍紐髙二寸二分勅命之寳青玉方三寸七分厚一寸八分交龍紐髙二寸五分廣運之寳金方二寸四分厚八分交龍紐髙一寸五分凡纂修實錄聖訓㑹典諸書皆由内閣題請監修總裁等官書成於皇史宬及内閣各尊藏一部並送一部至盛京尊藏内閣尊藏列聖實錄以次進呈皇帝恭閱周而復始日以為常凡起居注記載每嵗終送内閣大學士學士監視加封入庫收藏凡每月欽奉諭㫖於次月彚録進呈各部院奉㫖特交之事覆奏後具册送内閣其有未結者聲明緣由送覈月終則㑹計具奏凡壇廟陵寢神牌由工部送内閣中書敬書清文翰林官敬書漢文命大學士行禮凡尊諡册諡大學士承㫖恭擬奏請欽定勅下禮部奉行册文寳篆由翰林院撰擬大學士恭閱進呈諸王以下及文武大臣諡法均由大學士奏定諸王以一字為諡貝勒以下及大臣以二字為諡凡陵山封號大學士承㫖恭擬封各山川神祇亦如之凡祭告祝文由翰林院撰擬大學士恭閱進呈壇廟祝版由太常寺送内閣中書繕寫大學士敬書御名每嵗春秋祀先師孔子命大學士一人行禮御經筵日遣大學士一人祗告傳心殿凡賜祭賜葬由翰林院撰擬祭文碑文大學士閱定進呈凡殿試天下貢士由讀卷大學士等奏請制策以卷進呈皇帝親定甲第下内閣中書書榜傳臚武殿試亦如之凡庻吉士散館由内閣請期御試大學士翰林院掌院學士同引見留館者授編檢職餘以各部額外主事及知縣用勅下吏部奉行凡命將征討大將軍經畧將軍勅書内閣撰擬大將軍經畧將軍或給印或闗防並諏出師吉日皆奏請欽定仍遣内閣官隨行管理凡勾決京外重囚刑部以秋朝審情實姓名册送内閣於冬日至前六十日次第奏請勾決皇帝素服大學士學士及刑部堂官起居注官咸常服祗候召入滿學士一人跪奏囚册漢大學士一人秉筆遵㫖勾訖宻封下所司施行欽定大清會典卷二
