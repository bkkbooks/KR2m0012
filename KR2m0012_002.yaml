front:
  text: 欽定四庫全書欽定大清㑹典卷二
  hash: sha256:9967fb826ca7bd1efe91048f3752a439fff8c1c9342d3a8672d0154b03b01442
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_002-1a, image: WYG0619/WYG0619-0036c.png}
body:
  text: 內閣大學士滿漢各二人均由特簡贊理機務表率百寮補授後請㫖兼殿閣及六部尚書銜欽定殿閣名保和殿文華殿武英殿體仁閣文淵閣東閣尚書協辦閣務滿漢各一人學士兼禮部侍郎銜滿六人漢四人掌敷奏本章傳宣綸綍侍讀學士滿四人䝉古二人漢二人掌收發本章總稽翻譯侍讀滿十人䝉古漢軍漢人各二人掌勘對本章檢校籤票典籍滿洲漢軍漢人各二人掌收貯圖籍出納文移中書滿七十人䝉古十有六人漢軍八人漢三十人貼寫中書滿四十人䝉古六人掌撰擬紀載翻譯繕書之事中書科中書舍人滿二人漢四人筆帖式十人掌書誥敕凡朝廷德音下逮宣示百官曰制布告天下曰詔昭垂訓行曰誥申明職守曰敕中外封章上達慶賀皇帝皇太后曰表皇后曰箋陳事曰疏內閣檢校出納惟允皇帝登極諸王貝勒文武各官賀表內閣撰擬其餘慶賀表箋翰林院撰擬均由大學士奏定頒中外遵行各部院及直省題疏到內閣舊制公事用題本私事用奏本乾隆十三年定並改題夲大學士票擬進呈得㫖轉下六科鈔發各部院施行以副夲録㫖送皇史宬存貯如原疏折出未定處分俟御門聼政時滿學士一人敷奏折夲大學士面奉諭㫖如前施行凡恭上皇太后尊號徽號奏書册寶册立皇后皇太子册寶由大學士恭閲所司撰擬文篆進呈欽定敕下禮部奉行尊封皇貴太妃皇太妃册封皇貴妃貴妃妃嬪各册寶皆大學士恭閲所司撰擬文篆進呈欽定敕下禮部施行凡命皇太子皇子皇孫名大學士承㫖選擬奏請欽定諸王公主封號亦如之凡封諸王公主福晉以下册寶誥命由大學士奏定封外藩王以下及公侯伯以下誥命亦如之其子孫襲封即於原奉誥敕內開注人名年月加用御寶給還中外文武各官遇覃恩封贈五品以上者誥命六品以下者敕命宗室自鎮國公以下用為大臣侍衛者封贈與文武官同外任官督撫學政鹽政織造提督總兵等官撰給坐名敕書布政使按察使道員運使及副將參遊等官止給傳敕凡覃恩肆赦大學士承㫖擬恩詔應行事款恭請欽定凡請用御寶先期知㑹內務府轉行宫殿監至期學士率典籍官赴乾清門驗用如遇行幸駐驆以內務府總管一人監視之交泰殿貯御寶二十有五大清受命之寶以章皇序白玉方四寸四分厚一寸盤龍紐髙二寸皇帝奉天之寶以章奉若碧玉方四寸四分厚一寸一分盤龍紐髙三寸五分大清嗣天子寶以章繼繩金方二寸四分厚八分交龍紐髙一寸七分皇帝之寶以布詔赦青玉方三寸九分厚一寸交龍紐髙二寸一分皇帝之寶以肅法駕栴檀香木方四寸八分厚一寸八分盤龍紐髙三寸五分天子之寶以祀百神白玉方二寸四分厚八分交龍紐髙一寸三分皇帝尊親之寶以薦徽號白玉方二寸一分厚七分盤龍紐髙一寸三分皇帝親親之寶以展宗盟白玉方二寸二分厚一寸二分交龍紐髙一寸二分皇帝行寶以頒錫賚碧玉方四寸八分厚一寸九分蹲龍紐髙二寸五分皇帝信寶以徴戎伍白玉方三寸三分厚六分交龍紐髙一寸六分天子行寶以册外蠻碧玉方四寸八分厚一寸九分蹲龍紐髙二寸三分天子信寶以命殊方青玉方三寸八分厚一寸三分交龍紐髙一寸七分敬天勤民之寶以飭覲吏白玉方三寸一分厚一寸五分交龍紐髙一寸七分制誥之寶以諭臣僚青玉方四寸厚二寸交龍紐髙二寸七分敕命之寶以鈐誥敕碧玉方三寸五分厚一寸三分交龍紐髙一寸八分垂訓之寶以揚國憲碧玉方四寸厚一寸五分交龍紐髙二寸命德之寶以奬忠良青玉方四寸厚一寸四分交龍紐髙二寸一分欽文之璽以重文教墨玉方三寸六分厚一寸五分交龍紐髙一寸六分表章經史之寶以崇古訓碧玉方四寸七分厚二寸一分交龍紐髙二寸二分巡狩天下之寶以從省方青玉方四寸七分厚二寸交龍紐髙二寸五分討罪安民之寶以張征伐青玉方四寸八分厚二寸交龍紐髙二寸五分制馭六師之寶以整戎行墨玉方五寸三分厚一寸四分交龍紐髙二寸二分敕正萬邦之寶以誥外國青玉方三寸八分厚一寸五分盤龍紐髙二寸三分敕正萬民之寶以誥四方青玉方四寸一分厚一寸五分交龍紐髙二寸廣運之寶以謹封識墨玉方六寸厚二寸一分交龍紐髙二寸盛京尊藏御寶十大清受命之寶碧玉方四寸八分厚一寸九分蹲龍紐髙二寸四分皇帝之寶青玉方四寸八分厚一寸九分交龍紐髙二寸七分皇帝之寶碧玉方五寸厚一寸八分盤龍紐髙三寸皇帝之寶栴檀香木方三寸八分厚六分素紐髙五分奉天之寶金方三寸七分厚九分交龍紐髙二寸天子之寶金方三寸七分厚九分交龍紐髙二寸奉天法祖親賢愛民碧玉方四寸九分厚一十五分交龍紐髙二寸丹符出驗四方青玉方四寸七分厚二寸交龍紐髙二寸二分敕命之寶青玉方三寸七分厚一寸八分交龍紐髙二寸五分廣運之寶金方二寸四分厚八分交龍紐髙一寸五分凡纂修實録聖訓㑹典諸書皆由內閣題請監修總裁等官書成於皇史宬及內閣各尊藏一部並送一部至盛京尊藏內閣尊藏列聖實録以次進呈皇帝恭閲周而復始日以為常凡起居注記載每嵗終送內閣大學士學士監視加封入庫收藏凡每月欽奉諭㫖於次月彚録進呈各部院奉㫖特交之事覆奏後具册送內閣其有未結者聲明緣由送核月終則㑹計具奏凡壇廟陵寢神牌由工部送內閣中書敬書清文翰林官敬書漢文命大學士行禮凡尊諡册諡大學士承㫖恭擬奏請欽定敕下禮部奉行册文寶篆由翰林院撰擬大學士恭閲進呈諸王以下及文武大臣諡法均由大學士奏定諸王以一字為諡貝勒以下及大臣以二字為諡凡陵山封號大學士承㫖恭擬封各山川神祇亦如之凡祭告祝文由翰林院撰擬大學士恭閲進呈壇廟祝版由太常寺送內閣中書繕寫大學士敬書御名每嵗春秋祀先師孔子命大學士一人行禮御經筵日遣大學士一人祗告傳心殿凡賜祭賜葬由翰林院撰擬祭文碑文大學士閲定進呈凡殿試天下貢士由讀卷大學士等奏請制策以卷進呈皇帝親定甲第下內閣中書書榜傳臚武殿試亦如之凡庶吉士散館由內閣請期御試大學士翰林院掌院學士同引見留館者授編檢職餘以各部額外主事及知縣用敕下吏部奉行凡命將征討大將軍經略將軍敕書內閣撰擬大將軍經略將軍或給印或關防並諏出師吉日皆奏請欽定仍遣內閣官隨行管理凡勾決京外重囚刑部以秋朝審情實姓名册送內閣於冬日至前六十日次第奏請勾決皇帝素服大學士學士及刑部堂官起居注官咸常服祗候召入滿學士一人跪奏囚册漢大學士一人秉筆遵㫖勾訖密封下所司施行欽定大清會典卷二
