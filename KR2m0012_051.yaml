body:
  text: 禮部祠祭清吏司䘮禮一凡列聖大䘮儀初䘮嗣皇帝就主䘮位冠去緯哭踊宫中自皇后以下咸摘耳環去首飾届時恭奉梓宫奉安於宫中正殿設几筵建丹旐於宫門外之左陳法駕鹵簿於宫門之外至太和門外特簡王公大臣恭理䘮儀既斂迺奠王公以下民公侯伯子男以上二品官於乾清門外侍衛及内務府官皆於乾清門外三品以下文武有頂帶官於景運門外大臣官員命婦不齊集日右翼官員於隆宗門外皇后妃嬪宫人公主皇子皇孫福晉及近支王公福晉夫人於几筵殿内諸王公福晉夫人郡主縣君以上二品夫人於丹墀右三品淑人以下於隆宗門外齊集哭臨皆男摘冠緯女去首飾奠獻時皆隨行禮舉哀畢各退皇帝成服截髪辮居倚廬皇子皇孫隨成服截髪辮居宫中别室王公百官宗室覺羅咸成服截髪辮旗員居闕左門外漢員於各官署皇后率妃嬪等成服剪髪皇子皇孫福晉隨成服剪髪諸王福晋命婦及内府三旗官員䕶軍等妻咸成服剪髪皇帝行三年䘮禮百日内上諭用藍筆百日後素服御門聽政郊壇大祀祭服行禮詣几筵前仍䘮服諸皇子皇孫及恭理䘮儀王公大臣殯宫守衛執事各官百日除服羣臣二十七日除服咸百日薙髪奏疏文移二十七日内皆用藍印京朝官二十七月不作樂期年不嫁娶在京軍民人等二十七日素服百日不作樂一月不嫁娶頒遺詔於天下順天府尹率屬制服跪迎開讀畢奉安公署舉哀在京候選官及教習舉貢在監肄業貢監咸集順天府署舉哀直省督撫率所屬文武各制服跪迎開讀奉安於㑹城公署分駐之提鎮道員及府州縣奉安於各治所舉哀皆朝夕哭臨三日紳士咸與移文直省督撫提鎮免其遣官進香直省官期年不作樂百日不嫁娶不薙髪軍民去冠緯素服二十七日百日不作樂一月不嫁娶外藩䝉古王公台吉等公主福晉等服内來京者咸成服除服後來京者皆男摘冠緯女去首飾三日朝鮮使臣同成服後朝晡日中三設奠朝晡進羮飯肴饌午奠進饌筵一如事生儀朝夕奠設法駕鹵簿三日後至一月設鑾駕鹵簿每奠王公百官咸齊集質明欽天監報時各執事皆辦禮部堂官奏請朝奠皇帝出倚廬詣几筵前東立西嚮舉哀迺啟宫門恭理䘮儀王大臣及執事官率尚茶尚膳舉茶膳由中門中路進至几筵前尚茶跪進茶内外齊集衆咸跪皇帝親舉茶恭奠於茶几行一拜禮衆皆隨行禮尚茶徹茶衆皆興次尚膳進膳皇帝親上食畢執事官進奠几於正中皇帝詣几前跪進爵王大臣跪進爵皇帝祭酒三爵每祭行一拜禮衆皆隨行禮興迺徹饌出闔門衆哀止皇帝還倚廬衆皆退午奠晡奠儀同諏日行殷奠禮王公百官公主福晉命婦咸齊集陳俎豆設饌筵二十一席羊九酒十有一尊楮帛九萬張黄幕於宫門外之右設反坫具尊罍設鹵簿陳冠服於几筵前列饌筵於丹陛兩旁陳羊酒於黄幕積楮帛於燎所設祭文案於西檐下届時禮部尚書奉祭文侍郎二人前引由中門入祗設於案退禮部堂官奏請皇帝詣几筵前視饌上食舉哀讀祝官奉祭文至閾外正中北面跪禮部堂官二人跪展祭文進奠几皇帝於几前跪衆於齊集處跪哀暫止讀文畢仍復於案退衆舉哀迺進爵皇帝祭酒三爵毎祭行一拜禮衆隨行禮舉哀畢徹俎豆讀祝官奉祭文禮部堂官前引侍臣奉冠服自殿陛内大臣十人前引恭送燎所皇帝舉哀隨行詣燎所如不遣承親詣燎所則奠大臣内大臣侍衛扈從齊集王公百官咸從皇帝於燎所祭酒三爵行禮舉哀衆隨舉哀行禮如前禮畢皇帝還倚廬迺焚冠服楮帛衆各退是日仍設午奠脯奠大臣祭酒啟奠𤼵引大祭繹祭日皆同諏日而殯先期以奉移梓宫祗告几筵行啟奠禮陳設禮儀與殷奠同至日奉移梓宫於殯宫豫設大昇轝於景運門外届時禮部堂官奏請皇帝詣几筵舉哀執事官進奠几皇帝祭酒三爵恭理䘮儀王公大臣鑾儀衛工部堂官率校尉恭進小轝奉梓宫出登大昇轝禮部尚書祭轝焚楮帛内大臣祭所經門橋皆三祭酒毎祭行一叩禮焚楮帛皇帝歩送王公百官各以次隨行皇后率妃嬪等先詣殯殿後左旁恭竢靈駕至行奉安禮設几筵皇帝祭酒舉哀衆隨行禮舉哀畢焚楮帛丹旐各退以側殿為苫次二十七日後還宫倚廬行初祭禮設法駕鹵簿於殯宫大門外陳饌筵八十一席羊二十七酒四十一尊楮製丹旐一楮帛四十萬五千張黄幕於二門外之右設反坫尊罍如儀皇帝親詣上食祭酒其齊集讀文送燎均如前儀翼日繹祭遣官行禮陳饌筵十有一席羊五酒五尊楮帛三萬不設鹵簿不齊集不讀祝惟恭理䘮儀大臣内務府禮部工部光禄寺堂官執事餘如儀行大祭禮陳設禮儀與初祭同翼日繹祭陳設禮儀與初祭次日繹祭同周月讀文致祭陳饌筵二十一席羊九酒九尊楮帛十萬餘儀與啟奠同凡月奠儀同不讀文王公九卿及文武官承㫖恭擬尊諡廟號進呈御覽勅所部製玉册寳香册寶絹册寶諏吉行恭上尊諡禮前期遣官祗告天地太廟後殿奉先殿社稷至日設鹵簿於殯宫大門外恭理䘮儀王公大臣率内府官大常寺官恭設册寶案於几筵前鴻臚官設册寶案於太和門正中鑾儀衛官設黄亭於階下禮部堂官豫奉絹册寶陳亭内大學士二人恭奉香册寶升階陳於案三叩退禮部堂官奏請皇帝素服御太和門恭閱册寶畢行一跪三拜禮興退立東旁大學士詣案前一跪三叩恭奉册寶降階陳於各黄亭跪叩如前校尉舁亭御仗黄盖前導王以下入八分公以上齊集協和門外册寶亭至跪候過隨行皇帝還宫易䘮服豫詣殯宫側殿祗竢民公侯伯以下四品官以上咸於大門外按翼序立候亭至跪迎亭由大門中門入至内門止禮部堂官奉絹册寶先入陳於案退大學士詣亭前三叩恭奉香册寶由中門入陳於案三叩退贊引太常卿二人恭導皇帝由左門入王以下入八分公以上隨入民公侯伯以下四品官以上於大門外各序立典儀官贊執事官各共迺職贊引官奏就位皇帝就位立贊跪拜興皇帝率羣臣行三跪九拜禮興奏跪皇帝率羣臣跪典儀奏進册以下進寳皆寳宣册有奏大學士詣案奉册跪獻於左皇帝受册拱舉授禮部堂官跪接興奉安於案三叩退進寶由右儀亦如之迺宣册宣册官詣案奉絹册宣訖三叩退宣寶儀同皇帝率羣臣行三跪九拜禮迺奠帛讀祝三獻爵如儀禮成恭奉祝帛絹册絹寶送燎所由中道出皇帝轉立拜位旁西嚮候過復位燎半奏禮成皇帝還宫衆皆退翼日頒詔天下百日奠獻陳饌筵二十五席羊九酒十有三尊楮帛十有一萬五千儀同初祭既卜𦵏吉奉移山陵前期遣官祗告天地太廟社稷前奉移一日行祖奠禮陳饌筵三十一席羊九酒十有五尊楮帛十有五萬儀與啟奠同祭畢焚鑾駕鹵簿至日執事官陳大昇轝於殯宫大門外設册寶亭於階下王公百官公主福晉一品夫人以上及内府婦女咸齊集皇帝詣梓宫前舉哀祭酒三爵衆隨行禮畢皇帝先至大門東旁立竢奉移梓宫出跪候過歩隨行梓宫登大昇轝禮部尚書祭轝三祭酒行三叩禮畢焚楮帛靈駕發册寶亭及騎駕鹵簿咸前列沿塗分站豫設蘆殿繚以黄幔城皇帝歩送至郊由别道先往祗竢皇太后以下亦先往祗竢王公大臣官員侍衛内監等隨轝行恭理䘮儀王公大臣内務府工部鑾儀衛堂官左右翼衛所經門橋遣内大臣祭酒焚楮帛靈駕將至宿次王公百官先至幔城北門外皇帝率王公百官舉哀跪迎靈駕安奉於蘆殿衆至大門外序立陳設鹵簿迺行晡奠如儀奠畢皇帝還行宫衆皆退翼日昧爽行朝奠如儀皇帝跪送啟行歩送里許仍先詣宿次在塗皆朝夕奠如初日皇太后以下與朝奠不與晡奠所過百里内守土官於道右百歩外跪迎靈駕舉哀至宿次於幔城外行三跪九叩禮奠獻時各於右翼班末隨行禮至陵日守陵貝勒公大臣官員咸於十里外舉哀跪迎自紅門設法駕鹵簿前導靈駕至隆恩門外降大昇轝安奉梓宫於隆恩殿皇帝祭酒三爵衆隨行禮舉哀是日遣官祭告各陵寢並祭后土皇陵山神翼日行遣奠禮陳饌筵二十五席羊七酒十有五尊楮帛九萬往送之王公百官及在陵貝勒公大臣官員咸齊集儀如祖奠大𦵏前期行遷奠禮儀如遣奠至時恭理䘮儀王大臣等率夫校進小轝奉移梓宫於寶城前蘆殿恭奉梓宫登龍輴進饌筵皇帝祭酒三爵衆隨行禮舉哀畢駕還行宫衆皆退迺焚楮帛法駕騎駕鹵簿訖至日皇帝詣梓宫前祭酒届吉時恭移龍輴自隧道入地宫安奉寶牀設香册寶於左右几遂掩閉元宫皇帝於方城前舉哀祭酒行禮畢卒哭出至幄次易吉服王公百官咸采服禮部堂官奏請皇帝詣隆恩殿行題主禮鑾儀衛官豫設黄輿於殿外階下執事官設神主寶座於殿内正中南嚮設題主案於東旁西嚮設奉安主櫝案於寶座旁南嚮設皇帝拜位於殿門内正中北嚮贊引太常卿二人恭導皇帝入殿左門就拜位立鴻臚寺官引王公於階上文五品以上武四品以上官於階下東西上北面序立大臣一人啟櫝奉神主設於題主案大學士二人朝服詣案東行一跪三叩禮興就位西嚮恭題神主畢大臣奉主安於寶座三叩退迺行虞祭禮皇帝就拜位王公百官各就拜位上香奠帛讀祝三獻爵送燎均如儀禮成鑾儀衛堂官率校尉舁黄輿設階上正中南嚮太常卿跪奏恭請神位升祔太廟皇帝詣寳座前行一跪三拜禮恭奉神主大學士前引由殿中門出奉安黄輿内行一跪三拜禮興校尉舁輿前列御仗黄盖内大臣十人大學士禮部堂官導引啟行皇帝率王以下各官於大門外跪候過先詣塗次黄幄祗竢恭理䘮儀及執事諸臣隨行沿塗朝夕奠皇帝親詣上香行三跪九拜禮王公百官不隨行禮還京升祔太廟詳儀升祔期年小祥讀文致祭張黃幄於皇陵方城前陳俎豆列饌筵於祭臺左右皇帝䘮服詣黃幄内奠獻隨往之王公百官咸於陵寢門外隨行禮舉哀與前祖奠同再期大祥陳設禮儀與期年同二十七月行除服禮皇帝䘮服於皇陵方城前行奠獻禮陳設禮儀與百日奠獻同祭畢除服三周行禮儀同再期䘮禮二凡列后大䘮聖子皇帝主䘮儀初䘮恭奉梓宫奉安於宫中正殿設几筵建丹旐於宫門外之右陳儀駕於宫門外皇帝成服截髪辮諸王之為子者皆成服截髪辮皇后成服剪髪諸王福晉為子婦者皆成服剪髪皇太后宫中女侍内監皆成服剪髪截髪辮既歛王以下及婣戚於宫門外三品官以下於外門之外福晉以下及婣戚婦女於丹墀右三品淑人以下於宫門外齊集舉哀奏疏文移十五日用藍印頒遺誥於天下内外各官百日不作樂不嫁娶軍民二十七日不作樂不嫁娶朝晡日中之奠進茶膳以女官恭理䘮儀王公大臣内務府總管率之内監轉進於皇帝親奠殷奠既徹饌女官奉冠服詣燎所福晉命婦内府婦女皆從欽命公主福晉或婣戚大臣夫人一人於燎所祭酒行禮將𦵏隨行有女侍及内府婦女餘皆如列聖䘮儀凡皇后大䘮皇帝主䘮儀初䘮皇帝冠去緯輟朝皇子去冠緯哭踊宫中自妃嬪以下咸摘耳環去首飾届時奉安梓宫於宫中正殿設几筵建丹旐於宫門外之右陳儀駕於宫門之外特簡王公大臣恭理喪儀既歛迺奠王公以下民公侯伯二品官以上及婣戚於宮門外三品官以下文武有頂帶官於外門之外妃嬪宫人公主皇子皇孫福晉近支王等福晉於几筵殿内諸王公福晉夫人郡主縣君二品夫人及婣戚婦女於丹墀右三品淑人以下於宮外齊集舉哀皆男摘冠緯女去首飾奠獻時隨行禮舉哀畢各退皇帝成服皇子成服截髮辮居宮中别室皇孫隨成服王公百官宗室覺羅及婣戚咸成服王公於府第齋宿大臣官員於各公署齋宿皇子福晉成服剪髮皇后宮中女侍内監咸成服剪髮截