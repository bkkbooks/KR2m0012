往宿次祗俟靈駕將至宿次王公百官先至幔城北門外舉哀跪迎靈駕安奉於蘆殿衆至大門外序立陳設儀駕乃行晡奠如儀奠畢各退翼日昧爽行朝奠如儀皇子跪送仍隨行在塗皆朝夕奠如初日妃嬪以下與朝奠不與晡奠所過五十里內守土官於道右百步外跪迎靈駕舉哀至宿次於幔城外行三跪九叩禮奠獻時各於右翼班末隨行禮至陵寢日守陵寢貝勒公大臣官員咸於十里外舉哀跪迎靈駕至饗殿大門降大升輿安奉梓宮於饗殿皇子祭酒三爵衆隨行禮舉哀是日遣官祭告各陵寢並祭后土皇陵山神翼日行遣奠禮陳饌筵二十五席羊七酒十有五尊楮帛九萬往送之王公百官及在陵貝勒公大臣官員咸齊集儀如祖奠先葬一日行遷奠禮儀如遣奠至時恭理喪儀王公大臣等率夫校進小輿恭奉梓宮於寶城前蘆殿登龍輴進饌筵皇子三祭酒畢衆退乃焚楮帛儀駕訖至日皇子詣梓宮前祭酒屆吉時恭移龍輴自隧道入地宮安奉寶牀設香册寶於左右几遂掩閉元宮皇子於祭臺前祭酒舉哀行禮畢乃卒哭各退行題主禮鑾儀衛官豫設黃輿於階下執事官設神主寶座於殿內正中南嚮設題主案於東旁西嚮設奉安主櫝案於寶座旁南嚮至時贊引官引遣官就拜位鴻臚寺官引王公百官各就位大臣一人啓櫝奉神主設於題主案大學士二人朝服詣案東行一跪三叩禮興就位西嚮恭題神主畢大臣奉主安於寶座三叩退乃行虞祭禮上香奠帛讀祝三獻爵送燎均如儀禮成鑾儀衛堂官率校尉舁黃輿於階上遣官詣寶座前行一跪三叩禮恭奉神主由殿中門出奉安黃輿校尉舁輿前列御仗黃蓋內大臣十人禮部堂官導引啓行王以下各官隨行沿塗仍朝夕奠俟還京時升祔詳升祔儀如距大葬之期尚逺乃於神主卜吉於殯殿殯宮東廡製二欽命大學士人行題主禮是日陳儀駕於大門外陳鳯輿於階下奉主大臣恭奉神主至几筵前設左案大學士上香行禮畢恭題主大神主鑾儀衛舁鳯輿升至階正中奉臣恭奉臣十神主出大學士前導奉安鳯與內前引大人前導校尉舁輿由中門出儀駕前導至導東華門止黃蓋御仗前至誠肅門止期年小祥讀文致祭陳設禮儀與前初奠同再期大祥陳設禮儀與期年同二十七月行除服禮皇子喪服行奠獻禮王公百官隨行禮陳設禮儀與百日禮同祭畢皇子皇子福晉除服三周行禮儀同再期欽定大清會典卷五十一
