body:
  text: 禮部祠祭清吏司喪禮三凡皇貴妃喪禮疾革自大內移至吉安所初薨皇帝輟朝五日素服十日若殯期逾十日及殯而止命所出皇子公主持服皇子去冠緯公主皇子福晉去簪珥届時入金棺奉安金棺於正殿設几筵建丹旐於二門外之右陳儀仗於大門外簡命王公大臣辦理喪儀既斂乃奠王以下四品官以上公主福晉以下一品夫人以上咸齊集男摘冠緯女去首飾所出皇子皇子福晉成服截髮辮剪髮皇孫皇孫婦姻戚隨成服至大祭日而除百日剃髮奏除諸皇子及近支王公等並內務府總管一人散秩大臣三人侍衛九十人內府三旗佐領下官員及其妻以三分之一成服至大祭日而除剃髮本內管領下官員及執事男婦皇子侍從成服至大祭日除服皆隨皇子百日剃髮朝晡日中三設奠朝晡設儀仗王公官員公主福晉命婦咸齊集行禮舉哀如儀奠茶時惟行皇子皆殿內內監等隨禮後同諏日而殯前期行啓奠禮儀仗全設陳饌筵七席羊五酒五尊楮帛萬有五千王公官員公主福晉命婦咸齊集皇子祭酒衆隨行禮舉哀畢各退至日豫設大輿於大門外届時皇子祭酒三爵辦理喪儀王大臣鑾儀衛工部堂官率舁夫進小輿奉金棺出升大輿禮部堂官祭輿內大臣祭所經門橋皆三祭酒焚楮帛皇子步送王公各官姻戚以次隨行齊集之公主福晉命婦先往以俟金棺至奉安畢設几筵皇子祭酒衆隨行禮舉哀畢焚楮帛丹旐各退行初祭禮王公官員公主福晉命婦咸齊集設儀仗於殯宮大門外陳饌筵三十五席羊二十一酒二十一尊楮製丹旐一楮帛十有八萬九千張黃幕於二門外之右設反坫具尊罍設儀仗陳冠服遣官讀文致祭皇子及衆隨行禮舉哀徹饌奉祭文冠服送燎所皇子福晉祭酒行禮衆隨行禮舉哀畢乃焚冠服楮帛各退翼日繹祭陳饌筵七席羊三酒三尊楮帛萬有五千不設儀仗不齊集辦理喪儀大臣內務府禮工二部光祿寺堂官執事內務府總管夫人內管領妻祭酒行禮如儀行大祭禮儀與初祭同翼日繹祭儀與初祭次日繹祭同周月奠獻設儀仗陳饌筵十有一席羊五酒五尊楮帛二萬一千衆齊集不讀文皇子祭酒儀同大祭二周月三周月儀同內閣擬諡號候欽定工部造絹册寶諏日行册諡禮設采亭於午門外正副使二人詣內閣於册寶前行一跪三叩禮恭奉由午門中門出安設於采亭一跪三叩校尉舁亭前列黃蓋御仗至殯宮大門外亭止正副使於亭前跪三叩正使奉册副使奉寶興由中門入陳於案三上香畢宣讀官以次宣册文寶文畢各退乃行讀文致祭禮正使祭酒儀如月奠百日讀文致祭陳饌筵十有五席羊七酒七尊楮帛五萬儀與月奠同既卜葬吉先期行祖奠禮陳饌筵十有五席羊七酒七尊楮帛三萬七千儀與啓奠同奏遣皇子及王公大臣官員往送沿塗分站豫設蘆殿繚以席垣皇子王公各官內監女侍內府婦女三十人皆以次隨行至宿次設晡奠翼日昧爽朝奠皇子祭酒行禮如儀至園寢日在陵貝勒公大臣及不直班之官員咸於十里外道右跪迎舉哀候過隨行奉安金棺於蘆殿翼日行遣奠禮設儀仗送往之王公大臣官員及在陵貝勒公大臣官員暨貝勒公夫人大臣官員妻咸齊集陳設禮儀一如祖奠及葬先期行遷奠禮陳饌筵十有三席羊五酒五尊楮帛三萬儀與遣奠同届時奉移金棺於墓前蘆殿升太平車奠獻行禮畢各退焚楮帛儀仗至日奉金棺由隧道入墓壙掩閉墓門皇子於月臺前祭酒舉哀行三叩禮衆皆隨行禮畢卒哭是日皇子暨送往之王公大臣官員皆還京行題主禮豫期近園寢之外設蘆殿製造神牌工竣設於案內閣大學士禮部堂官朝服行一跪三叩禮刻字將近大祭以前卜吉填青各行禮如初畢乃安奉於蘆殿日㸃香燭逢大祭日奉入饗殿依次奉安於座禮成奉安寢室期年小祥致祭行禮如儀再期大祥如期年儀三周行禮儀同再期凡貴妃喪禮疾革自大內移至吉安所初薨皇帝輟朝五日命所出皇子公主持服皇子去冠緯公主皇子福晉去簪珥届時入金棺奉安金棺於正殿設几筵建丹旐於二門外之右陳儀仗於大門外簡命王公大臣辦理喪儀既斂乃奠王以下三品官以上公主福晉以下一品夫人以上咸齊集男摘冠緯女去首飾所出皇子皇子福晉成服截髮辮剪髮皇孫皇孫婦姻戚隨成服至大祭日而除百日剃髮奏除近支王公等及內務府總管一人散秩大臣三人侍衛六十人內府三旗佐領下官員及其妻以三分之一成服大祭日除服剃髮本屬二內管領下官員執事男婦皇子侍從皆成服大祭日除服皆隨皇子百日剃髮朝晡日中三設奠設儀仗凡三日內府成服官員及護軍領催等男婦咸齊集至除服日止行禮舉哀如儀諏日而殯至日豫設大輿於大門外届時皇子祭酒三爵辦理喪儀王大臣鑾儀衛工部堂官率舁夫進小輿奉金棺出升大輿禮部堂官祭輿禮部官祭所經門橋皆三祭酒焚楮帛皇子步送王公各官姻戚以次隨行齊集之公主福晉命婦先往以俟金棺至奉安畢設几筵皇子祭酒衆隨行禮舉哀畢焚楮帛丹旐各退行初祭禮儀仗全設陳饌筵三十一席羊十有九酒十有九尊楮製丹旐一楮帛十有四萬九千張金黃幕於二門外之右設反坫具尊罍王公官員公主福晉命婦咸齊集遣官讀文致祭皇子及衆隨行禮舉哀如儀翼日繹祭陳饌筵五席羊三酒三尊楮帛萬不設儀仗不齊集內務府禮工二部光祿寺堂司官執事內管領妻祭酒行禮如儀行大祭禮儀與初祭同翼日繹祭儀與初祭次日繹祭同周月奠獻設儀仗陳饌筵十有一席羊五酒五尊楮帛二萬衆齊集行禮儀與大祭同二周月三周月儀同行册諡禮與皇貴妃同百日奠獻陳設禮儀皆與月奠同既卜葬吉先期行祖奠禮設儀仗陳饌筵十有三席羊五酒五尊楮帛三萬衆齊集奠獻行禮如儀奏遣近支王公大臣官員往送沿塗奉安蘆殿宿次設晡奠翼日朝奠皇子祭酒行禮如儀至園寢日在陵貝勒公大臣及不直班之官員咸於十里外道右跪迎舉哀候過隨行奉安金棺於蘆殿翼日行遣奠禮送往之王公大臣官員及在陵貝勒公大臣官員暨貝勒公夫人大臣官員妻咸齊集陳設禮儀均如祖奠及葬先期行遷奠禮儀與遣奠同至日奉金棺由隧道入墓壙掩閉墓門皇子於月臺前祭酒舉哀行三叩禮衆皆隨行禮畢卒哭是日皇子暨送往之王公大臣官員皆還京行題主禮豫期近園寢之外設蘆殿製造神牌工竣設於案內閣大學士禮部堂官朝服行一跪三叩禮刻字將近大祭以前卜吉填青各行禮如初畢乃安奉於蘆殿日㸃香燭逢大祭日奉入饗殿依次奉安於座禮成奉安寢室期年小祥致祭行禮如常儀再期大祥如期年儀三周行禮儀同再期凡妃喪禮疾革自大內移至吉安所初薨皇帝輟朝三日命所出皇子公主持服皇子去冠緯公主皇子福晉去簪珥届時入金棺奉安金棺於正殿設几筵建丹旐於二門外之右陳采仗於大門外簡命王公大臣辦理喪儀既斂乃奠王以下三品官以上公主福晉以下一品夫人以上齊集男摘冠緯女去首飾所出皇子皇子福晉成服截髮辮剪髮皇孫皇孫婦姻戚隨成服至大祭日而除百日剃髮奏除近支王公等及內務府總管一人散秩大臣三人侍衛六十人成服至大祭日除服剃髮所屬內管領一人並內管領下官員男婦皇子侍從皆成服至大祭日除服皆隨皇子百日剃髮朝晡日中三設奠設采仗凡三日內務府成服官員及護軍領催等各男婦齊集至奉移日止行禮舉哀如儀諏日而殯至日豫設大輿於大門外届時皇子祭酒三爵辦理喪儀王大臣鑾儀衛工部堂官率舁夫進小輿奉金棺出升大輿內務府堂官祭輿禮部官祭所經門橋皆三祭酒焚楮帛皇子步送王公百官姻戚以次隨行齊集之公主福晉命婦先詣殯宮以俟金棺至奉安畢設几筵皇子祭酒衆隨行禮舉哀畢焚楮帛丹旐各退行初祭禮采仗全設陳饌筵三十一席羊十有九酒十有九尊楮製丹旐一楮帛十有四萬九千張金黃幕於二門外之右陳反坫具尊罍王公官員福晉命婦咸齊集遣官讀文致祭皇子及衆隨行禮舉哀如儀翼日繹祭陳饌筵五席羊三酒三尊楮帛萬不設采仗不齊集內務府禮工二部光祿寺堂司官執事內管領妻祭酒行禮如儀行大祭禮儀與初祭同翼日繹祭儀與初祭次日繹祭同周月致祭陳饌筵十有一席羊五酒五尊楮帛二萬衆齊集行禮儀與大祭同二周月三周月儀同百日致祭陳設禮儀皆與月奠同既卜葬吉先期行祖奠禮陳饌筵十有三席羊五酒五尊楮帛三萬衆齊集奠獻行禮如儀奏遣近支王公大臣官員往送沿塗奉安蘆殿宿次設晡奠翼日朝奠皇子祭酒行禮如儀至園寢日在陵貝勒公大臣及不直班之官員咸於十里外道右立迎舉哀候過隨行奉安金棺於蘆殿翼日行遣奠禮送往之王公大臣官員及在陵貝勒公大臣官員暨貝勒公夫人大臣官員妻咸齊集陳設禮儀均如祖奠及葬先期行遷奠禮儀與遣奠同至日奉金棺入墓壙掩閉墓門皇子於月臺前祭酒舉哀行三叩禮衆皆隨行禮畢卒哭是日皇子暨送往之王公大臣官員皆還京行題主禮豫期近園寢之外設蘆殿製造神牌工竣設於案內閣大學士禮部堂官朝服行一跪三叩禮刻字將近大祭以前卜吉填青各行禮如初畢乃奉安於蘆殿日㸃香燭逢大祭日奉入饗殿依次奉安於座禮成奉安寢室期年小祥致祭行禮如常儀凡嬪喪禮疾革自大內移至吉祥房初薨皇帝輟朝二日命所出皇子公主持服皇子去冠緯公主皇子福晉去簪珥届時入金棺奉安金棺於正殿設几筵建丹旐於二門外之右陳采仗於大門外既斂乃奠王以下一品官以上公主福晉以下一品夫人以上咸齊集男摘冠緯女去首飾所出皇子皇子福晉成服截髮辮剪髮皇孫皇孫婦姻戚隨成服至大祭日而除百日剃髮奏除王公內務府總管成服無出者不奏除至大祭日除服剃髮執事內管領一人及內管領下男婦之半成服隨皇子除服剃髮朝晡日中三設奠陳采仗凡三日內務府成服官員及護軍領催各執事人男婦分班齊集行禮舉哀如儀諏日而殯至日豫設大輿於大門外届時皇子祭酒三爵工部堂官率舁夫進小輿奉金棺出升大輿內務府堂官祭輿禮部官祭所經門橋皆三祭酒焚楮帛王公各官姻戚以次隨行步送齊集之公主福晉命婦先詣殯宮以俟金棺至奉安畢設几筵祭酒三爵衆隨行禮舉哀畢焚楮帛丹旐各退行初祭禮設采仗陳饌筵二十一席羊十有一酒七尊楮製丹旐一楮帛十萬五千張金黃幕陳反坫如儀衆齊集皇子祭酒衆隨行禮舉哀畢各退翼日繹祭陳饌筵三席羊三酒三尊楮帛六千不設采仗不齊集內務府禮工二部堂司官執事內管領妻祭酒行禮如儀行大祭禮儀與初祭同翼日繹祭儀與初祭次日繹祭同周月奠獻陳饌筵七席羊三酒三尊楮帛萬有四千儀與大祭同二周月三周月儀同百日奠獻陳設禮儀均與月奠同既卜葬吉先期行祖奠禮陳饌筵九席羊三酒三尊楮帛二萬內府成服官員男婦咸齊集祭酒行禮如儀奏遣近支王公大臣官員往送沿塗安奉蘆殿宿次設晡奠翼日朝奠皇子祭酒行禮如儀至園寢日在陵貝勒公大臣及不直班之官員咸於十里外道右立迎舉哀候過隨行奉安金棺於蘆殿翼日行遣奠禮送往之王公大臣官員及在陵貝勒公大臣官員暨貝勒公夫人大臣官員妻咸齊集陳設禮儀均如祖奠及葬先期行遷奠禮儀與遣奠同至日奉金棺入墓壙掩閉墓門皇子於月臺前祭酒舉哀行三叩禮衆隨行禮畢卒哭是日皇子暨送往之王公大臣官員皆還京期年小祥致祭行禮如常儀凡貴人喪禮疾革自大內移入吉祥房