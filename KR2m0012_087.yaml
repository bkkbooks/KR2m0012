body:
  text: 內務府總管無定員於滿洲文武大臣或王公內簡用掌內府一切事務奉宸苑武備院上駟院並𨽻焉所屬廣儲會計掌儀都虞慎刑營造慶豐七司廣儲司管理六庫郎中二人郎中四人員外郎十有二人主事一人司庫十有二人掌理內府庫藏筆帖式二十六人管理江寧府蘇州府杭州府織造官各一人於內務府司官內奏簡仍帶原銜司庫各一人庫使各二人筆帖式各二人㑹計司郎中三人員外郎六人主事一人掌理內府帑項筆帖式二十六人內管領三十人副內管領三十人筆帖式八人管理三旗納銀莊郎中一人員外郎六人主事一人筆帖式十有二人掌儀司郎中二人員外郎八人主事一人掌內府典禮司俎官五人贊禮郎十有七人筆帖式二十二人尚膳正尚茶正一等侍衛各一人二等侍衛各二人尚膳副尚茶副三等侍衛各一人尚膳三等侍衛六人尚茶三等侍衛三人尚膳藍翎侍衛七人尚茶藍翎侍衛四人主事一人筆帖式十有二人中正殿員外郎二人筆帖式三人雍和宮郎中員外郎各一人筆帖式三人咸安宮官學筆帖式一人南府景山筆帖式各二人藥房主事一人未入流庫掌二人筆帖式十有五人都虞司郎中二人員外郎五人主事一人掌府屬武職升補及內府護軍供應畋漁筆帖式二十六人掌御舟筆帖式二人尚虞筆帖式一人鷹房鶻房筆帖式各二人狗房筆帖式三人慎刑司郎中二人員外郎四人主事一人掌內府刑罰筆帖式二十人營造司郎中二人員外郎八人主事一人掌理造作兼司薪炭筆帖式二十六人官房租庫筆帖式七人未入流庫掌一人刋刻御書處監造一人未入流庫掌三人署庫掌四人筆帖式二人武英殿修書處監造二人庫掌四人署庫掌五人筆帖式五人飬心殿造辦處郎中二人員外郎二人主事一人庫掌六人筆帖式十有六人慶豐司郎中二人員外郎十人主事一人掌牧館廄牛羊及口外牧場孳生蕃息筆帖式十有六人堂郎中一人主事二人掌治堂事凡府屬文職升補武職隸都虞司及章奏文移皆隸焉筆帖式三十八人稽察內務府御史所屬筆帖式八人凡升除郎中至八品苑副由府及該處簡選引見補授未入流司庫以下由府除授其升選調補均依成法凡京察府屬官員每三年由總管考察一次分别去留具題請㫖凡遇三大節太和殿皇太后宮行禮均與百官同皇后宮行禮於內右門外躬祀壇廟車駕出入於午門外跪候迎送駕經由內務府衙門總管率所屬官排班祗候凡常朝內務府總管率所屬文武官於右翼門外總管於門階上各官以次列坐於階下以都虞司司官察班凡直宿日以總管一人如因事不能入直以郎中代恭遇皇帝宿齊宮行幸駐蹕皇太后皇后在宮中奏留總管一人在京如遇皇帝進宮皇太后皇后在圓明園奏留總管一人在園凡恭遇皇太后皇后妃嬪出入總管一人率內府護軍統領參領內府護軍豹尾班扈從如總管乏人行丈領侍衛內大臣以散秩大臣一人代凡用御寶恭遇行幸駐蹕總管一人同內閣學士於乾清門監視凡輿制皇太后皇后輿重頂上層六方各面濶一尺四寸二層深四尺四寸濶三尺六寸皆飾以金垂幨二層均黃綾銷金鳯覆以黃雲綺風衣上安鈒花金頂輿屋髙四尺五寸深三尺五寸濶二尺八寸幃用黃雲綺輪轅均髤以黃轅兩端輪鐗轄均以鐵為之鋄以金皇貴妃輿鋄以金銀餘同貴妃輿安鈒花鋄金頂幃用金黃綺餘同皇貴妃之制妃輿用金黃綾銷金鳳覆以金黃雲綺風衣幃用金黃雲綺餘如貴妃之制嬪貴人輿頂深四尺四寸濶三尺六寸幨幃均用金黃雲綺輪轅髤以金黃餘如妃之制常在以下幨幃均用青雲綺銅頂輪轅髤以朱鋄以銀餘如貴人之制皇子福晉輿幨幃均用絳雲綺上安銀頂餘同前廣儲司凡府庫有六曰銀庫曰假庫曰衣庫曰茶庫曰皮庫曰瓷器庫各有專司物相類者則兼掌之總管率郎中司庫等官慎出納時供奉每月終奏銷次年彚造黃册具題閲五年奏簡司官清釐庫藏凡供奉皇太后皇帝皇后御用冠服妃嬪暨皇子公主朝冠朝服皆依禮部定式敬謹成造歲進皇太后宮金珠表裏皇后妃嬪宮表裏均按數供奉隨時應用器物皆準宮殿監督領侍移文恭進恭遇車駕時巡齎金錢皮幣及應用器物以從凡出納山西歲貢潞紬由工部江南浙江貢茶由户部光祿寺䝉古王公台吉外國君長番部喇嘛朝貢方物由禮部理藩院均移送至府付各庫驗收捕牲烏喇貢珠索倫烏亮海貢貂㑹户工二部區别等次盛京寧古塔貢人參寧古塔瓜爾察貢貂由府區别等次均具奏貯庫山海關外屯衛貢狼狐水獺等皮盛京貢布棉鹽靛張家口貢紅花三旗游牧處貢羊皮玉草即得勒蘇草均送庫驗收其支發庫物見有者不得逾六日移取户工二部者不得逾十日均準各處文移發給凡遣官製造江南江寧蘇州二府浙江杭州府差織造官各一人司庫各一人筆帖式各二人庫使各二人設機募匠分織龍衣采幣錦假紗紬絹布棉甲及採買金絲織絨之屬歲由府擬定色樣及應用之數奏行織造上用者陸運官用者水運各依限輸庫驗收以數咨户部奏銷江西九江府景德鎮差官製造瓷器輸庫收貯歲終由府奏銷凡供用宮中祭神奉先殿制帛並需用金銀幣布及香紙之屬由銀庫假庫茶庫封開御寶需用爐鐙爵盆由銀庫瓷器庫年節張鐙躬祀壇廟堂子駕前及各門擎執引鐙由皮庫瓷器庫各宫殿寺廟供花御燕前所用采花由茶庫均準移文恭進凡賞賚王公大臣侍衛每歲冬至前應賜朝冠朝服端罩閲校大臣侍衛內府三旗所屬官兵騎射奉㫖賞鞍馬銀幣均由府具奏頒賜視學幸魯禮成賜衍聖公朝冠朝服恭纂實録告成賞監修總裁纂修官表裏來朝之䝉古王公台吉進貢之朝鮮安南琉球西洋暹羅緬甸蘇祿南掌諸國王西藏番部喇嘛及其使臣賞貂皮表裏瓷器直省舉報夀民夀婦年逾百歲者奉㫖加賞銀幣均準禮部理藩院移文發給凡官給衣物朝祭燕㑹豹尾班侍衛蟒袍內朝筵燕及饗先𧖟執事命婦朝衣鹵簿內執兵仗馭馬親軍護軍冠服宿衛之侍衛至領催步軍冬夏被褥準領侍衛內大臣鑾儀衛掌儀司移文按時給發㑹試舉子禦寒棉襏準禮部移文兵丁操演棉甲準八旗移文支領均事畢交還敝則補製凡優恤內府三旗官兵婚喪給恩賞銀年七十以上男婦給銀幣宮殿內監歲給衣服守護陵寢內監尚茶尚膳婦女供奉奉先殿㕑役內管領下內外執事男婦及匠作夫役之𨽻內府者歲給羊裘假布各有差凡匠作七等銀作銅作皮作染作衣作繡作花作各有定數皆以執藝之優劣定役食之多寡長以領催總以司匠闕則召募惰則革除㑹計司凡皇莊各有等次盛京莊八十有四一等莊三十五二等七三等八四等三十四山海關外莊二百十有一一等莊六十六二等四三等二十四等百二十一喜峯口古北口外莊百三十八均一等歸化城莊十有三捕牲烏喇莊五駐馬口外彌陀山莊十有五均不分等次畿輔莊三百二十有二一等莊五十七二等十有六三等三十八四等二百十有一半莊七十一豆糧莊六稻田莊三均不分等次每莊設莊長一人瓜田菜圃置莊設長亦如之别給耕地以飬其家衆禁苑稻麥田供上幾餘觀省委官一人董率莊長祗承厥事凡莊賦共地萬三千二百七十二頃八十畝賦糧九萬三千四百四十石菽二千二百二十五石芻八萬一千九百四十束各有竒凡徵糧盛京一等莊每莊歲納糧三百八十二石二等三百五十二石三等三百有七石四等百九十二石除給三旗丁糧外以三萬石貯窖萬石貯奉天府倉由盛京內務府總管徴收關外一等莊歲納糧三百二十二石二等二百九十二石三等二百六十二石四等百九十二石每糧十石折銀二兩每莊於正數外不論等次各納雜糧二十九石一斗六升折銀四十一兩有竒由錦州副都統徴收口外每莊歲納糧二百五十石每糧二石折米一石貯熱河倉每運米十石抵糧一石正數內各納雜糧三十三石折銀四十兩有奇由熱河總管徴收歸化城每莊歲納糧二百石貯本城旗倉由都統徴收捕牲烏喇每莊歲納糧六百有四石八斗以二萬石貯倉餘糧平糶由總管徴收駐馬口外每莊歲納米二百石貯本處旗倉由右衛將軍徴收畿輔一等莊每莊歲納糧二百五十石二等二百二十石三等一百九十石四等百二十石半莊六十石每糧十石折銀五兩一二等莊於正數內納雜糧三十三石折銀六十八兩三四等莊納雜糧二十九石折銀六十兩各有奇豆糧六莊歲納菽二千二百二十五石芻八萬一千九百四十束稻田三莊每畝納米二斗四升至三斗六升有差旱地每畝納糧四斗五升均由司徴收芻菽除豆糧莊歲輸所入外餘按內外廄圈牧羣所需之數分撥於各莊歲於九月望至次年二月杪出場游牧以前計日飼秣近者以馬就莊逺者運料供馬均準抵正糧雜徴盛京及關外每莊均歲輸鵝一關外並納茜草線麻及蔞蒿黃花薤諸蔬畿輔一二等莊歲納豕三三四等莊歲納豕二及麻麥稻秫諸秸並紅花蓼子芥子菜子瓢帚飄翎之屬凡內廷歲時祭神暨奉先殿應用黍稷稻梁之屬均令朝陽門外八莊供奉貯於官三倉凡徴輸考成按各莊應納糧數析為十分缺一分至十分者枷責有差五分以下者於次年并徴六分以上者革所缺豁免芻菽雜徴同莊長輸將急公閲四五十年無逋缺者給八品頂帶閲二三十年及經年無缺因年老告退者均給九品頂帶領催於承催之莊三年無缺者亦給九品頂帶逾限不完者與莊長並論凡勘災畿輔各莊偶遇旱潦即報府由地方官履勘具册結於總督轉達於府如與原報相符給口糧議蠲免揑報者莊長治罪盛京及關外口外各莊同由總管將軍都統副都統達府至於鹵磽沙瘠不能按則輸將者勘實大莊改半莊半莊交地方官召佃凡莊長闕各以其親屬承充缺糧或緣事革退及新設之莊均於本莊及别屬壯丁內選補除緣罪沒入及投充之人選為莊長外餘陳人子弟均準應試凡編審壯丁每三年一次盛京及關外口外各莊由總管將軍都統副都統畿輔由府委官各具册於府由府彚册奏聞以周知各莊壯丁之數若莊長自買之人不準入册其自國初投充及無罪撥遣之壯丁內有力能謀生者令莊長報府聽入民籍凡奏銷內廷祭神金銀牲幣於十二月官三倉黏稻蜜鹽於六月米蠟於八月畿輔莊糧於十二月各莊芻菽於四月盛京及關外口外莊糧於文到一月內各具題均於次年核銷上年之數凡皇子分封各按爵秩給以莊地人丁公主郡主贈嫁亦如之凡選宮女於內府三旗佐領內管領下女子年十三以上者造册送府奏交宮殿監督領侍等引見入選者留宮餘令其父母擇配其留宮之女至二十五歲遣還擇配凡宮中乳母保姥於各佐領內管領下選充仍别雇乳母以哺乳母之子女凡尚膳尚茶及鷹鷂鶻狗房執事人各廄圈廄丁均以佐領內管領下應選之人送該管處選用凡收録內監由禮部册列姓名籍貫移府總管察其來由無異乃委年老內監一人驗實具奏候㫖分撥年老者聽其回籍為民凡支給內監月費執事人匠役餼廩盛京三旗內管領下人丁口糧守熱河行宮倉庾兵丁月餉盛京捕送鹿捕牲烏喇貢珠官役廩給芻秣均行文所司支領辨其多寡增減之數各有差凡恩恤三旗佐領內管領下鰥寡孤獨者月給銀米飬贍孤子俟成人能執役乃止絶嗣有産業者為立祭田及守墓奴僕餘給其女暨姊妹有差凡宮中祭神內廷供奉均以內管領率所屬男婦敬謹從事凡官三倉分貯米鹽蜜蠟每倉以內管領副內管領各二人經理出納每年一次或二次於户部支領歲終具册奏銷凡瓜菜園菜園六十丁瓜園三十丁各給畦地一頃八十畝或以旱地五畝準畦地一畝畦地園丁各納瓜蔬有差旱地園丁徴銀如果園丁例見掌儀司凡監造醯醢以內管領二人未入流庫掌二人庫守四人董其事凡造辦餅餌設造辦房二所一以內管領分班輪直監視造辦進御者一以內管領一人專司造辦供品凡車輿設庫收貯以內管領四人典守凡器皿日用有額以內管領二人典守非常用之器别貯於廣儲司庫歲一檢稽凡納銀莊順治初年畿輔之民攜地來投者各就其地而立之莊計莊百三十有二不立莊者並仍其户計户二百八十有五內有棉靛户改入者六又蜜户三十有八葦户七各攜地自三十畝至二十八頃有差其以身來投給官地四十二畝耕種者曰繩地人計户二十有九凡田賦共地五千七百四十八頃三十畝賦銀三萬八千九百二十兩芻十有二萬一千七百九束各有奇凡徴收各視其地之多寡肥磽以定則二十八頃之莊一歲徴銀七百兩二十七頃之莊一徴銀三百兩二十一頃之莊一徴銀四百兩畦地二頃三十八畝之莊一徴銀二百五十兩十八頃之莊二十有九各徴銀二百兩九頃莊二各徴銀百兩七八頃之莊九十七每畝徴銀一錢一分有竒不立莊者每畝徴銀三分芻一束束重七斤逺户每束折銀三分蜜户每六畝徴蜜五斤葦户每畝徴銀一分至八分有差內徴蘆葦六千二百五十斤每斤準扺銀三釐五毫有奇繩地人與不立莊者賦同均照例徴銀交廣儲司貯庫芻交廄館蜂蜜蘆葦交官三倉雜徴各莊户歲納栁條檾麻繩帚之屬共折銀千四百八十三兩有奇令催長採買交官三倉凡徴輸勸懲莊地勘災編審各莊户壯丁均如例莊長闕各以其子弟充補奏銷以次年之十二月欽定大清㑹典卷八十七
