body:
  text: 兵部武選清吏司守衛凡宿衛宫門領侍衛內大臣率侍衛分班入直紫禁城門前鋒護軍統領率前鋒護軍參領前鋒護軍分班入直皇城門前鋒護軍參領率所屬官兵及步軍尉步軍分班入直三旗司鑰長一人於景運門五旗司鑰長一人於闕左門直宿掌各門鎖鑰有曠直及擅縱人出入者各論如法凡城守內外城城門領司城門之管啓閉以時掌之步軍統領不以時至者合符乃啓步軍統領於次日疏聞遇朝㑹祭祀日所司移部咨步軍統領於曉鐘時啓門納與事官役行人出入仍依常時凡汛守內外城垣街道及倉庫步軍統領分遣步軍尉率所屬步軍直宿巡警詰姦禁暴緝盜捕逃罔或疏縱部遣官稽察有曠厥職守者論如法恭遇車駕巡幸八旗都統於各城及街道增設辨兵守衛歲終封印後亦如之設信炮五於白塔山掌以總管等官以備警急九門設炮亦如之凡夜禁步軍尉率步軍分界直宿入夜傳籌擊柝止行人詗姦匪步軍統領翼尉分巡部遣官稽察有疏縱夜行及擾纍行人者官兵責罰有差凡防禦火災八旗各設火班領以都統或副都統一人官十人兵八十人有失火之處分直宿官兵之半即往撲滅南城外報步軍統領啓正陽門城內報相近之旗均立率官兵往救東南城報正藍鑲白二旗西南城報鑲藍鑲紅二旗東北城報鑲黃正白二旗西北城報正黃正紅二旗禁城內及倉庫公廨每翼兩旗同赴有不至者罪之大閲凡大閲由部三歲一奏請得㫖疏列王公大臣名簡王公大臣總理其事先飭八旗都統等各帥所部訓練成式總理王公大臣合八旗將校甲兵擐甲操演凡鹿角長槍鳥槍神威炮子母炮䝉古畫角海螺旗纛之屬各飭所司修整以供用列陳之法左翼鑲黃正白鑲白正藍四旗以次而東西上右翼正紅正黃鑲紅鑲藍四旗以次而西東上各按旗為隊首列漢軍火器營鹿角步卒於中滿洲火器營騎軍於左右統兵大臣十有七人將校七百二十人兵九千一百七十有六人次前鋒營護軍營驍騎營並列而各分其隊統兵大臣十有六人將校二百九十六人兵四千四百十人分大臣四之一而贏將校甲兵五之一而贏以為殿又次護軍營驍騎營並列而各分其隊統兵大臣八人將校百四十四人兵三千五百二十八人其分張兩翼綴於左右四旗大營之末者為護軍驍騎營按旗相屬而斜列其隊統兵大臣八人將校百三十六人兵千七百六十四人掌畫角官十有七人禁約官三十二人兵六百四十人傳宣官二十四人凡統兵大臣由總理王公大臣列名奏請將校甲兵按各旗各佐領分出先期武備院於大閲所立御營前設帳殿鑾儀衛陳騎駕鹵簿鐃歌鼓樂於行宫門外左右陳上三旗䝉古畫角於帳殿前兵部陳傳令海螺於臺下逹於軍陳及期總理王大臣暨八旗領操都統等帥將校軍士甲胄出營既成列兵部堂官奏請駕將發聲炮三鐃歌大樂作奏壯軍容之章駕自行宫乘馬侍衛二十人內大臣十人騎而導前張黃蓋領侍衛內大臣二人後扈侍衛班領率豹尾班執槍侍衛佩刀侍衛各十人佩弓矢侍衛二十人騎而從駕入御營躬擐甲胄內大臣侍衛咸甲胄兵部尚書奏請閲兵皇帝佩刀出御營屬櫜鞬乘馬兵部堂官甲胄騎而導內大臣侍衛前後扈從如前儀總理王大臣暨滿大學士咸甲胄騎而從豹尾班後三旗內大臣散秩大臣率親軍舉黃龍大纛二三旗侍衛親軍各隨侍衛什長親軍校按隊而行不入陳之王公九卿均按翼序立於左右皇帝入自左翼由列陳中路行經驍騎護軍前鋒諸隊而南火器營諸隊而北出右翼周閲畢乃還下馬釋櫜鞬御帳殿豹尾班三旗侍衛分翼列侍建黃龍大纛二帳殿左右陳親軍海螺十二於纛前內大臣侍衛親軍羅列環侍執事王公大臣滿漢九卿分翼序立八旗傳宣官騎而列於臺下侍衛每翼六人騎而列於傳宣官之前又選侍衛中善馭馬者三十人不擐甲列於侍衛之後以控軼馬兵部尚書奏鳴角鑾儀使率鳴角軍進䝉古畫角先鳴臺上海螺臺下傳令海螺以次遞鳴逹於軍陳軍中畫角海螺畢鳴傳令海螺以次退立於臺下軍中三舉炮乃伐鼓行陳舁鹿角整列而進每進以十丈為率鳴金乃止一字列陳麾紅旗則槍炮齊發各一周鳴金乃止再伐鼓整列而進鳴金麾旗發槍炮如初如是者九第十進槍炮連環齊發無間鳴金乃止八旗開鹿角成八門首隊前鋒護軍驍騎各整列以次出至鹿角外次隊隨之火器營列於後既成列鹿角門闔八旗齊鳴螺呼譟而進兩翼協隊皆鴈綴以進軍中鳴金乃止為殿之八旗火器營槍炮護軍驍騎及首隊前鋒護軍驍騎各列於本旗大纛之下鳴螺振旅而還八旗漢軍分鹿角為八行本旗都統建龍纛整隊而還首隊兵殿後兵各以次鳴螺結隊徐旋退列於初成列之地兵部尚書奏大閲禮成皇帝出帳殿入御營釋甲胄內大臣侍衛咸釋甲胄回鑾導引扈衛如前儀鐃歌清樂作奏鬯皇威之章駕進行宫聲炮三將士各歸營釋甲胄是日賜燕賞賚各有差大狩凡狩田設圍場於古北口外曰木䦨以總管掌其地政歲遇皇帝行田既奉㫖總理行營王大臣奏請嚮道官一人先蒞圍場於鑾輿所經之地除道清軌行文所司儲備宗人府內閣部院奏請欽命扈從王公各官八旗護軍統領請命統領三人營總三人其參領以下及護軍由八旗酌委奏聞先期由部行文駐防將軍都統副都統各選所屬官兵材藝優長者分班遣赴京師隨圍學習先期一日遣官以狩田祗告奉先殿至日皇帝御征衣乘馬出宫翊衛諸臣前引後扈百官采服跪送均如巡幸儀詳見禮部行營駐蹕護軍統領營總各一人率護軍參領護軍校護軍先蒞其地度地廣狹以立御營禁隨駕官兵踐禾稼擾吏民營總巡警嚴譏察止夜行違者論如法既至行在兵部頒行圍禁令欽命統圍大臣數人先蒞圍場按旗為隊分兩翼斜行成列各置旃以為表前哨左右用藍兩協左白右紅中軍用黃前哨馳而進則後隊以次隨發繞圍場蟬聫環匝由逺而近毋差池毋間斷皇帝臨圍場親御弓矢圍合獸突皇帝發矢殪之御前大臣侍衛咸射軼於圍外者從官追射遇大獸虎槍官兵從之既獲獸各比次其類以獻駕還行營以所獲獸分頒扈從諸臣大狩禮成賜燕賞賚有差凡巡幸所至各備圍場車駕東巡由部移文盛京等處將軍經行䝉古諸部由理藩院行知扎薩克王等各率所屬官兵以從命統圍大臣分翼合圍均如前制凡田於近郊設圍場於南苑以奉宸苑領之統圍大臣督八旗統領等各率所屬官兵先蒞圍場布列鑲黃正白鑲白正藍四旗以次列於左正黃正紅鑲紅鑲藍四旗以次列於右兩翼各置旃以為表兩哨前隊用白兩協用黃中軍用鑲黃駕至圍場合圍較獵與前制同每歲孟冬八旗都統統領奉天吉林黑龍江及直省駐防將軍都統提鎮各率所屬官兵於郊原曠野習田獵毋蹂躪民田毋曠延時日格而不舉者論出征凡親征皇帝躬統六軍征討弗庭先簡大臣總理軍營遣官於鑾輿所經之地計程設驛統兵各官率士旅秣馬礪兵以待調發既卜日乃陳將士列軍陳而親訓之頒行軍律令遣官祗告天地宗廟社稷及期鑾儀衛陳騎駕鹵簿於午門外兵部陳八旗䝉古畫角十有六海螺二百於堂子街門外設御營黃龍大纛於內門外設八旗護軍纛火器營纛各八於黃龍大纛後均北嚮皇帝御征衣佩刀乘馬出宫詣堂子行禮畢致禮於大纛之神禮成儀詳禮部皇帝屬櫜鞬乘馬內大臣侍衛率親軍舉黃龍大纛隨行八旗官軍豫於郭外分左右翼陳列首前鋒軍次鳥槍護軍次護軍次鳥槍驍騎次驍騎次滿洲炮兵次漢軍火器兵駕出郭聲炮三官軍皆馬上俯伏候駕過各整伍以次隨發不隨征之王公百官於大軍列隊之前兩旁跪送師行之制兵四人從役各一人為一幕每兵給馬四匹兵役各乘其一以二馬負甲胄軍械糗糧鑊帳之屬各分隊以次而行牧馬於塗分左右路前隊牧馬於路左則留路右以待後隊均總𨽻於領侍衛內大臣每舍護軍統領營總武備院卿立御營設帳殿幕幄於正中繚以幔城前為旌門領侍衛內大臣率侍衛親軍宿衛建刁斗設巡警其外為網城設門三每門以上三旗護軍守之外營連帳大城設門四每門以八旗護軍守之前鋒軍列為二營屯於御營之前八旗護軍驍騎列為十六營八旗漢軍火器營兵列為四營扈從部院堂司官筆帖式列為一營八旗察哈爾䝉古扎薩克緑旗兵各列為一營每營以王公大臣領之均繞御營而屯六軍列陳中設鹿角漢軍火炮鳥槍及緑旗兵左右列滿洲火器營鳥槍護軍鳥槍驍騎炮營驍騎次首隊列前鋒護軍驍騎及前鋒護軍驍騎殿兵各按旗為隊一字列陳二隊列護軍驍騎如之其分列於左右兩翼者為援兵各按旗相屬而斜列其隊大軍輜重各隨本旗參領立於陳後百步之外部院官暨內務府護軍執事人前鋒軍均扈從御駕以備調遣䝉古軍别為一隊以備追擊六軍凱旋鑾儀衛陳法駕鹵簿在京王公百官均出郭五里跪迎皇帝入都門詣堂子行禮畢還宫翼日行飲至䇿勳禮從行將士爵賞有差擇吉御殿受賀如大朝儀詳見禮部凡命將皇帝命大將軍統帥軍旅擇吉出師先期所司陳欽賜甲胄弓矢於午門頒賞畢大將軍率從征將士恭詣御前授行師方略至日皇帝臨軒授大將軍敕印大將軍啓行乘輿親餞於長安門賜巵酒大將軍跪受飲畢屬櫜鞬乘馬文武大臣承詔餞於郊設祖帳禮兵二部堂官奉茶大將軍率從征將士望闕謝恩乃整旅而行首列上賜軍械次令箭次敕印護敕印官內閣學士一人隨行大將軍騎後建大纛參贊大臣及户部官一人兵部官一人刑部官一人記室官四人內閣中書二人翰林院筆帖式二人均隨纛行次標旗次大軍整旅隨發既蒞營簡閲營伍大將軍啓行鼓吹聲炮守營將士離營候送每至一營官兵皆整隊列陳大將軍巡閲既周統兵提鎮率所屬官隨行離汛乃止其行軍機要聽大將軍因地乘時運籌決勝奏凱還朝皇帝臨軒大將軍恭繳敕印行禮畢乃賜燕及爵賞有差擇吉獻俘受俘告成功於天地宗廟社稷勒碑太學以表殊勳詳見禮部若命重臣經略軍務其出師節制亦如之凡行軍律令將帥禀廟謨作士氣度虛實審機宜毋偷安毋喜功毋信讒毋虐士卒毋私用僉壬毋輕進以挫先聲毋僥幸以失機要毋避難而阻撓毋嫉功而傾軋毋玩寇毋養姦毋老師縻餉毋掊克糗糧毋暴殘降卒其悖違矯誣干成憲以自取戾者刑兹毋赦將士穀甲胄礪兵刃備槍炮峙糗糧鎧仗書名馬駝烙印師行有期如約而至整旅以行視旗纛為行列毋越伍毋離次毋擁擠喧譁毋游騎馳驟毋追射禽獸軍過無騷擾毋踐踏母掠貨財毋毁民居毋姦婦女駐營時帳各出一人以俟見藍旗出則取薪見黑旗出則取水毋擅出入議軍機毋竊聽宣泄傳軍令毋增減要言毋私語觖望毋煽惑流言毋疑鬼疑神毋醉酒行暴毋行竊逋逃毋拾遺私匿毋溺情怠惰而違使令毋不戒於火以致燎原遇夜警則設備制敵毋倉皇駭亂夢寐毋警呼偵諜毋妄報守哨毋偷安馬駝牲畜牧養如法毋縱蹂􅏳毋汙水泉毋遺忘軍械毋狼戾資糧違者視其所犯輕重以行軍法將校論罰有差臨陳接戰聽金鼓以為進止毋却顧毋耳語毋離隊而尾人後毋棄伍而入别行毋違指授而誤事機毋倡邪說而搖衆志軍中毋疾馳涉險毋嗟怨擊敵必奮勇前驅毋畏葸退避毋縱寇逺揚敵人奔潰選騎騎追之將領率大兵殿於後以禦伏寇毋貪取輜重而亂行伍毋橫殺良民以報戰功有不用命者戮以徇振旅而歸以整以暇毋後先踰越毋驕矜毋縱恣俘獲之人毋禠其衣服毋離散其夫婦毋掠人之戰功毋詭無為有毋舉輕報重以冒功賞違者軍法從事欽定大清㑹典卷六十一
