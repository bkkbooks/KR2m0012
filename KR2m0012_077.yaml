body:
  text: 工部製造庫凡製寶盝印盝皇帝寶盝高九寸方八寸五分寶色池高三寸四分方六寸四分均金製盝鏤花草文外櫝高尺有三寸方尺有二寸櫝架高二尺一寸方尺有八寸均楠木製朱髤櫝繪金雲龍架雕龍文袱墊均用黃綺皇太后皇后寶盝高七寸八分方八寸寶色池高二寸方四寸八分均金製外櫝繪龍鳯文餘制及袱墊與皇帝同櫝繪皇后鳯文皇貴妃貴妃寶盝金製寶色池銀製金飾櫝均杉木架均椴木朱髤金飾皇貴妃繪鸞鳳文袱墊用金黃色貴妃繪雲鳳文袱墊用金黃色妃印盝印色池制如貴妃親王世子寶盝高七寸八分方八寸寶色池高二寸方四寸八分均銀製金飾櫝繪斗牛雲文袱墊均絳綺郡王印盝印色池皆銀製餘如親王凡製册皇太后皇后金册十頁高七寸一分廣三寸二分每頁重十有八兩聨以樞紐面鈒升降龍文內函高九寸長一尺廣六寸五分外櫝高尺有三寸長尺有三寸五分廣一尺架高二尺一寸方一尺八寸均楠木製朱髤金飾繪龍鳳文繪鳯皇后文袱墊均黃綺皇貴妃金册十頁每頁重十有五兩櫝以杉木架以椴木製朱髤金飾繪鸞鳳文餘制同貴妃金册如之櫝繪雲鳳文袱墊用金黃色妃金册每頁重十有四兩八錢餘制同嬪金册四頁每頁重十有四兩六錢有奇袱墊用絳綺餘制均同親王世子册均金製十頁每頁重十有五兩櫝繪斗牛雲文袱墊均用絳綺郡王册銀製金飾十頁每頁重十有四兩餘與親王同貝勒貝子册均紙製十頁高尺有一寸廣七寸五分繪金雲龍表裏飾黃繒鎮國公以下奉恩將軍以上給誥紙製高一尺長丈有六尺繪金龍玉軸牙籤公主金册四頁餘制如親王親王世子郡王福晉册皆四頁餘各視其夫册之制貝勒貝子夫人郡主縣主郡君及外藩王公均紙册制同文武官功封世爵給敕長一丈黃紙龍邊皇册匣五均皮製高一尺五寸四分廣一尺深無定數視册之多寡厚薄以為度蓋高三寸五分廣一尺有三分邊角均周緣以銅及搭環飾件均塗金鉤花上面暨前左右繪金龍七後繪寶相花黃皮為攜帶塗金銅鎖鑰各一左懸鑰匙牌右懸編次銅牌袱用黃綺銷金團龍凡製宣讀册寶加上徽號册立册封諸典禮均仿金册寶印之式紙製册面飾黃綺寶飾黃繒盝用黃色者雲龍五采綺面繒裏用金黃色者雲綺面繒裏凡製玉册寶升祔太廟玉册十頁每頁高九寸廣四寸五分厚四分聨以黃組中鐫清文五頁漢文三頁前後二頁鏤升降行龍册文填青廟號填金玉錢一徑二寸厚六分孔方五分鐫天下太平清漢文填以金青二色玉寶臺方廣五寸厚一寸九分鐫清漢文交龍紐泥金高二寸六分寶色池金飾高一寸三分方六寸一分寶盝方八寸六分高尺有六分外櫝方一尺一寸三分高一尺三寸二分册函長一尺有七分廣六寸六分高九寸七分外櫝長一尺三寸九分廣九寸高尺有三寸三分均楠木製朱髤繪金雲龍雲鳯袱墊皆用黃綺恭上尊諡册諡追封宣讀册寶均絹製陵寢地宫册寶檀香製制與玉册寶同凡鹵簿之制皇帝鹵簿有四曰大駕鹵簿曰法駕鹵簿曰鑾駕鹵簿曰騎駕鹵簿制均有辨大駕鹵簿玉輦惟大駕用之餘不用穹頂高二尺方六尺二寸飾天青色前後左右各嵌圓花蒼玉一上安金頂青綺為重幨繡金雲龍屋高五尺三寸方五尺柱繪金龍門高四尺八寸廣二尺三寸五分中設飾金雲龍寶座氊幃青色夏易朱簾輦座高二尺四寸上方七尺六寸下方七尺七寸朱髤繪金四周朱闌四中轅二長三丈八尺五寸外轅二長二丈九尺朱髤前後飾金龍首尾舁以三十六人合法駕鑾駕騎駕鹵簿全設其制分詳各鹵簿內法駕鹵簿金輦頂飾泥金嵌金版四幨幃均黃色屋高五尺方四尺九寸中二轅長二丈八尺一寸外二轅長二丈六尺一寸舁以二十八人餘如玉輦玉輅穹頂形圓高三尺一分飾天青色四面嵌蒼玉各一上安塗金頂高一尺二寸九分下環鏤金雲龍版百六十有二疊為三成幨綺如頂色後各輅同屋四方高六尺七寸九分廣八尺二寸五分柱四高五尺八寸四分門高五尺一寸九分廣二尺四寸九分左右門廣二尺二寸五分內四周飾金斗拱中設寶座外繞朱闌三輅後左右太常旗二旗各十有二斿攢竹朱竿左旗繡日月五星二十八宿右旗繡升龍座下朱轅二各長二丈二尺九寸五分前設駕象靷環一輪二軸一輪各十有八輻皆朱髤飾以鈒金花文輅座去地四尺一寸五分金輅穹頂飾黃色四面嵌金版各一左右二旗各繡黃色升龍餘制如玉輅象輅穹頂飾赤色高二尺六寸五分四面嵌象牙版各一屋高六尺四寸九分廣八尺九寸五分柱高五尺五寸四分門高五尺九分廣二尺四寸五分左右門廣二尺二寸五分座上朱闌四太常旗左繡朱鳳右繡升龍座下朱轅三各長二丈五寸九分駕馬八前設引馬遊環一馬項繫鈴齋戒日則輟輅座去地三尺四寸五分餘制如玉輅革輅穹頂飾銀色高二尺五寸五分四面嵌黃色羊皮版各一屋高五尺五寸九分廣七尺九寸五分柱高五尺四寸五分門高五尺廣二尺二寸五分左右門廣二尺一寸九分左旗繡金虎右旗繡升龍下轅二各長丈九尺五分駕馬四餘制如象輅木輅穹頂飾黑色高二尺六寸一分四面嵌花梨木版一屋高六尺五分廣八尺八寸柱高五尺八寸門高五尺二寸廣二尺二寸五分左右門廣二尺二寸闌制如玉輅左旗繡龜蛇右旗繡升龍轅三各長二丈五寸駕馬六餘同象輅禮輿高五尺八寸五分廣三尺深四尺重頂高一尺三寸上層八角下層四方皆髤金垂繡金龍黃綺重幨每角飾金蹲龍計十有二上安鈒花金頂嵌珊瑚青金緑松等石內天井飾蟠龍一柱四高二尺八寸均繞以刻金盤龍一門端鏤金雲龍二左右塗金龍闌干均平傅直轅之上前轅下左右金蹲龍各一仰承直轅飾以黃綺紗氊幃各一隨時施設中