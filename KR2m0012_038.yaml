  text: 欽定四庫全書欽定大清會典卷三十八
  hash: sha256:584c8719a83dd9b30b48122e942de5fe1cd0b558310caffcadde93f6be95a964
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_038-1a, image: WYG0619/WYG0619-0300a.png}
body:
  text: 禮部祠祭清吏司大祀二凡祭地之禮兆隂位於北郊曰方澤其制二成四周以方坎蓄水嵗以夏日至祭皇地祇奉太祖高皇帝太宗文皇帝世祖章皇帝聖祖仁皇帝世宗憲皇帝配以五嶽五鎮四海四瀆啓運天柱隆業昌瑞永寧五陵山從祭皇地祇位第一成北嚮列聖東西嚮四從位第二成五嶽啓運天柱永寧三山西嚮四海在其次五鎮隆業昌瑞二山東嚮四瀆在其次均設黃幄皇地祇黃琮一帛一犢一登一簠二簋二籩豆各十有二尊一爵三爐一鐙四列聖均帛一犢一登一簠簋各二籩豆各十有二尊一爵三爐一鐙四從位各帛一每幄均牛一羊一豕一登一鉶二簠簋各二籩豆各十尊一爵三盞三十爐一鐙二玊帛實於篚牲載於俎尊實酒疏布羃勺具先祭一日樂部設中和韶樂於壇下分左右懸鑾儀衛陳法駕鹵簿於午門外金輦於太和門階下巳刻太常卿詣乾清門奏請皇帝詣齋宮皇帝御龍袍衮服乘禮輿出宮內大臣侍衛前引後扈如常儀至太和門階下降輿乘輦駕發警蹕午門鳴鐘法駕鹵簿前導不陪祀王公文武各官咸朝服跪送導迎鼓吹設而不作鑾儀衛校鳴齋宮鐘皇帝入壇西門至方澤北門外降輦贊引太常卿二人恭導皇帝由右門入詣皇祇室於皇地祇列聖前上香畢行三跪九拜禮從位遣分獻官上香行禮皇帝詣方澤視壇位詣神庫視籩豆並視牲牢畢由內壝北右門出外壝北右門至神路左升輦詣齋宫陪祀王公百官咸采服分班集齋宫門外恭候皇帝入乃退祭日日出前七刻太常卿詣齋宮告時皇帝御祭服乘禮輿出降輿乘輦鑾儀衛校鳴齋宮鐘皇帝至外壝北門外神路左降輦贊引太常卿二人恭導入大次俟禮部尚書率太常官詣皇祇室恭請神位安奉黃幄畢太常卿奏請行禮皇帝出大次盥洗贊引太常卿恭導皇帝由外壝北右門入內壝北右門升子階至二成黃幄次拜位前立太常贊禮郎引分獻官四人由北左門入至階前夾甬道立鴻臚官引陪祀王公位階下百官位外壝門外均就位左右序立均南嚮典儀官贊樂舞生登歌執事官各共乃職以下自瘞毛血至徹饌皆典儀官唱贊武舞八佾進贊引官奏就位皇帝就拜位立乃瘞毛血迎神司樂官贊舉迎神樂奏中平之章凡舉樂皆司樂官唱贊後同贊引官奏跪拜興皇帝行三跪九拜禮王公百官均隨行禮司香官各奉香盤司玉帛官各奉篚進奏廣平之章贊引官奏升壇恭導皇帝詣第一成皇地祇位前司香官跪進香贊引官奏跪皇帝跪奏上香皇帝上柱香次三上瓣香興皇帝詣玊帛案前司玉帛官跪進篚皇帝跪受篚奠玉帛興以次詣列聖配位前上香奠帛儀同贊引官奏復位凡升壇行禮復位皆有奏後同皇帝復位乃進俎皇帝轉立拜位旁西嚮有司貯羮於壺恭執自壇下陟子階升詣皇地祇位列聖位前各跪拱舉興以羮沃俎者三皆退由西階降皇帝復位奏含平之章皇帝升壇詣皇地祇位配位前跪進俎興復位行初獻禮司爵官各奉爵進奏大平之章舞干戚之舞皇帝升壇詣皇地祇位前司爵官跪進爵皇帝跪獻爵奠正中興退就讀祝拜位立司祝至祝案前跪三叩奉祝版跪案左樂暫止皇帝跪羣臣皆跪司祝讀祝畢奉祝版詣皇地祇位前跪安於案三叩退樂作皇帝率羣臣行三拜禮興詣配位前以次獻爵儀同贊禮郎引分獻官由東西階升壇各詣從位前上香奠帛以次獻爵畢降階退立原位樂止武功之舞退文舞八佾進行亞獻禮奏安平之章舞羽籥之舞皇帝升壇以次獻爵奠於左儀如初獻復位行終獻禮奏時平之章舞與亞獻同皇帝升壇以次獻爵奠於右儀如亞獻復位分獻官獻爵均如初樂止文德之舞退太常官贊賜福胙光祿卿二人就西案奉福胙進至皇地祇位前拱舉皇帝詣飲福受胙拜位立侍衛二人進立於左奉福胙官降立於右皇帝跪左右執事官咸跪右官進福酒皇帝受爵拱舉授左官進胙受胙亦如之三拜興復位率羣臣行三跪九拜禮徹饌奏貞平之章有司詣皇地祇位前奉黃琮退送神奏寧平之章皇帝率羣臣行三跪九拜禮有司奉祝次帛次饌次香恭送瘞坎奉配位前帛饌香恭送燎所皇帝轉立拜位旁西嚮候祝帛過復位從位香帛均由東西階奉送各瘞所樂作配位帛燎半奏望瘞恭導皇帝由內壝北右門出至望瘞位望瘞引分獻官各詣左右門外望瘞奏禮成恭導皇帝由外壝北右門出入大次更衣禮部尚書率太常官恭請神位還御皇祇室皇帝出至北門外升禮輿法駕鹵簿前導導迎樂作奏祐平之章皇帝回鑾王公從各官以次退不陪祀王公百官仍朝服於午門外跪迎午門鳴鐘王公隨駕入至內金水橋恭候皇帝還宮各退因事祗告遣官將事太常寺設黃幄於方澤太常卿率所屬恭請皇地祇神位安奉幄內太常贊禮郎引遣官入方澤北門左門由外壝北左門入內壝北左門詣方澤第二成子階下拜位行禮上香奠獻均升自西階讀祝由第一成子階右降至第二成讀祝拜位仍降西階復位餘儀均與圜丘祗告同欽定大清會典卷三十八
