body:
  text: 兵部武庫清吏司軍器凡軍器造自工部部掌其政制度有定式給發有定數簡閱有定期年久朽損或出征殘闕者準如數修補官兵新舊接代令交明軍器自製者給直營伍贏餘軍器令官兵典守以備用有損敝者毁之私賣私典者論凡軍器制度胄制以革髤漆或浴鐵前後有梁近額橫鐵曰舞擎其下曰䕶額胄上為盤以植管管以受槍槍周以纓垂於胄後者曰䕶項左右曰䕶耳其下曰䕶頸皆敷以棉或鐵鍱鋟飾采色其制有差皇帝大閱胄以革髤漆頂三層上銜東珠金升龍三承之飾紅寳石圓珠寳蓋均鏤龍飾珠寳垂薫貂纓二十有四赤繒裏梁左右鏤金梵文三重上重八次十有八間以金瓔珞次二十有四胄飾均鏤金龍文雜綴珠寳䕶項䕶耳䕶頸均明黃綺表月白裏青緣采繡金龍中敷棉外布金釘胄襯用綺青表朱裏上綴紅絨親王郡王頂鏤金火燄銜寳石金立龍二承之垂薫貂纓十有八梁左右鏤金梵文三重上重八次七次二十飾皆鏤龍銜寳石惟不得用東珠䕶項䕶耳䕶頸均石青鎻子錦表月白綺裏青繒緣外布金釘貝勒貝子固倫額駙頂銜素金垂薫貂纓十有四入八分公植蜜䑕尾垂貂尾纓十有二不鏤梵文胄襯均石青綺表月白綢裏領侍衛内大臣都統統領直省總督提督廵撫均頂植鵰翎二垂貂尾纓十有二鋟飾龍及花文䕶項䕶耳䕶頸均石青綺表藍布裏繡蟒五中敷鐵外布銀釘内大臣和碩額駙郡王額駙内大臣裏行之公侯伯散秩大臣均頂植蜜䑕尾垂紅纓隨旗行之公侯伯子男文武一品文二品副都統宗室將軍縣主額駙直省總兵均頂植薫獺尾垂紅纓文三品至五品驍騎叅領郡君額駙以下直省副將均頂植獺尾垂紅纓侍衛鑾儀衛官均頂植豹尾垂紅纓前鋒䕶軍叅領侍衛均頂植獺尾垂黒纓文六品至九品直省叅將以下均頂植獺尾垂朱纓不加鋟繡王府官均頂植猞猁猻尾長史垂黒纓䕶衛典儀紅纓前鋒校䕶軍校均鐵頂紅纓䕶項䕶耳䕶頸均以素綺繡蓮花外布黃銅釘前鋒䕶軍綠營軍士皆如之䕶項以下用青布不繡驍騎校驍騎均鐵頂黒纓䕶項以下各如旗色校以綺兵以布均繡蓮花甲制上衣下裳左右䕶肩左右䕶腋左右袖裳間前襠後襠裳亦分左右凡十有一屬均敷鐵鍱其敷棉者曰棉甲施鐵鍱於外者曰明甲采飾制皆有差皇帝大閱甲明黃綺表月白裏青繒縁聫以明黃縧金鉸通繡金龍二十有三裳幅以金線相比為金鍱五重前懸䕶心鏡後橫金雲葉勒以明黃縧中敷棉親王以下至入八分公甲石青鎻子錦表月白綢裏青繒緣裳幅䕶肩皆露鐵鍱飾珊瑚綠松青金石􅛸金雲龍中敷鐵外布金釘前懸䕶心鏡勒以縧親王郡王金黃色貝勒以下石青色固倫額駙同領侍衛内大臣都統統領内大臣散秩大臣公侯伯子男宗室將軍縣主額駙以上文武一品文二品副都統直省總兵均石青綺表藍布裏青繒緣通繡蟒十䕶肩露鐵鍱文三品以下驍騎叅領郡君額駙以下直省副將均通繡蟒六侍衛鑾儀衛官前鋒䕶軍叅領侍衛王府長史䕶衛典儀均通繡蟒四裳幅露鐵鍱皆鋄金雲龍中敷鐵外布銀釘前鋒校䕶軍校素綺表繡蓮花裳幅露鐵鍱無袖外布黃銅釘前鋒䕶軍綠營軍士均青布表加緣月白裏不加繡餘與校同驍騎校驍騎表各從旗色校以綺兵以布均繡蓮花弓矢之制弓幹用榆木靣傅牛角背施筋膠幹一而角兩接接處加鹿角以煖木皮裹之日弓弝弰用桑鍥兩末以受弦弦有二曰纒絲弦教射用之曰皮弦戰陳用之弓力强弱視幹與角厚薄筋膠輕重為斷矢用桞樺笴刻其末曰括其端受鏃剪鵰鸛翎膠黏括上曰箭羽羽間親王至長子書爵貝勒以下至官兵均書銜名旗纛之制八旗旗纛視本旗之色鑲四旗均左平右剡正四旗均正幅都統纛長五尺五寸廣五尺繪龍鐵頂朱髦惟正紅旗黒髦佐領纛長四尺二寸廣五尺不繪采黒髦領催小旗長尺有五寸廣尺有八寸鑲黃旗斜幅鑲白鑲紅鑲藍旗均左平右剡正四旗均正幅不繪采鐵頂各異製以示别䕶軍纛斜幅緣為火燄形直長五尺五寸斜長七尺三寸繪龍鐵頂朱髦䕶軍校小旗直長尺有二寸斜長尺有三寸前鋒營旗方幅長二尺三寸廣尺有八寸繪飛虎頂飾豹尾朱髦漢軍佐領纛尺寸如都統纛繪飛虎鐵頂朱髦漢軍小旗長二尺二寸廣二尺九寸火器營纛䕶軍驍騎各如本營之式加號帶以别之健銳營旗纛左翼鑲黃右翼正黃均正幅加號帶直省標營纛綠色直長五尺八寸斜長一丈緣為火燄形或繪飛熊或繪雲蟒隨地異製鐵頂朱髦什長旗直長二尺三寸有竒斜長三尺八寸如纛式督撫提鎭大帥旗以黃布為之方幅廣丈有八寸長丈四尺書帥字漢文加號帶長丈五尺廣一尺其門旗督陣旗先鋒旗禀事旗均隨營異製駐防各營旗纛盛京西安江寜綏逺城伊犁將軍天津察哈爾都統熱河副都統皆用鑲黃吉林寜夏青州杭州福州將軍歸化城右翼都統山海關察哈爾右翼副都統皆用正黃黒龍江涼州廣州荆州將軍歸化城左翼都統成都察哈爾左翼副都統皆用正白各將軍都統兼轄之副都統各視將軍都統旗色火器兵仗制詳工部凡給軍器金鼓以示進退之節八旗漢軍鳥槍營礮營每旗各鼓一金五海螺以定朝昏之聚散八旗驍騎營每佐領下各設海螺一毎叅領下各設海螺二䕶軍營每旗設海螺三十六前鋒營左右翼設海螺十有六火器營每旗隨礮海螺各五鳥槍䕶軍鳥槍驍騎海螺各十有四藤牌營每旗海螺各五鹿角以禦人馬漢軍八旗每佐領設鹿角各一直省標營金鼔海螺鹿角視營之大小兵之多寡隨地酌設軍士應用軍器按名給發八旗前鋒䕶軍領催均甲一胄一櫜鞬一弓一矢七十佩刀一驍騎矢五十餘同歩軍甲一胄一佩刀一弓一矢三十八旗䕶軍驍騎每二人給長槍一每佐領下鳥槍前鋒鳥槍䕶軍鳥槍驍騎各給鳥槍一漢軍每旗藤牌兵百名各給藤牌一㓲刀一挑刀兵五十名各給挑刀一棉甲兵各給連耞棍一副八旗滿洲每旗設子母礮五其餘大小銅鐵礮均分貯於漢軍八旗礮局需用迺發直省各營馬歩兵應給甲胄佩刀與八旗同操演軍器專習者為弓矢為大礮為鳥槍為藤牌兼習者為大刀為長槍為挑刀水師則有排槍鉤䥥槍標槍大斧鐵彈火箭火罐之屬水陸異用險易異宜習者期純熟教者無擅更大礮以兵千名設十礮為率郡邑城守邊海要隘水師戰艦各貯礮於其所兵少及非要隘營汛貯礮於督撫提鎮駐劄之地需用迺發仍以時演放毋令鏥蝕收貯火藥加謹防䕶毋致疎虞有棄毁及私移他所者論私鑄大小礮私藏鳥槍者罪之八旗世爵暨文武官各備甲一胄一弓二櫜鞬一佩刀一公之矢五百五十侯五百伯四百五十子四百男三百五十輕車都尉二百五十騎都尉二百雲騎尉百五十武官一品至五品視子男以下六品以下均矢百文官三品京堂視武二品四品京堂科道郎中視三品員外郎視四品主事鳴贊廕監生視五品筆帖式視六品直省督撫提鎭及武職副叅以下官應備甲胄弓矢各按品級與八旗武職同凡簡覈軍器八旗前鋒營䕶軍營驍騎營及内府䕶軍營各官員鎧仗五年一次由八旗奏請特命王公大臣驗閱駐防將軍都統副都統於到任後率所屬簡稽軍營鎧仗同城限二月外屬限三月竣事游牧兵丁鎧仗由部奏請特命大臣驗閱各察其盈絀利鈍具疏以聞直省標營軍器以都司守備為專管官副將叅將游擊為兼管官遇有動用修補估價詳報給公項治備歳終彚送布政使司覈銷督撫提鎭歳委官察驗取具册結歳終彚疏保題以册達部稽覈虧闕者論兵籍凡八旗親軍前鋒鳥槍䕶軍於䕶軍驍騎歩軍教養兵壯丁内拔補䕶軍於驍騎歩軍教養兵壯丁内拔補驍騎於歩軍教養兵正身壯丁内拔補歩軍於正身壯丁及户下人内拔補教養兵於正身㓜丁内拔補領催於䕶軍驍騎内選充均由叅領佐領選應補之人呈都統統領等簡覈錄其材力驍勇者既入伍令各旗籍其名按季報部以時稽其盈絀駐防兵由該管官於駐防壯丁内拔補若駐防官子弟有嫻習騎射願於任所充伍者聽凡直省考拔營兵以人材强壯技藝優嫻者充補騎兵拔於歩戰兵歩戰兵拔於守兵守兵拔於餘丁無餘丁乃募於民督撫提鎭本標及相近營汛均親考拔餘令副叅考拔仍於廵閱屬營時覆覈考拔失實及虚占名糧者論如法營兵令五人聫名具保互相覺察其有不遵約束生事擾民容姦保慝離次失伍有干紀律者皆論如法並坐其長武科凡武鄉試期以子卯午酉歳十月㑹試期以丒辰未戌歳九月殿試期以歳之十月鄉㑹試皆分三場一場試馬射立表三各去三十五歩發矢九以中四者為合式二場試歩射樹大鵠一去五十歩發矢九以中二者為合式又以開弓舞刀掇石試技勇均差以三等視其力能勝者為合式尤傑出者别識之與合式者並籍送内場鈐注於卷而糊其名三場試論二一四子書一武經時務䇿一閱卷官先就武藝傑出者取錄如不及數迺於合式卷内取錄殿試發䇿問一合武舉之中式者令對策於太和殿庭試畢由部奏請皇帝御紫光閣考試一日閱馬射二日閱歩射及技勇如鄉㑹試三日由部以次列欽選者請定甲第揭榜傳臚賜燕如文進士凡中額鄉試順天一百五十一名内八旗漢軍四十名奉天三名山東四十六名山西四川各四十名河南四十七名江南六十三名江西廣東各四十四名福建浙江西安甘肅各五十名湖北二十五名湖南二十四名廣西三十名雲南四十二名貴州二十三名㑹試由部㑹外場考試官以各省武舉武藝之傑出及合式者籍其數疏請欽定凡考官順天鄉試由部遴委滿漢司官各一人為提調外場考試官疏列領侍衛内大臣大學士都統名請簡四人㑹本部侍郎順天府尹丞考試又疏列滿漢御史名請簡四人監試事遴委司官四人分監試事内場考試官疏列翰林院詹事府各官名請簡正副二人同考官由吏部疏列科甲出身之六部員外郎主事及七八品京官名請簡四人外亷官疏列科甲出身之六部員外郎主事及七八品官名請簡四人各省鄉試以廵撫為考試官附近之提督總兵官同監射以科甲出身之同知州縣為同考官㑹試由部疏列滿漢司官請簡提調各一人外場考試官疏列領侍衛内大臣大學士都統名請簡四人㑹本部尚書侍郎考試又疏列滿漢御史名請簡外監試四人内監試一人遴委司官四人分監試事知武舉官疏列本部漢侍郎名請簡一人内場考試官疏列内閣學士六部尚書侍郎都察院左都御史左副都御史翰林院讀講學士詹事府詹事少詹事各官名請簡正副二人同考官疏列中書六科給事中六部科甲出身司官名請簡四人掌卷官疏列中書名請簡一人受卷彌封印卷及各執事官於本部司官内擬定疏請簡用殿試讀卷官疏列内閣九卿翰林學士詹事少詹事各官名請簡四人提調官疏列本部尚書侍郎名印卷官列本部司官名監試官列御史名掌卷受卷彌封官列内閣侍讀翰詹六科名廵綽官列鑾儀衞各官名書黃榜列内閣中書名供給官列光禄寺屬官名本部司官分𨽻各所共襄厥事均由部擬定疏請簡用凡試録鄉㑹試竣籍舉子籍貫名次及策論馴雅者刋刻進呈曰試録㑹試録由部恭進順天鄉試録由府尹恭進各省鄉試録由部彚齊恭進凡試規文生文舉人不得應武試武生武舉人不得應文試直省標營騎兵願就武鄉試者聽京城門千總直省營衛見任千把總及俸滿候推千總願就武㑹試者聽不中式仍歸原職伍見任武職子弟不準臨期入伍應試文武生不得入伍食糧濫收者論凡武童三歳一試先試騎射歩射及弓刀石八旗漢軍京縣武童由部疏列副都統名請簡一人直省由督撫委副將叅將游擊之附近者一人奉天由將軍委協領一人均㑹學政考試次試策論入學肄業之數府學取二十名州縣大學十有五名中學十有二名小學七八名八旗惟漢軍許應武試滿洲䝉古不與漢軍武童入學每考取八十名凡武生三歳一試差以六等一二等及三等前列者準應鄉試其録遺呈報丁憂遊學患病請給衣頂及舉報優劣均與文生同武生文藝尚優不能騎射願就文童試者聽八旗武生届學政試期有駐防隨任及丁憂事故或請給衣頂者由本旗叅領佐領具結申送都統移咨學政注册以達於部凡旗試八旗士子應文試者先較騎射試文生童文舉人由部疏列領侍衛内大臣大學士尚書都統䕶軍統領名請各簡一人試文進士疏列領侍衛内大臣大學士都統名請簡二人試繙譯疏列領侍衛内大臣名請簡二人奉天旗人與文童試者由將軍副都統較騎射均以能控縱發矢者準與試若十五歳以下五十五歳以上者只較歩射願騎射者聽有疾不能射者由佐領具結準免凡稽察順天武鄉試歩軍統領委官二人率兵二十人於東西闈牆外廵防㑹試如之八旗士子應鄉㑹試者由部請㫖每翼簡副都統各一人至場内廵察又每翼委叅領一人每旗委叅領佐領等官於場外唱名送考兼令約束發配凡編發罪人充軍充附近軍者發二千里邊衛發二千五百里邊逺發三千里極邊發四千里應發煙瘴者道里如極邊之數各就本犯原籍府屬以定逺近詳軍衛道里表外遣之犯發寜古塔吉林黒龍江安置均由刑部審擬具奏在刑部獄者咨部發配在外省獄者督撫定地發配報部察覈凡解送軍犯一案有數犯者每起毋過五人罪犯有家屬者每六人給一車老疾殘廢者一二人亦給一車各給傳牌令沿塗州縣選役遞解取所至地方官收管文結繳部覈銷有脫逃者該管官失察故縱各論如法起解時若遇盛暑嚴寒皆停發已在中塗者十月照常接遞若十一月至春正月夏六月皆於所過處停留或抵配不逺本犯願徃者聽凡安置軍犯畿輔盛京不得編發罪人苗夷雜處之地令該督撫酌移别屬軍犯到配年六十以上及有廢疾者入養濟院年力强壯者充驛站及各衙門夫役有藝業能自謀生者交地保收管仍於月朔按名㸃驗凡軍犯在配悔過安靜恭遇恩詔或以三年為限或以十年為限該撫奏明請㫖釋放還鄉若定衛發配之時恭遇赦令咨囘刑部援免軍犯隨徃家屬本犯在塗病故者即令囘籍在配病故其妻子願歸者聽欽定大清㑹典卷六十七
