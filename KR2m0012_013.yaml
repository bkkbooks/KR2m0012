front:
  text: 欽定四庫全書欽定大清會典卷十三
  hash: sha256:e4dd79ea5d5979e551f882179662d49984138551c951517916e8c3bf11d305fd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_013-1a, image: WYG0619/WYG0619-0138c.png}
body:
  text: 戸部漕運自元濬會通河明導汶水北會漳衞而東北之運道以通國朝南鑿桃宿之道開中運河以避黃河之險於是糧艘由淮浦渡河徑趨山東逹京師皆銜尾無阻刓弊剔姦以肅漕政垂萬世之利賴於無窮焉凡嵗漕京師者八省其漕有五等曰正兌米入京倉以待八旗三營兵食之用以乾隆十八年奏銷册計之山東十有五萬七千九百九十四石河南八萬一千六百二十八石江蘇百有七萬六千三百九十三石安徽三十萬七千十有六石江西三十五萬千五百有三石浙江五十五萬九百四十七石湖北九萬四千五百七十四石湖南九萬五千五百三十一石各有竒曰改兌米入通州倉以待王公百官俸廪之用山東六萬九千四百七十三石河南三萬九千九百十有一石江蘇九萬二千四十四石安徽十有一萬八千八百四十五石江西十有五萬千八百五十石浙江二萬九千三百六十五石各有竒曰白糧分入京通倉以供内府光禄寺以待王公百官各國貢使廪餼之用江蘇六萬九千四百四十七石浙江三萬五百五十三石各有竒曰麰麥入京倉以供内府之用河南正兌五千八十六石改兌三千三十三石各有竒曰黑豆入京倉以待八旗官軍及賓館牧馬之用山東正兌四萬五百有四石改兌萬六千五百石河南正兌三萬二千六百七十四石改兌萬五千五百八十八石各有竒凡漕糧改折曰永折米徵銀解部山東河南嵗折徵各七萬石江蘇十萬六千四百九十二石安徽七萬五千九百六十一石湖北三萬二千五百二十石湖南五千二百十有二石每石連耗折銀五錢至八錢曰改折灰石米徵銀解部以待工部灰石之用江蘇嵗折徵二萬一千一百十有六石浙江萬三千三百二十三石各有竒每石連耗折銀一兩六錢八分凡漕糧經費曰正耗各省正兌米每石二五二斗五升後仿此加耗改兌米一七加耗以備通州五牐運耗貯倉折耗及運軍囘船食米之費曰輕齎正兌米山東河南每石一六加耗江蘇安徽二六江西浙江湖北湖南三六改兌米江蘇安徽江西浙江每石二升加耗山東河南改兌米不徵輕齎湖南北無改兌米均折銀徵解倉場通濟庫漕船至通計運道逺近每船給羡餘銀又按到通米數每石給䉡夫銀各有差惟山東河南道近不給䉡夫銀曰船耗除山東河南及江蘇徐州府屬之銅豐沛蕭碭漕船不給耗餘船正兌米每石一五及五升加耗改兌米二三一三及八升加耗各有差以給運軍沿塗耗折曰席木各省正兌改兌米每二石徵葦席一以十分之一七隨船解通為倉庾苫蓋之用江西湖北湖南每正兌米二千石徵楞木一松版九以十分之五解通為倉庾鋪墊之用餘均折銀徵解通濟庫浙江及江蘇常鎮安寧池太等府太倉州徵版木如之皆折徵解庫曰行糧月糧各省運弁運軍凡出運之年各支行糧二石四斗至三石有差運軍月糧八石九斗至十有二石有差或折銀徵給或銀米各半各因其地之宜山東蘇松江安糧道所屬半於領運時發給半徵解水次六倉山東則臨清徳州江蘇安徽則江寧鳯陽淮安徐州沿塗發給曰贈貼明代漕糧繋軍民交兌民受需索之苦國初改為官收官兌因酌定贈貼官為支給隨其方俗各省異名山東河南漕船每運米百石給潤耗銀五兩米五石江安糧道所屬給漕贈如之蘇松糧道所屬米同銀倍浙江給漕截銀三十四兩有竒江西給貼運銀三兩米三石副耗米十有三石湖北湖南給貼運米二十石皆隨漕科徵凡白糧經費江蘇每石正耗三斗浙江四斗五升以備入倉耗折及運軍沿塗折耗之費江蘇每船給束包人夫工食銀十有四兩每運米百石給漕截銀三十四兩食米七石各有竒又盤耗米二十石浙江給漕截銀如江蘇食米三十四石有竒運弁行糧運軍行糧月糧與漕糧同皆隨糧科徵凡漕糧轉輸薊州易州以待陵寢官兵俸餉之用薊州酌撥漕糧四萬六千八百七十石白糧千三百十有五石自天津府轉輸易州酌撥漕糧萬九千一百八十七石白糧四百五十石自白溝河轉輸均於各省應輸京通倉米内撥運後水師駐防俸餉同凡漕糧嵗留天津府滄州以待水師及駐防官兵俸餉之用糧船過滄留漕糧萬一千七百十有九石過天津留四萬五千石各有竒凡漕糧截留或一方偶遇偏災截漕轉運以備拯荒平糶之用或酌留直省分貯府縣每嵗出陳易新以為經久不匱之儲皆隨時調劑不限常數凡蠲免田賦之嵗漕糧以天庾儲備徵輸如常若被災府縣完納維艱令督撫確勘情形酌應緩應蠲之數具疏請旨凡漕船六千九百六十有九每嵗出運者直隸三十七均協運河南山東九百七十五運軍自備者三百十有一協運河南二百六十八蘇松糧道所屬五百八十九江安糧道所屬三千八十四協運河南百二十五協運蘇松千九百九十七内運白糧者百三十六於通省漕船内簡調三年踐更江西七百有八浙江千二百十有四内專運白糧者六十三湖北百八十湖南百八十二成造漕船以長九丈載米四百石為度江西湖北湖南加長一丈每嵗修理出運十年改造如成造不堅固不及十年損壞者責運軍補造督運官弁皆劾論遇運河水涸須分載過淺囘南阻凍不能依期歸次須以别船代運赴通均許和雇民船官為定價毋許運弁抑派及船户居竒髙索凡漕政掌於漕運總督各省以糧儲道專司之各府以管糧同知通判分治之徵收兌運由州縣官總其成於巡撫布政使司運道疏濬牐壩啟閉自江北至淮自淮北至天津則河道總督任之天津以北倉場侍郎經理之嵗以給事中御史分巡通州而下天津濟寧淮安至揚子江口以稽察運道剔除漕弊凡有漕之省隨漕之多寡以建衞每衞守備一人以治衞軍酌漕船之多寡以分幫每幫領運千總二人分年番休武舉一人隨幫効力每船領運衞軍十人每運選用一人由守備舉報濫舉不慎者論每軍出運副一人隨運以本軍子弟充之水手十人由運軍雇募令十船互保滋事不法者連坐凡徵糧以十月朔啟徵米取乾潔不分赤白兼收白糧則官為舂治民輸舂耗有差立聮三票稽覈如制詳見田賦凡兌運以漕船到次之日為始至十一月終兌畢以府同知通判為監兌官總漕按船數米數刋發全單開明耗贈糧道依全單之數分刋號單頒之州縣每單兌米百石一單兌足令運弁注明收數一船兌足即發水程開行凡察驗米色監兌官以米一石包封為式糧道親驗鈐印至淮總漕拆封掣驗通船米如式仍鈐封至通倉場侍郎拆驗亦如之其包封米作正交倉凡漕運行程重運北上順流日行四十里逆流日行二十里巡撫給以水程所過沿河州縣入境出境皆注日時至淮總漕察驗無誤換給水程所過州縣注日時至通州倉場侍郎察驗如之空船南下順流日行五十里逆流日行三十里倉場侍郎給發水程所過州縣注日時至淮總漕察驗如北上時先後還次不得過十一月巡撫察驗亦如之惟經渉河淮江湖重險不立程期守牐候風阻凍均準注限若内河無阻有違行程者領運官弁及運軍皆論如法凡通漕限期山東河南以次年三月初一日到通江蘇安徽大江以北本年十二月秒過淮次年四月初一日到通大江以南次年正月秒過淮松江府所屬寛限十日五月初一日到通浙江湖北次年二月秒過淮六月初一日到通江西湖南次年三月初十日過淮六月初一日到通受兌開行由巡撫疏報過淮由漕運總督經皂河由江南河道總督過濟寧逾臨清由河東河道總督皆具疏專逹天津以北倉場侍郎五日一奏報如過淮遲延責在巡撫抵津遲延責在漕河三督及所屬沿河文武官皆按期劾論凡督運山東河南漕船兌運已畢糧道簡委府通判管押赴通江淮以南則監兌官親送至淮候總漕察驗畢或即委監兌官或别委通判以行過淮已畢總漕隨運北上率所屬官弁相視運道險易調度全漕察不用命者俾舳艫相接畢渡天津廼入覲述職以重官守各省通判仍竢漕船卸載管押囘南廼既厥事凡催漕道府董率州縣官於入境時按程催行毋許停泊出境廼止沿河營汛鎮將董率汛弁催行亦如之催行不力致有羈遲者專催督催各官弁劾論有差凡屯田各省多寡不一詳見田賦皆按漕船均分給領運之軍耕以濟運其不能自耕者或官召民佃徵租贍軍或民賃軍田軍自取息有争訟則州縣官治之私相質買者與受皆辠凡優䘏運軍每船北上許隨載土産物百石頭工舵工水手共二十六石囘空隨載梨棗六十石經過闗津免其輸稅過淮如期抵通交糧無闕總漕酌加奬賞二十年領運無過給九品冠帶榮身凡漕運禁令州縣徵糧毋許吏役浮加斛面抑派雜費府倅監兌無許弁軍需索陋規私收折色重運北上空船南囘毋許運軍水手盗賣漕米滲水和沙或私帶客貨冒渡闗津或擾害民船强橫生事或行船越次以避稽察或中塗幷載脱船私歸運弁毋許擅離漕船催運弁兵毋許索運軍土物違者皆論如法凡漕運考成漕糧白糧並隨糧經費皆限本年徵足糧道造具四柱清册逹總漕疏報徵收官以經徵督徵之數作十分考成如有未完經徵之州縣衛所自不及一分至五分督徵之道府自一分至六分巡撫自一分至八分論劾有差叅後州縣衞所限一年道府限一年有半巡撫限二年逾限不完不復作分數照原叅分數叅處廵撫以完欠支存之數隨奏銷疏報轉運之官抵通交倉糧數無闕總漕糧道及押運領運官弁議敘有差如有未完按分數叅處勒限責償逾限不完者皆論如法凡漕船偶遭風浪在河淮江湖失事者如船糧漂没無存地方官勘實報總漕題豁若内河遇風收泊不慎或不戒於火致船與糧有失者皆不準豁免領運押運並地方文武官弁劾論如法欽定大清會典卷十三
