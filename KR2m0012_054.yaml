body:
  text: 禮部祠祭清吏司喪禮五凡民公溘逝之禮子截髮去冠緯夫人側室女子婦等去簪珥剪髮兄弟以下僕婢以上皆男去冠緯女去首飾設帷堂立喪主内喪主赴告於親戚僚友擇時進采棺朱髤飾金花置寢室正中既歛設靈座陳奠几五服之人皆成服喪主及諸子居苫次大功以下異室者各歸其家成服後每朝夕奠肴饌午奠餅餌陳設執事族人咸齊集上食設饌如生時遇朔望則於朝奠具殷奠肴核加盛卜日而發引前夕啟奠翼日以槓轝舁柩以靈車載魂帛陳鞍馬八匹儀從各以次前導棺覆以帷帷用青藍采綺舁夫六十四人前引以丹旐銘旌旗人用丹旐漢人用銘旌及殯所暫安每日設奠如前行初祭禮親族咸集設饌筵十有五席羊七楮帛四萬設衣冠為尸祭畢焚之大功者至此易素服行大祭禮儀與初祭同期服者至此易素服百日致祭禮與初祭同喪主以下咸薙髮五月而葬豫期行題主禮屆葬期先期祖奠至時舁柩如發引儀葬畢虞祭羊酒楮帛隨宜酌用祭畢卒哭守塋人四戸期年小祥再期大祥及三周悉詣塋域致祭羊楮饌筵各視前減半二十七月服闋迺釋服從吉侯伯溘逝歛以朱棺發引陳鞍馬七匹初祭大祭皆用羊六楮帛侯三萬六千伯三萬二千饌筵侯十有三席伯十有二席餘皆與公同凡一品官溘逝發引陳鞍馬六匹覆棺以銷金青藍色綺為帷三月而葬守塋人二戸初祭大祭楮帛二萬八千羊五饌筵十餘與侯伯同二品官之喪發引陳鞍馬五匹初祭大祭皆羊四饌筵八席楮帛二萬四千餘與一品官同三品官之喪發引陳鞍馬四匹覆棺以青藍雲綺為帷舁夫四十八人守塋人一户初祭大祭皆用楮帛二萬饌筵六席羊三餘與二品官同四品官之喪發引陳鞍馬三匹初祭大祭皆用楮帛一萬六千饌筵五席餘與三品官同五品官之喪發引陳鞍馬二匹初祭大祭皆用楮帛一萬二千饌筵四席羊二餘與四品官同以上摃轝皆髤以硃紅六七八品官之喪覆棺用青藍素綺為帷舁夫三十二人守塋二人初祭大祭皆用楮帛一萬饌筵三席餘與五品官同九品官及凡有頂帶官員之喪覆棺用青絹舁夫二十四人餘與八品官同以上槓轝皆飾以紅堊兵民發引陳鞍馬一匹覆棺以布舁夫十有六人槓轝兩端飾以黒中飾紅堊祭用楮帛六千饌筵二席羊一餘與有頂帶官員同民公以下兵民以上居喪二十七月内不燕會不鼓樂不娶妻納妾門户不換舊符凡服制有五曰斬衰三年曰齊衰杖期不杖期五月三月曰大功九月曰小功五月曰緦麻三月服之差等有八曰斬衰三年者子為父母子之妻同子為繼母父之後妻慈母謂妾子無母父命他妾養之者養母自㓜過房與人者子之妻同庶子為適母為所生母庶子之妻同為人後者為所後父母為人後者之妻同女在室為父母已嫁被出而反在室者同適孫為祖父母及高曾祖父母承重適孫之妻同為人後者承重同妻為夫妾為家長同曰齊衰杖期者適子衆子為庶母謂父妾有子者適子衆子之妻同子為嫁母謂親生母父歿而改嫁者子為出母謂親生母父在而被出者夫為妻父母在不杖適孫祖在為祖母承重曰齊衰不杖期者祖為適孫父母為適長子及衆子父母為適長子之妻父母為女在室者父母為子為人後者繼母為長子衆子子為改嫁繼母謂父卒繼母改嫁而已從之者從子為伯叔父母及姑在室者為已之親兄弟及姊妹在室者為親兄弟之子及女在室者孫為祖父母孫女為祖父母雖適人不降庶孫為生祖母慈母養母孫同女出嫁為父母為人後者為其本生父母仕者解任士子輟考丁憂一年女在室及雖適人而無夫與子者為其兄弟姊妹及兄弟之子兄弟之女在室者女適人為兄弟之為父後者婦為夫親兄弟之子及女在室者妾為家長之父母妾為家長之正妻妾為家長之長子衆子與其所生子為同居繼父兩無大功以上親者曰齊衰五月者為曾祖父母女孫雖適人不降曰齊衰三月者為高祖父母女孫雖適人不降為繼父先同居今不同居者自來不同居者無服為同居繼父兩有大功以上親者曰大功九月者祖為衆孫及孫女在室者祖母為適孫衆孫及孫女在室者生祖母為庶孫慈養祖母同父母為衆子婦及女之已嫁者慈母養母為其子婦同伯叔父母為從子婦及兄弟之女已嫁者為人後者為其兄弟及姑姊妹在室者夫為人後其婦為夫本生父母為已之同堂兄弟及姊妹在室者為姑及姊妹之已嫁者為兄弟之子為人後者女出嫁為本宗伯叔父母及兄弟與兄弟之子為姑姊妹及兄弟之女在室者婦為夫之祖父母為夫之伯叔父母曰小功五月者為伯叔祖父母謂祖之親兄弟為同堂伯叔父母謂父之堂兄弟為同堂姊妹之出嫁者為再從兄弟及再從姊妹在室者為同堂兄弟之子及女在室者為祖姑在室者謂祖之親姊妹為堂姑之在室者謂父之同堂姊妹為兄弟之妻祖為適孫之婦為兄弟之孫及兄弟之孫女在室者為外祖父母為母之兄弟姊妹為姊妹之子及女之在室者為人後者為其姑及姊妹之已嫁者婦為夫兄弟之孫及孫女在室者婦為夫之姑及夫之姊妹在室出嫁同婦為夫之兄弟及夫兄弟之妻婦為夫同堂兄弟之子及女之在室者女出嫁為本宗姊妹之出嫁者為本宗堂兄弟及堂姊妹之在室者曰緦麻三月者祖為衆孫婦曽祖父母為曽孫曽孫女高祖父母為元孫元孫女祖母為適孫衆孫婦為乳母為曽伯叔祖父母為族伯叔祖父母為族伯叔父母為族兄弟及族姊妹在室者為曽祖姑在室者為族祖姑及族姑在室者為兄弟之曽孫及曾孫女在室者為兄弟之孫女出嫁者為同堂兄弟之孫及孫女在室者為再從兄弟之子及女在室者為祖姑謂祖之親姊妹及堂姑謂父之堂姊妹及已之再從姊妹出嫁者為同堂兄弟之女出嫁者為父姊妹之子為母兄弟之子為母姊妹之子為妻之父母為壻為外孫及外孫女為兄弟孫之妻為同堂兄弟子之妻為同堂兄弟之妻婦為夫高曾祖父母為夫之伯叔祖父母及夫之祖姑在室者為夫之堂伯叔父母為夫之堂姑在室者為夫之同堂兄弟及同堂兄弟之妻為夫之同堂姊妹在室出嫁同為夫之再從兄弟之子及女在室者為夫同堂兄弟之女出嫁者為夫同堂兄弟子之妻為夫同堂兄弟之孫及孫女在室者為夫兄弟孫之妻為夫兄弟之孫女出嫁者為夫兄弟之曽孫及曽孫女之在室者女出嫁為本宗伯叔祖父母及祖姑在室者為本宗同堂伯叔父母及堂姑在室者為本宗堂姊妹之出嫁者為本宗堂兄弟之子及女在室者䘏典凡賜䘏之禮大臣病故有位隆望重功德懋著者喪聞朝廷軫念輟朝親臨祭酒或遣皇子王公大臣侍衞往奠或賜爵秩祀發帑治喪並出特恩餘皆按品給與祭葬之費文官尚書武職都綂以上由内院撰文遣官宣讀致祭祭銀二十五兩葬費五百兩易名賜諡由部具題請旨予諡者勒碑給費三百五十兩碑文由内閣撰擬侍郎廵撫等二品官應得䘏典者不請諡在任已及三年給葬費四百兩未及三年者半之遣官致祭與一品官同給祭銀二十兩公侯伯子男世爵兼他職宣勞者由部以給與全葬或半葬及應否予諡聲明疏内請旨裁定祭銀公四十兩侯三十五兩伯三十兩葬費公六百五十兩侯六百兩伯五百五十兩子如一品官之數予諡立碑公侯伯各給銀四百兩子三百五十兩散秩世爵止給祭銀無葬價男爵無諡全葬半葬皆視其兼他職與否祭銀之數與二品官同滿漢文武一二品官以年老有疾原官致仕病故者應得䘏典與見任同三品官以下雲騎尉三等侍衞文官知縣武官守備以上如死事行間者以加贈品級給與祭銀三品官十有六兩四品官十有二兩五品官十兩葬費三品官三百兩四品官二百兩五品至七品官百兩在内由工部給發直省由布政使司給發欽定大清會典卷五十四
