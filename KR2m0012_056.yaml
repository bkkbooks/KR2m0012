front:
  text: 欽定四庫全書欽定大清㑹典卷五十六
  hash: sha256:24f9d8ccfeca0d916a5a4e8cc3bb0610fd8e5359c0f662c3fdc6e735b8b8b4d4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_056-1a, image: WYG0619/WYG0619-0476a.png}
body:
  text: 禮部主客清吏司賔禮朝貢凡四夷朝貢之國東曰朝鮮東南曰琉球蘇祿南曰安南暹羅西南曰西洋緬甸南掌西北番夷見理藩院皆遣陪臣為使奉表納貢來朝凡敕封國王朝貢諸國遇有嗣位者先遣使請命於朝廷朝鮮安南琉球欽命正副使奉敕往封其他諸國以敕授來使齎回乃遣使納貢謝恩朝鮮國王王妃與王同封子長則請封世子皆三品以上官充正副使服色儀從各從其品安南琉球以翰林院科道禮部五品以下官充正副使特賜一品麒麟服以重其行儀從皆視一品使歸還其服於所司凡貢期朝鮮歲至琉球間歲一至安南六歲再至暹羅三歲蘇祿五歲南掌十歲一至西洋緬甸道逺貢無定期凡貢道朝鮮貢使渡鴨緑江入境由鳯凰城陸路至盛京入山海關赴京師琉球由福建閩安鎮蘇祿由廈門西洋由廣東澳門暹羅由虎門皆浮舟於海經涉重洋入境安南由廣西太平府緬甸由雲南永昌府南掌由普洱府皆陸行款關入境各至省城督撫具疏以聞由部覆準命下乃禮遣入京凡貢物各將其國之土實非土産者勿進朝鮮安南琉球緬甸蘇祿南掌皆貢有常物西洋暹羅無常貢惟其所獻或輸內務府或入武備院或納鑾儀衛或留於盛京及邊省各付所司備用有因事慶賀及謝恩加貢者廩餼賚豫如常貢其方物則留充正貢之數凡從人朝鮮貢使從書狀官一人大通官三人護貢官二十四人有賞從役三十人無賞從役無常數琉球西洋暹羅蘇祿貢舟無過三每舟人無過百赴京無過二十安南緬甸南掌入貢人無過百赴京無過二十其不赴京者留於邊境邊吏廩餼之俟使回至邊率之歸國凡進表各國貢使就館次日黎明禮部設案於堂正中提督㑹同四譯館鴻臚寺少卿朝服率貢使暨從官各服其國朝服由館赴部入左角門俟於階下禮部侍郎一人出立於案左儀制司官二人鴻臚寺鳴贊二人立於左右楹南咸朝服館卿先升立於階前鳴贊贊進表司賓序班二人引貢使奉表升階副使從官隨升贊跪正使以下皆跪贊接表侍郎恭接陳於案正中復位立贊跪叩興正使以下行三跪九叩禮畢序班引退儀制司官奉表送內閣恭俟命下納方物於所司凡朝儀貢使至京遇大朝常朝之期皇帝御太和殿王公百官朝賀畢序班引貢使暨從官各服其國朝服就丹墀西班末聽贊行三跪九叩禮賜坐賜茶皆如儀詳見儀制司若不遇朝期由部奏請召見皇帝御便殿領侍衛內大臣侍衛左右侍立禮部尚書一人采服引貢使服其國朝服入至丹墀西行三跪九叩禮畢引由右階升通事一人從升至殿門外跪禮部尚書傳㫖慰問貢使以其國語對通事譯言禮部尚書代奏禮畢引出如待以優禮則議政大臣內大臣八旗大臣咸補服入殿侍立禮部尚書引貢使至丹墀西行三跪九叩禮升右階入殿右門立右翼大臣之末乃賜坐貢使隨衆跪一叩坐賜茶跪接坐飲皆行一叩禮皇帝慰問貢使起跪奏對如前儀禮畢引出賜食於朝房翼日詣午門外謝恩如常儀凡賜豫由部疏請得㫖行諸司供具屆期設案於午門外御道左户部工部內務府司官各陳賜物於案上駟院陳馬於庭各國惟朝鮮國王及貢使賜馬禮部堂官一人立案南西面主客司官隨後立御史四人鴻臚寺鳴贊二人序班二人夾御道左右東西面立咸朝服提督㑹同四譯館鴻臚寺少卿朝服率貢使暨從官各服其國朝服由長安左門入至午門外立御道右東面鳴贊贊排班序班引貢使從官北面序立聽贊行三跪九叩禮畢乃頒賜於國王主客司官奉授貢使貢使跪受轉授其從人次頒賜於正副使及從官從人主客司吏奉授各跪受訖乃謝恩行三跪九叩禮畢引貢使退堂官以下皆退凡館餼各國貢使就館工部飾房宇備器具給炭薪户部支粟米芻豆光祿寺日具脯資餼牽詳見精膳司皆館卿稽察而均調之凡賜燕各國貢使朝貢事竣賜燕於部將歸燕於館舍詳見精膳司主席以禮部堂官一人歸及邊境燕於省城主席以司道一人凡迎送朝鮮貢使以禮部通官迎於鳯凰城送亦如之各國貢使由各省督撫遣丞倅迎於邊界即令伴送至京及朝貢禮畢安南琉球暹羅緬甸蘇祿均疏列禮部滿漢司官各二人引見恭候欽㸃一人送至各省㑹城督撫遣官伴送出境南掌仍以伴送來京之人送往西洋貢使以內務府司官暨西洋人之供職欽天監者迎送於廣東皆往來乘傳所需舟車夫馬次舍饔餼有司官憑郵符供備經過地方遞撥官軍防護以達逺人凡市易各國貢使入境其舟車附載貨物許與內地商民交易或就邊省售於商行或攜至京師市於館舍所過關津皆免其徴若夷商自以貨物來內地交易者朝鮮於盛京邊界中江每歲春秋兩市㑹寧歲一市慶源間歲一市以禮部通官二人寧古塔筆帖式驍騎校各一人監視之限二十日畢市海外諸國於廣東省城每夏乘潮至省及冬候風歸國均輸稅於有司與內地商民同凡禁令外國有事陳請專差陪臣齎文赴部或外由督撫為之轉奏專達於朝者禁貢使入境及貢道所經各定地界不由正道越行他省者禁私買違制服色史書兵器銅鐵油麻熖硝及帶內地人口米穀出境者禁江海相際越境漁採者禁陸界甌脫之地中外軍民設屯堠闢田廬逋逃寄寓者禁封疆文武官不因公事通文書於外國者禁奉使出疆多受餽遺往來送迎私索土宜者禁有干禁令者論如法凡賙恤朝鮮安南琉球國王卒其嗣子遣使告哀乃賜故王諡以敕封嗣王之使兼充諭祭使齎祭文香帛白金往其國諭祭貢使殁於內地在京遣祠祭司官在道遣所在有司致祭願攜柩歸國者聽願葬內地者有司擇地封窆立表以識之費資於官其國有大饑饉遣使乞糴者令鄰疆官吏發倉庾以平其價仍以粟賙之凡拯救外國商民船有被風飄至內洋者所在有司拯救之疏報難夷名數動公帑給衣食治舟楫候風遣歸若內地商民船被風飄至外洋者其國能拯救資贍治舟送歸或附載貢舟以還皆降敕褒奬該國王賜其陪臣有差賓館凡賓館設廣廈以待諸國貢使之至置象譯以通言語習番夷書曰㑹同四譯館凡館舍一在御河橋一在宣武門內一在正陽門外貢使將至行工部庀治以除燥濕既至館卿率大使稽其出入視其脯資餼牽毋有不給貢使至次日奉表詣部納貢遇朝期隨廷臣後朝賀事竣賜燕於部及館頒賞於午門外皆館卿率使臣行禮館內日給饔餼由光祿寺供備食米芻菽器用薪炭由户工二部支應芻草依五城所報時價和買運費草價均領於户部事竣具其數申部察核移所由各衙門奏銷防護官兵奏交兵部撥送館舍或傾圮應修費巨者奏請費輕者移工部委官暨館卿㑹計修理凡象譯朝鮮安南琉球表章皆用中國書惟習朝鮮言語設譯生二十人於各旗朝鮮子弟內選充習回回西番書設西域館譯生四人習暹羅緬甸蘇祿南掌書設百夷館譯生四人均於順天府屬儒童內選充凡授職大使員闕咨吏部以序班序補通官及序班員闕均以譯生選補咨吏部注冊馬館凡設館以牧外藩馬駝在宣武門內者曰內館在廣渠門外者曰外館下嫁外藩公主郡主暨額駙歸寧外藩王公台吉來朝及索倫貢貂乘來馬駝均入牧焉凡芻牧之期以冬十月一日入館至次年夏四月一日出館由理藩院具外藩馬駝之數移館以稽出入凡芻牧之數外藩親王馬駝六十匹郡王五十貝勒四十貝子三十有五公二十有五扎薩克台吉十台吉等八都統子副都統五固倫公主馬駝六十五匹額駙視貝勒和碩公主視親王額駙視貝子郡主視郡王縣主視貝勒郡君視貝子額駙均視公縣君視公額駙暨公主之子戚畹封台吉者均十有五鄉君視扎薩克台吉凡芻牧需費每馬駝十有三匹用夫一名豆支於户部柴支於工部鹽支於光祿寺草依五城所報時價和買雇直運費草價均於户部支領監督一年期滿具册申部察核仍咨各衙門奏銷凡監視芻牧內館旗員一人外館二人防護驍騎校如之兵各二十名由兵部移八旗均委輪直欽定大清㑹典卷五十六
