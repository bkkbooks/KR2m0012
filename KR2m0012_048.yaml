front:
  text: 欽定四庫全書欽定大清㑹典卷四十八
  hash: sha256:7d166e0c74e9fbaf1d3d0b32906541dfe46350455701d9f636d4f22588d69b91
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_048-1a, image: WYG0619/WYG0619-0400a.png}
body:
  text: 禮部祠祭清吏司羣祀一凡祀北極佑聖眞君之禮歳以萬夀聖節遣官致祭北極佑聖眞君於地安門外日中坊橋東顯佑宫神位南嚮帛一餅餌果實二十盤茶琖三鑪一鐙二祀日和聲署陳樂於右階上自迎神至望燎皆奏樂餘祀同日出前二刻遣官朝服詣廟贊引太常贊禮郎二人引遣官由廟左門入盥洗畢升左階入殿左門就正中拜位前北面立典儀官贊執事官各共迺職以下自迎神至望燎皆典儀官唱贊贊引官贊就位遣官就拜位迺迎神司香官奉香盤進贊引官贊就上香位引遣官詣香案前贊上香司香官跪奉香遣官上柱香次三上瓣香畢贊復位遣官復位贊跪叩興以下行禮皆有贊遣官行三跪九叩禮奠帛行初獻禮司帛官奉篚司茶官奉琖進至神位前司帛官跪奠帛三叩司茶官立獻琖奠正中皆退司祝至祝案前跪三叩奉祝版跪案左遣官跪司祝讀祝畢奉祝版詣神位前跪安於案叩如初退遣官行三叩禮亞獻司茶官獻琖奠於左儀如初獻終獻奠於右儀如亞獻迺送神遣官行三跪九叩禮有司奉祝次帛次香恭送燎所遣官避立拜位旁東面竢祝帛過復位引遣官望燎告禮成退凡祀司火神之禮歳以季夏下旬三日遣官致祭司火之神於地安門外日中坊橋西火神廟神位南嚮帛一牛一羊一豕一果實五盤尊一爵三和聲署設樂遣官朝服行禮迎神上香奠帛讀祝三獻爵送神望燎均如前儀凡祀礮神之禮每間二歳以季秋月朔陳列八旗漢軍礮位於盧溝橋之北均西嚮遣八旗漢軍都統或副都統八人承祭叅佐領陪祭每旗異案各設神位以紙為之皆羊一豕一鑪一鐙二爵三琖二十共尊二設祝案於鑲黃旗礮位前祀日日出前二刻太常贊禮郎各二人引八旗承祭官具補服各詣本旗礮位前東嚮立典儀官贊執事官各共迺職贊引官贊就位引承祭官各就拜位立司香官各奉香盤進贊引官引各承祭官詣香案前贊上香承祭官各上柱香次三上瓣香贊復位引承祭官復位贊跪叩興凡行禮皆鑲黃旗礮位前贊禮郎唱贊承祭官各行三跪九叩禮八旗陪祀叅領佐領等官咸補服隨行禮初獻司爵官各奉爵進立獻爵奠正中皆退司祝至祝案前跪三叩奉祝文跪案左承祭官跪陪祀官皆跪司祝讀祝畢奉祝版詣鑲黃旗礮位前跪安於案叩如初退承祭官暨陪祀官行三叩禮亞獻司爵官獻爵奠於左儀如初獻終獻奠於右儀如亞獻畢奉神位及祝文同送燎所承祭官各避立兩旁贊引官引各承祭官望燎告禮成皆退漢軍祀礮後火器營祀礮神於盧溝橋遣火器營總綂一人承祭叅領等官陪祭儀均與漢軍同羣祀二凡祭都城隍神之禮歳以萬夀聖節遣官致祭於都城西南隅都城隍廟神位南嚮帛一牛一羊一豕一果實五盤尊一爵三鑪一鐙二祭日和聲署設樂於西階下自迎神至望燎皆奏樂餘祭同日出前二刻遣官朝服詣廟贊引太常贊禮郎二人引遣官由廟左門入盥洗畢升東階至殿門外就正中拜位前北面立典儀官贊執事官各共迺職以下自迎神至望燎皆典儀官唱贊贊引官贊就位遣官就拜位迺迎神司香官奉香盤進贊引官贊就上香位引遣官由殿中門入詣香案前贊上香司香官跪奉香遣官上柱香次三上瓣香畢贊復位遣官復位贊跪叩興以下行禮皆有贊遣官行三跪九叩禮奠帛行初獻禮司帛官奉篚司爵官奉爵進至神位前司帛官跪奠帛三叩司爵官獻爵奠正中皆退司祝至祝案前跪三叩奉祝版跪案左遣官跪司祝讀祝畢奉祝版詣神位前跪安於案叩如初退遣官行三叩禮亞獻司爵官獻爵奠於左終獻奠於右儀均與初獻同送神遣官行三跪九叩禮有司奉祝次帛次香恭送燎所遣官避立拜位旁東面候祝帛過復位引遣官望燎告禮成引退秋日諏吉遣官致祭陳帛一牛羊豕各一鉶二簠簋各二籩豆各十尊一爵三迎神上香奠帛三獻爵讀祝送神望燎均如前儀凡祭東嶽神之禮歳以萬夀聖節遣官致祭朝陽門外東嶽廟神位南嚮帛一牛一羊一豕一果實五盤尊一爵三鑪一鐙二和聲署設樂承祭官朝服行禮如儀凡祭黒龍潭龍神之禮歳以春秋諏吉遣官致祭昭靈沛澤龍神於都城北三十里金山之麓神位東嚮帛一羊一豕一鉶二簠二簋二籩十豆十尊一爵三鑪一鐙二和聲署設樂承祭官朝服行禮如儀凡祭玉泉龍神之禮歳以春秋諏吉遣官致祭惠濟慈佑龍神於玊泉山神位前陳設及祭儀均與祭黒龍潭龍神禮同凡祭后土司工神之禮有大興作遣官各一人致祭工部官隨營造所在設左右二壇太常官書后土之神司工之神各為位南嚮皆帛一羊一豕一餅餌果實二十盤尊一爵三鑪一鐙二和聲署設樂承祭官朝服行禮均如儀凡迎吻祭窰神門神之禮遣官各一人承祭工部官為壇於琉璃窰及經過之壇廟正門正陽門皇城紫禁城各門和聲署設樂於各壇前設導迎樂於琉璃窰門外太常官設神位陳羊豕餅餌果實香帛尊爵鑪鐙與祭司工禮同遣官暨禮部太常寺有職事工部内務府在工各官咸朝服簪花披紅迺陳吻於窰前太常贊禮郎引遣官詣琉璃窰神位前各門神位前行禮均與祭司工禮同祭畢導迎樂作鑾儀衞校舁吻禮部太常官前導承祭官從所經諸門陪祀官及執事官各於門前恭迎至工所管工官列班恭迎以入竢安吻事竣各退凡祭司倉神之禮歳以春秋諏吉遣倉場侍郎致祭倉儲之神左翼於海運倉右翼於興平倉朝陽門外於儲濟倉通州於大西倉皆有廟神位均南嚮各帛一羊一豕一果實十盤尊一爵三鑪一鐙二承祭官率各倉監督咸朝服行禮如儀欽定大清㑹典卷四十八
