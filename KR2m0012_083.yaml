body:
  text: 太常寺祝文冬日至大祀圜丘祝文維乾隆年歲次十一月朔越日嗣天子臣御名敢昭告於皇天上帝曰時維冬至六氣資始敬遵典禮謹率臣僚以玊帛犧齊粢盛庶品備此禋燎祇祀於上帝奉太祖承天廣運聖德神功肇紀立極仁孝睿武端毅欽安𢎞文定業髙皇帝太宗應天興國𢎞德彰武寬溫仁聖睿孝敬敏昭定隆道顯功文皇帝世祖體天隆運定統建極英睿欽文顯武大德𢎞功至仁純孝章皇帝聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝世宗敬天昌運建中表正文武英明寬仁信毅大孝至誠憲皇帝配尚饗正月上辛祈穀祝文維乾隆年歲次正月朔越日辛嗣天子臣御名敢昭告於皇天上帝曰臣仰承眷命撫育萬方念切民生亟圖康乂兹者候屆上辛春耕將舉爰攄誠悃上迓洪庥謹率臣僚以玉帛牲醴粢盛庶品恭祀上帝伏祈昭鑒時若雨暘俾百榖用成三農攸賴奉太祖承天廣運聖德神功肇紀立極仁孝睿武端毅欽安𢎞文定業髙皇帝太宗應天興國𢎞德彰武寬溫仁聖睿孝敬敏昭定隆道顯功文皇帝世祖體天隆運定統建極英睿欽文顯武大德𢎞功至仁純孝章皇帝聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝世宗敬天昌運建中表正文武英明寬仁信毅大孝至誠憲皇帝侑神尚饗孟夏常雩祝文維乾隆年歲次四月朔越日嗣天子臣御名敢昭告於皇天上帝曰臣恭承帝命率育寰區民為邦本深思稼穡之艱難食乃民天惟冀雨暘之時若用蠲吉日肅展明禋兹當龍見之期爰舉祈年之典惟皇上帝鑒兹將饗之誠用康兆民咸受明昭之賜俾五風十雨黍稷惟馨九榖三農順成有慶奉太祖承天廣運聖德神功肇紀立極仁孝睿武端毅欽安𢎞文定業髙皇帝太宗應天興國𢎞德彰武寬溫仁聖睿孝敬敏昭定隆道顯功文皇帝世祖體天隆運定統建極英睿欽文顯武大德𢎞功至仁純孝章皇帝聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝世宗敬天昌運建中表正文武英明寬仁信毅大孝至誠憲皇帝侑神尚饗夏日至大祭方澤祝文維乾隆年歲次五月朔越日嗣天子臣御名敢昭告於后土皇地祇曰時當夏至羣物方亨生長發育有生咸賴功德至厚上配皇天謹以玉帛牲醴粢盛庶品用將祗祭奉太祖承天廣運聖德神功肇紀立極仁孝睿武端毅欽安𢎞文定業髙皇帝太宗應天興國𢎞德彰武寬溫仁聖睿孝敬敏昭定隆道顯功文皇帝世祖體天隆運定統建極英睿欽文顯武大德𢎞功至仁純孝章皇帝聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝世宗敬天昌運建中表正文武英明寬仁信毅大孝至誠憲皇帝配尚饗春分朝日祝文維乾隆年歲次二月朔越日嗣天子御名謹告於大明之神曰惟神陽精之宗列神之首神光下照四極無遺功垂今昔率土仰賴兹當仲春式遵古典謹以玊帛牲醴之儀恭祀於神伏惟鑒歆賜福黎庶尚饗秋分夕月祝文維乾隆年歲次八月朔越日嗣天子御名謹告於夜明之神曰惟神配陽之德鍾隂之精周環九野普照萬方繼明於夕天下共賴兹當仲秋式遵古典謹以玊帛牲醴庶品之儀致祀惟神歆鑒福我兆民尚饗四孟時饗太廟祝文維乾隆年歲次正四七十月朔越日孝孫嗣皇帝御名敢昭告於太祖承天廣運聖德神功肇紀立極仁孝睿武端毅欽安𢎞文定業髙皇帝孝慈昭憲敬順仁徽懿德慶顯承天輔聖髙皇后太宗應天興國𢎞德彰武寬溫仁聖睿孝敬敏昭定隆道顯功文皇帝孝端正敬仁懿哲順慈僖莊敏輔天協聖文皇后孝莊仁宣誠憲恭懿至德純徽翊天啓聖文皇后世祖體天隆運定統建極英睿欽文顯武大德𢎞功至仁純孝章皇帝孝惠仁憲端懿慈淑恭安純德順天翼聖章皇后孝康慈和莊懿恭惠溫穆端靖崇天育聖章皇后聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝孝誠恭肅正惠安和淑懿儷天襄聖仁皇后孝昭靜淑明惠正和安裕欽天順聖仁皇后孝懿溫誠端仁憲穆和恪奉天佐聖仁皇后孝恭宣惠溫肅定裕慈純贊天承聖仁皇后世宗敬天昌運建中表正文武英明寬仁信毅大孝至誠憲皇帝孝敬恭和懿順昭惠佐天翊聖憲皇后曰時屆孟春夏秋冬謹以牲帛醴齊粢盛庶品用展追思伏惟尚饗時饗後殿祝文維乾隆年歲次正四七十月朔越日孝孫嗣皇帝御名謹遣敢昭告於肇祖原皇帝原皇后興祖直皇帝直皇后景祖翼皇帝翼皇后顯祖宣皇帝宣皇后曰時屆孟春夏秋冬謹以牲帛醴齊粢盛庶品用展追思伏惟尚饗大祫前期祗告後殿祝文維乾隆年歲次十二月朔越二十日孝孫嗣皇帝御名謹遣敢昭告於肇祖原皇帝原皇后興祖直皇帝直皇后景祖翼皇帝翼皇后顯祖宣皇帝宣皇后曰兹者歲暮特修祫祭之禮於太廟恭迎同格饗祀伏惟鑒知謹告大祫前期祗告中殿祝文維乾隆年歲次十二月朔越二十日孝孫嗣皇帝御名謹遣敢昭告於太祖承天廣運聖德神功肇紀立極仁孝睿武端毅欽安𢎞文定業髙皇帝孝慈昭憲敬順仁徽懿德慶顯承天輔聖髙皇后太宗應天興國𢎞德彰武寬溫仁聖睿孝敬敏昭定隆道顯功文皇帝孝端正敬仁懿哲順慈僖莊敏輔天協聖文皇后孝莊仁宣誠憲恭懿至德純徽翊天啓聖文皇后世祖體天隆運定統建極英睿欽文顯武大德𢎞功至仁純孝章皇帝孝惠仁憲端懿慈淑恭安純德順天翼聖章皇后孝康慈和莊懿恭惠溫穆端靖崇天育聖章皇后聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝孝誠恭肅正惠安和淑懿儷天襄聖仁皇后孝昭靜淑明惠正和安裕欽天順聖仁皇后孝懿溫誠端仁憲穆和恪奉天佐聖仁皇后孝恭宣惠溫肅定裕慈純贊天承聖仁皇后世宗敬天昌運建中表正文武英明寬仁信毅大孝至誠憲皇帝孝敬恭和懿順昭惠佐天翊聖憲皇后曰兹者歲暮特修祫祭之禮恭迎肇祖原皇帝原皇后興祖直皇帝直皇后景祖翼皇帝翼皇后顯祖宣皇帝宣皇后同格饗祀伏惟鑒知謹告歲暮大祫祝文維乾隆年歲次十二月朔越二十日孝孫嗣皇帝御名敢昭告於肇祖原皇帝原皇后興祖直皇帝直皇后景祖翼皇帝翼皇后顯祖宣皇帝宣皇后太祖承天廣運聖德神功肇紀立極仁孝睿武端毅欽安𢎞文定業髙皇帝孝慈昭憲敬順仁徽懿德慶顯承天輔聖髙皇后太宗應天興國𢎞德彰武寬溫仁聖睿孝敬敏昭定隆道顯功文皇帝孝端正敬仁懿哲順慈僖莊敏輔天協聖文皇后孝莊仁宣誠憲恭懿至德純徽翊天啓聖文皇后世祖體天隆運定統建極英睿欽文顯武大德𢎞功至仁純孝章皇帝孝惠仁憲端懿慈淑恭安純德順天翼聖章皇后孝康慈和莊懿恭惠溫穆端靖崇天育聖章皇后聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝孝誠恭肅正惠安和淑懿儷天襄聖仁皇后孝昭靜淑明惠正和安裕欽天順聖仁皇后孝懿溫誠端仁憲穆和恪奉天佐聖仁皇后孝恭宣惠溫肅定裕慈純贊天承聖仁皇后世宗敬天昌運建中表正文武英明寬仁信毅大孝至誠憲皇帝孝敬恭和懿順昭惠佐天翊聖憲皇后曰氣序已周歲事告成謹以牲帛醴齊粢盛庶品特修大祫禮於太廟用申追感之情伏惟尚饗元日後殿祝文維乾隆年歲次正月朔孝孫嗣皇帝御名謹遣敢昭告於肇祖原皇帝原皇后興祖直皇帝直皇后景祖翼皇帝翼皇后顯祖宣皇帝宣皇后曰兹逢元旦歲序方新歲事更始謹以香帛醴齊粢盛庶品特修祀禮用申追慕之情伏惟尚饗皇太后聖夀後殿祝文維乾隆年歲次十一月朔越二十五日孝孫嗣皇帝御名謹遣敢昭告於肇祖原皇帝原皇后興祖直皇帝直皇后景祖翼皇帝翼皇后顯祖宣皇帝宣皇后曰兹逢皇太后聖節仰荷恩佑追慕良深謹以香帛醴齊粢盛庶品特修祀禮用申報忱伏惟尚饗萬夀聖節後殿祝文維乾隆年歲次八月朔越十三日孝孫嗣皇帝御名謹遣敢昭告於肇祖原皇帝原皇后興祖直皇帝直皇后景祖翼皇帝翼皇后顯祖宣皇帝宣皇后曰兹臣誕辰深承啓佑莫罄報私謹以香帛醴齊粢盛庶品特修祀禮用展微忱伏惟尚饗春秋上戊祈謝社稷壇祝文維乾隆年歲次二八月朔越日戊皇帝御名敢昭告於社稷之神曰惟神贊輔皇天皇祇發生嘉榖粒我蒸民萬世永賴兹當仲春秋謹以玉帛牲醴庶品致祭報謝配以后土句龍氏后稷氏尚饗春秋祭帝王廟祝文維乾隆年歲次二八月朔越日皇帝遣致祭於太昊伏羲氏炎帝神農氏黃帝軒轅氏帝金天氏帝髙陽氏帝髙辛氏帝陶唐氏帝有虞氏夏十四王商二十六王周三十二王漢二十一帝唐十五帝遼六帝宋十四帝金五帝元十一帝明十三帝曰仰惟諸帝應運代興作君作師撫育黎蒸創治維艱基業用宏守文不易謨烈是承風教既逺功德可稱報於仲春秋神其式慿尚饗春秋上丁釋奠先師祝文維乾隆年歲次二八月朔越日丁皇帝遣致祭於至聖先師孔子曰惟師德配天地道冠古今删述六經垂憲萬世兹當仲春秋祗奉舊章謹以牲帛酒果致祭配以復聖顔子宗聖曾子述聖子思子亞聖孟子尚饗崇聖祠祝文維乾隆年歲次二八月朔越日皇帝遣致祭於肇聖王裕聖王詒聖王昌聖王啓聖王曰惟王誕生至聖為萬世王者之師功德顯著兹因仲春秋謹以庶品之儀致祭配以先賢顔氏先賢曽氏先賢孔氏先賢孟孫氏尚饗春秋經筵祭告傳心殿祝文維乾隆年歲次二八月朔越日皇帝遣致祭於皇師伏羲氏皇師神農氏皇師軒轅氏帝師陶唐氏帝師有虞氏王師夏禹王王師商湯王王師周文王王師周武王先聖周公先師孔子神位前曰兩儀既闢開治統道統之原干聖同歸建作君作師之極自上古鴻濛而降迄一中授受以來五帝開天乘時而迭運三王治世異尚而同功制作大備於元公刪述集成於宣聖繼修明之後仰溯傳心綜道法之詳緬惟典學羮牆如見㑹列聖於一堂俎豆用馨紹斯文於萬祀惟啓承之永賴冀陟降之匪遙肅薦明禋伏祈歆格尚饗仲春吉亥饗先農壇祝文維乾隆年歲次二三月朔越日亥皇帝致祭於先農之神曰惟神肇興農事萬世永賴兹當東作之時躬耕藉田祈諸物豐茂為民立命謹以牲帛酒醴庶品之儀致祭尚饗太歲祝文維乾隆年歲次十正二月朔越日皇帝遣致祭於某甲太歲之神曰兹當孟春歲暮祭歲既云暮節屆新春謹以牲帛酒果庶品之儀致祭尚饗顯佑宮祝文維乾隆年歲次八月朔越十三日皇帝遣致祭於北極佑聖真君曰兹朕誕辰惟神永垂默佑謹以茶果庶品之儀致祭尚饗火神廟祝文維乾隆年歲次六月朔越二十三日皇帝遣致祭於司火之神曰惟神令司赤帝德炳離明屆此良辰爰修專祀鑒兹特典綏我蒸民尚饗季秋朔祭炮神祝文維乾隆年歲次九月朔皇帝遣致祭於神威無敵大將軍神功將軍制勝將軍神威將軍之神曰惟神欽天命而無私助揚威武有功國家兹當季秋之時特以牲醴遣官致祭神其鑒之尚饗都城隍祝文維乾隆年歲次九月朔越日皇帝遣致祭於都城隍之神曰惟神正直實贊靈化捍禦之功都邑所賴祇嚴歲祀用答神庥尚其歆兹永福黎庶尚饗萬夀節致祭祝文維乾隆年歲次八月朔越十三日皇帝遣致祭於都城隍之神曰兹豫初度之辰仰荷神庥永垂護佑謹以牲醴致祭尚饗東嶽廟祝文維乾隆年歲次八月朔越十三日皇帝遣致祭於東嶽泰山之神曰兹朕誕辰惟神永垂默佑謹以牲醴庶品之儀致祭尚饗黑龍潭龍神廟祝文維乾隆年歲次二八月朔越日皇帝遣致祭於昭靈沛澤龍王之神曰惟神澤潤生民膏流甸服雨暘時若夙彰孚應之靈年榖順成溥被盈寧之福念神庥之丕著惟典祀之宜崇兹值仲春秋用申時饗尚其歆格鑒此精誠尚饗玉泉龍神祠祝文維乾隆年歲次二八月朔越日皇帝遣致祭於惠濟慈佑龍王之神曰惟神潤下流膏應時澤物珠泉湧地育靈脈於山林玉液成川暢清流於畿甸滋畇畇之繡壤允資灌注之功通翼翼之漕艘長助挽輸之利聿昭靈貺宜奉明禋蠲二仲以薦馨潔粢表敬永千秋而崇報備物明䖍神式憑依尚其歆格仲春仲冬甲日饗先醫廟祝文維乾隆年歲次十二一月朔越日皇帝遣致祭於太昊伏羲氏炎帝神農氏黃帝軒轅氏曰古昔聖人德澤深宏創治醫藥拯濟斯世仁夀庶民兹當春冬時謹以牲醴致祭惟神慈惠蠲除疾疢篤佑朕躬致和天下配以句芒氏之神祝融氏之神風后氏之神力牧氏之神尚饗五月十三日致祭關帝廟前殿祝文維乾隆年歲次五月朔越十三日皇帝遣致祭於關聖大帝曰惟帝純心取義亮節成仁允文允武乃聖乃神功高當世德被生民兩儀正氣歷代明禋英靈丕著封號聿新敬修歲事顯佑千春尚饗後殿祝文維乾隆年歲次五月朔越十三日皇帝遣致祭於關帝之曾祖光昭公祖裕昌公父成忠公曰禮隆報祀誼重推恩當嵩生嶽降之期溯木本水源之始輝煌棟宇憑依已妥於上公修潔豆籩將饗告䖍於仲夏惟神昭鑒尚其格歆春秋祭前殿祝文維乾隆年歲次二八月朔越日皇帝遣致祭於關聖大帝曰惟神秀育河山名垂今古英風正氣世歷久而彌新大節純心史相傳而莫匹念神靈之顯著命典禮以優隆兹當仲春秋用昭時饗尚其歆格鑒此精虔尚饗後殿祝文維乾隆年歲次二八月朔越日皇帝遣致祭於關帝之曾祖光昭公祖裕昌公父成忠公曰惟公盛德相承令儀足式歷數傳之積纍遂鍾河嶽精靈儲曠代之威名堪作巖廊矩矱殊恩既沛於三世時饗宜錫於上公兹當仲春秋用昭祀事豆籩致潔典禮加隆尚饗春秋致祭昭忠祠祝文維乾隆年歲次二八月朔越日皇帝遣諭祭八旗直省盡節立功之和碩敬謹親王等之靈曰周禮有司勳之職名勒旗常祭法載勤事之文光生俎豆蓋舍生取義臣子抒報國之忱而服德酬庸朝廷示作忠之典英標如在渥澤宜頒爾和碩敬謹親王等丹心自勵正氣挺生果敢本於性成見危授命忠誠矢於敵愾視死如歸生當開創之年執鋭披堅實賴干城之佐運際承平之日安邊除暴亦資禦侮之才或陷陳以爭先或守土而盡職或被誘不辱乃授首以從容或深入無援遂致身於倉卒雖天戈所指如振槁而摧枯乃大義為昭可凌霄而貫日我皇考軫懷曩烈誕賁殊榮命立專祠俾膺特典王公將帥躋正宇之輝煌士卒偏裨列兩廡而陪侍蓋所以表忠貞於既往昭節義於無窮朕洪紹丕基遵行常祀功書竹帛既揚久逺之芳徽禮薦牲牢勿替春秋之血食苾芬在列靈爽歆承賢良祠祝文維乾隆年歲次二八月朔越日皇帝遣諭祭賢良祠王大臣和碩怡賢親王大學士榜式達海等之靈曰功銘鐘鼎尚書崇元祀之文德冠巖廊周禮著大蒸之典蓋旗常載績本臣子之素懷而俎豆薦馨乃朝廷之崇報爾和碩怡賢親王望重親賢粹鍾川嶽竭忠誠而體國著勳德於當年大學士榜式達海等或當列祖開基之日佐命立功或際熙朝極盛之時宣猷贊化或驅除暴亂定疆宇於域中或震耀聲靈收版圖於海外內則台星卿月奏亮工熙載之勳外則賜鉞授麾襄阜物安民之治老成謀國者進黃髮之嘉猷清白持身者表素絲之高節純勤盡職則夙夜匪躬密勿承休則堂亷一德我皇考追思前蹟特焕褒綸崇廟宇於神京布几筵而時祭蓋以表揚既往沛酬庸褒德之恩激勸將來勵懷古欽風之志朕寅承丕緒嗣舉舊章撫節物以懷賢潔牲牢而致饗英靈如在尚克歆承雙忠祠祝文維乾隆年歲次二八月朔越日皇帝遣諭祭於襄烈伯傅清壯果伯拉布敦之靈曰臣子效匪躬之節報禮斯隆國家昭異數之恩褒忠罔替既旗常之永勒宜俎豆之世延惓撫流光長懷往績爾傅清拉布敦共矢精誠同宣義烈捐生絶塞已銘殊績於鐘鏞晉爵崇階用妥貞魂於廟食兹當春秋仲爰命祠官載考彞章聿修秩祀馨香申薦閲日月以如新琬琰揚芳與山河而共久爾靈不昧尚克歆承定南武壯王祠祝文維乾隆年歲次二八月朔越日皇帝遣諭祭於定南武壯王孔有德之靈曰人臣盡忠仗節矢天日而不渝朝廷恤死酬勳撫歲時而增感爾定南武壯王孔有德膚功早著偉烈常存兹當仲春秋之辰益念忠良之績特頒祭典用慰幽靈王如有知尚克歆饗宏毅公祠祝文維乾隆年歲次二八月朔越日皇帝遣諭祭於宏毅公額宜都巴圖魯之靈曰誼重酬庸茂典聿加於勳舊禮隆展祀歲時宜備於馨香爾宏毅公額宜都巴圖魯開國名臣從龍上佐表成勞於鐘鼎青史揚芬紀偉績於旗常豐碑示寵既叨恩於廟食更賜祭於專祠式賁新綸允符彞憲時當春秋仲用布几筵靈如有知尚其歆格恪僖公祠祝文維乾隆年歲次二八月朔越日皇帝遣諭祭於恪僖公遏必隆之靈曰沛隆恩於勳舊國有彞章展時祭於春秋禮踰常格爾恪僖公遏必隆名垂青簡績著豐碑矧追椒寢於所生宜薦專祠以有永兹當春秋仲申侑几筵靈如有知尚克歆饗勤襄公祠祝文維乾隆年歲次二八月朔越日皇帝遣諭祭於勤襄公佟圖賴公妻一品夫人覺羅氏忠勇公佟國綱公妻一品夫人塔他喇氏公妻一品夫人溫都氏端純公佟國維公妻一品夫人何舍里氏之靈曰崇功報德禮首逮於元臣錫類推恩誼尤敦於懿戚考彞章而立廟因時序以薦觴惟爾一門宣猷纍葉效忠貞而體國名著旗常秉孝義以型家芳傳國史望高閥閲蔚為勳舊之宗慶衍庭幃光啓聖慈之範兹當春秋仲特遣專官設奠几筵靈其歆饗文襄公祠祝文維乾隆年歲次二八月朔越日皇帝遣諭祭於文襄公圖海之靈曰義重酬勳眷鈞衡之舊德禮隆秩祀因節序以申恩爾文襄公圖海望高國器功贊王猷表世德於㦸門生膺茀祿贈崇階於鼎爵殁被榮名渙新綍而建祠遣專官而致祭時當春秋仲式布几筵靈如有知尚其歆格恪僖公祠祝文維乾隆年歲次二八月朔越日皇帝遣諭祭於恪僖公哈什屯公妻一品夫人覺羅氏敏果公米思漢公妻一品夫人穆溪覺羅氏博爾濟吉特氏莊慤公李榮保公妻一品夫人覺羅氏之靈曰禮隆念舊千秋之俎豆攸光義重酬庸奕代之馨香勿替考彞章而秩祀因時序以申恩惟爾一門夙稱望族忠誠體國數傳紀績於旗常端敬型家纍葉垂芳於圖史祥開坤極早錫榮封佑啓勳賢復新廟貌命祠官而陳芬苾落成已賁恩綸隨節候而展几筵歲薦彌昭懿典兹當春秋仲常祀聿修靈如有知尚其歆格欽定大清會典卷八十三
