body:
  text: 鑾儀衛掌衛事內大臣一人鑾儀使滿二人漢一人掌乘輿供奉秩序鹵簿所屬左右中前後五所馴象一所旗手一衛左所冠軍使滿一人雲麾使滿三人漢二人治儀正滿四人漢四人整儀尉滿二人漢九人掌輦輅右所冠軍使滿一人雲麾使滿三人漢一人治儀正滿三人漢三人整儀尉滿三人掌繖蓋儀刀弓矢槍殳戟中所冠軍使滿一人雲麾使滿三人漢一人治儀正滿三人漢三人整儀尉滿二人漢二人掌麾氅幡幢纛幟節鉞仗馬前所冠軍使滿一人雲麾使滿三人漢一人治儀正滿三人漢五人整儀尉滿二人漢二人掌扇拂爐合盂槃几倚星御仗引仗棕薦靜鞭品級山後所冠軍使滿一人雲麾使滿三人漢二人治儀正滿三人漢三人整儀尉滿二人掌旗瓜吾仗馴象所冠軍使滿一人雲麾使滿三人漢一人治儀正滿三人漢二人整儀尉滿一人漢一人掌儀象騎駕鹵簿鐃歌前部大樂旗手衛冠軍使滿一人漢一人雲麾使滿二人治儀正滿一人漢二人整儀尉滿一人漢二人掌金鉦鼓角鐃歌大樂贊鳴鞭八人於滿冠軍使以下各官內委用陪祀冠軍使漢二人主事滿一人經歷漢一人筆帖式十人凡鹵簿皇帝大祀南郊乘玉輦陳大駕鹵簿前列導象四民尉二十八人次寶象五民尉八十人雲麾使一人治儀正二人次靜鞭四民尉十有四人治儀正一人次前部大樂大銅角四小銅角四金口角四和聲署史十有二人次革輅駕馬四民尉三十二人木輅駕馬六民尉三十二人象輅駕馬八民尉三十四人金輅駕象一民尉四十四人玉輅駕象一民尉四十四人雲麾使一人治儀正二人次鐃歌大樂金二金鉦四鈸二鼓二點二笛四雲璈二管二笙二金口角八大銅角十有六小銅角十有六金鉦四紅鐙二畫角二十四掆鼓二十四紅鐙二笛十有二拍版四仗鼓四金二掆鼓二十四紅鐙二署史四十八人民尉百八十八人冠軍使一人整儀尉二人次引仗六御仗十有六吾仗十有六立瓜十有六臥瓜十有六星十有六鉞十有六出警入蹕旗各一旗尉九十人民尉六十七人五色幟四十旗尉三十人民尉四十人雲麾使一人整儀尉二人次翠華旗二金鼓旗二門旗八日月旗各一五雲旗五五雷旗五八風旗八甘雨旗四民尉七十二人列宿旗二十八五星旗五五嶽旗五四瀆旗四神武朱雀白虎青龍旗各一民尉九十二人天馬天鹿辟邪犀牛赤熊黃羆白澤角端遊麟彩獅振鷺鳴鳶赤烏華蟲黃鵠白雉雲鶴孔雀儀鳳翔鸞為旗二十民尉四十人五色龍纛四十前鋒纛八護軍纛八驍騎纛二十四旗尉四十人民尉百二十人雲麾使一人治儀正二人整儀尉二人次黃麾四儀鍠氅四金節四進善納言敷文振武旌各二褒功懷遠行慶施惠明刑弼教教孝表節旌各二民尉五十六人龍頭幡四豹尾幡四絳引幡四信幡四羽葆幢四霓幢四紫幢四長夀幢四民尉六十四人雲麾使二人治儀正二人整儀尉二人次鸞鳳赤扇八雉尾扇八孔雀扇八單龍赤扇八單龍黃扇八雙龍赤扇八雙龍黃扇二十夀字黃扇八旗尉二十四人民尉百二十八人雲麾使一人治儀正二人整儀尉二人次赤素方繖四紫素方繖四五色花繖二十間以五色九龍繖十旗尉三十人民尉八十四人九龍黃蓋二十紫芝蓋二翠華蓋二九龍曲柄黃蓋四旗尉三十人民尉八十四人鑾儀使一人雲麾使一人治儀正二人整儀尉二人次戟四親軍八人殳四親軍八人豹尾槍三十護軍六十人弓矢三十儀刀三十親軍各六十人雲麾使一人治儀正二人整儀尉四人次仗馬十護軍二十人冠軍使雲麾使二人次金方几一金交倚一金瓶二金盥槃一金盂一金合二金爐二拂二旗尉二十二人雲麾使一人治儀正二人次九龍曲柄黃華蓋一執蓋武備院掌蓋司蓋四人前引佩刀大臣十人提爐二執爐侍衛二人玉輦在中左右奉輦鑾儀使二人扶輦冠軍使一人雲麾使一人治儀正二人整儀尉二人旗尉民尉各十有八人後扈佩刀大臣二人豹尾班執豹尾槍侍衛十人佩儀刀侍衛十人佩弓矢侍衛二十人領侍衛內大臣一人侍衛班領二人次後管散秩大臣一人前鋒護軍統領一人給事中御史二人各部郎中員外郎四人侍衛班領一人署侍衛班領一人侍衛什長二人次黃龍大纛二領侍衛內大臣或散秩大臣一人司纛侍衛什長二人建纛親軍四人佩鳴螺親軍六人禮成回鑾乘禮輿大駕鹵簿同扈從大臣侍衛從官均自午門外乘馬至祀所門外止各祭祀同大祭北郊乘金輦陳法駕鹵簿前列導象次寶象次靜鞭次前部大樂次五輅與大駕同民尉署史雲麾使治儀正數均如之次鐃歌大樂大銅角八小銅角八金鉦四角二十四掆鼓二十四笛十有二拍版四杖鼓四金二掆鼓二十四署史十有二人民尉百八十八人間以紅鐙從以冠軍使整儀尉同次引仗御仗吾仗立瓜臥瓜星鉞各六出警入蹕旗各一五色幟二十次翠華金鼓門旗日月雲雷風雨列宿五星五嶽四瀆神武朱雀白虎青龍天鹿天馬辟邪犀牛赤熊黃羆白澤角端遊麟彩獅振鷺鳴鳶赤烏華蟲黃鵠白雉雲鶴孔雀儀鳳翔鸞各旗如大駕之數五色龍纛二十前鋒纛八護軍纛八驍騎纛二十四次麾氅節旌幡幢次鸞鳳赤扇雉尾扇孔雀扇單龍赤扇單龍黃扇雙龍赤扇夀字黃扇均如大駕之數雙龍黃扇八民尉百二十八人從以雲麾使治儀正整儀尉皆同次赤素紫素繖各四五色花繖十間以五色九龍繖十民尉六十四人九龍黃蓋十紫芝翠華蓋各二九龍曲柄黃蓋四民尉五十四人從以鑾儀使雲麾使整儀尉同次戟殳如大駕之數親軍同豹尾槍二十護軍四十人弓矢二十儀刀二十親軍各四十人次仗馬如大駕之數護軍同次几倚瓶槃盂合爐拂旗尉同次九龍曲柄黃華蓋執以掌蓋司蓋同前引佩刀大臣十人提爐二執爐侍衛二人金輦在中左右奉輦鑾儀使二人扶輦冠軍使雲麾使各一人治儀正整儀尉各二人旗尉民尉各十有四人後扈佩刀大臣豹尾班執豹尾槍佩儀刀佩弓矢侍衛領侍衛內大臣侍衛班領後管散秩大臣前鋒護軍統領給事中御史郎中員外郎侍衛班領署侍衛班領侍衛什長黃龍大纛領侍衛內大臣散秩大臣司纛侍衛什長建纛佩鳴螺親軍均與大駕同饗太廟祭社稷不設前部大樂祭堂子朝日夕月耕藉饗先農親饗前代帝王先師乘禮輿乘禮輿則并陳玉輦金輦餘均與郊大祀同朝會御殿陳法駕鹵簿華蓋在太和殿門外正中拂爐合盂槃瓶在殿簷東西儀刀弓矢豹尾槍殳戟在丹陛東西九龍曲柄黃蓋翠華蓋紫芝蓋九龍黃蓋五色九龍繖五色花繖自丹陛三成相間達於兩階階下靜鞭仗馬在甬道東西紫素赤素繖扇及幢幡旌節氅麾纛旗幟出警入蹕鉞星瓜仗在丹墀東西玉輦金輦在太和門外五輅在午門外寶象在五輅之南鐃歌大樂在寶象之南朝象即導象在天安門外從官旗尉民尉及各執事均與前同御樓受俘陳法駕鹵簿設丹陛鹵簿於午門外左右兩觀下設丹墀鹵簿於闕左右門至端門北設仗馬於兩角樓前設步輦五輅寶象於天安門外設靜鞭於兩角樓前夾御道左右設前部大樂於午門下設金鼓鐃歌大樂於鹵簿之南駕出鳴午門鐘巡幸皇城內陳鑾駕鹵簿前列御仗四吾仗四立瓜四臥瓜四星四鉞四次五色幟十五色龍纛十雙龍黃扇十九龍黃繖十均旗尉擎執次九龍曲柄黃華蓋一乘輿在中前引後扈大臣豹尾班執豹尾槍佩儀刀如常儀時巡省方陳騎駕鹵簿前列鐃歌大樂金二金鉦四鈸二鼓二點二笛四雲璈二管二笙二金口角八大銅角八小銅角八次御仗六吾仗六立瓜六臥瓜六星六鉞六次五色幟十五色龍纛十單龍赤扇六雙龍黃扇六五色花繖十次豹尾槍弓矢儀刀各十次九龍曲柄黃華蓋一御騎在中間乘步輿前引後扈大臣左右侍衛均佩刀屬櫜鞬豹尾班侍衛殿於後以領侍衛內大臣一人侍衛班領二人率之次黃龍大纛領侍衛內大臣司纛侍衛什長建纛佩鳴螺親軍均與大駕同扈從內大臣侍衛及親軍護軍均乘馬擎執用旗尉乘馬亦如之駐宿御營每朝鳴角每夕奏鐃歌樂起請鑾前旨恭遇大閲陳騎駕鹵簿於行宫門外駕出奏鐃歌大樂開操時率鳴角軍鳴畫角于臺上回鑾奏鐃歌清樂皇太后宫陳儀駕均內監擎執後同拂二金香爐二金合二金槃一金盂一金瓶二金方几一金交倚一次九鳳曲柄黃蓋一節二黃花繖四赤素方繖四五色九鳳繖十龍鳳黃扇四龍鳳赤扇四黃雉尾扇四赤雉尾扇四五色龍鳳旗十臥瓜四立瓜四吾仗四明黃八人儀轎二儀輿二十六人鳳轎一鳳輿一皇后宫陳儀駕同惟旗扇繪繡均用鳳文皇貴妃儀仗拂二金爐合槃盂各一金瓶二金方几一金交倚一次七鳳明黃曲柄蓋一節二明黃赤黑花繖各二赤黑瑞草繖各二金黃赤黑素扇各二赤黑雉尾扇各二金黃金鳳旗二赤黑金鳳旗各二赤黑素旗各二卧瓜立瓜吾仗各四明黃八人儀轎一儀輿一八人翟轎一貴妃儀仗減金黃赤黑素扇各二金黃金鳳旗二赤黑素旗各二臥瓜立瓜吾仗各二七鳳曲柄蓋花繖及轎輿色用金黃餘與皇貴妃同妃綵仗拂二銀爐合槃盂各一銀瓶二銀方几一銀交倚一次金黃七鳳曲柄蓋一節二金黃素繖二赤黑花繖各二赤黑素扇各二赤黑金鳳旗各二卧瓜立瓜各二吾仗二四人儀轎一儀輿一金黃八人翟轎一嬪采仗減拂二金黃素繖二黑花繖二黑素扇二黑金鳳旗二增金花繖二七鳳曲柄蓋色用赤餘與妃同凡朝會執事皇帝御太和殿受朝賀及慶典筵燕先一日司棕薦官鋪棕薦於殿陛至日五鼓陳設鹵簿委官率校尉自禮部舁表箋亭陳於午門外冠軍使等官立於丹陛西階三成每成二人傳贊鳴鞭駕出宫午門嚴鼓鳴鐘皇帝御殿三傳鳴鞭禮成傳鳴鞭如初頒詔設雲盤黃蓋於太和殿丹陛下設龍亭引仗於午門外詔至三成階下承以雲盤張黃蓋出午門載以龍亭校尉舁亭引仗前導至天安門宣讀畢金鳳銜下仍設龍亭由大清門出送至禮部殿試榜舁出長安門餘同御經筵講書臨軒策士考選庶吉士御史主考廷試博學宏辭庶吉士散館均委官率校尉執事凡祭祀執事冬日至大祀圜丘孟春祈榖孟夏常雩先一日皇帝恭閲祝版玉帛香委官率校尉舁香亭龍亭詣太和殿俟禮成舁至祀所神庫安設夏日至大祀方澤先一日設亭於午門外俟太常官奉祝版出納於亭校尉舁至祭所下由太太廟以常寺是日陳設鹵簿皇帝詣齋宫午門鳴鐘鹵簿前導前部鐃歌大樂設而不作祭日請神位委官率校尉恭舁神亭皇帝於大次前盥手以冠軍使雲麾使恭奉盥盤進帨巾禮成回鑾作前部鐃歌大樂陳鹵簿鳴鐘如初時饗太廟駕出午門嚴鼓回鑾鳴鐘春秋祭社稷朝日夕月祭堂子饗前代帝王先農先師駕出午門鳴鐘陳設鹵簿盥手進盤巾回鑾作樂鳴鐘均如前儀謁陵駕出入午門均鳴鐘行幸出入午門鳴鐘亦如之凡本衛官除授掌衛事內大臣員闕由領侍衛府以領侍衛內大臣內大臣列名疏請補授滿鑾儀使員闕於冠軍使及一等侍衛內簡選冠軍使於雲麾使內簡選雲麾使治儀正於治儀正整儀尉內以次簡選如選不得人移領侍衛府簡選三旗三等侍衛擬補雲麾使藍翎侍衛擬補治儀正整儀尉於滿洲蒙古世爵及佐領內簡選均由衛引見補授漢鑾儀使員闕由兵部以直省提督總兵官本衛漢冠軍使列名疏請補授冠軍使雲麾使治儀正於雲麾使治儀正整儀尉內以次簡選整儀尉於漢軍領催驍騎間散人內簡選均由衛引見補授大計軍政屆期均由衛注考冠軍使以下密咨兵部主事以下密咨吏部彚疏以聞凡軍尉儀刀弓矢殳戟用親軍豹尾槍仗馬用護軍蒙古畫角用蒙古鳴角軍奉輦擎執各校尉由內府選充者為旗尉五城選充者為民尉奉輦旗尉百六十八人民尉六十人各執事旗尉二百四十六人民尉三百二十二人左右中前後五所民尉計千三百二十八人馴象所民尉二百有六人八旗漢軍更夫四十人凡譙漏神武門及鐘鼓樓每夕委官率校尉直更巡幸駐蹕率更夫直更亦如之恭遇大閲前夕於行宫門前鳴角鼓鼜欽定大清會典卷九十三
