body:
  text: 兵部武選清吏司職制上凡八旗武職一二品官由部列名奏補領侍衛內大臣內大臣掌鑾儀衛事內大臣均候㫖簡用鑾儀衛鑾儀使以下官均由該衙門以應用之人列名奏補在京參領以下駐防協領以下官由各旗簡選應升應用之人引見補授以名咨部五品以上者按月彚題六品以下者注册凡列名疏請滿洲都統由部以本翼䝉古都統滿洲䝉古副都統滿洲䝉古見任漢軍都統副都統前鋒護軍步軍各統領駐防滿洲將軍都統副都統滿洲外任提督列名具疏請補䝉古都統以本翼滿洲䝉古副都統滿洲䝉古見任漢軍副都統前鋒護軍步軍各統領駐防滿洲䝉古將軍都統副都統滿洲䝉古外任提督列名具疏請補漢軍都統以本翼前鋒護軍步軍各統領副都統駐防漢軍將軍副都統漢軍外任提督列名具疏請補滿洲副都統以本翼䝉古副都統滿洲䝉古見任漢軍副都統及侍郎總兵官列名具疏請補並以應升䝉古漢軍副都統各官列名於後以備調用其散秩大臣公侯伯子男冠軍使王府長史一等侍衛護衛前鋒護軍驍騎各參領內府統領圓明園營總健鋭營翼領參領别列名單附疏以進䝉古副都統以本翼䝉古見任侍郎及步軍翼尉游牧總管滿洲䝉古外任總兵官列名具疏請補其散秩大臣以下各官附疏如前漢軍副都統以本翼漢軍見任侍郎及步軍翼尉各官列名具疏請補其散秩大臣以下各官附疏並同前鋒統領以本翼護軍統領滿洲䝉古見任漢軍副都統列名具疏請補護軍統領以本翼滿洲䝉古副都統滿洲䝉古見任漢軍副都統及俸滿之前鋒護軍各參領由參領補授之王府長史列名具疏請補步軍統領以滿洲䝉古副都統滿洲䝉古見任漢軍副都統步軍翼尉列名具疏請補駐防滿洲將軍以八旗滿洲䝉古副都統滿洲䝉古見任漢軍副都統本駐防副都統滿洲䝉古外任提督列名駐防漢軍將軍以內外漢軍副都統漢軍外任提督列名駐防都統以前鋒護軍各統領滿洲䝉古副都統滿洲䝉古見任漢軍副都統滿洲䝉古外任提督列名駐防滿洲副都統以滿洲驍騎參領本駐防協領及各城守尉三品總管滿洲䝉古外任總兵官八旗副都統列名駐防漢軍副都統以漢軍參領各駐防協領黑龍江水師營總管漢軍外任總兵官八旗副都統列名右衛副都統以八旗副都統按翼列名歸化城副都統以上三旗滿洲䝉古前鋒護軍驍騎各參領列名均由部具疏請補有職守無專官者以一二品大臣攝理之火器營總統以領侍衛內大臣前鋒護軍各統領滿洲䝉古都統副都統滿洲䝉古見任漢軍都統副都統列名管理營房以本旗都統副都統列名嚮導官總統以前鋒護軍各統領滿洲䝉古副都統滿洲䝉古見任漢軍副都統列名巡察京倉八旗直年以都統副都統列名均由部奏請兼攝其在京都統各官或署外任或督師及出差懸闕者由部將應攝之人奏請凡信炮總管於輕車都尉騎都尉司信炮官內簡選犧牲所所牧於騎都尉雲騎尉內簡選均由部引見補授黑龍江吉林四五六品管水手官由各將軍於屬官內按品簡選送部引見補授或所送之人不勝任由部咨取在京八旗應升之人引見王府長史貝勒司儀長由都統於下五旗前鋒護軍驍騎各參領佐領散騎郎一二等護衛子男輕車都尉騎都尉內每旗簡選二人送部部㑹領侍衛內大臣同王貝勒擬定正陪引見補授護衛典儀散騎郎於子以下雲騎尉以上各官內簡選五品以上者由該王貝勒貝子公等㑹部擬定正陪引見補授六品以下者咨部注册凡降補各照所降之級按品擬補於正升人後列名請㫖一二品官應降補六品者令在旗效力三年無過進一級擬補駐防官降調屬將軍都統副都統所轄者俟本處駐防員闕按品補用餘令回旗候補文職改補旗員者給事中御史道府以副參領佐領城門領用員外郎同知知州以步軍尉司信炮官用主事通判知縣以驍騎校用小京官府州縣首領筆帖式以城門吏用旗員任緑旗武職仍改補旗員者副將以步軍翼尉城守尉協領用參將遊擊以前鋒護軍驍騎各參領用都司以前鋒侍衛副參領步軍協尉佐領防守尉用守備以防禦步軍尉用王府官降調按級擬補無官可補者罷職凡入覲駐防將軍都統副都統更番來京先將軍都統次副都統有副都統三四人者分兩次止一人者越一歲一次四川副都統三年一次均於十二月至京入覲述職既得㫖則回原任駐防協領總管城守尉參領各官任滿三年令該管官注考送部引見分别黜陟以示勸懲將軍副都統入覲豫以起程之日報部印交同官署理無同官者委屬官護理赴任未久者遇入覲之期準緩至下次協領以下各官亦如之凡治喪旗員丁父母憂及為祖父母承重者準治喪百日不供職副都統以上由部奏請署理餘由本旗委署祖父母以下各照服制月日給假凡更改姓名五品以上者彚題六品以下者注册職制中凡直省武職副將以上列名具疏請補參將以下按月升選引見補授凡列名疏請提督由部以俸深副都統十人列名並别列各鎮總兵官附疏以進總兵官以漢軍俸深參領十人列名並别列各協副將附疏以進副將以俸深參將十人列名並别列各營參將附疏以進副將參將有記名軍功保舉及俸滿議敘應升即用者均於疏內注明提督總兵官有應補者均指名具疏請補副將惟服闋者指名具疏請補至降調開復於疏內列名於前凡月選單月參將以游擊論俸推升游擊以都司論俸推升都司以藍翎侍衛按應升之月推升餘月先用應升之功加守備次以守備論俸推升守備以藍翎侍衛按應升之月推升餘月分各途以次升選門衛千總應升營守備者為升班功加千總考驗一等及無職任之功加應用營守備者為功班難廕守備及福建澎湖臺灣俸滿千總為劄班俸滿分發千總經本管官咨部入選者為分發班京營效力千總為當差班雙月參將游擊都司以二等三等侍衛及軍政卓異者按應選之月推選餘以在部投供候補者推選守備以武進士簡選一二等在部候選及分省學習經本管官咨部入選者為科班年滿千總發回候推者為委班武舉充補提塘及武進士武舉之在部效力者為勞班武進士充補提塘期滿以營守備用者為效力班俸滿分發千總經本管官咨部入選者為分發班京營效力千總為當差班降革開復為還班卓異官以二四六十月用一二等侍衛以二月分參將游擊用歲一人三等侍衛以四六八月分游擊都司用歲三人藍翎侍衛以單月分都司守備用歲五人奉㫖即用及裁汰赴補親老改補近省並領劄無任可到者部推部選之任或經題留或别題補均雙單月不入班次即用回避赴補者雙月不入班次即用奉㫖用守備無班可歸者歸雙月五人之後用在京候選者月之二十五日掣籤於前月之朔投供三日驗到掣籖後考騎射引見補授庸劣者奏退掣籖不到者罷職每月升調降革病休應歸月選者於科鈔及內外咨揭到日注册以月之二十日為限限前到者本月選限後到者次月選題奏下部議十二日以前到者五日內核覆歸本月選十三日以後到者歸下月選候補都司以上視文到先後月選守備視俸先後門衛千總功加視引見先後同日者視俸次先後無職任功加視入伍先後武進士視簡選等次及年月先後俸滿千總武舉充補材官及難廕守備視引見先後同日者視俸滿先後難廕視題廕先後材官視科名先後武進士武舉充補提塘材官視期滿先後同日者視科名先後降革開復視還職先後同日補授同日到任官視前俸先後初任官視原疏名次先後京營二年俸滿餘一日準常俸一日有半由軍功議敘者準以京俸論邊疆分三年五年俸滿海疆分二年三年俸滿水土惡劣之地二年俸滿見任官以到任受劄之日論俸試署官以實授受劄之日論俸裁汰告假丁憂開復及應降應革遇恩詔免議者準理前俸均計其年月深淺按班推升議敘即升及卓異官均不論俸推升凡拔補把總於外委及未簡選之發標武舉內拔補千總於把總及已簡選之發標武舉內拔補均咨部彚題給劄惟馬蘭泰寧二鎮千把總由總督擬正陪送部引見補授千總六年俸滿由督撫提鎮甄别優者送部引見或分發本省以守備題升或發回原營候部以守備推升閲三年未得題升推升者再加甄别差其等次為用舍凡八旗世爵武職外用子男一等侍衛冠軍使參領步軍翼尉長史以副將用輕車都尉二等侍衛雲麾使前鋒侍衛副參領佐領步軍協尉以參將游擊用騎都尉三等侍衛治儀正步軍副尉步軍尉以都司用雲騎尉恩騎尉四等侍衛藍翎侍衛整儀尉親軍校前鋒校護軍校驍騎校以守備用親軍前鋒護軍以千總用直𨽻山西沿邊各營於副將至守備內分定地方歸於旗員按旗次第簡用西安甘肅二省四川松潘一鎮在外題補之副將參將以七之一游擊都司以六之一守備以五之一直𨽻內地各營副將參將以五之二游擊都司守備以十之三令外任沿邊將備之旗員調補其簡選題補要地及論俸推升均與緑旗武職同凡漢世爵外用伯子男用副將輕車都尉用參將騎都尉兼一雲騎尉用游擊騎都尉用都司雲騎尉用守備凡武科録用武進士一甲一名授一等侍衛二名三名授二等侍衛二甲均授三等侍衛三甲入選者授藍翎侍衛其餘請㫖簡選列一等二等者注册以營守備用三等者以衛守備用武舉㑹試報罷願入伍學習者發本省標營給食馬兵糧隨營差操三年優者準保送部由生監中式者發鄰省由營兵中式者發本省均以千把總拔補凡功加敘用從軍得有功加者由本管官考核繫外委及無職任效用者一等保送引見候㫖用二等輪拔把總三等留營學習繫見任千把總一等保送引見按功加應得之官用二等以千把總應升之官用三等報部注册凡廕生改武者考騎射引見各視得廕品級以都司守備及守禦所千總衛千總用陳亡官廕守備者考騎射引見分定營衛歸入月選用凡提塘三年期滿由武進士充補者依簡選等第以營衛守備用由候選候補守備充補者以應得之官即用凡材官三年期滿由一二等武進士充補者用與充補提塘同由武舉充補者分别等第引見一等者候㫖以營衛守備用二等者以守禦所千總用凡題補調補京營參將游擊守備由步軍統領簡選應升之人題補直省外海內河邊塞衝要省㑹各標營副將以下守備以上有豫保奉㫖注册者由部籖掣補授無豫保注册者令督撫提鎮簡選才技優長諳練地方之人題補苗疆及番夷棚民錯處水土惡劣瘴癘之地各營將備均令督撫提鎮簡選熟悉風土人地相宜者調補凡降補提督降一級二級及總兵官降一級均補副將副將降一級及提鎮以下降級多者依次遞降補用無職可降者罷職應補副將者與應升之人同列名具題應補參將至營守備者輪班候推應補營千總把總者發原籍附近之省交督撫提鎮考驗拔補門千總應降把總者交步軍統領考驗拔補凡武職養親或推升時經督撫提鎮以親老奏請留任或初選時由部改奏近地日後均以原任原選之人坐補凡病痊起用除老病乞休外其因病請解任調理者游擊以下由部核覆即令回籍參將以上核覆得㫖乃行痊日在原任地方由督撫提鎮在本籍由督撫疏請送部引見以原官用千把總患病告退材尚可用者咨部注册痊日準補凡武職回避月選官均避本省題補官參將以上避本省都司以上避本籍五百里守備避本府千把總避本營水師及河營官不論至同族及姻親母之父及兄弟妻之父及兄弟已之壻外甥屬管轄者均令官卑者回避凡武職丁憂提鎮由督撫題報副將由統轄官題報皆歸籍守制服闋赴補參將以下給假歸籍治喪畢仍回任二十七月之內不升轉見任官丁憂未及報部已推升者原官若已補人令赴新任未補人者留原任服闋補升候選官丁憂服闋赴補若選後丁憂已給劄者照見任官給假治喪未給劄者歸籍守制服闋補選凡武職籍貫更復姓名者參將以上督撫提鎮題請游擊以下咨部注册仍於歲終彚題任所不得置産遇丁憂及因事解任均令歸籍若身故之後參將以下子孫無力遷移欲於祖父任所入籍者地方官申報督撫咨部準其入籍副將以上不在此例職制下凡衛所武職單月衛守備以衛千總領運全完議敘即升者為即升班門衛千總俸深應升者為應升班守禦所千總議敘即升及加銜以衛用者為守禦所升班雙月衛守備以開復降補還職者為還班武進士簡選三等及藍翎侍衛歸班以衛用者為科班難廕守備以衛用者為給劄班武舉效力三年期滿為勞班武進士充提塘期滿者為效力班守禦所千總以開復降補還職者為還班南漕效力者為委用班廕生改武者為給劄班武舉效力期滿以守禦所用者為勞班門千總以漢軍武舉為科班隨幫效力期滿者為幫班衛千總以開復降補還職者為還班簡選一二三等武舉為一二三等科班南漕效力者為漕班難廕為廕班候推守禦所千總隨幫運滿者為守禦所幫班一二三等武舉隨幫運滿者為一二三等幫班漢軍武舉隨幫運滿者為漢軍幫班隨幫武舉科分最前者為深科班簡選最早者為簡班世爵隨幫者為給劄班隨幫代領重運及南漕效力科分最前者為代重班廕生以衛千總用者為恩廕班甘肅衛所守備專用武進士千總專用武舉如值班無應選者即用下班之人營官改衛用者視奉㫖先後南漕效力重運武舉視檄委先後同日者視簡選科名先後世爵隨幫視簡選先後其餘班次均與緑旗同衛所官以營用者於每月截限之前歸入營班用至候選衛所官以不識文義辭者準入營班用凡調改衛守備千總有職任繁劇者由漕運總督於所屬守備千總內選才優者調補貴州衛千總由總督於所屬千把總內選通曉文義熟悉苖情者或調或拔五年俸滿以營守備題升邊逺難廕候推衛千總者因家貧告降準以把總用凡簡選武舉㑹試後由部請簡大臣㑹部考試騎射分為五等一二三等以衛千總用四等回籍學習五等褫革漕標隨幫效力官由部於候推千總武舉內簡選引見命往運糧三次咨部注册推用凡降補衛守備降一級以守禦所千總用守禦所千總降一級以衛千總用衛千總降一級以營千總用南漕隨幫武舉降一級以營千總用降二級以把總用應降營千總者發鄰省考拔應降把總者發本省考拔凡給憑赴任照文職例例詳吏部量逺近為限由部書憑兵科填限該員親赴兵科畫憑其在外推升並以簡調繁毋庸送部引見等官憑限封發各督撫轉給抵任即行繳憑違限者兵科核參計月議處引見回任及命往各省試用者給與驗票逾限議處亦如之欽定大清㑹典卷六十
