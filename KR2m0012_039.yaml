front:
  text: 欽定四庫全書欽定大清㑹典卷三十九
  hash: sha256:6c49c842f7fb088a5496c0d455f6f1dfab64cea526df681084f44f92eabf7362
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_039-1a, image: WYG0619/WYG0619-0305c.png}
body:
  text: 禮部祠祭清吏司升配凡列聖升配之禮敕工部敬製升配神牌南郊於昭亨門外北郊於壇北門外祈年殿於壇西門內之左各設恭製神牌黃幄內閣翰林院官書字大學士二人上香行禮既成先配南郊後配北郊均前期分遣官祗告天地宗廟社稷如儀升配圜丘先一日太常寺官豫設升配青幄寶座几案於壇鑾儀衛設龍亭黃蓋御仗於昭亨門外之左恭製神牌黃幄前是日皇帝詣南郊齊宿先詣皇穹宇上香行禮詣圜丘視壇位乃詣齊宮大學士二人朝服詣恭製神牌處太常寺官設香燭大學士上香行禮飾青畢禮部尚書恭奉升配神牌安奉於黃案上香行禮各退祀日王公祗俟於降輦處至時太常卿奏請皇帝御祭服出齊宮乘輦前引後扈如儀皇帝出廣利門至昭亨門右降輦盥洗贊引太常卿恭導皇帝入黃幄左門詣神位前行一跪三拜禮興進前跪恭奉神牌興由中門出安奉於亭跪三拜興避立左側校尉舁亭前列黃蓋御仗禮部太常寺官十人左右導引前引大臣贊引官恭導皇帝於龍亭後行陪祀王以下內大臣侍衛等均於黃幄外北面跪候亭過隨行龍亭至外壝門百官均跪迎於次北上東西面候過興龍亭至內壝左門外止皇帝詣亭前跪三拜興奉神牌入內壝左門至圜丘三成階下黃蓋御仗退贊引官恭導皇帝奉神牌升壇太常官豫設神位拜席於正中設皇帝拜位於後太常卿跪奏廟號皇帝祗見皇天上帝皇帝恭奉神牌跪安於拜席退就拜位奏跪拜興皇帝恭代行三跪九拜禮畢太常卿跪奏請升座皇帝進前跪奉神牌興跪安於配幄退至幄外香案前行一跪三拜禮贊引官恭導皇帝詣二成拜位立乃舉大祀禮如儀升配方澤豫設升配黃幄寶座於壇設鳯亭黃蓋御仗於壇內垣北門之左恭製神牌幄前皇帝恭奉神牌升壇恭代神位行祗見皇地祇禮乃安奉神位於黃幄一如圜丘儀升配祈年殿豫設升配寶座於祈年殿設龍亭黃蓋御仗於壇西門內之左恭製神牌黃幄前皇帝恭奉神牌由左階升入祈年殿左門安奉神位於寶座大祀如儀欽定大清㑹典卷三十九
