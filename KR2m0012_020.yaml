  text: 欽定四庫全書欽定大清㑹典卷二十
  hash: sha256:a5a4fa1a18de01e847f7d2c77c63c2dafde24ec80b80881a1a23f0c0ffa35101
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_020-1a, image: WYG0619/WYG0619-0166a.png}
body:
  text: 禮部尚書滿漢各一人左右侍郎滿漢各二人掌吉嘉軍賔凶之秩序學校貢舉之法以贊邦禮所屬有儀制祠祭主客精膳四司儀制清吏司郎中滿二人漢一人員外郎滿三人漢一人主事滿漢各一人掌嘉禮軍禮學校貢舉並隸焉鑄印局員外郎漢一人筆帖式署主事滿一人二年稱職升主事大使漢一人掌鑄造寶印祠祭清吏司郎中滿二人漢一人員外郎滿三人䝉古漢各一人主事滿漢各一人掌吉禮凶禮主客清吏司郎中滿一人䝉古一人漢一人員外郎滿二人主事滿漢各一人掌賔禮提督㑹同四譯館兼鴻臚寺少卿一人以本部滿漢郎中奏請年簡攝三更代大使漢一人序班漢二人朝鮮通事八人掌通外國語言治館舍委積馬館監督正一人以本部司官兼攝副一人以理藩院司官兼攝均一年更代掌圉人牧芻以待外藩朝覲精膳清吏司郎中滿漢各一人員外郎滿二人主事滿一人䝉古一人漢一人掌五禮燕饗之儀與其牲牷堂主事滿三人漢軍一人司務滿漢各一人筆帖式滿三十四人䝉古二人漢軍四人分隸各司視事之繁簡以為額樂部典樂無專員以本部滿尚書暨各部院堂官知樂者兼之掌五音六律以合隂陽之聲和聲署署正滿漢各一人署丞滿漢各一人以本部暨內務府司官兼之供奉供用無定員以內務府太常寺鴻臚寺官充攝分掌協律之事儀制清吏司嘉禮朝㑹一凡元日長至次日萬夀聖節及遇國家慶典皇帝御太和殿羣臣上表稱賀則有大朝之儀在外直省官及四夷屬國豫期表賀至日各率屬望闕行禮與京朝官同月之每旬五日皇帝御太和殿受朝則有常朝之儀折本降㫖則有御門之儀隨時聽政則御燕朝召臣工入對日以為常凡大朝常朝皇帝禮服羣臣朝服御門燕朝各從所宜服元日萬夀聖節前後三日羣臣入朝咸朝服退朝在公所采服元宵節前後一日如之常朝日退朝在公所及月之朔望逄五逄十日咸補服凡陳設筆硯案在殿內右楹之南東嚮華蓋在殿門外正中法駕鹵簿陳東西檐下及丹陛夾兩階至丹墀以南詳見鑾儀衛靜鞭在午階下北嚮仗馬在左右階下步輦在太和門外五輅在午門外馴象在五輅之南朝象在天安門外皆東西相嚮大朝慶賀設表案於殿內左楹之南西嚮遇頒詔設詔案二一於殿內左楹之北西嚮一於丹陛正中南嚮凡樂懸中和韶樂在殿檐東西丹陛大樂在太和門左右均北嚮鼓吹大部在午門外東西相嚮中和韶樂皇帝御座及還宫則奏之樂章御座元日奏元平長至奏遂平萬夀聖節奏乾平常朝奏隆平還宫元日奏和平長至奏允平萬夀聖節奏太平常朝奏顯平丹陛大樂羣臣行禮則奏之樂章王公百官奏慶平外國使臣奏治平大朝常朝同凡班位親王世子郡王長子貝勒一班貝子入八分鎮國公輔國公一班在丹陛之上立位左翼西面右翼東面皆北上拜位親王一班世子郡王一班長子貝勒貝子一班鎮國公輔國公一班左翼西上右翼東上皆北面不入八分公以下文武百官在丹墀之內立位東西各九班班如其品滿官左翼四旗西面右翼四旗東面皆北上漢官東班吏部戶部禮部宗人府通政使司翰林院詹事府太常寺光祿寺鴻臚寺國子監吏科戶科禮科內閣中書欽天監太醫院在左翼之南西班兵部刑部工部都察院大理寺鑾儀衛太僕寺中書科兵科刑科工科順天府京縣五城兵馬司京營將辨在右翼之南拜位正從各依品級山序立東西各十有八班左翼西上右翼東上皆北面外國使臣在西班末立位東面北上拜位北面東上大朝常朝同凡侍班大學士學士詹事少詹事讀講學士立於殿東檐第三柱西面左都御史左副都御史立於西檐第三柱東面皆北上記注官四人立於殿內西三楹東面前引大臣十人在寶座前立東西面後扈內大臣二人在御座旁左右僉立內大臣率豹尾班侍衛左右各十人在寶座後兩旁序立大朝常朝同導駕大朝禮部堂官二人立於丹陛螭頭下常朝鴻臚卿二人立於丹陛上均東西面北上凡執事樂部典樂一人立於中和樂懸之次東面鴻臚寺鳴贊官四人立於東西檐第二柱引王公鴻臚寺官二人立於丹陛引百官引外國使臣鴻臚寺官序班各二人立於丹墀皆北上東西面鑾儀衛傳鳴鞭官六人立於丹陛西階每階二人皆東面大朝常朝同若大朝慶賀宣表官一人立於東檐第三柱內閣學士後西面凡糾儀御史二人立於西檐第三柱東面北上御史四人禮部司官四人立於丹陛御史八人立於丹墀班前御史四人禮部司官二人立於班後皆北上東西面御史四人吏部禮部司官各二人於班末東西立皆北面大朝常朝同御門聽政給事中二人御史二人立於西階下東面北上凡賜坐王公位殿內左右楹之後重行北上皆東西面大學士內大臣位王公後不入八分公以下文武百官位原立處大朝常朝同凡御門聽政以戶禮兵工四部分日首對三法司直第三班吏部直第六班若宗人府進章在各部之先均以滿漢司官各二人陪奏魚貫相次立於東階下進奏跪於御榻之左尚書左都御史一班侍郎左副都御史大理卿二班陪奏官三班皆西面北上記注官四人立於西檐下編修檢討四人立於西階下皆東面北上各部院豫期具所屬滿漢官各四人考語移送吏部是日吏部按序列名單隨班引見亦曰侍班凡燕朝內閣部院每晨入奏事引見各官遇皇帝行幸駐蹕則分日奏事以六部都察院內務府鑾儀衛為九班其宗人府理藩院通政使司大理寺詹事府太常太僕光祿寺國子監鴻臚寺欽天監咸分附焉八旗奏事按旗次第輪直以為常如有事應速奏者不論班次欽定大清㑹典卷二十
