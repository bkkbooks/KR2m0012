body:
  text: 禮部祠祭清吏司喪禮四凡皇太子喪禮未分封之皇子薨逝有追封皇太子者已冠皇帝成服十三日而除未冠皇帝去冠緯輟朝七日既斂奉安金棺於皇太子宮正殿設几筵建丹旐於宮門外之左簡命王公大臣辦理喪儀奏除王公散秩大臣皇太子近侍及侍衛九十人內府佐領內管領下官員護軍等六百人成服至二十七日而除親王以下有頂帶官員以上咸摘冠緯素服七日直省官摘冠緯素服三日外藩王公台吉及公主福晉等服內來京者咸摘冠緯去耳環朝鮮使臣在京者素服七日在京官員軍民十三日內不作樂不嫁娶直省以文到三日內不作樂不嫁娶初薨之日陳儀駕親王以下奉恩將軍以上民公侯伯以下有頂帶官員以上公主福晉以下一品夫人以上咸齊集朝晡日中三設奠朝晡進羮飯肴饌午奠進饌筵朝夕奠設儀駕齊集行禮如儀奠茶時內外齊集之王公百官皆隨行禮諏日而殯先期行啓奠禮遣官讀文致祭王公百官公主福晉命婦咸齊集儀駕全設陳饌筵十有五席羊七酒九尊楮帛三萬張秋香色幕於大門外之右設反坫具奠罍設冠服於几筵禮部堂官引讀祭文官進祭文於殿簷之左進饌畢執事官進奠几遣官就奠几前跪讀祭文官奉祭文至殿中門閾外北靣跪禮部堂官二人展祭文讀畢仍復於案遣官三祭酒行三叩禮俟徹饌讀祝官奉祭文送燎所皇太子近臣侍衛奉衣冠內大臣十人前引送燎所遣官祭酒行禮如儀禮畢乃焚冠服楮帛各退至日豫設大輿於大門外屆時皇子祭酒三爵辦理喪儀王大臣鑾儀衛工部堂官率舁夫進小輿奉金棺出升大輿禮部堂官祭輿內大臣祭所經門橋皆三祭酒焚楮帛皇子步送王公各官以次隨行齊集之公主福晉命婦先詣殯宮以俟金棺至奉安畢設几筵皇子祭酒衆隨行禮舉哀畢焚楮帛丹旐各退行初祭禮設儀駕陳饌筵六十三席羊二十一酒二十五尊楮製丹旐一楮帛二十三萬五千齊集行禮儀與啓奠同翼日繹祭陳饌筵九席羊三酒三尊楮帛萬有五千辦理喪儀大臣禮部工部內務府光祿寺堂官及內府成服官員男婦咸齊集行禮如儀行大祭禮儀與初祭同翼日繹祭儀與初祭次日繹祭同周月奠獻陳饌筵十有七席羊七酒七尊楮帛五萬設儀駕齊集行禮二三月奠儀同越日行册諡禮先期遣官祗告太廟後殿奉先殿至日鑾儀衛陳儀駕於殯宮大門外內府官設册寶案於几筵前鴻臚官設册寶案於太和門階上正中設采亭於階下正副使二人素服立於階下之東內閣大臣奉絹册寶陳於案一跪三叩退正副使由東階升正使奉册副使奉寶降階安采亭內跪叩如前興校尉舁亭前列黃蓋御仗正副使隨行內大臣侍衛於午門內金水橋旁王以下奉恩將軍以上於午門外常朝處跪送民公侯伯以下四品官以上豫往殯宮大門外齊集俟亭至跪迎亭由長安門出至殯宮由中門入至二門止正副使詣亭前一跪三叩奉册寶陳於案三上香畢宣讀官以次宣册寶畢各退承祭官出至月臺正中乃奠帛讀祝三獻行禮如儀禮成奉祝帛絹册寶至燎所焚燎正副使復命次日頒示天下百日奠獻陳饌筵十有九席羊七酒七尊楮帛七萬儀與月奠同既卜葬吉先期行祖奠禮陳設禮儀與啓奠同奉移日陳大輿於殯宮大門外王公官員公主福晉命婦以次齊集靈駕至跪舉哀啓行後各退辦理喪儀王公大臣禮部工部內務府鑾儀衛堂官及奏遣往送之王公大臣侍衛等咸隨行翼衛所過門橋內大臣祭酒焚楮帛沿塗安奉蘆殿朝夕設奠祭酒三爵往送之王公官員皆隨行禮沿塗守土官跪迎至宿次皆叩謁行二跪六叩禮至園寢日在陵貝勒公大臣及不直班之官員咸於附近處跪迎舉哀候過隨行奉金棺暫安饗殿次日行遣奠禮陳饌筵一羊一送往王公大臣官員及在陵之貝勒大臣官員咸隨行禮儀如祖奠先葬一日行遷奠禮陳饌筵十有五席羊七酒九尊楮帛二萬齊集行禮與前遣奠同屆吉時奉移金棺於墓前蘆殿升太平車奠獻行禮畢各退焚楮帛儀駕至日奉金棺由隧道入奉安於墓壙奠獻行禮畢卒哭各退送往之王公大臣官員皆還京行題主禮豫設神座於饗殿正中設奠案香几於前設主案於奠案之東禮部堂官啓櫝奉主於東案大學士詣案前行一跪三叩禮興東嚮恭題畢禮部堂官奉主奉安於神座三叩退乃行虞祭禮陳牛一羊二帛一爵三饌筵一上香奠帛讀祝三獻承祭官行禮如常儀期年小祥致祭行禮儀與月奠同再期大祥如期年儀三周行禮儀同再期凡皇子喪禮未分封之皇子薨逝適長者皇帝輟朝五日既斂奉采棺於正殿設靈座建丹旐於門外之左已生子者皇子福晉及所生皇孫皆成服大祭日除二十七月內素服除親兄弟伯叔成服外奏遣近支王公及散秩大臣三人侍衛六十人內管領二人內府兩佐領下男婦咸成服二十七日而除初薨之日王以下四品官以上公主福晉以下二品夫人以上咸齊集朝晡日中三設奠奠茶時惟殿內行禮朝晡奠齊集如之諏日而殯至日豫設大輿於大門外屆時皇孫祭酒三爵鑾儀衛工部官率舁夫進小輿奉采棺出升大輿內務府官祭輿禮部官祭所經門橋皆三祭酒焚楮帛皇孫步送王公各官以次隨行齊集之公主福晉命婦先詣殯所以俟采棺奉安畢設靈座皇孫祭酒衆隨行禮舉哀畢焚楮帛丹旐各退行初祭禮遣官讀文致祭設儀衛陳饌筵三十一席羊九酒九尊楮製丹旐一楮帛十有四萬讀文致祭王公官員福晉命婦咸齊集皇孫奠獻年幼遣官代衆隨行禮舉哀畢各退翼日繹祭陳饌筵五席羊五酒五尊楮帛四千不齊集內務府官祭酒行禮如儀行大祭禮儀與初祭同翼日繹祭儀與初祭次日繹祭同周月奠獻陳饌筵十有五席羊九酒七尊楮帛二萬儀與初祭同如奉旨追封擇吉行追封禮正副使二人詣內閣册寶前行一跪三叩禮恭奉由午門中門出安奉於豫設之采亭一跪三叩校尉舁亭前列黃蓋御仗至殯所大門外亭止正副使於亭前一跪三叩正使奉册副使奉寶由中門入陳於案三上香畢宣讀官以次宣册寶畢各退乃進饌讀祭文祭酒行禮如月祭儀百日奠獻陳設禮儀與月奠同既卜葬吉先期行祖奠禮陳饌筵十有五席羊九酒五尊楮帛二萬齊集行禮與百日同至日奉移王公官員福晉命婦以次齊集俟采棺至立舉哀啓行後各退禮部工部內務府堂官各一人及原成服之王公大臣侍衛皆送往所過門橋禮部官祭酒焚楮帛沿塗安奉蘆棚祭酒三爵至園寢日行遣奠禮陳設禮儀均如祖奠先葬一日行遷奠禮陳饌筵一羊一儀與遣奠同屆吉日奉安采棺於園寢墓穴焚儀衛祭酒行禮畢卒哭各退送往之王公大臣官員皆還京行題主禮豫期製造神主工竣設於案內閣禮部大臣朝服行一跪三叩禮刻字填青咸各行禮如初畢乃安奉於饗堂期年小祥致祭行禮如常儀再期大祥如期年儀三周行禮儀同再期中殤幼殤各殺其儀凡親王薨喪聞皇帝輟朝三日有特恩親臨者王子率合屬官員跪迎於大門外設御座於左禮部堂官前引有司設奠几皇帝坐祭酒三爵舉哀畢駕興王子率屬跪送如初迎儀郡王同親王以下奉恩將軍以上民公侯伯都統尚書子以下佐領騎都尉本翼宗室以上固倫公主親王福晉以下縣君奉恩將軍恭人以上咸會喪府前陳儀衛諸會喪者男摘冠緯女去首飾遴府屬官典喪事備采棺朱髤飾金龍既斂施織龍紅綺帷帳設靈座奠案建丹旐於大門之左王子以下府屬官並長史護衛典儀命婦本支諸王貝勒貝子公宗室應有服者皆成服餘會喪者各還喪主居苫次每朝晡日中三設奠設饌如生時府屬男婦咸集王子祭酒府屬官隨行禮舉哀卜日發引前期啓奠設饌筵十有一席羊三酒三尊楮帛三千發引日王以下應集者咸集束采棺以織金紅綺三前引丹旐次列儀衛鞍馬散馬各十有五匹以次前導覆棺以織龍紅綺幃金黃幨力不能如制少殺者聽惟不許僭越等級以下同舁夫八十人長史祭輿所經門橋護衛祭酒皆焚楮帛王子及府屬官員皆步送王福晉白布車帷王府眷屬咸乘車以從至殯次奉采棺安於殯堂王子祭酒三爵衆隨行禮舉哀畢焚楮帛丹旐各散恤典由禮部題請諭祭二次翰林院撰祭文官給祭品初祭賜給犢牛一今改用羊羊八酒九尊楮帛三萬遣禮部堂官一人往奠是日本王府設饌筵三十一席並賜祭羊共十有八酒九尊楮帛十有四萬楮製丹旐一設冠服為尸禮部堂官率所屬奉諭祭文司官筆帖式前引至殯次或園寢王子率闔屬官僚跪迎於大門外讀祭文官奉諭祭文由中門入堂官隨入設祭文於左案乃上食奠獻進奠几禮部堂官近几前立讀祭文官北嚮立宣諭祭文王子衆皆跪宣畢禮部司官進爵堂官跪三祭酒每祭行一叩禮王子衆等皆隨行禮畢徹饌奉祭文王屬護衛奉冠服送至燎所焚燎王子祭酒行禮舉哀畢率屬望闕謝恩行三跪九叩禮凡儀皆諭祭同是日大功服王公宗室除服次日繹祭設饌筵五席羊三酒三尊楮帛一萬越日大祭儀如初祭是日期服王公宗室及本屬旗員護軍等除服次日繹祭同前部給塋費銀五千兩宗人府奏請賜諡給立碑銀三千兩翰林院撰文勒石墳塋制見工部百日致祭設饌筵十有五席羊九酒七尊楮帛二萬祭畢王子以下府屬男婦皆除服衆皆剃髮置守塋人十户塋竣期年而葬先期葬者聽前期祖奠儀與啓奠同至日陳儀衛與發引同王以下應送葬者皆往送葬前一日行遣奠禮儀如祖奠葬日窆棺封墓王子率屬祭酒行禮畢乃卒哭行題主禮畢設主於饗堂行虞祭禮期年致祭禮與百日同再期致祭與期年同三周致祭與再期同王子以下易吉服世子薨喪聞皇帝輟朝二日親王以下奉恩將軍以上民公侯伯都統尚書子以下參領以上固倫公主親王福晉以下縣君奉恩將軍恭人以上咸會喪采棺朱髤繪龍斂奠賜諡勒碑及期年而葬舁夫人數皆與親王同部給塋費銀四千兩立碑銀二千五百兩守塋人八戶發引時前導鞍馬散馬各十有四覆棺以織龍紅綺幨幃初祭大祭賜給羊酒如親王楮帛減五千祭日皆饌筵三十一席羊十有八酒九尊楮帛十有三萬楮製丹旐一百日致祭設饌筵十有五席羊九酒七尊楮帛二萬郡王薨喪聞皇帝輟朝二日親王以下會喪及采棺斂奠賜諡勒碑覆棺幨幃鞍馬散馬守塋人戶咸與世子同葬以七月部給塋費三千兩立碑銀二千兩發引時舁夫六十四人初祭大祭賜給羊酒視世子減二楮帛減二千祭日皆饌筵二十五席羊十有三酒七尊楮帛十有二萬楮製丹旐一百日致祭設饌筵十有三席羊七酒七尊楮帛二萬貝勒薨喪聞皇帝輟朝一日世子郡王以下奉恩將軍以上民公侯伯都統尚書子以下本旗佐領以上和碩公主世子福晉以下縣君奉恩將軍恭人以上咸會喪采棺朱髤繪蟒發引日束以絳綺三以下皆同斂奠賜諡勒碑葬期舁夫咸與郡王同部給塋費銀二千兩立碑銀千兩守塋人六戶發引時前導鞍馬散馬各十有三覆棺織蟒紅綺幃青綺幨初祭大祭賜給羊酒視郡王減二楮帛減八千祭日皆饌筵二十一席羊九酒五尊楮帛十萬楮製丹旐一百日致祭設饌筵十席羊五酒五尊楮帛二萬貝子之喪貝勒以下奉恩將軍以上民公侯伯都統尚書子以下本旗參領郎中以上咸會喪斂奠賜諡勒碑舁夫均與貝勒同日設朝晡奠二葬以五月部給塋費銀千兩立碑銀七百兩發引時前導鞍馬散馬各十有二覆棺織蟒青綺幨帷初祭大祭賜給羊酒如貝勒惟無犢楮帛減五千祭日皆饌筵十有五席羊七酒五尊楮帛八萬楮製丹旐一百日致祭設饌筵八席羊五酒五尊楮帛萬有六千鎮國公之喪貝子以