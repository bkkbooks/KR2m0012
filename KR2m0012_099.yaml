  text: 欽定四庫全書欽定大清會典卷九十九
  hash: sha256:70881b0b776bdf5896528367aa72bb9d9493f83f297b049045ec5abfbf9e625b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0012_WYG_099-1a, image: WYG0619/WYG0619-0921a.png}
body:
  text: 步軍統領提督九門巡捕三營步軍統領一人掌管門禁鎖鑰統率八旗步軍三營將備以肅清輦轂協理刑名部臣一人掌參酌刑律所屬文職十有七人武職六百六十人員外郎二人主事二人掌句檢旗營簿書司務一人掌稽察簿書兼理俸餉筆帖式十有二人掌文移翻譯左右翼步軍翼尉各一人八旗步軍協尉副尉各二十四人掌董率守衛巡警掃除步軍尉每旗滿洲二十四人蒙古漢軍各九人委署步軍尉每旗滿洲各五人蒙古漢軍各二人掌分汛警夜清道詰姦捕盜步軍尉滿洲每旗各三人蒙古漢軍每旗各一人步軍尉遴委緝捕盜賊稽察姦宄領催二千三十一人步軍萬七千八百四十七人養廉名糧六百八人門軍六百四十人不入數內城門領內九門每門二人外七門每門一人城門吏同門千總內外門每門均二人掌嚴啓閉出入以稽詐偽信炮總管一人五品官八旗各一人掌監守白塔信炮中南北三營參將各一人遊擊各一人掌訓練辨兵分駐巡緝守備十有九人千總十有五人把總三十人掌分守營汛緝捕姦匪外委千總十有五人外委把總二十六人分汛協防隨營差委馬兵千四百四十人步兵三千五百六十人內養廉公費名糧扣除馬兵百七十六人步兵三百六十四人凡本屬文武官升除員外郎員闕咨吏部轉行各部院遴選主事移送與本衙門主事同簡選主事於司務筆帖式內選擬正陪由統領引見補授司務於筆帖式內選擬正陪咨送吏部筆帖式咨吏部行各部院保送筆帖式簡選擬調由吏部引見補授步軍翼尉會該翼滿洲都統護軍統領各選驍騎參領護軍參領一人引見補授協尉於該旗城門領副尉步軍尉內選擬如步軍營不得其人會同該旗都統於男以下騎都尉以上世爵內選擬正陪副尉於該旗步軍尉等官內選擬步軍尉會該旗都統於委署步軍尉雲騎尉前鋒護軍驍騎諸校城門吏隨旗行走之五六七八品官及調旗部員內選擬正陪委署步軍尉會同該旗都統於雲騎尉護軍驍騎諸校及隨旗行走之五六七八品官內選擬均引見補授捕盜步軍尉於該旗步軍尉內遴委城門領內九門以八旗滿洲外七門以八旗漢軍均於該旗步軍副尉步軍尉內選擬步軍營無可升授者會該旗於騎都尉雲騎尉內選擬正陪城門吏由該旗都統於前鋒護軍領催驍騎內選擬均引見補授門千總移咨兵部銓補監守信炮總管由八旗直年都統等以八旗三四品世爵及監守信炮官內簡選十人引見補授監守信炮五品官該旗都統於騎都尉雲騎尉護軍驍騎校及六七八品官內擬正陪引見補授巡捕三營參將遊擊守備以次升補均簡選引見補授千總以把總選補把總以外委千把總及馬兵並發營補用之人拔補外委千把總皆循次拔補凡拔補軍士步軍領催於該旗步軍內拔補步軍咨該旗册送正身間散壯丁及旗下家人選補捕盜步軍三百二十人在步軍數內於該旗步軍內拔補城門驍騎三百人內九門以滿洲蒙古外七門以漢軍各咨取該旗年壯驍騎調補門軍六百四十人內九門以滿洲蒙古外七門以漢軍各於該旗步軍內選補均不得以教養兵充選炮手每門各二人內九門咨取漢軍旗炮手外七門以該門城門驍騎各選取充補監守信炮領催四人炮手八人咨該旗於漢軍領催炮手內移送步軍十有六人即以漢軍旗步軍選驗調補三營馬兵咨取八旗漢軍內府間散壯丁與召募良民一同選充其開戶人充兵後有技優能效力者以拔補外委千把總為限番捕人役皆召募民人充當凡城門朝啓以昧爽夕閉以日入皇城諸門自大淸天安端門而外皆屬八旗步軍官兵守衛遇朝會之期委步軍協尉副尉各四人步軍尉十有六人酌撥步軍於大淸門內午門外御道左右巡警掃除逐止從役又委捕盜步軍尉四人於長安左右門外稽察出入京城諸門頒隂文合符於步軍統領及正陽西直二城門領如遇夜間有旨啓門大內出陽文合符正陽西直二城門領即取隂文合符驗明啓鑰其餘各門報統領齎隂文合符至門與持至之陽文合符比驗乃啓次日奏聞朝祭御門及行幸駐蹕王公百官有應早啓城門出入者兵部核所經由限以時刻轉行統領傳知各門早啓平時啓閉均循常制郊祀先一日駕宿齋宫統領於附近城門內翼尉一人協尉副尉四人於祀所直宿外垣以內八旗步軍設汛巡警外垣以外三營辨兵設汛稽察恭遇時巡省方奏請翼尉一人扈蹕仍委協尉一人筆帖式守備千總把總各一人八旗捕盜步軍尉八人健步官十人三營馬步軍捕役六七十人隨從皇城及正陽崇文宣武門內外通衢要道均增置汛防别委旗營官辨倍常巡警各門亦嚴加守衛俟回鑾日乃撒凡守衛皇城內專隸八旗滿洲分汛九十列柵一百十有六皇城外八旗滿洲蒙古漢軍分汛六百二十有五列柵千一百九十有九均令步軍尉督率步軍按所轄地界防守稽察夜則擊柝傳籌巡更黎明乃止外城分隸三營中營所屬馬兵汛五十有四步兵汛五十有五列柵百九十有三南營所屬馬兵汛六十有二步兵汛八十有二列柵百四十有五北營所屬馬兵汛四十有九步兵汛四十列柵百有二各統以參遊轄以專汛守備分防以千把總率兵巡警如前內九門城上設步軍汛八十七所恭遇行幸駐蹕增八旗驍騎汛四十八所如車駕省方巡狩撤步軍分防通衢城上汛守悉易以八旗驍騎外七門城上設汛四十三所營兵更番防守轄以千把總三人圓明園八旗步軍汛凡五十三營馬兵汛十有五步兵汛五十有二靜明園三營馬兵汛十有二靜宜園三營馬兵汛一步兵汛十西山小屯村及冷泉各設三營馬兵汛一步兵汛四凡遇駐蹕參將一人率各汛守備於通衢千把總等於僻巷晝夜嚴謹稽巡乘輿經由內外城統領率所部官兵先時除道設幛衢巷以蹕行人凡緝姦京城內外遇有強竊橫惡負罪潛逃私毁私鑄賭博鬬毆者均責成八旗三營專汛兼轄等官隨時緝獲按名議敘有差逾限不獲諱匿不報軍捕受財縱放該管官扶同徇隱者並論如法凡斷罪八旗三營緝護違禁犯法之民罪止笞杖者即時審斷發落不得拘留徒罪以上送刑部審擬旗人犯姦應坐流罪折枷責以下者依律斷結罪至死會三法司滿堂官審擬具奏凡訓練八旗步軍習步射城門驍騎習鳥槍均春秋操練步軍翼尉同城門領更番考閲內九門設大炮各十外七門設大炮各五每門炮手二名三營參將遊擊月考其屬之弓矢守備千總把總各練汛兵春秋習烏槍與城門驍騎同凡優恤給入官房千四百三十四間地四百畝有竒歲收租銀以為辦差公費及賞賚番捕之用官有養廉武職給兵糧統領馬兵九名翼尉四名協尉步軍三名副尉二名步軍尉委署步軍尉各一名參將馬八步十有二遊擊馬六步九守備馬三步五千總馬一步四把總馬一步三外委千把總均步一每營設公費名糧馬兵步兵各五名文職給以房租員外郎主事司務皆歲支銀百兩筆帖式八十兩軍有恤賞八旗步軍婚喪之事於本旗優恤銀內賞給詳見八旗典則三營軍士以房地餘租九千兩生息喪葬恤以四兩婚嫁賞以二兩步軍尉隨圍捕盜步軍尉差委緝捕視其日之久暫給路費三十兩或二十兩於生息銀內動支步軍差巡墊道每旗統備帳房四十架俾避雨雪於工部咨取凡禁令京城內傳更閉柵王公官民皆禁行走惟奉旨差遣各部院傳事民間婚喪祭祀或疾病産娩延醫召媼均詢明聽出若無故夜行及辨兵疏縱與非時妄拏者論如律火災隨時防範偶遇有失官兵各按旗營界址即時赴救曠誤者論五城米厰平糶禁商賈囤販肩負數寡者聽送葬者禁出正陽門夏日至祭北郊春秋祀東西郊臨期朝陽阜成安定諸門禁亦如之八旗官軍耽於優劇內外城闤闠侵占街塗送死者用火化三冬風髙演放起火以及番捕擅設白役偵探部院事端擾害良善者皆有嚴禁欽定大清會典卷九十九
