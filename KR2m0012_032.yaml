body:
  text: 禮部儀制清吏司學校凡學校之制京師立國子監曰太學直省府州縣衛各於所治立學皆祀先師以崇矩範闢黌舍以聚生徒時肄習以廣術業勤訓迪以儲人材各學諸生升於太學者由國子監考課詳見國子監直省提督學政選差京堂翰詹科道部曹盛京以奉天府丞福建臺灣府廣東瓊州府以巡道兼之提調以知府同知直𨽻州分教以教授學正教諭訓導等官凡學政考校初視事按各府直𨽻州逺近定期歲試及期按臨校閲文武生童藝業既竣事定期科試專校文生童文藝三年皆遍疏報任滿俟新學政抵任還朝復命凡學政關防巡試所至以府首領州縣佐雜官充巡捕地方有司視沿塗供備次舍提調官視考院門垣塗徑務絶窺探交通之迹既至親視掾吏承皂及承直水火灑掃夫役封入內署其臨考執事及司門傳事官吏由提調官選委各居外舍禁絶往來每日啓門收發文書進納薪水皆巡捕官檢察無弊乃許出入如門以內潛通關節責之學政門以外招搖傳遞責之提調官互相徇隱者同論凡教職考核初選時滿教官由部試文藝録取者引見序用直省府州縣學教官由督撫考試列等第以别用舍學政巡試所至考其文章師範不稱職者黜願應鄉會試者由布政使司申送凡童生入學滿洲蒙古漢軍由本旗佐領考録順天府大宛二縣由知縣考録均册送府丞直省由州縣考録册送知府同知直𨽻州均以其録取者册送學政歲科考擇其秀者入學曰附學生員其每考入學之數京師滿洲蒙古共六十人漢軍半之盛京滿洲蒙古共十有一人漢軍八人直𨽻順天府大興宛平二縣學均二十五人各府學二十三人大州縣視府學其次州縣大學十有八人中學十有五人小學十人江南浙江府學均二十五人大州縣視府學其次州縣大學二十人中學十有六人小學十有二人餘省府學均二十人大州縣視府學其次州縣大學十有五人中學十有二人小學八人初建之府州縣視人文以定大中小學不足小學之數者虛其額以待人文之盛若大縣分為二縣者中分入學原數或較人文之多寡以為差凡諸生考課入學生員各治一經本學教官月有課季有考别其等差册報學政歲科考取其最優者食餼於官曰廪膳生員其數京師滿洲蒙古共六十人漢軍半之盛京滿洲蒙古共六人漢軍三人直省府學四十人州學三十人縣學二十人衛學十人次優者别於附學曰增廣生員如廪膳生員之數若府州縣初建及大縣分為二縣者分設廩增之法與附學生員同凡貢士成均選拔貢生每十二年一舉由國子監疏請得旨下部行直省學政於科考後合兩試優等生員考擇文行兼優者京師滿洲蒙古每旗選拔二人漢軍每旗選拔一人盛京滿洲蒙古共二人漢軍一人直省府學二人州縣學各一人八旗欽命大臣盛京會奉天府尹直省會督撫覆試文藝兼擇才品疏請貢入成均才不充選者寧闕毋濫既赴部奏請廷試考列一二等者簡選引見候旨録用皆欽命大臣涖其事考列三等及簡選所遺者送國子監肄業文理有疵者發回本籍讀書三年再送廷試荒謬者黜革原選拔各官論如律其有赴部後期者學政以事由咨報部會國子監補考一二三等均送監肄業餘與廷試同副貢生以順天及各省鄉試取中副榜升入太學準作貢生與選拔貢生同歲貢生以各學廪膳生員食餼年久者依序貢入成均京師滿洲蒙古歲貢二人漢軍歲貢一人盛京滿洲蒙古三歲一人漢軍五歲一人直省府學歲貢一人州學三歲二人縣學二歲一人若府州縣新建及分設者或府視州州視縣或兩縣更年迭貢或四歲五歲貢一人均因地定制恩貢生遇國家覃恩以本歲正貢作為恩貢與選拔及副貢同以需次待貢之生作為歲貢如州縣學不值貢期俟應貢之年補行優貢優監生學政歲科試竣於所報優生中擇其尤者送部考試廪增準作貢生附學及武生準作監生功貢生諸生有從軍者以功升諸太學準作貢生與優貢生均視歲貢廕監生及納粟準貢準監各在籍者歸本學教官約束賓興之歲與生員同科考由學政録取乃册送鄉試凡考試藝業童生試書藝二覆試減書藝一加論論題孝經小學間出有能習御纂經義者䇿對不失旨視正考卷無疵即準招覆諸生歲試書藝二經藝一冬日減書藝一科試書藝經藝時務䇿各一冬日減經藝仍摘問御纂經義必條對明晰考案始居前列優生始貢成均選拔分試二日首日書藝二經解一次日䇿一五言八韻詩一廷試書藝一詩一歲貢試書藝經藝詩各一凡釐正文體制義代聖賢語言理解務取清晰格律必歸雅正有尚詭異矜浮華者黜之學政歲科試竣取各學生員前列十卷兩次送部以待磨勘凡頒行書籍御纂經解性理詩古文辭及校訂十三經二十二史三通等書皆頒行直省儒學並許書賈鐫版流傳若非聖之書一家之言不立於學宫者士子不得傳習淫辭小説坊肆不得刋行民間不得留藏學政巡試所屬嚴飭地方官禁止凡考場規條滿洲蒙古漢軍先試騎射合式乃準應歲科試提調官按應試人數豫刋坐號戳記投學署先試一日提調官編號於試卷尾彌封鈐印簿記之卷面加浮籤書生童姓名試日彚卷納場內學政豫於東西文場適中之地設公座左右各設長案分置坐號戳記令教官數人立案側昧爽生童集大門外提調官視外搜檢唱名隸執照入牌序進候內搜檢畢聽唱名領卷單名嚮東案雙名嚮西案教官各取坐號鈐卷面生童各就考案依號列坐既畢乃封門命試題場四隅置役瞭望以防鄰號交通作弊者及生童試藝完自揭卷面浮籤交卷領照出牌積三十人一啓門序出日落時出盡不繼燭有懷挾文字倩代作文及場內移號換卷者皆論如法童生以所知廪生一人具保結臨試偕至識别有冒籍冒姓匿喪倩替及出身卑賤者罪之廩保同坐翼日出考取字號示期覆試覆定書等第名次於原卷發提調官啓封對號書名出案學政集諸生給閲原卷批評奬優斥劣勸懲各有差凡衡文黜陟歲考一等增附青社均補廪無廩闕附青社先補增無增闕青社先復附其丁憂起復緣事辨復之候廪及因考停廪各生準復廪均依名次序補二等增補廪附青社補增無增闕青社先復附停廪降增者復廪增降附者復增三等無黜陟候廪候增者復廪增均與考列一二等之增附新舊間補停廪者收復候廪增降附者收復候增青衣發社者復附四等廪停食餼限六月送考原停廪者俟下次歲考均憑文定奪增附青社撲責示懲五等廪停作闕原停廩者降增增降附附降青衣青衣發社原發社者黜為民六等廩十年以上發社六年及增十年以上發本籍充吏不願者聽入學未及六年者發社餘皆黜為民科考列一二等者册送賔興三等候考遺才録取者册送不取者不準鄉試其補復廪增與歲考同凡勸懲優劣學政歲考所至行令提調州縣教職等官各舉諸生優劣開具事迹封送學政體訪確實隨場咨部至三年任滿彚疏以聞由部覆核優生行誼最著者升入太學其次量豫奬賞劣生悔悟自艾者以改過注册怙終者除名凡優恤諸生初入學免本身徭役入學三十年及未至三十年齒已七十者免歲科試以生員冠帶終其身逰學逺方隨祖父任所赴試不及者臨試而病者均給假限期補考父母服及承祖父母重三年免試本生父母服期免試期免試者廪增不作闕貧不自存者發學田租周之犯事情輕後自悔改者既革許開復經定罪者許以原名應童子試所坐微細地方有司具詳學政會教官戒飭不得同齊民鞭撻凡廣勵學業京師立宗室學覺羅學咸安宫學景山學八旗義學設滿漢教習以進士舉人恩拔副貢生充之滿教習兼用翻譯生員及因公罣誤之廢官通翻譯者均由部請旨考試補授宗室等學以京堂翰詹義學以禮部司官稽察課程三年期滿分别等差引見敘用直省會城立書院府州縣立義學社學選擇生徒肄業其中聘薦紳宿儒學問淹貫者為之師束修膏火之費官為供備以宏樂育凡執事奉祠直省府州縣慶賀三大節及遇頒詔行禮春秋釋奠於先師設通贊二人引贊二人以生員嫻於禮儀者充之山東闕里設樂舞生百五十四人各省府州縣學各四十人選本地俊秀子弟充之先賢先儒建有專祠者每代擇適裔一人由督撫學政咨部給執照充奉祠生凡學政全書三年一修頒發直省督撫學政分行府州縣學以示遵循風教凡崇祀名宦鄉賢之禮直省司牧之官有功斯民遺愛難泯者薦紳處士積學力行垂範鄉里者由學校師生公舉以達州縣州縣以達督撫學政歲於八月具疏部加覆核歲終彚疏以聞列祀名宦鄉賢二祠凡旌表節孝之禮宗室覺羅由宗人府核奏部覆題旌宗室以孝著者諸王以下至間散宗室公主福晉以下至間散宗室之妻若女均降敕褒奬賜銀幣有差若以女守貞及間散宗室之妻守節者如之覺羅節孝賜建坊銀加幣一夫亡殉節者請旨賜羊酒楮帛內閣撰文遣官致祭八旗由佐領報都統直省由州縣報督撫學政均詳具實迹造册送部核定歲終彚疏以聞孝子崇祀忠義孝弟祠其節婦自年三十至五十或年逾四十而歿守節己閲十五年以上者賜清標彤管四字以表其閭仍於節孝祠內彚姓氏勒諸貞珉其有奇節苦行者各賜銀三十兩建坊里門春秋祭於祠內孝女與孝子同貞女烈婦與節婦同凡旌表義行之禮民有屢世同居和睦無間者建坊里門題名忠義孝弟祠若出粟以周族黨振貧乏捐財以治橋梁修道路均由有司旌其閭為數多者奏請敘録凡優老之禮百歲老民賜銀三十兩建坊里門題以升平人瑞四字老婦旌以貞壽之門逾百歲者加賞銀十兩內府幣一百有十歲者倍之百二十歲以上者請旨加賞不拘成例凡慈幼之禮直省各設育嬰堂收養幼孤之無歸者又民有一産三男者給米五石布十匹凡掩骼埋胔之禮八旗及內府佐領各給塋地直省州縣建義塜有貧不能葬及無主暴骨皆收埋之民有收瘞遺骸年久不怠者有司旌表其閭鄉飲酒禮凡鄉飲酒之禮歲以孟春望日孟冬朔日舉行於順天府庠豫期由大興宛平縣令各舉耆年致仕德望懋著者一人為賔次介次三賔次衆賔均以齒德兼優者為之屆期以本部漢堂官一人監禮府尹為主人教授一人為司正贊禮執事以府縣學生員先一日設坐次於庠之講堂設律令案於堂東司正官率執事諸生習儀樂部和聲署設樂於西階下至日質明主人偕僚屬執事生均詣學乃速賔介既至考鐘伐鼓主人出迎於庠門之外賔介東面主人西面主人揖賔介入衆賔從入三揖至於階三讓乃升主人東階上北面再拜賔介西階上北面答再拜主人揖賔介就位三賔衆賔咸就坐賔席西北南嚮介西南東嚮主人東南西嚮三賔衆賔在賔席之西東嚮坐定贊者贊司正揚觶以下行禮均唱贊司正由西階升詣堂中北面立賔主以下皆立司正揖衆皆揖司爵酌酒於觶授司正司正揚觶而語曰恭惟朝廷率由舊章敦崇禮教舉行鄉飲非為飲食凡我長幼各相勸勉為臣盡忠為子盡孝長幼有序兄友弟恭內睦宗族外和鄉里無或廢墜以忝所生乃畢飲以觶授司爵揖賔主以下皆揖司正退衆皆坐執事者舉律令案於堂中讀律令者詣案北面立賔主以下皆立揖如前讀畢退主人起獻賔席前北面立司爵酌酒授主人主人受爵詣賔位司饌舉饌案於賔前主人奠爵於席降再拜賔答再拜退復位賔起酢主人席前東面立司爵酌酒授賔賔受爵詣主人位饌案從賔奠爵於席再拜主人答再拜賔復位主人起獻介介酢主人均如前儀司爵酌酒獻三賔衆賔遍工升鼓瑟歌鹿鳴賔主以下酒三行司饌供羮笙磬作奏南陔間歌魚麗笙由庚司爵以次酌酒司饌供羮者三乃合樂歌關睢工告樂備執事者徹饌案賔主以下皆起主人就東階賔介就西階均再拜賔介降階出主人送於門外如初迎儀直省舉行鄉飲酒禮府以知府州以知州縣以知縣為主席餘儀與順天府同欽定大清會典卷三十二
